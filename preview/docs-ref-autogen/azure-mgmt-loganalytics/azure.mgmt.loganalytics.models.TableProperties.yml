variables:
- description: 'In Analytics table: the tables analytics retention in days, between
    4

    and 730. Setting this property to -1 will default to the workspace retention.
    In Basic and

    Auxiliary table: read only property.'
  name: retention_in_days
  types:
  - <xref:int>
- description: 'The table total retention in days, between 4 and 4383. Setting

    this property to -1 will default to retentionInDays.'
  name: total_retention_in_days
  types:
  - <xref:int>
- description: 'The tables long-term retention in days. Calculated as

    (totalRetentionInDays-retentionInDays).'
  name: archive_retention_in_days
  types:
  - <xref:int>
- description: Parameters of the search job that initiated this table.
  name: search_results
  types:
  - <xref:azure.mgmt.loganalytics.models.SearchResults>
- description: Parameters of the restore operation that initiated this table.
  name: restored_logs
  types:
  - <xref:azure.mgmt.loganalytics.models.RestoredLogs>
- description: Search job execution statistics.
  name: result_statistics
  types:
  - <xref:azure.mgmt.loganalytics.models.ResultStatistics>
- description: 'Instruct the system how to handle and charge the logs ingested to
    this table. Known

    values are: "Basic", "Analytics", and "Auxiliary".'
  name: plan
  types:
  - <xref:str>
  - <xref:azure.mgmt.loganalytics.models.TablePlanEnum>
- description: The timestamp that table plan was last modified (UTC).
  name: last_plan_modified_date
  types:
  - <xref:str>
- description: Table schema.
  name: schema
  types:
  - <xref:azure.mgmt.loganalytics.models.Schema>
- description: 'Table''s current provisioning state. If set to ''updating'', indicates
    a

    resource lock due to ongoing operation, forbidding any update to the table until
    the ongoing

    operation is concluded. Known values are: "Updating", "InProgress", "Succeeded",
    and

    "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.loganalytics.models.ProvisioningStateEnum>
- description: 'True - Value originates from workspace retention in days,

    False - Customer specific.'
  name: retention_in_days_as_default
  types:
  - <xref:bool>
- description: 'True - Value originates from retention in days, False

    - Customer specific.'
  name: total_retention_in_days_as_default
  types:
  - <xref:bool>
