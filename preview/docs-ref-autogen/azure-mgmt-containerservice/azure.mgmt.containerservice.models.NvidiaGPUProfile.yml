uid: azure.mgmt.containerservice.models.NvidiaGPUProfile
name: NvidiaGPUProfile
fullName: azure.mgmt.containerservice.models.NvidiaGPUProfile
module: azure.mgmt.containerservice.models
summary: NVIDIA-specific GPU settings.
constructor:
  syntax: 'NvidiaGPUProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'The Managed GPU experience installs additional components, such as
    the

    Data Center GPU Manager (DCGM) metrics for monitoring, on top of the GPU driver
    for you. For

    more details of what is installed, check out aka.ms/aks/managed-gpu. Known values
    are:

    "Unmanaged" and "Managed".'
  name: management_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.ManagementMode>
- description: 'Sets the MIG (Multi-Instance GPU) strategy that will be used for managed

    MIG support. For more information about the different strategies, visit aka.ms/aks/managed-gpu.

    When not specified, the default is None. Known values are: "None", "Single", and
    "Mixed".'
  name: mig_strategy
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.MigStrategy>
