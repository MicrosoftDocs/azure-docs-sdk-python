  name: proximity_placement_group_id
  summary: The ID for Proximity Placement Group.
  signature: 'proximity_placement_group_id: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.scale_down_mode
  name: scale_down_mode
  summary: 'The scale down mode to use when scaling the Agent Pool. This also effects
    the cluster

    autoscaler behavior. If not specified, it defaults to Delete. Known values are:
    "Delete" and

    "Deallocate".'
  signature: 'scale_down_mode: str | _models.ScaleDownMode | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.scale_set_eviction_policy
  name: scale_set_eviction_policy
  summary: 'The Virtual Machine Scale Set eviction policy. The eviction policy specifies
    what to do with

    the VM when it is evicted. The default is Delete. For more information about eviction
    see [spot

    VMs](https://docs.microsoft.com/azure/virtual-machines/spot-vms). Known values
    are:

    "Delete" and "Deallocate".'
  signature: 'scale_set_eviction_policy: str | _models.ScaleSetEvictionPolicy | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.scale_set_priority
  name: scale_set_priority
  summary: '"Spot" and "Regular".'
  signature: 'scale_set_priority: str | _models.ScaleSetPriority | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.security_profile
  name: security_profile
  summary: The security settings of an agent pool.
  signature: 'security_profile: _models.AgentPoolSecurityProfile | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.spot_max_price
  name: spot_max_price
  summary: 'The max price (in US Dollars) you are willing to pay for spot instances.
    Possible values are

    any decimal value greater than zero or -1 which indicates default price to be
    up-to on-demand.

    Possible values are any decimal value greater than zero or -1 which indicates
    the willingness

    to pay any on-demand price. For more details on spot pricing, see [spot VMs pricing](https://docs.microsoft.com/azure/virtual-machines/spot-vms#pricing).'
  signature: 'spot_max_price: float | None'
