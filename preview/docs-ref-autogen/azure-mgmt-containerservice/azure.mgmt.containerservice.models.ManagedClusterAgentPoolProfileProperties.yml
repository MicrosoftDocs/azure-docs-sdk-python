- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.local_dns_profile
  name: local_dns_profile
  summary: 'Configures the per-node local DNS, with VnetDNS and KubeDNS overrides.
    LocalDNS helps improve

    performance and reliability of DNS resolution in an AKS cluster. For more details
    see

    aka.ms/aks/localdns.'
  signature: 'local_dns_profile: _models.LocalDNSProfile | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.max_count
  name: max_count
  summary: The maximum number of nodes for auto-scaling.
  signature: 'max_count: int | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.max_pods
  name: max_pods
  summary: The maximum number of pods that can run on a node.
  signature: 'max_pods: int | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.message_of_the_day
  name: message_of_the_day
  summary: 'Message of the day for Linux nodes, base64-encoded. A base64-encoded string
    which will be

    written to /etc/motd after decoding. This allows customization of the message
    of the day for

    Linux nodes. It must not be specified for Windows nodes. It must be a static string
    (i.e., will

    be printed raw and not be executed as a script).'
  signature: 'message_of_the_day: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.min_count
  name: min_count
  summary: The minimum number of nodes for auto-scaling.
  signature: 'min_count: int | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.mode
  name: mode
  summary: 'The mode of an agent pool. A cluster must have at least one ''System''
    Agent Pool at all times.

    For additional information on agent pool restrictions and best practices, see:

    [https://docs.microsoft.com/azure/aks/use-system-pools](https://docs.microsoft.com/azure/aks/use-system-pools).
    Known values are: "System",

    "User", "Gateway", "ManagedSystem", and "Machines".'
  signature: 'mode: str | _models.AgentPoolMode | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.network_profile
  name: network_profile
  summary: Network-related settings of an agent pool.
  signature: 'network_profile: _models.AgentPoolNetworkProfile | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.node_image_version
  name: node_image_version
