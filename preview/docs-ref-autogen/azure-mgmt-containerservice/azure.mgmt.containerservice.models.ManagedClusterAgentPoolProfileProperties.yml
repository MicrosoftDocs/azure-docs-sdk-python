  signature: 'node_image_version: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.node_initialization_taints
  name: node_initialization_taints
  summary: 'Taints added on the nodes during creation that will not be reconciled
    by AKS. These taints will

    not be reconciled by AKS and can be removed with a kubectl call. This field can
    be modified

    after node pool is created, but nodes will not be recreated with new taints until
    another

    operation that requires recreation (e.g. node image upgrade) happens. These taints
    allow for

    required configuration to run before the node is ready to accept workloads, for
    example

    ''key1=value1:NoSchedule'' that then can be removed with `kubectl taint nodes
    node1

    key1=value1:NoSchedule-`.'
  signature: 'node_initialization_taints: list[str] | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.node_labels
  name: node_labels
  summary: The node labels to be persisted across all nodes in agent pool.
  signature: 'node_labels: dict[str, str] | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.node_public_ip_prefix_id
  name: node_public_ip_prefix_id
  summary: 'The public IP prefix ID which VM nodes should use IPs from. This is of
    the form:

    /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/publicIPPrefixes/{publicIPPrefixName}.'
  signature: 'node_public_ip_prefix_id: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.node_taints
  name: node_taints
  summary: 'The taints added to new nodes during node pool create and scale. For example,

    key=value:NoSchedule.'
  signature: 'node_taints: list[str] | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.orchestrator_version
  name: orchestrator_version
  summary: 'The version of Kubernetes specified by the user. Both patch version <major.minor.patch>
    (e.g.

    1.20.13) and <major.minor> (e.g. 1.20) are supported. When <major.minor> is specified,
    the

    latest supported GA patch version is chosen automatically. Updating the cluster
    with the same

    <major.minor> once it has been created (e.g. 1.14.x -> 1.14) will not trigger
    an upgrade, even

    if a newer patch version is available. As a best practice, you should upgrade
    all node pools in

    an AKS cluster to the same Kubernetes version. The node pool version must have
    the same major

    version as the control plane. The node pool minor version must be within two minor
    versions of

    the control plane version. The node pool version cannot be greater than the control
    plane

    version. For more information see [upgrading a node pool](https://docs.microsoft.com/azure/aks/use-multiple-node-pools#upgrade-a-node-pool).'
  signature: 'orchestrator_version: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.os_disk_size_gb
  name: os_disk_size_gb
  summary: 'OS Disk Size in GB to be used to specify the disk size for every machine
    in the master/agent

    pool. If you specify 0, it will apply the default osDisk size according to the
    vmSize

    specified.'
  signature: 'os_disk_size_gb: int | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.os_disk_type
  name: os_disk_type
  summary: 'The OS disk type to be used for machines in the agent pool. The default
    is ''Ephemeral'' if the

    VM supports it and has a cache disk larger than the requested OSDiskSizeGB. Otherwise,
    defaults

    to ''Managed''. May not be changed after creation. For more information see [Ephemeral
    OS](https://docs.microsoft.com/azure/aks/cluster-configuration#ephemeral-os).
    Known values are:

    "Managed" and "Ephemeral".'
  signature: 'os_disk_type: str | _models.OSDiskType | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.os_sku
  name: os_sku
  summary: 'Specifies the OS SKU used by the agent pool. The default is Ubuntu if
    OSType is Linux. The

    default is Windows2019 when Kubernetes <= 1.24 or Windows2022 when Kubernetes
    >= 1.25 if OSType

    is Windows. Known values are: "Ubuntu", "AzureLinux", "AzureLinux3", "Mariner",

    "Flatcar", "CBLMariner", "Windows2019", "Windows2022", "Ubuntu2204", "Windows2025",

    "WindowsAnnual", and "Ubuntu2404".'
  signature: 'os_sku: str | _models.OSSKU | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.os_type
  name: os_type
  summary: '"Linux" and "Windows".'
  signature: 'os_type: str | _models.OSType | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.pod_ip_allocation_mode
  name: pod_ip_allocation_mode
  summary: 'Pod IP Allocation Mode. The IP allocation mode for pods in the agent pool.
    Must be used with

    podSubnetId. The default is ''DynamicIndividual''. Known values are: "DynamicIndividual"
    and

    "StaticBlock".'
  signature: 'pod_ip_allocation_mode: str | _models.PodIPAllocationMode | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.pod_subnet_id
  name: pod_subnet_id
  summary: 'The ID of the subnet which pods will join when launched. If omitted, pod
    IPs are statically

    assigned on the node subnet (see vnetSubnetID for more details). This is of the
    form:

    /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/virtualNetworks/{virtualNetworkName}/subnets/{subnetName}.'
  signature: 'pod_subnet_id: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.power_state
  name: power_state
  summary: 'Whether the Agent Pool is running or stopped. When an Agent Pool is first
    created it is

    initially Running. The Agent Pool can be stopped by setting this field to Stopped.
    A stopped

    Agent Pool stops all of its VMs and does not accrue billing charges. An Agent
    Pool can only be

    stopped if it is Running and provisioning state is Succeeded.'
  signature: 'power_state: _models.PowerState | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAgentPoolProfileProperties.prepared_image_specification_profile
  name: prepared_image_specification_profile
