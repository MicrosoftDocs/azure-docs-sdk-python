### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.AdvancedNetworkingSecurity
name: AdvancedNetworkingSecurity
fullName: azure.mgmt.containerservice.models.AdvancedNetworkingSecurity
module: azure.mgmt.containerservice.models
summary: Security profile to enable security features on cilium based cluster.
constructor:
  syntax: 'AdvancedNetworkingSecurity(*args: Any, **kwargs: Any)'
variables:
- description: 'This feature allows user to configure network policy based on DNS
    (FQDN) names.

    It can be enabled only on cilium based clusters. If not specified, the default
    is false.'
  name: enabled
  types:
  - <xref:bool>
- description: 'Enable advanced network policies. This allows users to

    configure Layer 7 network policies (FQDN, HTTP, Kafka). Policies themselves must
    be configured

    via the Cilium Network Policy resources, see

    [https://docs.cilium.io/en/latest/security/policy/index.html](https://docs.cilium.io/en/latest/security/policy/index.html).
    This can be enabled only on

    cilium-based clusters. If not specified, the default value is FQDN if security.enabled
    is set

    to true. Known values are: "L7", "FQDN", and "None".'
  name: advanced_network_policies
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.AdvancedNetworkPolicies>
- description: 'Encryption configuration for Cilium-based clusters. Once enabled all

    traffic between Cilium managed pods will be encrypted when it leaves the node
    boundary.'
  name: transit_encryption
  types:
  - <xref:azure.mgmt.containerservice.models.AdvancedNetworkingSecurityTransitEncryption>
attributes:
- uid: azure.mgmt.containerservice.models.AdvancedNetworkingSecurity.advanced_network_policies
  name: advanced_network_policies
  summary: 'Enable advanced network policies. This allows users to configure Layer
    7 network policies

    (FQDN, HTTP, Kafka). Policies themselves must be configured via the Cilium Network
    Policy

    resources, see [https://docs.cilium.io/en/latest/security/policy/index.html](https://docs.cilium.io/en/latest/security/policy/index.html).
    This can be enabled only on

    cilium-based clusters. If not specified, the default value is FQDN if security.enabled
    is set

    to true. Known values are: "L7", "FQDN", and "None".'
  signature: 'advanced_network_policies: str | _models.AdvancedNetworkPolicies | None'
- uid: azure.mgmt.containerservice.models.AdvancedNetworkingSecurity.enabled
  name: enabled
  summary: 'This feature allows user to configure network policy based on DNS (FQDN)
    names. It can be

    enabled only on cilium based clusters. If not specified, the default is false.'
  signature: 'enabled: bool | None'
- uid: azure.mgmt.containerservice.models.AdvancedNetworkingSecurity.transit_encryption
  name: transit_encryption
  summary: 'Encryption configuration for Cilium-based clusters. Once enabled all traffic
    between Cilium

    managed pods will be encrypted when it leaves the node boundary.'
  signature: 'transit_encryption: _models.AdvancedNetworkingSecurityTransitEncryption
    | None'
