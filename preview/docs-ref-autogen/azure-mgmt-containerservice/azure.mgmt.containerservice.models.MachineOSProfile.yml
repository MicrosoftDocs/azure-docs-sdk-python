### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.MachineOSProfile
name: MachineOSProfile
fullName: azure.mgmt.containerservice.models.MachineOSProfile
module: azure.mgmt.containerservice.models
summary: The operating system and disk used by the machine.
constructor:
  syntax: 'MachineOSProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'The operating system type. The default is Linux. Known values are:
    "Linux" and

    "Windows".'
  name: os_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.OSType>
- description: 'Specifies the OS SKU used by the agent pool. If not specified, the
    default is

    Ubuntu if OSType=Linux or Windows2019 if OSType=Windows. And the default Windows
    OSSKU will be

    changed to Windows2022 after Windows2019 is deprecated. Known values are: "Ubuntu",

    "AzureLinux", "AzureLinux3", "Mariner", "Flatcar", "CBLMariner", "Windows2019",
    "Windows2022",

    "Ubuntu2204", "Windows2025", "WindowsAnnual", "Ubuntu2404", and "AzureContainerLinux".'
  name: os_sku
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.OSSKU>
- description: 'OS Disk Size in GB to be used to specify the disk size for every machine

    in the master/agent pool. If you specify 0, it will apply the default osDisk size
    according to

    the vmSize specified.'
  name: os_disk_size_gb
  types:
  - <xref:int>
- description: 'The OS disk type to be used for machines in the agent pool. The default
    is

    ''Ephemeral'' if the VM supports it and has a cache disk larger than the requested
    OSDiskSizeGB.

    Otherwise, defaults to ''Managed''. May not be changed after creation. For more
    information see

    [Ephemeral OS](https://docs.microsoft.com/azure/aks/cluster-configuration#ephemeral-os).

    Known values are: "Managed" and "Ephemeral".'
  name: os_disk_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.OSDiskType>
- description: Whether to use a FIPS-enabled OS.
  name: enable_fips
  types:
  - <xref:bool>
- description: The Linux machine's specific profile.
  name: linux_profile
  types:
  - <xref:azure.mgmt.containerservice.models.MachineOSProfileLinuxProfile>
- description: The Windows machine's specific profile.
  name: windows_profile
  types:
  - <xref:azure.mgmt.containerservice.models.AgentPoolWindowsProfile>
attributes:
- uid: azure.mgmt.containerservice.models.MachineOSProfile.enable_fips
  name: enable_fips
  summary: Whether to use a FIPS-enabled OS.
  signature: 'enable_fips: bool | None'
- uid: azure.mgmt.containerservice.models.MachineOSProfile.linux_profile
  name: linux_profile
  summary: The Linux machine's specific profile.
  signature: 'linux_profile: _models.MachineOSProfileLinuxProfile | None'
- uid: azure.mgmt.containerservice.models.MachineOSProfile.os_disk_size_gb
  name: os_disk_size_gb
  summary: 'OS Disk Size in GB to be used to specify the disk size for every machine
    in the master/agent

    pool. If you specify 0, it will apply the default osDisk size according to the
    vmSize

    specified.'
  signature: 'os_disk_size_gb: int | None'
- uid: azure.mgmt.containerservice.models.MachineOSProfile.os_disk_type
  name: os_disk_type
  summary: 'The OS disk type to be used for machines in the agent pool. The default
    is ''Ephemeral'' if the

    VM supports it and has a cache disk larger than the requested OSDiskSizeGB. Otherwise,
    defaults

    to ''Managed''. May not be changed after creation. For more information see [Ephemeral
    OS](https://docs.microsoft.com/azure/aks/cluster-configuration#ephemeral-os).
    Known values are:

    "Managed" and "Ephemeral".'
  signature: 'os_disk_type: str | _models.OSDiskType | None'
- uid: azure.mgmt.containerservice.models.MachineOSProfile.os_sku
  name: os_sku
  summary: 'Specifies the OS SKU used by the agent pool. If not specified, the default
    is Ubuntu if

    OSType=Linux or Windows2019 if OSType=Windows. And the default Windows OSSKU will
    be changed to

    Windows2022 after Windows2019 is deprecated. Known values are: "Ubuntu", "AzureLinux",

    "AzureLinux3", "Mariner", "Flatcar", "CBLMariner", "Windows2019", "Windows2022",

    "Ubuntu2204", "Windows2025", "WindowsAnnual", "Ubuntu2404", and

    "AzureContainerLinux".'
  signature: 'os_sku: str | _models.OSSKU | None'
- uid: azure.mgmt.containerservice.models.MachineOSProfile.os_type
  name: os_type
  summary: '"Linux" and "Windows".'
  signature: 'os_type: str | _models.OSType | None'
- uid: azure.mgmt.containerservice.models.MachineOSProfile.windows_profile
  name: windows_profile
  summary: The Windows machine's specific profile.
  signature: 'windows_profile: _models.AgentPoolWindowsProfile | None'
