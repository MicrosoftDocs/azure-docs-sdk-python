uid: azure.mgmt.containerservice.models.ManagedClusterControlPlaneScalingProfile
name: ManagedClusterControlPlaneScalingProfile
fullName: azure.mgmt.containerservice.models.ManagedClusterControlPlaneScalingProfile
module: azure.mgmt.containerservice.models
summary: 'Profile for providing scaled and performance guaranteed control plane capacity
  to deliver

  consistent performance under high workload. Requires Kubernetes version 1.33.0 or
  later.'
constructor:
  syntax: 'ManagedClusterControlPlaneScalingProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'The scaling size of the control plane. Scaling sizes offer guaranteed

    capacity and predictable Kubernetes performance beyond standard tier defaults.
    Higher H sizes

    provide increased performance guarantees. See [https://aka.ms/aks/hyperscale](https://aka.ms/aks/hyperscale)
    for performance metrics details for each size. Required.

    Known values are: "H2", "H4", and "H8".'
  name: scaling_size
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.ControlPlaneScalingSize>
