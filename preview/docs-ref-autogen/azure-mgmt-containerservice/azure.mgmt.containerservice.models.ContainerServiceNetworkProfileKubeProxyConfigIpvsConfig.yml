uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig
name: ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig
fullName: azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig
module: azure.mgmt.containerservice.models
summary: Holds configuration customizations for IPVS. May only be specified if 'mode'
  is set to 'IPVS'.
constructor:
  syntax: 'ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig(*args: Any, **kwargs:
    Any)'
variables:
- description: 'IPVS scheduler, for more information please see

    [http://www.linuxvirtualserver.org/docs/scheduling.html](http://www.linuxvirtualserver.org/docs/scheduling.html).
    Known values are: "RoundRobin" and

    "LeastConnection".'
  name: scheduler
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.IpvsScheduler>
- description: 'The timeout value used for idle IPVS TCP sessions in seconds. Must

    be a positive integer value.'
  name: tcp_timeout_seconds
  types:
  - <xref:int>
- description: 'The timeout value used for IPVS TCP sessions after receiving a

    FIN in seconds. Must be a positive integer value.'
  name: tcp_fin_timeout_seconds
  types:
  - <xref:int>
- description: 'The timeout value used for IPVS UDP packets in seconds. Must be a

    positive integer value.'
  name: udp_timeout_seconds
  types:
  - <xref:int>
