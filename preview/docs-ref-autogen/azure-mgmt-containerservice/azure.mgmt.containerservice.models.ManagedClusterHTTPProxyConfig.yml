uid: azure.mgmt.containerservice.models.ManagedClusterHTTPProxyConfig
name: ManagedClusterHTTPProxyConfig
fullName: azure.mgmt.containerservice.models.ManagedClusterHTTPProxyConfig
module: azure.mgmt.containerservice.models
summary: Cluster HTTP proxy configuration.
constructor:
  syntax: 'ManagedClusterHTTPProxyConfig(*args: Any, **kwargs: Any)'
variables:
- description: The HTTP proxy server endpoint to use.
  name: http_proxy
  types:
  - <xref:str>
- description: The HTTPS proxy server endpoint to use.
  name: https_proxy
  types:
  - <xref:str>
- description: The endpoints that should not go through proxy.
  name: no_proxy
  types:
  - <xref:list>[<xref:str>]
- description: 'A read-only list of all endpoints for which traffic should not be

    sent to the proxy. This list is a superset of noProxy and values injected by AKS.'
  name: effective_no_proxy
  types:
  - <xref:list>[<xref:str>]
- description: Alternative CA cert to use for connecting to proxy servers.
  name: trusted_ca
  types:
  - <xref:str>
- description: 'Whether to enable HTTP proxy. If disabled, the specified proxy configuration

    will be not be set on pods and nodes. If not specified, the default is true.'
  name: enabled
  types:
  - <xref:bool>
