### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.LocalDNSProfile
name: LocalDNSProfile
fullName: azure.mgmt.containerservice.models.LocalDNSProfile
module: azure.mgmt.containerservice.models
summary: 'Configures the per-node local DNS, with VnetDNS and KubeDNS overrides. LocalDNS
  helps improve

  performance and reliability of DNS resolution in an AKS cluster. For more details
  see

  aka.ms/aks/localdns.'
constructor:
  syntax: 'LocalDNSProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Mode of enablement for localDNS. Known values are: "Preferred", "Required",
    and

    "Disabled".'
  name: mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.LocalDNSMode>
- description: 'System-generated state of localDNS. Known values are: "Enabled" and
    "Disabled".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.LocalDNSState>
- description: 'VnetDNS overrides apply to DNS traffic from pods with

    dnsPolicy:default or kubelet (referred to as VnetDNS traffic).'
  name: vnet_dns_overrides
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.containerservice.models.LocalDNSOverride>]
- description: 'KubeDNS overrides apply to DNS traffic from pods with

    dnsPolicy:ClusterFirst (referred to as KubeDNS traffic).'
  name: kube_dns_overrides
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.containerservice.models.LocalDNSOverride>]
attributes:
- uid: azure.mgmt.containerservice.models.LocalDNSProfile.kube_dns_overrides
  name: kube_dns_overrides
  summary: 'ClusterFirst (referred to as

    KubeDNS traffic).'
  signature: 'kube_dns_overrides: dict[str, ''_models.LocalDNSOverride''] | None'
- uid: azure.mgmt.containerservice.models.LocalDNSProfile.mode
  name: mode
  summary: '"Preferred", "Required", and

    "Disabled".'
  signature: 'mode: str | _models.LocalDNSMode | None'
- uid: azure.mgmt.containerservice.models.LocalDNSProfile.state
  name: state
  summary: '"Enabled" and "Disabled".'
  signature: 'state: str | _models.LocalDNSState | None'
- uid: azure.mgmt.containerservice.models.LocalDNSProfile.vnet_dns_overrides
  name: vnet_dns_overrides
  summary: 'default or kubelet (referred to

    as VnetDNS traffic).'
  signature: 'vnet_dns_overrides: dict[str, ''_models.LocalDNSOverride''] | None'
