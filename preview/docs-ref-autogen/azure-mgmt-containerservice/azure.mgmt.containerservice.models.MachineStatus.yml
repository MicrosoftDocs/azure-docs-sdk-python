### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.MachineStatus
name: MachineStatus
fullName: azure.mgmt.containerservice.models.MachineStatus
module: azure.mgmt.containerservice.models
summary: Contains read-only information about the machine.
constructor:
  syntax: 'MachineStatus(*args: Any, **kwargs: Any)'
variables:
- description: 'The error details information of the machine. Preserves the detailed

    info of failure. If there was no error, this field is omitted.'
  name: provisioning_error
  types:
  - <xref:azure.mgmt.containerservice.models.ErrorDetail>
- description: Specifies the time at which the machine was created.
  name: creation_timestamp
  types:
  - <xref:datetime.datetime>
- description: 'The drift action of the machine. Indicates whether a machine has deviated

    from its expected state due to changes in managed cluster properties, requiring
    corrective

    action. Known values are: "Synced" and "Recreate".'
  name: drift_action
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.DriftAction>
- description: 'Reason for machine drift. Provides detailed information on why the
    machine

    has drifted. This field is omitted if the machine is up to date.'
  name: drift_reason
  types:
  - <xref:str>
- description: 'Virtual machine state. Indicates the current state of the underlying
    virtual

    machine. Known values are: "Running" and "Deleted".'
  name: vm_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.VmState>
attributes:
- uid: azure.mgmt.containerservice.models.MachineStatus.creation_timestamp
  name: creation_timestamp
  summary: Specifies the time at which the machine was created.
  signature: 'creation_timestamp: datetime | None'
- uid: azure.mgmt.containerservice.models.MachineStatus.drift_action
  name: drift_action
  summary: 'The drift action of the machine. Indicates whether a machine has deviated
    from its expected

    state due to changes in managed cluster properties, requiring corrective action.
    Known values

    are: "Synced" and "Recreate".'
  signature: 'drift_action: str | _models.DriftAction | None'
- uid: azure.mgmt.containerservice.models.MachineStatus.drift_reason
  name: drift_reason
  summary: 'Reason for machine drift. Provides detailed information on why the machine
    has drifted. This

    field is omitted if the machine is up to date.'
  signature: 'drift_reason: str | None'
- uid: azure.mgmt.containerservice.models.MachineStatus.provisioning_error
  name: provisioning_error
  summary: 'The error details information of the machine. Preserves the detailed info
    of failure. If there

    was no error, this field is omitted.'
  signature: 'provisioning_error: _models.ErrorDetail | None'
