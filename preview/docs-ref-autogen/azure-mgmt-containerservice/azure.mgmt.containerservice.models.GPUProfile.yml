### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.GPUProfile
name: GPUProfile
fullName: azure.mgmt.containerservice.models.GPUProfile
module: azure.mgmt.containerservice.models
summary: GPU settings for the Agent Pool.
constructor:
  syntax: 'GPUProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Whether to install GPU drivers. When it''s not specified, default
    is Install.

    Known values are: "Install" and "None".'
  name: driver
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.GPUDriver>
- description: 'Specify the type of GPU driver to install when creating Windows agent
    pools.

    If not provided, AKS selects the driver based on system compatibility. This cannot
    be changed

    once the AgentPool has been created. This cannot be set on Linux AgentPools. For
    Linux

    AgentPools, the driver is selected based on system compatibility. Known values
    are: "GRID" and

    "CUDA".'
  name: driver_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.DriverType>
- description: NVIDIA-specific GPU settings.
  name: nvidia
  types:
  - <xref:azure.mgmt.containerservice.models.NvidiaGPUProfile>
attributes:
- uid: azure.mgmt.containerservice.models.GPUProfile.driver
  name: driver
  summary: 'Whether to install GPU drivers. When it''s not specified, default is Install.
    Known values are:

    "Install" and "None".'
  signature: 'driver: str | _models.GPUDriver | None'
- uid: azure.mgmt.containerservice.models.GPUProfile.driver_type
  name: driver_type
  summary: 'Specify the type of GPU driver to install when creating Windows agent
    pools. If not provided,

    AKS selects the driver based on system compatibility. This cannot be changed once
    the AgentPool

    has been created. This cannot be set on Linux AgentPools. For Linux AgentPools,
    the driver is

    selected based on system compatibility. Known values are: "GRID" and "CUDA".'
  signature: 'driver_type: str | _models.DriverType | None'
- uid: azure.mgmt.containerservice.models.GPUProfile.nvidia
  name: nvidia
  summary: NVIDIA-specific GPU settings.
  signature: 'nvidia: _models.NvidiaGPUProfile | None'
