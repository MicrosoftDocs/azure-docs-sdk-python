- description: 'Specifications on how to auto-scale the VirtualMachines agent pool
    within a

    predefined size range. Each profile targets a specific VM SKU and is evaluated
    independently.

    Scaling decisions across profiles are governed by the cluster autoscaler expander,
    configurable

    via `ManagedCluster.properties.autoScalerProfile.expander`.'
  name: autoscale
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.AutoScaleProfile>]
