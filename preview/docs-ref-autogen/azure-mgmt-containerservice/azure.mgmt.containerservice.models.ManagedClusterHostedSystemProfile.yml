uid: azure.mgmt.containerservice.models.ManagedClusterHostedSystemProfile
name: ManagedClusterHostedSystemProfile
fullName: azure.mgmt.containerservice.models.ManagedClusterHostedSystemProfile
module: azure.mgmt.containerservice.models
summary: Settings for hosted system addons.
constructor:
  syntax: 'ManagedClusterHostedSystemProfile(*args: Any, **kwargs: Any)'
variables:
- description: Whether to enable hosted system addons for the cluster.
  name: enabled
  types:
  - <xref:bool>
- description: 'The ID of the subnet that will be joined by system nodes managed

    and hosted by AKS for running critical system addons. This ID must be provided
    together with

    `nodeSubnetID` and `apiserverAccessProfile.subnetId`, and all three subnet IDs
    must belong

    to the same VNet. If you don''t specify it, AKS will create a subnet in the managed
    resource

    group using a default /26 CIDR.'
  name: system_node_subnet_id
  types:
  - <xref:str>
- description: 'The ID of the subnet that will be joined by worker nodes managed by
    node

    auto provisioner for running workload pods in your tenant. This must be provided
    together with

    `systemNodeSubnetID` and `apiserverAccessProfile.subnetId`, and all three subnet
    IDs must

    be in the same VNet. If you don''t specify it, AKS will create a subnet in the
    managed resource

    group using a default /16 CIDR.'
  name: node_subnet_id
  types:
  - <xref:str>
attributes:
