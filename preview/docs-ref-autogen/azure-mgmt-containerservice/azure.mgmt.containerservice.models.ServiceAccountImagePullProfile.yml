### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.ServiceAccountImagePullProfile
name: ServiceAccountImagePullProfile
fullName: azure.mgmt.containerservice.models.ServiceAccountImagePullProfile
module: azure.mgmt.containerservice.models
summary: 'Profile for configuring image pull authentication to use service account
  scoped managed

  identities for authentication instead of node scoped managed identity (kubelet identity)
  for

  authentication to Azure Container Registry. For more information, refer to

  [https://aka.ms/aks/identity-binding/acr-image-pull/docs](https://aka.ms/aks/identity-binding/acr-image-pull/docs).'
constructor:
  syntax: 'ServiceAccountImagePullProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates whether service account based image pull is enabled, for
    which

    identity bindings are required for the managed identity to be used for authentication.
    For more

    information, refer to [https://aka.ms/aks/identity-binding-docs](https://aka.ms/aks/identity-binding-docs).'
  name: enabled
  types:
  - <xref:bool>
- description: 'Optional. The default managed identity resource ID used for

    image pulls at the cluster level. When configured, this identity is used if a
    Pod''s service

    account does not explicitly specify an identity for pulling images. If not configured
    and no

    identity is specified at service account level, image will be pulled via anonymous

    authentication.'
  name: default_managed_identity_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.containerservice.models.ServiceAccountImagePullProfile.default_managed_identity_id
  name: default_managed_identity_id
  summary: 'Optional. The default managed identity resource ID used for image pulls
    at the cluster level.

    When configured, this identity is used if a Pod''s service account does not explicitly
    specify

    an identity for pulling images. If not configured and no identity is specified
    at service

    account level, image will be pulled via anonymous authentication.'
  signature: 'default_managed_identity_id: str | None'
- uid: azure.mgmt.containerservice.models.ServiceAccountImagePullProfile.enabled
  name: enabled
  summary: 'Indicates whether service account based image pull is enabled, for which
    identity bindings are

    required for the managed identity to be used for authentication. For more information,
    refer to

    [https://aka.ms/aks/identity-binding-docs](https://aka.ms/aks/identity-binding-docs).'
  signature: 'enabled: bool | None'
