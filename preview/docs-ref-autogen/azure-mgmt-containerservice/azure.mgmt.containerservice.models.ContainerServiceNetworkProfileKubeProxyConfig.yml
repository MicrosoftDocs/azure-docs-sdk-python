### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfig
name: ContainerServiceNetworkProfileKubeProxyConfig
fullName: azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfig
module: azure.mgmt.containerservice.models
summary: 'Holds configuration customizations for kube-proxy. Any values not defined
  will use the

  kube-proxy defaulting behavior. See >>`<<[https://v](https://v)

  <[https://v](https://v)>`_<version>.docs.kubernetes.io/docs/reference/command-line-tools-reference/kube-proxy/

  where <version> is represented by a <major version>-<minor version> string. Kubernetes
  version

  1.23 would be ''1-23''.'
constructor:
  syntax: 'ContainerServiceNetworkProfileKubeProxyConfig(*args: Any, **kwargs: Any)'
variables:
- description: 'Whether to enable on kube-proxy on the cluster (if no ''kubeProxyConfig''
    exists,

    kube-proxy is enabled in AKS by default without these customizations).'
  name: enabled
  types:
  - <xref:bool>
- description: 'Specify which proxy mode to use (''IPTABLES'', ''IPVS'' or ''NFTABLES'').
    Known values

    are: "IPTABLES", "IPVS", and "NFTABLES".'
  name: mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.Mode>
- description: 'Holds configuration customizations for IPVS. May only be specified
    if ''mode''

    is set to ''IPVS''.'
  name: ipvs_config
  types:
  - <xref:azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig>
attributes:
- uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfig.enabled
  name: enabled
  summary: 'Whether to enable on kube-proxy on the cluster (if no ''kubeProxyConfig''
    exists, kube-proxy is

    enabled in AKS by default without these customizations).'
  signature: 'enabled: bool | None'
- uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfig.ipvs_config
  name: ipvs_config
  summary: Holds configuration customizations for IPVS. May only be specified if 'mode'
    is set to 'IPVS'.
  signature: 'ipvs_config: _models.ContainerServiceNetworkProfileKubeProxyConfigIpvsConfig
    | None'
- uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfileKubeProxyConfig.mode
  name: mode
  summary: 'Specify which proxy mode to use (''IPTABLES'', ''IPVS'' or ''NFTABLES'').
    Known values are:

    "IPTABLES", "IPVS", and "NFTABLES".'
  signature: 'mode: str | _models.Mode | None'
