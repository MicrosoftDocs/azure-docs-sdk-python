uid: azure.mgmt.containerservice.models.ManagedClusterWindowsProfile
name: ManagedClusterWindowsProfile
fullName: azure.mgmt.containerservice.models.ManagedClusterWindowsProfile
module: azure.mgmt.containerservice.models
summary: Profile for Windows VMs in the managed cluster.
constructor:
  syntax: 'ManagedClusterWindowsProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the name of the administrator account. <br><br>

    **Restriction:** Cannot end in "." <br><br> **Disallowed values:** "administrator",
    "admin",

    "user", "user1", "test", "user2", "test1", "user3", "admin1", "1", "123", "a",
    "actuser",

    "adm", "admin2", "aspnet", "backup", "console", "david", "guest", "john", "owner",
    "root",

    "server", "sql", "support", "support_388945a0", "sys", "test2", "test3", "user4",
    "user5".

    <br><br> **Minimum-length:** 1 character <br><br> **Max-length:** 20 characters.
    Required.'
  name: admin_username
  types:
  - <xref:str>
- description: 'Specifies the password of the administrator account. <br><br>

    **Minimum-length:** 8 characters <br><br> **Max-length:** 123 characters <br><br>
    **Complexity

    requirements:** 3 out of 4 conditions below need to be fulfilled <br> Has lower
    characters

    <br>Has upper characters <br> Has a digit <br> Has a special character (Regex
    match [W_])

    <br><br> **Disallowed values:** "<xref:mailto:abc@123>", "<xref:mailto:P@$$w0rd>",
    "<xref:mailto:P@ssw0rd>", "<xref:mailto:P@ssword123>", "Pa$$word",

    "<xref:mailto:pass@word1>", "Password!", "Password1", "Password22", "iloveyou!".'
  name: admin_password
  types:
  - <xref:str>
- description: 'The license type to use for Windows VMs. See [Azure Hybrid User Benefits](https://azure.microsoft.com/pricing/hybrid-benefit/faq/)
    for more details. Known values are:

    "None" and "Windows_Server".'
  name: license_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.LicenseType>
- description: 'Whether to enable CSI proxy. For more details on CSI proxy, see the

    [CSI proxy GitHub repo](https://github.com/kubernetes-csi/csi-proxy).'
  name: enable_csi_proxy
  types:
  - <xref:bool>
- description: The Windows gMSA Profile in the Managed Cluster.
  name: gmsa_profile
  types:
  - <xref:azure.mgmt.containerservice.models.WindowsGmsaProfile>
