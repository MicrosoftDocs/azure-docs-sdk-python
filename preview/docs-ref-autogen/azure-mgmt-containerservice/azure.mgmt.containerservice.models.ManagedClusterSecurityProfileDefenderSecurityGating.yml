    container images and audit or block the deployment of images that do not meet
    security

    standards according to the configured security rules.'
  signature: 'enabled: bool | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterSecurityProfileDefenderSecurityGating.identities
  name: identities
  summary: 'List of identities that the admission controller will make use of in order
    to pull security

    artifacts from the registry. These are the same identities used by the cluster
