    to grant the Defender gating agent access to the cluster''s secrets for pulling
    images from

    registries. If secret access is denied and the registry requires pull secrets,
    the add-on will

    not perform any image validation. Default value is false.'
  signature: 'allow_secret_access: bool | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterSecurityProfileDefenderSecurityGating.enabled
  name: enabled
  summary: 'Whether to enable Defender security gating. When enabled, the gating feature
