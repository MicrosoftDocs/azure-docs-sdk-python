variables:
- description: 'Application Monitoring auto-instrumentation for AKS. Deploys a

    webhook that auto-instruments workloads with Microsoft OpenTelemetry Distros to
    collect

    OpenTelemetry metrics, logs, and traces. See [https://aka.ms/AKSAppMonitoringDocs](https://aka.ms/AKSAppMonitoringDocs)
    and [https://aka.ms/AzureMonitorApplicationMonitoring](https://aka.ms/AzureMonitorApplicationMonitoring)
    for an overview.'
  name: auto_instrumentation
  types:
  - <xref:azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileAppMonitoringAutoInstrumentation>
- description: 'Application Monitoring Open Telemetry Metrics Profile for AKS.

    Collects OpenTelemetry metrics of the application using Azure Monitor OpenTelemetry
    based SDKs.

    See [https://aka.ms/AKSAppMonitoringDocs](https://aka.ms/AKSAppMonitoringDocs)
    and

    [https://aka.ms/AzureMonitorApplicationMonitoring](https://aka.ms/AzureMonitorApplicationMonitoring)
    for an overview.'
  name: open_telemetry_metrics
  types:
  - <xref:azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileAppMonitoringOpenTelemetryMetrics>
- description: 'Application Monitoring Open Telemetry Logs and Traces

