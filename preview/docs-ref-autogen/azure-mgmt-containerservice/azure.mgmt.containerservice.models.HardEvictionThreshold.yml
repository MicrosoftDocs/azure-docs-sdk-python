### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.HardEvictionThreshold
name: HardEvictionThreshold
fullName: azure.mgmt.containerservice.models.HardEvictionThreshold
module: azure.mgmt.containerservice.models
summary: 'Hard eviction thresholds for kubelet. These thresholds trigger pod eviction
  when node resources

  drop below the specified values. Values must be greater than or equal to the documented

  minimums for each signal. Supported formats are Ki, Mi, Gi, or percentages using
  %.'
constructor:
  syntax: 'HardEvictionThreshold(*args: Any, **kwargs: Any)'
variables:
- description: 'The threshold for available memory below which pod eviction is

    triggered. Accepts absolute values (e.g. ''500Mi'') or percentage values (e.g.
    ''5%''). Absolute

    values must be greater than or equal to 100Mi. Percentage values must be greater
    than or equal

    to 2%.'
  name: memory_available
  types:
  - <xref:str>
- description: 'The threshold for available node filesystem space below which pod

    eviction is triggered. Accepts absolute values (e.g. ''1Gi'') or percentage values
    (e.g. ''10%'').

    Must be greater than or equal to the system default of 10%.'
  name: node_fs_available
  types:
  - <xref:str>
- description: 'The threshold for available inodes on the node filesystem below

    which pod eviction is triggered. Accepts absolute inode counts (e.g. ''100000'')
    or percentage

    values (e.g. ''5%''). Percentage values must be greater than or equal to the system
    default of

    5%.'
  name: node_fs_inodes_free
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.containerservice.models.HardEvictionThreshold.memory_available
  name: memory_available
  summary: 'The threshold for available memory below which pod eviction is triggered.
    Accepts absolute

    values (e.g. ''500Mi'') or percentage values (e.g. ''5%''). Absolute values must
    be greater than or

    equal to 100Mi. Percentage values must be greater than or equal to 2%.'
  signature: 'memory_available: str | None'
- uid: azure.mgmt.containerservice.models.HardEvictionThreshold.node_fs_available
  name: node_fs_available
  summary: 'The threshold for available node filesystem space below which pod eviction
    is triggered.

    Accepts absolute values (e.g. ''1Gi'') or percentage values (e.g. ''10%''). Must
    be greater than or

    equal to the system default of 10%.'
  signature: 'node_fs_available: str | None'
- uid: azure.mgmt.containerservice.models.HardEvictionThreshold.node_fs_inodes_free
  name: node_fs_inodes_free
  summary: 'The threshold for available inodes on the node filesystem below which
    pod eviction is

    triggered. Accepts absolute inode counts (e.g. ''100000'') or percentage values
    (e.g. ''5%'').

    Percentage values must be greater than or equal to the system default of 5%.'
  signature: 'node_fs_inodes_free: str | None'
