  signature: 'node_public_ip_prefix_id: str | None'
- uid: azure.mgmt.containerservice.models.MachineNetworkProperties.node_public_ip_tags
  name: node_public_ip_tags
  summary: IPTags of instance-level public IPs.
  signature: 'node_public_ip_tags: list[''_models.IPTag''] | None'
