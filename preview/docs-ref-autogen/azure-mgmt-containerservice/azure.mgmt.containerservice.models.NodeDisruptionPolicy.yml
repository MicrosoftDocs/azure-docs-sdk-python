### YamlMime:PythonEnum
uid: azure.mgmt.containerservice.models.NodeDisruptionPolicy
name: NodeDisruptionPolicy
fullName: azure.mgmt.containerservice.models.NodeDisruptionPolicy
summary: 'The policy configuration for when to allow certain operations which require
  node re-image and

  trigger redeployment. For example, some operations, such as updating the

  .properties.ManagedClusterSecurityProfile.customCATrustCertificates field on an
  existing

  managed cluster, trigger rolling updates of the nodes. This setting allows control
  over when

  such updates are accepted. The default is ''Allow''. For a full list of covered
  operations see

  aka.ms/aks/nodedisruptionpolicy".'
module: azure.mgmt.containerservice.models
fields:
- name: ALLOW
  uid: azure.mgmt.containerservice.models.NodeDisruptionPolicy.ALLOW
- name: ALLOW_DURING_MAINTENANCE_WINDOW
  uid: azure.mgmt.containerservice.models.NodeDisruptionPolicy.ALLOW_DURING_MAINTENANCE_WINDOW
- name: BLOCK
  uid: azure.mgmt.containerservice.models.NodeDisruptionPolicy.BLOCK
