    the given pool will always be added to this load balancer. This agent pool must
    have at least

    one node and minCount>=1 for autoscaling operations. An agent pool can only be
    the primary pool

    for a single load balancer. Required.'
  signature: 'primary_agent_pool_name: str'
- uid: azure.mgmt.containerservice.models.LoadBalancerProperties.provisioning_state
  name: provisioning_state
  summary: The current provisioning state.
  signature: 'provisioning_state: str | None'
