  name: allow_service_placement
  summary: 'Whether to automatically place services on the load balancer. If not supplied,
    the default

    value is true. If set to false manually, both of the external and the internal
    load balancer

    will not be selected for services unless they explicitly target it.'
  signature: 'allow_service_placement: bool | None'
- uid: azure.mgmt.containerservice.models.LoadBalancerProperties.node_selector
  name: node_selector
  summary: Nodes that match this selector will be possible members of this load balancer.
  signature: 'node_selector: _models.LabelSelector | None'
- uid: azure.mgmt.containerservice.models.LoadBalancerProperties.primary_agent_pool_name
  name: primary_agent_pool_name
  summary: 'Required field. A string value that must specify the ID of an existing
