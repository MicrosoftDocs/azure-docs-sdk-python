uid: azure.mgmt.containerservice.models.NodeDisruptionProfile
name: NodeDisruptionProfile
fullName: azure.mgmt.containerservice.models.NodeDisruptionProfile
module: azure.mgmt.containerservice.models
summary: Node disruption profile for a managed cluster.
constructor:
  syntax: 'NodeDisruptionProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'The policy configuration for when to allow certain operations

    which require node re-image and trigger redeployment. For example, some operations,
    such as

    updating the .properties.ManagedClusterSecurityProfile.customCATrustCertificates
    field on an

    existing managed cluster, trigger rolling updates of the nodes. This setting allows
    control

    over when such updates are accepted. The default is ''Allow''. For a full list
    of covered

    operations see aka.ms/aks/nodedisruptionpolicy". Known values are: "Allow",

    "AllowDuringMaintenanceWindow", and "Block".'
  name: node_disruption_policy
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.NodeDisruptionPolicy>
