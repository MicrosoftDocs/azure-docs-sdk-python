### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.AgentPoolNetworkInterface
name: AgentPoolNetworkInterface
fullName: azure.mgmt.containerservice.models.AgentPoolNetworkInterface
module: azure.mgmt.containerservice.models
summary: 'Configuration of a secondary network interface provisioned on each VM instance
  in the agent

  pool. For more information, see [https://aka.ms/aks/multi-nic](https://aka.ms/aks/multi-nic).'
constructor:
  syntax: 'AgentPoolNetworkInterface(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of NIC to be provisioned on the VM. Known values are: "Standard"
    and

    "Dynamic".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.AgentPoolNetworkInterfaceType>
- description: 'The resource ID of the subnet which will be attached to the secondary

    network interface. Required when `type` is `Standard`; must be an empty string
    (`""`) or

    omitted when `type` is `Dynamic`.'
  name: vnet_subnet_id
  types:
  - <xref:str>
- description: 'Whether accelerated networking is enabled on this

    secondary NIC. If omitted, this defaults to true only when the agent pool VM SKU
    supports

    accelerated networking. Validation will fail if it is enabled on an unsupported
    SKU or NIC

    configuration.'
  name: enable_accelerated_networking
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.containerservice.models.AgentPoolNetworkInterface.enable_accelerated_networking
  name: enable_accelerated_networking
  summary: 'Whether accelerated networking is enabled on this secondary NIC. If omitted,
    this defaults to

    true only when the agent pool VM SKU supports accelerated networking. Validation
    will fail if

    it is enabled on an unsupported SKU or NIC configuration.'
  signature: 'enable_accelerated_networking: bool | None'
- uid: azure.mgmt.containerservice.models.AgentPoolNetworkInterface.type
  name: type
  summary: '"Standard" and "Dynamic".'
  signature: 'type: str | _models.AgentPoolNetworkInterfaceType | None'
- uid: azure.mgmt.containerservice.models.AgentPoolNetworkInterface.vnet_subnet_id
  name: vnet_subnet_id
  summary: 'The resource ID of the subnet which will be attached to the secondary
    network interface.

    Required when `type` is `Standard`; must be an empty string (`""`) or omitted
    when

    `type` is `Dynamic`.'
  signature: 'vnet_subnet_id: str | None'
