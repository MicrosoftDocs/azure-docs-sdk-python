variables:
- description: Whether the pod identity addon is enabled.
  name: enabled
  types:
  - <xref:bool>
- description: 'Whether pod identity is allowed to run on clusters with

    Kubenet networking. Running in Kubenet is disabled by default due to the security
    related

    nature of AAD Pod Identity and the risks of IP spoofing. See [using Kubenet network
    plugin with

    AAD Pod Identity](https://docs.microsoft.com/azure/aks/use-azure-ad-pod-identity#using-kubenet-network-plugin-with-azure-active-directory-pod-managed-identities)

    for more information.'
  name: allow_network_plugin_kubenet
  types:
  - <xref:bool>
- description: The pod identities to use in the cluster.
  name: user_assigned_identities
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.ManagedClusterPodIdentity>]
- description: The pod identity exceptions to allow.
  name: user_assigned_identity_exceptions
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.ManagedClusterPodIdentityException>]
