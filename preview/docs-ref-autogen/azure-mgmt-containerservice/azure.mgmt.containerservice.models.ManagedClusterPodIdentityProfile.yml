name: ManagedClusterPodIdentityProfile
fullName: azure.mgmt.containerservice.models.ManagedClusterPodIdentityProfile
module: azure.mgmt.containerservice.models
summary: 'The pod identity profile of the Managed Cluster. See [use AAD pod identity](https://docs.microsoft.com/azure/aks/use-azure-ad-pod-identity)
  for more details on pod

  identity integration.'
