### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.MachineKubernetesProfile
name: MachineKubernetesProfile
fullName: azure.mgmt.containerservice.models.MachineKubernetesProfile
module: azure.mgmt.containerservice.models
summary: The Kubernetes configurations used by the machine.
constructor:
  syntax: 'MachineKubernetesProfile(*args: Any, **kwargs: Any)'
variables:
- description: The node labels on the machine.
  name: node_labels
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'The version of Kubernetes specified by the user. Both patch version

    <major.minor.patch> and <major.minor> are supported. When <major.minor> is specified,
    the

    latest supported patch version is chosen automatically.'
  name: orchestrator_version
  types:
  - <xref:str>
- description: 'The version of Kubernetes running on the machine. If

    orchestratorVersion was a fully specified version <major.minor.patch>, this field
    will be

    exactly equal to it. If orchestratorVersion was <major.minor>, this field will
    contain the full

    <major.minor.patch> version being used.'
  name: current_orchestrator_version
  types:
  - <xref:str>
- description: 'Determines the placement of emptyDir volumes, container runtime data

    root, and Kubelet ephemeral storage. Known values are: "OS" and "Temporary".'
  name: kubelet_disk_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.KubeletDiskType>
- description: The Kubelet configuration on the machine.
  name: kubelet_config
  types:
  - <xref:azure.mgmt.containerservice.models.KubeletConfig>
- description: 'Taints added on the node during creation that will not be

    reconciled by AKS. These taints will not be reconciled by AKS and can be removed
    with a kubectl

    call. These taints allow for required configuration to run before the node is
    ready to accept

    workloads, for example ''key1=value1:NoSchedule'' that then can be removed with
    `kubectl taint

    nodes node1 key1=value1:NoSchedule-`.'
  name: node_initialization_taints
  types:
  - <xref:list>[<xref:str>]
- description: 'The taints added to new node during machine create. For example,

    key=value:NoSchedule.'
  name: node_taints
  types:
  - <xref:list>[<xref:str>]
- description: The maximum number of pods that can run on a node.
  name: max_pods
  types:
  - <xref:int>
- description: The node name in the Kubernetes cluster.
  name: node_name
  types:
  - <xref:str>
- description: 'Determines the type of workload a node can run. Known values are:

    "OCIContainer", "WasmWasi", "KataMshvVmIsolation", and "KataVmIsolation".'
  name: workload_runtime
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.WorkloadRuntime>
- description: Configuration for using artifact streaming on AKS.
  name: artifact_streaming_profile
  types:
  - <xref:azure.mgmt.containerservice.models.AgentPoolArtifactStreamingProfile>
attributes:
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.artifact_streaming_profile
  name: artifact_streaming_profile
  summary: Configuration for using artifact streaming on AKS.
  signature: 'artifact_streaming_profile: _models.AgentPoolArtifactStreamingProfile
    | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.current_orchestrator_version
  name: current_orchestrator_version
  summary: 'The version of Kubernetes running on the machine. If orchestratorVersion
    was a fully specified

    version <major.minor.patch>, this field will be exactly equal to it. If orchestratorVersion
    was

    <major.minor>, this field will contain the full <major.minor.patch> version being
    used.'
  signature: 'current_orchestrator_version: str | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.kubelet_config
  name: kubelet_config
  summary: The Kubelet configuration on the machine.
  signature: 'kubelet_config: _models.KubeletConfig | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.kubelet_disk_type
  name: kubelet_disk_type
  summary: 'Determines the placement of emptyDir volumes, container runtime data root,
    and Kubelet

    ephemeral storage. Known values are: "OS" and "Temporary".'
  signature: 'kubelet_disk_type: str | _models.KubeletDiskType | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.max_pods
  name: max_pods
  summary: The maximum number of pods that can run on a node.
  signature: 'max_pods: int | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.node_initialization_taints
  name: node_initialization_taints
  summary: 'Taints added on the node during creation that will not be reconciled by
    AKS. These taints will

    not be reconciled by AKS and can be removed with a kubectl call. These taints
    allow for

    required configuration to run before the node is ready to accept workloads, for
    example

    ''key1=value1:NoSchedule'' that then can be removed with `kubectl taint nodes
    node1

    key1=value1:NoSchedule-`.'
  signature: 'node_initialization_taints: list[str] | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.node_labels
  name: node_labels
  summary: The node labels on the machine.
  signature: 'node_labels: dict[str, str] | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.node_name
  name: node_name
  summary: The node name in the Kubernetes cluster.
  signature: 'node_name: str | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.node_taints
  name: node_taints
  summary: NoSchedule.
  signature: 'node_taints: list[str] | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.orchestrator_version
  name: orchestrator_version
  summary: 'The version of Kubernetes specified by the user. Both patch version <major.minor.patch>
    and

    <major.minor> are supported. When <major.minor> is specified, the latest supported
    patch

    version is chosen automatically.'
  signature: 'orchestrator_version: str | None'
- uid: azure.mgmt.containerservice.models.MachineKubernetesProfile.workload_runtime
  name: workload_runtime
  summary: '"OCIContainer",

    "WasmWasi", "KataMshvVmIsolation", and "KataVmIsolation".'
  signature: 'workload_runtime: str | _models.WorkloadRuntime | None'
