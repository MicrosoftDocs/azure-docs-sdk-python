variables:
- description: 'The current provisioning state of the Mesh Membership. Known values

    are: "Canceled", "Creating", "Deleting", "Failed", "Succeeded", and "Updating".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.MeshMembershipProvisioningState>
- description: 'Profile for configuring private connectivity between the mesh

    control plane and member clusters. When configured, communication between the
    mesh control

    plane and this member cluster occurs over private network instead of public networks.
    Visit

    [https://aka.ms/applink](https://aka.ms/applink) for more information.'
  name: private_connect_profile
  types:
  - <xref:azure.mgmt.containerservice.models.MeshMembershipPrivateConnectProfile>
- description: 'The ARM resource id for the managed mesh member. This is of the form:

    ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.AppLink/applinks/{appLinkName}/appLinkMembers/{appLinkMemberName}''.

    Visit [https://aka.ms/applink](https://aka.ms/applink) for more information. Required.'
  name: managed_mesh_id
  types:
  - <xref:str>
