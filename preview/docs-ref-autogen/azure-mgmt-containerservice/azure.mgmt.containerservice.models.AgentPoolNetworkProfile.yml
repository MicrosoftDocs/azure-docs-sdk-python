### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.AgentPoolNetworkProfile
name: AgentPoolNetworkProfile
fullName: azure.mgmt.containerservice.models.AgentPoolNetworkProfile
module: azure.mgmt.containerservice.models
summary: Network settings of an agent pool.
constructor:
  syntax: 'AgentPoolNetworkProfile(*args: Any, **kwargs: Any)'
variables:
- description: IPTags of instance-level public IPs.
  name: node_public_ip_tags
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.IPTag>]
- description: 'The resource IDs of public IP prefixes for node public IPs.

    At most one IPv4 and one IPv6 prefix may be specified. Order does not matter;
    the RP determines

    IP version from the referenced resource''s publicIPAddressVersion. Requires enableNodePublicIP

    to be true on the agent pool. Mutually exclusive with the top-level nodePublicIPPrefixID

    property. Immutable after node pool creation. To change prefixes, delete and recreate
    the node

    pool. For more information, see [https://aka.ms/aks/ipv6-ilpip](https://aka.ms/aks/ipv6-ilpip).'
  name: node_public_ip_prefix_i_ds
  types:
  - <xref:list>[<xref:str>]
- description: 'The port ranges that are allowed to access. The specified ranges are

    allowed to overlap.'
  name: allowed_host_ports
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.PortRange>]
- description: 'The IDs of the application security groups which agent pool

    will associate when created.'
  name: application_security_groups
  types:
  - <xref:list>[<xref:str>]
- description: 'Secondary network interface configurations for each VM in

    the agent pool. Each entry is a template: one physical NIC per entry is provisioned
    on every VM

    instance. These interfaces are created at agent pool creation time and are immutable.
    The

    length of the list must be less than the NIC capacity minus 1 for the VM size
    of the agent pool

    (AKS manages the primary NIC). For example, a Standard_D8a_v4 VM supports up to
    4 NICs, so the

    maximum number of secondary interfaces allowed is 3. For mixed-SKU VM pools the
    effective

    capacity is the minimum across all SKUs: count(secondaryNetworkInterfaces) + 1
    <= min(maxNICs).

    For more information, see [https://aka.ms/aks/multi-nic](https://aka.ms/aks/multi-nic).'
  name: secondary_network_interfaces
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.AgentPoolNetworkInterface>]
