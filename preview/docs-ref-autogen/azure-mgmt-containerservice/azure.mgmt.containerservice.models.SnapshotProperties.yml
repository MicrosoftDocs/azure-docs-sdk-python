### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.SnapshotProperties
name: SnapshotProperties
fullName: azure.mgmt.containerservice.models.SnapshotProperties
module: azure.mgmt.containerservice.models
summary: Properties used to configure a node pool snapshot.
constructor:
  syntax: 'SnapshotProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'CreationData to be used to specify the source agent pool resource
    ID to

    create this snapshot.'
  name: creation_data
  types:
  - <xref:azure.mgmt.containerservice.models.CreationData>
- description: 'The type of a snapshot. The default is NodePool. Known values are:

    "NodePool" and "ManagedCluster".'
  name: snapshot_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.SnapshotType>
- description: The version of Kubernetes.
  name: kubernetes_version
  types:
  - <xref:str>
- description: The version of node image.
  name: node_image_version
  types:
  - <xref:str>
- description: 'The operating system type. The default is Linux. Known values are:
    "Linux" and

    "Windows".'
  name: os_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.OSType>
- description: 'Specifies the OS SKU used by the agent pool. The default is Ubuntu
    if OSType is

    Linux. The default is Windows2019 when Kubernetes <= 1.24 or Windows2022 when
    Kubernetes >=

    1.25 if OSType is Windows. Known values are: "Ubuntu", "AzureLinux", "AzureLinux3",
    "Mariner",

    "Flatcar", "CBLMariner", "Windows2019", "Windows2022", "Ubuntu2204", "Windows2025",

    "WindowsAnnual", "Ubuntu2404", and "AzureContainerLinux".'
  name: os_sku
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.OSSKU>
- description: The size of the VM.
  name: vm_size
  types:
  - <xref:str>
- description: Whether to use a FIPS-enabled OS.
  name: enable_fips
  types:
  - <xref:bool>
