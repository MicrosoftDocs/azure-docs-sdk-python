### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights
name: ManagedClusterAzureMonitorProfileContainerInsights
fullName: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights
module: azure.mgmt.containerservice.models
summary: 'Azure Monitor Container Insights Profile for Kubernetes Events, Inventory
  and Container stdout

  & stderr logs etc. See aka.ms/AzureMonitorContainerInsights for an overview.'
constructor:
  syntax: 'ManagedClusterAzureMonitorProfileContainerInsights(*args: Any, **kwargs:
    Any)'
variables:
- description: Indicates if Azure Monitor Container Insights Logs Addon is enabled
    or not.
  name: enabled
  types:
  - <xref:bool>
- description: 'Fully Qualified ARM Resource Id of Azure Log

    Analytics Workspace for storing Azure Monitor Container Insights Logs.'
  name: log_analytics_workspace_resource_id
  types:
  - <xref:str>
- description: The syslog host port. If not specified, the default port is 28330.
  name: syslog_port
  types:
  - <xref:int>
- description: 'Indicates whether custom metrics collection has to be disabled or

    not. If not specified the default is false. No custom metrics will be emitted
    if this field is

    false but the container insights enabled field is false.'
  name: disable_custom_metrics
  types:
  - <xref:bool>
- description: 'Indicates whether prometheus metrics scraping is

    disabled or not. If not specified the default is false. No prometheus metrics
    will be emitted

    if this field is false but the container insights enabled field is false.'
  name: disable_prometheus_metrics_scraping
  types:
  - <xref:bool>
- description: 'Configures container network logs ingestion with Azure Monitor.

    Which network logs to ingest is controlled by the CRD found in the following links.
    No network

    logs are ingested by default. More information on container network logs can be
    found at

    [https://aka.ms/ContainerNetworkLogsDoc](https://aka.ms/ContainerNetworkLogsDoc).
    More

    information on configuring container network log can be found at

    [https://aka.ms/acns/howtoenablecnl](https://aka.ms/acns/howtoenablecnl). If not
    specified,

    the default is Disabled. Known values are: "Disabled" and "Enabled".'
  name: container_network_logs
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.ContainerNetworkLogs>
attributes:
- uid: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights.container_network_logs
  name: container_network_logs
  summary: 'Configures container network logs ingestion with Azure Monitor. Which
    network logs to ingest is

    controlled by the CRD found in the following links. No network logs are ingested
    by default.

    More information on container network logs can be found at

    [https://aka.ms/ContainerNetworkLogsDoc](https://aka.ms/ContainerNetworkLogsDoc).
    More

    information on configuring container network log can be found at

    [https://aka.ms/acns/howtoenablecnl](https://aka.ms/acns/howtoenablecnl). If not
    specified,

    the default is Disabled. Known values are: "Disabled" and "Enabled".'
  signature: 'container_network_logs: str | _models.ContainerNetworkLogs | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights.disable_custom_metrics
  name: disable_custom_metrics
  summary: 'Indicates whether custom metrics collection has to be disabled or not.
    If not specified the

    default is false. No custom metrics will be emitted if this field is false but
    the container

    insights enabled field is false.'
  signature: 'disable_custom_metrics: bool | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights.disable_prometheus_metrics_scraping
  name: disable_prometheus_metrics_scraping
  summary: 'Indicates whether prometheus metrics scraping is disabled or not. If not
    specified the default

    is false. No prometheus metrics will be emitted if this field is false but the
    container

    insights enabled field is false.'
  signature: 'disable_prometheus_metrics_scraping: bool | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights.enabled
  name: enabled
  summary: Indicates if Azure Monitor Container Insights Logs Addon is enabled or
    not.
  signature: 'enabled: bool | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights.log_analytics_workspace_resource_id
  name: log_analytics_workspace_resource_id
  summary: 'Fully Qualified ARM Resource Id of Azure Log Analytics Workspace for storing
    Azure Monitor

    Container Insights Logs.'
  signature: 'log_analytics_workspace_resource_id: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights.syslog_port
  name: syslog_port
  summary: The syslog host port. If not specified, the default port is 28330.
  signature: 'syslog_port: int | None'
