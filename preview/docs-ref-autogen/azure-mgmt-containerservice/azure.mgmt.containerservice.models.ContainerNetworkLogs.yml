uid: azure.mgmt.containerservice.models.ContainerNetworkLogs
name: ContainerNetworkLogs
fullName: azure.mgmt.containerservice.models.ContainerNetworkLogs
summary: 'Configures container network logs ingestion with Azure Monitor. Which network
  logs to ingest is

  controlled by the CRD found in the following links. No network logs are ingested
  by default.

  More information on container network logs can be found at

  [https://aka.ms/ContainerNetworkLogsDoc](https://aka.ms/ContainerNetworkLogsDoc).
  More

  information on configuring container network log can be found at

  [https://aka.ms/acns/howtoenablecnl](https://aka.ms/acns/howtoenablecnl). If not
  specified,

  the default is Disabled.'
module: azure.mgmt.containerservice.models
fields:
