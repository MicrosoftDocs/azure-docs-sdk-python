uid: azure.mgmt.containerservice.models.JWTAuthenticatorProperties
name: JWTAuthenticatorProperties
fullName: azure.mgmt.containerservice.models.JWTAuthenticatorProperties
module: azure.mgmt.containerservice.models
summary: 'The properties of JWTAuthenticator. For details on how to configure the
  properties of a JWT

  authenticator, please refer to the Kubernetes documentation:

  [https://kubernetes.io/docs/reference/access-authn-authz/authentication/#using-authentication-configuration](https://kubernetes.io/docs/reference/access-authn-authz/authentication/#using-authentication-configuration).

  Please note that not all fields available in the Kubernetes documentation are supported
  by AKS.

  For troubleshooting, please see [https://aka.ms/aks-external-issuers-docs](https://aka.ms/aks-external-issuers-docs).'
constructor:
  syntax: 'JWTAuthenticatorProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The current provisioning state of the JWT authenticator. Known values

    are: "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.JWTAuthenticatorProvisioningState>
- description: The JWT OIDC issuer details. Required.
  name: issuer
  types:
  - <xref:azure.mgmt.containerservice.models.JWTAuthenticatorIssuer>
- description: 'The rules that are applied to validate token claims to

    authenticate users. All the expressions must evaluate to true for validation to
    succeed.'
  name: claim_validation_rules
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.JWTAuthenticatorValidationRule>]
- description: 'The mappings that define how user attributes are extracted from the
    token

    claims. Required.'
  name: claim_mappings
  types:
  - <xref:azure.mgmt.containerservice.models.JWTAuthenticatorClaimMappings>
- description: 'The rules that are applied to the mapped user before completing

    authentication. All the expressions must evaluate to true for validation to succeed.'
  name: user_validation_rules
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.JWTAuthenticatorValidationRule>]
