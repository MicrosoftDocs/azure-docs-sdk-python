### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.KubeReserved
name: KubeReserved
fullName: azure.mgmt.containerservice.models.KubeReserved
module: azure.mgmt.containerservice.models
summary: 'Kube-reserved values for kubelet. When a value is not set, the system-computed
  default based on

  VM size is used. See [AKS node resource reservations](https://aka.ms/aks/nodereservations)

  for details on computed defaults. Only applicable for Linux nodepools.'
constructor:
  syntax: 'KubeReserved(*args: Any, **kwargs: Any)'
variables:
- description: 'The amount of CPU reserved for Kubernetes system daemons, in millicores.

    Must be greater than or equal to 140. For example, a value of 200 means 200m (0.2
    CPU cores).'
  name: cpu_millicores
  types:
  - <xref:int>
- description: 'The amount of memory reserved for Kubernetes system daemons, in MiB.
    Must be

    greater than or equal to 750.'
  name: memory_mb
  types:
  - <xref:int>
attributes:
