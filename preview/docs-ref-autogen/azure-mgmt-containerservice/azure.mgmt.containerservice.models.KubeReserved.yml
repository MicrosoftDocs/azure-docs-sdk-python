  signature: 'cpu_millicores: int | None'
- uid: azure.mgmt.containerservice.models.KubeReserved.memory_mb
  name: memory_mb
  summary: 'The amount of memory reserved for Kubernetes system daemons, in MiB. Must
    be greater than or

    equal to 750.'
  signature: 'memory_mb: int | None'
