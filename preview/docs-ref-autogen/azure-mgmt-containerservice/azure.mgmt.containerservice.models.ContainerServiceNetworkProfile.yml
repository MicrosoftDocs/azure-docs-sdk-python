    anything other than ''azure''. Known values are: "transparent" and "bridge".'
  signature: 'network_mode: str | _models.NetworkMode | None'
- uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfile.network_plugin
  name: network_plugin
  summary: '"azure",

