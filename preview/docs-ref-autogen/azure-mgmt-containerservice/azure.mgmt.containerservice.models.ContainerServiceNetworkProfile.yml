  signature: 'dns_service_ip: str | None'
- uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfile.ip_families
  name: ip_families
  summary: 'The IP families used to specify IP versions available to the cluster.
    IP families are used to

    determine single-stack or dual-stack clusters. For single-stack, the expected
