  summary: Profile of the cluster NAT gateway.
  signature: 'nat_gateway_profile: _models.ManagedClusterNATGatewayProfile | None'
- uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfile.network_dataplane
  name: network_dataplane
  summary: '"azure" and "cilium".'
  signature: 'network_dataplane: str | _models.NetworkDataplane | None'
- uid: azure.mgmt.containerservice.models.ContainerServiceNetworkProfile.network_mode
  name: network_mode
  summary: 'The network mode Azure CNI is configured with. This cannot be specified
