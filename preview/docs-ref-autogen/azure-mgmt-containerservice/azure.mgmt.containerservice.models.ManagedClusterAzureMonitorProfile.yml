name: ManagedClusterAzureMonitorProfile
fullName: azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfile
module: azure.mgmt.containerservice.models
summary: Azure Monitor addon profiles for monitoring the managed cluster.
constructor:
  syntax: 'ManagedClusterAzureMonitorProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Metrics profile for the Azure Monitor managed service for Prometheus
    addon.

    Collect out-of-the-box Kubernetes infrastructure metrics to send to an Azure Monitor
    Workspace

    and configure additional scraping for custom targets. See aka.ms/AzureManagedPrometheus
    for an

    overview.'
  name: metrics
  types:
  - <xref:azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileMetrics>
- description: 'Azure Monitor Container Insights Profile for Kubernetes Events,

    Inventory and Container stdout & stderr logs etc. See aka.ms/AzureMonitorContainerInsights
    for

    an overview.'
  name: container_insights
  types:
  - <xref:azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileContainerInsights>
- description: 'Application Monitoring Profile for Kubernetes Application Container.

    Collects application logs, metrics and traces through auto-instrumentation of
    the application

    using Azure Monitor OpenTelemetry based SDKs. See aka.ms/AzureMonitorApplicationMonitoring
    for

    an overview.'
  name: app_monitoring
  types:
  - <xref:azure.mgmt.containerservice.models.ManagedClusterAzureMonitorProfileAppMonitoring>
