  keywordOnlyParameters:
  - name: filter
    description: Additional filtering criteria for metadata.
    defaultValue: None
  - name: before
    description: List checkpoints created before this configuration.
    defaultValue: None
  - name: limit
    description: Maximum number of checkpoints to return.
    defaultValue: None
  return:
    description: Iterator of matching checkpoint tuples.
    types:
    - <xref:typing.Iterator>[<xref:CheckpointTuple>]
  exceptions:
  - type: NotImplementedError
    description: Always raised.
- uid: azure.ai.agentserver.langgraph.checkpointer.FoundryCheckpointSaver.put
  name: put
  summary: Sync version not supported - use aput instead.
