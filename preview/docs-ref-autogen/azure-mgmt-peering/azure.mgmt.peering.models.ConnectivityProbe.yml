### YamlMime:PythonClass
uid: azure.mgmt.peering.models.ConnectivityProbe
name: ConnectivityProbe
fullName: azure.mgmt.peering.models.ConnectivityProbe
module: azure.mgmt.peering.models
summary: 'Represents a connectivity probe, a configuration peers can add to direct
  and exchange peerings

  to create ping tests. These ping tests will allow us to generate availability, jitter,
  and

  latency data for traffic (using ICMP or TCP) from Azure to an endpoint IP address
  given by the

  customer. This data will be emitted such that the peer can view these metrics in
  the Azure

  portal in the Connectivity probe blade of their peering.'
constructor:
  syntax: 'ConnectivityProbe(*args: Any, **kwargs: Any)'
variables:
- description: 'The endpoint IP address where traffic will be sent to from Azure for
    the

    connectivity probe.'
  name: endpoint
  types:
  - <xref:str>
- description: 'The Azure region where traffic will originate from for the connectivity

    probe.'
  name: azure_region
  types:
  - <xref:str>
- description: 'The protocol of the traffic that will be sent for the connectivity
    probe. Known

    values are: "None", "ICMP", and "TCP".'
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.peering.models.Protocol>
- description: 'Set to contain the prefixes that agents in Azure will send

    traffic from. For peers to allow into their network the connectivity probe traffic
    can reach

    their endpoint for the connectivity probe.'
  name: prefixes_to_accesslist
  types:
  - <xref:list>[<xref:str>]
attributes:
- uid: azure.mgmt.peering.models.ConnectivityProbe.azure_region
  name: azure_region
  summary: The Azure region where traffic will originate from for the connectivity
    probe.
  signature: 'azure_region: str | None'
- uid: azure.mgmt.peering.models.ConnectivityProbe.endpoint
  name: endpoint
  summary: The endpoint IP address where traffic will be sent to from Azure for the
    connectivity probe.
  signature: 'endpoint: str | None'
- uid: azure.mgmt.peering.models.ConnectivityProbe.prefixes_to_accesslist
  name: prefixes_to_accesslist
  summary: 'Set to contain the prefixes that agents in Azure will send traffic from.
    For peers to allow

    into their network the connectivity probe traffic can reach their endpoint for
    the connectivity

    probe.'
  signature: 'prefixes_to_accesslist: list[str] | None'
- uid: azure.mgmt.peering.models.ConnectivityProbe.protocol
  name: protocol
  summary: 'The protocol of the traffic that will be sent for the connectivity probe.
    Known values are:

    "None", "ICMP", and "TCP".'
  signature: 'protocol: str | _models.Protocol | None'
