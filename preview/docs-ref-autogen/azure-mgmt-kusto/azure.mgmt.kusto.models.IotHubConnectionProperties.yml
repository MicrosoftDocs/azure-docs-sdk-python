### YamlMime:PythonClass
uid: azure.mgmt.kusto.models.IotHubConnectionProperties
name: IotHubConnectionProperties
fullName: azure.mgmt.kusto.models.IotHubConnectionProperties
module: azure.mgmt.kusto.models
summary: Class representing the Kusto Iot hub connection properties.
constructor:
  syntax: 'IotHubConnectionProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The resource ID of the Iot hub to be used to create a data

    connection. Required.'
  name: iot_hub_resource_id
  types:
  - <xref:str>
- description: The iot hub consumer group. Required.
  name: consumer_group
  types:
  - <xref:str>
- description: 'The table where the data should be ingested. Optionally the table
    information

    can be added to each message.'
  name: table_name
  types:
  - <xref:str>
- description: 'The mapping rule to be used to ingest the data. Optionally the mapping

    information can be added to each message.'
  name: mapping_rule_name
  types:
  - <xref:str>
- description: 'The data format of the message. Optionally the data format can be
    added to

    each message. Known values are: "MULTIJSON", "JSON", "CSV", "TSV", "SCSV", "SOHSV",
    "PSV",

    "TXT", "RAW", "SINGLEJSON", "AVRO", "TSVE", "PARQUET", "ORC", "APACHEAVRO", "W3CLOGFILE",
    and

    "AZMONSTREAM".'
  name: data_format
  types:
  - <xref:str>
  - <xref:azure.mgmt.kusto.models.IotHubDataFormat>
- description: System properties of the iot hub.
  name: event_system_properties
  types:
  - <xref:list>[<xref:str>]
- description: The name of the share access policy. Required.
  name: shared_access_policy_name
  types:
  - <xref:str>
- description: 'Indication for database routing information from the data connection,

    by default only database routing information is allowed. Known values are: "Single"
    and

    "Multi".'
  name: database_routing
  types:
  - <xref:str>
  - <xref:azure.mgmt.kusto.models.DatabaseRouting>
- description: 'When defined, the data connection retrieves existing Event hub

    events created since the Retrieval start date. It can only retrieve events retained
    by the

    Event hub, based on its retention period.'
  name: retrieval_start_date
  types:
  - <xref:datetime.datetime>
- description: 'The provisioned state of the resource. Known values are: "Running",

    "Creating", "Deleting", "Succeeded", "Failed", "Moving", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.kusto.models.ProvisioningState>
attributes:
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.consumer_group
  name: consumer_group
  summary: The iot hub consumer group. Required.
  signature: 'consumer_group: str'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.data_format
  name: data_format
  summary: 'The data format of the message. Optionally the data format can be added
    to each message. Known

    values are: "MULTIJSON", "JSON", "CSV", "TSV", "SCSV", "SOHSV", "PSV", "TXT",

    "RAW", "SINGLEJSON", "AVRO", "TSVE", "PARQUET", "ORC", "APACHEAVRO",

    "W3CLOGFILE", and "AZMONSTREAM".'
  signature: 'data_format: str | _models.IotHubDataFormat | None'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.database_routing
  name: database_routing
  summary: 'Indication for database routing information from the data connection,
    by default only database

    routing information is allowed. Known values are: "Single" and "Multi".'
  signature: 'database_routing: str | _models.DatabaseRouting | None'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.event_system_properties
  name: event_system_properties
  summary: System properties of the iot hub.
  signature: 'event_system_properties: list[str] | None'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.iot_hub_resource_id
  name: iot_hub_resource_id
  summary: The resource ID of the Iot hub to be used to create a data connection.
    Required.
  signature: 'iot_hub_resource_id: str'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.mapping_rule_name
  name: mapping_rule_name
  summary: 'The mapping rule to be used to ingest the data. Optionally the mapping
    information can be added

    to each message.'
  signature: 'mapping_rule_name: str | None'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.provisioning_state
  name: provisioning_state
  summary: '"Running", "Creating",

    "Deleting", "Succeeded", "Failed", "Moving", and "Canceled".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.retrieval_start_date
  name: retrieval_start_date
  summary: 'When defined, the data connection retrieves existing Event hub events
    created since the

    Retrieval start date. It can only retrieve events retained by the Event hub, based
    on its

    retention period.'
  signature: 'retrieval_start_date: datetime | None'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.shared_access_policy_name
  name: shared_access_policy_name
  summary: The name of the share access policy. Required.
  signature: 'shared_access_policy_name: str'
- uid: azure.mgmt.kusto.models.IotHubConnectionProperties.table_name
  name: table_name
  summary: 'The table where the data should be ingested. Optionally the table information
    can be added to

    each message.'
  signature: 'table_name: str | None'
