### YamlMime:PythonClass
uid: azure.mgmt.kusto.models.ScriptProperties
name: ScriptProperties
fullName: azure.mgmt.kusto.models.ScriptProperties
module: azure.mgmt.kusto.models
summary: A class representing database script property.
constructor:
  syntax: 'ScriptProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The url to the KQL script blob file. Must not be used together with

    scriptContent property.'
  name: script_url
  types:
  - <xref:str>
- description: 'The SaS token that provide read access to the file which contain

    the script. Must be provided when using scriptUrl property.'
  name: script_url_sas_token
  types:
  - <xref:str>
- description: 'The script content. This property should be used when the script is

    provide inline and not through file in a SA. Must not be used together with scriptUrl
    and

    scriptUrlSasToken properties.'
  name: script_content
  types:
  - <xref:str>
- description: A unique string. If changed the script will be applied again.
  name: force_update_tag
  types:
  - <xref:str>
- description: Flag that indicates whether to continue if one of the command fails.
  name: continue_on_errors
  types:
  - <xref:bool>
- description: 'The provisioned state of the resource. Known values are: "Running",

    "Creating", "Deleting", "Succeeded", "Failed", "Moving", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.kusto.models.ProvisioningState>
- description: 'Differentiates between the type of script commands included - Database
    or

    Cluster. The default is Database. Known values are: "Database" and "Cluster".'
  name: script_level
  types:
  - <xref:str>
  - <xref:azure.mgmt.kusto.models.ScriptLevel>
- description: 'Indicates if the permissions for the script caller are kept

    following completion of the script. Known values are: "RetainPermissionOnScriptCompletion"
    and

    "RemovePermissionOnScriptCompletion".'
  name: principal_permissions_action
  types:
  - <xref:str>
  - <xref:azure.mgmt.kusto.models.PrincipalPermissionsAction>
- description: 'The resource identifier of the managed identity to be used.

    When provided, the managed identity will be used to read the script content from
    the scriptUrl.'
  name: managed_identity_resource_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.kusto.models.ScriptProperties.continue_on_errors
  name: continue_on_errors
  summary: Flag that indicates whether to continue if one of the command fails.
  signature: 'continue_on_errors: bool | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.force_update_tag
  name: force_update_tag
  summary: A unique string. If changed the script will be applied again.
  signature: 'force_update_tag: str | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.managed_identity_resource_id
  name: managed_identity_resource_id
  summary: 'The resource identifier of the managed identity to be used. When provided,
    the managed identity

    will be used to read the script content from the scriptUrl.'
  signature: 'managed_identity_resource_id: str | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.principal_permissions_action
  name: principal_permissions_action
  summary: 'Indicates if the permissions for the script caller are kept following
    completion of the script.

    Known values are: "RetainPermissionOnScriptCompletion" and

    "RemovePermissionOnScriptCompletion".'
  signature: 'principal_permissions_action: str | _models.PrincipalPermissionsAction
    | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.provisioning_state
  name: provisioning_state
  summary: '"Running", "Creating",

    "Deleting", "Succeeded", "Failed", "Moving", and "Canceled".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.script_content
  name: script_content
  summary: 'The script content. This property should be used when the script is provide
    inline and not

    through file in a SA. Must not be used together with scriptUrl and scriptUrlSasToken

    properties.'
  signature: 'script_content: str | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.script_level
  name: script_level
  summary: 'Differentiates between the type of script commands included - Database
    or Cluster. The default

    is Database. Known values are: "Database" and "Cluster".'
  signature: 'script_level: str | _models.ScriptLevel | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.script_url
  name: script_url
  summary: The url to the KQL script blob file. Must not be used together with scriptContent
    property.
  signature: 'script_url: str | None'
- uid: azure.mgmt.kusto.models.ScriptProperties.script_url_sas_token
  name: script_url_sas_token
  summary: 'The SaS token that provide read access to the file which contain the script.
    Must be provided

    when using scriptUrl property.'
  signature: 'script_url_sas_token: str | None'
