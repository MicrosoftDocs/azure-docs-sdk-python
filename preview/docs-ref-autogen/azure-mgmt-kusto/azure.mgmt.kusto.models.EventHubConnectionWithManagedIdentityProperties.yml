  name: managed_identity_resource_id
  summary: 'The resource ID of a managed identity (system or user assigned) to be
    used to authenticate with

    event hub. Required.'
  signature: 'managed_identity_resource_id: str'
- uid: azure.mgmt.kusto.models.EventHubConnectionWithManagedIdentityProperties.mapping_rule_name
  name: mapping_rule_name
  summary: 'The mapping rule to be used to ingest the data. Optionally the mapping
    information can be added

    to each message.'
  signature: 'mapping_rule_name: str | None'
- uid: azure.mgmt.kusto.models.EventHubConnectionWithManagedIdentityProperties.provisioning_state
  name: provisioning_state
  summary: '"Running", "Creating",

    "Deleting", "Succeeded", "Failed", "Moving", and "Canceled".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
