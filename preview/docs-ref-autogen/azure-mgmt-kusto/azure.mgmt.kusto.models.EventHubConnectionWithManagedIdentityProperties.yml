  signature: 'database_routing: str | _models.DatabaseRouting | None'
- uid: azure.mgmt.kusto.models.EventHubConnectionWithManagedIdentityProperties.event_hub_resource_id_for_managed_identity
  name: event_hub_resource_id_for_managed_identity
  summary: The resource ID of the event hub to be used to create a data connection.
    Required.
  signature: 'event_hub_resource_id_for_managed_identity: str'
- uid: azure.mgmt.kusto.models.EventHubConnectionWithManagedIdentityProperties.event_system_properties
  name: event_system_properties
  summary: System properties of the event hub.
  signature: 'event_system_properties: list[str] | None'
- uid: azure.mgmt.kusto.models.EventHubConnectionWithManagedIdentityProperties.managed_identity_object_id
  name: managed_identity_object_id
  summary: The object ID of the managedIdentityResourceId.
  signature: 'managed_identity_object_id: str | None'
