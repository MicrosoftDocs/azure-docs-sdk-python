uid: azure.mgmt.kusto.models.CosmosDbDataConnectionProperties
name: CosmosDbDataConnectionProperties
fullName: azure.mgmt.kusto.models.CosmosDbDataConnectionProperties
module: azure.mgmt.kusto.models
summary: Class representing the Kusto CosmosDb data connection properties.
constructor:
  syntax: 'CosmosDbDataConnectionProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The case-sensitive name of the existing target table in your cluster.

    Retrieved data is ingested into this table. Required.'
  name: table_name
  types:
  - <xref:str>
- description: 'The name of an existing mapping rule to use when ingesting the

    retrieved data.'
  name: mapping_rule_name
  types:
  - <xref:str>
- description: 'The resource ID of a managed system or user-assigned

    identity. The identity is used to authenticate with Cosmos DB. Required.'
  name: managed_identity_resource_id
  types:
  - <xref:str>
- description: The object ID of the managed identity resource.
  name: managed_identity_object_id
  types:
  - <xref:str>
- description: 'The resource ID of the Cosmos DB account used to create

    the data connection. Required.'
  name: cosmos_db_account_resource_id
  types:
  - <xref:str>
- description: The name of an existing database in the Cosmos DB account. Required.
  name: cosmos_db_database
  types:
  - <xref:str>
- description: 'The name of an existing container in the Cosmos DB database.

    Required.'
  name: cosmos_db_container
  types:
  - <xref:str>
- description: 'Optional. If defined, the data connection retrieves Cosmos DB

    documents created or updated after the specified retrieval start date.'
  name: retrieval_start_date
  types:
  - <xref:datetime.datetime>
- description: 'The provisioned state of the resource. Known values are: "Running",

    "Creating", "Deleting", "Succeeded", "Failed", "Moving", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.kusto.models.ProvisioningState>
