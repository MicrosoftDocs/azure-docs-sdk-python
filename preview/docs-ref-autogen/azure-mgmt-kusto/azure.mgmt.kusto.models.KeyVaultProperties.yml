- description: 'The user assigned identity (ARM resource id) that has access to the
    key.

    The identity must have ''Get'', ''Wrap Key'', and ''Unwrap Key'' permissions on
    the Key Vault key, or

    be assigned the ''Key Vault Crypto Service Encryption User'' role.'
  name: user_identity
  types:
  - <xref:str>
- description: 'The application (client) ID of the multi-tenant Microsoft

    Entra application. Used for cross-tenant customer-managed key scenarios where
    the encryption

    key is stored in a different tenant than the cluster. The application must be
    configured with

    the user-assigned managed identity as a federated identity credential.'
  name: federated_identity_client_id
  types:
  - <xref:str>
