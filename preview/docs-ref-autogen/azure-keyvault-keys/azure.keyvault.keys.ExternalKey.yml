### YamlMime:PythonClass
uid: azure.keyvault.keys.ExternalKey
name: ExternalKey
fullName: azure.keyvault.keys.ExternalKey
module: azure.keyvault.keys
summary: 'A reference to a key whose material lives outside Azure Managed HSM.


  Used with <xref:azure.keyvault.keys.KeyClient.create_external_key> (and its async
  equivalent)

  to register a Managed HSM key that points at material stored in an external HSM.
  Only available

  with API version `2026-01-01-preview` and newer, and only supported on Managed HSM.'
constructor:
  syntax: 'ExternalKey(*, id: str)'
  keywordOnlyParameters:
  - name: id
    description: 'The external key identifier. Must contain only characters in the
      set

      `[a-zA-Z0-9-]` and be at most 64 characters long. Required.'
    types:
    - <xref:str>
