### YamlMime:PythonClass
uid: azure.mgmt.datamigration.models.MigrateSqlServerSqlDbTaskInput
name: MigrateSqlServerSqlDbTaskInput
fullName: azure.mgmt.datamigration.models.MigrateSqlServerSqlDbTaskInput
module: azure.mgmt.datamigration.models
summary: Input for the task that migrates on-prem SQL Server databases to Azure SQL
  Database.
constructor:
  syntax: 'MigrateSqlServerSqlDbTaskInput(*args: Any, **kwargs: Any)'
variables:
- description: Information for connecting to source. Required.
  name: source_connection_info
  types:
  - <xref:azure.mgmt.datamigration.models.SqlConnectionInfo>
- description: Information for connecting to target. Required.
  name: target_connection_info
  types:
  - <xref:azure.mgmt.datamigration.models.SqlConnectionInfo>
- description: Databases to migrate. Required.
  name: selected_databases
  types:
  - <xref:list>[<xref:azure.mgmt.datamigration.models.MigrateSqlServerSqlDbDatabaseInput>]
- description: 'Options for enabling various post migration validations. Available

    options, 1.) Data Integrity Check: Performs a checksum based comparison on source
    and target

    tables after the migration to ensure the correctness of the data. 2.) Schema Validation:

    Performs a thorough schema comparison between the source and target tables and
    provides a list

    of differences between the source and target database, 3.) Query Analysis: Executes
    a set of

    queries picked up automatically either from the Query Plan Cache or Query Store
    and execute

    them and compares the execution time between the source and target database.'
  name: validation_options
  types:
  - <xref:azure.mgmt.datamigration.models.MigrationValidationOptions>
- description: Date and time relative to UTC when the migration was started on.
  name: started_on
  types:
  - <xref:str>
- description: encrypted key for secure fields.
  name: encrypted_key_for_secure_fields
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.datamigration.models.MigrateSqlServerSqlDbTaskInput.encrypted_key_for_secure_fields
  name: encrypted_key_for_secure_fields
  summary: encrypted key for secure fields.
  signature: 'encrypted_key_for_secure_fields: str | None'
- uid: azure.mgmt.datamigration.models.MigrateSqlServerSqlDbTaskInput.selected_databases
  name: selected_databases
  summary: Databases to migrate. Required.
  signature: 'selected_databases: list[''_models.MigrateSqlServerSqlDbDatabaseInput'']'
- uid: azure.mgmt.datamigration.models.MigrateSqlServerSqlDbTaskInput.started_on
  name: started_on
  summary: Date and time relative to UTC when the migration was started on.
  signature: 'started_on: str | None'
- uid: azure.mgmt.datamigration.models.MigrateSqlServerSqlDbTaskInput.validation_options
  name: validation_options
  summary: 'Options for enabling various post migration validations. Available options,
    1.) Data Integrity

    Check: Performs a checksum based comparison on source and target tables after
    the migration to

    ensure the correctness of the data. 2.) Schema Validation: Performs a thorough
    schema

    comparison between the source and target tables and provides a list of differences
    between the

    source and target database, 3.) Query Analysis: Executes a set of queries picked
    up

    automatically either from the Query Plan Cache or Query Store and execute them
    and compares the

    execution time between the source and target database.'
  signature: 'validation_options: _models.MigrationValidationOptions | None'
