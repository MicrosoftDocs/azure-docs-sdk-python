    "Service.Check.OCI", "Service.Upload.OCI", "Service.Install.OCI", and

    "MigrateSchemaSqlServerSqlDb".'
  name: task_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.datamigration.models.TaskType>
