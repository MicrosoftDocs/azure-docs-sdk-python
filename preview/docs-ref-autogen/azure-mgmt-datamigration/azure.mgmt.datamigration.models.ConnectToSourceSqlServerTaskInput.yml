### YamlMime:PythonClass
uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput
name: ConnectToSourceSqlServerTaskInput
fullName: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput
module: azure.mgmt.datamigration.models
summary: 'Input for the task that validates connection to SQL Server and also validates
  source server

  requirements.'
constructor:
  syntax: 'ConnectToSourceSqlServerTaskInput(*args: Any, **kwargs: Any)'
variables:
- description: Connection information for Source SQL Server. Required.
  name: source_connection_info
  types:
  - <xref:azure.mgmt.datamigration.models.SqlConnectionInfo>
- description: 'Permission group for validations. Known values are: "Default",

    "MigrationFromSqlServerToAzureDB", "MigrationFromSqlServerToAzureMI",

    "MigrationFromMySQLToAzureDBForMySQL", and "MigrationFromSqlServerToAzureVM".'
  name: check_permissions_group
  types:
  - <xref:str>
  - <xref:azure.mgmt.datamigration.models.ServerLevelPermissionsGroup>
- description: Flag for whether to collect databases from source server.
  name: collect_databases
  types:
  - <xref:bool>
- description: Flag for whether to collect logins from source server.
  name: collect_logins
  types:
  - <xref:bool>
- description: Flag for whether to collect agent jobs from source server.
  name: collect_agent_jobs
  types:
  - <xref:bool>
- description: 'Flag for whether to collect TDE Certificate names from

    source server.'
  name: collect_tde_certificate_info
  types:
  - <xref:bool>
- description: 'Flag for whether to validate SSIS catalog is reachable on the

    source server.'
  name: validate_ssis_catalog_only
  types:
  - <xref:bool>
- description: encrypted key for secure fields.
  name: encrypted_key_for_secure_fields
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.check_permissions_group
  name: check_permissions_group
  summary: '"Default",

    "MigrationFromSqlServerToAzureDB", "MigrationFromSqlServerToAzureMI",

    "MigrationFromMySQLToAzureDBForMySQL", and "MigrationFromSqlServerToAzureVM".'
  signature: 'check_permissions_group: str | _models.ServerLevelPermissionsGroup |
    None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.collect_agent_jobs
  name: collect_agent_jobs
  summary: Flag for whether to collect agent jobs from source server.
  signature: 'collect_agent_jobs: bool | None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.collect_databases
  name: collect_databases
  summary: Flag for whether to collect databases from source server.
  signature: 'collect_databases: bool | None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.collect_logins
  name: collect_logins
  summary: Flag for whether to collect logins from source server.
  signature: 'collect_logins: bool | None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.collect_tde_certificate_info
  name: collect_tde_certificate_info
  summary: Flag for whether to collect TDE Certificate names from source server.
  signature: 'collect_tde_certificate_info: bool | None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.encrypted_key_for_secure_fields
  name: encrypted_key_for_secure_fields
  summary: encrypted key for secure fields.
  signature: 'encrypted_key_for_secure_fields: str | None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.source_connection_info
  name: source_connection_info
  summary: Connection information for Source SQL Server. Required.
  signature: 'source_connection_info: _models.SqlConnectionInfo'
- uid: azure.mgmt.datamigration.models.ConnectToSourceSqlServerTaskInput.validate_ssis_catalog_only
  name: validate_ssis_catalog_only
  summary: Flag for whether to validate SSIS catalog is reachable on the source server.
  signature: 'validate_ssis_catalog_only: bool | None'
