### YamlMime:PythonClass
uid: azure.mgmt.datamigration.models.MongoDbProgress
name: MongoDbProgress
fullName: azure.mgmt.datamigration.models.MongoDbProgress
module: azure.mgmt.datamigration.models
summary: 'Base class for MongoDB migration outputs.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  MongoDbCollectionProgress, MongoDbDatabaseProgress, MongoDbMigrationProgress'
constructor:
  syntax: 'MongoDbProgress(*args: Any, **kwargs: Any)'
variables:
- description: The number of document bytes copied during the Copying stage. Required.
  name: bytes_copied
  types:
  - <xref:int>
- description: The number of documents copied during the Copying stage. Required.
  name: documents_copied
  types:
  - <xref:int>
- description: 'The elapsed time in the format [ddd.]hh:mm:ss[.fffffff] (i.e. TimeSpan

    format). Required.'
  name: elapsed_time
  types:
  - <xref:str>
- description: 'The errors and warnings that have occurred for the current object.
    The keys are

    the error codes. Required.'
  name: errors
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.datamigration.models.MongoDbError>]
- description: The number of oplog events awaiting replay. Required.
  name: events_pending
  types:
  - <xref:int>
- description: The number of oplog events replayed so far. Required.
  name: events_replayed
  types:
  - <xref:int>
- description: 'The timestamp of the last oplog event received, or null if no oplog

    event has been received yet.'
  name: last_event_time
  types:
  - <xref:datetime.datetime>
- description: 'The timestamp of the last oplog event replayed, or null if no oplog

    event has been replayed yet.'
  name: last_replay_time
  types:
  - <xref:datetime.datetime>
- description: 'The name of the progress object. For a collection, this is the unqualified

    collection name. For a database, this is the database name. For the overall migration,
    this is

    null.'
  name: name
  types:
  - <xref:str>
- description: 'The qualified name of the progress object. For a collection, this
    is the

    database-qualified name. For a database, this is the database name. For the overall
    migration,

    this is null.'
  name: qualified_name
  types:
  - <xref:str>
- description: 'The type of progress object. Required. Known values are: "Migration",

    "Database", and "Collection".'
  name: result_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.datamigration.models.MongoDbProgressResultType>
- description: 'Required. Known values are: "NotStarted", "ValidatingInput", "Initializing",

    "Restarting", "Copying", "InitialReplay", "Replaying", "Finalizing", "Complete",
    "Canceled",

    and "Failed".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.datamigration.models.MongoDbMigrationState>
- description: 'The total number of document bytes on the source at the beginning
    of the

    Copying stage, or -1 if the total size was unknown. Required.'
  name: total_bytes
  types:
  - <xref:int>
- description: 'The total number of documents on the source at the beginning of the

    Copying stage, or -1 if the total count was unknown. Required.'
  name: total_documents
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.datamigration.models.MongoDbProgress.bytes_copied
  name: bytes_copied
  summary: The number of document bytes copied during the Copying stage. Required.
  signature: 'bytes_copied: int'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.documents_copied
  name: documents_copied
  summary: The number of documents copied during the Copying stage. Required.
  signature: 'documents_copied: int'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.elapsed_time
  name: elapsed_time
  summary: ss[.fffffff] (i.e. TimeSpan format). Required.
  signature: 'elapsed_time: str'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.errors
  name: errors
  summary: 'The errors and warnings that have occurred for the current object. The
    keys are the error

    codes. Required.'
  signature: 'errors: dict[str, ''_models.MongoDbError'']'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.events_pending
  name: events_pending
  summary: The number of oplog events awaiting replay. Required.
  signature: 'events_pending: int'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.events_replayed
  name: events_replayed
  summary: The number of oplog events replayed so far. Required.
  signature: 'events_replayed: int'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.last_event_time
  name: last_event_time
  summary: 'The timestamp of the last oplog event received, or null if no oplog event
    has been received

    yet.'
  signature: 'last_event_time: datetime | None'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.last_replay_time
  name: last_replay_time
  summary: 'The timestamp of the last oplog event replayed, or null if no oplog event
    has been replayed

    yet.'
  signature: 'last_replay_time: datetime | None'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.name
  name: name
  summary: 'The name of the progress object. For a collection, this is the unqualified
    collection name. For

    a database, this is the database name. For the overall migration, this is null.'
  signature: 'name: str | None'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.qualified_name
  name: qualified_name
  summary: 'The qualified name of the progress object. For a collection, this is the
    database-qualified

    name. For a database, this is the database name. For the overall migration, this
    is null.'
  signature: 'qualified_name: str | None'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.result_type
  name: result_type
  summary: '"Migration", "Database", and

    "Collection".'
  signature: 'result_type: str'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.state
  name: state
  summary: '"NotStarted", "ValidatingInput", "Initializing",

    "Restarting", "Copying", "InitialReplay", "Replaying", "Finalizing", "Complete",

    "Canceled", and "Failed".'
  signature: 'state: str | _models.MongoDbMigrationState'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.total_bytes
  name: total_bytes
  summary: 'The total number of document bytes on the source at the beginning of the
    Copying stage, or -1

    if the total size was unknown. Required.'
  signature: 'total_bytes: int'
- uid: azure.mgmt.datamigration.models.MongoDbProgress.total_documents
  name: total_documents
  summary: 'The total number of documents on the source at the beginning of the Copying
    stage, or -1 if the

    total count was unknown. Required.'
  signature: 'total_documents: int'
