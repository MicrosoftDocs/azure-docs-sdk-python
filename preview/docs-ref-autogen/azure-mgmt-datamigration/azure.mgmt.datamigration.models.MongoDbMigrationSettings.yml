### YamlMime:PythonClass
uid: azure.mgmt.datamigration.models.MongoDbMigrationSettings
name: MongoDbMigrationSettings
fullName: azure.mgmt.datamigration.models.MongoDbMigrationSettings
module: azure.mgmt.datamigration.models
summary: Describes how a MongoDB data migration should be performed.
constructor:
  syntax: 'MongoDbMigrationSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'The RU limit on a CosmosDB target that collections will be temporarily

    increased to (if lower) during the initial copy of a migration, from 10,000 to
    1,000,000, or 0

    to use the default boost (which is generally the maximum), or null to not boost
    the RUs. This

    setting has no effect on non-CosmosDB targets.'
  name: boost_r_us
  types:
  - <xref:int>
- description: 'The databases on the source cluster to migrate to the target. The
    keys are the

    names of the databases. Required.'
  name: databases
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.datamigration.models.MongoDbDatabaseSettings>]
- description: 'Describes how changes will be replicated from the source to the target.
    The

    default is OneTime. Known values are: "Disabled", "OneTime", and "Continuous".'
  name: replication
  types:
  - <xref:str>
  - <xref:azure.mgmt.datamigration.models.MongoDbReplication>
- description: Settings used to connect to the source cluster. Required.
  name: source
  types:
  - <xref:azure.mgmt.datamigration.models.MongoDbConnectionInfo>
- description: Settings used to connect to the target cluster. Required.
  name: target
  types:
  - <xref:azure.mgmt.datamigration.models.MongoDbConnectionInfo>
- description: Settings used to limit the resource usage of the migration.
  name: throttling
  types:
  - <xref:azure.mgmt.datamigration.models.MongoDbThrottlingSettings>
attributes:
- uid: azure.mgmt.datamigration.models.MongoDbMigrationSettings.boost_r_us
  name: boost_r_us
  summary: 'The RU limit on a CosmosDB target that collections will be temporarily
    increased to (if lower)

    during the initial copy of a migration, from 10,000 to 1,000,000, or 0 to use
    the default boost

    (which is generally the maximum), or null to not boost the RUs. This setting has
    no effect on

    non-CosmosDB targets.'
  signature: 'boost_r_us: int | None'
- uid: azure.mgmt.datamigration.models.MongoDbMigrationSettings.databases
  name: databases
  summary: 'The databases on the source cluster to migrate to the target. The keys
    are the names of the

    databases. Required.'
  signature: 'databases: dict[str, ''_models.MongoDbDatabaseSettings'']'
- uid: azure.mgmt.datamigration.models.MongoDbMigrationSettings.replication
  name: replication
  summary: 'Describes how changes will be replicated from the source to the target.
    The default is OneTime.

    Known values are: "Disabled", "OneTime", and "Continuous".'
  signature: 'replication: str | _models.MongoDbReplication | None'
- uid: azure.mgmt.datamigration.models.MongoDbMigrationSettings.source
  name: source
  summary: Settings used to connect to the source cluster. Required.
  signature: 'source: _models.MongoDbConnectionInfo'
- uid: azure.mgmt.datamigration.models.MongoDbMigrationSettings.target
  name: target
  summary: Settings used to connect to the target cluster. Required.
  signature: 'target: _models.MongoDbConnectionInfo'
- uid: azure.mgmt.datamigration.models.MongoDbMigrationSettings.throttling
  name: throttling
  summary: Settings used to limit the resource usage of the migration.
  signature: 'throttling: _models.MongoDbThrottlingSettings | None'
