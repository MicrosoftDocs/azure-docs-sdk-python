### YamlMime:PythonClass
uid: azure.mgmt.datamigration.models.ConnectToSourceMySqlTaskInput
name: ConnectToSourceMySqlTaskInput
fullName: azure.mgmt.datamigration.models.ConnectToSourceMySqlTaskInput
module: azure.mgmt.datamigration.models
summary: Input for the task that validates MySQL database connection.
constructor:
  syntax: 'ConnectToSourceMySqlTaskInput(*args: Any, **kwargs: Any)'
variables:
- description: Information for connecting to MySQL source. Required.
  name: source_connection_info
  types:
  - <xref:azure.mgmt.datamigration.models.MySqlConnectionInfo>
- description: 'Target Platform for the migration. Known values are: "SqlServer" and

    "AzureDbForMySQL".'
  name: target_platform
  types:
  - <xref:str>
  - <xref:azure.mgmt.datamigration.models.MySqlTargetPlatformType>
- description: 'Permission group for validations. Known values are: "Default",

    "MigrationFromSqlServerToAzureDB", "MigrationFromSqlServerToAzureMI",

    "MigrationFromMySQLToAzureDBForMySQL", and "MigrationFromSqlServerToAzureVM".'
  name: check_permissions_group
  types:
  - <xref:str>
  - <xref:azure.mgmt.datamigration.models.ServerLevelPermissionsGroup>
- description: Flag for whether or not the migration is offline.
  name: is_offline_migration
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.datamigration.models.ConnectToSourceMySqlTaskInput.check_permissions_group
  name: check_permissions_group
  summary: '"Default",

    "MigrationFromSqlServerToAzureDB", "MigrationFromSqlServerToAzureMI",

    "MigrationFromMySQLToAzureDBForMySQL", and "MigrationFromSqlServerToAzureVM".'
  signature: 'check_permissions_group: str | _models.ServerLevelPermissionsGroup |
    None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceMySqlTaskInput.is_offline_migration
  name: is_offline_migration
  summary: Flag for whether or not the migration is offline.
  signature: 'is_offline_migration: bool | None'
- uid: azure.mgmt.datamigration.models.ConnectToSourceMySqlTaskInput.source_connection_info
  name: source_connection_info
  summary: Information for connecting to MySQL source. Required.
  signature: 'source_connection_info: _models.MySqlConnectionInfo'
- uid: azure.mgmt.datamigration.models.ConnectToSourceMySqlTaskInput.target_platform
  name: target_platform
  summary: '"SqlServer" and "AzureDbForMySQL".'
  signature: 'target_platform: str | _models.MySqlTargetPlatformType | None'
