  name: force_migrate
  summary: 'Sets whether to ignore warnings when validating if the source cache can
    be migrated to the

    target cache. If this property is true, the isValid property in the response will
    ignore

    warning-level disparities between the source and target resource. The default
    value is false.'
  signature: 'force_migrate: bool | None'
- uid: azure.mgmt.redisenterprise.models.MigrationValidationRequest.skip_data_migration
  name: skip_data_migration
  summary: Sets whether the data is migrated from source to target or not. The default
    value is true.
  signature: 'skip_data_migration: bool | None'
- uid: azure.mgmt.redisenterprise.models.MigrationValidationRequest.source_resource_id
