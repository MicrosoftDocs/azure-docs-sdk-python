uid: azure.mgmt.redisenterprise.models.MigrationValidationRequest
name: MigrationValidationRequest
fullName: azure.mgmt.redisenterprise.models.MigrationValidationRequest
module: azure.mgmt.redisenterprise.models
summary: Properties for validating migration from Azure Cache for Redis to Redis Enterprise.
constructor:
  syntax: 'MigrationValidationRequest(*args: Any, **kwargs: Any)'
variables:
- description: 'The source resource ID to validate migration from. This is the

    resource ID of the Azure Cache for Redis. Required.'
  name: source_resource_id
  types:
  - <xref:str>
- description: 'Sets whether the data is migrated from source to target or not. The

    default value is true.'
  name: skip_data_migration
  types:
  - <xref:bool>
- description: 'Sets whether to ignore warnings when validating if the source cache
    can be

    migrated to the target cache. If this property is true, the isValid property in
    the response

    will ignore warning-level disparities between the source and target resource.
    The default value

    is false.'
  name: force_migrate
  types:
  - <xref:bool>
attributes:
