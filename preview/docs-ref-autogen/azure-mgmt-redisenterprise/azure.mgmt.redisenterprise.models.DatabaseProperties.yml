### YamlMime:PythonClass
uid: azure.mgmt.redisenterprise.models.DatabaseProperties
name: DatabaseProperties
fullName: azure.mgmt.redisenterprise.models.DatabaseProperties
module: azure.mgmt.redisenterprise.models
summary: 'Properties of Redis Enterprise databases, as opposed to general resource
  properties like

  location, tags.'
constructor:
  syntax: 'DatabaseProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies whether redis clients can connect using TLS-encrypted or

    plaintext redis protocols. Default is TLS-encrypted. Known values are: "Encrypted"
    and

    "Plaintext".'
  name: client_protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.Protocol>
- description: 'TCP port of the database endpoint. Specified at create time. Defaults
    to an

    available port.'
  name: port
  types:
  - <xref:int>
- description: 'Current provisioning status of the database. Known values are:

    "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.ProvisioningState>
- description: 'Current resource status of the database. Known values are: "Running",

    "Creating", "CreateFailed", "Updating", "UpdateFailed", "Deleting", "DeleteFailed",
    "Enabling",

    "EnableFailed", "Disabling", "DisableFailed", "Disabled", "Scaling", "ScalingFailed",
    and

    "Moving".'
  name: resource_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.ResourceState>
- description: 'Clustering policy - default is OSSCluster. This property can be

    updated only if the current value is NoCluster. If the value is OSSCluster or

    EnterpriseCluster, it cannot be updated without deleting the database. Known values
    are:

    "EnterpriseCluster", "OSSCluster", and "NoCluster".'
  name: clustering_policy
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.ClusteringPolicy>
- description: 'Redis eviction policy - default is VolatileLRU. Known values are:

    "AllKeysLFU", "AllKeysLRU", "AllKeysRandom", "VolatileLRU", "VolatileLFU", "VolatileTTL",

    "VolatileRandom", and "NoEviction".'
  name: eviction_policy
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.EvictionPolicy>
- description: Persistence settings.
  name: persistence
  types:
  - <xref:azure.mgmt.redisenterprise.models.Persistence>
- description: 'Optional set of redis modules to enable in this database - modules
    can only be

    added at creation time.'
  name: modules
  types:
  - <xref:list>[<xref:azure.mgmt.redisenterprise.models.Module>]
- description: 'Optional set of properties to configure geo replication for this

    database.'
  name: geo_replication
  types:
  - <xref:azure.mgmt.redisenterprise.models.DatabasePropertiesGeoReplication>
- description: Version of Redis the database is running on, e.g. '6.0'.
  name: redis_version
  types:
  - <xref:str>
- description: 'Option to defer upgrade when newest version is released - default
    is

    NotDeferred. Learn more: [https://aka.ms/redisversionupgrade](https://aka.ms/redisversionupgrade).
    Known values are: "Deferred" and "NotDeferred".'
  name: defer_upgrade
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.DeferUpgradeSetting>
- description: 'This property can be Enabled/Disabled to allow or deny access

    with the current access keys. Can be updated even after database is created. Known
    values are:

    "Disabled" and "Enabled".'
  name: access_keys_authentication
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.AccessKeysAuthentication>
- description: 'Specifies which keyspace events should trigger notifications.

    Default is an empty string, meaning this feature is disabled. When enabled, at
    least ''K''

    (keyspace events) or ''E'' (keyevent events) must be present. For example, ''AKE''
    enables all

    standard events. See [https://redis.io/docs/latest/develop/use/keyspace-notifications/](https://redis.io/docs/latest/develop/use/keyspace-notifications/)
    for the complete list of

    event types.'
  name: notify_keyspace_events
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.access_keys_authentication
  name: access_keys_authentication
  summary: 'This property can be Enabled/Disabled to allow or deny access with the
    current access keys. Can

    be updated even after database is created. Known values are: "Disabled" and "Enabled".'
  signature: 'access_keys_authentication: str | _models.AccessKeysAuthentication |
    None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.client_protocol
  name: client_protocol
  summary: 'Specifies whether redis clients can connect using TLS-encrypted or plaintext
    redis protocols.

    Default is TLS-encrypted. Known values are: "Encrypted" and "Plaintext".'
  signature: 'client_protocol: str | _models.Protocol | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.clustering_policy
  name: clustering_policy
  summary: 'Clustering policy - default is OSSCluster. This property can be updated
    only if the current

    value is NoCluster. If the value is OSSCluster or EnterpriseCluster, it cannot
    be updated

    without deleting the database. Known values are: "EnterpriseCluster", "OSSCluster",
    and

    "NoCluster".'
  signature: 'clustering_policy: str | _models.ClusteringPolicy | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.defer_upgrade
  name: defer_upgrade
  summary: 'Option to defer upgrade when newest version is released - default is NotDeferred.
    Learn more:

    [https://aka.ms/redisversionupgrade](https://aka.ms/redisversionupgrade). Known
    values are:

    "Deferred" and "NotDeferred".'
  signature: 'defer_upgrade: str | _models.DeferUpgradeSetting | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.eviction_policy
  name: eviction_policy
  summary: '"AllKeysLFU",

    "AllKeysLRU", "AllKeysRandom", "VolatileLRU", "VolatileLFU", "VolatileTTL",

    "VolatileRandom", and "NoEviction".'
  signature: 'eviction_policy: str | _models.EvictionPolicy | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.geo_replication
  name: geo_replication
  summary: Optional set of properties to configure geo replication for this database.
  signature: 'geo_replication: _models.DatabasePropertiesGeoReplication | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.modules
  name: modules
  summary: 'Optional set of redis modules to enable in this database - modules can
    only be added at

    creation time.'
  signature: 'modules: list[''_models.Module''] | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.notify_keyspace_events
  name: notify_keyspace_events
  summary: 'Specifies which keyspace events should trigger notifications. Default
    is an empty string,

    meaning this feature is disabled. When enabled, at least ''K'' (keyspace events)
    or ''E'' (keyevent

    events) must be present. For example, ''AKE'' enables all standard events. See

    [https://redis.io/docs/latest/develop/use/keyspace-notifications/](https://redis.io/docs/latest/develop/use/keyspace-notifications/)
    for the complete list of

    event types.'
  signature: 'notify_keyspace_events: str | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.persistence
  name: persistence
  summary: Persistence settings.
  signature: 'persistence: _models.Persistence | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.port
  name: port
  summary: TCP port of the database endpoint. Specified at create time. Defaults to
    an available port.
  signature: 'port: int | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.provisioning_state
  name: provisioning_state
  summary: '"Succeeded", "Failed",

    "Canceled", "Creating", "Updating", and "Deleting".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.redis_version
  name: redis_version
  summary: Version of Redis the database is running on, e.g. '6.0'.
  signature: 'redis_version: str | None'
- uid: azure.mgmt.redisenterprise.models.DatabaseProperties.resource_state
  name: resource_state
  summary: '"Running", "Creating",

    "CreateFailed", "Updating", "UpdateFailed", "Deleting", "DeleteFailed", "Enabling",

    "EnableFailed", "Disabling", "DisableFailed", "Disabled", "Scaling",

    "ScalingFailed", and "Moving".'
  signature: 'resource_state: str | _models.ResourceState | None'
