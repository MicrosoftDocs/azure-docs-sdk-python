### YamlMime:PythonClass
uid: azure.mgmt.redisenterprise.models.AzureCacheForRedisMigrationProperties
name: AzureCacheForRedisMigrationProperties
fullName: azure.mgmt.redisenterprise.models.AzureCacheForRedisMigrationProperties
module: azure.mgmt.redisenterprise.models
summary: Properties for Redis Enterprise migration operation for Azure Cache for Redis.
constructor:
  syntax: 'AzureCacheForRedisMigrationProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The Azure resource ID of the Azure Managed Redis destination cache
    to

    migrate.'
  name: target_resource_id
  types:
  - <xref:str>
- description: 'Current provisioning status of the migration. Known values are:

    "Accepted", "InProgress", "ReadyForDnsSwitch", "Succeeded", "Failed", "Cancelling",

    "Cancelled", and "CancellationFailed".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.MigrationProvisioningState>
- description: 'Additional details about the migration operation''s status in free
    text

    format.'
  name: status_details
  types:
  - <xref:str>
- description: The timestamp when the migration operation was created.
  name: creation_time
  types:
  - <xref:datetime.datetime>
- description: The timestamp when the migration operation was last updated.
  name: last_modified_time
  types:
  - <xref:datetime.datetime>
- description: 'The source resource ID to migrate from. This is the resource ID of

    the Azure Cache for Redis. Required.'
  name: source_resource_id
  types:
  - <xref:str>
- description: 'Sets whether the DNS is switched automatically after the data is transferred

    from the source cache to the target cache. This property must be true during the
    preview.

    Required.'
  name: switch_dns
  types:
  - <xref:bool>
- description: 'Sets whether the data is migrated from source to target or not. This

    property must be true during the preview. Required.'
  name: skip_data_migration
  types:
  - <xref:bool>
- description: 'Sets whether to ignore warnings when performing validation of the

    migration request. If this property is true, warning-level disparities between
    the source and

    target resources will be ignored, and the request will only fail validation if
    there are

    error-level disparities. The default value is false.'
  name: force_migrate
  types:
  - <xref:bool>
- description: 'Describes the source of the migration operation. Required. Migration
    from

    Azure Cache for Redis to Redis Enterprise.'
  name: source_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.redisenterprise.models.AZURE_CACHE_FOR_REDIS>
attributes:
- uid: azure.mgmt.redisenterprise.models.AzureCacheForRedisMigrationProperties.force_migrate
  name: force_migrate
  summary: 'Sets whether to ignore warnings when performing validation of the migration
    request. If this

    property is true, warning-level disparities between the source and target resources
    will be

    ignored, and the request will only fail validation if there are error-level disparities.
    The

    default value is false.'
  signature: 'force_migrate: bool | None'
- uid: azure.mgmt.redisenterprise.models.AzureCacheForRedisMigrationProperties.skip_data_migration
  name: skip_data_migration
  summary: 'Sets whether the data is migrated from source to target or not. This property
    must be true

    during the preview. Required.'
  signature: 'skip_data_migration: bool'
- uid: azure.mgmt.redisenterprise.models.AzureCacheForRedisMigrationProperties.source_resource_id
  name: source_resource_id
  summary: 'The source resource ID to migrate from. This is the resource ID of the
    Azure Cache for Redis.

    Required.'
  signature: 'source_resource_id: str'
- uid: azure.mgmt.redisenterprise.models.AzureCacheForRedisMigrationProperties.source_type
  name: source_type
  summary: 'Describes the source of the migration operation. Required. Migration from
    Azure Cache for Redis

    to Redis Enterprise.'
  signature: 'source_type: AZURE_CACHE_FOR_REDIS: ''AzureCacheForRedis''>]'
- uid: azure.mgmt.redisenterprise.models.AzureCacheForRedisMigrationProperties.switch_dns
  name: switch_dns
  summary: 'Sets whether the DNS is switched automatically after the data is transferred
    from the source

    cache to the target cache. This property must be true during the preview. Required.'
  signature: 'switch_dns: bool'
