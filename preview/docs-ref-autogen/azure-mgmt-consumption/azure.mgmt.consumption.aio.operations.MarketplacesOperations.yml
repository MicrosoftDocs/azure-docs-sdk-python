methods:
- uid: azure.mgmt.consumption.aio.operations.MarketplacesOperations.list
  name: list
  summary: 'Lists the marketplaces for a scope at the defined scope. Marketplaces
    are available via this

    API only for May 1, 2014 or later.'
  signature: 'list(scope: str, *, filter: str | None = None, top: int | None = None,
    skiptoken: str | None = None, **kwargs: Any) -> AsyncItemPaged[Marketplace]'
  parameters:
  - name: scope
    description: The fully qualified Azure Resource manager identifier of the resource.
      Required.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: filter
    description: 'May be used to filter marketplaces by properties/usageEnd (Utc time),

      properties/usageStart (Utc time), properties/resourceGroup, properties/instanceName
      or

      properties/instanceId. The filter supports ''eq'', ''lt'', ''gt'', ''le'', ''ge'',
      and ''and''. It does not

      currently support ''ne'', ''or'', or ''not''. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: top
    description: 'May be used to limit the number of results to the most recent N
      marketplaces.

      Default value is None.'
    defaultValue: None
    types:
    - <xref:int>
  - name: skiptoken
    description: 'Skiptoken is only used if a previous operation returned a partial
      result.

      If a previous response contains a nextLink element, the value of the nextLink
      element will

      include a skiptoken parameter that specifies a starting point to use for subsequent
      calls.

      Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  return:
    description: An iterator like instance of Marketplace
    types:
    - <xref:azure.core.async_paging.AsyncItemPaged>[<xref:azure.mgmt.consumption.models.Marketplace>]
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
