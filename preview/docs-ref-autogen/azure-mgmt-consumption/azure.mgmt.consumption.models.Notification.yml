### YamlMime:PythonClass
uid: azure.mgmt.consumption.models.Notification
name: Notification
fullName: azure.mgmt.consumption.models.Notification
module: azure.mgmt.consumption.models
summary: The notification associated with a budget.
constructor:
  syntax: 'Notification(*args: Any, **kwargs: Any)'
variables:
- description: The notification is enabled or not. Required.
  name: enabled
  types:
  - <xref:bool>
- description: 'The comparison operator. Required. Known values are: "EqualTo", "GreaterThan",

    and "GreaterThanOrEqualTo".'
  name: operator
  types:
  - <xref:str>
  - <xref:azure.mgmt.consumption.models.OperatorType>
- description: 'Threshold value associated with a notification. Notification is sent
    when the

    cost exceeded the threshold. It is always percent and has to be between 0 and
    1000. Required.'
  name: threshold
  types:
  - <xref:decimal.Decimal>
- description: 'Email addresses to send the budget notification to when the threshold
    is

    exceeded. Must have at least one contact email or contact group specified at the
    Subscription

    or Resource Group scopes. All other scopes must have at least one contact email
    specified.

    Required.'
  name: contact_emails
  types:
  - <xref:list>[<xref:str>]
- description: 'Contact roles to send the budget notification to when the threshold
    is

    exceeded.'
  name: contact_roles
  types:
  - <xref:list>[<xref:str>]
- description: 'Action groups to send the budget notification to when the threshold
    is

    exceeded. Must be provided as a fully qualified Azure resource id. Only supported
    at

    Subscription or Resource Group scopes.'
  name: contact_groups
  types:
  - <xref:list>[<xref:str>]
- description: 'The type of threshold. Known values are: "Actual" and "Forecasted".'
  name: threshold_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.consumption.models.ThresholdType>
- description: 'Language in which the recipient will receive the notification. Known
    values are:

    "en-us", "ja-jp", "zh-cn", "de-de", "es-es", "fr-fr", "it-it", "ko-kr", "pt-br",
    "ru-ru",

    "zh-tw", "cs-cz", "pl-pl", "tr-tr", "da-dk", "en-gb", "hu-hu", "nb-no", "nl-nl",
    "pt-pt", and

    "sv-se".'
  name: locale
  types:
  - <xref:str>
  - <xref:azure.mgmt.consumption.models.CultureCode>
attributes:
- uid: azure.mgmt.consumption.models.Notification.contact_emails
  name: contact_emails
  summary: 'Email addresses to send the budget notification to when the threshold
    is exceeded. Must have at

    least one contact email or contact group specified at the Subscription or Resource
    Group

    scopes. All other scopes must have at least one contact email specified. Required.'
  signature: 'contact_emails: list[str]'
- uid: azure.mgmt.consumption.models.Notification.contact_groups
  name: contact_groups
  summary: 'Action groups to send the budget notification to when the threshold is
    exceeded. Must be

    provided as a fully qualified Azure resource id. Only supported at Subscription
    or Resource

    Group scopes.'
  signature: 'contact_groups: list[str] | None'
- uid: azure.mgmt.consumption.models.Notification.contact_roles
  name: contact_roles
  summary: Contact roles to send the budget notification to when the threshold is
    exceeded.
  signature: 'contact_roles: list[str] | None'
- uid: azure.mgmt.consumption.models.Notification.enabled
  name: enabled
  summary: The notification is enabled or not. Required.
  signature: 'enabled: bool'
- uid: azure.mgmt.consumption.models.Notification.locale
  name: locale
  summary: '"en-us",

    "ja-jp", "zh-cn", "de-de", "es-es", "fr-fr", "it-it", "ko-kr", "pt-br",

    "ru-ru", "zh-tw", "cs-cz", "pl-pl", "tr-tr", "da-dk", "en-gb", "hu-hu",

    "nb-no", "nl-nl", "pt-pt", and "sv-se".'
  signature: 'locale: str | _models.CultureCode | None'
- uid: azure.mgmt.consumption.models.Notification.operator
  name: operator
  summary: '"EqualTo", "GreaterThan", and

    "GreaterThanOrEqualTo".'
  signature: 'operator: str | _models.OperatorType'
- uid: azure.mgmt.consumption.models.Notification.threshold
  name: threshold
  summary: 'Threshold value associated with a notification. Notification is sent when
    the cost exceeded the

    threshold. It is always percent and has to be between 0 and 1000. Required.'
  signature: 'threshold: Decimal'
- uid: azure.mgmt.consumption.models.Notification.threshold_type
  name: threshold_type
  summary: '"Actual" and "Forecasted".'
  signature: 'threshold_type: str | _models.ThresholdType | None'
