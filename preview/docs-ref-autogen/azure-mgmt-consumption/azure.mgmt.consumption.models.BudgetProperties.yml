### YamlMime:PythonClass
uid: azure.mgmt.consumption.models.BudgetProperties
name: BudgetProperties
fullName: azure.mgmt.consumption.models.BudgetProperties
module: azure.mgmt.consumption.models
summary: The properties of the budget.
constructor:
  syntax: 'BudgetProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The category of the budget, whether the budget tracks cost or usage.
    Required.

    "Cost"'
  name: category
  types:
  - <xref:str>
  - <xref:azure.mgmt.consumption.models.CategoryType>
- description: The total amount of cost to track with the budget. Required.
  name: amount
  types:
  - <xref:decimal.Decimal>
- description: 'The time covered by a budget. Tracking of the amount will be reset
    based on

    the time grain. BillingMonth, BillingQuarter, and BillingAnnual are only supported
    by WD

    customers. Required. Known values are: "Monthly", "Quarterly", "Annually", "BillingMonth",

    "BillingQuarter", and "BillingAnnual".'
  name: time_grain
  types:
  - <xref:str>
  - <xref:azure.mgmt.consumption.models.TimeGrainType>
- description: 'Has start and end date of the budget. The start date must be first
    of the

    month and should be less than the end date. Budget start date must be on or after
    June 1, 2017.

    Future start date should not be more than twelve months. Past start date should  be
    selected

    within the timegrain period. There are no restrictions on the end date. Required.'
  name: time_period
  types:
  - <xref:azure.mgmt.consumption.models.BudgetTimePeriod>
- description: May be used to filter budgets by user-specified dimensions and/or tags.
  name: filter
  types:
  - <xref:azure.mgmt.consumption.models.BudgetFilter>
- description: The current amount of cost which is being tracked for a budget.
  name: current_spend
  types:
  - <xref:azure.mgmt.consumption.models.CurrentSpend>
- description: 'Dictionary of notifications associated with the budget. Budget can
    have up

    to five notifications.'
  name: notifications
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.consumption.models.Notification>]
- description: The forecasted cost which is being tracked for a budget.
  name: forecast_spend
  types:
  - <xref:azure.mgmt.consumption.models.ForecastSpend>
attributes:
- uid: azure.mgmt.consumption.models.BudgetProperties.amount
  name: amount
  summary: The total amount of cost to track with the budget. Required.
  signature: 'amount: Decimal'
- uid: azure.mgmt.consumption.models.BudgetProperties.category
  name: category
  summary: The category of the budget, whether the budget tracks cost or usage. Required.
    "Cost"
  signature: 'category: str | _models.CategoryType'
- uid: azure.mgmt.consumption.models.BudgetProperties.current_spend
  name: current_spend
  summary: The current amount of cost which is being tracked for a budget.
  signature: 'current_spend: _models.CurrentSpend | None'
- uid: azure.mgmt.consumption.models.BudgetProperties.filter
  name: filter
  summary: May be used to filter budgets by user-specified dimensions and/or tags.
  signature: 'filter: _models.BudgetFilter | None'
- uid: azure.mgmt.consumption.models.BudgetProperties.forecast_spend
  name: forecast_spend
  summary: The forecasted cost which is being tracked for a budget.
  signature: 'forecast_spend: _models.ForecastSpend | None'
- uid: azure.mgmt.consumption.models.BudgetProperties.notifications
  name: notifications
  summary: 'Dictionary of notifications associated with the budget. Budget can have
    up to five

    notifications.'
  signature: 'notifications: dict[str, ''_models.Notification''] | None'
- uid: azure.mgmt.consumption.models.BudgetProperties.time_grain
  name: time_grain
  summary: 'The time covered by a budget. Tracking of the amount will be reset based
    on the time grain.

    BillingMonth, BillingQuarter, and BillingAnnual are only supported by WD customers.
    Required.

    Known values are: "Monthly", "Quarterly", "Annually", "BillingMonth",

    "BillingQuarter", and "BillingAnnual".'
  signature: 'time_grain: str | _models.TimeGrainType'
- uid: azure.mgmt.consumption.models.BudgetProperties.time_period
  name: time_period
  summary: 'Has start and end date of the budget. The start date must be first of
    the month and should be

    less than the end date. Budget start date must be on or after June 1, 2017. Future
    start date

    should not be more than twelve months. Past start date should  be selected within
    the timegrain

    period. There are no restrictions on the end date. Required.'
  signature: 'time_period: _models.BudgetTimePeriod'
