### YamlMime:PythonClass
uid: azure.mgmt.consumption.models.ReservationSummaryProperties
name: ReservationSummaryProperties
fullName: azure.mgmt.consumption.models.ReservationSummaryProperties
module: azure.mgmt.consumption.models
summary: The properties of the reservation summary.
constructor:
  syntax: 'ReservationSummaryProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The reservation order ID is the identifier for a reservation

    purchase. Each reservation order ID represents a single purchase transaction.
    A reservation

    order contains reservations. The reservation order specifies the VM size and region
    for the

    reservations.'
  name: reservation_order_id
  types:
  - <xref:str>
- description: 'The reservation ID is the identifier of a reservation within a

    reservation order. Each reservation is the grouping for applying the benefit scope
    and also

    specifies the number of instances to which the reservation benefit can be applied
    to.'
  name: reservation_id
  types:
  - <xref:str>
- description: 'This is the ARM Sku name. It can be used to join with the serviceType
    field in

    additional info in usage records.'
  name: sku_name
  types:
  - <xref:str>
- description: 'This is the total hours reserved. E.g. if reservation for 1 instance
    was

    made on 1 PM, this will be 11 hours for that day and 24 hours from subsequent
    days.'
  name: reserved_hours
  types:
  - <xref:decimal.Decimal>
- description: 'Data corresponding to the utilization record. If the grain of data
    is

    monthly, it will be first day of month.'
  name: usage_date
  types:
  - <xref:datetime.datetime>
- description: Total used hours by the reservation.
  name: used_hours
  types:
  - <xref:decimal.Decimal>
- description: 'This is the minimum hourly utilization in the usage time (day

    or month). E.g. if usage record corresponds to 12/10/2017 and on that for hour
    4 and 5,

    utilization was 10%, this field will return 10% for that day.'
  name: min_utilization_percentage
  types:
  - <xref:decimal.Decimal>
- description: 'This is average utilization for the entire time range. (day

    or month depending on the grain).'
  name: avg_utilization_percentage
  types:
  - <xref:decimal.Decimal>
- description: 'This is the maximum hourly utilization in the usage time (day

    or month). E.g. if usage record corresponds to 12/10/2017 and on that for hour
    4 and 5,

    utilization was 100%, this field will return 100% for that day.'
  name: max_utilization_percentage
  types:
  - <xref:decimal.Decimal>
- description: The reservation kind.
  name: kind
  types:
  - <xref:str>
- description: This is the purchased quantity for the reservationId.
  name: purchased_quantity
  types:
  - <xref:decimal.Decimal>
- description: This is the remaining quantity for the reservationId.
  name: remaining_quantity
  types:
  - <xref:decimal.Decimal>
- description: 'This is the total count of instances that are reserved for the

    reservationId.'
  name: total_reserved_quantity
  types:
  - <xref:decimal.Decimal>
- description: This is the used quantity for the reservationId.
  name: used_quantity
  types:
  - <xref:decimal.Decimal>
- description: This is the utilized percentage for the reservation Id.
  name: utilized_percentage
  types:
  - <xref:decimal.Decimal>
