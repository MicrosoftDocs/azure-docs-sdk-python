constructor:
  syntax: ReservationTransactionsOperations(*args, **kwargs)
methods:
- uid: azure.mgmt.consumption.operations.ReservationTransactionsOperations.list
  name: list
  summary: 'List of transactions for reserved instances on billing account scope.
    Note: The refund

    transactions are posted along with its purchase transaction (i.e. in the purchase
    billing

    month). For example, The refund is requested in May 2021. This refund transaction
    will have

    event date as May 2021 but the billing month as April 2020 when the reservation
    purchase was

    made. Note: ARM has a payload size limit of 12MB, so currently callers get 400
    when the

    response size exceeds the ARM limit. In such cases, API call should be made with
    smaller date

    ranges.'
  signature: 'list(billing_account_id: str, *, filter: str | None = None, use_markup_if_partner:
    bool | None = None, preview_markup_percentage: Decimal | None = None, **kwargs:
    Any) -> ItemPaged[ReservationTransaction]'
  parameters:
  - name: billing_account_id
    description: BillingAccount ID. Required.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: filter
    description: 'Filter reservation transactions by date range. The properties/EventDate
      for

      start date and end date. The filter supports ''le'' and  ''ge''. Note: API returns
      data for the

      entire start date''s and end date''s billing month. For example, filter

      properties/eventDate+ge+2020-01-01+AND+properties/eventDate+le+2020-12-29 will
      include data for

      the entire December 2020 month (i.e. will contain records for dates December
      30 and 31).

      Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: use_markup_if_partner
    description: 'Applies mark up to the transactions if the caller is a partner.

      Default value is None.'
    defaultValue: None
    types:
    - <xref:bool>
  - name: preview_markup_percentage
    description: 'Preview markup percentage to be applied. Default value is

      None.'
    defaultValue: None
    types:
    - <xref:decimal.Decimal>
  return:
    description: An iterator like instance of ReservationTransaction
    types:
    - <xref:azure.core.paging.ItemPaged>[<xref:azure.mgmt.consumption.models.ReservationTransaction>]
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.mgmt.consumption.operations.ReservationTransactionsOperations.list_by_billing_profile
