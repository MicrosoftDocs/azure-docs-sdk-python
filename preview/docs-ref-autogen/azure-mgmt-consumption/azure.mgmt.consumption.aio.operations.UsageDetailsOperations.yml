### YamlMime:PythonClass
uid: azure.mgmt.consumption.aio.operations.UsageDetailsOperations
name: UsageDetailsOperations
fullName: azure.mgmt.consumption.aio.operations.UsageDetailsOperations
module: azure.mgmt.consumption.aio.operations
summary: "> [!WARNING]\n> DO NOT instantiate this class directly.\n>\n> \n>\n> Instead,\
  \ you should access the following operations through\n>\n> <xref:azure.mgmt.consumption.aio.ConsumptionManagementClient>'s\n\
  >\n> <xref:usage_details> attribute.\n>"
constructor:
  syntax: UsageDetailsOperations(*args, **kwargs)
methods:
- uid: azure.mgmt.consumption.aio.operations.UsageDetailsOperations.list
  name: list
  summary: 'Lists the usage details for the defined scope. Usage details are available
    via this API only

    for May 1, 2014 or later.


    **Note:Microsoft will be retiring the Consumption Usage Details API at some point
    in the

    future. We do not recommend that you take a new dependency on this API. Please
    use the Cost

    Details API instead. We will notify customers once a date for retirement has been

    determined.For Learn more,see [Generate Cost Details Report - Create

    Operation](https://learn.microsoft.com/en-us/rest/api/cost-management/generate-cost-details-report/create-operation?tabs=HTTP)**.'
  signature: 'list(scope: str, *, expand: str | None = None, filter: str | None =
    None, skiptoken: str | None = None, top: int | None = None, metric: str | Metrictype
    | None = None, **kwargs: Any) -> AsyncItemPaged[UsageDetail]'
  parameters:
  - name: scope
    description: The fully qualified Azure Resource manager identifier of the resource.
      Required.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: expand
    description: 'May be used to expand the properties/additionalInfo or properties/meterDetails

      within a list of usage details. By default, these fields are not included when
      listing usage

      details. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: filter
    description: 'May be used to filter usageDetails by properties/resourceGroup,

      properties/resourceName, properties/resourceId, properties/chargeType,

      properties/reservationId, properties/publisherType or tags. The filter supports
      ''eq'', ''lt'',

      ''gt'', ''le'', ''ge'', and ''and''. It does not currently support ''ne'', ''or'',
      or ''not''. Tag filter is

      a key value pair string where key and value is separated by a colon (:). PublisherType
      Filter

      accepts two values azure and marketplace and it is currently supported for Web
      Direct Offer

      Type. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: skiptoken
    description: 'Skiptoken is only used if a previous operation returned a partial
      result.

      If a previous response contains a nextLink element, the value of the nextLink
      element will

      include a skiptoken parameter that specifies a starting point to use for subsequent
      calls.

      Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: top
    description: 'May be used to limit the number of results to the most recent N
      usageDetails.

      Default value is None.'
    defaultValue: None
    types:
    - <xref:int>
  - name: metric
    description: 'Allows to select different type of cost/usage records. Known values
      are:

      "actualcost", "amortizedcost", and "usage". Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
    - <xref:azure.mgmt.consumption.models.Metrictype>
  return:
    description: An iterator like instance of UsageDetail
    types:
    - <xref:azure.core.async_paging.AsyncItemPaged>[<xref:azure.mgmt.consumption.models.UsageDetail>]
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
