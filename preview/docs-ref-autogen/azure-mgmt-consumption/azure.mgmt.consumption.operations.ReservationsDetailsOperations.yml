- uid: azure.mgmt.consumption.operations.ReservationsDetailsOperations.list
  name: list
  summary: 'Lists the reservations details for provided date range. Note: ARM has
    a payload size limit of

    12MB, so currently callers get 400 when the response size exceeds the ARM limit.
    If the data

    size is too large, customers may also get 504 as the API timed out preparing the
    data. In such

    cases, API call should be made with smaller date ranges or a call to Generate
    Reservation

    Details Report API should be made as it is asynchronous and will not run into
    response size

    time outs.'
  signature: 'list(resource_scope: str, *, start_date: str | None = None, end_date:
    str | None = None, filter: str | None = None, reservation_id: str | None = None,
    reservation_order_id: str | None = None, **kwargs: Any) -> ItemPaged[ReservationDetail]'
  parameters:
  - name: resource_scope
    description: 'The fully qualified Azure Resource manager identifier of the resource.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: start_date
    description: 'Start date. Only applicable when querying with billing profile.
      Default

      value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: end_date
    description: 'End date. Only applicable when querying with billing profile. Default
      value

      is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: filter
    description: 'Filter reservation details by date range. The properties/UsageDate
      for start

      date and end date. The filter supports ''le'' and  ''ge''. Not applicable when
      querying with

      billing profile. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: reservation_id
    description: 'Reservation Id GUID. Only valid if reservationOrderId is also

      provided. Filter to a specific reservation. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: reservation_order_id
    description: 'Reservation Order Id GUID. Required if reservationId is

      provided. Filter to a specific reservation order. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  return:
    description: An iterator like instance of ReservationDetail
    types:
    - <xref:azure.core.paging.ItemPaged>[<xref:azure.mgmt.consumption.models.ReservationDetail>]
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
