- uid: azure.ai.agentserver.invocations.InvocationAgentServerHost.register_server_version
  name: register_server_version
  summary: "Register a version segment for the `x-platform-server` header.\n\nProtocol\
    \ packages (e.g. responses, invocations) call this in their\n`__init__` to add\
    \ their own portion.  Handler developers can also\ncall it to append a custom\
    \ version string.  Duplicates are ignored.\n\nUse <xref:azure.ai.agentserver.core.build_server_version>\
    \ to\nbuild a standard segment:\n\n<!-- literal_block {\"ids\": [], \"classes\"\
    : [], \"names\": [], \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\"\
    , \"language\": \"default\", \"force\": false, \"linenos\": false} -->\n\n````default\n\
    \n   from azure.ai.agentserver.core import build_server_version\n\n   app.register_server_version(\n\
    \       build_server_version(\"my-library\", \"2.0.0\")\n   )\n   ````"
  signature: 'register_server_version(version_segment: str) -> None'
  parameters:
  - name: version_segment
    description: The version string to register.
    isRequired: true
    types:
    - <xref:str>
  exceptions:
  - type: ValueError
    description: If *version_segment* is empty or whitespace-only.
