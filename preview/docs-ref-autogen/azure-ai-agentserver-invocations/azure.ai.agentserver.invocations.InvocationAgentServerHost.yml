summary: "Invocation protocol host for Azure AI Hosted Agents.\n\nA <xref:azure.ai.agentserver.core.AgentServerHost>\
  \ subclass that adds\nthe invocation protocol endpoints.  Use the decorator methods\
  \ to wire\nhandler functions to the endpoints.\n\nFor multi-protocol agents, compose\
  \ via cooperative inheritance:\n\n<!-- literal_block {\"ids\": [], \"classes\":\
  \ [], \"names\": [], \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\"\
  , \"language\": \"default\", \"force\": false, \"linenos\": false} -->\n\n````default\n\
  \n   class MyHost(InvocationAgentServerHost, ResponsesAgentServerHost):\n      \
  \ pass\n   ````\n\nUsage:\n\n<!-- literal_block {\"ids\": [], \"classes\": [], \"\
  names\": [], \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\", \"\
  language\": \"default\", \"force\": false, \"linenos\": false} -->\n\n````default\n\
  \n   from azure.ai.agentserver.invocations import InvocationAgentServerHost\n\n\
  \   app = InvocationAgentServerHost()\n\n   @app.invoke_handler\n   async def handle(request):\n\
  \       return JSONResponse({\"ok\": True})\n\n   app.run()\n   ````"
