- uid: azure.ai.agentserver.invocations.InvocationAgentServerHost.sse_keepalive_stream
  name: sse_keepalive_stream
  summary: 'Interleave SSE keep-alive comment frames into a streaming body.


    Emits `b": keep-alive\n\n"` whenever the upstream iterator has not

    produced a chunk within *interval* seconds.  This prevents

    proxies/load-balancers from closing idle connections.'
  signature: 'async static sse_keepalive_stream(iterator: AsyncIterable[str | bytes
    | memoryview], interval: int) -> AsyncIterator[str | bytes | memoryview]'
  parameters:
  - name: iterator
    description: The async iterable to wrap.
    isRequired: true
    types:
    - <xref:typing.AsyncIterable>[<xref:str>
    - <xref:bytes>
    - <xref:memoryview>]
  - name: interval
    description: Seconds between keep-alive frames. Must be > 0.
    isRequired: true
    types:
    - <xref:int>
  return:
    description: An async iterator with interleaved keep-alive frames.
    types:
    - <xref:typing.AsyncIterator>[<xref:str>
    - <xref:bytes>
    - <xref:memoryview>]
