name: AgentSessionConfig
fullName: azure.ai.voicelive.aio.AgentSessionConfig
module: azure.ai.voicelive.aio
summary: 'Configuration for agent session connection.


  This TypedDict defines the parameters needed to connect to a Voice Live

  session using an Azure AI Foundry agent.'
constructor:
  syntax: AgentSessionConfig()
  keywordOnlyParameters:
