    description: The name of the agent to use. Required.
  - name: project_name
    description: The name of the Foundry project containing the agent. Required.
  - name: agent_version
    description: The version of the agent to use.
  - name: conversation_id
    description: The ID of an existing conversation to continue.
  - name: authentication_identity_client_id
    description: The client ID for authentication identity.
  - name: foundry_resource_override
    description: An optional override for the Foundry resource.
