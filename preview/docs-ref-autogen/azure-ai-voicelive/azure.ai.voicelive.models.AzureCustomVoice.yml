### YamlMime:PythonClass
uid: azure.ai.voicelive.models.AzureCustomVoice
name: AzureCustomVoice
fullName: azure.ai.voicelive.models.AzureCustomVoice
module: azure.ai.voicelive.models
summary: Azure custom voice configuration.
constructor:
  syntax: 'AzureCustomVoice(*args: Any, **kwargs: Any)'
variables:
- description: Required. Azure custom voice.
  name: type
  types:
  - <xref:str>
  - <xref:azure.ai.voicelive.models.AZURE_CUSTOM>
- description: Voice name cannot be empty. Required.
  name: name
  types:
  - <xref:str>
- description: Endpoint ID cannot be empty. Required.
  name: endpoint_id
  types:
  - <xref:str>
- description: Temperature must be between 0.0 and 1.0.
  name: temperature
  types:
  - <xref:float>
- description: URL of a custom lexicon file for pronunciation customization.
  name: custom_lexicon_url
  types:
  - <xref:str>
- description: URL of a custom text normalization endpoint.
  name: custom_text_normalization_url
  types:
  - <xref:str>
- description: 'Preferred locales in BCP-47 format that change the accents of languages.

    If not set, TTS uses the default accent for each language (e.g., American English
    for English,

    Mexican Spanish for Spanish). Setting this to `["en-GB", "es-ES"]` changes the
    English accent

    to British English and the Spanish accent to European Spanish, while TTS can still
    speak other

    languages like French or Chinese with their default accents.'
  name: prefer_locales
  types:
  - <xref:list>[<xref:str>]
- description: 'Enforced locale in BCP-47 format for TTS output. If set, TTS will
    always use the

    specified locale to speak. For example, setting locale to `en-US` forces American
    English

    accent for all text content, even if the text is in another language, and TTS
    will output

    silence for unsupported languages (e.g., Chinese text with `en-US` locale). If
    not set, TTS

    automatically detects the language from the text content.'
  name: locale
  types:
  - <xref:str>
- description: Speaking style for the voice (e.g., 'cheerful', 'sad').
  name: style
  types:
  - <xref:str>
- description: 'Pitch adjustment for the voice output. Follows the same rules as the
    `pitch`

    attribute of the SSML `prosody` element (see

    [https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody](https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody)).

    Typical values: a named level (`x-low`, `low`, `medium`, `high`, `x-high`,

    `default`), a relative change (e.g., `+10%`, `-5%`, `+50Hz`, `-2st`), or an absolute

    frequency (e.g., `200Hz`).'
  name: pitch
  types:
  - <xref:str>
- description: 'Speaking rate adjustment for the voice output. Follows the same rules
    as the

    `rate` attribute of the SSML `prosody` element (see

    [https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody](https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody)).

    Typical values: a named level (`x-slow`, `slow`, `medium`, `fast`, `x-fast`,

    `default`), a relative percentage (e.g., `+20%`, `-10%`), or a non-negative multiplier

    (e.g., `0.5`, `1.5`).'
  name: rate
  types:
  - <xref:str>
- description: 'Volume adjustment for the voice output. Follows the same rules as
    the `volume`

    attribute of the SSML `prosody` element (see

    [https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody](https://learn.microsoft.com/azure/ai-services/speech-service/speech-synthesis-markup-voice#adjust-prosody)).

    Typical values: a named level (`silent`, `x-soft`, `soft`, `medium`, `loud`,

    `x-loud`, `default`), an absolute number from 0.0 to 100.0, or a relative change
    (e.g.,

    `+10`, `-6dB`).'
  name: volume
  types:
  - <xref:str>
