### YamlMime:PythonClass
uid: azure.mgmt.apimanagement.models.HostnameConfiguration
name: HostnameConfiguration
fullName: azure.mgmt.apimanagement.models.HostnameConfiguration
module: azure.mgmt.apimanagement.models
summary: Custom hostname configuration.
constructor:
  syntax: 'HostnameConfiguration(*args: Any, **kwargs: Any)'
variables:
- description: 'Hostname type. Required. Known values are: "Proxy", "Portal", "Management",
    "Scm",

    "DeveloperPortal", and "ConfigurationApi".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.HostnameType>
- description: Hostname to configure on the Api Management service. Required.
  name: host_name
  types:
  - <xref:str>
- description: 'Url to the KeyVault Secret containing the Ssl Certificate. If absolute
    Url

    containing version is provided, auto-update of ssl certificate will not work.
    This requires Api

    Management service to be configured with aka.ms/apimmsi. The secret should be
    of type

    *application/x-pkcs12*.'
  name: key_vault_id
  types:
  - <xref:str>
- description: 'System or User Assigned Managed identity clientId as generated by

    Azure AD, which has GET access to the keyVault containing the SSL certificate.'
  name: identity_client_id
  types:
  - <xref:str>
- description: Base64 Encoded certificate.
  name: encoded_certificate
  types:
  - <xref:str>
- description: Certificate Password.
  name: certificate_password
  types:
  - <xref:str>
- description: 'Specify true to setup the certificate associated with this Hostname

    as the Default SSL Certificate. If a client does not send the SNI header, then
    this will be the

    certificate that will be challenged. The property is useful if a service has multiple
    custom

    hostname enabled and it needs to decide on the default ssl certificate. The setting
    only

    applied to gateway Hostname Type.'
  name: default_ssl_binding
  types:
  - <xref:bool>
- description: 'Specify true to always negotiate client certificate on the

    hostname. Default Value is false.'
  name: negotiate_client_certificate
  types:
  - <xref:bool>
- description: Certificate information.
  name: certificate
  types:
  - <xref:azure.mgmt.apimanagement.models.CertificateInformation>
- description: 'Certificate Source. Known values are: "Managed", "KeyVault",

    "Custom", and "BuiltIn".'
  name: certificate_source
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.CertificateSource>
- description: 'Certificate Status. Known values are: "Completed", "Failed", and

    "InProgress".'
  name: certificate_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.CertificateStatus>
attributes:
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.certificate
  name: certificate
  summary: Certificate information.
  signature: 'certificate: _models.CertificateInformation | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.certificate_password
  name: certificate_password
  summary: Certificate Password.
  signature: 'certificate_password: str | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.certificate_source
  name: certificate_source
  summary: '"Managed", "KeyVault", "Custom", and "BuiltIn".'
  signature: 'certificate_source: str | _models.CertificateSource | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.certificate_status
  name: certificate_status
  summary: '"Completed", "Failed", and "InProgress".'
  signature: 'certificate_status: str | _models.CertificateStatus | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.default_ssl_binding
  name: default_ssl_binding
  summary: 'Specify true to setup the certificate associated with this Hostname as
    the Default SSL

    Certificate. If a client does not send the SNI header, then this will be the certificate
    that

    will be challenged. The property is useful if a service has multiple custom hostname
    enabled

    and it needs to decide on the default ssl certificate. The setting only applied
    to gateway

    Hostname Type.'
  signature: 'default_ssl_binding: bool | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.encoded_certificate
  name: encoded_certificate
  summary: Base64 Encoded certificate.
  signature: 'encoded_certificate: str | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.host_name
  name: host_name
  summary: Hostname to configure on the Api Management service. Required.
  signature: 'host_name: str'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.identity_client_id
  name: identity_client_id
  summary: 'System or User Assigned Managed identity clientId as generated by Azure
    AD, which has GET

    access to the keyVault containing the SSL certificate.'
  signature: 'identity_client_id: str | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.key_vault_id
  name: key_vault_id
  summary: 'Url to the KeyVault Secret containing the Ssl Certificate. If absolute
    Url containing version

    is provided, auto-update of ssl certificate will not work. This requires Api Management
    service

    to be configured with aka.ms/apimmsi. The secret should be of type *application/x-pkcs12*.'
  signature: 'key_vault_id: str | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.negotiate_client_certificate
  name: negotiate_client_certificate
  summary: Specify true to always negotiate client certificate on the hostname. Default
    Value is false.
  signature: 'negotiate_client_certificate: bool | None'
- uid: azure.mgmt.apimanagement.models.HostnameConfiguration.type
  name: type
  summary: '"Proxy", "Portal", "Management", "Scm",

    "DeveloperPortal", and "ConfigurationApi".'
  signature: 'type: str | _models.HostnameType'
