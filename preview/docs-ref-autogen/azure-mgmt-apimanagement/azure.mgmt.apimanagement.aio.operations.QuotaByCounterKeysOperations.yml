  - name: service_name
    description: The name of the API Management service. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: quota_counter_key
    description: 'Quota counter key identifier. This is the result of expression

      defined in `counter-key` attribute of the quota-by-key policy. For example,
      if you specify

      `counter-key="boo"` in the policy, then it''s accessible by `"boo"` counter
