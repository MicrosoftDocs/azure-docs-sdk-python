### YamlMime:PythonClass
uid: azure.mgmt.apimanagement.models.IdentityProviderCreateContractProperties
name: IdentityProviderCreateContractProperties
fullName: azure.mgmt.apimanagement.models.IdentityProviderCreateContractProperties
module: azure.mgmt.apimanagement.models
summary: 'The external Identity Providers like Facebook, Google, Microsoft, Twitter
  or Azure Active

  Directory which can be used to enable access to the API Management service developer
  portal for

  all users.'
constructor:
  syntax: 'IdentityProviderCreateContractProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Identity Provider Type identifier. Known values are: "facebook", "google",

    "microsoft", "twitter", "aad", and "aadB2C".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.IdentityProviderType>
- description: The TenantId to use instead of Common when logging into Active Directory.
  name: signin_tenant
  types:
  - <xref:str>
- description: List of Allowed Tenants when configuring Azure Active Directory login.
  name: allowed_tenants
  types:
  - <xref:list>[<xref:str>]
- description: OpenID Connect discovery endpoint hostname for AAD or AAD B2C.
  name: authority
  types:
  - <xref:str>
- description: Signup Policy Name. Only applies to AAD B2C Identity Provider.
  name: signup_policy_name
  types:
  - <xref:str>
- description: Signin Policy Name. Only applies to AAD B2C Identity Provider.
  name: signin_policy_name
  types:
  - <xref:str>
- description: 'Profile Editing Policy Name. Only applies to AAD B2C

    Identity Provider.'
  name: profile_editing_policy_name
  types:
  - <xref:str>
- description: 'Password Reset Policy Name. Only applies to AAD B2C Identity

    Provider.'
  name: password_reset_policy_name
  types:
  - <xref:str>
- description: 'The client library to be used in the developer portal. Only applies
    to

    AAD and AAD B2C Identity Provider.'
  name: client_library
  types:
  - <xref:str>
- description: 'Client Id of the Application in the external Identity Provider. It
    is App ID

    for Facebook login, Client ID for Google login, App ID for Microsoft. Required.'
  name: client_id
  types:
  - <xref:str>
- description: 'Client secret of the Application in external Identity Provider, used
    to

    authenticate login request. For example, it is App Secret for Facebook login,
    API Key for

    Google login, Public Key for Microsoft. This property will not be filled on ''GET''
    operations!

    Use ''/listSecrets'' POST request to get the value. Required.'
  name: client_secret
  types:
  - <xref:str>
- description: Certificate full resource ID used in external Identity Provider.
  name: certificate_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.apimanagement.models.IdentityProviderCreateContractProperties.certificate_id
  name: certificate_id
  summary: Certificate full resource ID used in external Identity Provider.
  signature: 'certificate_id: str | None'
- uid: azure.mgmt.apimanagement.models.IdentityProviderCreateContractProperties.client_id
  name: client_id
  summary: 'Client Id of the Application in the external Identity Provider. It is
    App ID for Facebook

    login, Client ID for Google login, App ID for Microsoft. Required.'
  signature: 'client_id: str'
- uid: azure.mgmt.apimanagement.models.IdentityProviderCreateContractProperties.client_secret
  name: client_secret
  summary: 'Client secret of the Application in external Identity Provider, used to
    authenticate login

    request. For example, it is App Secret for Facebook login, API Key for Google
    login, Public Key

    for Microsoft. This property will not be filled on ''GET'' operations! Use ''/listSecrets''
    POST

    request to get the value. Required.'
  signature: 'client_secret: str'
