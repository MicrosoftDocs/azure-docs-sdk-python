### YamlMime:PythonClass
uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters
name: ProductEntityBaseParameters
fullName: azure.mgmt.apimanagement.models.ProductEntityBaseParameters
module: azure.mgmt.apimanagement.models
summary: Product Entity Base Parameters.
constructor:
  syntax: 'ProductEntityBaseParameters(*args: Any, **kwargs: Any)'
variables:
- description: Product description. May include HTML formatting tags.
  name: description
  types:
  - <xref:str>
- description: 'Product terms of use. Developers trying to subscribe to the product
    will be

    presented and required to accept these terms before they can complete the subscription
    process.'
  name: terms
  types:
  - <xref:str>
- description: 'Whether a product subscription is required for accessing APIs

    included in this product. If true, the product is referred to as "protected" and
    a valid

    subscription key is required for a request to an API included in the product to
    succeed. If

    false, the product is referred to as "open" and requests to an API included in
    the product can

    be made without a subscription key. If property is omitted when creating a new
    product it''s

    value is assumed to be true.'
  name: subscription_required
  types:
  - <xref:bool>
- description: 'whether subscription approval is required. If false, new subscriptions

    will be approved automatically enabling developers to call the product''s APIs
    immediately after

    subscribing. If true, administrators must manually approve the subscription before
    the

    developer can any of the product''s APIs. Can be present only if subscriptionRequired
    property

    is present and has a value of false.'
  name: approval_required
  types:
  - <xref:bool>
- description: 'Whether the number of subscriptions a user can have to this product

    at the same time. Set to null or omit to allow unlimited per user subscriptions.
    Can be present

    only if subscriptionRequired property is present and has a value of false.'
  name: subscriptions_limit
  types:
  - <xref:int>
- description: 'Type of supported authentication for the product. The application

    configuration is required for application-token authentication type. The subscription-key

    authentication type is used by default. If the property is omitted, the subscription-key

    authentication type is used.'
  name: authentication_type
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.mgmt.apimanagement.models.ProductAuthType>]
- description: 'Specifies identity provider settings needed to authorize applications
    API

    calls.'
  name: application
  types:
  - <xref:azure.mgmt.apimanagement.models.ProductEntityBaseParametersApplication>
- description: 'whether product is published or not. Published products are discoverable
    by users

    of developer portal. Non published products are visible only to administrators.
    Default state

    of Product is notPublished. Known values are: "notPublished" and "published".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.ProductState>
attributes:
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.application
  name: application
  summary: Specifies identity provider settings needed to authorize applications API
    calls.
  signature: 'application: _models.ProductEntityBaseParametersApplication | None'
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.approval_required
  name: approval_required
  summary: 'whether subscription approval is required. If false, new subscriptions
    will be approved

    automatically enabling developers to call the product''s APIs immediately after
    subscribing. If

    true, administrators must manually approve the subscription before the developer
    can any of the

    product''s APIs. Can be present only if subscriptionRequired property is present
    and has a value

    of false.'
  signature: 'approval_required: bool | None'
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.authentication_type
  name: authentication_type
  summary: 'Type of supported authentication for the product. The application configuration
    is required for

    application-token authentication type. The subscription-key authentication type
    is used by

    default. If the property is omitted, the subscription-key authentication type
    is used.'
  signature: 'authentication_type: list[typing.Union[str, ForwardRef(''_models.ProductAuthType'')]]
    | None'
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.description
  name: description
  summary: Product description. May include HTML formatting tags.
  signature: 'description: str | None'
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.state
  name: state
  summary: 'whether product is published or not. Published products are discoverable
    by users of developer

    portal. Non published products are visible only to administrators. Default state
    of Product is

    notPublished. Known values are: "notPublished" and "published".'
  signature: 'state: str | _models.ProductState | None'
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.subscription_required
  name: subscription_required
  summary: 'Whether a product subscription is required for accessing APIs included
    in this product. If

    true, the product is referred to as "protected" and a valid subscription key is
    required for

    a request to an API included in the product to succeed. If false, the product
    is referred to as

    "open" and requests to an API included in the product can be made without a subscription
    key.

    If property is omitted when creating a new product it''s value is assumed to be
    true.'
  signature: 'subscription_required: bool | None'
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.subscriptions_limit
  name: subscriptions_limit
  summary: 'Whether the number of subscriptions a user can have to this product at
    the same time. Set to

    null or omit to allow unlimited per user subscriptions. Can be present only if

    subscriptionRequired property is present and has a value of false.'
  signature: 'subscriptions_limit: int | None'
- uid: azure.mgmt.apimanagement.models.ProductEntityBaseParameters.terms
  name: terms
  summary: 'Product terms of use. Developers trying to subscribe to the product will
    be presented and

    required to accept these terms before they can complete the subscription process.'
  signature: 'terms: str | None'
