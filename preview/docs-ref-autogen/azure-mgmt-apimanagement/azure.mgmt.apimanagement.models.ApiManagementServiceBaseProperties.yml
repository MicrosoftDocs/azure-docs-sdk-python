  name: platform_version
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.PlatformVersion>
- description: 'Status of legacy portal in the API Management service. Known values

    are: "Enabled" and "Disabled".'
  name: legacy_portal_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.LegacyPortalStatus>
- description: 'Status of developer portal in this API Management service. Known

    values are: "Enabled" and "Disabled".'
  name: developer_portal_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.DeveloperPortalStatus>
- description: 'Release Channel of this API Management service. Known values are:

    "Preview", "Default", and "Stable".'
  name: release_channel
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.ReleaseChannel>
- description: 'Zone Redundant Requirement when creating StandardV2 and PremiumV2.
    If

    this flag is set to True, will return a APIM service with Zone redundant or fail
    the request if

    any underneath component cannot be zone redundant.'
  name: zone_redundant
  types:
  - <xref:bool>
