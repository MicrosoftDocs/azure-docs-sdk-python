- uid: azure.mgmt.apimanagement.operations.CertificateOperations.list_by_service
  name: list_by_service
  summary: Lists a collection of all certificates in the specified service instance.
  signature: 'list_by_service(resource_group_name: str, service_name: str, *, filter:
