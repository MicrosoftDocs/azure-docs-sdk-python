uid: azure.mgmt.apimanagement.models.CarbonEmissionCategory
name: CarbonEmissionCategory
fullName: azure.mgmt.apimanagement.models.CarbonEmissionCategory
summary: 'Scope 2 carbon emission preference for the backend. When specified, the
  load balancer will

  optimize traffic flow by routing to regions that have carbon emission less than
  or equal to the

  specified category. However, when all other backends are not available it will route
  traffic to

  these regions anyway. This requires the backend to be attributed with ''azureRegion''

  information.'
module: azure.mgmt.apimanagement.models
