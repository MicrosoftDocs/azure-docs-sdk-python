### YamlMime:PythonClass
uid: azure.mgmt.apimanagement.models.LoggerContractProperties
name: LoggerContractProperties
fullName: azure.mgmt.apimanagement.models.LoggerContractProperties
module: azure.mgmt.apimanagement.models
summary: 'The Logger entity in API Management represents an event sink that you can
  use to log API

  Management events. Currently the Logger entity supports logging API Management events
  to Azure

  Event Hubs.'
constructor:
  syntax: 'LoggerContractProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Logger type. Required. Known values are: "azureEventHub",

    "applicationInsights", and "azureMonitor".'
  name: logger_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.LoggerType>
- description: Logger description.
  name: description
  types:
  - <xref:str>
- description: 'The name and SendRule connection string of the event hub for azureEventHub

    logger. Instrumentation key for applicationInsights logger.'
  name: credentials
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'Whether records are buffered in the logger before publishing. Default
    is

    assumed to be true.'
  name: is_buffered
  types:
  - <xref:bool>
- description: 'Azure Resource Id of a log target (either Azure Event Hub resource
    or Azure

    Application Insights resource).'
  name: resource_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.apimanagement.models.LoggerContractProperties.credentials
  name: credentials
  summary: 'The name and SendRule connection string of the event hub for azureEventHub
    logger.

    Instrumentation key for applicationInsights logger.'
  signature: 'credentials: dict[str, str] | None'
- uid: azure.mgmt.apimanagement.models.LoggerContractProperties.description
  name: description
  summary: Logger description.
  signature: 'description: str | None'
- uid: azure.mgmt.apimanagement.models.LoggerContractProperties.is_buffered
  name: is_buffered
  summary: Whether records are buffered in the logger before publishing. Default is
    assumed to be true.
  signature: 'is_buffered: bool | None'
- uid: azure.mgmt.apimanagement.models.LoggerContractProperties.logger_type
  name: logger_type
  summary: '"azureEventHub", "applicationInsights", and

    "azureMonitor".'
  signature: 'logger_type: str | _models.LoggerType'
- uid: azure.mgmt.apimanagement.models.LoggerContractProperties.resource_id
  name: resource_id
  summary: 'Azure Resource Id of a log target (either Azure Event Hub resource or
    Azure Application

    Insights resource).'
  signature: 'resource_id: str | None'
