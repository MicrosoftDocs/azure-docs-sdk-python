variables:
- description: 'The unique ARM id of the backend entity. The ARM id should refer to
    an already

    existing backend entity. Required.'
  name: id
  types:
  - <xref:str>
- description: 'The weight of the backend entity in the backend pool. Must be between
    0 and 100.

    It can be also null if the value not specified.'
  name: weight
  types:
  - <xref:int>
- description: 'The priority of the backend entity in the backend pool. Must be between
    0 and

    100. It can be also null if the value not specified.'
  name: priority
  types:
  - <xref:int>
- description: 'Scope 2 carbon emission preference for the backend. When

    specified, the load balancer will optimize traffic flow by routing to regions
    that have carbon

    emission less than or equal to the specified category. However, when all other
    backends are not

    available it will route traffic to these regions anyway. This requires the backend
    to be

    attributed with ''azureRegion'' information. Known values are: "VeryLow", "Low",
    "Medium",

    "High", and "VeryHigh".'
  name: preferred_carbon_emission
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.CarbonEmissionCategory>
