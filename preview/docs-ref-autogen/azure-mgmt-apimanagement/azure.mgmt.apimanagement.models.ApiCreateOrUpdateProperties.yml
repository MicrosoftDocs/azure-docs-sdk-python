    parameters to template ones. By default has value ''template''. Possible values:
    ''template'',

    ''query''. Known values are: "template" and "query".'
  name: translate_required_query_parameters_conduct
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.TranslateRequiredQueryParametersConduct>
