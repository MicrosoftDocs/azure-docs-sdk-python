    * *graphql* creates GraphQL API. \n\nNew types can be added in the future. Known\
    \ values are: \"http\", \"soap\", \"websocket\",\n\"graphql\", \"odata\", and\
    \ \"grpc\"."
  name: soap_api_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.SoapApiType>
