### YamlMime:PythonClass
uid: azure.mgmt.apimanagement.models.AdditionalLocation
name: AdditionalLocation
fullName: azure.mgmt.apimanagement.models.AdditionalLocation
module: azure.mgmt.apimanagement.models
summary: Description of an additional API Management resource location.
constructor:
  syntax: 'AdditionalLocation(*args: Any, **kwargs: Any)'
variables:
- description: 'The location name of the additional region among Azure Data center
    regions.

    Required.'
  name: location
  types:
  - <xref:str>
- description: SKU properties of the API Management service. Required.
  name: sku
  types:
  - <xref:azure.mgmt.apimanagement.models.ApiManagementServiceSkuProperties>
- description: A list of availability zones denoting where the resource needs to come
    from.
  name: zones
  types:
  - <xref:list>[<xref:str>]
- description: 'Public Static Load Balanced IP addresses of the API Management

    service in the additional location. Available only for Basic, Standard, Premium
    and Isolated

    SKU.'
  name: public_ip_addresses
  types:
  - <xref:list>[<xref:str>]
- description: 'Private Static Load Balanced IP addresses of the API Management

    service which is deployed in an Internal Virtual Network in a particular additional
    location.

    Available only for Basic, Standard, Premium and Isolated SKU.'
  name: private_ip_addresses
  types:
  - <xref:list>[<xref:str>]
- description: 'Public Standard SKU IP V4 based IP address to be associated with

    Virtual Network deployed service in the location. Supported only for Premium SKU
    being deployed

    in Virtual Network.'
  name: public_ip_address_id
  types:
  - <xref:str>
- description: Virtual network configuration for the location.
  name: virtual_network_configuration
  types:
  - <xref:azure.mgmt.apimanagement.models.VirtualNetworkConfiguration>
- description: Gateway URL of the API Management service in the Region.
  name: gateway_regional_url
  types:
  - <xref:str>
- description: 'Property can be used to enable NAT Gateway for this API Management

    service. Known values are: "Enabled" and "Disabled".'
  name: nat_gateway_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.NatGatewayState>
- description: 'Outbound public IPV4 address prefixes associated with NAT

    Gateway deployed service. Available only for Premium SKU on stv2 platform.'
  name: outbound_public_ip_addresses
  types:
  - <xref:list>[<xref:str>]
- description: 'Property only valid for an Api Management service deployed in multiple

    locations. This can be used to disable the gateway in this additional location.'
  name: disable_gateway
  types:
  - <xref:bool>
- description: 'Compute Platform Version running the service. Known values are:

    "undetermined", "stv1", "stv2", "mtv1", and "stv2.1".'
  name: platform_version
  types:
  - <xref:str>
  - <xref:azure.mgmt.apimanagement.models.PlatformVersion>
attributes:
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.disable_gateway
  name: disable_gateway
  summary: 'Property only valid for an Api Management service deployed in multiple
    locations. This can be

    used to disable the gateway in this additional location.'
  signature: 'disable_gateway: bool | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.gateway_regional_url
  name: gateway_regional_url
  summary: Gateway URL of the API Management service in the Region.
  signature: 'gateway_regional_url: str | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.location
  name: location
  summary: The location name of the additional region among Azure Data center regions.
    Required.
  signature: 'location: str'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.nat_gateway_state
  name: nat_gateway_state
  summary: 'Property can be used to enable NAT Gateway for this API Management service.
    Known values are:

    "Enabled" and "Disabled".'
  signature: 'nat_gateway_state: str | _models.NatGatewayState | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.outbound_public_ip_addresses
  name: outbound_public_ip_addresses
  summary: 'Outbound public IPV4 address prefixes associated with NAT Gateway deployed
    service. Available

    only for Premium SKU on stv2 platform.'
  signature: 'outbound_public_ip_addresses: list[str] | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.platform_version
  name: platform_version
  summary: '"undetermined", "stv1",

    "stv2", "mtv1", and "stv2.1".'
  signature: 'platform_version: str | _models.PlatformVersion | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.private_ip_addresses
  name: private_ip_addresses
  summary: 'Private Static Load Balanced IP addresses of the API Management service
    which is deployed in an

    Internal Virtual Network in a particular additional location. Available only for
    Basic,

    Standard, Premium and Isolated SKU.'
  signature: 'private_ip_addresses: list[str] | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.public_ip_address_id
  name: public_ip_address_id
  summary: 'Public Standard SKU IP V4 based IP address to be associated with Virtual
    Network deployed

    service in the location. Supported only for Premium SKU being deployed in Virtual
    Network.'
  signature: 'public_ip_address_id: str | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.public_ip_addresses
  name: public_ip_addresses
  summary: 'Public Static Load Balanced IP addresses of the API Management service
    in the additional

    location. Available only for Basic, Standard, Premium and Isolated SKU.'
  signature: 'public_ip_addresses: list[str] | None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.sku
  name: sku
  summary: SKU properties of the API Management service. Required.
  signature: 'sku: _models.ApiManagementServiceSkuProperties'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.virtual_network_configuration
  name: virtual_network_configuration
  summary: Virtual network configuration for the location.
  signature: 'virtual_network_configuration: _models.VirtualNetworkConfiguration |
    None'
- uid: azure.mgmt.apimanagement.models.AdditionalLocation.zones
  name: zones
  summary: A list of availability zones denoting where the resource needs to come
    from.
  signature: 'zones: list[str] | None'
