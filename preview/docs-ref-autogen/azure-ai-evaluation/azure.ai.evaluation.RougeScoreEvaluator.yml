### YamlMime:PythonClass
uid: azure.ai.evaluation.RougeScoreEvaluator
name: RougeScoreEvaluator
fullName: azure.ai.evaluation.RougeScoreEvaluator
module: azure.ai.evaluation
summary: "Calculates the ROUGE score for a given response and ground truth.\n\nThe\
  \ ROUGE score (Recall-Oriented Understudy for Gisting Evaluation) evaluates the\
  \ similarity between the\ngenerated text and reference text based on n-gram overlap,\
  \ including ROUGE-N (unigram, bigram, etc.), and\nROUGE-L (longest common subsequence).\
  \ It calculates precision, recall, and F1 scores to capture how well\nthe generated\
  \ text matches the reference text. Rouge type options are \"rouge1\" (Unigram overlap),\
  \ \"rouge2\"\n(Bigram overlap), \"rouge3\" (Trigram overlap), \"rouge4\" (4-gram\
  \ overlap), \"rouge5\" (5-gram overlap), \"rougeL\"\n(L-graph overlap)\n\nUse the\
  \ ROUGE score when you need a robust evaluation metric for text summarization, machine\
  \ translation, and\nother natural language processing tasks, especially when focusing\
  \ on recall and the ability to capture relevant\ninformation from the reference\
  \ text.\n\nROUGE scores range from 0 to 1, with higher scores indicating better\
  \ quality.\n:param rouge_type: The type of ROUGE score to calculate. Default is\
  \ \"rouge1\".\n:type rouge_type: str\n:param threshold: The threshold value to determine\
  \ if the evaluation passes or fails.\n\n   Can be either a float (applied to all\
  \ metrics) or a dictionary with separate thresholds for each metric\n   {\"precision\"\
  : float, \"recall\": float, \"f1_score\": float}. Default is 0.5."
constructor:
  syntax: 'RougeScoreEvaluator(rouge_type: RougeType, threshold: dict = {})'
  parameters:
  - name: rouge_type
    isRequired: true
  - name: threshold
    defaultValue: '{}'
examples:
- "Initialize with a specified threshold and call a RougeScoreEvaluator with a four-gram\
  \ rouge type.<!--[!code-python[Main](les\\evaluation_samples_threshold.py )]-->\n\
  \n<!-- literal_block {\"ids\": [], \"classes\": [], \"names\": [], \"dupnames\"\
  : [], \"backrefs\": [], \"source\": \"C:\\\\hostedtoolcache\\\\windows\\\\Python\\\
  \\3.11.10\\\\x64\\\\Lib\\\\site-packages\\\\py2docfx\\\\dist_temp\\\\10\\\\azure_ai_evaluation-1.4.0a20250321001\\\
  \\samples\\\\evaluation_samples_threshold.py\", \"xml:space\": \"preserve\", \"\
  force\": false, \"language\": \"python\", \"highlight_args\": {\"linenostart\":\
  \ 1}, \"linenos\": false} -->\n\n````python\n\n   from azure.ai.evaluation import\
  \ RougeScoreEvaluator, RougeType\n\n   rouge_evaluator = RougeScoreEvaluator(\n\
  \       rouge_type=RougeType.ROUGE_4, \n       threshold={\n           \"precision\"\
  : 0.5,\n           \"recall\": 0.5,\n           \"f1_score\": 0.5,\n       }\n \
  \  )\n   rouge_evaluator(response=\"Paris is the capital of France.\", ground_truth=\"\
  France's capital is Paris.\")\n\n   ````\n"
