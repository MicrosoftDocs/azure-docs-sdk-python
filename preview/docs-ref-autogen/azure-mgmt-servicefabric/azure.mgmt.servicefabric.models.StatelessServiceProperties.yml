### YamlMime:PythonClass
uid: azure.mgmt.servicefabric.models.StatelessServiceProperties
name: StatelessServiceProperties
fullName: azure.mgmt.servicefabric.models.StatelessServiceProperties
module: azure.mgmt.servicefabric.models
summary: The properties of a stateless service resource.
constructor:
  syntax: 'StatelessServiceProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The placement constraints as a string. Placement constraints are

    boolean expressions on node properties and allow for restricting a service to
    particular nodes

    based on the service requirements. For example, to place a service on nodes where
    NodeType is

    blue specify the following: "NodeColor == blue)".'
  name: placement_constraints
  types:
  - <xref:str>
- description: 'A list that describes the correlation of the service with other

    services.'
  name: correlation_scheme
  types:
  - <xref:list>[<xref:azure.mgmt.servicefabric.models.ServiceCorrelationDescription>]
- description: 'The service load metrics is given as an array of

    ServiceLoadMetricDescription objects.'
  name: service_load_metrics
  types:
  - <xref:list>[<xref:azure.mgmt.servicefabric.models.ServiceLoadMetricDescription>]
- description: 'A list that describes the correlation of the service with

    other services.'
  name: service_placement_policies
  types:
  - <xref:list>[<xref:azure.mgmt.servicefabric.models.ServicePlacementPolicyDescription>]
- description: 'Specifies the move cost for the service. Known values are: "Zero",

    "Low", "Medium", and "High".'
  name: default_move_cost
  types:
  - <xref:str>
  - <xref:azure.mgmt.servicefabric.models.MoveCost>
- description: 'The current deployment or provisioning state, which only appears in

    the response.'
  name: provisioning_state
  types:
  - <xref:str>
- description: The name of the service type.
  name: service_type_name
  types:
  - <xref:str>
- description: Describes how the service is partitioned.
  name: partition_description
  types:
  - <xref:azure.mgmt.servicefabric.models.PartitionSchemeDescription>
- description: 'The activation Mode of the service package. Known values

    are: "SharedProcess" and "ExclusiveProcess".'
  name: service_package_activation_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.servicefabric.models.ArmServicePackageActivationMode>
- description: 'Dns name used for the service. If this is specified, then the DNS
    name

    can be used to return the IP addresses of service endpoints for application layer
    protocols

    (e.g., HTTP). When updating serviceDnsName, old name may be temporarily resolvable.
    However,

    rely on new name. When removing serviceDnsName, removed name may temporarily be
    resolvable. Do

    not rely on the name being unresolvable.'
  name: service_dns_name
  types:
  - <xref:str>
- description: The instance count.
  name: instance_count
  types:
  - <xref:int>
- description: 'Delay duration for RequestDrain feature to ensures that

    the endpoint advertised by the stateless instance is removed before the delay
    starts prior to

    closing the instance. This delay enables existing requests to drain gracefully
    before the

    instance actually goes down

    ([https://docs.microsoft.com/en-us/azure/service-fabric/service-fabric-application-upgrade-advanced#avoid-connection-drops-during-stateless-service-planned-downtime-preview](https://docs.microsoft.com/en-us/azure/service-fabric/service-fabric-application-upgrade-advanced#avoid-connection-drops-during-stateless-service-planned-downtime-preview)).

    It is represented in ISO 8601 format (hh:mm:ss.s).'
  name: instance_close_delay_duration
  types:
  - <xref:str>
- description: 'MinInstanceCount is the minimum number of instances that must be up

    to meet the EnsureAvailability safety check during operations like upgrade or
    deactivate node.

    The actual number that is used is max( MinInstanceCount, ceil( MinInstancePercentage/100.0
    *

    InstanceCount) ). Note, if InstanceCount is set to -1, during MinInstanceCount
    computation -1

    is first converted into the number of nodes on which the instances are allowed
    to be placed

    according to the placement constraints on the service.'
  name: min_instance_count
  types:
  - <xref:int>
- description: 'MinInstancePercentage is the minimum percentage of InstanceCount

    that must be up to meet the EnsureAvailability safety check during operations
    like upgrade or

    deactivate node. The actual number that is used is max( MinInstanceCount, ceil(

    MinInstancePercentage/100.0 * InstanceCount) ). Note, if InstanceCount is set
    to -1, during

    MinInstancePercentage computation, -1 is first converted into the number of nodes
    on which the

    instances are allowed to be placed according to the placement constraints on the
    service.'
  name: min_instance_percentage
  types:
  - <xref:bytes>
- description: 'The kind of service (Stateless or Stateful). Required. Does not use
    Service

    Fabric to make its state highly available or reliable. The value is 1.'
  name: service_kind
  types:
  - <xref:str>
  - <xref:azure.mgmt.servicefabric.models.STATELESS>
attributes:
- uid: azure.mgmt.servicefabric.models.StatelessServiceProperties.instance_close_delay_duration
  name: instance_close_delay_duration
  summary: 'Delay duration for RequestDrain feature to ensures that the endpoint advertised
    by the

    stateless instance is removed before the delay starts prior to closing the instance.
    This delay

    enables existing requests to drain gracefully before the instance actually goes
    down

    ([https://docs.microsoft.com/en-us/azure/service-fabric/service-fabric-application-upgrade-advanced#avoid-connection-drops-during-stateless-service-planned-downtime-preview](https://docs.microsoft.com/en-us/azure/service-fabric/service-fabric-application-upgrade-advanced#avoid-connection-drops-during-stateless-service-planned-downtime-preview)).

    It is represented in ISO 8601 format (hh:mm:ss.s).'
  signature: 'instance_close_delay_duration: str | None'
- uid: azure.mgmt.servicefabric.models.StatelessServiceProperties.instance_count
  name: instance_count
  summary: The instance count.
  signature: 'instance_count: int | None'
- uid: azure.mgmt.servicefabric.models.StatelessServiceProperties.min_instance_count
  name: min_instance_count
  summary: 'MinInstanceCount is the minimum number of instances that must be up to
    meet the

    EnsureAvailability safety check during operations like upgrade or deactivate node.
    The actual

    number that is used is max( MinInstanceCount, ceil( MinInstancePercentage/100.0
    *

    InstanceCount) ). Note, if InstanceCount is set to -1, during MinInstanceCount
    computation -1

    is first converted into the number of nodes on which the instances are allowed
    to be placed

    according to the placement constraints on the service.'
  signature: 'min_instance_count: int | None'
- uid: azure.mgmt.servicefabric.models.StatelessServiceProperties.min_instance_percentage
  name: min_instance_percentage
  summary: 'MinInstancePercentage is the minimum percentage of InstanceCount that
    must be up to meet the

    EnsureAvailability safety check during operations like upgrade or deactivate node.
    The actual

    number that is used is max( MinInstanceCount, ceil( MinInstancePercentage/100.0
    *

    InstanceCount) ). Note, if InstanceCount is set to -1, during MinInstancePercentage

    computation, -1 is first converted into the number of nodes on which the instances
    are allowed

    to be placed according to the placement constraints on the service.'
  signature: 'min_instance_percentage: bytes | None'
- uid: azure.mgmt.servicefabric.models.StatelessServiceProperties.service_kind
  name: service_kind
  summary: 'The kind of service (Stateless or Stateful). Required. Does not use Service
    Fabric to make its

    state highly available or reliable. The value is 1.'
  signature: 'service_kind: STATELESS: ''Stateless''>]'
