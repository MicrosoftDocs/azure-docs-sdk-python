### YamlMime:PythonClass
uid: azure.mgmt.servicefabric.models.ArmApplicationHealthPolicy
name: ArmApplicationHealthPolicy
fullName: azure.mgmt.servicefabric.models.ArmApplicationHealthPolicy
module: azure.mgmt.servicefabric.models
summary: 'Defines a health policy used to evaluate the health of an application or
  one of its children

  entities.'
constructor:
  syntax: 'ArmApplicationHealthPolicy(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates whether warnings are treated with the same severity

    as errors.'
  name: consider_warning_as_error
  types:
  - <xref:bool>
- description: 'The maximum allowed percentage of unhealthy

    deployed applications. Allowed values are Byte values from zero to 100. The percentage

    represents the maximum tolerated percentage of deployed applications that can
    be unhealthy

    before the application is considered in error. This is calculated by dividing
    the number of

    unhealthy deployed applications over the number of nodes where the application
    is currently

    deployed on in the cluster. The computation rounds up to tolerate one failure
    on small numbers

    of nodes. Default percentage is zero.'
  name: max_percent_unhealthy_deployed_applications
  types:
  - <xref:int>
- description: 'The health policy used by default to evaluate the

    health of a service type.'
  name: default_service_type_health_policy
  types:
  - <xref:azure.mgmt.servicefabric.models.ArmServiceTypeHealthPolicy>
- description: 'The map with service type health policy per service type

    name. The map is empty by default.'
  name: service_type_health_policy_map
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.servicefabric.models.ArmServiceTypeHealthPolicy>]
attributes:
- uid: azure.mgmt.servicefabric.models.ArmApplicationHealthPolicy.consider_warning_as_error
  name: consider_warning_as_error
  summary: Indicates whether warnings are treated with the same severity as errors.
  signature: 'consider_warning_as_error: bool | None'
- uid: azure.mgmt.servicefabric.models.ArmApplicationHealthPolicy.default_service_type_health_policy
  name: default_service_type_health_policy
  summary: The health policy used by default to evaluate the health of a service type.
  signature: 'default_service_type_health_policy: _models.ArmServiceTypeHealthPolicy
    | None'
- uid: azure.mgmt.servicefabric.models.ArmApplicationHealthPolicy.max_percent_unhealthy_deployed_applications
  name: max_percent_unhealthy_deployed_applications
  summary: 'The maximum allowed percentage of unhealthy deployed applications. Allowed
    values are Byte

    values from zero to 100. The percentage represents the maximum tolerated percentage
    of deployed

    applications that can be unhealthy before the application is considered in error.
    This is

    calculated by dividing the number of unhealthy deployed applications over the
    number of nodes

    where the application is currently deployed on in the cluster. The computation
    rounds up to

    tolerate one failure on small numbers of nodes. Default percentage is zero.'
  signature: 'max_percent_unhealthy_deployed_applications: int | None'
- uid: azure.mgmt.servicefabric.models.ArmApplicationHealthPolicy.service_type_health_policy_map
  name: service_type_health_policy_map
  summary: The map with service type health policy per service type name. The map
    is empty by default.
  signature: 'service_type_health_policy_map: dict[str, ''_models.ArmServiceTypeHealthPolicy'']
    | None'
