### YamlMime:PythonClass
uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy
name: ClusterUpgradePolicy
fullName: azure.mgmt.servicefabric.models.ClusterUpgradePolicy
module: azure.mgmt.servicefabric.models
summary: Describes the policy used when upgrading the cluster.
constructor:
  syntax: 'ClusterUpgradePolicy(*args: Any, **kwargs: Any)'
variables:
- description: 'If true, then processes are forcefully restarted during upgrade even
    when

    the code version has not changed (the upgrade only changes configuration or data).'
  name: force_restart
  types:
  - <xref:bool>
- description: 'The maximum amount of time to block processing of an

    upgrade domain and prevent loss of availability when there are unexpected issues.
    When this

    timeout expires, processing of the upgrade domain will proceed regardless of availability
    loss

    issues. The timeout is reset at the start of each upgrade domain. The timeout
    can be in either

    hh:mm:ss or in d.hh:mm:ss.ms format. Required.'
  name: upgrade_replica_set_check_timeout
  types:
  - <xref:str>
- description: 'The length of time to wait after completing an upgrade domain

    before performing health checks. The duration can be in either hh:mm:ss or in
    d.hh:mm:ss.ms

    format. Required.'
  name: health_check_wait_duration
  types:
  - <xref:str>
- description: 'The amount of time that the application or cluster must

    remain healthy before the upgrade proceeds to the next upgrade domain. The duration
    can be in

    either hh:mm:ss or in d.hh:mm:ss.ms format. Required.'
  name: health_check_stable_duration
  types:
  - <xref:str>
- description: 'The amount of time to retry health evaluation when the

    application or cluster is unhealthy before the upgrade rolls back. The timeout
    can be in either

    hh:mm:ss or in d.hh:mm:ss.ms format. Required.'
  name: health_check_retry_timeout
  types:
  - <xref:str>
- description: 'The amount of time the overall upgrade has to complete before the

    upgrade rolls back. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms
    format. Required.'
  name: upgrade_timeout
  types:
  - <xref:str>
- description: 'The amount of time each upgrade domain has to complete before the

    upgrade rolls back. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms
    format. Required.'
  name: upgrade_domain_timeout
  types:
  - <xref:str>
- description: The cluster health policy used when upgrading the cluster. Required.
  name: health_policy
  types:
  - <xref:azure.mgmt.servicefabric.models.ClusterHealthPolicy>
- description: The cluster delta health policy used when upgrading the cluster.
  name: delta_health_policy
  types:
  - <xref:azure.mgmt.servicefabric.models.ClusterUpgradeDeltaHealthPolicy>
attributes:
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.delta_health_policy
  name: delta_health_policy
  summary: The cluster delta health policy used when upgrading the cluster.
  signature: 'delta_health_policy: _models.ClusterUpgradeDeltaHealthPolicy | None'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.force_restart
  name: force_restart
  summary: 'If true, then processes are forcefully restarted during upgrade even when
    the code version has

    not changed (the upgrade only changes configuration or data).'
  signature: 'force_restart: bool | None'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.health_check_retry_timeout
  name: health_check_retry_timeout
  summary: 'The amount of time to retry health evaluation when the application or
    cluster is unhealthy

    before the upgrade rolls back. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms

    format. Required.'
  signature: 'health_check_retry_timeout: str'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.health_check_stable_duration
  name: health_check_stable_duration
  summary: 'The amount of time that the application or cluster must remain healthy
    before the upgrade

    proceeds to the next upgrade domain. The duration can be in either hh:mm:ss or
    in d.hh:mm:ss.ms

    format. Required.'
  signature: 'health_check_stable_duration: str'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.health_check_wait_duration
  name: health_check_wait_duration
  summary: 'The length of time to wait after completing an upgrade domain before performing
    health checks.

    The duration can be in either hh:mm:ss or in d.hh:mm:ss.ms format. Required.'
  signature: 'health_check_wait_duration: str'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.health_policy
  name: health_policy
  summary: The cluster health policy used when upgrading the cluster. Required.
  signature: 'health_policy: _models.ClusterHealthPolicy'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.upgrade_domain_timeout
  name: upgrade_domain_timeout
  summary: 'The amount of time each upgrade domain has to complete before the upgrade
    rolls back. The

    timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms format. Required.'
  signature: 'upgrade_domain_timeout: str'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.upgrade_replica_set_check_timeout
  name: upgrade_replica_set_check_timeout
  summary: 'The maximum amount of time to block processing of an upgrade domain and
    prevent loss of

    availability when there are unexpected issues. When this timeout expires, processing
    of the

    upgrade domain will proceed regardless of availability loss issues. The timeout
    is reset at the

    start of each upgrade domain. The timeout can be in either hh:mm:ss or in d.hh:mm:ss.ms
    format.

    Required.'
  signature: 'upgrade_replica_set_check_timeout: str'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradePolicy.upgrade_timeout
  name: upgrade_timeout
  summary: 'The amount of time the overall upgrade has to complete before the upgrade
