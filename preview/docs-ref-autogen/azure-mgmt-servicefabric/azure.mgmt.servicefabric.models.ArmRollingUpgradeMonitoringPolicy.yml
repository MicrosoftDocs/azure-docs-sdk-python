### YamlMime:PythonClass
uid: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy
name: ArmRollingUpgradeMonitoringPolicy
fullName: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy
module: azure.mgmt.servicefabric.models
summary: The policy used for monitoring the application upgrade.
constructor:
  syntax: 'ArmRollingUpgradeMonitoringPolicy(*args: Any, **kwargs: Any)'
variables:
- description: 'The activation Mode of the service package. Known values are: "Rollback"

    and "Manual".'
  name: failure_action
  types:
  - <xref:str>
  - <xref:azure.mgmt.servicefabric.models.ArmUpgradeFailureAction>
- description: 'The amount of time to wait after completing an upgrade domain

    before applying health policies. It is interpreted as a string representing an
    ISO 8601

    duration with following format "hh:mm:ss.fff".'
  name: health_check_wait_duration
  types:
  - <xref:str>
- description: 'The amount of time that the application or cluster must

    remain healthy before the upgrade proceeds to the next upgrade domain. It is interpreted
    as a

    string representing an ISO 8601 duration with following format "hh:mm:ss.fff".'
  name: health_check_stable_duration
  types:
  - <xref:str>
- description: 'The amount of time to retry health evaluation when the

    application or cluster is unhealthy before FailureAction is executed. It is interpreted
    as a

    string representing an ISO 8601 duration with following format "hh:mm:ss.fff".'
  name: health_check_retry_timeout
  types:
  - <xref:str>
- description: 'The amount of time the overall upgrade has to complete before

    FailureAction is executed. Cannot be larger than 12 hours. It is interpreted as
    a string

    representing an ISO 8601 duration with following format "hh:mm:ss.fff".'
  name: upgrade_timeout
  types:
  - <xref:str>
- description: 'The amount of time each upgrade domain has to complete before

    FailureAction is executed. Cannot be larger than 12 hours. It is interpreted as
    a string

    representing an ISO 8601 duration with following format "hh:mm:ss.fff".'
  name: upgrade_domain_timeout
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy.failure_action
  name: failure_action
  summary: '"Rollback" and "Manual".'
  signature: 'failure_action: str | _models.ArmUpgradeFailureAction | None'
- uid: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy.health_check_retry_timeout
  name: health_check_retry_timeout
  summary: 'The amount of time to retry health evaluation when the application or
    cluster is unhealthy

    before FailureAction is executed. It is interpreted as a string representing an
    ISO 8601

    duration with following format "hh:mm:ss.fff".'
  signature: 'health_check_retry_timeout: str | None'
- uid: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy.health_check_stable_duration
  name: health_check_stable_duration
  summary: 'The amount of time that the application or cluster must remain healthy
    before the upgrade

    proceeds to the next upgrade domain. It is interpreted as a string representing
    an ISO 8601

    duration with following format "hh:mm:ss.fff".'
  signature: 'health_check_stable_duration: str | None'
- uid: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy.health_check_wait_duration
  name: health_check_wait_duration
  summary: 'The amount of time to wait after completing an upgrade domain before applying
    health policies.

    It is interpreted as a string representing an ISO 8601 duration with following
    format

    "hh:mm:ss.fff".'
  signature: 'health_check_wait_duration: str | None'
- uid: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy.upgrade_domain_timeout
  name: upgrade_domain_timeout
  summary: 'The amount of time each upgrade domain has to complete before FailureAction
    is executed. Cannot

    be larger than 12 hours. It is interpreted as a string representing an ISO 8601
    duration with

    following format "hh:mm:ss.fff".'
  signature: 'upgrade_domain_timeout: str | None'
- uid: azure.mgmt.servicefabric.models.ArmRollingUpgradeMonitoringPolicy.upgrade_timeout
  name: upgrade_timeout
  summary: 'The amount of time the overall upgrade has to complete before FailureAction
    is executed. Cannot

    be larger than 12 hours. It is interpreted as a string representing an ISO 8601
    duration with

    following format "hh:mm:ss.fff".'
  signature: 'upgrade_timeout: str | None'
