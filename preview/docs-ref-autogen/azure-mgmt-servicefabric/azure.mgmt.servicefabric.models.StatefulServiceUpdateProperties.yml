### YamlMime:PythonClass
uid: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties
name: StatefulServiceUpdateProperties
fullName: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties
module: azure.mgmt.servicefabric.models
summary: The properties of a stateful service resource for patch operations.
constructor:
  syntax: 'StatefulServiceUpdateProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The placement constraints as a string. Placement constraints are

    boolean expressions on node properties and allow for restricting a service to
    particular nodes

    based on the service requirements. For example, to place a service on nodes where
    NodeType is

    blue specify the following: "NodeColor == blue)".'
  name: placement_constraints
  types:
  - <xref:str>
- description: 'A list that describes the correlation of the service with other

    services.'
  name: correlation_scheme
  types:
  - <xref:list>[<xref:azure.mgmt.servicefabric.models.ServiceCorrelationDescription>]
- description: 'The service load metrics is given as an array of

    ServiceLoadMetricDescription objects.'
  name: service_load_metrics
  types:
  - <xref:list>[<xref:azure.mgmt.servicefabric.models.ServiceLoadMetricDescription>]
- description: 'A list that describes the correlation of the service with

    other services.'
  name: service_placement_policies
  types:
  - <xref:list>[<xref:azure.mgmt.servicefabric.models.ServicePlacementPolicyDescription>]
- description: 'Specifies the move cost for the service. Known values are: "Zero",

    "Low", "Medium", and "High".'
  name: default_move_cost
  types:
  - <xref:str>
  - <xref:azure.mgmt.servicefabric.models.MoveCost>
- description: The target replica set size as a number.
  name: target_replica_set_size
  types:
  - <xref:int>
- description: The minimum replica set size as a number.
  name: min_replica_set_size
  types:
  - <xref:int>
- description: 'The duration between when a replica goes down and when a

    new replica is created, represented in ISO 8601 format (hh:mm:ss.s).'
  name: replica_restart_wait_duration
  types:
  - <xref:datetime.datetime>
- description: 'The maximum duration for which a partition is allowed to be in

    a state of quorum loss, represented in ISO 8601 format (hh:mm:ss.s).'
  name: quorum_loss_wait_duration
  types:
  - <xref:datetime.datetime>
- description: 'The definition on how long StandBy replicas should be

    maintained before being removed, represented in ISO 8601 format (hh:mm:ss.s).'
  name: stand_by_replica_keep_duration
  types:
  - <xref:datetime.datetime>
- description: 'The kind of service (Stateless or Stateful). Required. Uses Service
    Fabric

    to make its state or part of its state highly available and reliable. The value
    is 2.'
  name: service_kind
  types:
  - <xref:str>
  - <xref:azure.mgmt.servicefabric.models.STATEFUL>
attributes:
- uid: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties.min_replica_set_size
  name: min_replica_set_size
  summary: The minimum replica set size as a number.
  signature: 'min_replica_set_size: int | None'
- uid: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties.quorum_loss_wait_duration
  name: quorum_loss_wait_duration
  summary: 'The maximum duration for which a partition is allowed to be in a state
    of quorum loss,

    represented in ISO 8601 format (hh:mm:ss.s).'
  signature: 'quorum_loss_wait_duration: datetime | None'
- uid: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties.replica_restart_wait_duration
  name: replica_restart_wait_duration
  summary: 'The duration between when a replica goes down and when a new replica is
    created, represented in

    ISO 8601 format (hh:mm:ss.s).'
  signature: 'replica_restart_wait_duration: datetime | None'
- uid: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties.service_kind
  name: service_kind
  summary: 'The kind of service (Stateless or Stateful). Required. Uses Service Fabric
    to make its state or

    part of its state highly available and reliable. The value is 2.'
  signature: 'service_kind: STATEFUL: ''Stateful''>]'
- uid: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties.stand_by_replica_keep_duration
  name: stand_by_replica_keep_duration
  summary: 'The definition on how long StandBy replicas should be maintained before
    being removed,

    represented in ISO 8601 format (hh:mm:ss.s).'
  signature: 'stand_by_replica_keep_duration: datetime | None'
- uid: azure.mgmt.servicefabric.models.StatefulServiceUpdateProperties.target_replica_set_size
  name: target_replica_set_size
  summary: The target replica set size as a number.
  signature: 'target_replica_set_size: int | None'
