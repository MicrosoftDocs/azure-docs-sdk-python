### YamlMime:PythonClass
uid: azure.mgmt.servicefabric.models.ClusterUpgradeDeltaHealthPolicy
name: ClusterUpgradeDeltaHealthPolicy
fullName: azure.mgmt.servicefabric.models.ClusterUpgradeDeltaHealthPolicy
module: azure.mgmt.servicefabric.models
summary: Describes the delta health policies for the cluster upgrade.
constructor:
  syntax: 'ClusterUpgradeDeltaHealthPolicy(*args: Any, **kwargs: Any)'
variables:
- description: 'The maximum allowed percentage of nodes health

    degradation allowed during cluster upgrades. The delta is measured between the
    state of the

    nodes at the beginning of upgrade and the state of the nodes at the time of the
    health

    evaluation. The check is performed after every upgrade domain upgrade completion
    to make sure

    the global state of the cluster is within tolerated limits. Required.'
  name: max_percent_delta_unhealthy_nodes
  types:
  - <xref:int>
- description: 'The maximum allowed percentage of

    upgrade domain nodes health degradation allowed during cluster upgrades. The delta
    is measured

    between the state of the upgrade domain nodes at the beginning of upgrade and
    the state of the

    upgrade domain nodes at the time of the health evaluation. The check is performed
    after every

    upgrade domain upgrade completion for all completed upgrade domains to make sure
    the state of

    the upgrade domains is within tolerated limits. Required.'
  name: max_percent_upgrade_domain_delta_unhealthy_nodes
  types:
  - <xref:int>
- description: 'The maximum allowed percentage of applications

    health degradation allowed during cluster upgrades. The delta is measured between
    the state of

    the applications at the beginning of upgrade and the state of the applications
    at the time of

    the health evaluation. The check is performed after every upgrade domain upgrade
    completion to

    make sure the global state of the cluster is within tolerated limits. System services
    are not

    included in this. Required.'
  name: max_percent_delta_unhealthy_applications
  types:
  - <xref:int>
- description: 'Defines the application delta health policy map used

    to evaluate the health of an application or one of its child entities when upgrading
    the

    cluster.'
  name: application_delta_health_policies
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.servicefabric.models.ApplicationDeltaHealthPolicy>]
attributes:
- uid: azure.mgmt.servicefabric.models.ClusterUpgradeDeltaHealthPolicy.application_delta_health_policies
  name: application_delta_health_policies
  summary: 'Defines the application delta health policy map used to evaluate the health
    of an application

    or one of its child entities when upgrading the cluster.'
  signature: 'application_delta_health_policies: dict[str, ''_models.ApplicationDeltaHealthPolicy'']
    | None'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradeDeltaHealthPolicy.max_percent_delta_unhealthy_applications
  name: max_percent_delta_unhealthy_applications
  summary: 'The maximum allowed percentage of applications health degradation allowed
    during cluster

    upgrades. The delta is measured between the state of the applications at the beginning
    of

    upgrade and the state of the applications at the time of the health evaluation.
    The check is

    performed after every upgrade domain upgrade completion to make sure the global
    state of the

    cluster is within tolerated limits. System services are not included in this.
    Required.'
  signature: 'max_percent_delta_unhealthy_applications: int'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradeDeltaHealthPolicy.max_percent_delta_unhealthy_nodes
  name: max_percent_delta_unhealthy_nodes
  summary: 'The maximum allowed percentage of nodes health degradation allowed during
    cluster upgrades. The

    delta is measured between the state of the nodes at the beginning of upgrade and
    the state of

    the nodes at the time of the health evaluation. The check is performed after every
    upgrade

    domain upgrade completion to make sure the global state of the cluster is within
    tolerated

    limits. Required.'
  signature: 'max_percent_delta_unhealthy_nodes: int'
- uid: azure.mgmt.servicefabric.models.ClusterUpgradeDeltaHealthPolicy.max_percent_upgrade_domain_delta_unhealthy_nodes
  name: max_percent_upgrade_domain_delta_unhealthy_nodes
  summary: 'The maximum allowed percentage of upgrade domain nodes health degradation
    allowed during

    cluster upgrades. The delta is measured between the state of the upgrade domain
    nodes at the

    beginning of upgrade and the state of the upgrade domain nodes at the time of
    the health

    evaluation. The check is performed after every upgrade domain upgrade completion
    for all

    completed upgrade domains to make sure the state of the upgrade domains is within
    tolerated

    limits. Required.'
  signature: 'max_percent_upgrade_domain_delta_unhealthy_nodes: int'
