### YamlMime:PythonClass
uid: azure.mgmt.servicefabric.models.NodeTypeDescription
name: NodeTypeDescription
fullName: azure.mgmt.servicefabric.models.NodeTypeDescription
module: azure.mgmt.servicefabric.models
summary: 'Describes a node type in the cluster, each node type represents sub set
  of nodes in the

  cluster.'
constructor:
  syntax: 'NodeTypeDescription(*args: Any, **kwargs: Any)'
variables:
- description: The name of the node type. Required.
  name: name
  types:
  - <xref:str>
- description: 'The placement tags applied to nodes in the node type, which can be

    used to indicate where certain services (workload) should run.'
  name: placement_properties
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'The capacity tags applied to the nodes in the node type, the cluster
    resource

    manager uses these tags to understand how much resource a node has.'
  name: capacities
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: The TCP cluster management endpoint port. Required.
  name: client_connection_endpoint_port
  types:
  - <xref:int>
- description: The HTTP cluster management endpoint port. Required.
  name: http_gateway_endpoint_port
  types:
  - <xref:int>
- description: "The durability level of the node type. Learn about [DurabilityLevel](https://docs.microsoft.com/azure/service-fabric/service-fabric-cluster-capacity).\n\
    \n* Bronze - No privileges. This is the default. \n\n* Silver - The infrastructure\
    \ jobs can be paused for a duration of 10 minutes per UD. \n\n* Gold - The infrastructure\
    \ jobs can be paused for a duration of 2 hours per UD. Gold durability can be\
    \ enabled only on full node VM skus like D15_V2, G5 etc. Known values are: \"\
    Bronze\", \"Silver\", and \"Gold\"."
  name: durability_level
  types:
  - <xref:str>
  - <xref:azure.mgmt.servicefabric.models.DurabilityLevel>
- description: 'The range of ports from which cluster assigned port to Service Fabric

    applications.'
  name: application_ports
  types:
  - <xref:azure.mgmt.servicefabric.models.EndpointRangeDescription>
- description: 'The range of ephemeral ports that nodes in this node type should be

    configured with.'
  name: ephemeral_ports
  types:
  - <xref:azure.mgmt.servicefabric.models.EndpointRangeDescription>
- description: 'The node type on which system services will run. Only one node type
    should be

    marked as primary. Primary node type cannot be deleted or changed for existing
    clusters.

    Required.'
  name: is_primary
  types:
  - <xref:bool>
- description: 'VMInstanceCount should be 1 to n, where n indicates the number of
    VM

    instances corresponding to this nodeType. VMInstanceCount = 0 can be done only
    in these

    scenarios: NodeType is a secondary nodeType. Durability = Bronze or Durability
    >= Bronze and

    InfrastructureServiceManager = true. If VMInstanceCount = 0, implies the VMs for
    this nodeType

    will not be used for the initial cluster size computation. Required.'
  name: vm_instance_count
  types:
  - <xref:int>
- description: The endpoint used by reverse proxy.
  name: reverse_proxy_endpoint_port
  types:
  - <xref:int>
- description: Indicates if the node type can only host Stateless workloads.
  name: is_stateless
  types:
  - <xref:bool>
- description: 'Indicates if the node type is enabled to support multiple

    zones.'
  name: multiple_availability_zones
  types:
  - <xref:bool>
- description: 'The port used for token-auth based HTTPS

    connections to the cluster. Cannot be set to the same port as HttpGatewayEndpoint.'
  name: http_gateway_token_auth_endpoint_port
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.application_ports
  name: application_ports
  summary: The range of ports from which cluster assigned port to Service Fabric applications.
  signature: 'application_ports: _models.EndpointRangeDescription | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.capacities
  name: capacities
  summary: 'The capacity tags applied to the nodes in the node type, the cluster resource
    manager uses

    these tags to understand how much resource a node has.'
  signature: 'capacities: dict[str, str] | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.client_connection_endpoint_port
  name: client_connection_endpoint_port
  summary: The TCP cluster management endpoint port. Required.
  signature: 'client_connection_endpoint_port: int'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.durability_level
  name: durability_level
  summary: "The durability level of the node type. Learn about [DurabilityLevel](https://docs.microsoft.com/azure/service-fabric/service-fabric-cluster-capacity).\n\
    \n* Bronze - No privileges. This is the default. \n\n* Silver - The infrastructure\
    \ jobs can be paused for a duration of 10 minutes per UD. \n\n* Gold - The infrastructure\
    \ jobs can be paused for a duration of 2 hours per UD. Gold durability can be\
    \ enabled only on full node VM skus like D15_V2, G5 etc. Known values are: \"\
    Bronze\", \"Silver\", and \"Gold\". "
  signature: 'durability_level: str | _models.DurabilityLevel | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.ephemeral_ports
  name: ephemeral_ports
  summary: The range of ephemeral ports that nodes in this node type should be configured
    with.
  signature: 'ephemeral_ports: _models.EndpointRangeDescription | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.http_gateway_endpoint_port
  name: http_gateway_endpoint_port
  summary: The HTTP cluster management endpoint port. Required.
  signature: 'http_gateway_endpoint_port: int'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.http_gateway_token_auth_endpoint_port
  name: http_gateway_token_auth_endpoint_port
  summary: 'The port used for token-auth based HTTPS connections to the cluster. Cannot
    be set to the same

    port as HttpGatewayEndpoint.'
  signature: 'http_gateway_token_auth_endpoint_port: int | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.is_primary
  name: is_primary
  summary: 'The node type on which system services will run. Only one node type should
    be marked as

    primary. Primary node type cannot be deleted or changed for existing clusters.
    Required.'
  signature: 'is_primary: bool'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.is_stateless
  name: is_stateless
  summary: Indicates if the node type can only host Stateless workloads.
  signature: 'is_stateless: bool | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.multiple_availability_zones
  name: multiple_availability_zones
  summary: Indicates if the node type is enabled to support multiple zones.
  signature: 'multiple_availability_zones: bool | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.name
  name: name
  summary: The name of the node type. Required.
  signature: 'name: str'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.placement_properties
  name: placement_properties
  summary: 'The placement tags applied to nodes in the node type, which can be used
    to indicate where

    certain services (workload) should run.'
  signature: 'placement_properties: dict[str, str] | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.reverse_proxy_endpoint_port
  name: reverse_proxy_endpoint_port
  summary: The endpoint used by reverse proxy.
  signature: 'reverse_proxy_endpoint_port: int | None'
- uid: azure.mgmt.servicefabric.models.NodeTypeDescription.vm_instance_count
  name: vm_instance_count
  summary: 'VMInstanceCount should be 1 to n, where n indicates the number of VM instances
    corresponding to

    this nodeType. VMInstanceCount = 0 can be done only in these scenarios: NodeType
    is a secondary

    nodeType. Durability = Bronze or Durability >= Bronze and InfrastructureServiceManager
    = true.

    If VMInstanceCount = 0, implies the VMs for this nodeType will not be used for
    the initial

    cluster size computation. Required.'
  signature: 'vm_instance_count: int'
