- description: 'The policy that controls whether the users in customer''s organization
    can

    view charges at pay-as-you-go prices. Known values are: "Other", "Allowed", and
    "NotAllowed".'
  name: view_charges
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.ViewChargesPolicy>
- description: List of all policies defined at the billing scope.
  name: policies
  types:
  - <xref:list>[<xref:azure.mgmt.billing.models.PolicySummary>]
