uid: azure.mgmt.billing.models.BillingProfilePolicyProperties
name: BillingProfilePolicyProperties
fullName: azure.mgmt.billing.models.BillingProfilePolicyProperties
module: azure.mgmt.billing.models
summary: A policy at billing profile scope.
constructor:
  syntax: 'BillingProfilePolicyProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The provisioning state of the resource during a long-running

    operation. Known values are: "Succeeded", "Canceled", "Failed", "New", "Pending",

    "Provisioning", "PendingBilling", "ConfirmedBilling", "Creating", "Created", and
    "Expired".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.ProvisioningState>
- description: The policies for Enterprise Agreement enrollments.
  name: enterprise_agreement_policies
  types:
  - <xref:azure.mgmt.billing.models.BillingProfilePolicyPropertiesEnterpriseAgreementPolicies>
- description: 'The policy that controls invoice section label

    management at invoice section scope. This is allowed by default. Known values
    are: "Other",

    "Allowed", and "NotAllowed".'
  name: invoice_section_label_management
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.InvoiceSectionLabelManagementPolicy>
- description: 'The policy that controls whether Azure marketplace purchases are

    allowed. Known values are: "Other", "AllAllowed", "Disabled", "NotAllowed", and

    "OnlyFreeAllowed".'
