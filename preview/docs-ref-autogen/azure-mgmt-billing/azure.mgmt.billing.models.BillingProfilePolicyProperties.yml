  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.ReservationPurchasesPolicy>
- description: 'The policy that controls whether users with Azure savings plan

    purchase are allowed. Known values are: "Other", "Allowed", "Disabled", and "NotAllowed".'
