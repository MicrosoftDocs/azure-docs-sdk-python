uid: azure.mgmt.billing.models.AgreementProperties
name: AgreementProperties
fullName: azure.mgmt.billing.models.AgreementProperties
module: azure.mgmt.billing.models
summary: An agreement.
constructor:
  syntax: 'AgreementProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The mode of acceptance for an agreement. Known values are: "Other",

    "ClickToAccept", "ESignEmbedded", "ESignOffline", "Implicit", "Offline", and "PhysicalSign".'
  name: acceptance_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.AcceptanceMode>
- description: The URL to download the agreement.
  name: agreement_link
  types:
  - <xref:str>
- description: 'The list of billing profiles associated with agreement and present

    only for specific agreements.'
  name: billing_profile_info
  types:
  - <xref:list>[<xref:azure.mgmt.billing.models.BillingProfileInfo>]
- description: 'The category of the agreement. Known values are: "Other",

    "AffiliatePurchaseTerms", "IndirectForGovernmentAgreement", "MicrosoftCustomerAgreement",

    "MicrosoftPartnerAgreement", and "UKCloudComputeFramework".'
  name: category
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.Category>
- description: The name of the agreement signed by a customer.
  name: display_name
  types:
  - <xref:str>
- description: The date from which the agreement is effective.
  name: effective_date
  types:
  - <xref:datetime.datetime>
- description: The date when the agreement expires.
  name: expiration_date
  types:
  - <xref:datetime.datetime>
- description: The list of participants that participates in acceptance of an agreement.
  name: participants
  types:
  - <xref:list>[<xref:azure.mgmt.billing.models.Participant>]
- description: The current status of the agreement.
  name: status
  types:
  - <xref:str>
- description: 'The ID of the lead billing account if this agreement is part

    of the Customer Affiliate Purchase Terms.'
  name: lead_billing_account_name
  types:
  - <xref:str>
