variables:
- description: 'The provisioning state of the resource during a long-running

    operation. Known values are: "Succeeded", "Canceled", "Failed", "New", "Pending",

    "Provisioning", "PendingBilling", "ConfirmedBilling", "Creating", "Created", and
    "Expired".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.ProvisioningState>
- description: The name of the associated tenant.
  name: display_name
  types:
  - <xref:str>
- description: The ID that uniquely identifies a tenant.
  name: tenant_id
  types:
  - <xref:str>
- description: 'The state determines whether users from the associated tenant

    can be assigned roles for commerce activities like viewing and downloading invoices,
    managing

    payments, and making purchases. Known values are: "Other", "NotAllowed", "Active",
    and

    "Revoked".'
  name: billing_management_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.BillingManagementTenantState>
- description: 'The state determines whether subscriptions and licenses

    can be provisioned in the associated tenant. It can be set to ''Pending'' to initiate
    a billing

    request. Known values are: "Other", "NotRequested", "Active", "Pending",

    "BillingRequestExpired", "BillingRequestDeclined", and "Revoked".'
  name: provisioning_management_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.billing.models.ProvisioningTenantState>
- description: 'The unique identifier for the billing request that is

    created when enabling provisioning for an associated tenant.'
  name: provisioning_billing_request_id
  types:
  - <xref:str>
