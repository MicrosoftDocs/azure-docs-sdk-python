### YamlMime:PythonClass
uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat
name: ApplicationGatewayProbePropertiesFormat
fullName: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat
module: azure.mgmt.network.models
summary: Properties of probe of an application gateway.
constructor:
  syntax: 'ApplicationGatewayProbePropertiesFormat(*args: Any, **kwargs: Any)'
variables:
- description: 'The protocol used for the probe. Known values are: "Http", "Https",
    "Tcp", and

    "Tls".'
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ApplicationGatewayProtocol>
- description: Host name to send the probe to.
  name: host
  types:
  - <xref:str>
- description: 'Relative path of probe. Valid path starts from ''/''. Probe is sent
    to

    <Protocol>://<host>:<port><path>.'
  name: path
  types:
  - <xref:str>
- description: 'The probing interval in seconds. This is the time interval between
    two

    consecutive probes. Acceptable values are from 1 second to 86400 seconds.'
  name: interval
  types:
  - <xref:int>
- description: 'The probe timeout in seconds. Probe marked as failed if valid response
    is not

    received with this timeout period. Acceptable values are from 1 second to 86400
    seconds.'
  name: timeout
  types:
  - <xref:int>
- description: 'The probe retry count. Backend server is marked down after

    consecutive probe failure count reaches UnhealthyThreshold. Acceptable values
    are from 1 second

    to 20.'
  name: unhealthy_threshold
  types:
  - <xref:int>
- description: 'Whether the host header should be picked from

    the backend http settings. Default value is false.'
  name: pick_host_name_from_backend_http_settings
  types:
  - <xref:bool>
- description: 'Whether the server name indication should be picked

    from the backend settings for Tls protocol. Default value is false.'
  name: pick_host_name_from_backend_settings
  types:
  - <xref:bool>
- description: 'Minimum number of servers that are always marked healthy. Default
    value is

    0.'
  name: min_servers
  types:
  - <xref:int>
- description: Criterion for classifying a healthy probe response.
  name: match
  types:
  - <xref:azure.mgmt.network.models.ApplicationGatewayProbeHealthResponseMatch>
- description: 'Whether to send Proxy Protocol header along with the

    Health Probe over TCP or TLS protocol. Default value is false.'
  name: enable_probe_proxy_protocol_header
  types:
  - <xref:bool>
- description: 'The provisioning state of the probe resource. Known values are:

    "Failed", "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
- description: 'Custom port which will be used for probing the backend servers. The
    valid value

    ranges from 1 to 65535. In case not set, port from http settings will be used.
    This property is

    valid for Basic, Standard_v2 and WAF_v2 only.'
  name: port
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.enable_probe_proxy_protocol_header
  name: enable_probe_proxy_protocol_header
  summary: 'Whether to send Proxy Protocol header along with the Health Probe over
    TCP or TLS protocol.

    Default value is false.'
  signature: 'enable_probe_proxy_protocol_header: bool | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.host
  name: host
  summary: Host name to send the probe to.
  signature: 'host: str | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.interval
  name: interval
  summary: 'The probing interval in seconds. This is the time interval between two
    consecutive probes.

    Acceptable values are from 1 second to 86400 seconds.'
  signature: 'interval: int | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.match
  name: match
  summary: Criterion for classifying a healthy probe response.
  signature: 'match: _models.ApplicationGatewayProbeHealthResponseMatch | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.min_servers
  name: min_servers
  summary: Minimum number of servers that are always marked healthy. Default value
    is 0.
  signature: 'min_servers: int | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.path
  name: path
  summary: 'Relative path of probe. Valid path starts from ''/''. Probe is sent to

    <Protocol>://<host>:<port><path>.'
  signature: 'path: str | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.pick_host_name_from_backend_http_settings
  name: pick_host_name_from_backend_http_settings
  summary: 'Whether the host header should be picked from the backend http settings.
    Default value is

    false.'
  signature: 'pick_host_name_from_backend_http_settings: bool | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.pick_host_name_from_backend_settings
  name: pick_host_name_from_backend_settings
  summary: 'Whether the server name indication should be picked from the backend settings
    for Tls protocol.

    Default value is false.'
  signature: 'pick_host_name_from_backend_settings: bool | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.port
  name: port
  summary: 'Custom port which will be used for probing the backend servers. The valid
    value ranges from 1

    to 65535. In case not set, port from http settings will be used. This property
    is valid for

    Basic, Standard_v2 and WAF_v2 only.'
  signature: 'port: int | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.protocol
  name: protocol
  summary: '"Http", "Https", "Tcp", and "Tls".'
  signature: 'protocol: str | _models.ApplicationGatewayProtocol | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.provisioning_state
  name: provisioning_state
  summary: '"Failed", "Succeeded",

    "Canceled", "Creating", "Updating", and "Deleting".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.timeout
  name: timeout
  summary: 'The probe timeout in seconds. Probe marked as failed if valid response
    is not received with

    this timeout period. Acceptable values are from 1 second to 86400 seconds.'
  signature: 'timeout: int | None'
- uid: azure.mgmt.network.models.ApplicationGatewayProbePropertiesFormat.unhealthy_threshold
  name: unhealthy_threshold
  summary: 'The probe retry count. Backend server is marked down after consecutive
    probe failure count

    reaches UnhealthyThreshold. Acceptable values are from 1 second to 20.'
  signature: 'unhealthy_threshold: int | None'
