  name: connected_group_address_overlap
  summary: 'Behavior to handle overlapped IP address space among members of the connected
    group of the

    connectivity configuration. Required. Known values are: "Allowed" and "Disallowed".'
  signature: 'connected_group_address_overlap: str | _models.ConnectedGroupAddressOverlap'
- uid: azure.mgmt.network.models.ConnectivityConfigurationPropertiesConnectivityCapabilities.connected_group_private_endpoints_scale
  name: connected_group_private_endpoints_scale
  summary: 'Option indicating the scale of private endpoints allowed in the connected
    group of the

    connectivity configuration. Required. Known values are: "Standard" and "HighScale".'
  signature: 'connected_group_private_endpoints_scale: str | _models.ConnectedGroupPrivateEndpointsScale'
