uid: azure.mgmt.network.models.AdminPropertiesFormat
name: AdminPropertiesFormat
fullName: azure.mgmt.network.models.AdminPropertiesFormat
module: azure.mgmt.network.models
summary: Security admin rule resource.
constructor:
  syntax: 'AdminPropertiesFormat(*args: Any, **kwargs: Any)'
variables:
- description: A description for this rule. Restricted to 140 chars.
  name: description
  types:
  - <xref:str>
- description: 'Network protocol this rule applies to. Required. Known values are:
    "Tcp",

    "Udp", "Icmp", "Esp", "Any", and "Ah".'
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.SecurityConfigurationRuleProtocol>
- description: The CIDR or source IP ranges.
  name: sources
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.AddressPrefixItem>]
- description: The destination address prefixes. CIDR or destination IP ranges.
  name: destinations
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.AddressPrefixItem>]
- description: The source port ranges.
  name: source_port_ranges
  types:
  - <xref:list>[<xref:str>]
- description: The destination port ranges.
  name: destination_port_ranges
  types:
  - <xref:list>[<xref:str>]
- description: 'Indicates the access allowed for this particular rule. Required. Known
    values

    are: "Allow", "Deny", and "AlwaysAllow".'
  name: access
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.SecurityConfigurationRuleAccess>
- description: 'The priority of the rule. The value can be between 1 and 4096. The
    priority

    number must be unique for each rule in the collection. The lower the priority
    number, the

    higher the priority of the rule. Required.'
  name: priority
  types:
  - <xref:int>
- description: 'Indicates if the traffic matched against the rule in inbound or outbound.

    Required. Known values are: "Inbound" and "Outbound".'
  name: direction
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.SecurityConfigurationRuleDirection>
- description: 'The provisioning state of the resource. Known values are: "Failed",

    "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
- description: Unique identifier for this resource.
  name: resource_guid
  types:
  - <xref:str>
