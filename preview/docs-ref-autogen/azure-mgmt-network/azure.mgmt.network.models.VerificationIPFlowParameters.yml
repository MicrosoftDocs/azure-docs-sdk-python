### YamlMime:PythonClass
uid: azure.mgmt.network.models.VerificationIPFlowParameters
name: VerificationIPFlowParameters
fullName: azure.mgmt.network.models.VerificationIPFlowParameters
module: azure.mgmt.network.models
summary: Parameters that define the IP flow to be verified.
constructor:
  syntax: 'VerificationIPFlowParameters(*args: Any, **kwargs: Any)'
variables:
- description: The ID of the target resource to perform next-hop on. Required.
  name: target_resource_id
  types:
  - <xref:str>
- description: 'The direction of the packet represented as a 5-tuple. Required. Known
    values

    are: "Inbound" and "Outbound".'
  name: direction
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.Direction>
- description: 'Protocol to be verified on. Required. Known values are: "TCP" and
    "UDP".'
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.IpFlowProtocol>
- description: 'The local port. Acceptable values are a single integer in the range

    (0-65535). Support for * for the source port, which depends on the direction.
    Required.'
  name: local_port
  types:
  - <xref:str>
- description: 'The remote port. Acceptable values are a single integer in the range

    (0-65535). Support for * for the source port, which depends on the direction.
    Required.'
  name: remote_port
  types:
  - <xref:str>
- description: 'The local IP address. Acceptable values are valid IPv4 addresses.

    Required.'
  name: local_ip_address
  types:
  - <xref:str>
- description: 'The remote IP address. Acceptable values are valid IPv4 addresses.

    Required.'
  name: remote_ip_address
  types:
  - <xref:str>
- description: 'The NIC ID. (If VM has multiple NICs and IP forwarding is enabled

    on any of them, then this parameter must be specified. Otherwise optional).'
  name: target_nic_resource_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.direction
  name: direction
  summary: '"Inbound"

    and "Outbound".'
  signature: 'direction: str | _models.Direction'
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.local_ip_address
  name: local_ip_address
  summary: The local IP address. Acceptable values are valid IPv4 addresses. Required.
  signature: 'local_ip_address: str'
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.local_port
  name: local_port
  summary: 'The local port. Acceptable values are a single integer in the range (0-65535).
    Support for *

    for the source port, which depends on the direction. Required.'
  signature: 'local_port: str'
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.protocol
  name: protocol
  summary: '"TCP" and "UDP".'
  signature: 'protocol: str | _models.IpFlowProtocol'
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.remote_ip_address
  name: remote_ip_address
  summary: The remote IP address. Acceptable values are valid IPv4 addresses. Required.
  signature: 'remote_ip_address: str'
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.remote_port
  name: remote_port
  summary: 'The remote port. Acceptable values are a single integer in the range (0-65535).
    Support for *

    for the source port, which depends on the direction. Required.'
  signature: 'remote_port: str'
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.target_nic_resource_id
  name: target_nic_resource_id
  summary: 'The NIC ID. (If VM has multiple NICs and IP forwarding is enabled on any
    of them, then this

    parameter must be specified. Otherwise optional).'
  signature: 'target_nic_resource_id: str | None'
- uid: azure.mgmt.network.models.VerificationIPFlowParameters.target_resource_id
  name: target_resource_id
  summary: The ID of the target resource to perform next-hop on. Required.
  signature: 'target_resource_id: str'
