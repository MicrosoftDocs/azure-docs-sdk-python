  name: enabled
  types:
  - <xref:bool>
- description: 'If the encrypted VNet allows VM that does not support encryption.
    This field

    is for future support, AllowUnencrypted is the only supported value at general
    availability.

    Known values are: "DropUnencrypted" and "AllowUnencrypted".'
  name: enforcement
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.VirtualNetworkEncryptionEnforcement>
attributes:
- uid: azure.mgmt.network.models.VirtualNetworkEncryption.enabled
  name: enabled
  summary: Indicates if encryption is enabled on the virtual network. Required.
  signature: 'enabled: bool'
- uid: azure.mgmt.network.models.VirtualNetworkEncryption.enforcement
  name: enforcement
  summary: 'If the encrypted VNet allows VM that does not support encryption. This
    field is for future

    support, AllowUnencrypted is the only supported value at general availability.
