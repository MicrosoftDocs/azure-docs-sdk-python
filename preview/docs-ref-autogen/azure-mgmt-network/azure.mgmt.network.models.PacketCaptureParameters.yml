    of

    AzureVMSS.'
  signature: 'scope: _models.PacketCaptureMachineScope | None'
- uid: azure.mgmt.network.models.PacketCaptureParameters.storage_location
  name: storage_location
  summary: The storage location for a packet capture session. Required.
  signature: 'storage_location: _models.PacketCaptureStorageLocation'
- uid: azure.mgmt.network.models.PacketCaptureParameters.target
  name: target
  summary: 'The ID of the targeted resource, only AzureVM and AzureVMSS as target
