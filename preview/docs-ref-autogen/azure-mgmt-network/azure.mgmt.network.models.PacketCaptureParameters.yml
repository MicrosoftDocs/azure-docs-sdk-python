  name: time_limit_in_seconds
  summary: Maximum duration of the capture session in seconds.
  signature: 'time_limit_in_seconds: int | None'
- uid: azure.mgmt.network.models.PacketCaptureParameters.total_bytes_per_session
  name: total_bytes_per_session
  summary: Maximum size of the capture output.
  signature: 'total_bytes_per_session: int | None'
