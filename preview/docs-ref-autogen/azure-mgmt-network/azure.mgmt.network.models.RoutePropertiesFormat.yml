### YamlMime:PythonClass
uid: azure.mgmt.network.models.RoutePropertiesFormat
name: RoutePropertiesFormat
fullName: azure.mgmt.network.models.RoutePropertiesFormat
module: azure.mgmt.network.models
summary: Route resource.
constructor:
  syntax: 'RoutePropertiesFormat(*args: Any, **kwargs: Any)'
variables:
- description: The destination CIDR to which the route applies.
  name: address_prefix
  types:
  - <xref:str>
- description: 'The type of Azure hop the packet should be sent to. Required. Known
    values

    are: "VirtualNetworkGateway", "VnetLocal", "Internet", "VirtualAppliance", and
    "None".'
  name: next_hop_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.RouteNextHopType>
- description: 'The IP address packets should be forwarded to. Next hop values are

    only allowed in routes where the next hop type is VirtualAppliance.'
  name: next_hop_ip_address
  types:
  - <xref:str>
- description: 'The provisioning state of the route resource. Known values are:

    "Failed", "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
- description: 'A value indicating whether this route overrides overlapping BGP routes

    regardless of LPM.'
  name: has_bgp_override
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.network.models.RoutePropertiesFormat.address_prefix
  name: address_prefix
  summary: The destination CIDR to which the route applies.
  signature: 'address_prefix: str | None'
- uid: azure.mgmt.network.models.RoutePropertiesFormat.has_bgp_override
  name: has_bgp_override
  summary: A value indicating whether this route overrides overlapping BGP routes
    regardless of LPM.
  signature: 'has_bgp_override: bool | None'
- uid: azure.mgmt.network.models.RoutePropertiesFormat.next_hop_ip_address
  name: next_hop_ip_address
  summary: 'The IP address packets should be forwarded to. Next hop values are only
    allowed in routes where

    the next hop type is VirtualAppliance.'
  signature: 'next_hop_ip_address: str | None'
- uid: azure.mgmt.network.models.RoutePropertiesFormat.next_hop_type
  name: next_hop_type
  summary: 'The type of Azure hop the packet should be sent to. Required. Known values
    are:

    "VirtualNetworkGateway", "VnetLocal", "Internet", "VirtualAppliance", and "None".'
  signature: 'next_hop_type: str | _models.RouteNextHopType'
- uid: azure.mgmt.network.models.RoutePropertiesFormat.provisioning_state
  name: provisioning_state
  summary: '"Failed", "Succeeded",

    "Canceled", "Creating", "Updating", and "Deleting".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
