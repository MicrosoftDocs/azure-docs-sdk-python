uid: azure.mgmt.network.models.PacketCaptureMachineScope
name: PacketCaptureMachineScope
fullName: azure.mgmt.network.models.PacketCaptureMachineScope
module: azure.mgmt.network.models
summary: 'A list of AzureVMSS instances which can be included or excluded to run packet
  capture. If both

  included and excluded are empty, then the packet capture will run on all instances
  of

  AzureVMSS.'
constructor:
  syntax: 'PacketCaptureMachineScope(*args: Any, **kwargs: Any)'
variables:
- description: List of AzureVMSS instances to run packet capture on.
  name: include
  types:
  - <xref:list>[<xref:str>]
- description: 'List of AzureVMSS instances which has to be excluded from the AzureVMSS
    from

    running packet capture.'
  name: exclude
  types:
  - <xref:list>[<xref:str>]
attributes:
- uid: azure.mgmt.network.models.PacketCaptureMachineScope.exclude
  name: exclude
  summary: 'List of AzureVMSS instances which has to be excluded from the AzureVMSS
    from running packet

    capture.'
  signature: 'exclude: list[str] | None'
- uid: azure.mgmt.network.models.PacketCaptureMachineScope.include
  name: include
  summary: List of AzureVMSS instances to run packet capture on.
  signature: 'include: list[str] | None'
