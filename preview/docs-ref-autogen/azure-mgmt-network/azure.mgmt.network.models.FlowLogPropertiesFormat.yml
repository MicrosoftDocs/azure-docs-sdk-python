### YamlMime:PythonClass
uid: azure.mgmt.network.models.FlowLogPropertiesFormat
name: FlowLogPropertiesFormat
fullName: azure.mgmt.network.models.FlowLogPropertiesFormat
module: azure.mgmt.network.models
summary: Parameters that define the configuration of flow log.
constructor:
  syntax: 'FlowLogPropertiesFormat(*args: Any, **kwargs: Any)'
variables:
- description: 'ID of network security group to which flow log will be applied.

    Required.'
  name: target_resource_id
  types:
  - <xref:str>
- description: Guid of network security group to which flow log will be applied.
  name: target_resource_guid
  types:
  - <xref:str>
- description: ID of the storage account which is used to store the flow log. Required.
  name: storage_id
  types:
  - <xref:str>
- description: 'Optional field to filter network traffic logs based on SrcIP,

    SrcPort, DstIP, DstPort, Protocol, Encryption, Direction and Action. If not specified,
    all

    network traffic will be logged.'
  name: enabled_filtering_criteria
  types:
  - <xref:str>
- description: 'Optional field to filter network traffic logs based on flow states.
    Value

    of this field could be any comma separated combination string of letters B,C,E
    or D. B

    represents Begin, when a flow is created. C represents Continue for an ongoing
    flow generated

    at every five-minute interval. E represents End, when a flow is terminated. D
    represents Deny,

    when a flow is denied. If not specified, all network traffic will be logged.'
  name: record_types
  types:
  - <xref:str>
- description: Flag to enable/disable flow logging.
  name: enabled
  types:
  - <xref:bool>
- description: Parameters that define the retention policy for flow log.
  name: retention_policy
  types:
  - <xref:azure.mgmt.network.models.RetentionPolicyParameters>
- description: Parameters that define the flow log format.
  name: format
  types:
  - <xref:azure.mgmt.network.models.FlowLogFormatParameters>
- description: 'Parameters that define the configuration of traffic

    analytics.'
  name: flow_analytics_configuration
  types:
  - <xref:azure.mgmt.network.models.TrafficAnalyticsProperties>
- description: 'The provisioning state of the flow log. Known values are: "Failed",

    "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
attributes:
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.enabled
  name: enabled
  summary: Flag to enable/disable flow logging.
  signature: 'enabled: bool | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.enabled_filtering_criteria
  name: enabled_filtering_criteria
  summary: 'Optional field to filter network traffic logs based on SrcIP, SrcPort,
    DstIP, DstPort,

    Protocol, Encryption, Direction and Action. If not specified, all network traffic
    will be

    logged.'
  signature: 'enabled_filtering_criteria: str | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.flow_analytics_configuration
  name: flow_analytics_configuration
  summary: Parameters that define the configuration of traffic analytics.
  signature: 'flow_analytics_configuration: _models.TrafficAnalyticsProperties | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.format
  name: format
  summary: Parameters that define the flow log format.
  signature: 'format: _models.FlowLogFormatParameters | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.provisioning_state
  name: provisioning_state
  summary: '"Failed", "Succeeded",

    "Canceled", "Creating", "Updating", and "Deleting".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.record_types
  name: record_types
  summary: 'Optional field to filter network traffic logs based on flow states. Value
    of this field could

    be any comma separated combination string of letters B,C,E or D. B represents
    Begin, when a

    flow is created. C represents Continue for an ongoing flow generated at every
    five-minute

    interval. E represents End, when a flow is terminated. D represents Deny, when
    a flow is

    denied. If not specified, all network traffic will be logged.'
  signature: 'record_types: str | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.retention_policy
  name: retention_policy
  summary: Parameters that define the retention policy for flow log.
  signature: 'retention_policy: _models.RetentionPolicyParameters | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.storage_id
  name: storage_id
  summary: ID of the storage account which is used to store the flow log. Required.
  signature: 'storage_id: str'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.target_resource_guid
  name: target_resource_guid
  summary: Guid of network security group to which flow log will be applied.
  signature: 'target_resource_guid: str | None'
- uid: azure.mgmt.network.models.FlowLogPropertiesFormat.target_resource_id
  name: target_resource_id
  summary: ID of network security group to which flow log will be applied. Required.
  signature: 'target_resource_id: str'
