    private link service in the subnet. Known values are: "Enabled" and "Disabled".'
  name: private_link_service_network_policies
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.VirtualNetworkPrivateLinkServiceNetworkPolicies>
