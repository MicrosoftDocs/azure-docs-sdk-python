### YamlMime:PythonClass
uid: azure.mgmt.network.models.HeaderValueMatcher
name: HeaderValueMatcher
fullName: azure.mgmt.network.models.HeaderValueMatcher
module: azure.mgmt.network.models
summary: 'An optional field under "Rewrite Action". It lets you capture and modify
  the value(s) of a

  specific header when multiple headers with the same name exist. Currently supported
  for

  Set-Cookie Response header only. For more details, visit [https://aka.ms/appgwheadercrud](https://aka.ms/appgwheadercrud).'
constructor:
  syntax: 'HeaderValueMatcher(*args: Any, **kwargs: Any)'
variables:
- description: 'The pattern, either fixed string or regular expression, that evaluates
    if a

    header value should be selected for rewrite.'
  name: pattern
  types:
  - <xref:str>
- description: 'Setting this parameter to truth value with force the pattern to do
    a case

    in-sensitive comparison.'
  name: ignore_case
  types:
  - <xref:bool>
- description: 'Setting this value as truth will force to check the negation of the
    condition

    given by the user in the pattern field.'
  name: negate
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.network.models.HeaderValueMatcher.ignore_case
  name: ignore_case
  summary: 'Setting this parameter to truth value with force the pattern to do a case
    in-sensitive

    comparison.'
  signature: 'ignore_case: bool | None'
- uid: azure.mgmt.network.models.HeaderValueMatcher.negate
  name: negate
  summary: 'Setting this value as truth will force to check the negation of the condition
    given by the user

    in the pattern field.'
  signature: 'negate: bool | None'
- uid: azure.mgmt.network.models.HeaderValueMatcher.pattern
  name: pattern
  summary: 'The pattern, either fixed string or regular expression, that evaluates
    if a header value should

    be selected for rewrite.'
  signature: 'pattern: str | None'
