### YamlMime:PythonClass
uid: azure.mgmt.network.models.ApplicationGatewayBackendHttpSettingsPropertiesFormat
name: ApplicationGatewayBackendHttpSettingsPropertiesFormat
fullName: azure.mgmt.network.models.ApplicationGatewayBackendHttpSettingsPropertiesFormat
module: azure.mgmt.network.models
summary: Properties of Backend address pool settings of an application gateway.
constructor:
  syntax: 'ApplicationGatewayBackendHttpSettingsPropertiesFormat(*args: Any, **kwargs:
    Any)'
variables:
- description: The destination port on the backend.
  name: port
  types:
  - <xref:int>
- description: 'The protocol used to communicate with the backend. Known values are:
    "Http",

    "Https", "Tcp", and "Tls".'
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ApplicationGatewayProtocol>
- description: 'Cookie based affinity. Known values are: "Enabled" and "Disabled".'
  name: cookie_based_affinity
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ApplicationGatewayCookieBasedAffinity>
- description: 'Request timeout in seconds. Application Gateway will fail the request
    if

    response is not received within RequestTimeout. Acceptable values are from 1 second
    to 86400

    seconds.'
  name: request_timeout
  types:
  - <xref:int>
- description: Probe resource of an application gateway.
  name: probe
  types:
  - <xref:azure.mgmt.network.models.SubResource>
- description: 'Array of references to application gateway authentication

    certificates.'
  name: authentication_certificates
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.SubResource>]
- description: 'Array of references to application gateway trusted root

    certificates.'
  name: trusted_root_certificates
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.SubResource>]
- description: Connection draining of the backend http settings resource.
  name: connection_draining
  types:
  - <xref:azure.mgmt.network.models.ApplicationGatewayConnectionDraining>
- description: Host header to be sent to the backend servers.
  name: host_name
  types:
  - <xref:str>
- description: 'Whether to pick host header should be picked from

    the host name of the backend server. Default value is false.'
  name: pick_host_name_from_backend_address
  types:
  - <xref:bool>
- description: Cookie name to use for the affinity cookie.
  name: affinity_cookie_name
  types:
  - <xref:str>
- description: Whether the probe is enabled. Default value is false.
  name: probe_enabled
  types:
  - <xref:bool>
- description: 'Path which should be used as a prefix for all HTTP requests. Null
    means no path

    will be prefixed. Default value is null.'
  name: path
  types:
  - <xref:str>
- description: 'Enable or disable dedicated connection per backend server.

    Default is set to false.'
  name: dedicated_backend_connection
  types:
  - <xref:bool>
- description: 'Verify or skip both chain and expiry validations of the

    certificate on the backend server. Default is set to true.'
  name: validate_cert_chain_and_expiry
  types:
  - <xref:bool>
- description: 'When enabled, verifies if the Common Name of the certificate provided
    by

    the backend server matches the Server Name Indication (SNI) value. Default value
    is true.'
  name: validate_sni
  types:
  - <xref:bool>
- description: 'Specify an SNI value to match the common name of the certificate on
    the

    backend. By default, the application gateway uses the incoming request''s host
    header as the

    SNI. Default value is null.'
  name: sni_name
  types:
  - <xref:str>
- description: 'The provisioning state of the backend HTTP settings resource. Known

    values are: "Failed", "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
