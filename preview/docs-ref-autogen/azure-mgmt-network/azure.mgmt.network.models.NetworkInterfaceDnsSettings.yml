### YamlMime:PythonClass
uid: azure.mgmt.network.models.NetworkInterfaceDnsSettings
name: NetworkInterfaceDnsSettings
fullName: azure.mgmt.network.models.NetworkInterfaceDnsSettings
module: azure.mgmt.network.models
summary: DNS settings of a network interface.
constructor:
  syntax: 'NetworkInterfaceDnsSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'List of DNS servers IP addresses. Use ''AzureProvidedDNS'' to switch
    to azure

    provided DNS resolution. ''AzureProvidedDNS'' value cannot be combined with other
    IPs, it must be

    the only value in dnsServers collection.'
  name: dns_servers
  types:
  - <xref:list>[<xref:str>]
- description: 'If the VM that uses this NIC is part of an Availability Set, then

    this list will have the union of all DNS servers from all NICs that are part of
    the

    Availability Set. This property is what is configured on each of those VMs.'
  name: applied_dns_servers
  types:
  - <xref:list>[<xref:str>]
- description: 'Relative DNS name for this NIC used for internal communications

    between VMs in the same virtual network.'
  name: internal_dns_name_label
  types:
  - <xref:str>
- description: 'Fully qualified DNS name supporting internal communications between
    VMs in

    the same virtual network.'
  name: internal_fqdn
  types:
  - <xref:str>
- description: 'Even if internalDnsNameLabel is not specified, a DNS entry

    is created for the primary NIC of the VM. This DNS name can be constructed by
    concatenating the

    VM name with the value of internalDomainNameSuffix.'
  name: internal_domain_name_suffix
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.network.models.NetworkInterfaceDnsSettings.applied_dns_servers
  name: applied_dns_servers
  summary: 'If the VM that uses this NIC is part of an Availability Set, then this
    list will have the union

    of all DNS servers from all NICs that are part of the Availability Set. This property
    is what

    is configured on each of those VMs.'
  signature: 'applied_dns_servers: list[str] | None'
- uid: azure.mgmt.network.models.NetworkInterfaceDnsSettings.dns_servers
  name: dns_servers
  summary: 'List of DNS servers IP addresses. Use ''AzureProvidedDNS'' to switch to
    azure provided DNS

    resolution. ''AzureProvidedDNS'' value cannot be combined with other IPs, it must
    be the only

    value in dnsServers collection.'
  signature: 'dns_servers: list[str] | None'
- uid: azure.mgmt.network.models.NetworkInterfaceDnsSettings.internal_dns_name_label
  name: internal_dns_name_label
  summary: 'Relative DNS name for this NIC used for internal communications between
    VMs in the same virtual

    network.'
  signature: 'internal_dns_name_label: str | None'
- uid: azure.mgmt.network.models.NetworkInterfaceDnsSettings.internal_domain_name_suffix
  name: internal_domain_name_suffix
  summary: 'Even if internalDnsNameLabel is not specified, a DNS entry is created
    for the primary NIC of

    the VM. This DNS name can be constructed by concatenating the VM name with the
    value of

    internalDomainNameSuffix.'
  signature: 'internal_domain_name_suffix: str | None'
- uid: azure.mgmt.network.models.NetworkInterfaceDnsSettings.internal_fqdn
  name: internal_fqdn
  summary: 'Fully qualified DNS name supporting internal communications between VMs
    in the same virtual

    network.'
  signature: 'internal_fqdn: str | None'
