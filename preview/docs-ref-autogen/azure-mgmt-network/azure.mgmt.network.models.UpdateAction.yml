summary: "Specifies the type of update operation to perform on address locations within\
  \ the service\ngateway.\n\n* FullUpdate: Replaces all existing address location\
  \ data with the new list provided in the \n\nrequest. Any previously defined locations\
  \ not included will be removed.\n* PartialUpdate: Updates only the specified address\
  \ locations."
