### YamlMime:PythonClass
uid: azure.mgmt.network.models.FlowLogProperties
name: FlowLogProperties
fullName: azure.mgmt.network.models.FlowLogProperties
module: azure.mgmt.network.models
summary: Parameters that define the configuration of flow log.
constructor:
  syntax: 'FlowLogProperties(*args: Any, **kwargs: Any)'
variables:
- description: ID of the storage account which is used to store the flow log. Required.
  name: storage_id
  types:
  - <xref:str>
- description: 'Optional field to filter network traffic logs based on SrcIP,

    SrcPort, DstIP, DstPort, Protocol, Encryption, Direction and Action. If not specified,
    all

    network traffic will be logged.'
  name: enabled_filtering_criteria
  types:
  - <xref:str>
- description: 'Optional field to filter network traffic logs based on flow states.
    Value

    of this field could be any comma separated combination string of letters B,C,E
    or D. B

    represents Begin, when a flow is created. C represents Continue for an ongoing
    flow generated

    at every five-minute interval. E represents End, when a flow is terminated. D
    represents Deny,

    when a flow is denied. If not specified, all network traffic will be logged.'
  name: record_types
  types:
  - <xref:str>
- description: Flag to enable/disable flow logging. Required.
  name: enabled
  types:
  - <xref:bool>
- description: Parameters that define the retention policy for flow log.
  name: retention_policy
  types:
  - <xref:azure.mgmt.network.models.RetentionPolicyParameters>
- description: Parameters that define the flow log format.
  name: format
  types:
  - <xref:azure.mgmt.network.models.FlowLogFormatParameters>
attributes:
- uid: azure.mgmt.network.models.FlowLogProperties.enabled
  name: enabled
  summary: Flag to enable/disable flow logging. Required.
  signature: 'enabled: bool'
- uid: azure.mgmt.network.models.FlowLogProperties.enabled_filtering_criteria
  name: enabled_filtering_criteria
  summary: 'Optional field to filter network traffic logs based on SrcIP, SrcPort,
    DstIP, DstPort,

    Protocol, Encryption, Direction and Action. If not specified, all network traffic
    will be

    logged.'
  signature: 'enabled_filtering_criteria: str | None'
- uid: azure.mgmt.network.models.FlowLogProperties.format
  name: format
  summary: Parameters that define the flow log format.
  signature: 'format: _models.FlowLogFormatParameters | None'
- uid: azure.mgmt.network.models.FlowLogProperties.record_types
  name: record_types
  summary: 'Optional field to filter network traffic logs based on flow states. Value
    of this field could

    be any comma separated combination string of letters B,C,E or D. B represents
    Begin, when a

    flow is created. C represents Continue for an ongoing flow generated at every
    five-minute

    interval. E represents End, when a flow is terminated. D represents Deny, when
    a flow is

    denied. If not specified, all network traffic will be logged.'
  signature: 'record_types: str | None'
- uid: azure.mgmt.network.models.FlowLogProperties.retention_policy
  name: retention_policy
  summary: Parameters that define the retention policy for flow log.
  signature: 'retention_policy: _models.RetentionPolicyParameters | None'
