### YamlMime:PythonClass
uid: azure.mgmt.network.models.ProbePropertiesFormat
name: ProbePropertiesFormat
fullName: azure.mgmt.network.models.ProbePropertiesFormat
module: azure.mgmt.network.models
summary: Load balancer probe resource.
constructor:
  syntax: 'ProbePropertiesFormat(*args: Any, **kwargs: Any)'
variables:
- description: The load balancer rules that use this probe.
  name: load_balancing_rules
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.SubResource>]
- description: 'The protocol of the end point. If ''Tcp'' is specified, a received
    ACK is

    required for the probe to be successful. If ''Http'' or ''Https'' is specified,
    a 200 OK response

    from the specifies URI is required for the probe to be successful. Required. Known
    values are:

    "Http", "Tcp", and "Https".'
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProbeProtocol>
- description: 'The port for communicating the probe. Possible values range from 1
    to 65535,

    inclusive. Required.'
  name: port
  types:
  - <xref:int>
- description: 'The interval, in seconds, for how frequently to probe the endpoint

    for health status. Typically, the interval is slightly less than half the allocated
    timeout

    period (in seconds) which allows two full probes before taking the instance out
    of rotation.

    The default value is 15, the minimum value is 5.'
  name: interval_in_seconds
  types:
  - <xref:int>
- description: 'Determines how new connections are handled by the load

    balancer when all backend instances are probed down. Known values are: "AllProbedDown"
    and

    "AllProbedUp".'
  name: no_healthy_backends_behavior
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProbeNoHealthyBackendsBehavior>
- description: 'The number of probes where if no response, will result in stopping

    further traffic from being delivered to the endpoint. This values allows endpoints
    to be taken

    out of rotation faster or slower than the typical times used in Azure.'
  name: number_of_probes
  types:
  - <xref:int>
- description: 'The number of consecutive successful or failed probes in order to
    allow

    or deny traffic from being delivered to this endpoint. After failing the number
    of consecutive

    probes equal to this value, the endpoint will be taken out of rotation and require
    the same

    number of successful consecutive probes to be placed back in rotation.'
  name: probe_threshold
  types:
  - <xref:int>
- description: 'The URI used for requesting health status from the VM. Path is required
    if

    a protocol is set to http. Otherwise, it is not allowed. There is no default value.'
  name: request_path
  types:
  - <xref:str>
- description: 'The provisioning state of the probe resource. Known values are:

    "Failed", "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
attributes:
- uid: azure.mgmt.network.models.ProbePropertiesFormat.interval_in_seconds
  name: interval_in_seconds
  summary: 'The interval, in seconds, for how frequently to probe the endpoint for
    health status.

    Typically, the interval is slightly less than half the allocated timeout period
    (in seconds)

    which allows two full probes before taking the instance out of rotation. The default
    value is

    15, the minimum value is 5.'
  signature: 'interval_in_seconds: int | None'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.load_balancing_rules
  name: load_balancing_rules
  summary: The load balancer rules that use this probe.
  signature: 'load_balancing_rules: list[''_models.SubResource''] | None'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.no_healthy_backends_behavior
  name: no_healthy_backends_behavior
  summary: 'Determines how new connections are handled by the load balancer when all
    backend instances are

    probed down. Known values are: "AllProbedDown" and "AllProbedUp".'
  signature: 'no_healthy_backends_behavior: str | _models.ProbeNoHealthyBackendsBehavior
    | None'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.number_of_probes
  name: number_of_probes
  summary: 'The number of probes where if no response, will result in stopping further
    traffic from being

    delivered to the endpoint. This values allows endpoints to be taken out of rotation
    faster or

    slower than the typical times used in Azure.'
  signature: 'number_of_probes: int | None'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.port
  name: port
  summary: 'The port for communicating the probe. Possible values range from 1 to
    65535, inclusive.

    Required.'
  signature: 'port: int'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.probe_threshold
  name: probe_threshold
  summary: 'The number of consecutive successful or failed probes in order to allow
    or deny traffic from

    being delivered to this endpoint. After failing the number of consecutive probes
    equal to this

    value, the endpoint will be taken out of rotation and require the same number
    of successful

    consecutive probes to be placed back in rotation.'
  signature: 'probe_threshold: int | None'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.protocol
  name: protocol
  summary: 'The protocol of the end point. If ''Tcp'' is specified, a received ACK
    is required for the probe

    to be successful. If ''Http'' or ''Https'' is specified, a 200 OK response from
    the specifies URI

    is required for the probe to be successful. Required. Known values are: "Http",
    "Tcp", and

    "Https".'
  signature: 'protocol: str | _models.ProbeProtocol'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.provisioning_state
  name: provisioning_state
  summary: '"Failed", "Succeeded",

    "Canceled", "Creating", "Updating", and "Deleting".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.network.models.ProbePropertiesFormat.request_path
  name: request_path
  summary: 'The URI used for requesting health status from the VM. Path is required
    if a protocol is set to

    http. Otherwise, it is not allowed. There is no default value.'
  signature: 'request_path: str | None'
