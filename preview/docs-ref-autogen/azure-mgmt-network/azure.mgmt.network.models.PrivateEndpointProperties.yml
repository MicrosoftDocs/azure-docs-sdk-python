### YamlMime:PythonClass
uid: azure.mgmt.network.models.PrivateEndpointProperties
name: PrivateEndpointProperties
fullName: azure.mgmt.network.models.PrivateEndpointProperties
module: azure.mgmt.network.models
summary: Properties of the private endpoint.
constructor:
  syntax: 'PrivateEndpointProperties(*args: Any, **kwargs: Any)'
variables:
- description: The ID of the subnet from which the private IP will be allocated.
  name: subnet
  types:
  - <xref:azure.mgmt.network.models.Subnet>
- description: 'An array of references to the network interfaces created for this

    private endpoint.'
  name: network_interfaces
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.NetworkInterface>]
- description: 'The provisioning state of the private endpoint resource. Known values

    are: "Failed", "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
- description: 'Specifies the IP version type for the private IPs of the private

    endpoint. If not defined, this defaults to IPv4. Known values are: "IPv4", "IPv6",
    and

    "DualStack".'
  name: ip_version_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.PrivateEndpointIPVersionType>
- description: 'A grouping of information about the connection to the

    remote resource.'
  name: private_link_service_connections
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.PrivateLinkServiceConnection>]
- description: 'A grouping of information about the connection

    to the remote resource. Used when the network admin does not have access to approve
    connections

    to the remote resource.'
  name: manual_private_link_service_connections
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.PrivateLinkServiceConnection>]
- description: An array of custom dns configurations.
  name: custom_dns_configs
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.CustomDnsConfigPropertiesFormat>]
- description: 'Application security groups in which the private endpoint IP

    configuration is included.'
  name: application_security_groups
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.ApplicationSecurityGroup>]
- description: 'A list of IP configurations of the private endpoint. This will be
    used

    to map to the First Party Service''s endpoints.'
  name: ip_configurations
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.PrivateEndpointIPConfiguration>]
- description: 'The custom name of the network interface attached to the

    private endpoint.'
  name: custom_network_interface_name
  types:
  - <xref:str>
