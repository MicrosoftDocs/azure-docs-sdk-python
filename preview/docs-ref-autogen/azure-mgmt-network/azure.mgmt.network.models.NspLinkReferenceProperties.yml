- uid: azure.mgmt.network.models.NspLinkReferenceProperties.remote_outbound_profiles
  name: remote_outbound_profiles
  summary: 'Remote Outbound profile names from which Outbound is allowed. [''*'']
    value implies outbound is

    allowed from all profiles at remote perimeter. This property can only be updated
