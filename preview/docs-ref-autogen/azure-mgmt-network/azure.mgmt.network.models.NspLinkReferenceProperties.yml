- uid: azure.mgmt.network.models.NspLinkReferenceProperties.remote_perimeter_location
  name: remote_perimeter_location
  summary: Remote NSP location with which the link gets created.
  signature: 'remote_perimeter_location: str | None'
- uid: azure.mgmt.network.models.NspLinkReferenceProperties.remote_perimeter_resource_id
  name: remote_perimeter_resource_id
  summary: Perimeter ARM Id for the remote NSP with which the link is created.
  signature: 'remote_perimeter_resource_id: str | None'
- uid: azure.mgmt.network.models.NspLinkReferenceProperties.status
  name: status
  summary: 'The NSP linkReference state. It cannot be changed if link is created in
