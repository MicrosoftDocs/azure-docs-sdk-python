    corresponding link resource present in remote perimeter.'
  signature: 'remote_outbound_profiles: list[str] | None'
- uid: azure.mgmt.network.models.NspLinkReferenceProperties.remote_perimeter_guid
  name: remote_perimeter_guid
  summary: Remote NSP Guid with which the link is created.
