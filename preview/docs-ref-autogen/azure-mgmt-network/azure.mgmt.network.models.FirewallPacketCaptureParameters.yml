  summary: Duration of packet capture in seconds. If the field is not provided, the
    default value is 60.
  signature: 'duration_in_seconds: int | None'
- uid: azure.mgmt.network.models.FirewallPacketCaptureParameters.file_name
  name: file_name
  summary: Name of file to be uploaded to sasURL.
  signature: 'file_name: str | None'
- uid: azure.mgmt.network.models.FirewallPacketCaptureParameters.filters
  name: filters
  summary: Rules to filter packet captures.
  signature: 'filters: list[''_models.AzureFirewallPacketCaptureRule''] | None'
- uid: azure.mgmt.network.models.FirewallPacketCaptureParameters.flags
  name: flags
  summary: The tcp-flag type to be captured. Used with protocol TCP.
