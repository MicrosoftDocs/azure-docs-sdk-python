### YamlMime:PythonClass
uid: azure.mgmt.network.models.ApplicationGatewayBackendSettingsPropertiesFormat
name: ApplicationGatewayBackendSettingsPropertiesFormat
fullName: azure.mgmt.network.models.ApplicationGatewayBackendSettingsPropertiesFormat
module: azure.mgmt.network.models
summary: Properties of Backend address pool settings of an application gateway.
constructor:
  syntax: 'ApplicationGatewayBackendSettingsPropertiesFormat(*args: Any, **kwargs:
    Any)'
variables:
- description: The destination port on the backend.
  name: port
  types:
  - <xref:int>
- description: 'The protocol used to communicate with the backend. Known values are:
    "Http",

    "Https", "Tcp", and "Tls".'
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ApplicationGatewayProtocol>
- description: 'Connection timeout in seconds. Application Gateway will fail the request
    if

    response is not received within ConnectionTimeout. Acceptable values are from
    1 second to 86400

    seconds.'
  name: timeout
  types:
  - <xref:int>
- description: Probe resource of an application gateway.
  name: probe
  types:
  - <xref:azure.mgmt.network.models.SubResource>
- description: 'Array of references to application gateway trusted root

    certificates.'
  name: trusted_root_certificates
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.SubResource>]
- description: Server name indication to be sent to the backend servers for Tls protocol.
  name: host_name
  types:
  - <xref:str>
- description: 'Whether to pick server name indication from the host

    name of the backend server for Tls protocol. Default value is false.'
  name: pick_host_name_from_backend_address
  types:
  - <xref:bool>
- description: 'Whether to send Proxy Protocol header to backend

    servers over TCP or TLS protocols. Default value is false.'
  name: enable_l4_client_ip_preservation
  types:
  - <xref:bool>
- description: 'The provisioning state of the backend HTTP settings resource. Known

    values are: "Failed", "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
