### YamlMime:PythonClass
uid: azure.mgmt.network.models.PacketCaptureStorageLocation
name: PacketCaptureStorageLocation
fullName: azure.mgmt.network.models.PacketCaptureStorageLocation
module: azure.mgmt.network.models
summary: The storage location for a packet capture session.
constructor:
  syntax: 'PacketCaptureStorageLocation(*args: Any, **kwargs: Any)'
variables:
- description: 'The ID of the storage account to save the packet capture session.
    Required if

    no localPath or filePath is provided.'
  name: storage_id
  types:
  - <xref:str>
- description: 'The URI of the storage path to save the packet capture. Must be a

    well-formed URI describing the location to save the packet capture.'
  name: storage_path
  types:
  - <xref:str>
- description: 'This path is invalid if ''Continuous Capture'' is provided with ''true''
    or

    ''false''. A valid local path on the targeting VM. Must include the name of the
    capture file

    (>>*<<.cap). For linux virtual machine it must start with /var/captures. Required
    if no storage ID

    is provided, otherwise optional.'
  name: file_path
  types:
  - <xref:str>
- description: 'This path is valid if ''Continuous Capture'' is provided with ''true''
    or ''false''

    and required if no storage ID is provided, otherwise optional. Must include the
    name of the

    capture file (>>*<<.cap). For linux virtual machine it must start with /var/captures.'
  name: local_path
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.network.models.PacketCaptureStorageLocation.file_path
  name: file_path
  summary: 'This path is invalid if ''Continuous Capture'' is provided with ''true''
    or ''false''. A valid local

    path on the targeting VM. Must include the name of the capture file (>>*<<.cap).
    For linux virtual

    machine it must start with /var/captures. Required if no storage ID is provided,
    otherwise

    optional.'
  signature: 'file_path: str | None'
- uid: azure.mgmt.network.models.PacketCaptureStorageLocation.local_path
  name: local_path
  summary: 'This path is valid if ''Continuous Capture'' is provided with ''true''
    or ''false'' and required if

    no storage ID is provided, otherwise optional. Must include the name of the capture
    file

    (>>*<<.cap). For linux virtual machine it must start with /var/captures.'
  signature: 'local_path: str | None'
- uid: azure.mgmt.network.models.PacketCaptureStorageLocation.storage_id
  name: storage_id
  summary: 'The ID of the storage account to save the packet capture session. Required
    if no localPath or

    filePath is provided.'
  signature: 'storage_id: str | None'
- uid: azure.mgmt.network.models.PacketCaptureStorageLocation.storage_path
  name: storage_path
  summary: 'The URI of the storage path to save the packet capture. Must be a well-formed
    URI describing

    the location to save the packet capture.'
  signature: 'storage_path: str | None'
