### YamlMime:PythonClass
uid: azure.mgmt.network.models.VirtualNetworkGatewayPropertiesFormat
name: VirtualNetworkGatewayPropertiesFormat
fullName: azure.mgmt.network.models.VirtualNetworkGatewayPropertiesFormat
module: azure.mgmt.network.models
summary: VirtualNetworkGateway properties.
constructor:
  syntax: 'VirtualNetworkGatewayPropertiesFormat(*args: Any, **kwargs: Any)'
variables:
- description: Autoscale configuration for virutal network gateway.
  name: auto_scale_configuration
  types:
  - <xref:azure.mgmt.network.models.VirtualNetworkGatewayAutoScaleConfiguration>
- description: IP configurations for virtual network gateway.
  name: ip_configurations
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.VirtualNetworkGatewayIPConfiguration>]
- description: 'The type of this virtual network gateway. Known values are: "Vpn",

    "ExpressRoute", and "LocalGateway".'
  name: gateway_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.VirtualNetworkGatewayType>
- description: 'The type of this virtual network gateway. Known values are: "PolicyBased"
    and

    "RouteBased".'
  name: vpn_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.VpnType>
- description: 'The generation for this VirtualNetworkGateway. Must be None if

    gatewayType is not VPN. Known values are: "None", "Generation1", and "Generation2".'
  name: vpn_gateway_generation
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.VpnGatewayGeneration>
- description: Whether BGP is enabled for this virtual network gateway or not.
  name: enable_bgp
  types:
  - <xref:bool>
- description: 'Whether private IP needs to be enabled on this gateway for

    connections or not.'
  name: enable_private_ip_address
  types:
  - <xref:bool>
- description: 'The reference to the

    VirtualNetworkGatewayMigrationStatus which represents the status of migration.'
  name: virtual_network_gateway_migration_status
  types:
  - <xref:azure.mgmt.network.models.VirtualNetworkGatewayMigrationStatus>
- description: ActiveActive flag.
  name: active_active
  types:
  - <xref:bool>
- description: 'To enable Advanced Connectivity feature for VPN

    gateway.'
  name: enable_high_bandwidth_vpn_gateway
  types:
  - <xref:bool>
- description: disableIPSecReplayProtection flag.
  name: disable_ip_sec_replay_protection
  types:
  - <xref:bool>
- description: 'The reference to the LocalNetworkGateway resource which represents

    local network site having default routes. Assign Null value in case of removing
    existing

    default site setting.'
  name: gateway_default_site
  types:
  - <xref:azure.mgmt.network.models.SubResource>
- description: 'The reference to the VirtualNetworkGatewaySku resource which represents
    the SKU

    selected for Virtual network gateway.'
  name: sku
  types:
  - <xref:azure.mgmt.network.models.VirtualNetworkGatewaySku>
- description: 'The reference to the VpnClientConfiguration resource which

    represents the P2S VpnClient configurations.'
  name: vpn_client_configuration
  types:
  - <xref:azure.mgmt.network.models.VpnClientConfiguration>
- description: 'The reference to the

    VirtualNetworkGatewayPolicyGroup resource which represents the available

    VirtualNetworkGatewayPolicyGroup for the gateway.'
  name: virtual_network_gateway_policy_groups
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.VirtualNetworkGatewayPolicyGroup>]
- description: Virtual network gateway's BGP speaker settings.
  name: bgp_settings
  types:
  - <xref:azure.mgmt.network.models.BgpSettings>
- description: 'The reference to the address space resource which represents the custom

    routes address space specified by the customer for virtual network gateway and
    VpnClient.'
  name: custom_routes
  types:
  - <xref:azure.mgmt.network.models.AddressSpace>
- description: The resource GUID property of the virtual network gateway resource.
  name: resource_guid
  types:
  - <xref:str>
- description: 'The provisioning state of the virtual network gateway resource. Known

    values are: "Failed", "Succeeded", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ProvisioningState>
- description: Whether dns forwarding is enabled or not.
  name: enable_dns_forwarding
  types:
  - <xref:bool>
- description: 'The IP address allocated by the gateway to which dns

    requests can be sent.'
  name: inbound_dns_forwarding_endpoint
  types:
  - <xref:str>
- description: 'Customer vnet resource id. VirtualNetworkGateway of

    type local gateway is associated with the customer vnet.'
  name: v_net_extended_location_resource_id
  types:
  - <xref:str>
- description: NatRules for virtual network gateway.
  name: nat_rules
  types:
  - <xref:list>[<xref:azure.mgmt.network.models.VirtualNetworkGatewayNatRule>]
- description: EnableBgpRouteTranslationForNat flag.
  name: enable_bgp_route_translation_for_nat
  types:
  - <xref:bool>
- description: 'Configures this gateway to accept traffic from remote Virtual

    WAN networks.'
  name: allow_virtual_wan_traffic
  types:
  - <xref:bool>
- description: 'Configure this gateway to accept traffic from other Azure

    Virtual Networks. This configuration does not support connectivity to Azure Virtual
    WAN.'
  name: allow_remote_vnet_traffic
  types:
  - <xref:bool>
- description: 'Property to indicate if the Express Route Gateway serves traffic when
    there

    are multiple Express Route Gateways in the vnet. Known values are: "Enabled" and
    "Disabled".'
  name: admin_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.AdminState>
- description: 'Property to indicate if the Express Route Gateway has resiliency model

    of MultiHomed or SingleHomed. Known values are: "SingleHomed" and "MultiHomed".'
  name: resiliency_model
  types:
  - <xref:str>
  - <xref:azure.mgmt.network.models.ResiliencyModel>
