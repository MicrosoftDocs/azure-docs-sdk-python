uid: azure.mgmt.databoxedge.models.KubernetesRole
name: KubernetesRole
fullName: azure.mgmt.databoxedge.models.KubernetesRole
module: azure.mgmt.databoxedge.models
summary: 'The limited preview of Kubernetes Cluster Management from the Azure supports:


  1. Using a simple turn-key option in Azure Portal, deploy a Kubernetes cluster on
  your Azure

  Stack Edge device.

  2. Configure Kubernetes cluster running on your device with Arc enabled Kubernetes
  with a click

  of a button in the Azure Portal.

  Azure Arc enables organizations to view, manage, and govern their on-premises Kubernetes

  clusters using the Azure Portal, command line tools, and APIs.

  3. Easily configure Persistent Volumes using SMB and NFS shares for storing container
  data.

  For more information, refer to the document here:

  [https://databoxupdatepackages.blob.core.windows.net/documentation/Microsoft-Azure-Stack-Edge-K8-Cloud-Management-20210323.pdf](https://databoxupdatepackages.blob.core.windows.net/documentation/Microsoft-Azure-Stack-Edge-K8-Cloud-Management-20210323.pdf)

  Or Demo:

  [https://databoxupdatepackages.blob.core.windows.net/documentation/Microsoft-Azure-Stack-Edge-K8S-Cloud-Management-20210323.mp4](https://databoxupdatepackages.blob.core.windows.net/documentation/Microsoft-Azure-Stack-Edge-K8S-Cloud-Management-20210323.mp4)

  By using this feature, you agree to the preview legal terms. See the

  [https://azure.microsoft.com/en-us/support/legal/preview-supplemental-terms/](https://azure.microsoft.com/en-us/support/legal/preview-supplemental-terms/).'
