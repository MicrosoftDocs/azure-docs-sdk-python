uid: azure.mgmt.databoxedge.models.ShareProperties
name: ShareProperties
fullName: azure.mgmt.databoxedge.models.ShareProperties
module: azure.mgmt.databoxedge.models
summary: The share properties.
constructor:
  syntax: 'ShareProperties(*args: Any, **kwargs: Any)'
variables:
- description: Description for the share.
  name: description
  types:
  - <xref:str>
- description: 'Current status of the share. Required. Known values are: "Offline",

    "Unknown", "OK", "Updating", and "NeedsAttention".'
  name: share_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.databoxedge.models.ShareStatus>
- description: 'Current monitoring status of the share. Required. Known values are:

    "Enabled" and "Disabled".'
  name: monitoring_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.databoxedge.models.MonitoringStatus>
- description: Azure container mapping for the share.
  name: azure_container_info
  types:
  - <xref:azure.mgmt.databoxedge.models.AzureContainerInfo>
- description: 'Access protocol to be used by the share. Required. Known values are:

    "SMB" and "NFS".'
  name: access_protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.databoxedge.models.ShareAccessProtocol>
- description: 'Mapping of users and corresponding access rights on the share

    (required for SMB protocol).'
  name: user_access_rights
  types:
  - <xref:list>[<xref:azure.mgmt.databoxedge.models.UserAccessRight>]
- description: 'List of IP addresses and corresponding access rights on the

    share(required for NFS protocol).'
  name: client_access_rights
  types:
  - <xref:list>[<xref:azure.mgmt.databoxedge.models.ClientAccessRight>]
- description: Details of the refresh job on this share.
  name: refresh_details
  types:
  - <xref:azure.mgmt.databoxedge.models.RefreshDetails>
- description: Share mount point to the role.
  name: share_mappings
  types:
  - <xref:list>[<xref:azure.mgmt.databoxedge.models.MountPointMap>]
- description: 'Data policy of the share. Known values are: "Cloud" and "Local".'
  name: data_policy
  types:
  - <xref:str>
  - <xref:azure.mgmt.databoxedge.models.DataPolicy>
