### YamlMime:PythonClass
uid: azure.mgmt.databoxedge.models.JobProperties
name: JobProperties
fullName: azure.mgmt.databoxedge.models.JobProperties
module: azure.mgmt.databoxedge.models
summary: The properties for the job.
constructor:
  syntax: 'JobProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The type of the job. Known values are: "Invalid", "ScanForUpdates",

    "DownloadUpdates", "InstallUpdates", "RefreshShare", "RefreshContainer", "Backup",
    "Restore",

    and "TriggerSupportPackage".'
  name: job_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.databoxedge.models.JobType>
- description: 'Current stage of the update operation. Known values are: "Unknown",

    "Initial", "ScanStarted", "ScanComplete", "ScanFailed", "DownloadStarted", "DownloadComplete",

    "DownloadFailed", "InstallStarted", "InstallComplete", "InstallFailed", "RebootInitiated",

    "Success", "Failure", "RescanStarted", "RescanComplete", and "RescanFailed".'
  name: current_stage
  types:
  - <xref:str>
  - <xref:azure.mgmt.databoxedge.models.UpdateOperationStage>
- description: The download progress.
  name: download_progress
  types:
  - <xref:azure.mgmt.databoxedge.models.UpdateDownloadProgress>
- description: The install progress.
  name: install_progress
  types:
  - <xref:azure.mgmt.databoxedge.models.UpdateInstallProgress>
- description: Total number of errors encountered during the refresh process.
  name: total_refresh_errors
  types:
  - <xref:int>
- description: 'Local share/remote container relative path to the error manifest

    file of the refresh.'
  name: error_manifest_file
  types:
  - <xref:str>
- description: ARM ID of the entity that was refreshed.
  name: refreshed_entity_id
  types:
  - <xref:str>
- description: 'If only subfolders need to be refreshed, then the subfolder path inside
    the share

    or container. (The path is empty if there are no subfolders.).'
  name: folder
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.databoxedge.models.JobProperties.current_stage
  name: current_stage
  summary: '"Unknown", "Initial",

    "ScanStarted", "ScanComplete", "ScanFailed", "DownloadStarted", "DownloadComplete",

    "DownloadFailed", "InstallStarted", "InstallComplete", "InstallFailed",

    "RebootInitiated", "Success", "Failure", "RescanStarted", "RescanComplete", and

    "RescanFailed".'
  signature: 'current_stage: str | _models.UpdateOperationStage | None'
- uid: azure.mgmt.databoxedge.models.JobProperties.download_progress
  name: download_progress
  summary: The download progress.
  signature: 'download_progress: _models.UpdateDownloadProgress | None'
- uid: azure.mgmt.databoxedge.models.JobProperties.error_manifest_file
  name: error_manifest_file
  summary: Local share/remote container relative path to the error manifest file of
    the refresh.
  signature: 'error_manifest_file: str | None'
- uid: azure.mgmt.databoxedge.models.JobProperties.folder
  name: folder
  summary: 'If only subfolders need to be refreshed, then the subfolder path inside
    the share or container.

    (The path is empty if there are no subfolders.).'
  signature: 'folder: str | None'
- uid: azure.mgmt.databoxedge.models.JobProperties.install_progress
  name: install_progress
  summary: The install progress.
  signature: 'install_progress: _models.UpdateInstallProgress | None'
- uid: azure.mgmt.databoxedge.models.JobProperties.job_type
  name: job_type
  summary: '"Invalid", "ScanForUpdates", "DownloadUpdates",

    "InstallUpdates", "RefreshShare", "RefreshContainer", "Backup", "Restore", and

    "TriggerSupportPackage".'
  signature: 'job_type: str | _models.JobType | None'
- uid: azure.mgmt.databoxedge.models.JobProperties.refreshed_entity_id
  name: refreshed_entity_id
  summary: ARM ID of the entity that was refreshed.
  signature: 'refreshed_entity_id: str | None'
- uid: azure.mgmt.databoxedge.models.JobProperties.total_refresh_errors
  name: total_refresh_errors
  summary: Total number of errors encountered during the refresh process.
  signature: 'total_refresh_errors: int | None'
