### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.AutoExportJobPropertiesStatus
name: AutoExportJobPropertiesStatus
fullName: azure.mgmt.storagecache.models.AutoExportJobPropertiesStatus
module: azure.mgmt.storagecache.models
summary: The status of the auto export.
constructor:
  syntax: 'AutoExportJobPropertiesStatus(*args: Any, **kwargs: Any)'
variables:
- description: 'The operational state of auto export. InProgress indicates the export
    is running.

    Disabling indicates the user has requested to disable the export but the disabling
    is still in

    progress. Disabled indicates auto export has been disabled.  DisableFailed indicates
    the

    disabling has failed.  Failed means the export was unable to continue, due to
    a fatal error.

    Known values are: "InProgress", "Disabling", "Disabled", "DisableFailed", and
    "Failed".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.AutoExportStatusType>
- description: Server-defined status code for auto export job.
  name: status_code
  types:
  - <xref:str>
- description: Server-defined status message for auto export job.
  name: status_message
  types:
  - <xref:str>
- description: 'Total files exported since the start of the export. This is

    accumulative, some files may be counted repeatedly.'
  name: total_files_exported
  types:
  - <xref:int>
- description: 'Total data (in MiB) exported since the start of the export. This is

    accumulative, some files may be counted repeatedly.'
  name: total_mi_b_exported
  types:
  - <xref:int>
- description: 'Total files failed to be export since the last successfully completed

    iteration. This is accumulative, some files may be counted repeatedly.'
  name: total_files_failed
  types:
  - <xref:int>
- description: Number of iterations completed since the start of the export.
  name: export_iteration_count
  types:
  - <xref:int>
- description: 'Time (in UTC) of the last successfully

    completed export iteration. Look at logging container for details.'
  name: last_successful_iteration_completion_time_utc
  types:
  - <xref:datetime.datetime>
- description: 'Files discovered for export in current iteration. It

    may increase while more export items are found.'
  name: current_iteration_files_discovered
  types:
  - <xref:int>
- description: 'Data (in MiB) discovered for export in current

    iteration. It may increase while more export items are found.'
  name: current_iteration_mi_b_discovered
  types:
  - <xref:int>
- description: Files that have been exported in current iteration.
  name: current_iteration_files_exported
  types:
  - <xref:int>
- description: 'Data (in MiB) that have been exported in current

    iteration.'
  name: current_iteration_mi_b_exported
  types:
  - <xref:int>
- description: Files failed to export in current iteration.
  name: current_iteration_files_failed
  types:
  - <xref:int>
- description: The time (in UTC) the latest auto export job started.
  name: last_started_time_utc
  types:
  - <xref:datetime.datetime>
- description: The time (in UTC) of the last completed auto export job.
  name: last_completion_time_utc
  types:
  - <xref:datetime.datetime>
