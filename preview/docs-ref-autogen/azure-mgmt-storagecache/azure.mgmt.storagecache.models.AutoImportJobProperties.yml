### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.AutoImportJobProperties
name: AutoImportJobProperties
fullName: azure.mgmt.storagecache.models.AutoImportJobProperties
module: azure.mgmt.storagecache.models
summary: Properties of the auto import job.
constructor:
  syntax: 'AutoImportJobProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'ARM provisioning state. Known values are: "Succeeded", "Failed",

    "Creating", "Deleting", "Updating", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.AutoImportJobPropertiesProvisioningState>
- description: 'The administrative status of the auto import job. Possible values:

    ''Enable'', ''Disable''. Passing in a value of ''Disable'' will disable the current
    active auto

    import job. By default it is set to ''Enable''. Known values are: "Enable" and
    "Disable".'
  name: admin_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.AutoImportJobPropertiesAdminStatus>
- description: 'An array of blob paths/prefixes that get auto imported to the

    cluster namespace. It has ''/'' as the default value. Number of maximum allowed
    paths is 100.'
  name: auto_import_prefixes
  types:
  - <xref:list>[<xref:str>]
- description: 'How the auto import job will handle conflicts. For example, if

    the auto import job is trying to bring in a directory, but a file is at that path,
    how it

    handles it. Fail indicates that the auto import job should stop immediately and
    not do anything

    with the conflict. Skip indicates that it should pass over the conflict. OverwriteIfDirty

    causes the auto import job to delete and re-import the file or directory if it
    is a conflicting

    type, is dirty, or is currently released. OverwriteAlways extends OverwriteIfDirty
    to include

    releasing files that had been restored but were not dirty. Please reference

    [https://learn.microsoft.com/en-us/azure/azure-managed-lustre/blob-integration#conflict-resolution-mode](https://learn.microsoft.com/en-us/azure/azure-managed-lustre/blob-integration#conflict-resolution-mode)

    for a thorough explanation of these resolution modes. Known values are: "Fail",
    "Skip",

    "OverwriteIfDirty", and "OverwriteAlways".'
  name: conflict_resolution_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.ConflictResolutionMode>
- description: 'Whether or not to enable deletions during auto import. This only

    affects overwrite-dirty.'
  name: enable_deletions
  types:
  - <xref:bool>
- description: 'Total non-conflict-oriented errors (e.g., OS errors) Import will tolerate

    before exiting with failure. -1 means infinite. 0 means exit immediately on any
    error.'
  name: maximum_errors
  types:
  - <xref:int>
- description: The status of the auto import job.
  name: status
  types:
  - <xref:azure.mgmt.storagecache.models.AutoImportJobPropertiesStatus>
attributes:
- uid: azure.mgmt.storagecache.models.AutoImportJobProperties.admin_status
  name: admin_status
  summary: '''Enable'', ''Disable''. Passing

    in a value of ''Disable'' will disable the current active auto import job. By
    default it is set

    to ''Enable''. Known values are: "Enable" and "Disable".'
  signature: 'admin_status: str | _models.AutoImportJobPropertiesAdminStatus | None'
- uid: azure.mgmt.storagecache.models.AutoImportJobProperties.auto_import_prefixes
  name: auto_import_prefixes
  summary: 'An array of blob paths/prefixes that get auto imported to the cluster
    namespace. It has ''/'' as

    the default value. Number of maximum allowed paths is 100.'
  signature: 'auto_import_prefixes: list[str] | None'
- uid: azure.mgmt.storagecache.models.AutoImportJobProperties.conflict_resolution_mode
  name: conflict_resolution_mode
  summary: 'How the auto import job will handle conflicts. For example, if the auto
    import job is trying to

    bring in a directory, but a file is at that path, how it handles it. Fail indicates
    that the

    auto import job should stop immediately and not do anything with the conflict.
    Skip indicates

    that it should pass over the conflict. OverwriteIfDirty causes the auto import
    job to delete

    and re-import the file or directory if it is a conflicting type, is dirty, or
    is currently

    released. OverwriteAlways extends OverwriteIfDirty to include releasing files
    that had been

    restored but were not dirty. Please reference

    [https://learn.microsoft.com/en-us/azure/azure-managed-lustre/blob-integration#conflict-resolution-mode](https://learn.microsoft.com/en-us/azure/azure-managed-lustre/blob-integration#conflict-resolution-mode)

    for a thorough explanation of these resolution modes. Known values are: "Fail",
    "Skip",

    "OverwriteIfDirty", and "OverwriteAlways".'
  signature: 'conflict_resolution_mode: str | _models.ConflictResolutionMode | None'
- uid: azure.mgmt.storagecache.models.AutoImportJobProperties.enable_deletions
  name: enable_deletions
  summary: Whether or not to enable deletions during auto import. This only affects
    overwrite-dirty.
  signature: 'enable_deletions: bool | None'
- uid: azure.mgmt.storagecache.models.AutoImportJobProperties.maximum_errors
  name: maximum_errors
  summary: 'Total non-conflict-oriented errors (e.g., OS errors) Import will tolerate
    before exiting with

    failure. -1 means infinite. 0 means exit immediately on any error.'
  signature: 'maximum_errors: int | None'
- uid: azure.mgmt.storagecache.models.AutoImportJobProperties.provisioning_state
  name: provisioning_state
  summary: '"Succeeded", "Failed", "Creating",

    "Deleting", "Updating", and "Canceled".'
  signature: 'provisioning_state: str | _models.AutoImportJobPropertiesProvisioningState
    | None'
- uid: azure.mgmt.storagecache.models.AutoImportJobProperties.status
  name: status
  summary: The status of the auto import job.
  signature: 'status: _models.AutoImportJobPropertiesStatus | None'
