### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.ImportJobProperties
name: ImportJobProperties
fullName: azure.mgmt.storagecache.models.ImportJobProperties
module: azure.mgmt.storagecache.models
summary: Properties of the import job.
constructor:
  syntax: 'ImportJobProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'ARM provisioning state. Known values are: "Succeeded", "Failed",

    "Creating", "Deleting", "Updating", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.ImportJobProvisioningStateType>
- description: 'The administrative status of the import job. Possible values: ''Active'',

    ''Cancel''. Passing in a value of ''Cancel'' will cancel the current active import
    job. By default

    it is set to ''Active''. Known values are: "Active" and "Cancel".'
  name: admin_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.ImportJobAdminStatus>
- description: 'An array of blob paths/prefixes that get imported into the cluster

    namespace. It has ''/'' as the default value.'
  name: import_prefixes
  types:
  - <xref:list>[<xref:str>]
- description: 'How the import job will handle conflicts. For example, if the

    import job is trying to bring in a directory, but a file is at that path, how
    it handles it.

    Fail indicates that the import job should stop immediately and not do anything
    with the

    conflict. Skip indicates that it should pass over the conflict. OverwriteIfDirty
    causes the

    import job to delete and re-import the file or directory if it is a conflicting
    type, is dirty,

    or was not previously imported. OverwriteAlways extends OverwriteIfDirty to include
    releasing

    files that had been restored but were not dirty. Please reference

    [https://learn.microsoft.com/en-us/azure/azure-managed-lustre/](https://learn.microsoft.com/en-us/azure/azure-managed-lustre/)
    for a thorough explanation of

    these resolution modes. Known values are: "Fail", "Skip", "OverwriteIfDirty",
    and

    "OverwriteAlways".'
  name: conflict_resolution_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.ConflictResolutionMode>
- description: 'Total non-conflict oriented errors the import job will tolerate before

    exiting with failure. -1 means infinite. 0 means exit immediately and is the default.'
  name: maximum_errors
  types:
  - <xref:int>
- description: The status of the import.
  name: status
  types:
  - <xref:azure.mgmt.storagecache.models.ImportJobPropertiesStatus>
attributes:
- uid: azure.mgmt.storagecache.models.ImportJobProperties.admin_status
  name: admin_status
  summary: '''Active'', ''Cancel''. Passing in a

    value of ''Cancel'' will cancel the current active import job. By default it is
    set to ''Active''.

    Known values are: "Active" and "Cancel".'
  signature: 'admin_status: str | _models.ImportJobAdminStatus | None'
- uid: azure.mgmt.storagecache.models.ImportJobProperties.conflict_resolution_mode
  name: conflict_resolution_mode
  summary: 'How the import job will handle conflicts. For example, if the import job
    is trying to bring in

    a directory, but a file is at that path, how it handles it. Fail indicates that
    the import job

    should stop immediately and not do anything with the conflict. Skip indicates
    that it should

    pass over the conflict. OverwriteIfDirty causes the import job to delete and re-import
    the file

    or directory if it is a conflicting type, is dirty, or was not previously imported.

    OverwriteAlways extends OverwriteIfDirty to include releasing files that had been
    restored but

    were not dirty. Please reference [https://learn.microsoft.com/en-us/azure/azure-managed-lustre/](https://learn.microsoft.com/en-us/azure/azure-managed-lustre/)
    for a thorough explanation of

    these resolution modes. Known values are: "Fail", "Skip", "OverwriteIfDirty",
    and

    "OverwriteAlways".'
  signature: 'conflict_resolution_mode: str | _models.ConflictResolutionMode | None'
- uid: azure.mgmt.storagecache.models.ImportJobProperties.import_prefixes
  name: import_prefixes
  summary: 'An array of blob paths/prefixes that get imported into the cluster namespace.
    It has ''/'' as the

    default value.'
  signature: 'import_prefixes: list[str] | None'
- uid: azure.mgmt.storagecache.models.ImportJobProperties.maximum_errors
  name: maximum_errors
  summary: 'Total non-conflict oriented errors the import job will tolerate before
    exiting with failure. -1

    means infinite. 0 means exit immediately and is the default.'
  signature: 'maximum_errors: int | None'
- uid: azure.mgmt.storagecache.models.ImportJobProperties.provisioning_state
  name: provisioning_state
  summary: '"Succeeded", "Failed", "Creating",

    "Deleting", "Updating", and "Canceled".'
  signature: 'provisioning_state: str | _models.ImportJobProvisioningStateType | None'
- uid: azure.mgmt.storagecache.models.ImportJobProperties.status
  name: status
  summary: The status of the import.
  signature: 'status: _models.ImportJobPropertiesStatus | None'
