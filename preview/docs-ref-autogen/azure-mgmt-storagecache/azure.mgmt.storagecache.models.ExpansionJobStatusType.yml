uid: azure.mgmt.storagecache.models.ExpansionJobStatusType
name: ExpansionJobStatusType
fullName: azure.mgmt.storagecache.models.ExpansionJobStatusType
summary: 'The operational state of the expansion job. InProgress indicates the expansion
  is still

  running. Completed indicates expansion finished successfully. Failed means the expansion
  was

  unable to complete due to a fatal error. Deleting indicates the expansion is being
  rolled back.'
