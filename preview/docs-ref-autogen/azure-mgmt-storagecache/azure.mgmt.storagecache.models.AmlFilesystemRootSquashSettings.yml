### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.AmlFilesystemRootSquashSettings
name: AmlFilesystemRootSquashSettings
fullName: azure.mgmt.storagecache.models.AmlFilesystemRootSquashSettings
module: azure.mgmt.storagecache.models
summary: AML file system squash settings.
constructor:
  syntax: 'AmlFilesystemRootSquashSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Squash mode of the AML file system. ''All'': User and Group IDs on
    files will be

    squashed to the provided values for all users on non-trusted systems. ''RootOnly'':
    User and

    Group IDs on files will be squashed to provided values for solely the root user
    on non-trusted

    systems. ''None'': No squashing of User and Group IDs is performed for any users
    on any systems.

    Known values are: "None", "RootOnly", and "All".'
  name: mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.AmlFilesystemSquashMode>
- description: 'Semicolon separated NID IP Address list(s) to be added to the

    TrustedSystems.'
  name: no_squash_nid_lists
  types:
  - <xref:str>
- description: User ID to squash to.
  name: squash_uid
  types:
  - <xref:int>
- description: Group ID to squash to.
  name: squash_gid
  types:
  - <xref:int>
- description: AML file system squash status.
  name: status
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.storagecache.models.AmlFilesystemRootSquashSettings.mode
  name: mode
  summary: 'User and Group IDs on files will be squashed to the

    provided values for all users on non-trusted systems. ''RootOnly'': User and Group
    IDs on files

    will be squashed to provided values for solely the root user on non-trusted systems.
    ''None'': No

    squashing of User and Group IDs is performed for any users on any systems. Known
    values are:

    "None", "RootOnly", and "All".'
  signature: 'mode: str | _models.AmlFilesystemSquashMode | None'
- uid: azure.mgmt.storagecache.models.AmlFilesystemRootSquashSettings.no_squash_nid_lists
  name: no_squash_nid_lists
  summary: Semicolon separated NID IP Address list(s) to be added to the TrustedSystems.
  signature: 'no_squash_nid_lists: str | None'
- uid: azure.mgmt.storagecache.models.AmlFilesystemRootSquashSettings.squash_gid
  name: squash_gid
  summary: Group ID to squash to.
  signature: 'squash_gid: int | None'
- uid: azure.mgmt.storagecache.models.AmlFilesystemRootSquashSettings.squash_uid
  name: squash_uid
  summary: User ID to squash to.
  signature: 'squash_uid: int | None'
- uid: azure.mgmt.storagecache.models.AmlFilesystemRootSquashSettings.status
  name: status
  summary: AML file system squash status.
  signature: 'status: str | None'
