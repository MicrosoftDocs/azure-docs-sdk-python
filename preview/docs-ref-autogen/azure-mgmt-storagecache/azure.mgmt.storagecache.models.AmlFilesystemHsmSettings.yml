### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.AmlFilesystemHsmSettings
name: AmlFilesystemHsmSettings
fullName: azure.mgmt.storagecache.models.AmlFilesystemHsmSettings
module: azure.mgmt.storagecache.models
summary: AML file system HSM settings.
constructor:
  syntax: 'AmlFilesystemHsmSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Resource ID of storage container used for hydrating the namespace
    and

    archiving from the namespace. The resource provider must have permission to create
    SAS tokens

    on the storage account. Required.'
  name: container
  types:
  - <xref:str>
- description: 'Resource ID of storage container used for logging events and errors.

    Must be a separate container in the same storage account as the hydration and
    archive

    container. The resource provider must have permission to create SAS tokens on
    the storage

    account. Required.'
  name: logging_container
  types:
  - <xref:str>
- description: 'Only blobs in the non-logging container that start with this path/prefix

    get imported into the cluster namespace. This is only used during initial creation
    of the AML

    file system. It automatically creates an import job resource that can be deleted.'
  name: import_prefix
  types:
  - <xref:str>
- description: 'Only blobs in the non-logging container that start with one of

    the paths/prefixes in this array get imported into the cluster namespace. This
    is only used

    during initial creation of the AML file system and has ''/'' as the default value.
    It

    automatically creates an import job resource that can be deleted.'
  name: import_prefixes_initial
  types:
  - <xref:list>[<xref:str>]
attributes:
- uid: azure.mgmt.storagecache.models.AmlFilesystemHsmSettings.container
  name: container
  summary: 'Resource ID of storage container used for hydrating the namespace and
    archiving from the

    namespace. The resource provider must have permission to create SAS tokens on
    the storage

    account. Required.'
  signature: 'container: str'
- uid: azure.mgmt.storagecache.models.AmlFilesystemHsmSettings.import_prefix
  name: import_prefix
  summary: 'Only blobs in the non-logging container that start with this path/prefix
    get imported into the

    cluster namespace. This is only used during initial creation of the AML file system.
    It

    automatically creates an import job resource that can be deleted.'
  signature: 'import_prefix: str | None'
- uid: azure.mgmt.storagecache.models.AmlFilesystemHsmSettings.import_prefixes_initial
  name: import_prefixes_initial
  summary: 'Only blobs in the non-logging container that start with one of the paths/prefixes
    in this array

    get imported into the cluster namespace. This is only used during initial creation
    of the AML

    file system and has ''/'' as the default value. It automatically creates an import
    job resource

    that can be deleted.'
  signature: 'import_prefixes_initial: list[str] | None'
- uid: azure.mgmt.storagecache.models.AmlFilesystemHsmSettings.logging_container
  name: logging_container
  summary: 'Resource ID of storage container used for logging events and errors.  Must
    be a separate

    container in the same storage account as the hydration and archive container.
    The resource

    provider must have permission to create SAS tokens on the storage account. Required.'
  signature: 'logging_container: str'
