### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.ImportJobPropertiesStatus
name: ImportJobPropertiesStatus
fullName: azure.mgmt.storagecache.models.ImportJobPropertiesStatus
module: azure.mgmt.storagecache.models
summary: The status of the import.
constructor:
  syntax: 'ImportJobPropertiesStatus(*args: Any, **kwargs: Any)'
variables:
- description: 'The operational state of the import job. InProgress indicates the
    import is still

    running. Canceled indicates it has been canceled by the user. Completed indicates
    import

    finished, successfully importing all discovered blobs into the Lustre namespace.

    CompletedPartial indicates the import finished but some blobs either were found
    to be

    conflicting and could not be imported or other errors were encountered. Failed
    means the import

    was unable to complete due to a fatal error. Known values are: "InProgress", "Cancelling",

    "Canceled", "Completed", "CompletedPartial", and "Failed".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.ImportStatusType>
- description: The status message of the import job.
  name: status_message
  types:
  - <xref:str>
- description: The total blob objects walked.
  name: total_blobs_walked
  types:
  - <xref:int>
- description: A recent and frequently updated rate of blobs walked per second.
  name: blobs_walked_per_second
  types:
  - <xref:int>
- description: The total blobs that have been imported since import began.
  name: total_blobs_imported
  types:
  - <xref:int>
- description: New or modified files that have been imported into the filesystem.
  name: imported_files
  types:
  - <xref:int>
- description: 'New or modified directories that have been imported into the

    filesystem.'
  name: imported_directories
  types:
  - <xref:int>
- description: Newly added symbolic links into the filesystem.
  name: imported_symlinks
  types:
  - <xref:int>
- description: Files that already exist in the filesystem and have not been modified.
  name: preexisting_files
  types:
  - <xref:int>
- description: 'Directories that already exist in the filesystem and have not

    been modified.'
  name: preexisting_directories
  types:
  - <xref:int>
- description: 'Symbolic links that already exist in the filesystem and have not

    been modified.'
  name: preexisting_symlinks
  types:
  - <xref:int>
- description: 'A recent and frequently updated rate of total files,

    directories, and symlinks imported per second.'
  name: blobs_imported_per_second
  types:
  - <xref:int>
- description: The time (in UTC) of the last completed import job.
  name: last_completion_time
  types:
  - <xref:datetime.datetime>
- description: The time (in UTC) the latest import job started.
  name: last_started_time
