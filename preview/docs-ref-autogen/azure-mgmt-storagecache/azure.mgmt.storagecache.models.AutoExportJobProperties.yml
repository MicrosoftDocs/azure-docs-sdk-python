### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.AutoExportJobProperties
name: AutoExportJobProperties
fullName: azure.mgmt.storagecache.models.AutoExportJobProperties
module: azure.mgmt.storagecache.models
summary: Properties of the auto export job.
constructor:
  syntax: 'AutoExportJobProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'ARM provisioning state. Known values are: "Succeeded", "Failed",

    "Creating", "Deleting", "Updating", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.AutoExportJobProvisioningStateType>
- description: 'The administrative status of the auto export job. Possible values:

    ''Enable'', ''Disable''. Passing in a value of ''Disable'' will disable the current
    active auto

    export job. By default it is set to ''Enable''. Known values are: "Enable" and
    "Disable".'
  name: admin_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.AutoExportJobAdminStatus>
- description: 'An array of blob paths/prefixes that get auto exported to the

    cluster namespace. It has ''/'' as the default value. Number of maximum allowed
    paths for now is

    1.'
  name: auto_export_prefixes
  types:
  - <xref:list>[<xref:str>]
- description: The status of the auto export.
  name: status
  types:
  - <xref:azure.mgmt.storagecache.models.AutoExportJobPropertiesStatus>
attributes:
- uid: azure.mgmt.storagecache.models.AutoExportJobProperties.admin_status
  name: admin_status
  summary: '''Enable'', ''Disable''. Passing

    in a value of ''Disable'' will disable the current active auto export job. By
    default it is set

    to ''Enable''. Known values are: "Enable" and "Disable".'
  signature: 'admin_status: str | _models.AutoExportJobAdminStatus | None'
- uid: azure.mgmt.storagecache.models.AutoExportJobProperties.auto_export_prefixes
  name: auto_export_prefixes
  summary: 'An array of blob paths/prefixes that get auto exported to the cluster
    namespace. It has ''/'' as

    the default value. Number of maximum allowed paths for now is 1.'
  signature: 'auto_export_prefixes: list[str] | None'
- uid: azure.mgmt.storagecache.models.AutoExportJobProperties.provisioning_state
  name: provisioning_state
  summary: '"Succeeded", "Failed", "Creating",

    "Deleting", "Updating", and "Canceled".'
  signature: 'provisioning_state: str | _models.AutoExportJobProvisioningStateType
    | None'
- uid: azure.mgmt.storagecache.models.AutoExportJobProperties.status
  name: status
  summary: The status of the auto export.
  signature: 'status: _models.AutoExportJobPropertiesStatus | None'
