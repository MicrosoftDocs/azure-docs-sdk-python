### YamlMime:PythonClass
uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings
name: CacheUsernameDownloadSettings
fullName: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings
module: azure.mgmt.storagecache.models
summary: Settings for Extended Groups username and group download.
constructor:
  syntax: 'CacheUsernameDownloadSettings(*args: Any, **kwargs: Any)'
variables:
- description: Whether or not Extended Groups is enabled.
  name: extended_groups
  types:
  - <xref:bool>
- description: 'This setting determines how the cache gets username and group names
    for

    clients. Known values are: "AD", "LDAP", "File", and "None".'
  name: username_source
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.UsernameSource>
- description: 'The URI of the file containing group information (in /etc/group file

    format). This field must be populated when ''usernameSource'' is set to ''File''.'
  name: group_file_uri
  types:
  - <xref:str>
- description: 'The URI of the file containing user information (in /etc/passwd file

    format). This field must be populated when ''usernameSource'' is set to ''File''.'
  name: user_file_uri
  types:
  - <xref:str>
- description: The fully qualified domain name or IP address of the LDAP server to
    use.
  name: ldap_server
  types:
  - <xref:str>
- description: The base distinguished name for the LDAP domain.
  name: ldap_base_dn
  types:
  - <xref:str>
- description: Whether or not the LDAP connection should be encrypted.
  name: encrypt_ldap_connection
  types:
  - <xref:bool>
- description: 'Determines if the certificates must be validated by a

    certificate authority. When true, caCertificateURI must be provided.'
  name: require_valid_certificate
  types:
  - <xref:bool>
- description: 'Determines if the certificate should be automatically

    downloaded. This applies to ''caCertificateURI'' only if ''requireValidCertificate''
    is true.'
  name: auto_download_certificate
  types:
  - <xref:bool>
- description: 'The URI of the CA certificate to validate the LDAP secure connection.

    This field must be populated when ''requireValidCertificate'' is set to true.'
  name: ca_certificate_uri
  types:
  - <xref:str>
- description: 'Indicates whether or not the HPC Cache has performed the username

    download successfully. Known values are: "Yes", "No", and "Error".'
  name: username_downloaded
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.UsernameDownloadedType>
- description: When present, these are the credentials for the secure LDAP connection.
  name: credentials
  types:
  - <xref:azure.mgmt.storagecache.models.CacheUsernameDownloadSettingsCredentials>
attributes:
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.auto_download_certificate
  name: auto_download_certificate
  summary: 'Determines if the certificate should be automatically downloaded. This
    applies to

    ''caCertificateURI'' only if ''requireValidCertificate'' is true.'
  signature: 'auto_download_certificate: bool | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.ca_certificate_uri
  name: ca_certificate_uri
  summary: 'The URI of the CA certificate to validate the LDAP secure connection.
    This field must be

    populated when ''requireValidCertificate'' is set to true.'
  signature: 'ca_certificate_uri: str | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.credentials
  name: credentials
  summary: When present, these are the credentials for the secure LDAP connection.
  signature: 'credentials: _models.CacheUsernameDownloadSettingsCredentials | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.encrypt_ldap_connection
  name: encrypt_ldap_connection
  summary: Whether or not the LDAP connection should be encrypted.
  signature: 'encrypt_ldap_connection: bool | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.extended_groups
  name: extended_groups
  summary: Whether or not Extended Groups is enabled.
  signature: 'extended_groups: bool | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.group_file_uri
  name: group_file_uri
  summary: 'The URI of the file containing group information (in /etc/group file format).
    This field must

    be populated when ''usernameSource'' is set to ''File''.'
  signature: 'group_file_uri: str | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.ldap_base_dn
  name: ldap_base_dn
  summary: The base distinguished name for the LDAP domain.
  signature: 'ldap_base_dn: str | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.ldap_server
  name: ldap_server
  summary: The fully qualified domain name or IP address of the LDAP server to use.
  signature: 'ldap_server: str | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.require_valid_certificate
  name: require_valid_certificate
  summary: 'Determines if the certificates must be validated by a certificate authority.
    When true,

    caCertificateURI must be provided.'
  signature: 'require_valid_certificate: bool | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.user_file_uri
  name: user_file_uri
  summary: 'The URI of the file containing user information (in /etc/passwd file format).
    This field must

    be populated when ''usernameSource'' is set to ''File''.'
  signature: 'user_file_uri: str | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.username_downloaded
  name: username_downloaded
  summary: 'Indicates whether or not the HPC Cache has performed the username download
    successfully. Known

    values are: "Yes", "No", and "Error".'
  signature: 'username_downloaded: str | _models.UsernameDownloadedType | None'
- uid: azure.mgmt.storagecache.models.CacheUsernameDownloadSettings.username_source
  name: username_source
  summary: 'This setting determines how the cache gets username and group names for
    clients. Known values

    are: "AD", "LDAP", "File", and "None".'
  signature: 'username_source: str | _models.UsernameSource | None'
