  - <xref:str>
- description: Server-defined status message for expansion job.
  name: status_message
  types:
  - <xref:str>
- description: The percentage of expansion job completion.
  name: percent_complete
  types:
  - <xref:float>
- description: The time (in UTC) the expansion job started.
  name: start_time_utc
  types:
  - <xref:datetime.datetime>
- description: 'The time (in UTC) when the expansion job completed. Only populated

    when job reaches a terminal state.'
  name: completion_time_utc
  types:
  - <xref:datetime.datetime>
