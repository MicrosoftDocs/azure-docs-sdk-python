uid: azure.mgmt.storagecache.models.ExpansionJobPropertiesStatus
name: ExpansionJobPropertiesStatus
fullName: azure.mgmt.storagecache.models.ExpansionJobPropertiesStatus
module: azure.mgmt.storagecache.models
summary: The status of the expansion job.
constructor:
  syntax: 'ExpansionJobPropertiesStatus(*args: Any, **kwargs: Any)'
variables:
- description: 'The operational state of the expansion job. InProgress indicates the
    expansion is

    still running. Completed indicates expansion finished successfully. Failed means
    the expansion

    was unable to complete due to a fatal error. Deleting indicates the expansion
    is being rolled

    back. Known values are: "InProgress", "Completed", "Failed", "Deleting", and "RollingBack".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.storagecache.models.ExpansionJobStatusType>
