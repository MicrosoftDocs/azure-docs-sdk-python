    "AdminDenied", "TimedOut", "ProvisioningStarted", "Invalid", "PendingScheduleCreation",

    "ScheduleCreated", and "PendingExternalProvisioning".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.authorization.models.Status>
- description: The approvalId of the role assignment schedule request.
  name: approval_id
  types:
  - <xref:str>
- description: 'The resultant role assignment schedule id or the role

    assignment schedule id being updated.'
