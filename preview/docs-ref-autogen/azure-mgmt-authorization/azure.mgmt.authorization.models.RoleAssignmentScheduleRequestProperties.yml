- description: The role assignment schedule request scope.
  name: scope
  types:
  - <xref:str>
- description: The role definition ID. Required.
  name: role_definition_id
  types:
  - <xref:str>
- description: The principal ID. Required.
  name: principal_id
  types:
  - <xref:str>
- description: 'The principal type of the assigned principal ID. Known values are:

    "User", "Group", "ServicePrincipal", "ForeignGroup", and "Device".'
  name: principal_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.authorization.models.PrincipalType>
- description: 'The type of the role assignment schedule request. Eg: SelfActivate,

    AdminAssign etc. Required. Known values are: "AdminAssign", "AdminRemove", "AdminUpdate",

    "AdminExtend", "AdminRenew", "SelfActivate", "SelfDeactivate", "SelfExtend", and
    "SelfRenew".'
  name: request_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.authorization.models.RequestType>
- description: 'The status of the role assignment schedule request. Known values are:
    "Accepted",

    "PendingEvaluation", "Granted", "Denied", "PendingProvisioning", "Provisioned",

    "PendingRevocation", "Revoked", "Canceled", "Failed", "PendingApprovalProvisioning",

