### YamlMime:PythonClass
uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings
name: AccessReviewScheduleSettings
fullName: azure.mgmt.authorization.models.AccessReviewScheduleSettings
module: azure.mgmt.authorization.models
summary: Settings of an Access Review.
constructor:
  syntax: 'AccessReviewScheduleSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Flag to indicate whether sending mails to reviewers and the

    review creator is enabled.'
  name: mail_notifications_enabled
  types:
  - <xref:bool>
- description: 'Flag to indicate whether sending reminder emails to

    reviewers are enabled.'
  name: reminder_notifications_enabled
  types:
  - <xref:bool>
- description: 'Flag to indicate whether reviewers are required to provide a

    justification when reviewing access.'
  name: default_decision_enabled
  types:
  - <xref:bool>
- description: 'Flag to indicate whether the reviewer is required to

    pass justification when recording a decision.'
  name: justification_required_on_approval
  types:
  - <xref:bool>
- description: 'This specifies the behavior for the autoReview feature when an access

    review completes. Known values are: "Approve", "Deny", and "Recommendation".'
  name: default_decision
  types:
  - <xref:str>
  - <xref:azure.mgmt.authorization.models.DefaultDecisionType>
- description: 'Flag to indicate whether auto-apply capability, to

    automatically change the target object access resource, is enabled. If not enabled,
    a user

    must, after the review completes, apply the access review.'
  name: auto_apply_decisions_enabled
  types:
  - <xref:bool>
- description: 'Flag to indicate whether showing recommendations to reviewers is

    enabled.'
  name: recommendations_enabled
  types:
  - <xref:bool>
- description: 'Recommendations for access reviews are calculated by

    looking back at 30 days of data(w.r.t the start date of the review) by default.
    However, in

    some scenarios, customers want to change how far back to look at and want to configure
    60 days,

    90 days, etc. instead. This setting allows customers to configure this duration.
    The value

    should be in ISO  8601 format ([http://en.wikipedia.org/wiki/ISO_8601#Durations).This](http://en.wikipedia.org/wiki/ISO_8601#Durations).This)
    code can be used to convert TimeSpan

    to a valid interval string: XmlConvert.ToString(new TimeSpan(hours, minutes, seconds)).'
  name: recommendation_look_back_duration
  types:
  - <xref:datetime.timedelta>
- description: The duration in days for an instance.
  name: instance_duration_in_days
  types:
  - <xref:int>
- description: Access Review Settings.
  name: recurrence
  types:
  - <xref:azure.mgmt.authorization.models.AccessReviewRecurrenceSettings>
attributes:
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.auto_apply_decisions_enabled
  name: auto_apply_decisions_enabled
  summary: 'Flag to indicate whether auto-apply capability, to automatically change
    the target object

    access resource, is enabled. If not enabled, a user must, after the review completes,
    apply the

    access review.'
  signature: 'auto_apply_decisions_enabled: bool | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.default_decision
  name: default_decision
  summary: 'This specifies the behavior for the autoReview feature when an access
    review completes. Known

    values are: "Approve", "Deny", and "Recommendation".'
  signature: 'default_decision: str | _models.DefaultDecisionType | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.default_decision_enabled
  name: default_decision_enabled
  summary: 'Flag to indicate whether reviewers are required to provide a justification
    when reviewing

    access.'
  signature: 'default_decision_enabled: bool | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.instance_duration_in_days
  name: instance_duration_in_days
  summary: The duration in days for an instance.
  signature: 'instance_duration_in_days: int | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.justification_required_on_approval
  name: justification_required_on_approval
  summary: 'Flag to indicate whether the reviewer is required to pass justification
    when recording a

    decision.'
  signature: 'justification_required_on_approval: bool | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.mail_notifications_enabled
  name: mail_notifications_enabled
  summary: Flag to indicate whether sending mails to reviewers and the review creator
    is enabled.
  signature: 'mail_notifications_enabled: bool | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.recommendation_look_back_duration
  name: recommendation_look_back_duration
  summary: 'Recommendations for access reviews are calculated by looking back at 30
    days of data(w.r.t the

    start date of the review) by default. However, in some scenarios, customers want
    to change how

    far back to look at and want to configure 60 days, 90 days, etc. instead. This
    setting allows

    customers to configure this duration. The value should be in ISO  8601 format

    ([http://en.wikipedia.org/wiki/ISO_8601#Durations).This](http://en.wikipedia.org/wiki/ISO_8601#Durations).This)
    code can be used to convert TimeSpan

    to a valid interval string: XmlConvert.ToString(new TimeSpan(hours, minutes, seconds)).'
  signature: 'recommendation_look_back_duration: timedelta | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.recommendations_enabled
  name: recommendations_enabled
  summary: Flag to indicate whether showing recommendations to reviewers is enabled.
  signature: 'recommendations_enabled: bool | None'
- uid: azure.mgmt.authorization.models.AccessReviewScheduleSettings.recurrence
  name: recurrence
  summary: Access Review Settings.
  signature: 'recurrence: _models.AccessReviewRecurrenceSettings | None'
