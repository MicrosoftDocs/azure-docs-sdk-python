- uid: azure.mgmt.authorization.operations.RoleEligibilitySchedulesOperations.list_for_scope
  name: list_for_scope
  summary: Gets role eligibility schedules for a resource scope.
  signature: 'list_for_scope(scope: str, *, filter: str | None = None, **kwargs: Any)
    -> ItemPaged[RoleEligibilitySchedule]'
