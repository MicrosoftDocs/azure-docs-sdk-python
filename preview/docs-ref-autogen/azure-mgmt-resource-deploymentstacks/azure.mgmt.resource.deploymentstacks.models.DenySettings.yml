### YamlMime:PythonClass
uid: azure.mgmt.resource.deploymentstacks.models.DenySettings
name: DenySettings
fullName: azure.mgmt.resource.deploymentstacks.models.DenySettings
module: azure.mgmt.resource.deploymentstacks.models
summary: Defines how resources deployed by the Deployment stack are locked.
constructor:
  syntax: 'DenySettings(*args: Any, **kwargs: Any)'
variables:
- description: 'denySettings Mode that defines denied actions. Required. Known values
    are:

    "denyDelete", "denyWriteAndDelete", and "none".'
  name: mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.resource.deploymentstacks.models.DenySettingsMode>
- description: 'List of AAD principal IDs excluded from the lock. Up to 5 principals

    are permitted.'
  name: excluded_principals
  types:
  - <xref:list>[<xref:str>]
- description: 'List of role-based management operations that are excluded from the

    denySettings. Up to 200 actions are permitted. If the denySetting mode is set
    to

    ''denyWriteAndDelete'', then the following actions are automatically appended
    to

    ''excludedActions'': ''>>*<</read'' and ''Microsoft.Authorization/locks/delete''.
    If the denySetting

    mode is set to ''denyDelete'', then the following actions are automatically appended
    to

    ''excludedActions'': ''Microsoft.Authorization/locks/delete''. Duplicate actions
    will be removed.'
  name: excluded_actions
  types:
  - <xref:list>[<xref:str>]
- description: 'DenySettings will be applied to child resource scopes of every

    managed resource with a deny assignment.'
  name: apply_to_child_scopes
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.resource.deploymentstacks.models.DenySettings.apply_to_child_scopes
  name: apply_to_child_scopes
  summary: 'DenySettings will be applied to child resource scopes of every managed
    resource with a deny

    assignment.'
  signature: 'apply_to_child_scopes: bool | None'
- uid: azure.mgmt.resource.deploymentstacks.models.DenySettings.excluded_actions
  name: excluded_actions
  summary: 'List of role-based management operations that are excluded from the denySettings.
    Up to 200

    actions are permitted. If the denySetting mode is set to ''denyWriteAndDelete'',
    then the

    following actions are automatically appended to ''excludedActions'': ''>>*<</read''
    and

    ''Microsoft.Authorization/locks/delete''. If the denySetting mode is set to ''denyDelete'',
    then

    the following actions are automatically appended to ''excludedActions'':

    ''Microsoft.Authorization/locks/delete''. Duplicate actions will be removed.'
  signature: 'excluded_actions: list[str] | None'
- uid: azure.mgmt.resource.deploymentstacks.models.DenySettings.excluded_principals
  name: excluded_principals
  summary: List of AAD principal IDs excluded from the lock. Up to 5 principals are
    permitted.
  signature: 'excluded_principals: list[str] | None'
- uid: azure.mgmt.resource.deploymentstacks.models.DenySettings.mode
  name: mode
  summary: '"denyDelete",

    "denyWriteAndDelete", and "none".'
  signature: 'mode: str | _models.DenySettingsMode'
