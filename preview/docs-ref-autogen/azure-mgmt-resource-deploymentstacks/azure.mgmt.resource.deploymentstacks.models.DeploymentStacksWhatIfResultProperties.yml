- description: 'Defines the behavior of resources that are no longer managed after

    the Deployment stack is updated or deleted. Required.'
  name: action_on_unmanage
  types:
  - <xref:azure.mgmt.resource.deploymentstacks.models.ActionOnUnmanage>
- description: The debug setting of the deployment.
  name: debug_setting
  types:
  - <xref:azure.mgmt.resource.deploymentstacks.models.DeploymentStacksDebugSetting>
- description: 'The scope at which the initial deployment should be created. If a
    scope

    is not specified, it will default to the scope of the deployment stack. Valid
    scopes are:

    management group (format:

    ''/providers/Microsoft.Management/managementGroups/{managementGroupId}''), subscription
    (format:

    ''/subscriptions/{subscriptionId}''), resource group (format:

    ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}'').'
  name: deployment_scope
  types:
  - <xref:str>
- description: Deployment stack description. Max length of 4096 characters.
  name: description
  types:
  - <xref:str>
- description: Defines how resources deployed by the stack are locked. Required.
  name: deny_settings
  types:
  - <xref:azure.mgmt.resource.deploymentstacks.models.DenySettings>
- description: 'State of the deployment stack. Known values are: "creating",

    "validating", "waiting", "deploying", "canceling", "updatingDenyAssignments",

    "deletingResources", "succeeded", "failed", "canceled", "deleting", "initializing",
    and

    "running".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.resource.deploymentstacks.models.DeploymentStackProvisioningState>
- description: 'The correlation id of the last Deployment stack upsert or delete

    operation. It is in GUID format and is used for tracing.'
  name: correlation_id
  types:
  - <xref:str>
- description: 'The validation level of the deployment stack. Known values are:

    "Template", "Provider", and "ProviderNoRbac".'
  name: validation_level
  types:
  - <xref:str>
  - <xref:azure.mgmt.resource.deploymentstacks.models.ValidationLevel>
- description: 'The deployment stack id to use as the basis for comparison.

    Required.'
  name: deployment_stack_resource_id
  types:
  - <xref:str>
- description: 'The timestamp for when the deployment stack was last

    modified. This can be used to determine if the what-if data is still current.'
  name: deployment_stack_last_modified
  types:
  - <xref:datetime.datetime>
- description: 'The interval to persist the deployment stack what-if result in ISO

    8601 format. Required.'
  name: retention_interval
  types:
  - <xref:datetime.timedelta>
- description: All of the changes predicted by the deployment stack what-if operation.
  name: changes
  types:
  - <xref:azure.mgmt.resource.deploymentstacks.models.DeploymentStacksWhatIfChange>
- description: List of resource diagnostics detected by What-If operation.
  name: diagnostics
  types:
  - <xref:list>[<xref:azure.mgmt.resource.deploymentstacks.models.DeploymentStacksDiagnostic>]
