### YamlMime:PythonClass
uid: azure.mgmt.containerservicefleet.models.UpdateStage
name: UpdateStage
fullName: azure.mgmt.containerservicefleet.models.UpdateStage
module: azure.mgmt.containerservicefleet.models
summary: 'Defines a stage which contains the groups to update and the steps to take
  (e.g., wait for a

  time period) before starting the next stage.'
constructor:
  syntax: 'UpdateStage(*args: Any, **kwargs: Any)'
variables:
- description: The name of the stage. Must be unique within the UpdateRun. Required.
  name: name
  types:
  - <xref:str>
- description: 'Defines the groups to be executed in parallel in this stage. Duplicate
    groups are

    not allowed. Min size: 1.'
  name: groups
  types:
  - <xref:list>[<xref:azure.mgmt.containerservicefleet.models.UpdateGroup>]
- description: 'The time in seconds to wait at the end of this stage before

    starting the next one. Defaults to 0 seconds if unspecified.'
  name: after_stage_wait_in_seconds
  types:
  - <xref:int>
- description: "The max number of upgrades that can run concurrently across all groups\n\
    in this stage. Acts as a ceiling (and not a quota) for the number of concurrent\
    \ upgrades within\nthe stage you want to tolerate at a time. Actual concurrency\
    \ may be lower depending on\ngroup-level concurrency limits or individual member\
    \ conditions. Stage maxConcurrency has a min\nvalue of \"1\". Accepts either:\
    \ \u2022 A fixed count, e.g., \"3\" \u2022 A percentage, e.g., \"25%\" (range\n\
    1\u2013100). Percentage is of the total number of clusters across all groups in\
    \ the stage.\nFractional results are rounded down. A minimum of 1 upgrade is enforced.\
    \ Examples: \u2022 \"3\"\n\u2013> up to 3 clusters from this stage upgrade at\
    \ once (across all groups). \u2022 \"100%\"  \u2013> \"all at\nonce\"; up to all\
    \ clusters in this stage upgrade at the same time. \u2022 \"25%\"   \u2013> up\
    \ to 25% of\nthe stage's total clusters upgrade at the same time."
  name: max_concurrency
  types:
  - <xref:str>
- description: A list of Gates that will be created before this Stage is executed.
  name: before_gates
  types:
  - <xref:list>[<xref:azure.mgmt.containerservicefleet.models.GateConfiguration>]
- description: A list of Gates that will be created after this Stage is executed.
  name: after_gates
  types:
  - <xref:list>[<xref:azure.mgmt.containerservicefleet.models.GateConfiguration>]
attributes:
