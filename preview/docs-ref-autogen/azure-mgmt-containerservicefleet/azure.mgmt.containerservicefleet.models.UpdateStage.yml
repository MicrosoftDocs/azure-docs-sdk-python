  summary: A list of Gates that will be created before this Stage is executed.
  signature: 'before_gates: list[''_models.GateConfiguration''] | None'
- uid: azure.mgmt.containerservicefleet.models.UpdateStage.groups
  name: groups
  summary: 'Defines the groups to be executed in parallel in this stage. Duplicate
    groups are not allowed.

    Min size: 1.'
  signature: 'groups: list[''_models.UpdateGroup''] | None'
- uid: azure.mgmt.containerservicefleet.models.UpdateStage.max_concurrency
  name: max_concurrency
  summary: "The max number of upgrades that can run concurrently across all groups\
    \ in this stage. Acts as a\nceiling (and not a quota) for the number of concurrent\
    \ upgrades within the stage you want to\ntolerate at a time. Actual concurrency\
    \ may be lower depending on group-level concurrency limits\nor individual member\
    \ conditions. Stage maxConcurrency has a min value of \"1\". Accepts either:\n\
    \u2022 A fixed count, e.g., \"3\" \u2022 A percentage, e.g., \"25%\" (range 1\u2013\
    100). Percentage is of the\ntotal number of clusters across all groups in the\
    \ stage. Fractional results are rounded down. A\nminimum of 1 upgrade is enforced.\
    \ Examples: \u2022 \"3\"     \u2013> up to 3 clusters from this stage\nupgrade\
    \ at once (across all groups). \u2022 \"100%\"  \u2013> \"all at once\"; up to\
    \ all clusters in this\nstage upgrade at the same time. \u2022 \"25%\"   \u2013\
    > up to 25% of the stage's total clusters upgrade\nat the same time."
  signature: 'max_concurrency: str | None'
- uid: azure.mgmt.containerservicefleet.models.UpdateStage.name
  name: name
  summary: The name of the stage. Must be unique within the UpdateRun. Required.
  signature: 'name: str'
