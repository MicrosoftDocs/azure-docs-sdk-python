  name: max_concurrency
  summary: "The max number of upgrades that can run concurrently in this specific\
    \ group. Acts as a ceiling\n(and not a quota) for the number of concurrent upgrades\
    \ within the group you want to tolerate\nat a time. Actual concurrency may be\
    \ lower depending on stage-level concurrency limits or\nindividual member conditions.\
    \ Group maxConcurrency has a min value of \"1\". The max value is\nmin(number\
    \ of clusters in the group, the stage maxConcurrency). If no value is provided,\n\
    defaults to 1. Accepts either: \u2022 A fixed count, e.g. \"3\" \u2022 A percentage,\
    \ e.g. \"25%\" (range\n1\u2013100). Percentage is of the number of clusters in\
    \ the group. Fractional results are rounded\ndown. A minimum of 1 upgrade is enforced.\
    \ Examples: \u2022 \"3\" \u2013> up to 3 members from this group\nupgrade at once.\
    \ \u2022 \"100%\" \u2013> \"all at once\", up to all members for this group upgrade\
    \ at the\nsame time. \u2022 \"25%\" \u2013> up to 25% of the members in the group\
