### YamlMime:PythonClass
uid: azure.mgmt.containerservicefleet.models.UpdateGroup
name: UpdateGroup
fullName: azure.mgmt.containerservicefleet.models.UpdateGroup
module: azure.mgmt.containerservicefleet.models
summary: A group to be updated.
constructor:
  syntax: 'UpdateGroup(*args: Any, **kwargs: Any)'
variables:
- description: 'Name of the group. It must match a group name of an existing fleet
    member.

    Required.'
  name: name
  types:
  - <xref:str>
- description: "The max number of upgrades that can run concurrently in this specific\n\
    group. Acts as a ceiling (and not a quota) for the number of concurrent upgrades\
    \ within the\ngroup you want to tolerate at a time. Actual concurrency may be\
    \ lower depending on stage-level\nconcurrency limits or individual member conditions.\
    \ Group maxConcurrency has a min value of\n\"1\". The max value is min(number\
    \ of clusters in the group, the stage maxConcurrency). If no\nvalue is provided,\
    \ defaults to 1. Accepts either: \u2022 A fixed count, e.g. \"3\" \u2022 A percentage,\n\
    e.g. \"25%\" (range 1\u2013100). Percentage is of the number of clusters in the\
    \ group. Fractional\nresults are rounded down. A minimum of 1 upgrade is enforced.\
    \ Examples: \u2022 \"3\" \u2013> up to 3\nmembers from this group upgrade at once.\
    \ \u2022 \"100%\" \u2013> \"all at once\", up to all members for this\ngroup upgrade\
    \ at the same time. \u2022 \"25%\" \u2013> up to 25% of the members in the group\
    \ will be\nupgraded at the same time."
  name: max_concurrency
  types:
  - <xref:str>
- description: A list of Gates that will be created before this Group is executed.
  name: before_gates
  types:
  - <xref:list>[<xref:azure.mgmt.containerservicefleet.models.GateConfiguration>]
- description: A list of Gates that will be created after this Group is executed.
  name: after_gates
  types:
  - <xref:list>[<xref:azure.mgmt.containerservicefleet.models.GateConfiguration>]
