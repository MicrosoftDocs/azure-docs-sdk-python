### YamlMime:PythonClass
uid: azure.mgmt.securityinsight.models.JwtAuthModel
name: JwtAuthModel
fullName: azure.mgmt.securityinsight.models.JwtAuthModel
module: azure.mgmt.securityinsight.models
summary: 'Model for API authentication with JWT. Simple exchange between user name
  + password to access

  token.'
constructor:
  syntax: 'JwtAuthModel(*args: Any, **kwargs: Any)'
variables:
- description: Token endpoint to request JWT. Required.
  name: token_endpoint
  types:
  - <xref:str>
- description: 'The user name. If user name and password sent in header request we
    only need

    to populate the `value` property with the user name (Same as basic auth). If user
    name and

    password sent in body request we need to specify the `Key` and `Value`. Required.'
  name: user_name
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: The password. Required.
  name: password
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'The custom query parameter we want to add once we send request to
    token

    endpoint.'
  name: query_parameters
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: The custom headers we want to add once we send request to token endpoint.
  name: headers
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'Flag indicating whether we want to send the user name and

    password to token endpoint in the headers.'
  name: is_credentials_in_headers
  types:
  - <xref:bool>
- description: 'Flag indicating whether the body request is JSON (header Content-Type
    =

    application/json), meaning its a Form URL encoded request (header Content-Type
    =

    application/x-www-form-urlencoded).'
  name: is_json_request
  types:
  - <xref:bool>
- description: Request timeout in seconds.
  name: request_timeout_in_seconds
  types:
  - <xref:int>
- description: The auth type. Required. JwtToken.
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.JWT_TOKEN>
attributes:
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.headers
  name: headers
  summary: The custom headers we want to add once we send request to token endpoint.
  signature: 'headers: dict[str, str] | None'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.is_credentials_in_headers
  name: is_credentials_in_headers
  summary: 'Flag indicating whether we want to send the user name and password to
    token endpoint in the

    headers.'
  signature: 'is_credentials_in_headers: bool | None'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.is_json_request
  name: is_json_request
  summary: 'Flag indicating whether the body request is JSON (header Content-Type
    = application/json),

    meaning its a Form URL encoded request (header Content-Type =

    application/x-www-form-urlencoded).'
  signature: 'is_json_request: bool | None'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.password
  name: password
  summary: The password. Required.
  signature: 'password: dict[str, str]'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.query_parameters
  name: query_parameters
  summary: The custom query parameter we want to add once we send request to token
    endpoint.
  signature: 'query_parameters: dict[str, str] | None'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.request_timeout_in_seconds
  name: request_timeout_in_seconds
  summary: Request timeout in seconds.
  signature: 'request_timeout_in_seconds: int | None'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.token_endpoint
  name: token_endpoint
  summary: Token endpoint to request JWT. Required.
  signature: 'token_endpoint: str'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.type
  name: type
  summary: The auth type. Required. JwtToken.
  signature: 'type: JWT_TOKEN: ''JwtToken''>]'
- uid: azure.mgmt.securityinsight.models.JwtAuthModel.user_name
  name: user_name
  summary: 'The user name. If user name and password sent in header request we only
    need to populate the

    `value` property with the user name (Same as basic auth). If user name and password
    sent in

    body request we need to specify the `Key` and `Value`. Required.'
  signature: 'user_name: dict[str, str]'
