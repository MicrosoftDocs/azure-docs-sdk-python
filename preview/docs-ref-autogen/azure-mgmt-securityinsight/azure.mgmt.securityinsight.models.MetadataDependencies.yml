  name: content_id
  summary: Id of the content item we depend on.
  signature: 'content_id: str | None'
- uid: azure.mgmt.securityinsight.models.MetadataDependencies.criteria
  name: criteria
  summary: This is the list of dependencies we must fulfill, according to the AND/OR
