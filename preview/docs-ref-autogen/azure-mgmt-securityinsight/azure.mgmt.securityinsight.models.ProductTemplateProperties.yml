### YamlMime:PythonClass
uid: azure.mgmt.securityinsight.models.ProductTemplateProperties
name: ProductTemplateProperties
fullName: azure.mgmt.securityinsight.models.ProductTemplateProperties
module: azure.mgmt.securityinsight.models
summary: Template property bag.
constructor:
  syntax: 'ProductTemplateProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Static ID for the content.  Used to identify dependencies and content
    from

    solutions or community.  Hard-coded/static for out of the box content and solutions.
    Dynamic

    for user-created.  This is the resource name.'
  name: content_id
  types:
  - <xref:str>
- description: 'Unique ID for the content. It should be generated based on the

    contentId of the package, contentId of the template, contentKind of the template
    and the

    contentVersion of the template.'
  name: content_product_id
  types:
  - <xref:str>
- description: 'Version of the package.  Default and recommended format is numeric
    (e.g.

    1, 1.0, 1.0.0, 1.0.0.0), following ARM metadata best practices.  Can also be any
    string, but

    then we cannot guarantee any version checks.'
  name: package_version
  types:
  - <xref:str>
- description: 'Version of the content.  Default and recommended format is numeric
    (e.g. 1, 1.0,

    1.0.0, 1.0.0.0), following ARM metadata best practices.  Can also be any string,
    but then we

    cannot guarantee any version checks.'
  name: version
  types:
  - <xref:str>
- description: The display name of the template.
  name: display_name
  types:
  - <xref:str>
- description: 'The kind of content the template is for. Known values are: "DataConnector",

    "DataType", "Workbook", "WorkbookTemplate", "Playbook", "PlaybookTemplate",

    "AnalyticsRuleTemplate", "AnalyticsRule", "HuntingQuery", "InvestigationQuery",
    "Parser",

    "Watchlist", "WatchlistTemplate", "Solution", "AzureFunction", "LogicAppsCustomConnector",

    "AutomationRule", "ResourcesDataConnector", "Notebook", "Standalone", "SummaryRule",
    and

    "CustomDetection".'
  name: content_kind
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.Kind>
- description: Source of the content.  This is where/how it was created.
  name: source
  types:
  - <xref:azure.mgmt.securityinsight.models.MetadataSource>
- description: The creator of the content item.
  name: author
  types:
  - <xref:azure.mgmt.securityinsight.models.MetadataAuthor>
- description: Support information for the template - type, name, contact information.
  name: support
  types:
  - <xref:azure.mgmt.securityinsight.models.MetadataSupport>
- description: 'Dependencies for the content item, what other content items it requires
    to

    work.  Can describe more complex dependencies using a recursive/nested structure.
    For a single

    dependency an id/kind/version can be supplied or operator/criteria for complex
    formats.'
  name: dependencies
  types:
  - <xref:azure.mgmt.securityinsight.models.MetadataDependencies>
- description: Categories for the item.
  name: categories
  types:
  - <xref:azure.mgmt.securityinsight.models.MetadataCategories>
- description: Providers for the content item.
  name: providers
  types:
  - <xref:list>[<xref:str>]
- description: first publish date content item.
  name: first_publish_date
  types:
  - <xref:datetime.date>
- description: last publish date for the content item.
  name: last_publish_date
  types:
  - <xref:datetime.date>
- description: The custom version of the content. A optional free text.
  name: custom_version
  types:
  - <xref:str>
- description: 'Schema version of the content. Can be used to distinguish between

    different flow based on the schema version.'
  name: content_schema_version
  types:
  - <xref:str>
- description: the icon identifier. this id can later be fetched from the content
    metadata.
  name: icon
  types:
  - <xref:str>
- description: the tactics the resource covers.
  name: threat_analysis_tactics
  types:
  - <xref:list>[<xref:str>]
- description: 'the techniques the resource covers, these have to be aligned

    with the tactics being used.'
  name: threat_analysis_techniques
  types:
  - <xref:list>[<xref:str>]
- description: 'preview image file names. These will be taken from the solution

    artifacts.'
  name: preview_images
  types:
  - <xref:list>[<xref:str>]
- description: 'preview image file names. These will be taken from the solution

    artifacts. used for dark theme support.'
  name: preview_images_dark
  types:
  - <xref:list>[<xref:str>]
- description: the package Id contains this template.
  name: package_id
  types:
  - <xref:str>
- description: 'the packageKind of the package contains this template. Known values
    are:

    "Solution" and "Standalone".'
  name: package_kind
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.PackageKind>
- description: the name of the package contains this template.
  name: package_name
  types:
  - <xref:str>
- description: 'Flag indicates if this template is deprecated. Known values are: "true"

    and "false".'
  name: is_deprecated
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.Flag>
- description: The json of the ARM template to deploy.
  name: packaged_content
  types:
  - <xref:any>
