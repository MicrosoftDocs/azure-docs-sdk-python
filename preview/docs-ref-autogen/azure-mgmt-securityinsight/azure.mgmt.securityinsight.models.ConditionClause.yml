uid: azure.mgmt.securityinsight.models.ConditionClause
name: ConditionClause
fullName: azure.mgmt.securityinsight.models.ConditionClause
module: azure.mgmt.securityinsight.models
summary: Represents a single clause to be evaluated by a NormalizedCondition.
constructor:
  syntax: 'ConditionClause(*args: Any, **kwargs: Any)'
variables:
- description: 'The connective used to join all values in this ConditionClause. Known

    values are: "And" and "Or".'
  name: clause_connective
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.Connective>
- description: The name of the field that is evaluated. Required.
  name: field
  types:
  - <xref:str>
- description: 'Represents an operator in a ConditionClause. Required. Known values
    are:

    "Equals", "NotEquals", "LessThan", "LessThanEqual", "GreaterThan", "GreaterThanEqual",

    "StringContains", "StringNotContains", "StringStartsWith", "StringNotStartsWith",

    "StringEndsWith", "StringNotEndsWith", "StringIsEmpty", "IsNull", "IsTrue", "IsFalse",

    "ArrayContains", "ArrayNotContains", "OnOrAfterRelative", "AfterRelative",

    "OnOrBeforeRelative", "BeforeRelative", "OnOrAfterAbsolute", "AfterAbsolute",

    "OnOrBeforeAbsolute", and "BeforeAbsolute".'
  name: operator
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.Operator>
- description: The top level connective operator for this condition. Required.
  name: values_property
  types:
  - <xref:list>[<xref:str>]
attributes:
