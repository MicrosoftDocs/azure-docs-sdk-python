summary: 'Model for authentication with the API Key. Will result in additional header
  on the request

  (default behavior) to the remote server: ''ApiKeyName: ApiKeyIdentifier ApiKey''.
  If

  ''IsApiKeyInPostPayload'' is true it will send it in the body of the request and
  not the header.'
