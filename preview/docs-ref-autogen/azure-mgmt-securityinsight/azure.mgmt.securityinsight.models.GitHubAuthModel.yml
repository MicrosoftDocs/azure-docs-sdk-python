uid: azure.mgmt.securityinsight.models.GitHubAuthModel
name: GitHubAuthModel
fullName: azure.mgmt.securityinsight.models.GitHubAuthModel
module: azure.mgmt.securityinsight.models
summary: 'Model for API authentication for GitHub. For this authentication first we
  need to approve the

  Router app (Microsoft Security DevOps) to access the GitHub account, Then we only
  need the

  InstallationId to get the access token from

  [https://api.github.com/app/installations/{installId}/access_tokens](https://api.github.com/app/installations/{installId}/access_tokens).'
constructor:
  syntax: 'GitHubAuthModel(*args: Any, **kwargs: Any)'
variables:
- description: The GitHubApp auth installation id.
  name: installation_id
  types:
  - <xref:str>
- description: The auth type. Required. GitHub.
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.GIT_HUB>
attributes:
- uid: azure.mgmt.securityinsight.models.GitHubAuthModel.installation_id
  name: installation_id
  summary: The GitHubApp auth installation id.
  signature: 'installation_id: str | None'
- uid: azure.mgmt.securityinsight.models.GitHubAuthModel.type
  name: type
  summary: The auth type. Required. GitHub.
  signature: 'type: GIT_HUB: ''GitHub''>]'
