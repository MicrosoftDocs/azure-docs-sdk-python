    of

    csv/tsv content type, it''s the content of the file that will parsed by the endpoint.'
  name: raw_content
  types:
  - <xref:str>
- description: 'The search key is used to optimize query performance when using

    watchlists for joins with other data. For example, enable a column with IP addresses
    to be the

    designated SearchKey field, then use this field as the key field when joining
    to other event

    data by IP address. Required.'
  name: items_search_key
  types:
  - <xref:str>
- description: 'The content type of the raw content. Example : text/csv or text/tsv.'
  name: content_type
  types:
  - <xref:str>
- description: 'The status of the Watchlist upload : New, InProgress or Complete.
    **Note**

    : When a Watchlist upload status is InProgress, the Watchlist cannot be deleted.'
  name: upload_status
  types:
  - <xref:str>
- description: 'Describes provisioning state. Known values are: "Accepted",

    "InProgress", "Succeeded", "Failed", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.securityinsight.models.ProvisioningState>
