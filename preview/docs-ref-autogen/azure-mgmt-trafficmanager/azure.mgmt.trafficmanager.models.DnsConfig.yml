### YamlMime:PythonClass
uid: azure.mgmt.trafficmanager.models.DnsConfig
name: DnsConfig
fullName: azure.mgmt.trafficmanager.models.DnsConfig
module: azure.mgmt.trafficmanager.models
summary: Class containing DNS settings in a Traffic Manager profile.
constructor:
  syntax: 'DnsConfig(*args: Any, **kwargs: Any)'
variables:
- description: 'The relative DNS name provided by this Traffic Manager profile. This
    value

    is combined with the DNS domain name used by Azure Traffic Manager to form the
    fully-qualified

    domain name (FQDN) of the profile.'
  name: relative_name
  types:
  - <xref:str>
- description: 'The fully-qualified domain name (FQDN) of the Traffic Manager profile.
    This is

    formed from the concatenation of the RelativeName with the DNS domain used by
    Azure Traffic

    Manager.'
  name: fqdn
  types:
  - <xref:str>
- description: 'The DNS Time-To-Live (TTL), in seconds. This informs the local DNS
    resolvers and DNS

    clients how long to cache DNS responses provided by this Traffic Manager profile.'
  name: ttl
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.trafficmanager.models.DnsConfig.fqdn
  name: fqdn
  summary: 'The fully-qualified domain name (FQDN) of the Traffic Manager profile.
    This is formed from the

    concatenation of the RelativeName with the DNS domain used by Azure Traffic Manager.'
  signature: 'fqdn: str | None'
- uid: azure.mgmt.trafficmanager.models.DnsConfig.relative_name
  name: relative_name
  summary: 'The relative DNS name provided by this Traffic Manager profile. This value
    is combined with the

    DNS domain name used by Azure Traffic Manager to form the fully-qualified domain
    name (FQDN) of

    the profile.'
  signature: 'relative_name: str | None'
- uid: azure.mgmt.trafficmanager.models.DnsConfig.ttl
  name: ttl
  summary: 'The DNS Time-To-Live (TTL), in seconds. This informs the local DNS resolvers
    and DNS clients

    how long to cache DNS responses provided by this Traffic Manager profile.'
  signature: 'ttl: int | None'
