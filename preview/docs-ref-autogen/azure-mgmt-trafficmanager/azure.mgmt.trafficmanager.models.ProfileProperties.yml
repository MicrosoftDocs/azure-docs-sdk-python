uid: azure.mgmt.trafficmanager.models.ProfileProperties
name: ProfileProperties
fullName: azure.mgmt.trafficmanager.models.ProfileProperties
module: azure.mgmt.trafficmanager.models
summary: Class representing the Traffic Manager profile properties.
constructor:
  syntax: 'ProfileProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The status of the Traffic Manager profile. Known values are: "Enabled"

    and "Disabled".'
  name: profile_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.trafficmanager.models.ProfileStatus>
- description: 'The traffic routing method of the Traffic Manager profile. Known

    values are: "Performance", "Priority", "Weighted", "Geographic", "MultiValue",
    and "Subnet".'
  name: traffic_routing_method
  types:
  - <xref:str>
  - <xref:azure.mgmt.trafficmanager.models.TrafficRoutingMethod>
- description: The DNS settings of the Traffic Manager profile.
  name: dns_config
  types:
  - <xref:azure.mgmt.trafficmanager.models.DnsConfig>
- description: The endpoint monitoring settings of the Traffic Manager profile.
  name: monitor_config
  types:
  - <xref:azure.mgmt.trafficmanager.models.MonitorConfig>
- description: The list of endpoints in the Traffic Manager profile.
  name: endpoints
  types:
  - <xref:list>[<xref:azure.mgmt.trafficmanager.models.Endpoint>]
- description: 'Indicates whether Traffic View is ''Enabled'' or ''Disabled''

    for the Traffic Manager profile. Null, indicates ''Disabled''. Enabling this feature
    will

    increase the cost of the Traffic Manage profile. Known values are: "Enabled" and
    "Disabled".'
  name: traffic_view_enrollment_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.trafficmanager.models.TrafficViewEnrollmentStatus>
- description: The list of allowed endpoint record types.
  name: allowed_endpoint_record_types
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.mgmt.trafficmanager.models.AllowedEndpointRecordType>]
- description: Maximum number of endpoints to be returned for MultiValue routing type.
  name: max_return
  types:
  - <xref:int>
- description: 'When record type is set, a traffic manager profile will allow only
    endpoints

    that match this type. Known values are: "A", "AAAA", and "CNAME".'
  name: record_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.trafficmanager.models.RecordType>
