    routing method. Please consult Traffic Manager Geographic documentation for a
    full list of

    accepted values.'
  signature: 'geo_mapping: list[str] | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.min_child_endpoints
  name: min_child_endpoints
  summary: 'The minimum number of endpoints that must be available in the child profile
