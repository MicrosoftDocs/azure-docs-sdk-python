    of type ''NestedEndpoints''.'
  signature: 'min_child_endpoints_i_pv6: int | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.priority
  name: priority
  summary: 'The priority of this endpoint when using the ''Priority'' traffic routing
