    endpoints.'
  signature: 'subnets: list[''_models.EndpointPropertiesSubnetsItem''] | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.target
  name: target
  summary: 'The fully-qualified DNS name or IP address of the endpoint. Traffic Manager
    returns this value

    in DNS responses to direct traffic to this endpoint.'
  signature: 'target: str | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.target_resource_id
  name: target_resource_id
  summary: 'The Azure Resource URI of the of the endpoint. Not applicable to endpoints
    of type

    ''ExternalEndpoints''.'
  signature: 'target_resource_id: str | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.weight
  name: weight
  summary: 'The weight of this endpoint when using the ''Weighted'' traffic routing
