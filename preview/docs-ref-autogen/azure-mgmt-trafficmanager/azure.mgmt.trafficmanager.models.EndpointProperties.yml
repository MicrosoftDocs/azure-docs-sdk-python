    specified, it must be specified on all endpoints, and no two endpoints can share
    the same

    priority value.'
  signature: 'priority: int | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.subnets
  name: subnets
  summary: 'The list of subnets, IP addresses, and/or address ranges mapped to this
