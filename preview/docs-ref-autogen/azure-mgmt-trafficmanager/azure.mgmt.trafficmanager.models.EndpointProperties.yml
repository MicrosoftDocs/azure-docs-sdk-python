    parent profile to be considered available. Only applicable to endpoint of type

    ''NestedEndpoints''.'
  signature: 'min_child_endpoints: int | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.min_child_endpoints_i_pv4
  name: min_child_endpoints_i_pv4
  summary: 'The minimum number of IPv4 (DNS record type A) endpoints that must be
    available in the child

    profile in order for the parent profile to be considered available. Only applicable
    to endpoint

    of type ''NestedEndpoints''.'
  signature: 'min_child_endpoints_i_pv4: int | None'
- uid: azure.mgmt.trafficmanager.models.EndpointProperties.min_child_endpoints_i_pv6
  name: min_child_endpoints_i_pv6
  summary: 'The minimum number of IPv6 (DNS record type AAAA) endpoints that must
    be available in the child

    profile in order for the parent profile to be considered available. Only applicable
