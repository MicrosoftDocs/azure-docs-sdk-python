    isRequired: true
    types:
    - <xref:str>
  - name: site_seal_request
    description: 'Site seal request. Is one of the following types: SiteSealRequest,

      JSON, IO[bytes] Required.'
    isRequired: true
    types:
    - <xref:azure.mgmt.certificateregistration.models.SiteSealRequest>
    - <xref:JSON>
    - <xref:typing.IO>[<xref:bytes>]
  return:
