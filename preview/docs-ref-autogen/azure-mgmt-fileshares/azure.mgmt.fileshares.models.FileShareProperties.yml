### YamlMime:PythonClass
uid: azure.mgmt.fileshares.models.FileShareProperties
name: FileShareProperties
fullName: azure.mgmt.fileshares.models.FileShareProperties
module: azure.mgmt.fileshares.models
summary: File share properties.
constructor:
  syntax: 'FileShareProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the file share as seen by the end user when mounting the
    share,

    such as in a URI or UNC format in their operating system.'
  name: mount_name
  types:
  - <xref:str>
- description: The host name of the file share.
  name: host_name
  types:
  - <xref:str>
- description: The storage media tier of the file share. "SSD"
  name: media_tier
  types:
  - <xref:str>
  - <xref:azure.mgmt.fileshares.models.MediaTier>
- description: 'The chosen redundancy level of the file share. Known values are: "Local"
    and

    "Zone".'
  name: redundancy
  types:
  - <xref:str>
  - <xref:azure.mgmt.fileshares.models.Redundancy>
- description: The file sharing protocol for this file share. "NFS"
  name: protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.fileshares.models.Protocol>
- description: 'The provisioned storage size of the share in GiB (1 GiB is

    1024^3 bytes or 1073741824 bytes). A component of the file share''s bill is the
    provisioned

    storage, regardless of the amount of used storage.'
  name: provisioned_storage_gi_b
  types:
  - <xref:int>
- description: 'A date/time value that specifies when the

    provisioned storage for the file share is permitted to be reduced.'
  name: provisioned_storage_next_allowed_downgrade
  types:
  - <xref:datetime.datetime>
- description: The provisioned IO / sec of the share.
  name: provisioned_io_per_sec
  types:
  - <xref:int>
- description: 'A date/time value that specifies when the

    provisioned IOPS for the file share is permitted to be reduced.'
  name: provisioned_io_per_sec_next_allowed_downgrade
  types:
  - <xref:datetime.datetime>
- description: The provisioned throughput / sec of the share.
  name: provisioned_throughput_mi_b_per_sec
  types:
  - <xref:int>
- description: 'A date/time value that specifies when the

    provisioned throughput for the file share is permitted to be reduced.'
  name: provisioned_throughput_next_allowed_downgrade
  types:
  - <xref:datetime.datetime>
- description: 'Burst IOPS are extra buffer IOPS enabling you to consume more

    than your provisioned IOPS for a short period of time, depending on the burst
    credits available

    for your share.'
  name: included_burst_io_per_sec
  types:
  - <xref:int>
- description: 'Max burst IOPS credits shows the maximum number of burst

    credits the share can have at the current IOPS provisioning level.'
  name: max_burst_io_per_sec_credits
  types:
  - <xref:int>
- description: Protocol settings specific NFS.
  name: nfs_protocol_properties
  types:
  - <xref:azure.mgmt.fileshares.models.NfsProtocolProperties>
- description: The set of properties for control public access.
  name: public_access_properties
  types:
  - <xref:azure.mgmt.fileshares.models.PublicAccessProperties>
- description: 'The status of the last operation. Known values are: "Succeeded",

    "Failed", "Canceled", "Provisioning", "Updating", "Deleting", "Accepted", "Created",

    "TransientFailure", "Creating", "Patching", and "Posting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.fileshares.models.FileShareProvisioningState>
- description: 'Gets or sets allow or disallow public network access to azure

    managed file share. Known values are: "Enabled" and "Disabled".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.fileshares.models.PublicNetworkAccess>
- description: The list of associated private endpoint connections.
  name: private_endpoint_connections
  types:
  - <xref:list>[<xref:azure.mgmt.fileshares.models.PrivateEndpointConnection>]
