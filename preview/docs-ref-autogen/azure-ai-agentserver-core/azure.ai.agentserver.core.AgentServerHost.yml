### YamlMime:PythonClass
uid: azure.ai.agentserver.core.AgentServerHost
name: AgentServerHost
fullName: azure.ai.agentserver.core.AgentServerHost
module: azure.ai.agentserver.core
summary: "Agent server host framework for Azure AI Hosted Agent containers.\n\nA <xref:starlette.applications.Starlette>\
  \ subclass providing the\nprotocol-agnostic infrastructure required by all hosted\
  \ agent containers:\n\n* Health probe (`GET /readiness`) \n\n* Graceful shutdown\
  \ handling (SIGTERM, configurable timeout) \n\n* OpenTelemetry tracing with Azure\
  \ Monitor and OTLP exporters \n\n* Hypercorn-based ASGI server with HTTP/1.1 \n\n\
  Protocol packages subclass this host to add their own routes:\n\n<!-- literal_block\
  \ {\"ids\": [], \"classes\": [], \"names\": [], \"dupnames\": [], \"backrefs\":\
  \ [], \"xml:space\": \"preserve\", \"language\": \"default\", \"force\": false,\
  \ \"linenos\": false} -->\n\n````default\n\n   from azure.ai.agentserver.invocations\
  \ import InvocationAgentServerHost\n\n   app = InvocationAgentServerHost()\n\n \
  \  @app.invoke_handler\n   async def handle(request):\n       return JSONResponse({\"\
  ok\": True})\n\n   app.run()\n   ````\n\nFor multi-protocol agents, compose via\
  \ cooperative inheritance:\n\n<!-- literal_block {\"ids\": [], \"classes\": [],\
  \ \"names\": [], \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\"\
  , \"language\": \"default\", \"force\": false, \"linenos\": false} -->\n\n````default\n\
  \n   class MyHost(InvocationAgentServerHost, ResponsesAgentServerHost):\n      \
  \ pass\n\n   app = MyHost()\n   ````"
constructor:
  syntax: 'AgentServerHost(*, applicationinsights_connection_string: str | None =
    None, graceful_shutdown_timeout: int | None = None, log_level: str | None = None,
    access_log: ~logging.Logger | None = <object object>, access_log_format: str |
    None = None, configure_observability: ~collections.abc.Callable[[...], None] |
    None = <function configure_observability>, routes: list[starlette.routing.Route]
    | None = None, **kwargs: ~typing.Any)'
  parameters:
  - name: applicationinsights_connection_string
    description: 'Application Insights

      connection string for exporting traces and logs to Azure Monitor.

      When *None* (default) the `APPLICATIONINSIGHTS_CONNECTION_STRING`

      env var is consulted.  Tracing is automatically enabled when a

      connection string is available.'
    isRequired: true
    types:
    - <xref:typing.Optional>[<xref:str>]
  - name: graceful_shutdown_timeout
    description: 'Seconds to wait for in-flight requests to

      complete after receiving SIGTERM / shutdown signal.  When *None* (default)

      the default is 30 seconds.  Set to `0` to disable the drain period.'
    isRequired: true
    types:
    - <xref:typing.Optional>[<xref:int>]
  - name: log_level
    description: 'Library log level (e.g. `"DEBUG"`, `"INFO"`).  When

      *None* (default) the default is `"INFO"`.'
    isRequired: true
    types:
    - <xref:typing.Optional>[<xref:str>]
  - name: access_log
    description: 'Logger for HTTP access logs, or *None* to disable.

      Defaults to the library logger (`azure.ai.agentserver`).'
    isRequired: true
    types:
    - <xref:typing.Optional>[<xref:logging.Logger>]
  - name: access_log_format
    description: "Hypercorn access-log format string.\nSupports `%(h)s` (remote addr),\
      \ `%(r)s` (request line),\n`%(s)s` (status), `%(b)s` (body size), `%(D)s` (duration\
      \ \u03BCs),\n`%({header}i)s` (request header), `%({header}o)s` (response header).\n\
      Defaults to `%(h)s \"%(r)s\" %(s)s %(b)s %(D)s\u03BCs`."
    isRequired: true
    types:
    - <xref:typing.Optional>[<xref:str>]
  - name: configure_observability
    description: 'Callable that sets up console logging,

      tracing, and OTel export.  Defaults to

      <xref:_tracing.configure_observability> which attaches a console

      handler to the root logger and configures Azure Monitor / OTLP

      export.  Pass a custom callable to override the setup, or `None`

      to skip all SDK-managed observability configuration.'
    isRequired: true
    types:
    - <xref:typing.Optional>[<xref:typing.Callable>[..., <xref:None>]]
  keywordOnlyParameters:
  - name: applicationinsights_connection_string
    defaultValue: None
  - name: graceful_shutdown_timeout
    defaultValue: None
  - name: log_level
    defaultValue: None
  - name: access_log
    defaultValue: <object object at 0x00000205EA1A2330>
  - name: access_log_format
    defaultValue: None
  - name: configure_observability
    defaultValue: <function configure_observability at 0x00000205EC620E00>
  - name: routes
    defaultValue: None
