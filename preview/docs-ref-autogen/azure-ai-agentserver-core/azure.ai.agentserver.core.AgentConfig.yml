### YamlMime:PythonClass
uid: azure.ai.agentserver.core.AgentConfig
name: AgentConfig
fullName: azure.ai.agentserver.core.AgentConfig
module: azure.ai.agentserver.core
summary: "Resolved configuration for an agent server host.\n\nAll values are populated\
  \ from environment variables at creation time.\nAccess via `app.config`:\n\n<!--\
  \ literal_block {\"ids\": [], \"classes\": [], \"names\": [], \"dupnames\": [],\
  \ \"backrefs\": [], \"xml:space\": \"preserve\", \"language\": \"default\", \"force\"\
  : false, \"linenos\": false} -->\n\n````default\n\n   app = InvocationAgentServerHost()\n\
  \   print(app.config.agent_name)\n   print(app.config.project_endpoint)\n   ````"
constructor:
  syntax: 'AgentConfig(*, agent_name: str, agent_version: str, agent_id: str, is_hosted:
    bool, project_endpoint: str, project_id: str, session_id: str, port: int, appinsights_connection_string:
    str, otlp_endpoint: str, sse_keepalive_interval: int, ws_ping_interval: float
    = 0.0)'
  parameters:
  - name: agent_name
    description: Agent name from `FOUNDRY_AGENT_NAME`.
    isRequired: true
  - name: agent_version
    description: Agent version from `FOUNDRY_AGENT_VERSION`.
    isRequired: true
  - name: agent_id
    description: Combined identifier (`"name:version"` or `"name"` or `""`).
    isRequired: true
  - name: is_hosted
    description: 'Whether the agent is running in a Foundry-hosted container environment,

      derived from `FOUNDRY_HOSTING_ENVIRONMENT`.'
    isRequired: true
  - name: project_endpoint
    description: Foundry project endpoint from `FOUNDRY_PROJECT_ENDPOINT`.
    isRequired: true
  - name: project_id
    description: Foundry project ARM resource ID from `FOUNDRY_PROJECT_ARM_ID`.
    isRequired: true
  - name: session_id
    description: Default session ID from `FOUNDRY_AGENT_SESSION_ID`.
    isRequired: true
  - name: port
    description: Server port from `PORT` (default 8088).
    isRequired: true
  - name: appinsights_connection_string
    description: Application Insights connection string.
    isRequired: true
  - name: otlp_endpoint
    description: OTLP exporter endpoint.
    isRequired: true
  - name: sse_keepalive_interval
    description: SSE keep-alive interval in seconds (0 = disabled).
    isRequired: true
  - name: ws_ping_interval
    description: 'WebSocket protocol Ping interval in seconds

      (`0` disables keep-alive).'
    isRequired: true
  keywordOnlyParameters:
  - name: agent_name
    isRequired: true
  - name: agent_version
    isRequired: true
  - name: agent_id
    isRequired: true
  - name: is_hosted
    isRequired: true
  - name: project_endpoint
    isRequired: true
  - name: project_id
    isRequired: true
  - name: session_id
    isRequired: true
  - name: port
    isRequired: true
  - name: appinsights_connection_string
    isRequired: true
  - name: otlp_endpoint
    isRequired: true
  - name: sse_keepalive_interval
    isRequired: true
  - name: ws_ping_interval
    defaultValue: '0.0'
methods:
- uid: azure.ai.agentserver.core.AgentConfig.from_env
  name: from_env
  summary: Create an `AgentConfig` by reading all platform environment variables.
  signature: from_env() -> Self
  return:
    description: A frozen config with resolved values.
    types:
    - <xref:azure.ai.agentserver.core.AgentConfig>
