- uid: azure.ai.agentserver.core.models.openai.ResponsesClientEventParam.conversation
  name: conversation
  summary: 'The conversation that this response belongs to.


    Items from this conversation are prepended to *input_items* for this response

    request. Input items and output items from this response are automatically added

    to this conversation after this response completes.'
  signature: 'conversation: str | ResponseConversationParamParam | None'
- uid: azure.ai.agentserver.core.models.openai.ResponsesClientEventParam.include
  name: include
  summary: "Specify additional output data to include in the model response.\n\nCurrently\
    \ supported values are:\n\n* *web_search_call.action.sources*: Include the sources\
    \ of the web search tool call. \n\n* *code_interpreter_call.outputs*: Includes\
    \ the outputs of python code execution in code interpreter tool call items. \n\
    \n* *computer_call_output.output.image_url*: Include image urls from the computer\
    \ call output. \n\n* *file_search_call.results*: Include the search results of\
    \ the file search tool call. \n\n* *message.input_image.image_url*: Include image\
    \ urls from the input message. \n\n* *message.output_text.logprobs*: Include logprobs\
    \ with assistant messages. \n\n* *reasoning.encrypted_content*: Includes an encrypted\
    \ version of reasoning tokens in reasoning item outputs. This enables reasoning\
    \ items to be used in multi-turn conversations when using the Responses API statelessly\
    \ (like when the *store* parameter is set to *false*, or when an organization\
    \ is enrolled in the zero data retention program). "
  signature: 'include: List[Literal[''file_search_call.results'', ''web_search_call.results'',
    ''web_search_call.action.sources'', ''message.input_image.image_url'', ''computer_call_output.output.image_url'',
    ''code_interpreter_call.outputs'', ''reasoning.encrypted_content'', ''message.output_text.logprobs'']]
    | None'
