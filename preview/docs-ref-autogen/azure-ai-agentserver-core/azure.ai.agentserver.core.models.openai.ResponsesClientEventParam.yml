    \ inputs](https://platform.openai.com/docs/guides/pdf-files) \n\n* [Conversation\
    \ state](https://platform.openai.com/docs/guides/conversation-state) \n\n* [Function\
    \ calling](https://platform.openai.com/docs/guides/function-calling) "
  signature: 'input: str | List[EasyInputMessageParam | Message | ResponseOutputMessageParam
    | ResponseFileSearchToolCallParam | ResponseComputerToolCallParam | ComputerCallOutput
    | ResponseFunctionWebSearchParam | ResponseFunctionToolCallParam | FunctionCallOutput
    | ResponseReasoningItemParam | ResponseCompactionItemParamParam | ImageGenerationCall
