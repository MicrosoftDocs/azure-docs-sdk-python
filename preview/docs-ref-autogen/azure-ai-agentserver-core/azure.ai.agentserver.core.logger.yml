- uid: azure.ai.agentserver.core.logger.get_log_level
  name: get_log_level
  signature: get_log_level()
- uid: azure.ai.agentserver.core.logger.get_logger
  name: get_logger
  summary: If the logger is not already configured, it will be initialized with default
