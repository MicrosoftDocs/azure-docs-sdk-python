- uid: azure.ai.agentserver.core.logger.configure
  name: configure
  summary: 'Configure logging based on the provided configuration dictionary.

    The dictionary should contain the logging configuration in a format compatible
    with *logging.config.dictConfig*.'
  signature: 'configure(log_config: dict[str, Any] | None = None)'
  parameters:
  - name: log_config
    description: A dictionary containing logging configuration. If None, uses default
      config with AGENT_LOG_LEVEL.
    defaultValue: None
    types:
    - <xref:typing.Optional>[<xref:dict>[<xref:str>, <xref:typing.Any>]]
