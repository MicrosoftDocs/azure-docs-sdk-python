### YamlMime:PythonClass
uid: azure.ai.agentserver.core.InboundRequestLoggingMiddleware
name: InboundRequestLoggingMiddleware
fullName: azure.ai.agentserver.core.InboundRequestLoggingMiddleware
module: azure.ai.agentserver.core
summary: 'Pure-ASGI middleware that logs inbound HTTP requests.


  Unlike `BaseHTTPMiddleware`, this passes the `receive` callable

  through to the inner application untouched, preserving

  `request.is_disconnected()` behaviour.


  Wired automatically by <xref:azure.ai.agentserver.core.AgentServerHost> so that
  all protocol

  hosts (responses, invocations, etc.) get consistent inbound logging.'
constructor:
  syntax: 'InboundRequestLoggingMiddleware(app: Callable[[MutableMapping[str, Any],
    Callable[[], Awaitable[MutableMapping[str, Any]]], Callable[[MutableMapping[str,
    Any]], Awaitable[None]]], Awaitable[None]])'
  parameters:
  - name: app
    description: The inner ASGI application.
    isRequired: true
    types:
    - <xref:ASGIApp>
