### YamlMime:PythonClass
uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient
name: FoundryCheckpointClient
fullName: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient
module: azure.ai.agentserver.core.checkpoints.client
summary: 'Asynchronous client for Azure AI Foundry checkpoint storage API.


  This client provides access to checkpoint storage for workflow state persistence,

  enabling checkpoint save, load, list, and delete operations.


  Initialize the asynchronous Azure AI Checkpoint Client.'
constructor:
  syntax: 'FoundryCheckpointClient(endpoint: str, credential: AsyncTokenCredential)'
  parameters:
  - name: endpoint
    description: 'The fully qualified project endpoint for the Azure AI Foundry service.

      Example: "[https:/](https:/)/<resource>.services.ai.azure.com/api/projects/<project-id>"'
    isRequired: true
    types:
    - <xref:str>
  - name: credential
    description: 'Credential for authenticating requests to the service.

      Use credentials from azure-identity like DefaultAzureCredential.'
    isRequired: true
    types:
    - <xref:azure.core.credentials_async.AsyncTokenCredential>
  - name: endpoint
    description: The project endpoint URL (includes project context).
    isRequired: true
    types:
    - <xref:str>
  - name: credential
    description: Credentials for authenticating requests.
    isRequired: true
    types:
    - <xref:azure.core.credentials_async.AsyncTokenCredential>
methods:
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.close
  name: close
  summary: Close the underlying HTTP pipeline.
  signature: async close() -> None
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.create_items
  name: create_items
  summary: Create checkpoint items in batch.
  signature: 'async create_items(items: List[CheckpointItem]) -> List[CheckpointItem]'
  parameters:
  - name: items
    description: The checkpoint items to create.
    isRequired: true
    types:
    - <xref:typing.List>[<xref:azure.ai.agentserver.core.checkpoints.client.CheckpointItem>]
  return:
    description: The created checkpoint items.
    types:
    - <xref:typing.List>[<xref:azure.ai.agentserver.core.checkpoints.client.CheckpointItem>]
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.delete_item
  name: delete_item
  summary: Delete a checkpoint item.
  signature: 'async delete_item(item_id: CheckpointItemId) -> bool'
  parameters:
  - name: item_id
    description: The checkpoint item identifier.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.core.checkpoints.client.CheckpointItemId>
  return:
    description: True if the item was deleted, False if not found.
    types:
    - <xref:bool>
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.delete_session
  name: delete_session
  summary: Delete a checkpoint session.
  signature: 'async delete_session(session_id: str) -> None'
  parameters:
  - name: session_id
    description: The session identifier.
    isRequired: true
    types:
    - <xref:str>
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.list_item_ids
  name: list_item_ids
  summary: List checkpoint item IDs for a session.
  signature: 'async list_item_ids(session_id: str, parent_id: str | None = None) ->
    List[CheckpointItemId]'
  parameters:
  - name: session_id
    description: The session identifier.
    isRequired: true
    types:
    - <xref:str>
  - name: parent_id
    description: Optional parent item identifier for filtering.
    defaultValue: None
    types:
    - <xref:typing.Optional>[<xref:str>]
  return:
    description: List of checkpoint item identifiers.
    types:
    - <xref:typing.List>[<xref:azure.ai.agentserver.core.checkpoints.client.CheckpointItemId>]
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.read_item
  name: read_item
  summary: Read a checkpoint item by ID.
  signature: 'async read_item(item_id: CheckpointItemId) -> CheckpointItem | None'
  parameters:
  - name: item_id
    description: The checkpoint item identifier.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.core.checkpoints.client.CheckpointItemId>
  return:
    description: The checkpoint item if found, None otherwise.
    types:
    - <xref:typing.Optional>[<xref:azure.ai.agentserver.core.checkpoints.client.CheckpointItem>]
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.read_session
  name: read_session
  summary: Read a checkpoint session by ID.
  signature: 'async read_session(session_id: str) -> CheckpointSession | None'
  parameters:
  - name: session_id
    description: The session identifier.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The checkpoint session if found, None otherwise.
    types:
    - <xref:typing.Optional>[<xref:azure.ai.agentserver.core.checkpoints.client.CheckpointSession>]
- uid: azure.ai.agentserver.core.checkpoints.client.FoundryCheckpointClient.upsert_session
  name: upsert_session
  summary: Create or update a checkpoint session.
  signature: 'async upsert_session(session: CheckpointSession) -> CheckpointSession'
  parameters:
  - name: session
    description: The checkpoint session to upsert.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.core.checkpoints.client.CheckpointSession>
  return:
    description: The upserted checkpoint session.
    types:
    - <xref:azure.ai.agentserver.core.checkpoints.client.CheckpointSession>
