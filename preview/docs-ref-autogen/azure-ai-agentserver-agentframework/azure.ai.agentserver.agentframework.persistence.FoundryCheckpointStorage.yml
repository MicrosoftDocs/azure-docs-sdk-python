### YamlMime:PythonClass
uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointStorage
name: FoundryCheckpointStorage
fullName: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointStorage
module: azure.ai.agentserver.agentframework.persistence
summary: 'CheckpointStorage implementation backed by Azure AI Foundry.


  Implements the agent_framework.CheckpointStorage protocol by delegating

  to the FoundryCheckpointClient HTTP client for remote storage.


  Initialize the Foundry checkpoint storage.'
constructor:
  syntax: 'FoundryCheckpointStorage(client: FoundryCheckpointClient, session_id: str)'
  parameters:
  - name: client
    description: The Foundry checkpoint client.
    isRequired: true
    types:
    - <xref:FoundryCheckpointClient>
  - name: session_id
    description: The session identifier (maps to conversation_id).
    isRequired: true
    types:
    - <xref:str>
  - name: client
    description: The Foundry checkpoint client.
    isRequired: true
    types:
    - <xref:FoundryCheckpointClient>
  - name: session_id
    description: The session identifier.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointStorage.delete_checkpoint
  name: delete_checkpoint
  summary: Delete a checkpoint by ID.
  signature: 'async delete_checkpoint(checkpoint_id: str) -> bool'
  parameters:
  - name: checkpoint_id
    description: The checkpoint identifier.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: True if the checkpoint was deleted, False otherwise.
    types:
    - <xref:bool>
- uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointStorage.list_checkpoint_ids
  name: list_checkpoint_ids
  summary: 'List checkpoint IDs.


    If workflow_id is provided, filter by that workflow.'
  signature: 'async list_checkpoint_ids(workflow_id: str | None = None) -> List[str]'
  parameters:
  - name: workflow_id
    description: Optional workflow identifier for filtering.
    defaultValue: None
    types:
    - <xref:typing.Optional>[<xref:str>]
  return:
    description: List of checkpoint identifiers.
    types:
    - <xref:typing.List>[<xref:str>]
- uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointStorage.list_checkpoints
  name: list_checkpoints
  summary: 'List checkpoint objects.


    If workflow_id is provided, filter by that workflow.'
  signature: 'async list_checkpoints(workflow_id: str | None = None) -> List[WorkflowCheckpoint]'
  parameters:
  - name: workflow_id
    description: Optional workflow identifier for filtering.
    defaultValue: None
    types:
    - <xref:typing.Optional>[<xref:str>]
  return:
    description: List of workflow checkpoints.
    types:
    - <xref:typing.List>[<xref:WorkflowCheckpoint>]
- uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointStorage.load_checkpoint
  name: load_checkpoint
  summary: Load a checkpoint by ID.
  signature: 'async load_checkpoint(checkpoint_id: str) -> WorkflowCheckpoint | None'
  parameters:
  - name: checkpoint_id
    description: The checkpoint identifier.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The workflow checkpoint if found, None otherwise.
    types:
    - <xref:typing.Optional>[<xref:WorkflowCheckpoint>]
- uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointStorage.save_checkpoint
  name: save_checkpoint
  summary: Save a checkpoint and return its ID.
  signature: 'async save_checkpoint(checkpoint: WorkflowCheckpoint) -> str'
  parameters:
  - name: checkpoint
    description: The workflow checkpoint to save.
    isRequired: true
    types:
    - <xref:WorkflowCheckpoint>
  return:
    description: The checkpoint ID.
    types:
    - <xref:str>
