### YamlMime:PythonClass
uid: azure.ai.agentserver.agentframework.models.agent_framework_output_non_streaming_converter.AgentFrameworkOutputNonStreamingConverter
name: AgentFrameworkOutputNonStreamingConverter
fullName: azure.ai.agentserver.agentframework.models.agent_framework_output_non_streaming_converter.AgentFrameworkOutputNonStreamingConverter
module: azure.ai.agentserver.agentframework.models.agent_framework_output_non_streaming_converter
summary: 'Non-streaming converter: AgentResponse -> OpenAIResponse.'
constructor:
  syntax: 'AgentFrameworkOutputNonStreamingConverter(context: AgentRunContext, *,
    hitl_helper: HumanInTheLoopHelper | None = None)'
  parameters:
  - name: context
    isRequired: true
  keywordOnlyParameters:
  - name: hitl_helper
    defaultValue: None
methods:
- uid: azure.ai.agentserver.agentframework.models.agent_framework_output_non_streaming_converter.AgentFrameworkOutputNonStreamingConverter.transform_output_for_response
  name: transform_output_for_response
  summary: "Build an OpenAIResponse capturing all supported content types.\n\nPreviously\
    \ this method only emitted text message items. We now also capture:\n   * function_call\
    \ content -> function_call output item \n\n   * function_result content -> function_call_output\
    \ item \n\nto stay aligned with the streaming converter so no output is lost."
  signature: 'transform_output_for_response(response: AgentResponse) -> Response'
  parameters:
  - name: response
    description: The AgentResponse from the agent framework.
    isRequired: true
    types:
    - <xref:AgentResponse>
  return:
    description: The constructed OpenAIResponse.
    types:
    - <xref:OpenAIResponse>
