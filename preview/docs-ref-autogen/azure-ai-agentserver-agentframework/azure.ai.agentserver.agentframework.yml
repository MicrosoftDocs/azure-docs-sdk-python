### YamlMime:PythonPackage
uid: azure.ai.agentserver.agentframework
name: agentframework
fullName: azure.ai.agentserver.agentframework
type: rootImport
functions:
- uid: azure.ai.agentserver.agentframework.from_agent_framework
  name: from_agent_framework
  summary: 'Create an Agent Framework Adapter from either a SupportsAgentRun/BaseAgent
    or a

    WorkflowAgent.

    One of agent or workflow must be provided.'
  signature: 'from_agent_framework(agent: BaseAgent | SupportsAgentRun, /, credentials:
    AsyncTokenCredential | TokenCredential | None = None, session_repository: AgentSessionRepository
    | None = None) -> AgentFrameworkAIAgentAdapter'
  positionalOnlyParameters:
  - name: agent_or_workflow
    isRequired: true
  parameters:
  - name: agent_or_workflow
    description: The agent to adapt.
    isRequired: true
    types:
    - <xref:typing.Optional>[<xref:typing.Union>[<xref:BaseAgent>, <xref:SupportsAgentRun>]]
  - name: credentials
    description: Optional asynchronous token credential for authentication.
    defaultValue: None
    types:
    - <xref:typing.Optional>[<xref:typing.Union>[<xref:AsyncTokenCredential>, <xref:TokenCredential>]]
  - name: session_repository
    description: Optional session repository for agent session management.
    defaultValue: None
    types:
    - <xref:typing.Optional>[<xref:AgentSessionRepository>]
  - name: checkpoint_repository
    description: 'Optional checkpoint repository for workflow checkpointing.

      Use `InMemoryCheckpointRepository`, `FileCheckpointRepository`, or

      `FoundryCheckpointRepository` for Azure AI Foundry managed storage.'
    defaultValue: None
    types:
    - <xref:typing.Optional>[<xref:CheckpointRepository>]
  return:
    description: An instance of AgentFrameworkAgent.
    types:
    - <xref:AgentFrameworkAgent>
  exceptions:
  - type: TypeError
    description: 'If neither or both of agent and workflow are provided, or if

      the provided types are incorrect.'
classes:
- azure.ai.agentserver.agentframework.FoundryToolsContextProvider
packages:
- azure.ai.agentserver.agentframework.models
- azure.ai.agentserver.agentframework.persistence
