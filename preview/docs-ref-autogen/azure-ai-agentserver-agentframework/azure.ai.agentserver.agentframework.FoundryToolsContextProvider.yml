### YamlMime:PythonClass
uid: azure.ai.agentserver.agentframework.FoundryToolsContextProvider
name: FoundryToolsContextProvider
fullName: azure.ai.agentserver.agentframework.FoundryToolsContextProvider
module: azure.ai.agentserver.agentframework
summary: Context provider to inject Foundry tools into an agent run.
constructor:
  syntax: 'FoundryToolsContextProvider(tools: Sequence[Dict[str, Any] | FoundryTool],
    *, source_id: str | None = None)'
  parameters:
  - name: tools
    isRequired: true
  keywordOnlyParameters:
  - name: source_id
    defaultValue: None
methods:
- uid: azure.ai.agentserver.agentframework.FoundryToolsContextProvider.after_run
  name: after_run
  summary: 'Called after model invocation.


    Override to process the response (store messages, extract info, etc.).

    The context.response will be populated at this point.'
  signature: 'async after_run(*, agent: SupportsAgentRun, session: AgentSession, context:
    SessionContext, state: dict[str, Any]) -> None'
  parameters:
  - name: agent
    description: The agent that ran this invocation.
    isRequired: true
  - name: session
    description: The current session.
    isRequired: true
  - name: context
    description: The invocation context with response populated.
    isRequired: true
  - name: state
    description: 'The provider-scoped mutable state dict for this provider.

      Full cross-provider state remains available at `session.state`.'
    isRequired: true
  keywordOnlyParameters:
  - name: agent
    isRequired: true
  - name: session
    isRequired: true
  - name: context
    isRequired: true
  - name: state
    isRequired: true
- uid: azure.ai.agentserver.agentframework.FoundryToolsContextProvider.before_run
  name: before_run
  signature: 'async before_run(*, agent: SupportsAgentRun, session: AgentSession,
    context: SessionContext, state: Dict[str, Any]) -> None'
  keywordOnlyParameters:
  - name: agent
    isRequired: true
  - name: session
    isRequired: true
  - name: context
    isRequired: true
  - name: state
    isRequired: true
attributes:
- uid: azure.ai.agentserver.agentframework.FoundryToolsContextProvider.DEFAULT_SOURCE_ID
  name: DEFAULT_SOURCE_ID
  signature: DEFAULT_SOURCE_ID = 'foundry_tools'
