    | ResponseComputerToolCall | ResponseComputerToolCallOutputItem | ResponseToolSearchCall
    | ResponseToolSearchOutputItem | ResponseReasoningItem | ResponseCompactionItem
    | ResponseCodeInterpreterToolCall | LocalShellCall | LocalShellCallOutput | ResponseFunctionShellToolCall
    | ResponseFunctionShellToolCallOutput | ResponseApplyPatchToolCall | ResponseApplyPatchToolCallOutput
    | McpListTools | McpApprovalRequest | McpApprovalResponse | McpCall | ResponseCustomToolCall
    | ResponseCustomToolCallOutput) -> Message | None'
  parameters:
  - name: item
    description: The conversation item to convert.
    isRequired: true
    types:
