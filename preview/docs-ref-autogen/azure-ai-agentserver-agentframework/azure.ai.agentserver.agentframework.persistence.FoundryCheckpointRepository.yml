uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointRepository
name: FoundryCheckpointRepository
fullName: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointRepository
module: azure.ai.agentserver.agentframework.persistence
summary: 'Repository that creates FoundryCheckpointStorage instances per conversation.


  Manages checkpoint sessions on the Foundry backend, creating sessions on demand

  and caching storage instances for reuse within the same process.


  Initialize the Foundry checkpoint repository.'
constructor:
  syntax: 'FoundryCheckpointRepository(project_endpoint: str, credential: AsyncTokenCredential
    | TokenCredential)'
  parameters:
  - name: project_endpoint
    description: 'The Azure AI Foundry project endpoint URL.

      Example: "[https:/](https:/)/<resource>.services.ai.azure.com/api/projects/<project-id>"'
    isRequired: true
    types:
    - <xref:str>
  - name: credential
    description: Credential for authentication.
    isRequired: true
    types:
    - <xref:typing.Union>[<xref:AsyncTokenCredential>, <xref:TokenCredential>]
  - name: project_endpoint
    description: The Azure AI Foundry project endpoint URL.
    isRequired: true
    types:
    - <xref:str>
  - name: credential
    description: Credential for authentication.
    isRequired: true
    types:
    - <xref:typing.Union>[<xref:AsyncTokenCredential>, <xref:TokenCredential>]
methods:
- uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointRepository.close
  name: close
  summary: Close the underlying HTTP client.
  signature: async close() -> None
- uid: azure.ai.agentserver.agentframework.persistence.FoundryCheckpointRepository.get_or_create
  name: get_or_create
  summary: Get or create a checkpoint storage for the given conversation.
  signature: 'async get_or_create(conversation_id: str | None) -> CheckpointStorage
    | None'
  parameters:
  - name: conversation_id
    description: The conversation ID (maps to session_id on backend).
    isRequired: true
    types:
