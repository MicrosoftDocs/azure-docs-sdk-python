### YamlMime:PythonClass
uid: azure.mgmt.frontdoor.models.FrontendEndpointProperties
name: FrontendEndpointProperties
fullName: azure.mgmt.frontdoor.models.FrontendEndpointProperties
module: azure.mgmt.frontdoor.models
summary: The JSON object that contains the properties required to create a frontend
  endpoint.
constructor:
  syntax: 'FrontendEndpointProperties(*args: Any, **kwargs: Any)'
variables:
- description: The host name of the frontendEndpoint. Must be a domain name.
  name: host_name
  types:
  - <xref:str>
- description: 'Whether to allow session affinity on this host. Valid

    options are ''Enabled'' or ''Disabled''. Known values are: "Enabled" and "Disabled".'
  name: session_affinity_enabled_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.SessionAffinityEnabledState>
- description: 'UNUSED. This field will be ignored. The TTL to use in

    seconds for session affinity, if applicable.'
  name: session_affinity_ttl_seconds
  types:
  - <xref:int>
- description: 'Defines the Web Application Firewall policy for

    each host (if applicable).'
  name: web_application_firewall_policy_link
  types:
  - <xref:azure.mgmt.frontdoor.models.FrontendEndpointUpdateParametersWebApplicationFirewallPolicyLink>
- description: 'Resource status of the Front Door or Front Door SubResource. Known
    values

    are: "Creating", "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating",
    and

    "Migrated".'
  name: resource_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.FrontDoorResourceState>
- description: 'Provisioning status of Custom Https of the

    frontendEndpoint. Known values are: "Enabling", "Enabled", "Disabling", "Disabled",
    and

    "Failed".'
  name: custom_https_provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.CustomHttpsProvisioningState>
- description: 'Provisioning substate shows the progress of custom

    HTTPS enabling/disabling process step by step. Known values are:

    "SubmittingDomainControlValidationRequest", "PendingDomainControlValidationREquestApproval",

    "DomainControlValidationRequestApproved", "DomainControlValidationRequestRejected",

    "DomainControlValidationRequestTimedOut", "IssuingCertificate", "DeployingCertificate",

    "CertificateDeployed", "DeletingCertificate", and "CertificateDeleted".'
  name: custom_https_provisioning_substate
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.CustomHttpsProvisioningSubstate>
- description: The configuration specifying how to enable HTTPS.
  name: custom_https_configuration
  types:
  - <xref:azure.mgmt.frontdoor.models.CustomHttpsConfiguration>
attributes:
- uid: azure.mgmt.frontdoor.models.FrontendEndpointProperties.custom_https_configuration
  name: custom_https_configuration
  summary: The configuration specifying how to enable HTTPS.
  signature: 'custom_https_configuration: _models.CustomHttpsConfiguration | None'
- uid: azure.mgmt.frontdoor.models.FrontendEndpointProperties.custom_https_provisioning_state
  name: custom_https_provisioning_state
  summary: '"Enabling",

    "Enabled", "Disabling", "Disabled", and "Failed".'
  signature: 'custom_https_provisioning_state: str | _models.CustomHttpsProvisioningState
    | None'
- uid: azure.mgmt.frontdoor.models.FrontendEndpointProperties.custom_https_provisioning_substate
  name: custom_https_provisioning_substate
  summary: 'Provisioning substate shows the progress of custom HTTPS enabling/disabling
    process step by

    step. Known values are: "SubmittingDomainControlValidationRequest",

    "PendingDomainControlValidationREquestApproval", "DomainControlValidationRequestApproved",

    "DomainControlValidationRequestRejected", "DomainControlValidationRequestTimedOut",

    "IssuingCertificate", "DeployingCertificate", "CertificateDeployed",

    "DeletingCertificate", and "CertificateDeleted".'
  signature: 'custom_https_provisioning_substate: str | _models.CustomHttpsProvisioningSubstate
    | None'
- uid: azure.mgmt.frontdoor.models.FrontendEndpointProperties.resource_state
  name: resource_state
  summary: '"Creating",

    "Enabling", "Enabled", "Disabling", "Disabled", "Deleting", "Migrating", and

    "Migrated".'
  signature: 'resource_state: str | _models.FrontDoorResourceState | None'
