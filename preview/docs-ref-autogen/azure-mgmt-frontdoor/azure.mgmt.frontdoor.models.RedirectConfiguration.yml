    existing query string; leave empty to preserve the incoming query string. Query
    string must be

    in <key>=<value> format. The first ? and & will be added automatically so do not
    include them

    in the front, but do separate multiple query strings with &.'
  signature: 'custom_query_string: str | None'
- uid: azure.mgmt.frontdoor.models.RedirectConfiguration.odata_type
