  name: custom_fragment
  summary: 'Fragment to add to the redirect URL. Fragment is the part of the URL that
    comes after #. Do not

    include the #.'
  signature: 'custom_fragment: str | None'
- uid: azure.mgmt.frontdoor.models.RedirectConfiguration.custom_host
  name: custom_host
  summary: Host to redirect. Leave empty to use the incoming host as the destination
