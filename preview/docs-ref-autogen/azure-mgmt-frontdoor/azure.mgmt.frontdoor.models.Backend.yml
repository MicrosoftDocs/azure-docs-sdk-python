### YamlMime:PythonClass
uid: azure.mgmt.frontdoor.models.Backend
name: Backend
fullName: azure.mgmt.frontdoor.models.Backend
module: azure.mgmt.frontdoor.models
summary: Backend address of a frontDoor load balancer.
constructor:
  syntax: 'Backend(*args: Any, **kwargs: Any)'
variables:
- description: Location of the backend (IP address or FQDN).
  name: address
  types:
  - <xref:str>
- description: 'The Alias of the Private Link resource. Populating this optional

    field indicates that this backend is ''Private''.'
  name: private_link_alias
  types:
  - <xref:str>
- description: 'The Resource Id of the Private Link resource. Populating this

    optional field indicates that this backend is ''Private''.'
  name: private_link_resource_id
  types:
  - <xref:str>
- description: 'The location of the Private Link resource. Required only if

    ''privateLinkResourceId'' is populated.'
  name: private_link_location
  types:
  - <xref:str>
- description: 'The Approval status for the connection to the Private Link.

    Known values are: "Pending", "Approved", "Rejected", "Disconnected", and "Timeout".'
  name: private_endpoint_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.PrivateEndpointStatus>
- description: 'A custom message to be included in the approval request to

    connect to the Private Link.'
  name: private_link_approval_message
  types:
  - <xref:str>
- description: The HTTP TCP port number. Must be between 1 and 65535.
  name: http_port
  types:
  - <xref:int>
- description: The HTTPS TCP port number. Must be between 1 and 65535.
  name: https_port
  types:
  - <xref:int>
- description: 'Whether to enable use of this backend. Permitted values are ''Enabled''
    or

    ''Disabled''. Known values are: "Enabled" and "Disabled".'
  name: enabled_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.BackendEnabledState>
- description: 'Priority to use for load balancing. Higher priorities will not be
    used for load

    balancing if any lower priority backend is healthy.'
  name: priority
  types:
  - <xref:int>
- description: Weight of this endpoint for load balancing purposes.
  name: weight
  types:
  - <xref:int>
- description: 'The value to use as the host header sent to the backend. If blank
    or

    unspecified, this defaults to the incoming host.'
  name: backend_host_header
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.frontdoor.models.Backend.address
  name: address
  summary: Location of the backend (IP address or FQDN).
  signature: 'address: str | None'
- uid: azure.mgmt.frontdoor.models.Backend.backend_host_header
  name: backend_host_header
  summary: 'The value to use as the host header sent to the backend. If blank or unspecified,
    this defaults

    to the incoming host.'
  signature: 'backend_host_header: str | None'
- uid: azure.mgmt.frontdoor.models.Backend.enabled_state
  name: enabled_state
  summary: 'Whether to enable use of this backend. Permitted values are ''Enabled''
    or ''Disabled''. Known

    values are: "Enabled" and "Disabled".'
  signature: 'enabled_state: str | _models.BackendEnabledState | None'
- uid: azure.mgmt.frontdoor.models.Backend.http_port
  name: http_port
  summary: The HTTP TCP port number. Must be between 1 and 65535.
  signature: 'http_port: int | None'
- uid: azure.mgmt.frontdoor.models.Backend.https_port
  name: https_port
  summary: The HTTPS TCP port number. Must be between 1 and 65535.
  signature: 'https_port: int | None'
- uid: azure.mgmt.frontdoor.models.Backend.priority
  name: priority
  summary: 'Priority to use for load balancing. Higher priorities will not be used
    for load balancing if

    any lower priority backend is healthy.'
  signature: 'priority: int | None'
- uid: azure.mgmt.frontdoor.models.Backend.private_endpoint_status
  name: private_endpoint_status
  summary: '"Pending",

    "Approved", "Rejected", "Disconnected", and "Timeout".'
  signature: 'private_endpoint_status: str | _models.PrivateEndpointStatus | None'
