### YamlMime:PythonClass
uid: azure.mgmt.frontdoor.models.CustomHttpsConfiguration
name: CustomHttpsConfiguration
fullName: azure.mgmt.frontdoor.models.CustomHttpsConfiguration
module: azure.mgmt.frontdoor.models
summary: Https settings for a domain.
constructor:
  syntax: 'CustomHttpsConfiguration(*args: Any, **kwargs: Any)'
variables:
- description: 'Defines the source of the SSL certificate. Required. Known values

    are: "AzureKeyVault" and "FrontDoor".'
  name: certificate_source
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.FrontDoorCertificateSource>
- description: 'Defines the TLS extension protocol that is used for secure delivery.

    Required. "ServerNameIndication"'
  name: protocol_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.FrontDoorTlsProtocolType>
- description: 'The minimum TLS version required from the clients to establish an

    SSL handshake with Front Door. Required. Known values are: "1.0" and "1.2".'
  name: minimum_tls_version
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.MinimumTLSVersion>
- description: 'KeyVault certificate source parameters (if

    certificateSource=AzureKeyVault).'
  name: key_vault_certificate_source_parameters
  types:
  - <xref:azure.mgmt.frontdoor.models.KeyVaultCertificateSourceParameters>
- description: 'Parameters required for enabling SSL with Front

    Door-managed certificates (if certificateSource=FrontDoor).'
  name: front_door_certificate_source_parameters
  types:
  - <xref:azure.mgmt.frontdoor.models.FrontDoorCertificateSourceParameters>
attributes:
- uid: azure.mgmt.frontdoor.models.CustomHttpsConfiguration.certificate_source
  name: certificate_source
  summary: '"AzureKeyVault" and

    "FrontDoor".'
  signature: 'certificate_source: str | _models.FrontDoorCertificateSource'
- uid: azure.mgmt.frontdoor.models.CustomHttpsConfiguration.front_door_certificate_source_parameters
  name: front_door_certificate_source_parameters
  summary: 'Parameters required for enabling SSL with Front Door-managed certificates
    (if

    certificateSource=FrontDoor).'
  signature: 'front_door_certificate_source_parameters: _models.FrontDoorCertificateSourceParameters
    | None'
- uid: azure.mgmt.frontdoor.models.CustomHttpsConfiguration.key_vault_certificate_source_parameters
  name: key_vault_certificate_source_parameters
  summary: KeyVault certificate source parameters (if certificateSource=AzureKeyVault).
  signature: 'key_vault_certificate_source_parameters: _models.KeyVaultCertificateSourceParameters
    | None'
- uid: azure.mgmt.frontdoor.models.CustomHttpsConfiguration.minimum_tls_version
  name: minimum_tls_version
  summary: 'The minimum TLS version required from the clients to establish an SSL
    handshake with Front

    Door. Required. Known values are: "1.0" and "1.2".'
  signature: 'minimum_tls_version: str | _models.MinimumTLSVersion'
- uid: azure.mgmt.frontdoor.models.CustomHttpsConfiguration.protocol_type
  name: protocol_type
  summary: 'Defines the TLS extension protocol that is used for secure delivery. Required.

    "ServerNameIndication"'
  signature: 'protocol_type: str | _models.FrontDoorTlsProtocolType'
