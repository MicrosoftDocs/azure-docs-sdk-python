### YamlMime:PythonClass
uid: azure.mgmt.frontdoor.models.RulesEngineRule
name: RulesEngineRule
fullName: azure.mgmt.frontdoor.models.RulesEngineRule
module: azure.mgmt.frontdoor.models
summary: 'Contains a list of match conditions, and an action on how to modify the
  request/response. If

  multiple rules match, the actions from one rule that conflict with a previous rule
  overwrite

  for a singular action, or append in the case of headers manipulation.'
constructor:
  syntax: 'RulesEngineRule(*args: Any, **kwargs: Any)'
variables:
- description: A name to refer to this specific rule. Required.
  name: name
  types:
  - <xref:str>
- description: A priority assigned to this rule. Required.
  name: priority
  types:
  - <xref:int>
- description: 'Actions to perform on the request and response if all of the match
    conditions are

    met. Required.'
  name: action
  types:
  - <xref:azure.mgmt.frontdoor.models.RulesEngineAction>
- description: 'A list of match conditions that must meet in order for the actions
    of

    this rule to run. Having no match conditions means the actions will always run.'
  name: match_conditions
  types:
  - <xref:list>[<xref:azure.mgmt.frontdoor.models.RulesEngineMatchCondition>]
- description: 'If this rule is a match should the rules engine continue

    running the remaining rules or stop. If not present, defaults to Continue. Known
    values are:

    "Continue" and "Stop".'
  name: match_processing_behavior
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.MatchProcessingBehavior>
attributes:
- uid: azure.mgmt.frontdoor.models.RulesEngineRule.action
  name: action
  summary: 'Actions to perform on the request and response if all of the match conditions
    are met.

    Required.'
  signature: 'action: _models.RulesEngineAction'
- uid: azure.mgmt.frontdoor.models.RulesEngineRule.match_conditions
  name: match_conditions
  summary: 'A list of match conditions that must meet in order for the actions of
    this rule to run. Having

    no match conditions means the actions will always run.'
  signature: 'match_conditions: list[''_models.RulesEngineMatchCondition''] | None'
- uid: azure.mgmt.frontdoor.models.RulesEngineRule.match_processing_behavior
  name: match_processing_behavior
  summary: 'If this rule is a match should the rules engine continue running the remaining
    rules or stop.

    If not present, defaults to Continue. Known values are: "Continue" and "Stop".'
  signature: 'match_processing_behavior: str | _models.MatchProcessingBehavior | None'
- uid: azure.mgmt.frontdoor.models.RulesEngineRule.name
  name: name
  summary: A name to refer to this specific rule. Required.
  signature: 'name: str'
- uid: azure.mgmt.frontdoor.models.RulesEngineRule.priority
  name: priority
  summary: A priority assigned to this rule. Required.
  signature: 'priority: int'
