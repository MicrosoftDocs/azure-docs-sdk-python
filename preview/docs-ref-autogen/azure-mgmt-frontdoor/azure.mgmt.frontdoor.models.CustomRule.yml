### YamlMime:PythonClass
uid: azure.mgmt.frontdoor.models.CustomRule
name: CustomRule
fullName: azure.mgmt.frontdoor.models.CustomRule
module: azure.mgmt.frontdoor.models
summary: Defines contents of a web application rule.
constructor:
  syntax: 'CustomRule(*args: Any, **kwargs: Any)'
variables:
- description: Describes the name of the rule.
  name: name
  types:
  - <xref:str>
- description: 'Describes priority of the rule. Rules with a lower value will be evaluated

    before rules with a higher value. Required.'
  name: priority
  types:
  - <xref:int>
- description: 'Describes if the custom rule is in enabled or disabled state. Defaults
    to

    Enabled if not specified. Known values are: "Disabled" and "Enabled".'
  name: enabled_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.CustomRuleEnabledState>
- description: 'Describes type of rule. Required. Known values are: "MatchRule" and

    "RateLimitRule".'
  name: rule_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.RuleType>
- description: 'Time window for resetting the rate limit count. Default

    is 1 minute.'
  name: rate_limit_duration_in_minutes
  types:
  - <xref:int>
- description: Number of allowed requests per client within the time window.
  name: rate_limit_threshold
  types:
  - <xref:int>
- description: Describes the list of variables to group the rate limit requests.
  name: group_by
  types:
  - <xref:list>[<xref:azure.mgmt.frontdoor.models.GroupByVariable>]
- description: List of match conditions. Required.
  name: match_conditions
  types:
  - <xref:list>[<xref:azure.mgmt.frontdoor.models.MatchCondition>]
- description: 'Describes what action to be applied when rule matches. Required. Known
    values

    are: "Allow", "Block", "Log", "Redirect", "AnomalyScoring", "JSChallenge", and
    "CAPTCHA".'
  name: action
  types:
  - <xref:str>
  - <xref:azure.mgmt.frontdoor.models.ActionType>
attributes:
- uid: azure.mgmt.frontdoor.models.CustomRule.action
  name: action
  summary: '"Allow",

    "Block", "Log", "Redirect", "AnomalyScoring", "JSChallenge", and "CAPTCHA".'
  signature: 'action: str | _models.ActionType'
- uid: azure.mgmt.frontdoor.models.CustomRule.enabled_state
  name: enabled_state
  summary: 'Describes if the custom rule is in enabled or disabled state. Defaults
    to Enabled if not

    specified. Known values are: "Disabled" and "Enabled".'
  signature: 'enabled_state: str | _models.CustomRuleEnabledState | None'
- uid: azure.mgmt.frontdoor.models.CustomRule.group_by
  name: group_by
  summary: Describes the list of variables to group the rate limit requests.
  signature: 'group_by: list[''_models.GroupByVariable''] | None'
- uid: azure.mgmt.frontdoor.models.CustomRule.match_conditions
  name: match_conditions
  summary: List of match conditions. Required.
  signature: 'match_conditions: list[''_models.MatchCondition'']'
- uid: azure.mgmt.frontdoor.models.CustomRule.name
  name: name
  summary: Describes the name of the rule.
  signature: 'name: str | None'
- uid: azure.mgmt.frontdoor.models.CustomRule.priority
  name: priority
  summary: 'Describes priority of the rule. Rules with a lower value will be evaluated
    before rules with a

    higher value. Required.'
  signature: 'priority: int'
- uid: azure.mgmt.frontdoor.models.CustomRule.rate_limit_duration_in_minutes
  name: rate_limit_duration_in_minutes
  summary: Time window for resetting the rate limit count. Default is 1 minute.
  signature: 'rate_limit_duration_in_minutes: int | None'
- uid: azure.mgmt.frontdoor.models.CustomRule.rate_limit_threshold
  name: rate_limit_threshold
  summary: Number of allowed requests per client within the time window.
  signature: 'rate_limit_threshold: int | None'
- uid: azure.mgmt.frontdoor.models.CustomRule.rule_type
  name: rule_type
  summary: '"MatchRule" and "RateLimitRule".'
  signature: 'rule_type: str | _models.RuleType'
