### YamlMime:PythonClass
uid: corehttp.runtime.policies.DistributedHttpTracingPolicy
name: DistributedHttpTracingPolicy
fullName: corehttp.runtime.policies.DistributedHttpTracingPolicy
module: corehttp.runtime.policies
summary: The policy to create tracing spans for API calls.
constructor:
  syntax: 'DistributedHttpTracingPolicy(*, instrumentation_config: Mapping[str, Any]
    | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: instrumentation_config
    description: Configuration for the instrumentation providers.
    defaultValue: None
methods:
- uid: corehttp.runtime.policies.DistributedHttpTracingPolicy.on_request
  name: on_request
  summary: Starts a span for the network call.
  signature: 'on_request(request: PipelineRequest[HttpRequest]) -> None'
  parameters:
  - name: request
    description: The PipelineRequest object.
    isRequired: true
    types:
    - <xref:<xref:corehttp.runtime.pipeline#corehttp.runtime.pipeline.PipelineRequest>>
- uid: corehttp.runtime.policies.DistributedHttpTracingPolicy.on_response
  name: on_response
  summary: Ends the span for the network call and updates its status.
  signature: 'on_response(request: PipelineRequest[HttpRequest], response: PipelineResponse[HttpRequest,
    SansIOHttpResponse]) -> None'
  parameters:
  - name: request
    description: The PipelineRequest object.
    isRequired: true
    types:
    - <xref:<xref:corehttp.runtime.pipeline#corehttp.runtime.pipeline.PipelineRequest>>
  - name: response
    description: The PipelineResponse object.
    isRequired: true
    types:
    - <xref:<xref:corehttp.runtime.pipeline#corehttp.runtime.pipeline.PipelineResponse>>
attributes:
- uid: corehttp.runtime.policies.DistributedHttpTracingPolicy.TRACING_CONTEXT
