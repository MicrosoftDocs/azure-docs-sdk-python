### YamlMime:PythonModule
uid: corehttp.serialization
name: serialization
fullName: corehttp.serialization
functions:
- uid: corehttp.serialization.attribute_list
  name: attribute_list
  summary: Get a list of attribute names for a generated SDK model.
  signature: 'attribute_list(obj: Any) -> List[str]'
  parameters:
  - name: obj
    description: The object to get attributes from.
    isRequired: true
    types:
    - <xref:any>
  return:
    description: A list of attribute names.
    types:
    - <xref:typing.List>[<xref:str>]
- uid: corehttp.serialization.is_generated_model
  name: is_generated_model
  summary: Check if the object is a generated SDK model.
  signature: 'is_generated_model(obj: Any) -> bool'
  parameters:
  - name: obj
    description: The object to check.
    isRequired: true
    types:
    - <xref:any>
  return:
    description: True if the object is a generated SDK model, False otherwise.
    types:
    - <xref:bool>
classes:
- corehttp.serialization.CoreJSONEncoder
- corehttp.serialization.TypeHandlerRegistry
data:
- uid: corehttp.serialization.NULL
  name: 'NULL'
  summary: 'A falsy sentinel object which is supposed to be used to specify attributes

    with no data. This gets serialized to *null* on the wire.'
  signature: NULL = <corehttp.serialization._Null object>
