variables:
- description: 'The name of the tokenizer. It must only contain letters, digits, spaces,
    dashes or

    underscores, can only start and end with alphanumeric characters, and is limited
    to 128

    characters. Required.'
  name: name
  types:
  - <xref:str>
- description: The delimiter character to use. Default is "/".
  name: delimiter
  types:
  - <xref:str>
- description: A value that, if set, replaces the delimiter character. Default is
    "/".
  name: replacement
  types:
  - <xref:str>
- description: The maximum token length. Default and maximum is 300.
  name: max_token_length
  types:
  - <xref:int>
- description: 'A value indicating whether to generate tokens in reverse order.

    Default is false.'
  name: reverse_token_order
  types:
  - <xref:bool>
- description: The number of initial tokens to skip. Default is 0.
  name: number_of_tokens_to_skip
  types:
  - <xref:int>
- description: 'A URI fragment specifying the type of tokenizer. Required. Default
    value is

    "#Microsoft.Azure.Search.PathHierarchyTokenizerV2".'
  name: odata_type
