### YamlMime:PythonClass
uid: azure.search.documents.models.SearchRequest
name: SearchRequest
fullName: azure.search.documents.models.SearchRequest
module: azure.search.documents.models
summary: Parameters for filtering, sorting, faceting, paging, and other search query
  behaviors.
constructor:
  syntax: 'SearchRequest(*args: Any, **kwargs: Any)'
variables:
- description: 'A value that specifies whether to fetch the total count of results.

    Default is false. Setting this value to true may have a performance impact. Note
    that the count

    returned is an approximation.'
  name: include_total_count
  types:
  - <xref:bool>
- description: 'The list of facet expressions to apply to the search query. Each facet
    expression

    contains a field name, optionally followed by a comma-separated list of name:value
    pairs.'
  name: facets
  types:
  - <xref:list>[<xref:str>]
- description: The OData $filter expression to apply to the search query.
  name: filter
  types:
  - <xref:str>
- description: 'The comma-separated list of field names to use for hit highlights.
    Only

    searchable fields can be used for hit highlighting.'
  name: highlight_fields
  types:
  - <xref:list>[<xref:str>]
- description: 'A string tag that is appended to hit highlights. Must be set with

    highlightPreTag. Default is &lt;/em&gt;.'
  name: highlight_post_tag
  types:
  - <xref:str>
- description: 'A string tag that is prepended to hit highlights. Must be set with

    highlightPostTag. Default is &lt;em&gt;.'
  name: highlight_pre_tag
  types:
  - <xref:str>
- description: 'A number between 0 and 100 indicating the percentage of the index
    that

    must be covered by a search query in order for the query to be reported as a success.
    This

    parameter can be useful for ensuring search availability even for services with
    only one

    replica. The default is 100.'
  name: minimum_coverage
  types:
  - <xref:float>
- description: 'The comma-separated list of OData $orderby expressions by which to
    sort the

    results. Each expression can be either a field name or a call to either the geo.distance()
    or

    the search.score() functions. Each expression can be followed by asc to indicate
    ascending, or

    desc to indicate descending. The default is ascending order. Ties will be broken
    by the match

    scores of documents. If no $orderby is specified, the default sort order is descending
    by

    document match score. There can be at most 32 $orderby clauses.'
  name: order_by
  types:
  - <xref:list>[<xref:str>]
- description: 'A value that specifies the syntax of the search query. The default
    is

    ''simple''. Use ''full'' if your query uses the Lucene query syntax. Known values
    are: "simple",

    "full", and "semantic".'
  name: query_type
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.QueryType>
- description: 'A value that specifies whether we want to calculate scoring

    statistics (such as document frequency) globally for more consistent scoring,
    or locally, for

    lower latency. The default is ''local''. Use ''global'' to aggregate scoring statistics
    globally

    before scoring. Using global scoring statistics can increase latency of search
    queries. Known

    values are: "local" and "global".'
  name: scoring_statistics
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.ScoringStatistics>
- description: 'A value to be used to create a sticky session, which can help getting
    more

    consistent results. As long as the same sessionId is used, a best-effort attempt
    will be made

    to target the same replica set. Be wary that reusing the same sessionID values
    repeatedly can

    interfere with the load balancing of the requests across replicas and adversely
    affect the

    performance of the search service. The value used as sessionId cannot start with
    a ''_''

    character.'
  name: session_id
  types:
  - <xref:str>
- description: "The list of parameter values to be used in scoring functions (for\n\
    example, referencePointParameter) using the format name-values. For example, if\
    \ the scoring\nprofile defines a function with a parameter called 'mylocation'\
    \ the parameter string would be\n\"mylocation\u2013122.2,44.8\" (without the quotes)."
  name: scoring_parameters
  types:
  - <xref:list>[<xref:str>]
- description: 'The name of a scoring profile to evaluate match scores for matching

    documents in order to sort the results.'
  name: scoring_profile
  types:
  - <xref:str>
- description: 'Enables a debugging tool that can be used to further explore your
    reranked

    results. Known values are: "disabled", "semantic", "vector", "queryRewrites",
    "innerHits", and

    "all".'
  name: debug
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.QueryDebugMode>
- description: 'A full-text search query expression; Use "*" or omit this parameter
    to match

    all documents.'
  name: search_text
  types:
  - <xref:str>
- description: 'The comma-separated list of field names to which to scope the full-text

    search. When using fielded search (fieldName:searchExpression) in a full Lucene
    query, the

    field names of each fielded search expression take precedence over any field names
    listed in

    this parameter.'
  name: search_fields
  types:
  - <xref:list>[<xref:str>]
- description: 'A value that specifies whether any or all of the search terms must
    be

    matched in order to count the document as a match. Known values are: "any" and
    "all".'
  name: search_mode
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.SearchMode>
- description: 'A value that specifies the language of the search query. Known values

    are: "none", "en-us", "en-gb", "en-in", "en-ca", "en-au", "fr-fr", "fr-ca", "de-de",
    "es-es",

    "es-mx", "zh-cn", "zh-tw", "pt-br", "pt-pt", "it-it", "ja-jp", "ko-kr", "ru-ru",
    "cs-cz",

    "nl-be", "nl-nl", "hu-hu", "pl-pl", "sv-se", "tr-tr", "hi-in", "ar-sa", "ar-eg",
    "ar-ma",

    "ar-kw", "ar-jo", "da-dk", "no-no", "bg-bg", "hr-hr", "hr-ba", "ms-my", "ms-bn",
    "sl-sl",

    "ta-in", "vi-vn", "el-gr", "ro-ro", "is-is", "id-id", "th-th", "lt-lt", "uk-ua",
    "lv-lv",

    "et-ee", "ca-es", "fi-fi", "sr-ba", "sr-me", "sr-rs", "sk-sk", "nb-no", "hy-am",
    "bn-in",

    "eu-es", "gl-es", "gu-in", "he-il", "ga-ie", "kn-in", "ml-in", "mr-in", "fa-ae",
    "pa-in",

    "te-in", and "ur-pk".'
  name: query_language
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.QueryLanguage>
- description: 'A value that specifies the type of the speller to use to spell-correct

    individual search query terms. Known values are: "none" and "lexicon".'
  name: query_speller
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.QuerySpellerType>
- description: 'The comma-separated list of fields to retrieve. If unspecified, all
    fields marked

    as retrievable in the schema are included.'
  name: select
  types:
  - <xref:list>[<xref:str>]
- description: 'The number of search results to skip. This value cannot be greater
    than 100,000. If

    you need to scan documents in sequence, but cannot use skip due to this limitation,
    consider

    using orderby on a totally-ordered key and filter with a range query instead.'
  name: skip
  types:
  - <xref:int>
- description: 'The number of search results to retrieve. This can be used in conjunction
    with $skip

    to implement client-side paging of search results. If results are truncated due
    to server-side

    paging, the response will include a continuation token that can be used to issue
    another Search

    request for the next page of results.'
  name: top
  types:
  - <xref:int>
- description: 'The name of a semantic configuration that will be used when

    processing documents for queries of type semantic.'
  name: semantic_configuration_name
  types:
  - <xref:str>
- description: 'Allows the user to choose whether a semantic call should fail

    completely (default / current behavior), or to return partial results. Known values
    are:

    "partial" and "fail".'
  name: semantic_error_handling
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.SemanticErrorMode>
- description: 'Allows the user to set an upper bound on the amount of

    time it takes for semantic enrichment to finish processing before the request
    fails.'
  name: semantic_max_wait_in_milliseconds
  types:
  - <xref:int>
- description: 'Allows setting a separate search query that will be solely used for

    semantic reranking, semantic captions and semantic answers. Is useful for scenarios
    where there

    is a need to use different queries between the base retrieval and ranking phase,
    and the L2

    semantic phase.'
  name: semantic_query
  types:
  - <xref:str>
- description: 'A value that specifies whether answers should be returned as part
    of the search

    response. Known values are: "none" and "extractive".'
  name: answers
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.QueryAnswerType>
- description: 'A value that specifies whether captions should be returned as part
    of the

    search response. Known values are: "none" and "extractive".'
  name: captions
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.QueryCaptionType>
- description: 'A value that specifies whether query rewrites should be generated
    to

    augment the search query. Known values are: "none" and "generative".'
  name: query_rewrites
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.QueryRewritesType>
- description: The comma-separated list of field names used for semantic ranking.
  name: semantic_fields
  types:
  - <xref:list>[<xref:str>]
- description: The query parameters for vector and hybrid search queries.
  name: vector_queries
  types:
  - <xref:list>[<xref:azure.search.documents.models.VectorQuery>]
- description: 'Determines whether or not filters are applied before or after the

    vector search is performed. Default is ''preFilter'' for new indexes. Known values
    are:

    "postFilter", "preFilter", and "strictPostFilter".'
  name: vector_filter_mode
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.VectorFilterMode>
- description: The query parameters to configure hybrid search behaviors.
  name: hybrid_search
  types:
  - <xref:azure.search.documents.models.HybridSearch>
