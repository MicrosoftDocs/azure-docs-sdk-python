uid: azure.search.documents.indexes.models.PatternReplaceCharFilter
name: PatternReplaceCharFilter
fullName: azure.search.documents.indexes.models.PatternReplaceCharFilter
module: azure.search.documents.indexes.models
summary: 'A character filter that replaces characters in the input string. It uses
  a regular expression

  to identify character sequences to preserve and a replacement pattern to identify
  characters to

  replace. For example, given the input text "aa bb aa bb", pattern "(aa)\s+(bb)",
  and

  replacement "$1#$2", the result would be "aa#bb aa#bb". This character filter is
  implemented

  using Apache Lucene.'
constructor:
  syntax: 'PatternReplaceCharFilter(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the char filter. It must only contain letters, digits,
    spaces, dashes

    or underscores, can only start and end with alphanumeric characters, and is limited
    to 128

    characters. Required.'
  name: name
  types:
  - <xref:str>
- description: A regular expression pattern. Required.
  name: pattern
  types:
  - <xref:str>
- description: The replacement text. Required.
  name: replacement
  types:
  - <xref:str>
- description: 'A URI fragment specifying the type of char filter. Required. Default
    value is

    "#Microsoft.Azure.Search.PatternReplaceCharFilter".'
  name: odata_type
  types:
  - <xref:str>
