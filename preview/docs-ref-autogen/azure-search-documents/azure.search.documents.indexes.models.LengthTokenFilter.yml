name: LengthTokenFilter
fullName: azure.search.documents.indexes.models.LengthTokenFilter
module: azure.search.documents.indexes.models
summary: 'Removes words that are too long or too short. This token filter is implemented
  using Apache

  Lucene.'
constructor:
  syntax: 'LengthTokenFilter(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the token filter. It must only contain letters, digits,
    spaces, dashes

    or underscores, can only start and end with alphanumeric characters, and is limited
    to 128

    characters. Required.'
  name: name
  types:
  - <xref:str>
- description: 'The minimum length in characters. Default is 0. Maximum is 300. Must
    be less

    than the value of max.'
  name: min_length
  types:
  - <xref:int>
- description: The maximum length in characters. Default and maximum is 300.
  name: max_length
  types:
  - <xref:int>
- description: 'A URI fragment specifying the type of token filter. Required. Default
    value

    is "#Microsoft.Azure.Search.LengthTokenFilter".'
