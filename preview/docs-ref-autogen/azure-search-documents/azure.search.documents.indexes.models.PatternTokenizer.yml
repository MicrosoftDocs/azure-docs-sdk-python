uid: azure.search.documents.indexes.models.PatternTokenizer
name: PatternTokenizer
fullName: azure.search.documents.indexes.models.PatternTokenizer
module: azure.search.documents.indexes.models
summary: 'Tokenizer that uses regex pattern matching to construct distinct tokens.
  This tokenizer is

  implemented using Apache Lucene.'
constructor:
  syntax: 'PatternTokenizer(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the tokenizer. It must only contain letters, digits, spaces,
    dashes or

    underscores, can only start and end with alphanumeric characters, and is limited
    to 128

    characters. Required.'
  name: name
  types:
  - <xref:str>
- description: 'A regular expression pattern to match token separators. Default is
    an expression

    that matches one or more non-word characters.'
  name: pattern
  types:
  - <xref:str>
- description: 'Regular expression flags, specified as a ''|'' separated string of
    RegexFlags

    values.'
  name: flags
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.search.documents.indexes.models.RegexFlags>]
- description: 'The zero-based ordinal of the matching group in the regular expression
    pattern to

    extract into tokens. Use -1 if you want to use the entire pattern to split the
    input into

    tokens, irrespective of matching groups. Default is -1.'
  name: group
  types:
  - <xref:int>
- description: 'A URI fragment specifying the type of tokenizer. Required. Default
    value is

    "#Microsoft.Azure.Search.PatternTokenizer".'
  name: odata_type
  types:
  - <xref:str>
