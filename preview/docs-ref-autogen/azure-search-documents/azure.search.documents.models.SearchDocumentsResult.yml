uid: azure.search.documents.models.SearchDocumentsResult
name: SearchDocumentsResult
fullName: azure.search.documents.models.SearchDocumentsResult
module: azure.search.documents.models
summary: Response containing search results from an index.
constructor:
  syntax: 'SearchDocumentsResult(*args: Any, **kwargs: Any)'
variables:
- description: 'The total count of results found by the search operation, or null
    if the count was

    not requested. If present, the count may be greater than the number of results
    in this

    response. This can happen if you use the $top or $skip parameters, or if the query
    can''t return

    all the requested documents in a single response.'
  name: count
  types:
  - <xref:int>
- description: 'A value indicating the percentage of the index that was included in
    the query,

    or null if minimumCoverage was not specified in the request.'
  name: coverage
  types:
  - <xref:float>
- description: 'The facet query results for the search operation, organized as a collection
    of

    buckets for each faceted field; null if the query did not include any facet expressions.'
  name: facets
  types:
  - <xref:dict>[<xref:str>, <xref:list>[<xref:azure.search.documents.models.FacetResult>]]
- description: 'The answers query results for the search operation; null if the answers
    query

    parameter was not specified or set to ''none''.'
  name: answers
  types:
  - <xref:list>[<xref:azure.search.documents.models.QueryAnswerResult>]
- description: Debug information that applies to the search results as a whole.
  name: debug_info
  types:
  - <xref:azure.search.documents.models.DebugInfo>
- description: 'Continuation JSON payload returned when the query can''t return all

    the requested results in a single response. You can use this JSON along with.'
  name: next_page_parameters
  types:
  - <xref:azure.search.documents.models.SearchRequest>
- description: The sequence of results returned by the query. Required.
  name: results
  types:
  - <xref:list>[<xref:azure.search.documents.models.SearchResult>]
- description: 'Continuation URL returned when the query can''t return all the requested

    results in a single response. You can use this URL to formulate another GET or
    POST Search

    request to get the next part of the search response. Make sure to use the same
    verb (GET or

    POST) as the request that produced this response.'
  name: next_link
  types:
  - <xref:str>
- description: 'Reason that a partial response was returned for a

    semantic ranking request. Known values are: "maxWaitExceeded", "capacityOverloaded",
    and

    "transient".'
  name: semantic_partial_response_reason
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.SemanticErrorReason>
- description: 'Type of partial response that was returned for a semantic

    ranking request. Known values are: "baseResults" and "rerankedResults".'
  name: semantic_partial_response_type
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.SemanticSearchResultsType>
- description: 'Type of query rewrite that was used to retrieve

    documents. "originalQueryOnly"'
  name: semantic_query_rewrites_result_type
  types:
  - <xref:str>
  - <xref:azure.search.documents.models.SemanticQueryRewritesResultType>
