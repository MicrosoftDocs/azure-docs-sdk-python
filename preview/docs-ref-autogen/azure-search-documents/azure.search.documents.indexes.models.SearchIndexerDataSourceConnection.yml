- uid: azure.search.documents.indexes.models.SearchIndexerDataSourceConnection.encryption_key
  name: encryption_key
  summary: 'A description of an encryption key that you create in Azure Key Vault.
    This key is used to

    provide an additional level of encryption-at-rest for your datasource definition
    when you want

    full assurance that no one, not even Microsoft, can decrypt your data source definition.
    Once

    you have encrypted your data source definition, it will always remain encrypted.
    The search

    service will ignore attempts to set this property to null. You can change this
    property as

    needed if you want to rotate your encryption key; Your datasource definition will
    be

    unaffected. Encryption with customer-managed keys is not available for free search
    services,

    and is only available for paid services created on or after January 1, 2019.'
  signature: 'encryption_key: ''_models.SearchResourceEncryptionKey'' | None'
- uid: azure.search.documents.indexes.models.SearchIndexerDataSourceConnection.identity
  name: identity
  summary: 'An explicit managed identity to use for this datasource. If not specified
    and the connection

    string is a managed identity, the system-assigned managed identity is used. If
    not specified,

    the value remains unchanged. If "none" is specified, the value of this property
    is cleared.'
  signature: 'identity: ''_models.SearchIndexerDataIdentity'' | None'
