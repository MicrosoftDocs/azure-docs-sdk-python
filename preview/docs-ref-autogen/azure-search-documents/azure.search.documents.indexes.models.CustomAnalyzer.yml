### YamlMime:PythonClass
uid: azure.search.documents.indexes.models.CustomAnalyzer
name: CustomAnalyzer
fullName: azure.search.documents.indexes.models.CustomAnalyzer
module: azure.search.documents.indexes.models
summary: 'Allows you to take control over the process of converting text into indexable/searchable

  tokens. It''s a user-defined configuration consisting of a single predefined tokenizer
  and one

  or more filters. The tokenizer is responsible for breaking text into tokens, and
  the filters

  for modifying tokens emitted by the tokenizer.'
constructor:
  syntax: 'CustomAnalyzer(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the analyzer. It must only contain letters, digits, spaces,
    dashes or

    underscores, can only start and end with alphanumeric characters, and is limited
    to 128

    characters. Required.'
  name: name
  types:
  - <xref:str>
- description: 'The name of the tokenizer to use to divide continuous text into a
    sequence of

    tokens, such as breaking a sentence into words. Required. Known values are: "classic",

    "edgeNGram", "keyword_v2", "letter", "lowercase", "microsoft_language_tokenizer",

    "microsoft_language_stemming_tokenizer", "nGram", "path_hierarchy_v2", "pattern",

    "standard_v2", "uax_url_email", and "whitespace".'
  name: tokenizer
  types:
  - <xref:str>
  - <xref:azure.search.documents.indexes.models.LexicalTokenizerName>
- description: 'A list of token filters used to filter out or modify the tokens generated

    by a tokenizer. For example, you can specify a lowercase filter that converts
    all characters to

    lowercase. The filters are run in the order in which they are listed.'
  name: token_filters
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.search.documents.indexes.models.TokenFilterName>]
- description: 'A list of character filters used to prepare input text before it is

    processed by the tokenizer. For instance, they can replace certain characters
    or symbols. The

    filters are run in the order in which they are listed.'
  name: char_filters
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.search.documents.indexes.models.CharFilterName>]
- description: 'A URI fragment specifying the type of analyzer. Required. Default
    value is

    "#Microsoft.Azure.Search.CustomAnalyzer".'
  name: odata_type
  types:
  - <xref:str>
