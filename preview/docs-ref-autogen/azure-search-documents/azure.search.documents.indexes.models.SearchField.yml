- uid: azure.search.documents.indexes.models.SearchField.key
  name: key
  summary: 'A value indicating whether the field uniquely identifies documents in
    the index. Exactly one

    top-level field in each index must be chosen as the key field and it must be of
    type

    Edm.String. Key fields can be used to look up documents directly and update or
    delete specific

    documents. Default is false for simple fields and null for complex fields.'
  signature: 'key: bool | None'
- uid: azure.search.documents.indexes.models.SearchField.name
  name: name
  summary: 'The name of the field, which must be unique within the fields collection
    of the index or parent

    field. Required.'
  signature: 'name: str'
- uid: azure.search.documents.indexes.models.SearchField.normalizer_name
  name: normalizer_name
  summary: 'The name of the normalizer to use for the field. This option can be used
    only with fields with

    filterable, sortable, or facetable enabled. Once the normalizer is chosen, it
    cannot be changed

    for the field. Must be null for complex fields. Known values are: "asciifolding",

    "elision", "lowercase", "standard", and "uppercase".'
  signature: 'normalizer_name: str | ''_models.LexicalNormalizerName'' | None'
- uid: azure.search.documents.indexes.models.SearchField.permission_filter
  name: permission_filter
  summary: 'A value indicating whether the field should be used as a permission filter.
    Known values are:

    "userIds", "groupIds", and "rbacScope".'
  signature: 'permission_filter: str | ''_models.PermissionFilter'' | None'
- uid: azure.search.documents.indexes.models.SearchField.retrievable
  name: retrievable
  summary: 'A value indicating whether the field can be returned in a search result.
    You can disable this

    option if you want to use a field (for example, margin) as a filter, sorting,
    or scoring

    mechanism but do not want the field to be visible to the end user. This property
    must be true

    for key fields, and it must be null for complex fields. This property can be changed
    on

    existing fields. Enabling this property does not cause any increase in index storage

    requirements. Default is true for simple fields, false for vector fields, and
    null for complex

    fields.'
  signature: 'retrievable: bool | None'
