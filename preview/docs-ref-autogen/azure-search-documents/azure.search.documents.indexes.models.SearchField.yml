- uid: azure.search.documents.indexes.models.SearchField.searchable
  name: searchable
  summary: 'A value indicating whether the field is full-text searchable. This means
    it will undergo

    analysis such as word-breaking during indexing. If you set a searchable field
    to a value like

    "sunny day", internally it will be split into the individual tokens "sunny" and
    "day".

    This enables full-text searches for these terms. Fields of type Edm.String or

    Collection(Edm.String) are searchable by default. This property must be false
    for simple fields

    of other non-string data types, and it must be null for complex fields. Note:
    searchable fields

    consume extra space in your index to accommodate additional tokenized versions
    of the field

    value for full-text searches. If you want to save space in your index and you
    don''t need a

    field to be included in searches, set searchable to false.'
  signature: 'searchable: bool | None'
- uid: azure.search.documents.indexes.models.SearchField.sensitivity_label
  name: sensitivity_label
  summary: A value indicating whether the field contains sensitivity label information.
  signature: 'sensitivity_label: bool | None'
- uid: azure.search.documents.indexes.models.SearchField.sortable
  name: sortable
  summary: 'A value indicating whether to enable the field to be referenced in $orderby
    expressions. By

    default, the search engine sorts results by score, but in many experiences users
    will want to

    sort by fields in the documents. A simple field can be sortable only if it is
    single-valued (it

    has a single value in the scope of the parent document). Simple collection fields
    cannot be

    sortable, since they are multi-valued. Simple sub-fields of complex collections
    are also

    multi-valued, and therefore cannot be sortable. This is true whether it''s an
    immediate parent

    field, or an ancestor field, that''s the complex collection. Complex fields cannot
    be sortable

    and the sortable property must be null for such fields. The default for sortable
    is true for

    single-valued simple fields, false for multi-valued simple fields, and null for
    complex fields.'
  signature: 'sortable: bool | None'
- uid: azure.search.documents.indexes.models.SearchField.stored
  name: stored
  summary: 'An immutable value indicating whether the field will be persisted separately
    on disk to be

    returned in a search result. You can disable this option if you don''t plan to
    return the field

    contents in a search response to save on storage overhead. This can only be set
    during index

    creation and only for vector fields. This property cannot be changed for existing
    fields or set

    as false for new fields. If this property is set as false, the property ''retrievable''
    must also

    be set to false. This property must be true or unset for key fields, for new fields,
    and for

    non-vector fields, and it must be null for complex fields. Disabling this property
    will reduce

    index storage requirements. The default is true for vector fields.'
  signature: 'stored: bool | None'
- uid: azure.search.documents.indexes.models.SearchField.synonym_map_names
  name: synonym_map_names
  summary: 'A list of the names of synonym maps to associate with this field. This
    option can be used only

    with searchable fields. Currently only one synonym map per field is supported.
    Assigning a

    synonym map to a field ensures that query terms targeting that field are expanded
    at query-time

    using the rules in the synonym map. This attribute can be changed on existing
    fields. Must be

    null or an empty collection for complex fields.'
  signature: 'synonym_map_names: list[str] | None'
- uid: azure.search.documents.indexes.models.SearchField.type
  name: type
  summary: '"Edm.String", "Edm.Int32",

    "Edm.Int64", "Edm.Double", "Edm.Boolean", "Edm.DateTimeOffset", "Edm.GeographyPoint",

    "Edm.ComplexType", "Edm.Single", "Edm.Half", "Edm.Int16", "Edm.SByte", and

