- uid: azure.search.documents.indexes.models.SearchField.facetable
  name: facetable
  summary: 'A value indicating whether to enable the field to be referenced in facet
    queries. Typically

    used in a presentation of search results that includes hit count by category (for
    example,

    search for digital cameras and see hits by brand, by megapixels, by price, and
    so on). This

    property must be null for complex fields. Fields of type Edm.GeographyPoint or

    Collection(Edm.GeographyPoint) cannot be facetable. Default is true for all other
    simple

    fields.'
  signature: 'facetable: bool | None'
- uid: azure.search.documents.indexes.models.SearchField.fields
  name: fields
  summary: 'A list of sub-fields if this is a field of type Edm.ComplexType or Collection(Edm.ComplexType).

    Must be null or empty for simple fields.'
  signature: 'fields: list[''_models.SearchField''] | None'
- uid: azure.search.documents.indexes.models.SearchField.filterable
  name: filterable
  summary: 'A value indicating whether to enable the field to be referenced in $filter
    queries. filterable

    differs from searchable in how strings are handled. Fields of type Edm.String
    or

    Collection(Edm.String) that are filterable do not undergo word-breaking, so comparisons
    are for

    exact matches only. For example, if you set such a field f to "sunny day", $filter=f
    eq

    ''sunny'' will find no matches, but $filter=f eq ''sunny day'' will. This property
    must be null for

    complex fields. Default is true for simple fields and null for complex fields.'
  signature: 'filterable: bool | None'
- uid: azure.search.documents.indexes.models.SearchField.hidden
  name: hidden
  summary: 'A value indicating whether the field will be returned in a search result.

    This is the inverse of ''retrievable''. Kept for backward compatibility.'
  return:
    description: True if the field is hidden (not retrievable), False otherwise.
    types:
    - <xref:bool>
    - <xref:None>
