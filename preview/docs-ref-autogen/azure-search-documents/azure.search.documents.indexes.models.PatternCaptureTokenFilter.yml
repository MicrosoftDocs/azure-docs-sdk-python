uid: azure.search.documents.indexes.models.PatternCaptureTokenFilter
name: PatternCaptureTokenFilter
fullName: azure.search.documents.indexes.models.PatternCaptureTokenFilter
module: azure.search.documents.indexes.models
summary: 'Uses Java regexes to emit multiple tokens - one for each capture group in
  one or more patterns.

  This token filter is implemented using Apache Lucene.'
constructor:
  syntax: 'PatternCaptureTokenFilter(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the token filter. It must only contain letters, digits,
    spaces, dashes

    or underscores, can only start and end with alphanumeric characters, and is limited
    to 128

    characters. Required.'
  name: name
  types:
  - <xref:str>
- description: A list of patterns to match against each token. Required.
  name: patterns
  types:
  - <xref:list>[<xref:str>]
- description: 'A value indicating whether to return the original token even if one
    of

    the patterns matches. Default is true.'
  name: preserve_original
  types:
  - <xref:bool>
- description: 'A URI fragment specifying the type of token filter. Required. Default
    value

    is "#Microsoft.Azure.Search.PatternCaptureTokenFilter".'
  name: odata_type
  types:
  - <xref:str>
