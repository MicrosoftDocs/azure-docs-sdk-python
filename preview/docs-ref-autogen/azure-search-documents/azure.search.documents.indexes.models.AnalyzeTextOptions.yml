name: AnalyzeTextOptions
fullName: azure.search.documents.indexes.models.AnalyzeTextOptions
module: azure.search.documents.indexes.models
summary: Specifies some text and analysis components used to break that text into
  tokens.
constructor:
  syntax: 'AnalyzeTextOptions(*args: Any, **kwargs: Any)'
variables:
- description: The text to break into tokens. Required.
  name: text
  types:
  - <xref:str>
- description: 'The name of the analyzer to use to break the given text. If this parameter

    is not specified, you must specify a tokenizer instead. The tokenizer and analyzer
    parameters

    are mutually exclusive. Known values are: "ar.microsoft", "ar.lucene", "hy.lucene",

    "bn.microsoft", "eu.lucene", "bg.microsoft", "bg.lucene", "ca.microsoft", "ca.lucene",

    "zh-Hans.microsoft", "zh-Hans.lucene", "zh-Hant.microsoft", "zh-Hant.lucene",
    "hr.microsoft",

