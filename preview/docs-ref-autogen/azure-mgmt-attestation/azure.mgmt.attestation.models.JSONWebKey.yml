### YamlMime:PythonClass
uid: azure.mgmt.attestation.models.JSONWebKey
name: JSONWebKey
fullName: azure.mgmt.attestation.models.JSONWebKey
module: azure.mgmt.attestation.models
summary: JSONWebKey.
constructor:
  syntax: 'JSONWebKey(*args: Any, **kwargs: Any)'
variables:
- description: 'The "alg" (algorithm) parameter identifies the algorithm intended
    for use with the

    key.  The values used should either be registered in the IANA "JSON Web Signature
    and

    Encryption Algorithms" registry established by [JWA] or be a value that contains
    a Collision-

    Resistant Name.'
  name: alg
  types:
  - <xref:str>
- description: The "crv" (curve) parameter identifies the curve type.
  name: crv
  types:
  - <xref:str>
- description: RSA private exponent or ECC private key.
  name: d
  types:
  - <xref:str>
- description: RSA Private Key Parameter.
  name: dp
  types:
  - <xref:str>
- description: RSA Private Key Parameter.
  name: dq
  types:
  - <xref:str>
- description: RSA public exponent, in Base64.
  name: e
  types:
  - <xref:str>
- description: Symmetric key.
  name: k
  types:
  - <xref:str>
- description: 'The "kid" (key ID) parameter is used to match a specific key.  This
    is used, for

    instance, to choose among a set of keys within a JWK Set during key rollover.  The
    structure of

    the "kid" value is unspecified.  When "kid" values are used within a JWK Set,
    different keys

    within the JWK Set SHOULD use distinct "kid" values.  (One example in which different
    keys

    might use the same "kid" value is if they have different "kty" (key type) values
    but are

    considered to be equivalent alternatives by the application using them.)  The
    "kid" value is a

    case-sensitive string.'
  name: kid
  types:
  - <xref:str>
- description: 'The "kty" (key type) parameter identifies the cryptographic algorithm
    family used

    with the key, such as "RSA" or "EC". "kty" values should either be registered
    in the IANA "JSON

    Web Key Types" registry established by [JWA] or be a value that contains a Collision-
    Resistant

    Name.  The "kty" value is a case-sensitive string. Required.'
  name: kty
  types:
  - <xref:str>
- description: RSA modulus, in Base64.
  name: n
  types:
  - <xref:str>
- description: RSA secret prime.
  name: p
  types:
  - <xref:str>
- description: RSA secret prime, with p < q.
  name: q
  types:
  - <xref:str>
- description: RSA Private Key Parameter.
  name: qi
  types:
  - <xref:str>
- description: 'Use ("public key use") identifies the intended use of the public key.
    The "use"

    parameter is employed to indicate whether a public key is used for encrypting
    data or verifying

    the signature on data. Values are commonly "sig" (signature) or "enc" (encryption).'
  name: use
  types:
  - <xref:str>
- description: X coordinate for the Elliptic Curve point.
  name: x
  types:
  - <xref:str>
- description: "The \"x5c\" (X.509 certificate chain) parameter contains a chain of\
    \ one or more PKIX\ncertificates [RFC5280].  The certificate chain is represented\
    \ as a JSON array of certificate\nvalue strings.  Each string in the array is\
    \ a base64-encoded (Section 4 of [RFC4648] \u2013 not\nbase64url-encoded) DER\
    \ [ITU.X690.1994] PKIX certificate value. The PKIX certificate containing\nthe\
    \ key value MUST be the first certificate."
  name: x5_c
  types:
  - <xref:list>[<xref:str>]
- description: Y coordinate for the Elliptic Curve point.
  name: y
  types:
  - <xref:str>
