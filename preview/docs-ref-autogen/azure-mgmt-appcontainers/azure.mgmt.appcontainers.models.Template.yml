### YamlMime:PythonClass
uid: azure.mgmt.appcontainers.models.Template
name: Template
fullName: azure.mgmt.appcontainers.models.Template
module: azure.mgmt.appcontainers.models
summary: 'Container App versioned application definition. Defines the desired state
  of an immutable

  revision. Any changes to this section Will result in a new revision being created.'
constructor:
  syntax: 'Template(*args: Any, **kwargs: Any)'
variables:
- description: User friendly suffix that is appended to the revision name.
  name: revision_suffix
  types:
  - <xref:str>
- description: 'Optional duration in seconds the Container App Instance

    needs to terminate gracefully. Value must be non-negative integer. The value zero
    indicates

    stop immediately via the kill signal (no opportunity to shut down). If this value
    is nil, the

    default grace period will be used instead. Set this value longer than the expected
    cleanup time

    for your process. Defaults to 30 seconds.'
  name: termination_grace_period_seconds
  types:
  - <xref:int>
- description: List of specialized containers that run before app containers.
  name: init_containers
  types:
  - <xref:list>[<xref:azure.mgmt.appcontainers.models.InitContainer>]
- description: List of container definitions for the Container App.
  name: containers
  types:
  - <xref:list>[<xref:azure.mgmt.appcontainers.models.Container>]
- description: Scaling properties for the Container App.
  name: scale
  types:
  - <xref:azure.mgmt.appcontainers.models.Scale>
- description: List of volume definitions for the Container App.
  name: volumes
  types:
  - <xref:list>[<xref:azure.mgmt.appcontainers.models.Volume>]
- description: List of container app services bound to the app.
  name: service_binds
  types:
  - <xref:list>[<xref:azure.mgmt.appcontainers.models.ServiceBind>]
attributes:
- uid: azure.mgmt.appcontainers.models.Template.containers
  name: containers
  summary: List of container definitions for the Container App.
  signature: 'containers: list[''_models.Container''] | None'
- uid: azure.mgmt.appcontainers.models.Template.init_containers
  name: init_containers
  summary: List of specialized containers that run before app containers.
  signature: 'init_containers: list[''_models.InitContainer''] | None'
- uid: azure.mgmt.appcontainers.models.Template.revision_suffix
  name: revision_suffix
  summary: User friendly suffix that is appended to the revision name.
  signature: 'revision_suffix: str | None'
- uid: azure.mgmt.appcontainers.models.Template.scale
  name: scale
  summary: Scaling properties for the Container App.
  signature: 'scale: _models.Scale | None'
- uid: azure.mgmt.appcontainers.models.Template.service_binds
  name: service_binds
  summary: List of container app services bound to the app.
  signature: 'service_binds: list[''_models.ServiceBind''] | None'
- uid: azure.mgmt.appcontainers.models.Template.termination_grace_period_seconds
  name: termination_grace_period_seconds
  summary: 'Optional duration in seconds the Container App Instance needs to terminate
    gracefully. Value

    must be non-negative integer. The value zero indicates stop immediately via the
    kill signal (no

    opportunity to shut down). If this value is nil, the default grace period will
    be used instead.

    Set this value longer than the expected cleanup time for your process. Defaults
    to 30 seconds.'
  signature: 'termination_grace_period_seconds: int | None'
