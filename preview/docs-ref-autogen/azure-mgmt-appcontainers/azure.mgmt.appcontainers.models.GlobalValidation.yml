### YamlMime:PythonClass
uid: azure.mgmt.appcontainers.models.GlobalValidation
name: GlobalValidation
fullName: azure.mgmt.appcontainers.models.GlobalValidation
module: azure.mgmt.appcontainers.models
summary: 'The configuration settings that determines the validation flow of users
  using ContainerApp

  Service Authentication/Authorization.'
constructor:
  syntax: 'GlobalValidation(*args: Any, **kwargs: Any)'
variables:
- description: 'The action to take when an unauthenticated client attempts

    to access the app. Known values are: "RedirectToLoginPage", "AllowAnonymous",
    "Return401", and

    "Return403".'
  name: unauthenticated_client_action
  types:
  - <xref:str>
  - <xref:azure.mgmt.appcontainers.models.UnauthenticatedClientActionV2>
- description: 'The default authentication provider to use when multiple providers

    are configured. This setting is only needed if multiple providers are configured
    and the

    unauthenticated client action is set to "RedirectToLoginPage".'
  name: redirect_to_provider
  types:
  - <xref:str>
- description: 'The paths for which unauthenticated flow would not be redirected to
    the

    login page.'
  name: excluded_paths
  types:
  - <xref:list>[<xref:str>]
attributes:
- uid: azure.mgmt.appcontainers.models.GlobalValidation.excluded_paths
  name: excluded_paths
  summary: The paths for which unauthenticated flow would not be redirected to the
    login page.
  signature: 'excluded_paths: list[str] | None'
- uid: azure.mgmt.appcontainers.models.GlobalValidation.redirect_to_provider
  name: redirect_to_provider
  summary: 'The default authentication provider to use when multiple providers are
    configured. This setting

    is only needed if multiple providers are configured and the unauthenticated client
    action is

    set to "RedirectToLoginPage".'
  signature: 'redirect_to_provider: str | None'
- uid: azure.mgmt.appcontainers.models.GlobalValidation.unauthenticated_client_action
  name: unauthenticated_client_action
  summary: 'The action to take when an unauthenticated client attempts to access the
    app. Known values are:

    "RedirectToLoginPage", "AllowAnonymous", "Return401", and "Return403".'
  signature: 'unauthenticated_client_action: str | _models.UnauthenticatedClientActionV2
    | None'
