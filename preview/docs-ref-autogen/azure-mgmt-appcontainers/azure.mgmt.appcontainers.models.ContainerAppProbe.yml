    value is 1. Maximum value is 60.'
  signature: 'initial_delay_seconds: int | None'
- uid: azure.mgmt.appcontainers.models.ContainerAppProbe.period_seconds
  name: period_seconds
  summary: 'How often (in seconds) to perform the probe. Default to 10 seconds. Minimum
    value is 1. Maximum

    value is 240.'
  signature: 'period_seconds: int | None'
