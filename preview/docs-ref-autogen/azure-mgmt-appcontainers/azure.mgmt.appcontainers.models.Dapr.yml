  types:
  - <xref:bool>
- description: Dapr application health check configuration.
  name: app_health
  types:
  - <xref:azure.mgmt.appcontainers.models.DaprAppHealth>
- description: 'Maximum number of concurrent requests, events handled by the Dapr

    sidecar.'
  name: max_concurrency
  types:
  - <xref:int>
