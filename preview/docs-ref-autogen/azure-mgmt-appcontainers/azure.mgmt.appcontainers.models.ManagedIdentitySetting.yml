uid: azure.mgmt.appcontainers.models.ManagedIdentitySetting
name: ManagedIdentitySetting
fullName: azure.mgmt.appcontainers.models.ManagedIdentitySetting
module: azure.mgmt.appcontainers.models
summary: Optional settings for a Managed Identity that is assigned to the Session
  pool.
constructor:
  syntax: 'ManagedIdentitySetting(*args: Any, **kwargs: Any)'
variables:
- description: 'The resource ID of a user-assigned managed identity that is assigned
    to the

    Session Pool, or ''system'' for system-assigned identity. Required.'
  name: identity
  types:
  - <xref:str>
- description: 'Use to select the lifecycle stages of a Session Pool during which
    the Managed

    Identity should be available. Known values are: "None" and "Main".'
  name: lifecycle
  types:
  - <xref:str>
  - <xref:azure.mgmt.appcontainers.models.SessionPoolIdentityLifeCycle>
attributes:
- uid: azure.mgmt.appcontainers.models.ManagedIdentitySetting.identity
  name: identity
  summary: 'The resource ID of a user-assigned managed identity that is assigned to
    the Session Pool, or

    ''system'' for system-assigned identity. Required.'
  signature: 'identity: str'
- uid: azure.mgmt.appcontainers.models.ManagedIdentitySetting.lifecycle
  name: lifecycle
  summary: 'Use to select the lifecycle stages of a Session Pool during which the
    Managed Identity should

    be available. Known values are: "None" and "Main".'
  signature: 'lifecycle: str | _models.SessionPoolIdentityLifeCycle | None'
