  - <xref:list>[<xref:azure.mgmt.appcontainers.models.PrivateEndpointConnection>]
- description: 'Property to allow or block all public traffic. Allowed Values:

    ''Enabled'', ''Disabled''. Known values are: "Enabled" and "Disabled".'
  name: public_network_access
  types:
