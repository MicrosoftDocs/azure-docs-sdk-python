uid: azure.mgmt.appcontainers.models.IdentitySettings
name: IdentitySettings
fullName: azure.mgmt.appcontainers.models.IdentitySettings
module: azure.mgmt.appcontainers.models
summary: Optional settings for a Managed Identity that is assigned to the Container
  App.
constructor:
  syntax: 'IdentitySettings(*args: Any, **kwargs: Any)'
variables:
- description: 'The resource ID of a user-assigned managed identity that is assigned
    to the

    Container App, or ''system'' for system-assigned identity. Required.'
  name: identity
  types:
  - <xref:str>
- description: 'Use to select the lifecycle stages of a Container App during which
    the Managed

    Identity should be available. Known values are: "None", "Main", "Init", and "All".'
  name: lifecycle
  types:
  - <xref:str>
  - <xref:azure.mgmt.appcontainers.models.IdentitySettingsLifeCycle>
attributes:
- uid: azure.mgmt.appcontainers.models.IdentitySettings.identity
  name: identity
  summary: 'The resource ID of a user-assigned managed identity that is assigned to
    the Container App, or

    ''system'' for system-assigned identity. Required.'
  signature: 'identity: str'
- uid: azure.mgmt.appcontainers.models.IdentitySettings.lifecycle
  name: lifecycle
  summary: 'Use to select the lifecycle stages of a Container App during which the
    Managed Identity should

    be available. Known values are: "None", "Main", "Init", and "All".'
  signature: 'lifecycle: str | _models.IdentitySettingsLifeCycle | None'
