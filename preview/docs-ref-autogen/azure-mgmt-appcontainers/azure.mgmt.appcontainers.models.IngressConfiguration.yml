### YamlMime:PythonClass
uid: azure.mgmt.appcontainers.models.IngressConfiguration
name: IngressConfiguration
fullName: azure.mgmt.appcontainers.models.IngressConfiguration
module: azure.mgmt.appcontainers.models
summary: 'Settings for the ingress component, including workload profile, scaling,
  and connection

  handling.'
constructor:
  syntax: 'IngressConfiguration(*args: Any, **kwargs: Any)'
variables:
- description: 'Name of the workload profile used by the ingress component.

    Required.'
  name: workload_profile_name
  types:
  - <xref:str>
- description: 'Time (in seconds) to allow active connections to

    complete on termination. Must be between 0 and 3600. Defaults to 480 seconds.'
  name: termination_grace_period_seconds
  types:
  - <xref:int>
- description: 'Maximum number of headers per request allowed by the ingress. Must
    be

    at least 1. Defaults to 100.'
  name: header_count_limit
  types:
  - <xref:int>
- description: 'Duration (in minutes) before idle requests are timed out. Must be

    between 4 and 30 inclusive. Defaults to 4 minutes.'
  name: request_idle_timeout
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.appcontainers.models.IngressConfiguration.header_count_limit
  name: header_count_limit
  summary: 'Maximum number of headers per request allowed by the ingress. Must be
    at least 1. Defaults to

    100.'
  signature: 'header_count_limit: int | None'
- uid: azure.mgmt.appcontainers.models.IngressConfiguration.request_idle_timeout
  name: request_idle_timeout
  summary: 'Duration (in minutes) before idle requests are timed out. Must be between
    4 and 30 inclusive.

    Defaults to 4 minutes.'
  signature: 'request_idle_timeout: int | None'
- uid: azure.mgmt.appcontainers.models.IngressConfiguration.termination_grace_period_seconds
  name: termination_grace_period_seconds
  summary: 'Time (in seconds) to allow active connections to complete on termination.
    Must be between 0 and

    3600. Defaults to 480 seconds.'
  signature: 'termination_grace_period_seconds: int | None'
- uid: azure.mgmt.appcontainers.models.IngressConfiguration.workload_profile_name
  name: workload_profile_name
  summary: Name of the workload profile used by the ingress component. Required.
  signature: 'workload_profile_name: str | None'
