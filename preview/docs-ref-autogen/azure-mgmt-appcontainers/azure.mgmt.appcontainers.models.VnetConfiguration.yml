### YamlMime:PythonClass
uid: azure.mgmt.appcontainers.models.VnetConfiguration
name: VnetConfiguration
fullName: azure.mgmt.appcontainers.models.VnetConfiguration
module: azure.mgmt.appcontainers.models
summary: Configuration properties for apps environment to join a Virtual Network.
constructor:
  syntax: 'VnetConfiguration(*args: Any, **kwargs: Any)'
variables:
- description: 'Boolean indicating the environment only has an internal load balancer.
    These

    environments do not have a public static IP resource. They must provide infrastructureSubnetId

    if enabling this property.'
  name: internal
  types:
  - <xref:bool>
- description: 'Resource ID of a subnet for infrastructure components. Must not

    overlap with any other provided IP ranges.'
  name: infrastructure_subnet_id
  types:
  - <xref:str>
- description: 'CIDR notation IP range assigned to the Docker bridge, network. Must

    not overlap with any other provided IP ranges.'
  name: docker_bridge_cidr
  types:
  - <xref:str>
- description: 'IP range in CIDR notation that can be reserved for environment

    infrastructure IP addresses. Must not overlap with any other provided IP ranges.'
  name: platform_reserved_cidr
  types:
  - <xref:str>
- description: 'An IP address from the IP range defined by platformReservedCidr

    that will be reserved for the internal DNS server.'
  name: platform_reserved_dns_ip
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.appcontainers.models.VnetConfiguration.docker_bridge_cidr
  name: docker_bridge_cidr
  summary: 'CIDR notation IP range assigned to the Docker bridge, network. Must not
    overlap with any other

    provided IP ranges.'
  signature: 'docker_bridge_cidr: str | None'
- uid: azure.mgmt.appcontainers.models.VnetConfiguration.infrastructure_subnet_id
  name: infrastructure_subnet_id
  summary: 'Resource ID of a subnet for infrastructure components. Must not overlap
    with any other provided

    IP ranges.'
  signature: 'infrastructure_subnet_id: str | None'
- uid: azure.mgmt.appcontainers.models.VnetConfiguration.internal
  name: internal
  summary: 'Boolean indicating the environment only has an internal load balancer.
    These environments do

    not have a public static IP resource. They must provide infrastructureSubnetId
    if enabling this

    property.'
  signature: 'internal: bool | None'
- uid: azure.mgmt.appcontainers.models.VnetConfiguration.platform_reserved_cidr
  name: platform_reserved_cidr
  summary: 'IP range in CIDR notation that can be reserved for environment infrastructure
    IP addresses.

    Must not overlap with any other provided IP ranges.'
  signature: 'platform_reserved_cidr: str | None'
- uid: azure.mgmt.appcontainers.models.VnetConfiguration.platform_reserved_dns_ip
  name: platform_reserved_dns_ip
