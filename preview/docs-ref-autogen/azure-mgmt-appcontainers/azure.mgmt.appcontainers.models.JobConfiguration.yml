  name: replica_retry_limit
  summary: Maximum number of retries before failing the job.
  signature: 'replica_retry_limit: int | None'
- uid: azure.mgmt.appcontainers.models.JobConfiguration.replica_timeout
  name: replica_timeout
  summary: Maximum number of seconds a replica is allowed to run. Required.
  signature: 'replica_timeout: int'
