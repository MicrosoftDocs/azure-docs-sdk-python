uid: azure.mgmt.appcontainers.models.Configuration
name: Configuration
fullName: azure.mgmt.appcontainers.models.Configuration
module: azure.mgmt.appcontainers.models
summary: 'Non versioned Container App configuration properties that define the mutable
  settings of a

  Container app.'
constructor:
  syntax: 'Configuration(*args: Any, **kwargs: Any)'
variables:
- description: Collection of secrets used by a Container app.
  name: secrets
  types:
  - <xref:list>[<xref:azure.mgmt.appcontainers.models.Secret>]
- description: 'Controls how active revisions are handled for the Container app.

    Known values are: "Multiple" and "Single".'
  name: active_revisions_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.appcontainers.models.ActiveRevisionsMode>
- description: Ingress configurations.
  name: ingress
  types:
  - <xref:azure.mgmt.appcontainers.models.Ingress>
- description: 'Collection of private container registry credentials for containers
    used by

    the Container app.'
  name: registries
  types:
  - <xref:list>[<xref:azure.mgmt.appcontainers.models.RegistryCredentials>]
- description: Dapr configuration for the Container App.
  name: dapr
  types:
  - <xref:azure.mgmt.appcontainers.models.Dapr>
- description: App runtime configuration for the Container App.
  name: runtime
  types:
  - <xref:azure.mgmt.appcontainers.models.Runtime>
- description: Optional. Max inactive revisions a Container App can have.
  name: max_inactive_revisions
  types:
  - <xref:int>
- description: Container App to be a dev Container App Service.
  name: service
  types:
  - <xref:azure.mgmt.appcontainers.models.Service>
- description: 'Optional settings for Managed Identities that are assigned to the

    Container App. If a Managed Identity is not specified here, default settings will
    be used.'
  name: identity_settings
  types:
  - <xref:list>[<xref:azure.mgmt.appcontainers.models.IdentitySettings>]
