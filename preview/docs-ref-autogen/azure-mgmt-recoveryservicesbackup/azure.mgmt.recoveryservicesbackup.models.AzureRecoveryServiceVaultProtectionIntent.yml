### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.AzureRecoveryServiceVaultProtectionIntent
name: AzureRecoveryServiceVaultProtectionIntent
fullName: azure.mgmt.recoveryservicesbackup.models.AzureRecoveryServiceVaultProtectionIntent
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Azure Recovery Services Vault specific protection intent item.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureWorkloadAutoProtectionIntent, AzureWorkloadSQLAutoProtectionIntent'
constructor:
  syntax: 'AzureRecoveryServiceVaultProtectionIntent(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of backup management for the backed up item. Known values

    are: "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql",
    "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: ARM ID of the resource to be backed up.
  name: source_resource_id
  types:
  - <xref:str>
- description: 'ID of the item which is getting protected, In case of Azure Vm , it
    is

    ProtectedItemId.'
  name: item_id
  types:
  - <xref:str>
- description: ID of the backup policy with which this item is backed up.
  name: policy_id
  types:
  - <xref:str>
- description: 'Backup state of this backup item. Known values are: "Invalid",

    "NotProtected", "Protecting", "Protected", and "ProtectionFailed".'
  name: protection_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectionStatus>
- description: 'backup protectionIntent type. Required.

    RECOVERY_SERVICE_VAULT_ITEM.'
  name: protection_intent_item_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.RECOVERY_SERVICE_VAULT_ITEM>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.AzureRecoveryServiceVaultProtectionIntent.protection_intent_item_type
  name: protection_intent_item_type
  summary: backup protectionIntent type. Required. RECOVERY_SERVICE_VAULT_ITEM.
  signature: 'protection_intent_item_type: RECOVERY_SERVICE_VAULT_ITEM: ''RecoveryServiceVaultItem''>]'
