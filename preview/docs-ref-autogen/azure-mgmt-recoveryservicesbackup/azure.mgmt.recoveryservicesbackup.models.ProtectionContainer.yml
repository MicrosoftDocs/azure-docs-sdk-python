### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer
name: ProtectionContainer
fullName: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Base class for container with backup items. Containers with specific workloads
  are derived from

  this class.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureBackupServerContainer, AzureSqlContainer, AzureWorkloadContainer, DpmContainer,

  GenericContainer, IaaSVMContainer, AzureIaaSClassicComputeVMContainer,

  AzureIaaSComputeVMContainer, AzureSQLAGWorkloadContainerProtectionContainer,

  AzureStorageContainer, AzureVMAppContainerProtectionContainer, MabContainer'
constructor:
  syntax: 'ProtectionContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. Known values are: "Invalid", "Unknown",

    "IaasVMContainer", "IaasVMServiceContainer", "DPMContainer", "AzureBackupServerContainer",

    "MABContainer", "Cluster", "AzureSqlContainer", "Windows", "VCenter", "VMAppContainer",

    "SQLAGWorkLoadContainer", "StorageContainer", "GenericContainer",

    "Microsoft.ClassicCompute/virtualMachines", "Microsoft.Compute/virtualMachines",
    and

    "AzureWorkloadContainer".'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectableContainerType>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer.backup_management_type
  name: backup_management_type
  summary: '"Invalid", "AzureIaasVM",

    "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage", "AzureWorkload",
    and

    "DefaultBackup".'
  signature: 'backup_management_type: str | _models.BackupManagementType | None'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer.container_type
  name: container_type
  summary: '1. Compute Azure VM is

    Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. Known values are: "Invalid", "Unknown",

    "IaasVMContainer", "IaasVMServiceContainer", "DPMContainer",

    "AzureBackupServerContainer", "MABContainer", "Cluster", "AzureSqlContainer",

    "Windows", "VCenter", "VMAppContainer", "SQLAGWorkLoadContainer", "StorageContainer",

    "GenericContainer", "Microsoft.ClassicCompute/virtualMachines",

    "Microsoft.Compute/virtualMachines", and "AzureWorkloadContainer".'
  signature: 'container_type: str'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer.friendly_name
  name: friendly_name
  summary: Friendly name of the container.
  signature: 'friendly_name: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer.health_status
  name: health_status
  summary: Status of health of the container.
  signature: 'health_status: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer.protectable_object_type
  name: protectable_object_type
  summary: Type of the protectable object associated with this container.
  signature: 'protectable_object_type: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionContainer.registration_status
  name: registration_status
  summary: Status of registration of the container with the Recovery Services Vault.
  signature: 'registration_status: str | None'
