### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.WorkloadItem
name: WorkloadItem
fullName: azure.mgmt.recoveryservicesbackup.models.WorkloadItem
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Base class for backup item. Workload-specific backup items are derived from
  this class.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureVmWorkloadItem, AzureVmWorkloadSAPAseDatabaseWorkloadItem,

  AzureVmWorkloadSAPAseSystemWorkloadItem, AzureVmWorkloadSAPHanaDatabaseWorkloadItem,

  AzureVmWorkloadSAPHanaSystemWorkloadItem, AzureVmWorkloadSQLDatabaseWorkloadItem,

  AzureVmWorkloadSQLInstanceWorkloadItem'
constructor:
  syntax: 'WorkloadItem(*args: Any, **kwargs: Any)'
variables:
- description: Type of backup management to backup an item.
  name: backup_management_type
  types:
  - <xref:str>
- description: Type of workload for the backup management.
  name: workload_type
  types:
  - <xref:str>
- description: Type of the backup item. Required. Default value is None.
  name: workload_item_type
  types:
  - <xref:str>
- description: Friendly name of the backup item.
  name: friendly_name
  types:
  - <xref:str>
- description: 'State of the back up item. Known values are: "Invalid", "NotProtected",

    "Protecting", "Protected", and "ProtectionFailed".'
  name: protection_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectionStatus>
