### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadSQLRecoveryPoint
name: AzureWorkloadSQLRecoveryPoint
fullName: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadSQLRecoveryPoint
module: azure.mgmt.recoveryservicesbackup.models
summary: 'SQL specific recoverypoint, specifically encapsulates full/diff recoverypoint
  along with

  extended info.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureWorkloadSQLPointInTimeRecoveryPoint'
constructor:
  syntax: 'AzureWorkloadSQLRecoveryPoint(*args: Any, **kwargs: Any)'
variables:
- description: 'Threat status of the recovery point. Known values are: "Unknown",

    "Healthy", "UnHealthy", "Warning", and "NotAvailable".'
  name: threat_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ThreatStatus>
- description: Recovery point threat information.
  name: threat_info
  types:
  - <xref:list>[<xref:azure.mgmt.recoveryservicesbackup.models.ThreatInfo>]
- description: UTC time at which recovery point was created.
  name: recovery_point_time_in_utc
  types:
  - <xref:datetime.datetime>
- description: 'Type of restore point. Known values are: "Invalid", "Full", "Log",
    "Differential",

    "Incremental", "SnapshotFull", and "SnapshotCopyOnlyFull".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.RestorePointType>
- description: Recovery point tier information.
  name: recovery_point_tier_details
  types:
  - <xref:list>[<xref:azure.mgmt.recoveryservicesbackup.models.RecoveryPointTierInformationV2>]
- description: Eligibility of RP to be moved to another tier.
  name: recovery_point_move_readiness_info
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.recoveryservicesbackup.models.RecoveryPointMoveReadinessInfo>]
- description: Properties of Recovery Point.
  name: recovery_point_properties
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.RecoveryPointProperties>
- description: 'This property will be used as the discriminator for deciding the specific

    types in the polymorphic chain of types. Required. Default value is

    "AzureWorkloadSQLRecoveryPoint".'
  name: object_type
  types:
  - <xref:str>
- description: 'Extended Info that provides data directory details. Will be populated
    in

    two cases: When a specific recovery point is accessed using GetRecoveryPoint Or
    when

    ListRecoveryPoints is called for Log RP only with ExtendedInfo query filter.'
  name: extended_info
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.AzureWorkloadSQLRecoveryPointExtendedInfo>
