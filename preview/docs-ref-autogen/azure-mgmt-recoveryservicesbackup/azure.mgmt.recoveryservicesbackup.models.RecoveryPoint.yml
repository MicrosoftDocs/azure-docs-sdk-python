  AzureFileShareRecoveryPoint, AzureWorkloadPointInTimeRecoveryPoint, AzureWorkloadRecoveryPoint,

  AzureWorkloadSAPAsePointInTimeRecoveryPoint, AzureWorkloadSAPAseRecoveryPoint,

  AzureWorkloadSAPHanaPointInTimeRecoveryPoint, AzureWorkloadSAPHanaRecoveryPoint,

  AzureWorkloadSQLPointInTimeRecoveryPoint, AzureWorkloadSQLRecoveryPoint, GenericRecoveryPoint,

  IaasVMRecoveryPoint'
