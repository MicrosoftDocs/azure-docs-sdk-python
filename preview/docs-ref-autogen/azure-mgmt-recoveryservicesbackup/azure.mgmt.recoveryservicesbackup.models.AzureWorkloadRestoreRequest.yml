    "RecoveryUsingSnapshot", and "SnapshotAttachAndRecover".'
  name: recovery_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.RecoveryMode>
- description: Defines the Resource group of the Target VM.
  name: target_resource_group_name
  types:
  - <xref:str>
