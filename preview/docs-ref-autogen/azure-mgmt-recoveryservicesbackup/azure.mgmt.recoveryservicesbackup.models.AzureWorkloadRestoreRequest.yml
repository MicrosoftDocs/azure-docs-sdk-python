uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadRestoreRequest
name: AzureWorkloadRestoreRequest
fullName: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadRestoreRequest
module: azure.mgmt.recoveryservicesbackup.models
summary: 'AzureWorkload-specific restore.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureWorkloadPointInTimeRestoreRequest, AzureWorkloadSAPAsePointInTimeRestoreRequest,

  AzureWorkloadSAPAseRestoreRequest, AzureWorkloadSAPHanaPointInTimeRestoreRequest,

  AzureWorkloadSAPHanaPointInTimeRestoreWithRehydrateRequest, AzureWorkloadSAPHanaRestoreRequest,

  AzureWorkloadSAPHanaRestoreWithRehydrateRequest, AzureWorkloadSQLPointInTimeRestoreRequest,

  AzureWorkloadSQLPointInTimeRestoreWithRehydrateRequest, AzureWorkloadSQLRestoreRequest,

  AzureWorkloadSQLRestoreWithRehydrateRequest'
constructor:
  syntax: 'AzureWorkloadRestoreRequest(*args: Any, **kwargs: Any)'
