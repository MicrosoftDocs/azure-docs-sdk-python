    snapshot for SAP Hana.'
  name: snapshot_restore_parameters
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.SnapshotRestoreParameters>
- description: 'This is the complete ARM Id of the target VM For e.g.

    /subscriptions/{subId}/resourcegroups/{rg}/provider/Microsoft.Compute/virtualmachines/{vm}.'
