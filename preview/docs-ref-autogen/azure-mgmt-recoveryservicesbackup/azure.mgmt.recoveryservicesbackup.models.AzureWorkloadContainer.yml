### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer
name: AzureWorkloadContainer
fullName: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Container for the workloads running inside Azure Compute or Classic Compute.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureSQLAGWorkloadContainerProtectionContainer, AzureVMAppContainerProtectionContainer'
constructor:
  syntax: 'AzureWorkloadContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. AZURE_WORKLOAD_CONTAINER.'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.AZURE_WORKLOAD_CONTAINER>
- description: 'ARM ID of the virtual machine represented by this Azure Workload

    Container.'
  name: source_resource_id
  types:
  - <xref:str>
- description: Time stamp when this container was updated.
  name: last_updated_time
  types:
  - <xref:datetime.datetime>
- description: Additional details of a workload container.
  name: extended_info
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainerExtendedInfo>
- description: 'Workload type for which registration was sent. Known values are:

    "Invalid", "VM", "FileFolder", "AzureSqlDb", "SQLDB", "Exchange", "Sharepoint",
    "VMwareVM",

    "SystemState", "Client", "GenericDataSource", "SQLDataBase", "AzureFileShare",

    "SAPHanaDatabase", "SAPAseDatabase", and "SAPHanaDBInstance".'
  name: workload_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.WorkloadType>
- description: 'Re-Do Operation. Known values are: "Invalid", "Register", "Reregister",

    and "Rehydrate".'
  name: operation_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.OperationType>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer.container_type
  name: container_type
  summary: '1. Compute Azure VM is

    Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. AZURE_WORKLOAD_CONTAINER.'
  signature: 'container_type: AZURE_WORKLOAD_CONTAINER: ''AzureWorkloadContainer''>]'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer.extended_info
  name: extended_info
  summary: Additional details of a workload container.
  signature: 'extended_info: _models.AzureWorkloadContainerExtendedInfo | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer.last_updated_time
  name: last_updated_time
  summary: Time stamp when this container was updated.
  signature: 'last_updated_time: datetime | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer.operation_type
  name: operation_type
  summary: '"Invalid", "Register", "Reregister", and

    "Rehydrate".'
  signature: 'operation_type: str | _models.OperationType | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer.source_resource_id
  name: source_resource_id
  summary: ARM ID of the virtual machine represented by this Azure Workload Container.
  signature: 'source_resource_id: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadContainer.workload_type
  name: workload_type
  summary: '"Invalid", "VM",

    "FileFolder", "AzureSqlDb", "SQLDB", "Exchange", "Sharepoint", "VMwareVM",

    "SystemState", "Client", "GenericDataSource", "SQLDataBase", "AzureFileShare",

    "SAPHanaDatabase", "SAPAseDatabase", and "SAPHanaDBInstance".'
  signature: 'workload_type: str | _models.WorkloadType | None'
