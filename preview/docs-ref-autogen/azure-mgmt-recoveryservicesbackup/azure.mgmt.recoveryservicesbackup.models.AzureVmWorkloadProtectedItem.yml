### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.AzureVmWorkloadProtectedItem
name: AzureVmWorkloadProtectedItem
fullName: azure.mgmt.recoveryservicesbackup.models.AzureVmWorkloadProtectedItem
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Azure VM workload-specific protected item.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureVmWorkloadSAPAseDatabaseProtectedItem, AzureVmWorkloadSAPHanaDBInstanceProtectedItem,

  AzureVmWorkloadSAPHanaDatabaseProtectedItem, AzureVmWorkloadSQLDatabaseProtectedItem,

  AzureVmWorkloadSQLInstanceProtectedItem'
constructor:
  syntax: 'AzureVmWorkloadProtectedItem(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of backup management for the backed up item. Known values

    are: "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql",
    "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Type of workload this item represents. Known values are: "Invalid",
    "VM",

    "FileFolder", "AzureSqlDb", "SQLDB", "Exchange", "Sharepoint", "VMwareVM", "SystemState",

    "Client", "GenericDataSource", "SQLDataBase", "AzureFileShare", "SAPHanaDatabase",

    "SAPAseDatabase", and "SAPHanaDBInstance".'
  name: workload_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.DataSourceType>
- description: Unique name of container.
  name: container_name
  types:
  - <xref:str>
- description: ARM ID of the resource to be backed up.
  name: source_resource_id
  types:
  - <xref:str>
- description: ID of the backup policy with which this item is backed up.
  name: policy_id
  types:
  - <xref:str>
- description: 'Timestamp when the last (latest) backup copy was created for this

    backup item.'
  name: last_recovery_point
  types:
  - <xref:datetime.datetime>
- description: Name of the backup set the backup item belongs to.
  name: backup_set_name
  types:
  - <xref:str>
- description: 'Create mode to indicate recovery of existing soft deleted data source
    or

    creation of new data source. Known values are: "Invalid", "Default", and "Recover".'
  name: create_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.CreateMode>
- description: Time for deferred deletion in UTC.
  name: deferred_delete_time_in_utc
  types:
  - <xref:datetime.datetime>
- description: 'Flag to identify whether the DS is scheduled for

    deferred delete.'
  name: is_scheduled_for_deferred_delete
  types:
  - <xref:bool>
- description: 'Time remaining before the DS marked for deferred delete

    is permanently deleted.'
  name: deferred_delete_time_remaining
  types:
  - <xref:str>
- description: 'Flag to identify whether the deferred deleted DS is

    to be purged soon.'
  name: is_deferred_delete_schedule_upcoming
  types:
  - <xref:bool>
- description: Flag to identify that deferred deleted DS is to be moved into Pause
    state.
  name: is_rehydrate
  types:
  - <xref:bool>
- description: 'ResourceGuardOperationRequests on which LAC check will

    be performed.'
  name: resource_guard_operation_requests
  types:
  - <xref:list>[<xref:str>]
- description: Flag to identify whether datasource is protected in archive.
  name: is_archive_enabled
  types:
  - <xref:bool>
- description: Name of the policy used for protection.
  name: policy_name
  types:
  - <xref:str>
- description: Soft delete retention period in days.
  name: soft_delete_retention_period_in_days
  types:
  - <xref:int>
- description: ID of the vault which protects this item.
  name: vault_id
  types:
  - <xref:str>
- description: Source side threat information.
  name: source_side_scan_info
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.SourceSideScanInfo>
- description: 'backup item type. Required. Default value is

    "AzureVmWorkloadProtectedItem".'
  name: protected_item_type
  types:
  - <xref:str>
- description: Friendly name of the DB represented by this backup item.
  name: friendly_name
  types:
  - <xref:str>
- description: Host/Cluster Name for instance or AG.
  name: server_name
  types:
  - <xref:str>
- description: Parent name of the DB such as Instance or Availability Group.
  name: parent_name
  types:
  - <xref:str>
- description: 'Parent type of protected item, example: for a DB, standalone server
    or

    distributed.'
  name: parent_type
  types:
  - <xref:str>
- description: Backup status of this backup item.
  name: protection_status
  types:
  - <xref:str>
- description: 'Backup state of this backup item. Known values are: "Invalid",

    "IRPending", "Protected", "ProtectionError", "ProtectionStopped", "ProtectionPaused",
    and

    "BackupsSuspended".'
  name: protection_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectionState>
- description: 'Last backup operation status. Possible values: Healthy, Unhealthy.

    Known values are: "Invalid", "Healthy", "Unhealthy", and "IRPending".'
  name: last_backup_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.LastBackupStatus>
- description: Timestamp of the last backup operation on this backup item.
  name: last_backup_time
  types:
  - <xref:datetime.datetime>
- description: Error details in last backup.
  name: last_backup_error_detail
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.ErrorDetail>
- description: Data ID of the protected item.
  name: protected_item_data_source_id
  types:
  - <xref:str>
- description: 'Health status of the backup item, evaluated based on last

    heartbeat received. Known values are: "Invalid", "Healthy", "Unhealthy", "NotReachable",
    and

    "IRPending".'
  name: protected_item_health_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectedItemHealthStatus>
- description: Additional information for this backup item.
  name: extended_info
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.AzureVmWorkloadProtectedItemExtendedInfo>
- description: Health details of different KPIs.
  name: kpis_healths
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.recoveryservicesbackup.models.KPIResourceHealthDetails>]
- description: List of the nodes in case of distributed container.
  name: nodes_list
  types:
  - <xref:list>[<xref:azure.mgmt.recoveryservicesbackup.models.DistributedNodesInfo>]
