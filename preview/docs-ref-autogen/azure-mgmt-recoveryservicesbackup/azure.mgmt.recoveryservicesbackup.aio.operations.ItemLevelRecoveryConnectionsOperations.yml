- uid: azure.mgmt.recoveryservicesbackup.aio.operations.ItemLevelRecoveryConnectionsOperations.provision
  name: provision
  summary: 'Provisions a script which invokes an iSCSI connection to the backup data.
    Executing this script

    opens a file explorer displaying all the recoverable files and folders. This is
    an asynchronous

    operation. To know the status of provisioning, call GetProtectedItemOperationResult
    API.'
  signature: 'async provision(vault_name: str, resource_group_name: str, fabric_name:
    str, container_name: str, protected_item_name: str, recovery_point_id: str, parameters:
    _models.ILRRequestResource, *, content_type: str = ''application/json'', **kwargs:
    Any) -> None'
  parameters:
  - name: vault_name
    description: The name of the VaultResource. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: resource_group_name
    description: 'The name of the resource group. The name is case insensitive.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: fabric_name
    description: The name of the BackupFabricResource. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: container_name
    description: Name of the container whose details need to be fetched. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: protected_item_name
    description: Backed up item name whose details are to be fetched. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: recovery_point_id
    description: 'RecoveryPointID represents the backed up data to be fetched.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: parameters
    description: 'resource ILR request. Is one of the following types: ILRRequestResource,

      JSON, IO[bytes] Required.'
    isRequired: true
    types:
    - <xref:azure.mgmt.recoveryservicesbackup.models.ILRRequestResource>
    - <xref:JSON>
    - <xref:typing.IO>[<xref:bytes>]
  return:
    description: None
    types:
    - <xref:None>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
