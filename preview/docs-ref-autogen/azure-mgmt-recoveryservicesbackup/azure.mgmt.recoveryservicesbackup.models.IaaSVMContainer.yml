### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.IaaSVMContainer
name: IaaSVMContainer
fullName: azure.mgmt.recoveryservicesbackup.models.IaaSVMContainer
module: azure.mgmt.recoveryservicesbackup.models
summary: 'IaaS VM workload-specific container.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureIaaSClassicComputeVMContainer, AzureIaaSComputeVMContainer'
constructor:
  syntax: 'IaaSVMContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. IAAS_VM_CONTAINER.'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.IAAS_VM_CONTAINER>
- description: 'Fully qualified ARM url of the virtual machine represented by this

    Azure IaaS VM container.'
  name: virtual_machine_id
  types:
  - <xref:str>
- description: 'Specifies whether the container represents a Classic or an Azure

    Resource Manager VM.'
  name: virtual_machine_version
  types:
  - <xref:str>
- description: Resource group name of Recovery Services Vault.
  name: resource_group
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.IaaSVMContainer.container_type
  name: container_type
  summary: '1. Compute Azure VM is

    Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. IAAS_VM_CONTAINER.'
  signature: 'container_type: IAAS_VM_CONTAINER: ''IaasVMContainer''>]'
- uid: azure.mgmt.recoveryservicesbackup.models.IaaSVMContainer.resource_group
  name: resource_group
  summary: Resource group name of Recovery Services Vault.
  signature: 'resource_group: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.IaaSVMContainer.virtual_machine_id
  name: virtual_machine_id
  summary: Fully qualified ARM url of the virtual machine represented by this Azure
    IaaS VM container.
  signature: 'virtual_machine_id: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.IaaSVMContainer.virtual_machine_version
  name: virtual_machine_version
  summary: Specifies whether the container represents a Classic or an Azure Resource
    Manager VM.
  signature: 'virtual_machine_version: str | None'
