### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.AzureResourceProtectionIntent
name: AzureResourceProtectionIntent
fullName: azure.mgmt.recoveryservicesbackup.models.AzureResourceProtectionIntent
module: azure.mgmt.recoveryservicesbackup.models
summary: IaaS VM specific backup protection intent item.
constructor:
  syntax: 'AzureResourceProtectionIntent(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of backup management for the backed up item. Known values

    are: "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql",
    "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: ARM ID of the resource to be backed up.
  name: source_resource_id
  types:
  - <xref:str>
- description: 'ID of the item which is getting protected, In case of Azure Vm , it
    is

    ProtectedItemId.'
  name: item_id
  types:
  - <xref:str>
- description: ID of the backup policy with which this item is backed up.
  name: policy_id
  types:
  - <xref:str>
- description: 'Backup state of this backup item. Known values are: "Invalid",

    "NotProtected", "Protecting", "Protected", and "ProtectionFailed".'
  name: protection_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectionStatus>
- description: Friendly name of the VM represented by this backup item.
  name: friendly_name
  types:
  - <xref:str>
- description: backup protectionIntent type. Required. AZURE_RESOURCE_ITEM.
  name: protection_intent_item_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.AZURE_RESOURCE_ITEM>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.AzureResourceProtectionIntent.friendly_name
  name: friendly_name
  summary: Friendly name of the VM represented by this backup item.
  signature: 'friendly_name: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureResourceProtectionIntent.protection_intent_item_type
  name: protection_intent_item_type
  summary: backup protectionIntent type. Required. AZURE_RESOURCE_ITEM.
  signature: 'protection_intent_item_type: AZURE_RESOURCE_ITEM: ''AzureResourceItem''>]'
