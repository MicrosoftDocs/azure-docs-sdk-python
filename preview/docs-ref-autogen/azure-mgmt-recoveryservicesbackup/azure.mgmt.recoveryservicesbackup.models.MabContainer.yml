### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.MabContainer
name: MabContainer
fullName: azure.mgmt.recoveryservicesbackup.models.MabContainer
module: azure.mgmt.recoveryservicesbackup.models
summary: Container with items backed up using MAB backup engine.
constructor:
  syntax: 'MabContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
- description: Can the container be registered one more time.
  name: can_re_register
  types:
  - <xref:bool>
- description: ContainerID represents the container.
  name: container_id
  types:
  - <xref:int>
- description: Number of items backed up in this container.
  name: protected_item_count
  types:
  - <xref:int>
- description: Agent version of this container.
  name: agent_version
  types:
  - <xref:str>
- description: Additional information for this container.
  name: extended_info
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.MabContainerExtendedInfo>
- description: Health details on this mab container.
  name: mab_container_health_details
  types:
  - <xref:list>[<xref:azure.mgmt.recoveryservicesbackup.models.MABContainerHealthDetails>]
- description: Health state of mab container.
  name: container_health_state
  types:
  - <xref:str>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. WINDOWS.'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.WINDOWS>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.agent_version
  name: agent_version
  summary: Agent version of this container.
  signature: 'agent_version: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.can_re_register
  name: can_re_register
  summary: Can the container be registered one more time.
  signature: 'can_re_register: bool | None'
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.container_health_state
  name: container_health_state
  summary: Health state of mab container.
  signature: 'container_health_state: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.container_id
  name: container_id
  summary: ContainerID represents the container.
  signature: 'container_id: int | None'
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.container_type
  name: container_type
  summary: '1. Compute Azure VM is

    Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. WINDOWS.'
  signature: 'container_type: WINDOWS: ''Windows''>]'
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.extended_info
  name: extended_info
  summary: Additional information for this container.
  signature: 'extended_info: _models.MabContainerExtendedInfo | None'
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.mab_container_health_details
  name: mab_container_health_details
  summary: Health details on this mab container.
  signature: 'mab_container_health_details: list[''_models.MABContainerHealthDetails'']
    | None'
- uid: azure.mgmt.recoveryservicesbackup.models.MabContainer.protected_item_count
  name: protected_item_count
  summary: Number of items backed up in this container.
  signature: 'protected_item_count: int | None'
