### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.TieringPolicy
name: TieringPolicy
fullName: azure.mgmt.recoveryservicesbackup.models.TieringPolicy
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Tiering Policy for a target tier. If the policy is not specified for a given
  target tier,

  service retains the existing configured tiering policy for that tier.'
constructor:
  syntax: 'TieringPolicy(*args: Any, **kwargs: Any)'
variables:
- description: "Tiering Mode to control automatic tiering of recovery points. Supported\n\
    values are:\n\n1. TierRecommended: Tier all recovery points recommended to be\
    \ tiered \n\n2. TierAfter: Tier all recovery points after a fixed period, as specified\
    \ in duration +\ndurationType below.\n3. DoNotTier: Do not tier any recovery points.\
    \ Known values are: \"Invalid\", \"TierRecommended\",\n\"TierAfter\", and \"DoNotTier\"\
    ."
  name: tiering_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.TieringMode>
- description: 'Number of days/weeks/months/years to retain backups in current tier
    before

    tiering. Used only if TieringMode is set to TierAfter.'
  name: duration
  types:
  - <xref:int>
- description: 'Retention duration type: days/weeks/months/years Used only if TieringMode

    is set to TierAfter. Known values are: "Invalid", "Days", "Weeks", "Months", and
    "Years".'
  name: duration_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.RetentionDurationType>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.TieringPolicy.duration
  name: duration
  summary: 'Number of days/weeks/months/years to retain backups in current tier before
    tiering. Used only

    if TieringMode is set to TierAfter.'
  signature: 'duration: int | None'
- uid: azure.mgmt.recoveryservicesbackup.models.TieringPolicy.duration_type
  name: duration_type
  summary: 'days/weeks/months/years Used only if TieringMode is set to TierAfter.

    Known values are: "Invalid", "Days", "Weeks", "Months", and "Years".'
  signature: 'duration_type: str | _models.RetentionDurationType | None'
- uid: azure.mgmt.recoveryservicesbackup.models.TieringPolicy.tiering_mode
  name: tiering_mode
  summary: "Tiering Mode to control automatic tiering of recovery points. Supported\
    \ values are:\n\n1. TierRecommended: Tier all recovery points recommended to be\
    \ tiered \n\n2. TierAfter: Tier all recovery points after a fixed period, as specified\
    \ in duration +\ndurationType below.\n3. DoNotTier: Do not tier any recovery points.\
    \ Known values are: \"Invalid\",\n\"TierRecommended\", \"TierAfter\", and \"DoNotTier\"\
    ."
  signature: 'tiering_mode: str | _models.TieringMode | None'
