### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer
name: DpmContainer
fullName: azure.mgmt.recoveryservicesbackup.models.DpmContainer
module: azure.mgmt.recoveryservicesbackup.models
summary: 'DPM workload-specific protection container.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureBackupServerContainer'
constructor:
  syntax: 'DpmContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. DPM_CONTAINER.'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.DPM_CONTAINER>
- description: Specifies whether the container is re-registrable.
  name: can_re_register
  types:
  - <xref:bool>
- description: ID of container.
  name: container_id
  types:
  - <xref:str>
- description: Number of protected items in the BackupEngine.
  name: protected_item_count
  types:
  - <xref:int>
- description: Backup engine Agent version.
  name: dpm_agent_version
  types:
  - <xref:str>
- description: List of BackupEngines protecting the container.
  name: dpm_servers
  types:
  - <xref:list>[<xref:str>]
- description: To check if upgrade available.
  name: upgrade_available
  types:
  - <xref:bool>
- description: Protection status of the container.
  name: protection_status
  types:
  - <xref:str>
- description: Extended Info of the container.
  name: extended_info
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.DPMContainerExtendedInfo>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.can_re_register
  name: can_re_register
  summary: Specifies whether the container is re-registrable.
  signature: 'can_re_register: bool | None'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.container_id
  name: container_id
  summary: ID of container.
  signature: 'container_id: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.container_type
  name: container_type
  summary: '1. Compute Azure VM is

    Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. DPM_CONTAINER.'
  signature: 'container_type: DPM_CONTAINER: ''DPMContainer''>]'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.dpm_agent_version
  name: dpm_agent_version
  summary: Backup engine Agent version.
  signature: 'dpm_agent_version: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.dpm_servers
  name: dpm_servers
  summary: List of BackupEngines protecting the container.
  signature: 'dpm_servers: list[str] | None'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.extended_info
  name: extended_info
  summary: Extended Info of the container.
  signature: 'extended_info: _models.DPMContainerExtendedInfo | None'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.protected_item_count
  name: protected_item_count
  summary: Number of protected items in the BackupEngine.
  signature: 'protected_item_count: int | None'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.protection_status
  name: protection_status
  summary: Protection status of the container.
  signature: 'protection_status: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.DpmContainer.upgrade_available
  name: upgrade_available
  summary: To check if upgrade available.
  signature: 'upgrade_available: bool | None'
