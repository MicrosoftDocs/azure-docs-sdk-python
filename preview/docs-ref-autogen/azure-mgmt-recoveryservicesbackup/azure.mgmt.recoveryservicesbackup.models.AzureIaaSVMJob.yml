  name: start_time
  types:
  - <xref:datetime.datetime>
- description: The end time.
  name: end_time
  types:
  - <xref:datetime.datetime>
- description: ActivityId of job.
  name: activity_id
  types:
  - <xref:str>
- description: Time elapsed during the execution of this job.
  name: duration
  types:
  - <xref:datetime.timedelta>
