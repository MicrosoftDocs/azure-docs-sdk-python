summary: AzureBackupServer (DPMVenus) workload-specific protection container.
constructor:
  syntax: 'AzureBackupServerContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
- description: Specifies whether the container is re-registrable.
  name: can_re_register
  types:
  - <xref:bool>
- description: ID of container.
  name: container_id
  types:
  - <xref:str>
- description: Number of protected items in the BackupEngine.
  name: protected_item_count
  types:
  - <xref:int>
- description: Backup engine Agent version.
  name: dpm_agent_version
  types:
  - <xref:str>
- description: List of BackupEngines protecting the container.
  name: dpm_servers
  types:
  - <xref:list>[<xref:str>]
- description: To check if upgrade available.
  name: upgrade_available
  types:
  - <xref:bool>
- description: Protection status of the container.
  name: protection_status
  types:
  - <xref:str>
- description: Extended Info of the container.
  name: extended_info
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.DPMContainerExtendedInfo>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. AZURE_BACKUP_SERVER_CONTAINER.'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.AZURE_BACKUP_SERVER_CONTAINER>
