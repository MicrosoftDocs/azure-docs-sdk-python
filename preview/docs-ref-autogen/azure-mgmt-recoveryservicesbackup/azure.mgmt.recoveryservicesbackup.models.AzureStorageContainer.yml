### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer
name: AzureStorageContainer
fullName: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer
module: azure.mgmt.recoveryservicesbackup.models
summary: Azure Storage Account workload-specific container.
constructor:
  syntax: 'AzureStorageContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
- description: Fully qualified ARM url.
  name: source_resource_id
  types:
  - <xref:str>
- description: Storage account version.
  name: storage_account_version
  types:
  - <xref:str>
- description: Resource group name of Recovery Services Vault.
  name: resource_group
  types:
  - <xref:str>
- description: Number of items backed up in this container.
  name: protected_item_count
  types:
  - <xref:int>
- description: 'Whether storage account lock is to be acquired for this

    container or not. Known values are: "Acquire" and "NotAcquire".'
  name: acquire_storage_account_lock
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.AcquireStorageAccountLock>
- description: 'Re-Do Operation. Known values are: "Invalid", "Register", "Reregister",

    and "Rehydrate".'
  name: operation_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.OperationType>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. STORAGE_CONTAINER.'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.STORAGE_CONTAINER>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer.acquire_storage_account_lock
  name: acquire_storage_account_lock
  summary: 'Whether storage account lock is to be acquired for this container or not.
    Known values are:

    "Acquire" and "NotAcquire".'
  signature: 'acquire_storage_account_lock: str | _models.AcquireStorageAccountLock
    | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer.container_type
  name: container_type
  summary: '1. Compute Azure VM is

    Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. STORAGE_CONTAINER.'
  signature: 'container_type: STORAGE_CONTAINER: ''StorageContainer''>]'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer.operation_type
  name: operation_type
  summary: '"Invalid", "Register", "Reregister", and

    "Rehydrate".'
  signature: 'operation_type: str | _models.OperationType | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer.protected_item_count
  name: protected_item_count
  summary: Number of items backed up in this container.
  signature: 'protected_item_count: int | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer.resource_group
  name: resource_group
  summary: Resource group name of Recovery Services Vault.
  signature: 'resource_group: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer.source_resource_id
  name: source_resource_id
  summary: Fully qualified ARM url.
  signature: 'source_resource_id: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.AzureStorageContainer.storage_account_version
  name: storage_account_version
  summary: Storage account version.
  signature: 'storage_account_version: str | None'
