  signature: 'item_id: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionIntent.policy_id
  name: policy_id
  summary: ID of the backup policy with which this item is backed up.
  signature: 'policy_id: str | None'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionIntent.protection_intent_item_type
  name: protection_intent_item_type
  summary: '"Invalid", "AzureResourceItem",

    "RecoveryServiceVaultItem", "AzureWorkloadContainerAutoProtectionIntent",

