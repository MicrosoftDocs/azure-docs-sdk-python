### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.ProtectionIntent
name: ProtectionIntent
fullName: azure.mgmt.recoveryservicesbackup.models.ProtectionIntent
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Base class for backup ProtectionIntent.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureResourceProtectionIntent, AzureWorkloadAutoProtectionIntent,

  AzureWorkloadContainerAutoProtectionIntent, AzureWorkloadSQLAutoProtectionIntent,

  AzureRecoveryServiceVaultProtectionIntent'
constructor:
  syntax: 'ProtectionIntent(*args: Any, **kwargs: Any)'
variables:
- description: 'backup protectionIntent type. Required. Known values are:

    "Invalid", "AzureResourceItem", "RecoveryServiceVaultItem",

    "AzureWorkloadContainerAutoProtectionIntent", "AzureWorkloadAutoProtectionIntent",
    and

    "AzureWorkloadSQLAutoProtectionIntent".'
  name: protection_intent_item_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectionIntentItemType>
- description: 'Type of backup management for the backed up item. Known values

    are: "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql",
    "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: ARM ID of the resource to be backed up.
  name: source_resource_id
  types:
  - <xref:str>
- description: 'ID of the item which is getting protected, In case of Azure Vm , it
    is

    ProtectedItemId.'
  name: item_id
  types:
  - <xref:str>
- description: ID of the backup policy with which this item is backed up.
  name: policy_id
  types:
  - <xref:str>
- description: 'Backup state of this backup item. Known values are: "Invalid",

    "NotProtected", "Protecting", "Protected", and "ProtectionFailed".'
  name: protection_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ProtectionStatus>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionIntent.backup_management_type
  name: backup_management_type
  summary: '"Invalid",

    "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  signature: 'backup_management_type: str | _models.BackupManagementType | None'
- uid: azure.mgmt.recoveryservicesbackup.models.ProtectionIntent.item_id
  name: item_id
  summary: ID of the item which is getting protected, In case of Azure Vm , it is
