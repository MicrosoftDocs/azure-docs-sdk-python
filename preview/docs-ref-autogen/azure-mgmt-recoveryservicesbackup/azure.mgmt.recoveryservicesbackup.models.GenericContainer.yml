### YamlMime:PythonClass
uid: azure.mgmt.recoveryservicesbackup.models.GenericContainer
name: GenericContainer
fullName: azure.mgmt.recoveryservicesbackup.models.GenericContainer
module: azure.mgmt.recoveryservicesbackup.models
summary: Base class for generic container of backup items.
constructor:
  syntax: 'GenericContainer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly name of the container.
  name: friendly_name
  types:
  - <xref:str>
- description: 'Type of backup management for the container. Known values are:

    "Invalid", "AzureIaasVM", "MAB", "DPM", "AzureBackupServer", "AzureSql", "AzureStorage",

    "AzureWorkload", and "DefaultBackup".'
  name: backup_management_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.BackupManagementType>
- description: 'Status of registration of the container with the Recovery Services

    Vault.'
  name: registration_status
  types:
  - <xref:str>
- description: Status of health of the container.
  name: health_status
  types:
  - <xref:str>
- description: Type of the protectable object associated with this container.
  name: protectable_object_type
  types:
  - <xref:str>
- description: Name of the container's fabric.
  name: fabric_name
  types:
  - <xref:str>
- description: Extended information (not returned in List container API calls).
  name: extended_information
  types:
  - <xref:azure.mgmt.recoveryservicesbackup.models.GenericContainerExtendedInfo>
- description: 'Type of the container. The value of this property for: 1. Compute
    Azure

    VM is Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. GENERIC_CONTAINER.'
  name: container_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.GENERIC_CONTAINER>
attributes:
- uid: azure.mgmt.recoveryservicesbackup.models.GenericContainer.container_type
  name: container_type
  summary: '1. Compute Azure VM is

    Microsoft.Compute/virtualMachines 2. Classic Compute Azure VM is

    Microsoft.ClassicCompute/virtualMachines 3. Windows machines (like MAB, DPM etc)
    is Windows 4.

    Azure SQL instance is AzureSqlContainer. 5. Storage containers is StorageContainer.
    6. Azure

    workload Backup is VMAppContainer. Required. GENERIC_CONTAINER.'
  signature: 'container_type: GENERIC_CONTAINER: ''GenericContainer''>]'
- uid: azure.mgmt.recoveryservicesbackup.models.GenericContainer.extended_information
  name: extended_information
  summary: Extended information (not returned in List container API calls).
  signature: 'extended_information: _models.GenericContainerExtendedInfo | None'
- uid: azure.mgmt.recoveryservicesbackup.models.GenericContainer.fabric_name
  name: fabric_name
  summary: Name of the container's fabric.
  signature: 'fabric_name: str | None'
