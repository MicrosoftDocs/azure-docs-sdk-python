uid: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadRecoveryPoint
name: AzureWorkloadRecoveryPoint
fullName: azure.mgmt.recoveryservicesbackup.models.AzureWorkloadRecoveryPoint
module: azure.mgmt.recoveryservicesbackup.models
summary: 'Workload specific recovery point, specifically encapsulates full/diff recovery
  point.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  AzureWorkloadPointInTimeRecoveryPoint, AzureWorkloadSAPAsePointInTimeRecoveryPoint,

  AzureWorkloadSAPAseRecoveryPoint, AzureWorkloadSAPHanaPointInTimeRecoveryPoint,

  AzureWorkloadSAPHanaRecoveryPoint, AzureWorkloadSQLPointInTimeRecoveryPoint,

  AzureWorkloadSQLRecoveryPoint'
constructor:
  syntax: 'AzureWorkloadRecoveryPoint(*args: Any, **kwargs: Any)'
variables:
- description: 'Threat status of the recovery point. Known values are: "Unknown",

    "Healthy", "UnHealthy", "Warning", and "NotAvailable".'
  name: threat_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.recoveryservicesbackup.models.ThreatStatus>
- description: Recovery point threat information.
  name: threat_info
  types:
  - <xref:list>[<xref:azure.mgmt.recoveryservicesbackup.models.ThreatInfo>]
- description: 'This property will be used as the discriminator for deciding the specific

    types in the polymorphic chain of types. Required. Default value is

    "AzureWorkloadRecoveryPoint".'
  name: object_type
  types:
  - <xref:str>
- description: UTC time at which recovery point was created.
  name: recovery_point_time_in_utc
  types:
  - <xref:datetime.datetime>
- description: 'Type of restore point. Known values are: "Invalid", "Full", "Log",
    "Differential",

    "Incremental", "SnapshotFull", and "SnapshotCopyOnlyFull".'
  name: type
