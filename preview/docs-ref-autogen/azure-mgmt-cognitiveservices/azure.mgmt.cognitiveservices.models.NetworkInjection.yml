### YamlMime:PythonClass
uid: azure.mgmt.cognitiveservices.models.NetworkInjection
name: NetworkInjection
fullName: azure.mgmt.cognitiveservices.models.NetworkInjection
module: azure.mgmt.cognitiveservices.models
summary: 'Specifies in AI Foundry where virtual network injection occurs to secure
  scenarios like Agents

  entirely within the user''s private network, eliminating public internet exposure
  while

  maintaining control over network configurations and resources.'
constructor:
  syntax: 'NetworkInjection(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies what features in AI Foundry network injection applies to.
    Currently

    only supports ''agent'' for agent scenarios. ''none'' means no network injection.
    Known values are:

    "none" and "agent".'
  name: scenario
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.ScenarioType>
- description: Specify the subnet for which your Agent Client is injected into.
  name: subnet_arm_id
  types:
  - <xref:str>
- description: 'Boolean to enable Microsoft Managed Network for subnet

    delegation.'
  name: use_microsoft_managed_network
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.cognitiveservices.models.NetworkInjection.scenario
  name: scenario
  summary: 'Specifies what features in AI Foundry network injection applies to. Currently
    only supports

    ''agent'' for agent scenarios. ''none'' means no network injection. Known values
    are: "none" and

    "agent".'
  signature: 'scenario: str | _models.ScenarioType | None'
- uid: azure.mgmt.cognitiveservices.models.NetworkInjection.subnet_arm_id
  name: subnet_arm_id
  summary: Specify the subnet for which your Agent Client is injected into.
  signature: 'subnet_arm_id: str | None'
- uid: azure.mgmt.cognitiveservices.models.NetworkInjection.use_microsoft_managed_network
  name: use_microsoft_managed_network
  summary: Boolean to enable Microsoft Managed Network for subnet delegation.
  signature: 'use_microsoft_managed_network: bool | None'
