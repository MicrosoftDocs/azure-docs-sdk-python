### YamlMime:PythonClass
uid: azure.mgmt.cognitiveservices.models.DeploymentRouting
name: DeploymentRouting
fullName: azure.mgmt.cognitiveservices.models.DeploymentRouting
module: azure.mgmt.cognitiveservices.models
summary: 'Routing configuration for the model-router deployment. Specifies how requests
  are routed across

  multiple models.'
constructor:
  syntax: 'DeploymentRouting(*args: Any, **kwargs: Any)'
variables:
- description: 'The model-router routing mode that determines how requests are distributed
    across

    models. Known values are: "cost", "balanced", and "quality".'
  name: mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.RoutingMode>
- description: 'Optional. The list of model-router supported models that the model
    router can use

    to route requests across. If not specified, the model router will route to all
    available models

    specified in the model-router version.'
  name: models
  types:
  - <xref:list>[<xref:azure.mgmt.cognitiveservices.models.DeploymentModel>]
attributes:
- uid: azure.mgmt.cognitiveservices.models.DeploymentRouting.mode
  name: mode
  summary: 'The model-router routing mode that determines how requests are distributed
    across models. Known

    values are: "cost", "balanced", and "quality".'
  signature: 'mode: str | _models.RoutingMode | None'
- uid: azure.mgmt.cognitiveservices.models.DeploymentRouting.models
  name: models
  summary: 'Optional. The list of model-router supported models that the model router
    can use to route

    requests across. If not specified, the model router will route to all available
    models

    specified in the model-router version.'
  signature: 'models: list[''_models.DeploymentModel''] | None'
