### YamlMime:PythonClass
uid: azure.mgmt.cognitiveservices.models.HostedAgentDeployment
name: HostedAgentDeployment
fullName: azure.mgmt.cognitiveservices.models.HostedAgentDeployment
module: azure.mgmt.cognitiveservices.models
summary: 'Represents a hosted agent deployment where the underlying infrastructure
  is owned by the

  platform.'
constructor:
  syntax: 'HostedAgentDeployment(*args: Any, **kwargs: Any)'
variables:
- description: The asset description text.
  name: description
  types:
  - <xref:str>
- description: Tag dictionary. Tags can be added, removed, and updated.
  name: tags
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: Gets or sets the display name of the deployment.
  name: display_name
  types:
  - <xref:str>
- description: Gets or sets the unique identifier of the deployment.
  name: deployment_id
  types:
  - <xref:str>
- description: 'Gets or sets the current operational state of the deployment (and,
    intrinsically,

    of the comprising agents). Known values are: "Starting", "Running", "Stopping",
    "Stopped",

    "Failed", "Deleting", "Deleted", and "Updating".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.AgentDeploymentState>
- description: 'Gets or sets the supported protocol types and versions exposed by
    this

    deployment.'
  name: protocols
  types:
  - <xref:list>[<xref:azure.mgmt.cognitiveservices.models.AgentProtocolVersion>]
- description: Returns a flat list of agent:version deployed in this deployment.
  name: agents
  types:
  - <xref:list>[<xref:azure.mgmt.cognitiveservices.models.VersionedAgentReference>]
- description: 'Gets or sets the provisioning state of the agent deployment. Known

    values are: "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.AgentDeploymentProvisioningState>
- description: Gets or sets the minimum number of replicas for this hosted deployment.
  name: min_replicas
  types:
  - <xref:int>
- description: Gets or sets the maximum number of replicas for this hosted deployment.
  name: max_replicas
  types:
  - <xref:int>
- description: 'Gets or sets the type of deployment for the agent. Required. The

    underlying infra is owned by the platform.'
  name: deployment_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.HOSTED>
attributes:
- uid: azure.mgmt.cognitiveservices.models.HostedAgentDeployment.deployment_type
  name: deployment_type
  summary: 'Gets or sets the type of deployment for the agent. Required. The underlying
    infra is owned by

    the platform.'
  signature: 'deployment_type: HOSTED: ''Hosted''>]'
- uid: azure.mgmt.cognitiveservices.models.HostedAgentDeployment.max_replicas
  name: max_replicas
  summary: Gets or sets the maximum number of replicas for this hosted deployment.
  signature: 'max_replicas: int | None'
- uid: azure.mgmt.cognitiveservices.models.HostedAgentDeployment.min_replicas
  name: min_replicas
  summary: Gets or sets the minimum number of replicas for this hosted deployment.
  signature: 'min_replicas: int | None'
