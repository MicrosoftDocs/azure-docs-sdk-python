summary: Managed Network settings for a cognitive services account.
constructor:
  syntax: 'ManagedNetworkSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Isolation mode for the managed network of a cognitive services account.

    Known values are: "Disabled", "AllowInternetOutbound", and "AllowOnlyApprovedOutbound".'
  name: isolation_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.IsolationMode>
- name: network_id
  types:
  - <xref:str>
