  types:
  - <xref:azure.mgmt.cognitiveservices.models.ManagedNetworkProvisionStatus>
- description: 'Firewall Sku used for FQDN Rules. Known values are: "Standard" and
    "Basic".'
  name: firewall_sku
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.FirewallSku>
