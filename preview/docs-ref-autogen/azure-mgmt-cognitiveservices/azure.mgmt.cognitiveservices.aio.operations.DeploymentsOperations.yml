- uid: azure.mgmt.cognitiveservices.aio.operations.DeploymentsOperations.pause
  name: pause
  summary: 'Pause a deployment.


    Pauses inferencing on a deployment by setting the deploymentState to ''Paused''
    (see

    #/definitions/DeploymentProperties/properties/deploymentState). Only Standard,

    DataZoneStandard, and GlobalStandard SKUs support this operation. Inference requests
    to the

    paused deployment endpoint will receive HTTP 423 (Locked). This operation is idempotent.'
  signature: 'async pause(resource_group_name: str, account_name: str, deployment_name:
    str, **kwargs: Any) -> Deployment'
  parameters:
  - name: resource_group_name
    description: 'The name of the resource group. The name is case insensitive.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: account_name
    description: The name of Cognitive Services account. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: deployment_name
    description: 'The name of the deployment associated with the Cognitive Services

      Account. Required.'
    isRequired: true
    types:
    - <xref:str>
  return:
    description: Deployment. The Deployment is compatible with MutableMapping
    types:
    - <xref:azure.mgmt.cognitiveservices.models.Deployment>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.mgmt.cognitiveservices.aio.operations.DeploymentsOperations.resume
  name: resume
  summary: 'Resume a deployment.


    Resumes inferencing on a previously paused deployment by setting the deploymentState
    to

    ''Running'' (see #/definitions/DeploymentProperties/properties/deploymentState).
    This operation

    is idempotent and can be safely called on already running deployments.'
  signature: 'async resume(resource_group_name: str, account_name: str, deployment_name:
