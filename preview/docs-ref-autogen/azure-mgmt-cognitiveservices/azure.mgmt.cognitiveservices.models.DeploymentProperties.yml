  name: parent_deployment_name
  types:
  - <xref:str>
- description: 'Specifies the deployment name that should serve requests when

    the request would have otherwise been throttled due to reaching current deployment
    throughput

    limit.'
  name: spillover_deployment_name
  types:
  - <xref:str>
- description: 'The service tier for the deployment. Determines the pricing and performance

    level for request processing. Use ''Default'' for standard pricing or ''Priority''
    for

    higher-priority processing with premium pricing. Note: Pause operations are only
    supported on

    Standard, DataZoneStandard, and GlobalStandard SKUs. Known values are: "Default"
    and

    "Priority".'
  name: service_tier
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.ServiceTier>
- description: 'The state of the deployment. Controls whether the deployment is

    accepting inference requests. Use ''Running'' for active deployments that process
    requests, or

    ''Paused'' to temporarily stop inference while preserving the deployment configuration.
    Known

    values are: "Running" and "Paused".'
  name: deployment_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.DeploymentState>
- description: 'Routing configuration for the model-router deployment. This property
    is only

    applicable when the deployed model is ''model-router'' version 2025-11-18 or later.
    Allows you to

    select the models subset for routing and the routing mode (balanced, quality,
    cost) for routing

    across all supported models or the model subset.'
  name: routing
  types:
  - <xref:azure.mgmt.cognitiveservices.models.DeploymentRouting>
