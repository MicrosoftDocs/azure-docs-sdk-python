### YamlMime:PythonClass
uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties
name: ManagedComputeDeploymentProperties
fullName: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties
module: azure.mgmt.cognitiveservices.models
summary: Properties of a Cognitive Services managed compute deployment.
constructor:
  syntax: 'ManagedComputeDeploymentProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'AzureML Registry model asset URI. Required on creation; immutable
    after creation.

    Example: azureml://registries/{registry}/models/{model}/versions/{version}. Required.'
  name: model
  types:
  - <xref:str>
- description: 'Deployment template identifier. Optional on creation. Accepts an

    AzureML Registry deployment template URI or a project-scoped deployment template
    path for

    VmManagedCompute. Examples:

    azureml://registries/{registry}/deploymenttemplates/{template}/versions/{version},

    projects/{project}/deploymentTemplates/{template}/versions/{version}.'
  name: deployment_template
  types:
  - <xref:str>
- description: 'Accelerator type (e.g., H100_80GB). Optional on creation; immutable

    after creation.'
  name: accelerator_type
  types:
  - <xref:str>
- description: 'Template auto-upgrade policy. Defaults to

    OnceNewDefaultVersionAvailable. Known values are: "OnceNewDefaultVersionAvailable",

    "OnceCurrentVersionExpired", and "NoAutoUpgrade".'
  name: version_upgrade_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.DeploymentModelVersionUpgradeOption>
- description: 'Foundry compute ARM resource ID for VM-backed managed compute deployments.

    Required when sku.name is VmManagedCompute; immutable after creation.'
  name: compute_id
  types:
  - <xref:str>
- description: 'Scheduling priority for VM-backed managed compute deployments. Immutable
    after

    creation.'
  name: priority
  types:
  - <xref:str>
- description: 'Read-only. Number of accelerators (GPUs) consumed by each

    model instance, sourced from the deployment template.'
  name: accelerators_per_instance
  types:
  - <xref:int>
- description: 'Read-only. Total accelerators allocated: sku.capacity (instances)
    x

    acceleratorsPerInstance.'
  name: total_accelerators
  types:
  - <xref:int>
- description: 'Read-only. Current provisioning state. Known values are: "Accepted",

    "Creating", "Deleting", "Moving", "Failed", "Succeeded", "Canceled", and "ResolvingDNS".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cognitiveservices.models.ProvisioningState>
- description: 'Read-only. Status message and timestamp from the last provisioning

    operation.'
  name: provisioning_details
  types:
  - <xref:azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProvisioningDetails>
- description: 'Read-only. Inference route paths relative to the account endpoint.
    Populated when

    provisioningState is Succeeded.'
  name: routes
  types:
  - <xref:azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentRoutes>
attributes:
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.accelerator_type
  name: accelerator_type
  summary: Accelerator type (e.g., H100_80GB). Optional on creation; immutable after
    creation.
  signature: 'accelerator_type: str | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.accelerators_per_instance
  name: accelerators_per_instance
  summary: 'Read-only. Number of accelerators (GPUs) consumed by each model instance,
    sourced from the

    deployment template.'
  signature: 'accelerators_per_instance: int | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.compute_id
  name: compute_id
  summary: 'Foundry compute ARM resource ID for VM-backed managed compute deployments.
    Required when

    sku.name is VmManagedCompute; immutable after creation.'
  signature: 'compute_id: str | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.deployment_template
  name: deployment_template
  summary: 'Deployment template identifier. Optional on creation. Accepts an AzureML
    Registry deployment

    template URI or a project-scoped deployment template path for VmManagedCompute.
    Examples:

    azureml://registries/{registry}/deploymenttemplates/{template}/versions/{version},

    projects/{project}/deploymentTemplates/{template}/versions/{version}.'
  signature: 'deployment_template: str | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.model
  name: model
  summary: 'AzureML Registry model asset URI. Required on creation; immutable after
    creation. Example:

    azureml://registries/{registry}/models/{model}/versions/{version}. Required.'
  signature: 'model: str'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.priority
  name: priority
  summary: Scheduling priority for VM-backed managed compute deployments. Immutable
    after creation.
  signature: 'priority: str | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.provisioning_details
  name: provisioning_details
  summary: Read-only. Status message and timestamp from the last provisioning operation.
  signature: 'provisioning_details: _models.ManagedComputeDeploymentProvisioningDetails
    | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.provisioning_state
  name: provisioning_state
  summary: '"Accepted", "Creating",

    "Deleting", "Moving", "Failed", "Succeeded", "Canceled", and "ResolvingDNS".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.routes
  name: routes
  summary: 'Read-only. Inference route paths relative to the account endpoint. Populated
    when

    provisioningState is Succeeded.'
  signature: 'routes: _models.ManagedComputeDeploymentRoutes | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.total_accelerators
  name: total_accelerators
  summary: sku.capacity (instances) x acceleratorsPerInstance.
  signature: 'total_accelerators: int | None'
- uid: azure.mgmt.cognitiveservices.models.ManagedComputeDeploymentProperties.version_upgrade_option
  name: version_upgrade_option
  summary: 'Template auto-upgrade policy. Defaults to OnceNewDefaultVersionAvailable.
    Known values are:

    "OnceNewDefaultVersionAvailable", "OnceCurrentVersionExpired", and "NoAutoUpgrade".'
  signature: 'version_upgrade_option: str | _models.DeploymentModelVersionUpgradeOption
    | None'
