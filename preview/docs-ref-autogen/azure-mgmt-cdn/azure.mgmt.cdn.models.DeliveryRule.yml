### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.DeliveryRule
name: DeliveryRule
fullName: azure.mgmt.cdn.models.DeliveryRule
module: azure.mgmt.cdn.models
summary: A rule that specifies a set of actions and conditions.
constructor:
  syntax: 'DeliveryRule(*args: Any, **kwargs: Any)'
variables:
- description: Name of the rule.
  name: name
  types:
  - <xref:str>
- description: 'The order in which the rules are applied for the endpoint. Possible
    values

    {0,1,2,3,.........}. A rule with a lesser order will be applied before a rule
    with a greater order.

    Rule with order 0 is a special rule. It does not require any condition and actions
    listed in it

    will always be applied. Required.'
  name: order
  types:
  - <xref:int>
- description: A list of conditions that must be matched for the actions to be executed.
  name: conditions
  types:
  - <xref:list>[<xref:azure.mgmt.cdn.models.DeliveryRuleCondition>]
- description: 'A list of actions that are executed when all the conditions of a rule
    are

    satisfied. Required.'
  name: actions
  types:
  - <xref:list>[<xref:azure.mgmt.cdn.models.DeliveryRuleAction>]
attributes:
- uid: azure.mgmt.cdn.models.DeliveryRule.actions
  name: actions
  summary: A list of actions that are executed when all the conditions of a rule are
    satisfied. Required.
  signature: 'actions: list[''_models.DeliveryRuleAction'']'
- uid: azure.mgmt.cdn.models.DeliveryRule.conditions
  name: conditions
  summary: A list of conditions that must be matched for the actions to be executed.
  signature: 'conditions: list[''_models.DeliveryRuleCondition''] | None'
- uid: azure.mgmt.cdn.models.DeliveryRule.name
  name: name
  summary: Name of the rule.
  signature: 'name: str | None'
- uid: azure.mgmt.cdn.models.DeliveryRule.order
  name: order
  summary: 'The order in which the rules are applied for the endpoint. Possible values
    {0,1,2,3,.........}. A

    rule with a lesser order will be applied before a rule with a greater order. Rule
    with order 0

    is a special rule. It does not require any condition and actions listed in it
    will always be

    applied. Required.'
  signature: 'order: int'
