### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.BatchRuleProperties
name: BatchRuleProperties
fullName: azure.mgmt.cdn.models.BatchRuleProperties
module: azure.mgmt.cdn.models
summary: The JSON object that contains a rule with its name for batch mode operations.
constructor:
  syntax: 'BatchRuleProperties(*args: Any, **kwargs: Any)'
variables:
- description: Name of the rule. Required.
  name: rule_name
  types:
  - <xref:str>
- description: The name of the rule set containing the rule.
  name: rule_set_name
  types:
  - <xref:str>
- description: 'The order in which the rules are applied for the endpoint. Possible
    values

    {0,1,2,3,.........}. A rule with a lesser order will be applied before a rule
    with a greater order.

    Rule with order 0 is a special rule. It does not require any condition and actions
    listed in it

    will always be applied.'
  name: order
  types:
  - <xref:int>
- description: A list of conditions that must be matched for the actions to be executed.
  name: conditions
  types:
  - <xref:list>[<xref:azure.mgmt.cdn.models.DeliveryRuleCondition>]
- description: 'A list of actions that are executed when all the conditions of a rule
    are

    satisfied.'
  name: actions
  types:
  - <xref:list>[<xref:azure.mgmt.cdn.models.DeliveryRuleAction>]
- description: 'If this rule is a match should the rules engine continue

    running the remaining rules or stop. If not present, defaults to Continue. Known
    values are:

    "Continue" and "Stop".'
  name: match_processing_behavior
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.MatchProcessingBehavior>
attributes:
- uid: azure.mgmt.cdn.models.BatchRuleProperties.actions
  name: actions
  summary: A list of actions that are executed when all the conditions of a rule are
    satisfied.
  signature: 'actions: list[''_models.DeliveryRuleAction''] | None'
- uid: azure.mgmt.cdn.models.BatchRuleProperties.conditions
  name: conditions
  summary: A list of conditions that must be matched for the actions to be executed.
  signature: 'conditions: list[''_models.DeliveryRuleCondition''] | None'
- uid: azure.mgmt.cdn.models.BatchRuleProperties.match_processing_behavior
  name: match_processing_behavior
  summary: 'If this rule is a match should the rules engine continue running the remaining
    rules or stop.

    If not present, defaults to Continue. Known values are: "Continue" and "Stop".'
  signature: 'match_processing_behavior: str | _models.MatchProcessingBehavior | None'
- uid: azure.mgmt.cdn.models.BatchRuleProperties.order
  name: order
  summary: 'The order in which the rules are applied for the endpoint. Possible values
    {0,1,2,3,.........}. A

    rule with a lesser order will be applied before a rule with a greater order. Rule
    with order 0

    is a special rule. It does not require any condition and actions listed in it
    will always be

    applied.'
  signature: 'order: int | None'
- uid: azure.mgmt.cdn.models.BatchRuleProperties.rule_name
  name: rule_name
  summary: Name of the rule. Required.
  signature: 'rule_name: str'
- uid: azure.mgmt.cdn.models.BatchRuleProperties.rule_set_name
  name: rule_set_name
  summary: The name of the rule set containing the rule.
  signature: 'rule_set_name: str | None'
