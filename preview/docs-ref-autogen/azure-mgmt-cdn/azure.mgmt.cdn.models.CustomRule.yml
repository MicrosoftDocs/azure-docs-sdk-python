### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.CustomRule
name: CustomRule
fullName: azure.mgmt.cdn.models.CustomRule
module: azure.mgmt.cdn.models
summary: Defines the common attributes for a custom rule that can be included in a
  waf policy.
constructor:
  syntax: 'CustomRule(*args: Any, **kwargs: Any)'
variables:
- description: Defines the name of the custom rule. Required.
  name: name
  types:
  - <xref:str>
- description: 'Describes if the custom rule is in enabled or disabled state. Defaults
    to

    Enabled if not specified. Known values are: "Disabled" and "Enabled".'
  name: enabled_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.CustomRuleEnabledState>
- description: 'Defines in what order this rule be evaluated in the overall list of
    custom

    rules. Required.'
  name: priority
  types:
  - <xref:int>
- description: List of match conditions. Required.
  name: match_conditions
  types:
  - <xref:list>[<xref:azure.mgmt.cdn.models.MatchCondition>]
- description: 'Describes what action to be applied when rule matches. Required. Known
    values

    are: "Allow", "Block", "Log", and "Redirect".'
  name: action
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.ActionType>
attributes:
- uid: azure.mgmt.cdn.models.CustomRule.action
  name: action
  summary: '"Allow",

    "Block", "Log", and "Redirect".'
  signature: 'action: str | _models.ActionType'
- uid: azure.mgmt.cdn.models.CustomRule.enabled_state
  name: enabled_state
  summary: 'Describes if the custom rule is in enabled or disabled state. Defaults
    to Enabled if not

    specified. Known values are: "Disabled" and "Enabled".'
  signature: 'enabled_state: str | _models.CustomRuleEnabledState | None'
- uid: azure.mgmt.cdn.models.CustomRule.match_conditions
  name: match_conditions
  summary: List of match conditions. Required.
  signature: 'match_conditions: list[''_models.MatchCondition'']'
- uid: azure.mgmt.cdn.models.CustomRule.name
  name: name
  summary: Defines the name of the custom rule. Required.
  signature: 'name: str'
- uid: azure.mgmt.cdn.models.CustomRule.priority
  name: priority
  summary: Defines in what order this rule be evaluated in the overall list of custom
    rules. Required.
  signature: 'priority: int'
