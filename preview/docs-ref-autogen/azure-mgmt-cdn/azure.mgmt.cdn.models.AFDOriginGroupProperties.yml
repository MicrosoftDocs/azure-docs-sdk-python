### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.AFDOriginGroupProperties
name: AFDOriginGroupProperties
fullName: azure.mgmt.cdn.models.AFDOriginGroupProperties
module: azure.mgmt.cdn.models
summary: The JSON object that contains the properties of the origin group.
constructor:
  syntax: 'AFDOriginGroupProperties(*args: Any, **kwargs: Any)'
variables:
- description: The name of the profile which holds the origin group.
  name: profile_name
  types:
  - <xref:str>
- description: Load balancing settings for a backend pool.
  name: load_balancing_settings
  types:
  - <xref:azure.mgmt.cdn.models.LoadBalancingSettingsParameters>
- description: 'Health probe settings to the origin that is used to determine the

    health of the origin.'
  name: health_probe_settings
  types:
  - <xref:azure.mgmt.cdn.models.HealthProbeParameters>
- description: 'Time in minutes to shift

    the traffic to the endpoint gradually when an unhealthy endpoint comes healthy
    or a new

    endpoint is added. Default is 10 mins. This property is currently not supported.'
  name: traffic_restoration_time_to_healed_or_new_endpoints_in_minutes
  types:
  - <xref:int>
- description: 'Whether to allow session affinity on this host. Valid options are

    ''Enabled'' or ''Disabled''. Known values are: "Enabled" and "Disabled".'
  name: session_affinity_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.EnabledState>
- description: Authentication settings for origin in origin group.
  name: authentication
  types:
  - <xref:azure.mgmt.cdn.models.OriginAuthenticationProperties>
- description: 'Provisioning status. Known values are: "Succeeded", "Failed",

    "Updating", "Deleting", and "Creating".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.AfdProvisioningState>
- description: 'Known values are: "NotStarted", "InProgress", "Succeeded", and

    "Failed".'
  name: deployment_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.DeploymentStatus>
attributes:
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.authentication
  name: authentication
  summary: Authentication settings for origin in origin group.
  signature: 'authentication: _models.OriginAuthenticationProperties | None'
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.deployment_status
  name: deployment_status
  summary: '"NotStarted", "InProgress", "Succeeded", and "Failed".'
  signature: 'deployment_status: str | _models.DeploymentStatus | None'
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.health_probe_settings
  name: health_probe_settings
  summary: Health probe settings to the origin that is used to determine the health
    of the origin.
  signature: 'health_probe_settings: _models.HealthProbeParameters | None'
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.load_balancing_settings
  name: load_balancing_settings
  summary: Load balancing settings for a backend pool.
  signature: 'load_balancing_settings: _models.LoadBalancingSettingsParameters | None'
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.profile_name
  name: profile_name
  summary: The name of the profile which holds the origin group.
  signature: 'profile_name: str | None'
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.provisioning_state
  name: provisioning_state
  summary: '"Succeeded", "Failed", "Updating", "Deleting",

    and "Creating".'
  signature: 'provisioning_state: str | _models.AfdProvisioningState | None'
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.session_affinity_state
  name: session_affinity_state
  summary: 'Whether to allow session affinity on this host. Valid options are ''Enabled''
    or ''Disabled''.

    Known values are: "Enabled" and "Disabled".'
  signature: 'session_affinity_state: str | _models.EnabledState | None'
- uid: azure.mgmt.cdn.models.AFDOriginGroupProperties.traffic_restoration_time_to_healed_or_new_endpoints_in_minutes
  name: traffic_restoration_time_to_healed_or_new_endpoints_in_minutes
  summary: 'Time in minutes to shift the traffic to the endpoint gradually when an
    unhealthy endpoint comes

    healthy or a new endpoint is added. Default is 10 mins. This property is currently
    not

    supported.'
  signature: 'traffic_restoration_time_to_healed_or_new_endpoints_in_minutes: int
    | None'
