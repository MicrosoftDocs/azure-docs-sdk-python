### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.CustomDomainProperties
name: CustomDomainProperties
fullName: azure.mgmt.cdn.models.CustomDomainProperties
module: azure.mgmt.cdn.models
summary: The JSON object that contains the properties of the custom domain to create.
constructor:
  syntax: 'CustomDomainProperties(*args: Any, **kwargs: Any)'
variables:
- description: The host name of the custom domain. Must be a domain name. Required.
  name: host_name
  types:
  - <xref:str>
- description: 'Resource status of the custom domain. Known values are: "Creating",

    "Active", and "Deleting".'
  name: resource_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.CustomDomainResourceState>
- description: 'Provisioning status of the custom domain. Known values

    are: "Enabling", "Enabled", "Disabling", "Disabled", and "Failed".'
  name: custom_https_provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.CustomHttpsProvisioningState>
- description: 'Provisioning substate shows the progress of custom

    HTTPS enabling/disabling process step by step. Known values are:

    "SubmittingDomainControlValidationRequest", "PendingDomainControlValidationREquestApproval",

    "DomainControlValidationRequestApproved", "DomainControlValidationRequestRejected",

    "DomainControlValidationRequestTimedOut", "IssuingCertificate", "DeployingCertificate",

    "CertificateDeployed", "DeletingCertificate", and "CertificateDeleted".'
  name: custom_https_provisioning_substate
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.CustomHttpsProvisioningSubstate>
- description: Certificate parameters for securing custom HTTPS.
  name: custom_https_parameters
  types:
  - <xref:azure.mgmt.cdn.models.CustomDomainHttpsParameters>
- description: 'Special validation or data may be required when delivering CDN to
    some

    regions due to local compliance reasons. E.g. ICP license number of a custom domain
    is required

    to deliver content in China.'
  name: validation_data
  types:
  - <xref:str>
- description: 'Provisioning status of Custom Https of the custom domain. Known

    values are: "Enabling", "Enabled", "Disabling", "Disabled", and "Failed".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.CustomHttpsProvisioningState>
attributes:
- uid: azure.mgmt.cdn.models.CustomDomainProperties.custom_https_parameters
  name: custom_https_parameters
  summary: Certificate parameters for securing custom HTTPS.
  signature: 'custom_https_parameters: _models.CustomDomainHttpsParameters | None'
- uid: azure.mgmt.cdn.models.CustomDomainProperties.custom_https_provisioning_state
  name: custom_https_provisioning_state
  summary: '"Enabling", "Enabled",

    "Disabling", "Disabled", and "Failed".'
  signature: 'custom_https_provisioning_state: str | _models.CustomHttpsProvisioningState
    | None'
- uid: azure.mgmt.cdn.models.CustomDomainProperties.custom_https_provisioning_substate
  name: custom_https_provisioning_substate
  summary: 'Provisioning substate shows the progress of custom HTTPS enabling/disabling
    process step by

    step. Known values are: "SubmittingDomainControlValidationRequest",

    "PendingDomainControlValidationREquestApproval", "DomainControlValidationRequestApproved",

    "DomainControlValidationRequestRejected", "DomainControlValidationRequestTimedOut",

    "IssuingCertificate", "DeployingCertificate", "CertificateDeployed",

    "DeletingCertificate", and "CertificateDeleted".'
  signature: 'custom_https_provisioning_substate: str | _models.CustomHttpsProvisioningSubstate
    | None'
- uid: azure.mgmt.cdn.models.CustomDomainProperties.host_name
  name: host_name
  summary: The host name of the custom domain. Must be a domain name. Required.
  signature: 'host_name: str'
- uid: azure.mgmt.cdn.models.CustomDomainProperties.provisioning_state
  name: provisioning_state
  summary: '"Enabling",

    "Enabled", "Disabling", "Disabled", and "Failed".'
  signature: 'provisioning_state: str | _models.CustomHttpsProvisioningState | None'
- uid: azure.mgmt.cdn.models.CustomDomainProperties.resource_state
  name: resource_state
  summary: '"Creating", "Active", and

    "Deleting".'
  signature: 'resource_state: str | _models.CustomDomainResourceState | None'
- uid: azure.mgmt.cdn.models.CustomDomainProperties.validation_data
  name: validation_data
  summary: 'Special validation or data may be required when delivering CDN to some
    regions due to local

    compliance reasons. E.g. ICP license number of a custom domain is required to
    deliver content

    in China.'
  signature: 'validation_data: str | None'
