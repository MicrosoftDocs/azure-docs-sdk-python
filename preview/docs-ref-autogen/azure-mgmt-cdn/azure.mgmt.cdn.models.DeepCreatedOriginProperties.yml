  signature: 'private_endpoint_status: str | _models.PrivateEndpointStatus | None'
- uid: azure.mgmt.cdn.models.DeepCreatedOriginProperties.private_link_alias
  name: private_link_alias
  summary: 'The Alias of the Private Link resource. Populating this optional field
    indicates that this

    origin is ''Private''.'
  signature: 'private_link_alias: str | None'
- uid: azure.mgmt.cdn.models.DeepCreatedOriginProperties.private_link_approval_message
  name: private_link_approval_message
  summary: A custom message to be included in the approval request to connect to the
