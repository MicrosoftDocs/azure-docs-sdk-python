### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.UrlRedirectActionParameters
name: UrlRedirectActionParameters
fullName: azure.mgmt.cdn.models.UrlRedirectActionParameters
module: azure.mgmt.cdn.models
summary: Defines the parameters for the url redirect action.
constructor:
  syntax: 'UrlRedirectActionParameters(*args: Any, **kwargs: Any)'
variables:
- description: 'The redirect type the rule will use when redirecting traffic. Required.

    Known values are: "Moved", "Found", "TemporaryRedirect", and "PermanentRedirect".'
  name: redirect_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.RedirectType>
- description: 'Protocol to use for the redirect. The default value is

    MatchRequest. Known values are: "MatchRequest", "Http", and "Https".'
  name: destination_protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.DestinationProtocol>
- description: 'The full path to redirect. Path cannot be empty and must start with
    /. Leave

    empty to use the incoming path as destination path.'
  name: custom_path
  types:
  - <xref:str>
- description: 'Host to redirect. Leave empty to use the incoming host as the

    destination host.'
  name: custom_hostname
  types:
  - <xref:str>
- description: 'The set of query strings to be placed in the redirect URL. Setting

    this value would replace any existing query string; leave empty to preserve the
    incoming query

    string. Query string must be in <key>=<value> format. ? and & will be added automatically
    so do

    not include them.'
  name: custom_query_string
  types:
  - <xref:str>
- description: 'Fragment to add to the redirect URL. Fragment is the part of the URL

    that comes after #. Do not include the #.'
  name: custom_fragment
  types:
  - <xref:str>
- description: Required. DELIVERY_RULE_URL_REDIRECT_ACTION_PARAMETERS.
  name: type_name
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.DELIVERY_RULE_URL_REDIRECT_ACTION_PARAMETERS>
attributes:
- uid: azure.mgmt.cdn.models.UrlRedirectActionParameters.custom_fragment
  name: custom_fragment
  summary: 'Fragment to add to the redirect URL. Fragment is the part of the URL that
    comes after #. Do not

    include the #.'
  signature: 'custom_fragment: str | None'
- uid: azure.mgmt.cdn.models.UrlRedirectActionParameters.custom_hostname
  name: custom_hostname
  summary: Host to redirect. Leave empty to use the incoming host as the destination
    host.
  signature: 'custom_hostname: str | None'
- uid: azure.mgmt.cdn.models.UrlRedirectActionParameters.custom_path
  name: custom_path
  summary: 'The full path to redirect. Path cannot be empty and must start with /.
    Leave empty to use the

    incoming path as destination path.'
  signature: 'custom_path: str | None'
- uid: azure.mgmt.cdn.models.UrlRedirectActionParameters.custom_query_string
  name: custom_query_string
  summary: 'The set of query strings to be placed in the redirect URL. Setting this
    value would replace any

    existing query string; leave empty to preserve the incoming query string. Query
    string must be

    in <key>=<value> format. ? and & will be added automatically so do not include
    them.'
  signature: 'custom_query_string: str | None'
- uid: azure.mgmt.cdn.models.UrlRedirectActionParameters.destination_protocol
  name: destination_protocol
  summary: 'Protocol to use for the redirect. The default value is MatchRequest. Known
    values are:

    "MatchRequest", "Http", and "Https".'
  signature: 'destination_protocol: str | _models.DestinationProtocol | None'
- uid: azure.mgmt.cdn.models.UrlRedirectActionParameters.redirect_type
  name: redirect_type
  summary: 'The redirect type the rule will use when redirecting traffic. Required.
    Known values are:

    "Moved", "Found", "TemporaryRedirect", and "PermanentRedirect".'
  signature: 'redirect_type: str | _models.RedirectType'
- uid: azure.mgmt.cdn.models.UrlRedirectActionParameters.type_name
  name: type_name
  summary: Required. DELIVERY_RULE_URL_REDIRECT_ACTION_PARAMETERS.
  signature: 'type_name: DELIVERY_RULE_URL_REDIRECT_ACTION_PARAMETERS: ''DeliveryRuleUrlRedirectActionParameters''>]'
