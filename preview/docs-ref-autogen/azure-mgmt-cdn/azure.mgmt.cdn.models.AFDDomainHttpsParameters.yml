  signature: 'cipher_suite_set_type: str | _models.AfdCipherSuiteSetType | None'
- uid: azure.mgmt.cdn.models.AFDDomainHttpsParameters.customized_cipher_suite_set
  name: customized_cipher_suite_set
  summary: 'Customized cipher suites object that will be used for Https when cipherSuiteSetType
    is

    Customized.'
  signature: 'customized_cipher_suite_set: _models.AFDDomainHttpsCustomizedCipherSuiteSet
