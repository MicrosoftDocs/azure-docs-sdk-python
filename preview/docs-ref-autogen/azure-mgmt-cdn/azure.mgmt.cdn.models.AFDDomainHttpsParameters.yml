### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.AFDDomainHttpsParameters
name: AFDDomainHttpsParameters
fullName: azure.mgmt.cdn.models.AFDDomainHttpsParameters
module: azure.mgmt.cdn.models
summary: The JSON object that contains the properties to secure a domain.
constructor:
  syntax: 'AFDDomainHttpsParameters(*args: Any, **kwargs: Any)'
variables:
- description: 'Defines the source of the SSL certificate. Required. Known values
    are:

    "CustomerCertificate", "ManagedCertificate", and "AzureFirstPartyManagedCertificate".'
  name: certificate_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.AfdCertificateType>
- description: 'cipher suite set type that will be used for Https. Known values

    are: "Customized", "TLS10_2019", "TLS12_2022", and "TLS12_2023".'
  name: cipher_suite_set_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.AfdCipherSuiteSetType>
- description: 'TLS protocol version that will be used for Https when

    cipherSuiteSetType is Customized. Known values are: "TLS10", "TLS12", and "TLS13".'
  name: minimum_tls_version
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.AfdMinimumTlsVersion>
- description: 'Customized cipher suites object that will be used for Https

    when cipherSuiteSetType is Customized.'
  name: customized_cipher_suite_set
  types:
  - <xref:azure.mgmt.cdn.models.AFDDomainHttpsCustomizedCipherSuiteSet>
- description: Resource reference to the secret. ie. subs/rg/profile/secret.
  name: secret
  types:
  - <xref:azure.mgmt.cdn.models.ResourceReference>
attributes:
