### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.RuleSetProperties
name: RuleSetProperties
fullName: azure.mgmt.cdn.models.RuleSetProperties
module: azure.mgmt.cdn.models
summary: The JSON object that contains the properties of the Rule Set to create.
constructor:
  syntax: 'RuleSetProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Provisioning status. Known values are: "Succeeded", "Failed",

    "Updating", "Deleting", and "Creating".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.AfdProvisioningState>
- description: 'Known values are: "NotStarted", "InProgress", "Succeeded", and

    "Failed".'
  name: deployment_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.DeploymentStatus>
- description: The name of the profile which holds the rule set.
  name: profile_name
  types:
  - <xref:str>
- description: 'Indicates whether rule set is in batch mode. When batch mode is enabled,

    rules will be processed in a batch along with the rule set. When batch mode is
    disabled, rules

    would need to be processed independently. This property can only be set during
    rule set

    creation and cannot be updated later. For switching modes, a new rule set needs
    to be created

    with the desired mode and rules need to be migrated to the new rule set.'
  name: batch_mode
  types:
  - <xref:bool>
- description: 'A list of rules that are part of this rule set provided the rule set
    is in batch

    mode. This property will be ignored if the rule set is not in batch mode.'
  name: rules
  types:
  - <xref:list>[<xref:azure.mgmt.cdn.models.BatchRuleProperties>]
attributes:
- uid: azure.mgmt.cdn.models.RuleSetProperties.batch_mode
  name: batch_mode
  summary: 'Indicates whether rule set is in batch mode. When batch mode is enabled,
    rules will be

    processed in a batch along with the rule set. When batch mode is disabled, rules
    would need to

    be processed independently. This property can only be set during rule set creation
    and cannot

    be updated later. For switching modes, a new rule set needs to be created with
    the desired mode

    and rules need to be migrated to the new rule set.'
  signature: 'batch_mode: bool | None'
- uid: azure.mgmt.cdn.models.RuleSetProperties.profile_name
  name: profile_name
  summary: The name of the profile which holds the rule set.
  signature: 'profile_name: str | None'
- uid: azure.mgmt.cdn.models.RuleSetProperties.rules
  name: rules
  summary: 'A list of rules that are part of this rule set provided the rule set is
    in batch mode. This

    property will be ignored if the rule set is not in batch mode.'
  signature: 'rules: list[''_models.BatchRuleProperties''] | None'
