- uid: azure.mgmt.cdn.models.AFDDomainProperties.pre_validated_custom_domain_resource_id
  name: pre_validated_custom_domain_resource_id
  summary: Resource reference to the Azure resource where custom domain ownership
    was prevalidated.
  signature: 'pre_validated_custom_domain_resource_id: _models.ResourceReference |
    None'
- uid: azure.mgmt.cdn.models.AFDDomainProperties.profile_name
  name: profile_name
  summary: The name of the profile which holds the domain.
