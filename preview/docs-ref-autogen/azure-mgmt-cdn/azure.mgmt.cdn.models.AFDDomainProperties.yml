  name: deployment_status
  summary: '"NotStarted", "InProgress", "Succeeded", and "Failed".'
  signature: 'deployment_status: str | _models.DeploymentStatus | None'
- uid: azure.mgmt.cdn.models.AFDDomainProperties.domain_validation_state
  name: domain_validation_state
  summary: 'Provisioning substate shows the progress of custom HTTPS enabling/disabling
    process step by

    step. DCV stands for DomainControlValidation. Known values are: "Unknown", "Submitting",

    "Pending", "Rejected", "TimedOut", "PendingRevalidation", "Approved",

    "RefreshingValidationToken", and "InternalError".'
  signature: 'domain_validation_state: str | _models.DomainValidationState | None'
- uid: azure.mgmt.cdn.models.AFDDomainProperties.extended_properties
  name: extended_properties
  summary: Key-Value pair representing migration properties for domains.
  signature: 'extended_properties: dict[str, str] | None'
- uid: azure.mgmt.cdn.models.AFDDomainProperties.host_name
  name: host_name
  summary: The host name of the domain. Must be a domain name. Required.
