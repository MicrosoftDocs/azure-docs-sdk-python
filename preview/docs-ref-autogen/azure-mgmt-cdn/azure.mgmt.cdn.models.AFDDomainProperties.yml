  signature: 'provisioning_state: str | _models.AfdProvisioningState | None'
- uid: azure.mgmt.cdn.models.AFDDomainProperties.tls_settings
  name: tls_settings
  summary: 'The configuration specifying how to enable HTTPS for the domain - using
    AzureFrontDoor managed

    certificate or user''s own certificate. If not specified, enabling ssl uses AzureFrontDoor

    managed certificate by default.'
  signature: 'tls_settings: _models.AFDDomainHttpsParameters | None'
