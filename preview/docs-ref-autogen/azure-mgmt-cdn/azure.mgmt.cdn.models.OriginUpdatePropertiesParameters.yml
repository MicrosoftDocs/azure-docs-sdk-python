### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters
name: OriginUpdatePropertiesParameters
fullName: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters
module: azure.mgmt.cdn.models
summary: The JSON object that contains the properties of the origin.
constructor:
  syntax: 'OriginUpdatePropertiesParameters(*args: Any, **kwargs: Any)'
variables:
- description: 'The address of the origin. Domain names, IPv4 addresses, and IPv6
    addresses

    are supported.This should be unique across all origins in an endpoint.'
  name: host_name
  types:
  - <xref:str>
- description: The value of the HTTP port. Must be between 1 and 65535.
  name: http_port
  types:
  - <xref:int>
- description: The value of the HTTPS port. Must be between 1 and 65535.
  name: https_port
  types:
  - <xref:int>
- description: 'The host header value sent to the origin with each request. If you

    leave this blank, the request hostname determines this value. Azure CDN origins,
    such as Web

    Apps, Blob Storage, and Cloud Services require this host header value to match
    the origin

    hostname by default. This overrides the host header defined at Endpoint.'
  name: origin_host_header
  types:
  - <xref:str>
- description: 'Priority of origin in given origin group for load balancing. Higher
    priorities

    will not be used for load balancing if any lower priority origin is healthy.Must
    be between 1

    and 5.'
  name: priority
  types:
  - <xref:int>
- description: 'Weight of the origin in given origin group for load balancing. Must
    be between 1

    and 1000.'
  name: weight
  types:
  - <xref:int>
- description: Origin is enabled for load balancing or not.
  name: enabled
  types:
  - <xref:bool>
- description: 'The Alias of the Private Link resource. Populating this optional

    field indicates that this origin is ''Private''.'
  name: private_link_alias
  types:
  - <xref:str>
- description: 'The Resource Id of the Private Link resource. Populating this

    optional field indicates that this backend is ''Private''.'
  name: private_link_resource_id
  types:
  - <xref:str>
- description: 'The location of the Private Link resource. Required only if

    ''privateLinkResourceId'' is populated.'
  name: private_link_location
  types:
  - <xref:str>
- description: 'A custom message to be included in the approval request to

    connect to the Private Link.'
  name: private_link_approval_message
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.enabled
  name: enabled
  summary: Origin is enabled for load balancing or not.
  signature: 'enabled: bool | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.host_name
  name: host_name
  summary: 'The address of the origin. Domain names, IPv4 addresses, and IPv6 addresses
    are supported.This

    should be unique across all origins in an endpoint.'
  signature: 'host_name: str | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.http_port
  name: http_port
  summary: The value of the HTTP port. Must be between 1 and 65535.
  signature: 'http_port: int | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.https_port
  name: https_port
  summary: The value of the HTTPS port. Must be between 1 and 65535.
  signature: 'https_port: int | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.origin_host_header
  name: origin_host_header
  summary: 'The host header value sent to the origin with each request. If you leave
    this blank, the

    request hostname determines this value. Azure CDN origins, such as Web Apps, Blob
    Storage, and

    Cloud Services require this host header value to match the origin hostname by
    default. This

    overrides the host header defined at Endpoint.'
  signature: 'origin_host_header: str | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.priority
  name: priority
  summary: 'Priority of origin in given origin group for load balancing. Higher priorities
    will not be used

    for load balancing if any lower priority origin is healthy.Must be between 1 and
    5.'
  signature: 'priority: int | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.private_link_alias
  name: private_link_alias
  summary: 'The Alias of the Private Link resource. Populating this optional field
    indicates that this

    origin is ''Private''.'
  signature: 'private_link_alias: str | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.private_link_approval_message
  name: private_link_approval_message
  summary: A custom message to be included in the approval request to connect to the
    Private Link.
  signature: 'private_link_approval_message: str | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.private_link_location
  name: private_link_location
  summary: 'The location of the Private Link resource. Required only if ''privateLinkResourceId''
    is

    populated.'
  signature: 'private_link_location: str | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.private_link_resource_id
  name: private_link_resource_id
  summary: 'The Resource Id of the Private Link resource. Populating this optional
    field indicates that

    this backend is ''Private''.'
  signature: 'private_link_resource_id: str | None'
- uid: azure.mgmt.cdn.models.OriginUpdatePropertiesParameters.weight
  name: weight
  summary: Weight of the origin in given origin group for load balancing. Must be
    between 1 and 1000.
  signature: 'weight: int | None'
