### YamlMime:PythonClass
uid: azure.mgmt.cdn.models.GeoFilter
name: GeoFilter
fullName: azure.mgmt.cdn.models.GeoFilter
module: azure.mgmt.cdn.models
summary: Rules defining user's geo access within a CDN endpoint.
constructor:
  syntax: 'GeoFilter(*args: Any, **kwargs: Any)'
variables:
- description: 'Relative path applicable to geo filter. (e.g. ''/mypictures'',

    ''/mypicture/kitty.jpg'', and etc.). Required.'
  name: relative_path
  types:
  - <xref:str>
- description: 'Action of the geo filter, i.e. allow or block access. Required. Known
    values are:

    "Block" and "Allow".'
  name: action
  types:
  - <xref:str>
  - <xref:azure.mgmt.cdn.models.GeoFilterActions>
- description: 'Two letter country or region codes defining user country or region
    access

    in a geo filter, e.g. AU, MX, US. Required.'
  name: country_codes
  types:
  - <xref:list>[<xref:str>]
attributes:
- uid: azure.mgmt.cdn.models.GeoFilter.action
  name: action
  summary: '"Block" and

    "Allow".'
  signature: 'action: str | _models.GeoFilterActions'
- uid: azure.mgmt.cdn.models.GeoFilter.country_codes
  name: country_codes
  summary: 'Two letter country or region codes defining user country or region access
    in a geo filter, e.g.

    AU, MX, US. Required.'
  signature: 'country_codes: list[str]'
- uid: azure.mgmt.cdn.models.GeoFilter.relative_path
  name: relative_path
  summary: 'Relative path applicable to geo filter. (e.g. ''/mypictures'', ''/mypicture/kitty.jpg'',
    and etc.).

    Required.'
  signature: 'relative_path: str'
