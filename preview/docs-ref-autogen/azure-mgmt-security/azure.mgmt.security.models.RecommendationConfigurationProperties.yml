  name: recommendation_type
  summary: '"IoT_ACRAuthentication",

    "IoT_AgentSendsUnutilizedMessages", "IoT_Baseline", "IoT_EdgeHubMemOptimize",

    "IoT_EdgeLoggingOptions", "IoT_InconsistentModuleSettings", "IoT_InstallAgent",

    "IoT_IPFilter_DenyAll", "IoT_IPFilter_PermissiveRule", "IoT_OpenPorts",

    "IoT_PermissiveFirewallPolicy", "IoT_PermissiveInputFirewallRules",

    "IoT_PermissiveOutputFirewallRules", "IoT_PrivilegedDockerOptions",

    "IoT_SharedCredentials", and "IoT_VulnerableTLSCipherSuite".'
  signature: 'recommendation_type: str | _models.RecommendationType'
- uid: azure.mgmt.security.models.RecommendationConfigurationProperties.status
  name: status
  summary: 'Recommendation status. When the recommendation status is disabled recommendations
    are not

    generated. Required. Known values are: "Disabled" and "Enabled".'
  signature: 'status: str | _models.RecommendationConfigStatus'
