    management scope).'
  signature: 'include_member_scopes: bool | None'
- uid: azure.mgmt.security.models.GovernanceRuleProperties.is_disabled
  name: is_disabled
  summary: Defines whether the rule is active/inactive.
  signature: 'is_disabled: bool | None'
- uid: azure.mgmt.security.models.GovernanceRuleProperties.is_grace_period
  name: is_grace_period
  summary: Defines whether there is a grace period on the governance rule.
  signature: 'is_grace_period: bool | None'
- uid: azure.mgmt.security.models.GovernanceRuleProperties.metadata
  name: metadata
  summary: The governance rule metadata.
  signature: 'metadata: _models.GovernanceRuleMetadata | None'
- uid: azure.mgmt.security.models.GovernanceRuleProperties.owner_source
  name: owner_source
  summary: The owner source for the governance rule - e.g. Manually by <xref:mailto:user@contoso.com>
