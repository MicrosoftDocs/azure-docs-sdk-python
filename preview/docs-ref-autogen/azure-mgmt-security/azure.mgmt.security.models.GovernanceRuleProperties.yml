  name: remediation_timeframe
  summary: 'Governance rule remediation timeframe - this is the time that will affect
    on the grace-period

    duration e.g. 7.00:00:00 - means 7 days.'
  signature: 'remediation_timeframe: str | None'
- uid: azure.mgmt.security.models.GovernanceRuleProperties.rule_priority
  name: rule_priority
  summary: 'The governance rule priority, priority to the lower number. Rules with
