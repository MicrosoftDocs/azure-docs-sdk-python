### YamlMime:PythonClass
uid: azure.mgmt.security.models.GovernanceRuleProperties
name: GovernanceRuleProperties
fullName: azure.mgmt.security.models.GovernanceRuleProperties
module: azure.mgmt.security.models
summary: Describes properties of an governance rule.
constructor:
  syntax: 'GovernanceRuleProperties(*args: Any, **kwargs: Any)'
variables:
- description: The tenantId (GUID).
  name: tenant_id
  types:
  - <xref:str>
- description: Display name of the governance rule. Required.
  name: display_name
  types:
  - <xref:str>
- description: Description of the governance rule.
  name: description
  types:
  - <xref:str>
- description: 'Governance rule remediation timeframe - this is the time that will

    affect on the grace-period duration e.g. 7.00:00:00 - means 7 days.'
  name: remediation_timeframe
  types:
  - <xref:str>
- description: Defines whether there is a grace period on the governance rule.
  name: is_grace_period
  types:
  - <xref:bool>
- description: 'The governance rule priority, priority to the lower number. Rules
    with the

    same priority on the same scope will not be allowed. Required.'
  name: rule_priority
  types:
  - <xref:int>
- description: Defines whether the rule is active/inactive.
  name: is_disabled
  types:
  - <xref:bool>
- description: 'The rule type of the governance rule, defines the source of the rule
    e.g.

    Integrated. Required. Known values are: "Integrated" and "ServiceNow".'
  name: rule_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.security.models.GovernanceRuleType>
- description: 'The governance rule source, what the rule affects, e.g.

    Assessments. Required. "Assessments"'
  name: source_resource_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.security.models.GovernanceRuleSourceResourceType>
- description: 'Excluded scopes, filter out the descendants of the scope (on management

    scopes).'
  name: excluded_scopes
  types:
  - <xref:list>[<xref:str>]
- description: The governance rule conditionSets - see examples. Required.
  name: condition_sets
  types:
  - <xref:list>[<xref:any>]
- description: 'Defines whether the rule is management scope rule (master

    connector as a single scope or management scope).'
  name: include_member_scopes
  types:
  - <xref:bool>
- description: 'The owner source for the governance rule - e.g. Manually by

    <xref:mailto:user@contoso.com> - see example. Required.'
  name: owner_source
  types:
  - <xref:azure.mgmt.security.models.GovernanceRuleOwnerSource>
- description: 'The email notifications settings for the governance rule,

    states whether to disable notifications for mangers and owners.'
  name: governance_email_notification
  types:
  - <xref:azure.mgmt.security.models.GovernanceRuleEmailNotification>
- description: The governance rule metadata.
  name: metadata
  types:
  - <xref:azure.mgmt.security.models.GovernanceRuleMetadata>
attributes:
