  signature: 'governance_email_notification: _models.GovernanceRuleEmailNotification
    | None'
- uid: azure.mgmt.security.models.GovernanceRuleProperties.include_member_scopes
  name: include_member_scopes
  summary: 'Defines whether the rule is management scope rule (master connector as
