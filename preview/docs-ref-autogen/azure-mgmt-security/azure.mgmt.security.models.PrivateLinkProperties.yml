### YamlMime:PythonClass
uid: azure.mgmt.security.models.PrivateLinkProperties
name: PrivateLinkProperties
fullName: azure.mgmt.security.models.PrivateLinkProperties
module: azure.mgmt.security.models
summary: 'Properties of a private link resource. These properties control the behavior
  and configuration

  of private endpoint connectivity to Defender services.'
constructor:
  syntax: 'PrivateLinkProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The current provisioning state of the private link resource.

    Indicates whether the resource is being created, updated, deleted, or has completed

    successfully. Known values are: "Succeeded", "Creating", "Updating", "Deleting",
    "Failed",

    "Canceled", and "InProgress".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.security.models.ProvisioningState>
- description: 'List of private endpoint connections associated with this

    private link. Each connection represents a private endpoint from a customer''s
    virtual network.'
  name: private_endpoint_connections
  types:
  - <xref:list>[<xref:azure.mgmt.security.models.PrivateEndpointConnection>]
- description: 'List of private link resources available for connection. For

    Defender services, this typically includes the ''containers'' group with ''api''
    and regional data

    endpoints.'
  name: private_link_resources
  types:
  - <xref:list>[<xref:azure.mgmt.security.models.PrivateLinkGroupResource>]
- description: 'This determines if traffic is allowed over public network. By

    default it is disabled. Known values are: "Enabled" and "Disabled".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.security.models.PublicNetworkAccess>
attributes:
- uid: azure.mgmt.security.models.PrivateLinkProperties.private_endpoint_connections
  name: private_endpoint_connections
  summary: 'List of private endpoint connections associated with this private link.
    Each connection

    represents a private endpoint from a customer''s virtual network.'
  signature: 'private_endpoint_connections: list[''_models.PrivateEndpointConnection'']
    | None'
- uid: azure.mgmt.security.models.PrivateLinkProperties.private_link_resources
  name: private_link_resources
  summary: 'List of private link resources available for connection. For Defender
    services, this typically

    includes the ''containers'' group with ''api'' and regional data endpoints.'
  signature: 'private_link_resources: list[''_models.PrivateLinkGroupResource''] |
    None'
- uid: azure.mgmt.security.models.PrivateLinkProperties.provisioning_state
  name: provisioning_state
  summary: 'The current provisioning state of the private link resource. Indicates
    whether the resource is

    being created, updated, deleted, or has completed successfully. Known values are:

    "Succeeded", "Creating", "Updating", "Deleting", "Failed", "Canceled", and

    "InProgress".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.security.models.PrivateLinkProperties.public_network_access
  name: public_network_access
  summary: 'This determines if traffic is allowed over public network. By default
