### YamlMime:PythonClass
uid: azure.mgmt.security.models.AutomationSource
name: AutomationSource
fullName: azure.mgmt.security.models.AutomationSource
module: azure.mgmt.security.models
summary: 'The source event types which evaluate the security automation set of rules.
  For example -

  security alerts and security assessments. To learn more about the supported security
  events

  data models schemas - please visit [https://aka.ms/ASCAutomationSchemas](https://aka.ms/ASCAutomationSchemas).'
constructor:
  syntax: 'AutomationSource(*args: Any, **kwargs: Any)'
variables:
- description: 'A valid event source type. Known values are: "Assessments",

    "AssessmentsSnapshot", "SubAssessments", "SubAssessmentsSnapshot", "Alerts", "SecureScores",

    "SecureScoresSnapshot", "SecureScoreControls", "SecureScoreControlsSnapshot",

    "RegulatoryComplianceAssessment", "RegulatoryComplianceAssessmentSnapshot", "AttackPaths",
    and

    "AttackPathsSnapshot".'
  name: event_source
  types:
  - <xref:str>
  - <xref:azure.mgmt.security.models.EventSource>
- description: 'A set of rules which evaluate upon event interception. A logical disjunction

    is applied between defined rule sets (logical ''or'').'
  name: rule_sets
  types:
  - <xref:list>[<xref:azure.mgmt.security.models.AutomationRuleSet>]
attributes:
- uid: azure.mgmt.security.models.AutomationSource.event_source
  name: event_source
  summary: '"Assessments", "AssessmentsSnapshot",

    "SubAssessments", "SubAssessmentsSnapshot", "Alerts", "SecureScores",

    "SecureScoresSnapshot", "SecureScoreControls", "SecureScoreControlsSnapshot",

    "RegulatoryComplianceAssessment", "RegulatoryComplianceAssessmentSnapshot",

    "AttackPaths", and "AttackPathsSnapshot".'
  signature: 'event_source: str | _models.EventSource | None'
- uid: azure.mgmt.security.models.AutomationSource.rule_sets
  name: rule_sets
  summary: 'A set of rules which evaluate upon event interception. A logical disjunction
    is applied between

    defined rule sets (logical ''or'').'
  signature: 'rule_sets: list[''_models.AutomationRuleSet''] | None'
