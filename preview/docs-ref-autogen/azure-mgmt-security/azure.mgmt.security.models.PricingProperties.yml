    security capabilities, while the free tier offers basic security features. Required.
    Known

    values are: "Free" and "Standard".'
  signature: 'pricing_tier: str | _models.PricingTier'
- uid: azure.mgmt.security.models.PricingProperties.replaced_by
  name: replaced_by
  summary: 'Optional. List of plans that replace this plan. This property exists only
