    resource-level pricing.'
  signature: 'inherited_from: str | None'
- uid: azure.mgmt.security.models.PricingProperties.pricing_tier
  name: pricing_tier
  summary: 'Indicates whether the Defender plan is enabled on the selected scope.
    Microsoft Defender for

    Cloud is provided in two pricing tiers: free and standard. The standard tier offers
