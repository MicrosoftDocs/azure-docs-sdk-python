    deprecated.'
  signature: 'replaced_by: list[str] | None'
- uid: azure.mgmt.security.models.PricingProperties.resources_coverage_status
  name: resources_coverage_status
  summary: 'This field is available for subscription-level only, and reflects the
    coverage status of the

    resources under the subscription. Please note: The "pricingTier" field reflects
    the plan

    status of the subscription. However, since the plan status can also be defined
    at the resource

    level, there might be misalignment between the subscription''s plan status and
    the resource

    status. This field helps indicate the coverage status of the resources. Known
    values are:

    "FullyCovered", "PartiallyCovered", and "NotCovered".'
  signature: 'resources_coverage_status: str | _models.ResourcesCoverageStatus | None'
- uid: azure.mgmt.security.models.PricingProperties.sub_plan
  name: sub_plan
  summary: 'The sub-plan selected for a Standard pricing configuration, when more
    than one sub-plan is

    available. Each sub-plan enables a set of security features. When not specified,
    full plan is

    applied. For VirtualMachines plan, available sub plans are ''P1'' & ''P2'', where
    for resource

    level only ''P1'' sub plan is supported.'
  signature: 'sub_plan: str | None'
