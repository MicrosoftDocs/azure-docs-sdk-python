    This field is only available for subscription-level pricing. Known values are:
    "False" and

    "True".'
  signature: 'enforce: str | _models.Enforce | None'
- uid: azure.mgmt.security.models.PricingProperties.extensions
  name: extensions
  summary: Optional. List of extensions offered under a plan.
  signature: 'extensions: list[''_models.Extension''] | None'
- uid: azure.mgmt.security.models.PricingProperties.free_trial_remaining_time
  name: free_trial_remaining_time
  summary: 'The duration left for the subscriptions free trial period - in ISO 8601
    format (e.g.

    P3Y6M4DT12H30M5S).'
  signature: 'free_trial_remaining_time: timedelta | None'
- uid: azure.mgmt.security.models.PricingProperties.inherited
  name: inherited
  summary: '"inherited" = "True" indicates that the current scope inherits its pricing
    configuration

    from its parent. The ID of the parent scope that provides the inherited configuration
    is

    displayed in the "inheritedFrom" field. On the other hand, "inherited" = "False"

    indicates that the current scope has its own pricing configuration explicitly
    set, and does not

    inherit from its parent. This field is read only and available only for resource-level
    pricing.

    Known values are: "True" and "False".'
  signature: 'inherited: str | _models.Inherited | None'
- uid: azure.mgmt.security.models.PricingProperties.inherited_from
  name: inherited_from
  summary: 'The id of the scope inherited from. "Null" if not inherited. This field
