### YamlMime:PythonClass
uid: azure.mgmt.security.models.OnUploadFilters
name: OnUploadFilters
fullName: azure.mgmt.security.models.OnUploadFilters
module: azure.mgmt.security.models
summary: 'Optional. Determine which blobs get scanned by On Upload malware scanning.
  An Or operation is

  performed between each filter type.'
constructor:
  syntax: 'OnUploadFilters(*args: Any, **kwargs: Any)'
variables:
- description: 'Optional. A list of prefixes to exclude from on-upload malware

    scanning. Format: `container-name/blob-name` (start with the container name; do
    not include

    the storage account name). Exclude entire containers: Use prefix of container
    names you want to

    exclude without a trailing `/`. Exclude a single container: Add a trailing slash
    `/` after

    the container name to avoid excluding other containers with similar prefixes.'
  name: exclude_blobs_with_prefix
  types:
  - <xref:list>[<xref:str>]
- description: 'Optional. A list of suffixes to exclude from on-upload malware

    scanning. Suffixes match only the end of blob names, and should be used for file
    extensions or

    blob name endings only.'
  name: exclude_blobs_with_suffix
  types:
  - <xref:list>[<xref:str>]
- description: 'Optional. Specifies the maximum size in bytes for blobs to be

    scanned. This parameter accepts a single positive integer value. Blobs larger
    than this value

    will be excluded from scanning.'
  name: exclude_blobs_larger_than
  types:
  - <xref:any>
attributes:
- uid: azure.mgmt.security.models.OnUploadFilters.exclude_blobs_larger_than
  name: exclude_blobs_larger_than
  summary: 'Optional. Specifies the maximum size in bytes for blobs to be scanned.
    This parameter accepts a

    single positive integer value. Blobs larger than this value will be excluded from
    scanning.'
  signature: 'exclude_blobs_larger_than: Any | None'
- uid: azure.mgmt.security.models.OnUploadFilters.exclude_blobs_with_prefix
  name: exclude_blobs_with_prefix
  summary: 'Optional. A list of prefixes to exclude from on-upload malware scanning.
    Format:

    `container-name/blob-name` (start with the container name; do not include the
    storage account

    name). Exclude entire containers: Use prefix of container names you want to exclude
    without a

    trailing `/`. Exclude a single container: Add a trailing slash `/` after the container
    name

    to avoid excluding other containers with similar prefixes.'
  signature: 'exclude_blobs_with_prefix: list[str] | None'
- uid: azure.mgmt.security.models.OnUploadFilters.exclude_blobs_with_suffix
  name: exclude_blobs_with_suffix
  summary: 'Optional. A list of suffixes to exclude from on-upload malware scanning.
    Suffixes match only

    the end of blob names, and should be used for file extensions or blob name endings
    only.'
  signature: 'exclude_blobs_with_suffix: list[str] | None'
