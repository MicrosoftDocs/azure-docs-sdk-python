  name: additional_extension_properties
  summary: Property values associated with the extension.
  signature: 'additional_extension_properties: dict[str, Any] | None'
- uid: azure.mgmt.security.models.Extension.is_enabled
  name: is_enabled
  summary: '"True" and "False".'
  signature: 'is_enabled: str | _models.IsEnabled'
