  - <xref:datetime.datetime>
- description: 'The resource count of the given subscription for which the Compliance

    calculation was conducted (needed for Management Group Compliance calculation).'
  name: resource_count
  types:
  - <xref:int>
- description: An array of segment, which is the actually the compliance assessment.
  name: assessment_result
