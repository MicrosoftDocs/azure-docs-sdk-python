summary: 'The Compliance score (percentage) of a Subscription is a sum of all Resources''
  Compliances

  under the given Subscription. A Resource Compliance is defined as the compliant
  (''healthy'')

  Policy Definitions out of all Policy Definitions applicable to a given resource.'
