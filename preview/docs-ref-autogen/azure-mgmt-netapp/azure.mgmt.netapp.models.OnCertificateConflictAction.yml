### YamlMime:PythonEnum
uid: azure.mgmt.netapp.models.OnCertificateConflictAction
name: OnCertificateConflictAction
fullName: azure.mgmt.netapp.models.OnCertificateConflictAction
summary: 'This action is triggered when a certificate conflict occurs. A conflict
  arises if you try to

  create a new bucket while one or more already exist on the server, or if you update
  a bucket

  when multiple buckets are present. This happens because a single certificate is
  shared among

  all buckets on the same server.


  Note: This applies both to certificates provided directly via the certificateObject
  property

  and to those retrieved from Azure Key Vault. Details for the latter case are specified
  in the

  akvDetails.certificateAkvDetails section.'
module: azure.mgmt.netapp.models
fields:
- name: FAIL
  uid: azure.mgmt.netapp.models.OnCertificateConflictAction.FAIL
- name: UPDATE
  uid: azure.mgmt.netapp.models.OnCertificateConflictAction.UPDATE
