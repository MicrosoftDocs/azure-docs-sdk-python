### YamlMime:PythonClass
uid: azure.mgmt.netapp.models.AzureKeyVaultDetails
name: AzureKeyVaultDetails
fullName: azure.mgmt.netapp.models.AzureKeyVaultDetails
module: azure.mgmt.netapp.models
summary: 'Specifies the Azure Key Vault settings. These are used when

  a) retrieving the bucket server certificate, and

  b) storing the bucket credentials


  Notes:


  1. If a bucket certificate was previously provided directly using the certificateObject

  property, it is possible to subsequently use the Azure Key Vault for certificate
  management by

  using these ''akvDetails'' properties. However, once Azure Key Vault is configured,
  it is no

  longer possible to provide the certificate directly via the certificateObject property.


  2. These properties are mutually exclusive with the server.certificateObject property.'
constructor:
  syntax: 'AzureKeyVaultDetails(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the Azure Key Vault settings for retrieving the bucket

    server certificate.'
  name: certificate_akv_details
  types:
  - <xref:azure.mgmt.netapp.models.CertificateAkvDetails>
- description: 'Specifies the Azure Key Vault settings for storing the bucket

    credentials.'
  name: credentials_akv_details
  types:
  - <xref:azure.mgmt.netapp.models.CredentialsAkvDetails>
attributes:
- uid: azure.mgmt.netapp.models.AzureKeyVaultDetails.certificate_akv_details
  name: certificate_akv_details
  summary: Specifies the Azure Key Vault settings for retrieving the bucket server
    certificate.
  signature: 'certificate_akv_details: _models.CertificateAkvDetails | None'
- uid: azure.mgmt.netapp.models.AzureKeyVaultDetails.credentials_akv_details
  name: credentials_akv_details
  summary: Specifies the Azure Key Vault settings for storing the bucket credentials.
  signature: 'credentials_akv_details: _models.CredentialsAkvDetails | None'
