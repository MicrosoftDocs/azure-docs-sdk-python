### YamlMime:PythonClass
uid: azure.mgmt.netapp.models.QuotaReportFilterRequest
name: QuotaReportFilterRequest
fullName: azure.mgmt.netapp.models.QuotaReportFilterRequest
module: azure.mgmt.netapp.models
summary: 'Quota report filters. When filtering by quotaType or quotaTarget, both properties
  must be

  supplied together. This constraint is enforced by the service/API at runtime, and
  requests

  violating this rule will return a validation error. The usageThresholdPercentage
  filter is

  independent and can be used alone or in combination with quotaType and quotaTarget
  to further

  refine results.'
constructor:
  syntax: 'QuotaReportFilterRequest(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of quota. If provided, quotaTarget must also be specified. The
    quotaType

    and quotaTarget properties are optional, but when filtering by quota type, quotaType
    and

    quotaTarget must be supplied together. Service/API will return an error if only
    one is

    provided. Known values are: "DefaultUserQuota", "DefaultGroupQuota", "IndividualUserQuota",
    and

    "IndividualGroupQuota".'
  name: quota_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.netapp.models.QuotaType>
- description: 'UserID/GroupID/SID based on the quota target type. UserID and groupID
    can

    be found by running ''id'' or ''getent'' command for the user or group and SID
    can be found by

    running <wmic useraccount where name=''user-name'' get sid>. If provided, quotaType
    must also be

    specified. The quotaType and quotaTarget properties are optional, but when filtering
    by quota

    target, quotaType and quotaTarget must be supplied together. Service/API will
    return an error

    if only one is provided.'
  name: quota_target
  types:
  - <xref:str>
- description: 'The usageThresholdPercentage filter takes the usage threshold

    percentage and returns records where the usage is greater than or equal to the
    input value.

    This is an optional property.'
  name: usage_threshold_percentage
  types:
  - <xref:int>
attributes:
