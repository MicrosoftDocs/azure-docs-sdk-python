    generated for SMB share, using this FQDN, SMB Share will be mounted on Entra Joined
    VM.

    Required.'
  name: server_name_prefix
  types:
  - <xref:str>
- description: 'Using AKV config, certificate will be fetched, which will contain

    private key & public certificate, that correspond to the public certificate which
    is uploaded

    on the application created by customer. This will be used further for authentication.'
