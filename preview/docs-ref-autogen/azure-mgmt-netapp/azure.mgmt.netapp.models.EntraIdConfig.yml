name: EntraIdConfig
fullName: azure.mgmt.netapp.models.EntraIdConfig
module: azure.mgmt.netapp.models
summary: Entra ID configuration for the account.
constructor:
  syntax: 'EntraIdConfig(*args: Any, **kwargs: Any)'
variables:
- description: 'ApplicationId of the app created by customer to provide authentication

    and required API permissions for Microsoft Graph endpoint. Required.'
  name: application_id
  types:
  - <xref:str>
- description: 'Domain of the Active directory synced to Entra ID for hybrid identities.

    Required.'
  name: domain
  types:
  - <xref:str>
