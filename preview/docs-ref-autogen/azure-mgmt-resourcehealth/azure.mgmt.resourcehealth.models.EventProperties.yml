### YamlMime:PythonClass
uid: azure.mgmt.resourcehealth.models.EventProperties
name: EventProperties
fullName: azure.mgmt.resourcehealth.models.EventProperties
module: azure.mgmt.resourcehealth.models
summary: Properties of event.
constructor:
  syntax: 'EventProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of event. Known values are: "ServiceIssue", "PlannedMaintenance",

    "HealthAdvisory", "RCA", "EmergingIssues", "SecurityAdvisory", and "Billing".'
  name: event_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.resourcehealth.models.EventTypeValues>
- description: 'Sub-type of event. Known values are: "Retirement",

    "ForeignExchangeRateChange", "Underbilling", "Overbilling", "PriceChanges", "TaxChanges",

    "MeterIDChanges", and "UnauthorizedPartyAbuse".'
  name: event_sub_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.resourcehealth.models.EventSubTypeValues>
- description: 'Source of event. Known values are: "ResourceHealth" and "ServiceHealth".'
  name: event_source
  types:
  - <xref:str>
  - <xref:azure.mgmt.resourcehealth.models.EventSourceValues>
- description: 'Current status of event. Known values are: "Active" and "Resolved".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.resourcehealth.models.EventStatusValues>
- description: Title text of event.
  name: title
  types:
  - <xref:str>
- description: 'Summary text of event. Use fetchEventDetails endpoint to get summary
    of

    sensitive events.'
  name: summary
  types:
  - <xref:str>
- description: Header text of event.
  name: header
  types:
  - <xref:str>
- description: 'Level of insight. Known values are: "Critical" and "Warning".'
  name: level
  types:
  - <xref:str>
  - <xref:azure.mgmt.resourcehealth.models.LevelValues>
- description: 'Level of event. Known values are: "Critical", "Error", "Warning",
    and

    "Informational".'
  name: event_level
  types:
  - <xref:str>
  - <xref:azure.mgmt.resourcehealth.models.EventLevelValues>
- description: 'If true the event may contains sensitive data. Use the post

    events/{trackingId}/fetchEventDetails endpoint to fetch sensitive data see

    [https://learn.microsoft.com/en-us/azure/service-health/security-advisories-elevated-access](https://learn.microsoft.com/en-us/azure/service-health/security-advisories-elevated-access).'
  name: is_event_sensitive
  types:
  - <xref:bool>
- description: The id of the Incident.
  name: external_incident_id
  types:
  - <xref:str>
- description: The reason for the Incident.
  name: reason
  types:
  - <xref:str>
- description: Article of event.
  name: article
  types:
  - <xref:azure.mgmt.resourcehealth.models.EventPropertiesArticle>
- description: Useful links of event.
  name: links
  types:
  - <xref:list>[<xref:azure.mgmt.resourcehealth.models.Link>]
- description: It provides the Timestamp for when the health impacting event started.
  name: impact_start_time
  types:
  - <xref:datetime.datetime>
- description: 'It provides the Timestamp for when the health impacting event

    resolved.'
  name: impact_mitigation_time
  types:
  - <xref:datetime.datetime>
- description: List services impacted by the service health event.
  name: impact
  types:
  - <xref:list>[<xref:azure.mgmt.resourcehealth.models.Impact>]
- description: Recommended actions of event.
  name: recommended_actions
  types:
  - <xref:azure.mgmt.resourcehealth.models.EventPropertiesRecommendedActions>
- description: Frequently asked questions for the service health event.
  name: faqs
  types:
  - <xref:list>[<xref:azure.mgmt.resourcehealth.models.Faq>]
- description: It provides information if the event is High incident rate event or
    not.
  name: is_hir
  types:
  - <xref:bool>
- description: 'Tells if we want to enable or disable Microsoft Support for

    this event.'
  name: enable_microsoft_support
  types:
  - <xref:bool>
- description: 'Contains the communication message for the event, that could include

    summary, root cause and other details. Use fetchEventDetails endpoint to get description
    of

    sensitive events.'
  name: description
  types:
  - <xref:str>
- description: Is true if the event is platform initiated.
  name: platform_initiated
  types:
  - <xref:bool>
- description: 'Tells if we want to enable or disable Microsoft Support for this

    event.'
  name: enable_chat_with_us
  types:
  - <xref:bool>
- description: 'Priority level of the event. Has value from 0 to 23. 0 is the highest
    priority.

    Service issue events have higher priority followed by planned maintenance and
    health advisory.

    Critical events have higher priority followed by error, warning and informational.
    Furthermore,

    active events have higher priority than resolved.'
  name: priority
  types:
  - <xref:int>
- description: 'It provides the Timestamp for when the health impacting event was
    last

    updated.'
  name: last_update_time
  types:
  - <xref:datetime.datetime>
- description: Stage for HIR Document.
  name: hir_stage
  types:
  - <xref:str>
- description: Additional information.
  name: additional_information
  types:
  - <xref:azure.mgmt.resourcehealth.models.EventPropertiesAdditionalInformation>
- description: duration in seconds.
  name: duration
  types:
  - <xref:int>
- description: The type of the impact.
  name: impact_type
  types:
  - <xref:str>
- description: "A list of metadata tags associated with the event. Possible values\
    \ include:\n-Action Recommended: Action may be required by you to avoid possible\
    \ disruptions or mitigate\nrisks for your services. It is recommended to evaluate\
    \ these actions and the potential impact\non your services.\n\n* False Positive:\
    \ After investigation, we've determined your service is healthy and service issues\
    \ did not impact your services as originally communicated. \n\n* Preliminary PIR:\
    \ For our largest, most impactful service issues a Preliminary Post Incident Review\
    \ (PIR) is published generally within 72 hours of mitigation, to summarize what\
    \ we have learned so far from the still-in-progress investigation. \n\n* Final\
    \ PIR: For service issues, a Final Post Incident Review (PIR) may be published\
    \ to provide additional details or learnings. Sometimes this requires us to complete\
    \ an internal retrospective, generally within 14 days of mitigation."
  name: event_tags
  types:
  - <xref:list>[<xref:str>]
- description: Billing rate change information - new rate.
  name: new_rate
  types:
  - <xref:float>
- description: Billing rate change information - old rate.
  name: old_rate
  types:
  - <xref:float>
- description: 'Billing currency type information. Example: USD, CAD.'
  name: currency_type
  types:
  - <xref:str>
- description: Billing identifier information.
  name: billing_id
  types:
  - <xref:str>
