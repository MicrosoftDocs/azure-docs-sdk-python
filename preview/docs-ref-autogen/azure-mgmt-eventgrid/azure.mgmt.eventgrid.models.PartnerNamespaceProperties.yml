### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties
name: PartnerNamespaceProperties
fullName: azure.mgmt.eventgrid.models.PartnerNamespaceProperties
module: azure.mgmt.eventgrid.models
summary: Properties of the partner namespace.
constructor:
  syntax: 'PartnerNamespaceProperties(*args: Any, **kwargs: Any)'
variables:
- description: List of private endpoint connections.
  name: private_endpoint_connections
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.PrivateEndpointConnection>]
- description: 'Provisioning state of the partner namespace. Known values are:

    "Creating", "Updating", "Deleting", "Succeeded", "Canceled", and "Failed".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PartnerNamespaceProvisioningState>
- description: 'The fully qualified ARM Id of the partner

    registration that should be associated with this partner namespace. This takes
    the following

    format:

    /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.EventGrid/partnerRegistrations/{partnerRegistrationName}.'
  name: partner_registration_fully_qualified_id
  types:
  - <xref:str>
- description: 'Minimum TLS version of the publisher allowed to publish to

    this partner namespace. Known values are: "1.0", "1.1", and "1.2".'
  name: minimum_tls_version_allowed
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.TlsVersion>
- description: Endpoint for the partner namespace.
  name: endpoint
  types:
  - <xref:str>
- description: 'This determines if traffic is allowed over public network. By

    default it is enabled. You can further restrict to specific IPs by configuring
    <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.PartnerNamespaceProperties.InboundIpRules"

    />. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PublicNetworkAccess>
- description: 'This can be used to restrict traffic from specific IPs instead of
    all

    IPs. Note: These are considered only if PublicNetworkAccess is enabled.'
  name: inbound_ip_rules
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.InboundIpRule>]
- description: 'This boolean is used to enable or disable local auth. Default value

    is false. When the property is set to true, only Microsoft Entra ID token will
    be used to

    authenticate if user is allowed to publish to the partner namespace.'
  name: disable_local_auth
  types:
  - <xref:bool>
- description: 'This determines if events published to this partner namespace

    should use the source attribute in the event payload or use the channel name in
    the header when

    matching to the partner topic. If none is specified, source attribute routing
    will be used to

    match the partner topic. Known values are: "SourceEventAttribute" and "ChannelNameHeader".'
  name: partner_topic_routing_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PartnerTopicRoutingMode>
attributes:
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.disable_local_auth
  name: disable_local_auth
  summary: 'This boolean is used to enable or disable local auth. Default value is
    false. When the property

    is set to true, only Microsoft Entra ID token will be used to authenticate if
    user is allowed

    to publish to the partner namespace.'
  signature: 'disable_local_auth: bool | None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.endpoint
  name: endpoint
  summary: Endpoint for the partner namespace.
  signature: 'endpoint: str | None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.inbound_ip_rules
  name: inbound_ip_rules
  summary: 'These are

    considered only if PublicNetworkAccess is enabled.'
  signature: 'inbound_ip_rules: list[''_models.InboundIpRule''] | None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.minimum_tls_version_allowed
  name: minimum_tls_version_allowed
  summary: 'Minimum TLS version of the publisher allowed to publish to this partner
    namespace. Known values

    are: "1.0", "1.1", and "1.2".'
  signature: 'minimum_tls_version_allowed: str | _models.TlsVersion | None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.partner_registration_fully_qualified_id
  name: partner_registration_fully_qualified_id
  summary: 'The fully qualified ARM Id of the partner registration that should be
    associated with this

    partner namespace. This takes the following format:

    /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.EventGrid/partnerRegistrations/{partnerRegistrationName}.'
  signature: 'partner_registration_fully_qualified_id: str | None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.partner_topic_routing_mode
  name: partner_topic_routing_mode
  summary: 'This determines if events published to this partner namespace should use
    the source attribute

    in the event payload or use the channel name in the header when matching to the
    partner topic.

    If none is specified, source attribute routing will be used to match the partner
    topic. Known

    values are: "SourceEventAttribute" and "ChannelNameHeader".'
  signature: 'partner_topic_routing_mode: str | _models.PartnerTopicRoutingMode |
    None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.private_endpoint_connections
  name: private_endpoint_connections
  summary: List of private endpoint connections.
  signature: 'private_endpoint_connections: list[''_models.PrivateEndpointConnection'']
    | None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.provisioning_state
  name: provisioning_state
  summary: '"Creating", "Updating",

    "Deleting", "Succeeded", "Canceled", and "Failed".'
  signature: 'provisioning_state: str | _models.PartnerNamespaceProvisioningState
    | None'
- uid: azure.mgmt.eventgrid.models.PartnerNamespaceProperties.public_network_access
  name: public_network_access
  summary: 'This determines if traffic is allowed over public network. By default
    it is enabled. You can

    further restrict to specific IPs by configuring <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.PartnerNamespaceProperties.InboundIpRules"

    />. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
  signature: 'public_network_access: str | _models.PublicNetworkAccess | None'
