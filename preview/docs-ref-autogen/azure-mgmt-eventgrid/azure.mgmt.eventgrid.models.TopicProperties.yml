### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.TopicProperties
name: TopicProperties
fullName: azure.mgmt.eventgrid.models.TopicProperties
module: azure.mgmt.eventgrid.models
summary: Properties of the Topic.
constructor:
  syntax: 'TopicProperties(*args: Any, **kwargs: Any)'
variables:
- description: List of private endpoint connections.
  name: private_endpoint_connections
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.PrivateEndpointConnection>]
- description: 'Provisioning state of the topic. Known values are: "Creating",

    "Updating", "Deleting", "Succeeded", "Canceled", and "Failed".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.TopicProvisioningState>
- description: Endpoint for the topic.
  name: endpoint
  types:
  - <xref:str>
- description: 'Event Type Information for the user topic. This information is provided

    by the publisher and can be used by the subscriber to view different types of
    events that are

    published.'
  name: event_type_info
  types:
  - <xref:azure.mgmt.eventgrid.models.EventTypeInfo>
- description: 'Minimum TLS version of the publisher allowed to publish to

    this topic. Known values are: "1.0", "1.1", and "1.2".'
  name: minimum_tls_version_allowed
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.TlsVersion>
- description: 'This determines the format that Event Grid should expect for incoming

    events published to the topic. Known values are: "EventGridSchema", "CustomEventSchema",
    and

    "CloudEventSchemaV1_0".'
  name: input_schema
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.InputSchema>
- description: 'This enables publishing using custom event schemas. An

    InputSchemaMapping can be specified to map various properties of a source schema
    to various

    required properties of the EventGridEvent schema.'
  name: input_schema_mapping
  types:
  - <xref:azure.mgmt.eventgrid.models.InputSchemaMapping>
- description: Metric resource id for the topic.
  name: metric_resource_id
  types:
  - <xref:str>
- description: 'This determines if traffic is allowed over public network. By

    default it is enabled. You can further restrict to specific IPs by configuring
    <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.TopicProperties.InboundIpRules"

    />. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PublicNetworkAccess>
- description: 'This can be used to restrict traffic from specific IPs instead of
    all

    IPs. Note: These are considered only if PublicNetworkAccess is enabled.'
  name: inbound_ip_rules
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.InboundIpRule>]
- description: 'This boolean is used to enable or disable local auth. Default value

    is false. When the property is set to true, only Microsoft Entra ID token will
    be used to

    authenticate if user is allowed to publish to the topic.'
  name: disable_local_auth
  types:
  - <xref:bool>
- description: 'Data Residency Boundary of the resource. Known values are:

    "WithinGeopair" and "WithinRegion".'
  name: data_residency_boundary
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.DataResidencyBoundary>
- description: 'Key encryption configuration properties of the topic resource. This
    is an

    optional property. When not specified, no key encryption is used.'
  name: encryption
  types:
  - <xref:azure.mgmt.eventgrid.models.KeyEncryption>
- description: 'Represents the platform capabilities of the resource, including

    Azure Confidential Compute related properties.'
  name: platform_capabilities
  types:
  - <xref:azure.mgmt.eventgrid.models.PlatformCapabilities>
attributes:
- uid: azure.mgmt.eventgrid.models.TopicProperties.data_residency_boundary
  name: data_residency_boundary
  summary: '"WithinGeopair" and

    "WithinRegion".'
  signature: 'data_residency_boundary: str | _models.DataResidencyBoundary | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.disable_local_auth
  name: disable_local_auth
  summary: 'This boolean is used to enable or disable local auth. Default value is
    false. When the property

    is set to true, only Microsoft Entra ID token will be used to authenticate if
    user is allowed

    to publish to the topic.'
  signature: 'disable_local_auth: bool | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.encryption
  name: encryption
  summary: 'Key encryption configuration properties of the topic resource. This is
    an optional property.

    When not specified, no key encryption is used.'
  signature: 'encryption: _models.KeyEncryption | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.endpoint
  name: endpoint
  summary: Endpoint for the topic.
  signature: 'endpoint: str | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.event_type_info
  name: event_type_info
  summary: 'Event Type Information for the user topic. This information is provided
    by the publisher and

    can be used by the subscriber to view different types of events that are published.'
  signature: 'event_type_info: _models.EventTypeInfo | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.inbound_ip_rules
  name: inbound_ip_rules
  summary: 'These are

    considered only if PublicNetworkAccess is enabled.'
  signature: 'inbound_ip_rules: list[''_models.InboundIpRule''] | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.input_schema
  name: input_schema
  summary: 'This determines the format that Event Grid should expect for incoming
    events published to the

    topic. Known values are: "EventGridSchema", "CustomEventSchema", and

    "CloudEventSchemaV1_0".'
  signature: 'input_schema: str | _models.InputSchema | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.input_schema_mapping
  name: input_schema_mapping
  summary: 'This enables publishing using custom event schemas. An InputSchemaMapping
    can be specified to

    map various properties of a source schema to various required properties of the
    EventGridEvent

    schema.'
  signature: 'input_schema_mapping: _models.InputSchemaMapping | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.metric_resource_id
  name: metric_resource_id
  summary: Metric resource id for the topic.
  signature: 'metric_resource_id: str | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.minimum_tls_version_allowed
  name: minimum_tls_version_allowed
  summary: 'Minimum TLS version of the publisher allowed to publish to this topic.
    Known values are:

    "1.0", "1.1", and "1.2".'
  signature: 'minimum_tls_version_allowed: str | _models.TlsVersion | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.platform_capabilities
  name: platform_capabilities
  summary: 'Represents the platform capabilities of the resource, including Azure
    Confidential Compute

    related properties.'
  signature: 'platform_capabilities: _models.PlatformCapabilities | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.private_endpoint_connections
  name: private_endpoint_connections
  summary: List of private endpoint connections.
  signature: 'private_endpoint_connections: list[''_models.PrivateEndpointConnection'']
    | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.provisioning_state
  name: provisioning_state
  summary: '"Creating", "Updating", "Deleting",

    "Succeeded", "Canceled", and "Failed".'
  signature: 'provisioning_state: str | _models.TopicProvisioningState | None'
- uid: azure.mgmt.eventgrid.models.TopicProperties.public_network_access
  name: public_network_access
  summary: 'This determines if traffic is allowed over public network. By default
    it is enabled. You can

    further restrict to specific IPs by configuring <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.TopicProperties.InboundIpRules"

    />. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
  signature: 'public_network_access: str | _models.PublicNetworkAccess | None'
