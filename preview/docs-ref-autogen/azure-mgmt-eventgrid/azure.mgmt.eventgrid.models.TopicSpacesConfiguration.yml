uid: azure.mgmt.eventgrid.models.TopicSpacesConfiguration
name: TopicSpacesConfiguration
fullName: azure.mgmt.eventgrid.models.TopicSpacesConfiguration
module: azure.mgmt.eventgrid.models
summary: Properties of the Topic Spaces Configuration.
constructor:
  syntax: 'TopicSpacesConfiguration(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicate if Topic Spaces Configuration is enabled for the namespace.
    Default is

    Disabled. Known values are: "Disabled" and "Enabled".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.TopicSpacesConfigurationState>
- description: 'Fully qualified Azure Resource Id for the Event Grid Topic to

    which events will be routed to from TopicSpaces under a namespace. This property
    should be in

    the following format

    ''/subscriptions/{subId}/resourcegroups/{resourceGroupName}/providers/microsoft.EventGrid/topics/{topicName}''.

    This topic should reside in the same region where namespace is located.'
  name: route_topic_resource_id
  types:
  - <xref:str>
- description: The endpoint for the topic spaces configuration. This is a read-only
    property.
  name: hostname
  types:
  - <xref:str>
- description: Routing enrichments for topic spaces configuration.
  name: routing_enrichments
  types:
  - <xref:azure.mgmt.eventgrid.models.RoutingEnrichments>
- description: Client authentication settings for topic spaces configuration.
  name: client_authentication
  types:
  - <xref:azure.mgmt.eventgrid.models.ClientAuthenticationSettings>
- description: 'The maximum session expiry in hours. The property

    default value is 1 hour. Min allowed value is 1 hour and max allowed value is
    8 hours.'
  name: maximum_session_expiry_in_hours
  types:
  - <xref:int>
- description: 'The maximum number of sessions per

    authentication name. The property default value is 1. Min allowed value is 1 and
    max allowed

    value is 100.'
  name: maximum_client_sessions_per_authentication_name
  types:
  - <xref:int>
- description: Routing identity info for topic spaces configuration.
  name: routing_identity_info
  types:
  - <xref:azure.mgmt.eventgrid.models.RoutingIdentityInfo>
- description: List of custom domain configurations for the namespace.
  name: custom_domains
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.CustomDomainConfiguration>]
