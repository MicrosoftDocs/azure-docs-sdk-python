uid: azure.mgmt.eventgrid.models.ConfidentialComputeMode
name: ConfidentialComputeMode
fullName: azure.mgmt.eventgrid.models.ConfidentialComputeMode
summary: 'This property specifies the mode of the Azure Confidential Compute configuration.
  Possible

  values are ''Disabled'' or ''Enabled''. This is an immutable property set at the
  time of resource

  creation and cannot be modified later. Enabling this property ensures that messages
  are

  processed and stored in a Azure Confidential Compute environment.'
module: azure.mgmt.eventgrid.models
fields:
