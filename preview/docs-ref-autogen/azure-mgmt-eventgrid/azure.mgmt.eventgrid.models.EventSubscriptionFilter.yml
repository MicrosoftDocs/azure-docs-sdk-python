### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.EventSubscriptionFilter
name: EventSubscriptionFilter
fullName: azure.mgmt.eventgrid.models.EventSubscriptionFilter
module: azure.mgmt.eventgrid.models
summary: Filter for the Event Subscription.
constructor:
  syntax: 'EventSubscriptionFilter(*args: Any, **kwargs: Any)'
variables:
- description: 'An optional string to filter events for an event subscription based

    on a resource path prefix. The format of this depends on the publisher of the
    events. Wildcard

    characters are not supported in this path.'
  name: subject_begins_with
  types:
  - <xref:str>
- description: 'An optional string to filter events for an event subscription based
    on

    a resource path suffix. Wildcard characters are not supported in this path.'
  name: subject_ends_with
  types:
  - <xref:str>
- description: 'A list of applicable event types that need to be part of the event

    subscription. If it is desired to subscribe to all default event types, set the

    IncludedEventTypes to null.'
  name: included_event_types
  types:
  - <xref:list>[<xref:str>]
- description: 'Specifies if the SubjectBeginsWith and SubjectEndsWith

    properties of the filter should be compared in a case sensitive manner.'
  name: is_subject_case_sensitive
  types:
  - <xref:bool>
- description: 'Allows advanced filters to be evaluated against an

    array of values instead of expecting a singular value.'
  name: enable_advanced_filtering_on_arrays
  types:
  - <xref:bool>
- description: 'An array of advanced filters that are used for filtering event

    subscriptions.'
  name: advanced_filters
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.AdvancedFilter>]
attributes:
- uid: azure.mgmt.eventgrid.models.EventSubscriptionFilter.advanced_filters
  name: advanced_filters
  summary: An array of advanced filters that are used for filtering event subscriptions.
  signature: 'advanced_filters: list[''_models.AdvancedFilter''] | None'
- uid: azure.mgmt.eventgrid.models.EventSubscriptionFilter.enable_advanced_filtering_on_arrays
  name: enable_advanced_filtering_on_arrays
  summary: 'Allows advanced filters to be evaluated against an array of values instead
    of expecting a

    singular value.'
  signature: 'enable_advanced_filtering_on_arrays: bool | None'
- uid: azure.mgmt.eventgrid.models.EventSubscriptionFilter.included_event_types
  name: included_event_types
  summary: 'A list of applicable event types that need to be part of the event subscription.
    If it is

    desired to subscribe to all default event types, set the IncludedEventTypes to
    null.'
  signature: 'included_event_types: list[str] | None'
- uid: azure.mgmt.eventgrid.models.EventSubscriptionFilter.is_subject_case_sensitive
  name: is_subject_case_sensitive
  summary: 'Specifies if the SubjectBeginsWith and SubjectEndsWith properties of the
    filter should be

    compared in a case sensitive manner.'
  signature: 'is_subject_case_sensitive: bool | None'
- uid: azure.mgmt.eventgrid.models.EventSubscriptionFilter.subject_begins_with
  name: subject_begins_with
  summary: 'An optional string to filter events for an event subscription based on
    a resource path prefix.

    The format of this depends on the publisher of the events. Wildcard characters
    are not

    supported in this path.'
  signature: 'subject_begins_with: str | None'
- uid: azure.mgmt.eventgrid.models.EventSubscriptionFilter.subject_ends_with
  name: subject_ends_with
  summary: 'An optional string to filter events for an event subscription based on
    a resource path suffix.

    Wildcard characters are not supported in this path.'
  signature: 'subject_ends_with: str | None'
