### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.PartnerTopicProperties
name: PartnerTopicProperties
fullName: azure.mgmt.eventgrid.models.PartnerTopicProperties
module: azure.mgmt.eventgrid.models
summary: Properties of the Partner Topic.
constructor:
  syntax: 'PartnerTopicProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The immutableId of the corresponding partner

    registration.'
  name: partner_registration_immutable_id
  types:
  - <xref:str>
- description: 'Source associated with this partner topic. This represents a unique
    partner

    resource.'
  name: source
  types:
  - <xref:str>
- description: Event Type information from the corresponding event channel.
  name: event_type_info
  types:
  - <xref:azure.mgmt.eventgrid.models.EventTypeInfo>
- description: 'Expiration time of the partner topic. If this timer

    expires while the partner topic is still never activated, the partner topic and
    corresponding

    event channel are deleted.'
  name: expiration_time_if_not_activated_utc
  types:
  - <xref:datetime.datetime>
- description: 'Provisioning state of the partner topic. Known values are:

    "Creating", "Updating", "Deleting", "Succeeded", "Canceled", "Failed", and

    "IdleDueToMirroredChannelResourceDeletion".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PartnerTopicProvisioningState>
- description: 'Activation state of the partner topic. Known values are:

    "NeverActivated", "Activated", and "Deactivated".'
  name: activation_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PartnerTopicActivationState>
- description: 'Friendly description about the topic. This can be set

    by the publisher/partner to show custom description for the customer partner topic.
    This will

    be helpful to remove any ambiguity of the origin of creation of the partner topic
    for the

    customer.'
  name: partner_topic_friendly_description
  types:
  - <xref:str>
- description: 'Context or helpful message that can be used during the approval

    process by the subscriber.'
  name: message_for_activation
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.activation_state
  name: activation_state
  summary: '"NeverActivated", "Activated", and

    "Deactivated".'
  signature: 'activation_state: str | _models.PartnerTopicActivationState | None'
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.event_type_info
  name: event_type_info
  summary: Event Type information from the corresponding event channel.
  signature: 'event_type_info: _models.EventTypeInfo | None'
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.expiration_time_if_not_activated_utc
  name: expiration_time_if_not_activated_utc
  summary: 'Expiration time of the partner topic. If this timer expires while the
    partner topic is still

    never activated, the partner topic and corresponding event channel are deleted.'
  signature: 'expiration_time_if_not_activated_utc: datetime | None'
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.message_for_activation
  name: message_for_activation
  summary: Context or helpful message that can be used during the approval process
    by the subscriber.
  signature: 'message_for_activation: str | None'
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.partner_registration_immutable_id
  name: partner_registration_immutable_id
  summary: The immutableId of the corresponding partner registration.
  signature: 'partner_registration_immutable_id: str | None'
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.partner_topic_friendly_description
  name: partner_topic_friendly_description
  summary: 'Friendly description about the topic. This can be set by the publisher/partner
    to show custom

    description for the customer partner topic. This will be helpful to remove any
    ambiguity of the

    origin of creation of the partner topic for the customer.'
  signature: 'partner_topic_friendly_description: str | None'
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.provisioning_state
  name: provisioning_state
  summary: '"Creating", "Updating",

    "Deleting", "Succeeded", "Canceled", "Failed", and

    "IdleDueToMirroredChannelResourceDeletion".'
  signature: 'provisioning_state: str | _models.PartnerTopicProvisioningState | None'
- uid: azure.mgmt.eventgrid.models.PartnerTopicProperties.source
  name: source
  summary: Source associated with this partner topic. This represents a unique partner
    resource.
  signature: 'source: str | None'
