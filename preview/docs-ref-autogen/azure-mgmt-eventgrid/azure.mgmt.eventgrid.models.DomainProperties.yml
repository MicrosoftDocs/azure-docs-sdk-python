  signature: 'inbound_ip_rules: list[''_models.InboundIpRule''] | None'
- uid: azure.mgmt.eventgrid.models.DomainProperties.input_schema
  name: input_schema
  summary: 'This determines the format that Event Grid should expect for incoming
