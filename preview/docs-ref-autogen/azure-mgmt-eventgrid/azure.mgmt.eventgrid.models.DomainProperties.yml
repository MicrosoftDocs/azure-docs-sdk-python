    "1.0", "1.1", and "1.2".'
  signature: 'minimum_tls_version_allowed: str | _models.TlsVersion | None'
- uid: azure.mgmt.eventgrid.models.DomainProperties.private_endpoint_connections
  name: private_endpoint_connections
  summary: List of private endpoint connections.
  signature: 'private_endpoint_connections: list[''_models.PrivateEndpointConnection'']
    | None'
- uid: azure.mgmt.eventgrid.models.DomainProperties.provisioning_state
  name: provisioning_state
