uid: azure.mgmt.eventgrid.models.ClientCertificateAuthentication
name: ClientCertificateAuthentication
fullName: azure.mgmt.eventgrid.models.ClientCertificateAuthentication
module: azure.mgmt.eventgrid.models
summary: The certificate authentication properties for the client.
constructor:
  syntax: 'ClientCertificateAuthentication(*args: Any, **kwargs: Any)'
variables:
- description: 'The validation scheme used to authenticate the client. Default value

    is SubjectMatchesAuthenticationName. Known values are: "SubjectMatchesAuthenticationName",

    "DnsMatchesAuthenticationName", "UriMatchesAuthenticationName", "IpMatchesAuthenticationName",

    "EmailMatchesAuthenticationName", and "ThumbprintMatch".'
  name: validation_scheme
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.ClientCertificateValidationScheme>
- description: 'The list of thumbprints that are allowed during client

    authentication. This property is required only if the validationScheme is ''ThumbprintMatch''.'
  name: allowed_thumbprints
  types:
  - <xref:list>[<xref:str>]
attributes:
- uid: azure.mgmt.eventgrid.models.ClientCertificateAuthentication.allowed_thumbprints
  name: allowed_thumbprints
  summary: 'The list of thumbprints that are allowed during client authentication.
    This property is

    required only if the validationScheme is ''ThumbprintMatch''.'
  signature: 'allowed_thumbprints: list[str] | None'
- uid: azure.mgmt.eventgrid.models.ClientCertificateAuthentication.validation_scheme
