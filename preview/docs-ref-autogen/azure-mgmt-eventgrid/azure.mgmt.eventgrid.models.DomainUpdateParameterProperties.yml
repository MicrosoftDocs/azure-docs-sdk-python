### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties
name: DomainUpdateParameterProperties
fullName: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties
module: azure.mgmt.eventgrid.models
summary: Information of domain update parameter properties.
constructor:
  syntax: 'DomainUpdateParameterProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'This determines if traffic is allowed over public network. By

    default it is enabled. You can further restrict to specific IPs by configuring
    <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.DomainUpdateParameterProperties.InboundIpRules"

    />. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PublicNetworkAccess>
- description: 'This can be used to restrict traffic from specific IPs instead of
    all

    IPs. Note: These are considered only if PublicNetworkAccess is enabled.'
  name: inbound_ip_rules
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.InboundIpRule>]
- description: 'Minimum TLS version of the publisher allowed to publish to

    this domain. Known values are: "1.0", "1.1", and "1.2".'
  name: minimum_tls_version_allowed
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.TlsVersion>
- description: 'This boolean is used to enable or disable local auth. Default value

    is false. When the property is set to true, only Microsoft Entra ID token will
    be used to

    authenticate if user is allowed to publish to the domain.'
  name: disable_local_auth
  types:
  - <xref:bool>
- description: 'This Boolean is used to specify the creation

    mechanism for ''all'' the Event Grid Domain Topics associated with this Event
    Grid Domain

    resource. In this context, creation of domain topic can be auto-managed (when
    true) or

    self-managed (when false). The default value for this property is true. When this
    property is

    null or set to true, Event Grid is responsible of automatically creating the domain
    topic when

    the first event subscription is created at the scope of the domain topic. If this
    property is

    set to false, then creating the first event subscription will require creating
    a domain topic

    by the user. The self-management mode can be used if the user wants full control
    of when the

    domain topic is created, while auto-managed mode provides the flexibility to perform
    less

    operations and manage fewer resources by the user. Also, note that in auto-managed
    creation

    mode, user is allowed to create the domain topic on demand if needed.'
  name: auto_create_topic_with_first_subscription
  types:
  - <xref:bool>
- description: 'This Boolean is used to specify the deletion

    mechanism for ''all'' the Event Grid Domain Topics associated with this Event
    Grid Domain

    resource. In this context, deletion of domain topic can be auto-managed (when
    true) or

    self-managed (when false). The default value for this property is true. When this
    property is

    set to true, Event Grid is responsible of automatically deleting the domain topic
    when the last

    event subscription at the scope of the domain topic is deleted. If this property
    is set to

    false, then the user needs to manually delete the domain topic when it is no longer
    needed

    (e.g., when last event subscription is deleted and the resource needs to be cleaned
    up). The

    self-management mode can be used if the user wants full control of when the domain
    topic needs

    to be deleted, while auto-managed mode provides the flexibility to perform less
    operations and

    manage fewer resources by the user.'
  name: auto_delete_topic_with_last_subscription
  types:
  - <xref:bool>
- description: 'The data residency boundary for the domain. Known values are:

    "WithinGeopair" and "WithinRegion".'
  name: data_residency_boundary
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.DataResidencyBoundary>
- description: The eventTypeInfo for the domain.
  name: event_type_info
  types:
  - <xref:azure.mgmt.eventgrid.models.EventTypeInfo>
attributes:
- uid: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties.auto_create_topic_with_first_subscription
  name: auto_create_topic_with_first_subscription
  summary: 'This Boolean is used to specify the creation mechanism for ''all'' the
    Event Grid Domain Topics

    associated with this Event Grid Domain resource. In this context, creation of
    domain topic can

    be auto-managed (when true) or self-managed (when false). The default value for
    this property

    is true. When this property is null or set to true, Event Grid is responsible
    of automatically

    creating the domain topic when the first event subscription is created at the
    scope of the

    domain topic. If this property is set to false, then creating the first event
    subscription will

    require creating a domain topic by the user. The self-management mode can be used
    if the user

    wants full control of when the domain topic is created, while auto-managed mode
    provides the

    flexibility to perform less operations and manage fewer resources by the user.
    Also, note that

    in auto-managed creation mode, user is allowed to create the domain topic on demand
    if needed.'
  signature: 'auto_create_topic_with_first_subscription: bool | None'
- uid: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties.auto_delete_topic_with_last_subscription
  name: auto_delete_topic_with_last_subscription
  summary: 'This Boolean is used to specify the deletion mechanism for ''all'' the
    Event Grid Domain Topics

    associated with this Event Grid Domain resource. In this context, deletion of
    domain topic can

    be auto-managed (when true) or self-managed (when false). The default value for
    this property

    is true. When this property is set to true, Event Grid is responsible of automatically
    deleting

    the domain topic when the last event subscription at the scope of the domain topic
    is deleted.

    If this property is set to false, then the user needs to manually delete the domain
    topic when

    it is no longer needed (e.g., when last event subscription is deleted and the
    resource needs to

    be cleaned up). The self-management mode can be used if the user wants full control
    of when the

    domain topic needs to be deleted, while auto-managed mode provides the flexibility
    to perform

    less operations and manage fewer resources by the user.'
  signature: 'auto_delete_topic_with_last_subscription: bool | None'
- uid: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties.data_residency_boundary
  name: data_residency_boundary
  summary: '"WithinGeopair" and

    "WithinRegion".'
  signature: 'data_residency_boundary: str | _models.DataResidencyBoundary | None'
- uid: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties.disable_local_auth
  name: disable_local_auth
  summary: 'This boolean is used to enable or disable local auth. Default value is
    false. When the property

    is set to true, only Microsoft Entra ID token will be used to authenticate if
    user is allowed

    to publish to the domain.'
  signature: 'disable_local_auth: bool | None'
- uid: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties.event_type_info
  name: event_type_info
  summary: The eventTypeInfo for the domain.
  signature: 'event_type_info: _models.EventTypeInfo | None'
- uid: azure.mgmt.eventgrid.models.DomainUpdateParameterProperties.inbound_ip_rules
  name: inbound_ip_rules
  summary: 'These are

