    \ This duration value is expressed using\nthe following format: 'P(n)Y(n)M(n)DT(n)H(n)M(n)S',\
    \ where:\n\n* 14. is replaced by the value of each time element that follows the\
    \ (n). \n\n\n* P is the duration (or Period) designator and is always placed at\
    \ the beginning of the duration. \n\n* Y is the year designator, and it follows\
    \ the value for the number of years. \n\n* M is the month designator, and it follows\
    \ the value for the number of months. \n\n* W is the week designator, and it follows\
    \ the value for the number of weeks. \n\n* D is the day designator, and it follows\
    \ the value for the number of days. \n\n* T is the time designator, and it precedes\
    \ the time components. \n\n* H is the hour designator, and it follows the value\
    \ for the number of hours. \n\n* M is the minute designator, and it follows the\
    \ value for the number of minutes. \n\n* S is the second designator, and it follows\
    \ the value for the number of seconds. \n\nThis duration value cannot be set greater\
    \ than the topic's EventRetentionInDays. It is is\nan optional field where its\
    \ minimum value is 1 minute, and its maximum is determined\nby topic's EventRetentionInDays\
    \ value. The followings are examples of valid values:\n* 'P0DT23H12M' or 'PT23H12M':\
    \ for duration of 23 hours and 12 minutes.\n* 'P1D' or 'P1DT0H0M0S': for duration\
    \ of 1 day."
  signature: 'event_time_to_live: timedelta | None'
