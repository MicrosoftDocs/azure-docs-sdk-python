### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.ChannelProperties
name: ChannelProperties
fullName: azure.mgmt.eventgrid.models.ChannelProperties
module: azure.mgmt.eventgrid.models
summary: Properties of the Channel.
constructor:
  syntax: 'ChannelProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The type of the event channel which represents the direction flow
    of

    events. Known values are: "PartnerTopic" and "PartnerDestination".'
  name: channel_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.ChannelType>
- description: 'This property should be populated when channelType is PartnerTopic

    and represents information about the partner topic resource corresponding to the
    channel.'
  name: partner_topic_info
  types:
  - <xref:azure.mgmt.eventgrid.models.PartnerTopicInfo>
- description: 'This property should be populated when channelType is

    PartnerDestination and represents information about the partner destination resource

    corresponding to the channel.'
  name: partner_destination_info
  types:
  - <xref:azure.mgmt.eventgrid.models.PartnerDestinationInfo>
- description: 'Context or helpful message that can be used during the approval

    process by the subscriber.'
  name: message_for_activation
  types:
  - <xref:str>
- description: 'Provisioning state of the channel. Known values are: "Creating",

    "Updating", "Deleting", "Succeeded", "Canceled", "Failed",

    "IdleDueToMirroredPartnerTopicDeletion", and "IdleDueToMirroredPartnerDestinationDeletion".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.ChannelProvisioningState>
- description: 'The readiness state of the corresponding partner topic. Known values

    are: "NeverActivated" and "Activated".'
  name: readiness_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.ReadinessState>
- description: 'Expiration time of the channel. If this timer

    expires while the corresponding partner topic is never activated, the channel
    and corresponding

    partner topic are deleted.'
  name: expiration_time_if_not_activated_utc
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.eventgrid.models.ChannelProperties.channel_type
  name: channel_type
  summary: 'The type of the event channel which represents the direction flow of events.
    Known values are:

    "PartnerTopic" and "PartnerDestination".'
  signature: 'channel_type: str | _models.ChannelType | None'
- uid: azure.mgmt.eventgrid.models.ChannelProperties.expiration_time_if_not_activated_utc
  name: expiration_time_if_not_activated_utc
  summary: 'Expiration time of the channel. If this timer expires while the corresponding
    partner topic is

    never activated, the channel and corresponding partner topic are deleted.'
  signature: 'expiration_time_if_not_activated_utc: datetime | None'
- uid: azure.mgmt.eventgrid.models.ChannelProperties.message_for_activation
  name: message_for_activation
  summary: Context or helpful message that can be used during the approval process
    by the subscriber.
  signature: 'message_for_activation: str | None'
- uid: azure.mgmt.eventgrid.models.ChannelProperties.partner_destination_info
  name: partner_destination_info
  summary: 'This property should be populated when channelType is PartnerDestination
    and represents

    information about the partner destination resource corresponding to the channel.'
  signature: 'partner_destination_info: _models.PartnerDestinationInfo | None'
- uid: azure.mgmt.eventgrid.models.ChannelProperties.partner_topic_info
  name: partner_topic_info
  summary: 'This property should be populated when channelType is PartnerTopic and
    represents information

    about the partner topic resource corresponding to the channel.'
  signature: 'partner_topic_info: _models.PartnerTopicInfo | None'
- uid: azure.mgmt.eventgrid.models.ChannelProperties.provisioning_state
  name: provisioning_state
  summary: '"Creating", "Updating", "Deleting",

    "Succeeded", "Canceled", "Failed", "IdleDueToMirroredPartnerTopicDeletion", and

    "IdleDueToMirroredPartnerDestinationDeletion".'
  signature: 'provisioning_state: str | _models.ChannelProvisioningState | None'
- uid: azure.mgmt.eventgrid.models.ChannelProperties.readiness_state
  name: readiness_state
  summary: '"NeverActivated"

    and "Activated".'
  signature: 'readiness_state: str | _models.ReadinessState | None'
