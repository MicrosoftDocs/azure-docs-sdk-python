uid: azure.mgmt.eventgrid.models.JsonFieldWithDefault
name: JsonFieldWithDefault
fullName: azure.mgmt.eventgrid.models.JsonFieldWithDefault
module: azure.mgmt.eventgrid.models
summary: 'This is used to express the source of an input schema mapping for a single
  target field in the

  Event Grid Event schema. This is currently used in the mappings for the ''subject'',
  ''eventtype''

  and ''dataversion'' properties. This represents a field in the input event schema
  along with a

  default value to be used, and at least one of these two properties should be provided.'
constructor:
  syntax: 'JsonFieldWithDefault(*args: Any, **kwargs: Any)'
variables:
- description: 'Name of a field in the input event schema that''s to be used as the
    source

    of a mapping.'
  name: source_field
  types:
  - <xref:str>
- description: 'The default value to be used for mapping when a SourceField is not

    provided or if there''s no property with the specified name in the published JSON
    event payload.'
  name: default_value
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.eventgrid.models.JsonFieldWithDefault.default_value
  name: default_value
  summary: 'The default value to be used for mapping when a SourceField is not provided
    or if there''s no

    property with the specified name in the published JSON event payload.'
  signature: 'default_value: str | None'
- uid: azure.mgmt.eventgrid.models.JsonFieldWithDefault.source_field
  name: source_field
