### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties
name: TopicUpdateParameterProperties
fullName: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties
module: azure.mgmt.eventgrid.models
summary: Information of topic update parameter properties.
constructor:
  syntax: 'TopicUpdateParameterProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'This determines if traffic is allowed over public network. By

    default it is enabled. You can further restrict to specific IPs by configuring
    <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.TopicUpdateParameterProperties.InboundIpRules"

    />. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.PublicNetworkAccess>
- description: 'This can be used to restrict traffic from specific IPs instead of
    all

    IPs. Note: These are considered only if PublicNetworkAccess is enabled.'
  name: inbound_ip_rules
  types:
  - <xref:list>[<xref:azure.mgmt.eventgrid.models.InboundIpRule>]
- description: 'Minimum TLS version of the publisher allowed to publish to

    this domain. Known values are: "1.0", "1.1", and "1.2".'
  name: minimum_tls_version_allowed
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.TlsVersion>
- description: 'This boolean is used to enable or disable local auth. Default value

    is false. When the property is set to true, only Microsoft Entra ID token will
    be used to

    authenticate if user is allowed to publish to the topic.'
  name: disable_local_auth
  types:
  - <xref:bool>
- description: 'The data residency boundary for the topic. Known values are:

    "WithinGeopair" and "WithinRegion".'
  name: data_residency_boundary
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.DataResidencyBoundary>
- description: The eventTypeInfo for the topic.
  name: event_type_info
  types:
  - <xref:azure.mgmt.eventgrid.models.EventTypeInfo>
attributes:
- uid: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties.data_residency_boundary
  name: data_residency_boundary
  summary: '"WithinGeopair" and

    "WithinRegion".'
  signature: 'data_residency_boundary: str | _models.DataResidencyBoundary | None'
- uid: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties.disable_local_auth
  name: disable_local_auth
  summary: 'This boolean is used to enable or disable local auth. Default value is
    false. When the property

    is set to true, only Microsoft Entra ID token will be used to authenticate if
    user is allowed

    to publish to the topic.'
  signature: 'disable_local_auth: bool | None'
- uid: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties.event_type_info
  name: event_type_info
  summary: The eventTypeInfo for the topic.
  signature: 'event_type_info: _models.EventTypeInfo | None'
- uid: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties.inbound_ip_rules
  name: inbound_ip_rules
  summary: 'These are

    considered only if PublicNetworkAccess is enabled.'
  signature: 'inbound_ip_rules: list[''_models.InboundIpRule''] | None'
- uid: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties.minimum_tls_version_allowed
  name: minimum_tls_version_allowed
  summary: 'Minimum TLS version of the publisher allowed to publish to this domain.
    Known values are:

    "1.0", "1.1", and "1.2".'
  signature: 'minimum_tls_version_allowed: str | _models.TlsVersion | None'
- uid: azure.mgmt.eventgrid.models.TopicUpdateParameterProperties.public_network_access
  name: public_network_access
  summary: 'This determines if traffic is allowed over public network. By default
    it is enabled. You can

    further restrict to specific IPs by configuring <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.TopicUpdateParameterProperties.InboundIpRules"

    />. Known values are: "Enabled", "Disabled", and "SecuredByPerimeter".'
  signature: 'public_network_access: str | _models.PublicNetworkAccess | None'
