### YamlMime:PythonEnum
uid: azure.mgmt.eventgrid.models.KeyEncryptionKeyStatus
name: KeyEncryptionKeyStatus
fullName: azure.mgmt.eventgrid.models.KeyEncryptionKeyStatus
summary: 'The state of the Customer Managed Key (CMK) encryption. This is a read-only
  property which

  determines if the associated key is active and valid and used actively by runtime
  as expected.

  When the associated CMK becomes invalid (e.g., if it is deleted, or if versioned
  CMK is not

  current anymore), Event Grid Service will set this state to disabled to indicate
  that this key

  is not valid anymore and requires action from user.'
module: azure.mgmt.eventgrid.models
fields:
- name: ACTIVE
  uid: azure.mgmt.eventgrid.models.KeyEncryptionKeyStatus.ACTIVE
- name: REVOKED
  uid: azure.mgmt.eventgrid.models.KeyEncryptionKeyStatus.REVOKED
