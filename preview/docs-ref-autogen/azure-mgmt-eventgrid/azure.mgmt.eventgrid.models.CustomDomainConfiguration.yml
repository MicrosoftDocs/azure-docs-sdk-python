### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.CustomDomainConfiguration
name: CustomDomainConfiguration
fullName: azure.mgmt.eventgrid.models.CustomDomainConfiguration
module: azure.mgmt.eventgrid.models
summary: A custom domain configuration that allows users to publish to their own domain
  name.
constructor:
  syntax: 'CustomDomainConfiguration(*args: Any, **kwargs: Any)'
variables:
- description: 'Fully Qualified Domain Name (FQDN) for the custom domain.

    Required.'
  name: fully_qualified_domain_name
  types:
  - <xref:str>
- description: 'Validation state for the custom domain. This is a read only property

    and is initially set to ''Pending'' and will be updated to ''Approved'' by Event
    Grid only after

    ownership of the domain name has been successfully validated. Known values are:
    "Pending",

    "Approved", and "ErrorRetrievingDnsRecord".'
  name: validation_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.eventgrid.models.CustomDomainValidationState>
- description: 'Identity info for accessing the certificate for the custom domain.
    This

    identity info must match an identity that has been set on the namespace.'
  name: identity
  types:
  - <xref:azure.mgmt.eventgrid.models.CustomDomainIdentity>
- description: 'The URL for the certificate that is used for publishing to the custom

    domain. We currently support certificates stored in Azure Key Vault only. While
    certificate URL

    can be either versioned URL of the following format

    [https:/](https:/)/{key-vault-name}.vault.azure.net/certificates/{certificate-name}/{version-id},
    or

    unversioned URL of the following format (e.g.,

    [https://contosovault.vault.azure.net/certificates/contosocert](https://contosovault.vault.azure.net/certificates/contosocert),
    we support unversioned

    certificate URL only (e.g., [https://contosovault.vault.azure.net/certificates/contosocert](https://contosovault.vault.azure.net/certificates/contosocert)).'
  name: certificate_url
  types:
  - <xref:str>
- description: 'Expected DNS TXT record name. Event Grid will check for a TXT

    record with this name in the DNS record set of the custom domain name to prove
    ownership over

    the domain. The values under this TXT record must contain the expected TXT record
    value.'
  name: expected_txt_record_name
  types:
  - <xref:str>
- description: 'Expected DNS TXT record value. Event Grid will check for a TXT

    record with this value in the DNS record set of the custom domain name to prove
    ownership over

    the domain.'
  name: expected_txt_record_value
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.eventgrid.models.CustomDomainConfiguration.certificate_url
  name: certificate_url
  summary: 'The URL for the certificate that is used for publishing to the custom
    domain. We currently

    support certificates stored in Azure Key Vault only. While certificate URL can
    be either

    versioned URL of the following format

    [https:/](https:/)/{key-vault-name}.vault.azure.net/certificates/{certificate-name}/{version-id},
    or

    unversioned URL of the following format (e.g.,

    [https://contosovault.vault.azure.net/certificates/contosocert](https://contosovault.vault.azure.net/certificates/contosocert),
    we support unversioned

    certificate URL only (e.g., [https://contosovault.vault.azure.net/certificates/contosocert](https://contosovault.vault.azure.net/certificates/contosocert)).'
  signature: 'certificate_url: str | None'
- uid: azure.mgmt.eventgrid.models.CustomDomainConfiguration.expected_txt_record_name
  name: expected_txt_record_name
  summary: 'Expected DNS TXT record name. Event Grid will check for a TXT record with
    this name in the DNS

    record set of the custom domain name to prove ownership over the domain. The values
    under this

    TXT record must contain the expected TXT record value.'
  signature: 'expected_txt_record_name: str | None'
- uid: azure.mgmt.eventgrid.models.CustomDomainConfiguration.expected_txt_record_value
  name: expected_txt_record_value
  summary: 'Expected DNS TXT record value. Event Grid will check for a TXT record
    with this value in the

    DNS record set of the custom domain name to prove ownership over the domain.'
  signature: 'expected_txt_record_value: str | None'
- uid: azure.mgmt.eventgrid.models.CustomDomainConfiguration.fully_qualified_domain_name
  name: fully_qualified_domain_name
  summary: Fully Qualified Domain Name (FQDN) for the custom domain. Required.
  signature: 'fully_qualified_domain_name: str'
- uid: azure.mgmt.eventgrid.models.CustomDomainConfiguration.identity
  name: identity
  summary: 'Identity info for accessing the certificate for the custom domain. This
    identity info must

    match an identity that has been set on the namespace.'
  signature: 'identity: _models.CustomDomainIdentity | None'
- uid: azure.mgmt.eventgrid.models.CustomDomainConfiguration.validation_state
  name: validation_state
  summary: 'Validation state for the custom domain. This is a read only property and
    is initially set to

    ''Pending'' and will be updated to ''Approved'' by Event Grid only after ownership
    of the domain

    name has been successfully validated. Known values are: "Pending", "Approved",
    and

    "ErrorRetrievingDnsRecord".'
  signature: 'validation_state: str | _models.CustomDomainValidationState | None'
