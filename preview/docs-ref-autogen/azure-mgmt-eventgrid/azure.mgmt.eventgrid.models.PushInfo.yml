    \ the value for the number of seconds. \n\nThis duration value cannot be set greater\
    \ than the topic's EventRetentionInDays. It is is\nan optional field where its\
    \ minimum value is 1 minute, and its maximum is determined\nby topic's EventRetentionInDays\
    \ value. The followings are examples of valid values:\n* 'P0DT23H12M' or 'PT23H12M':\
    \ for duration of 23 hours and 12 minutes.\n* 'P1D' or 'P1DT0H0M0S': for duration\
    \ of 1 day."
  signature: 'event_time_to_live: str | None'
