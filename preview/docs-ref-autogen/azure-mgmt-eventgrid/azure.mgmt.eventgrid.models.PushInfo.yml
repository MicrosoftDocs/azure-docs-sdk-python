### YamlMime:PythonClass
uid: azure.mgmt.eventgrid.models.PushInfo
name: PushInfo
fullName: azure.mgmt.eventgrid.models.PushInfo
module: azure.mgmt.eventgrid.models
summary: Properties of the destination info for event subscription supporting push.
constructor:
  syntax: 'PushInfo(*args: Any, **kwargs: Any)'
variables:
- description: The maximum delivery count of the events.
  name: max_delivery_count
  types:
  - <xref:int>
- description: "Time span duration in ISO 8601 format that determines how long\nmessages\
    \ are available to the subscription from the time the message was published. This\n\
    duration value is expressed using the following format: 'P(n)Y(n)M(n)DT(n)H(n)M(n)S',\n\
    where:\n\n* 14. is replaced by the value of each time element that follows the\
    \ (n). \n\n\n* P is the duration (or Period) designator and is always placed at\
    \ the beginning of the duration. \n\n* Y is the year designator, and it follows\
    \ the value for the number of years. \n\n* M is the month designator, and it follows\
    \ the value for the number of months. \n\n* W is the week designator, and it follows\
    \ the value for the number of weeks. \n\n* D is the day designator, and it follows\
    \ the value for the number of days. \n\n* T is the time designator, and it precedes\
    \ the time components. \n\n* H is the hour designator, and it follows the value\
    \ for the number of hours. \n\n* M is the minute designator, and it follows the\
    \ value for the number of minutes. \n\n* S is the second designator, and it follows\
    \ the value for the number of seconds. \n\nThis duration value cannot be set greater\
    \ than the topic's EventRetentionInDays. It is is\nan optional field where its\
    \ minimum value is 1 minute, and its maximum is determined\nby topic's EventRetentionInDays\
    \ value. The followings are examples of valid values:\n* 'P0DT23H12M' or 'PT23H12M':\
    \ for duration of 23 hours and 12 minutes.\n* 'P1D' or 'P1DT0H0M0S': for duration\
    \ of 1 day."
  name: event_time_to_live
  types:
  - <xref:str>
- description: 'The dead letter destination of the event

    subscription. Any event that cannot be delivered to its'' destination is sent
    to the dead letter

    destination. Uses the managed identity setup on the parent resource (namely, namespace)
    to

    acquire the authentication tokens being used during dead-lettering.'
  name: dead_letter_destination_with_resource_identity
  types:
  - <xref:azure.mgmt.eventgrid.models.DeadLetterWithResourceIdentity>
- description: 'Information about the destination where events have to

    be delivered for the event subscription. Uses the managed identity setup on the
    parent resource

    (namely, topic or domain) to acquire the authentication tokens being used during
    delivery.'
  name: delivery_with_resource_identity
  types:
  - <xref:azure.mgmt.eventgrid.models.DeliveryWithResourceIdentity>
- description: 'Information about the destination where events have to be delivered
    for the

    event subscription. Uses Azure Event Grid''s identity to acquire the authentication
    tokens being

    used during delivery.'
  name: destination
  types:
  - <xref:azure.mgmt.eventgrid.models.EventSubscriptionDestination>
