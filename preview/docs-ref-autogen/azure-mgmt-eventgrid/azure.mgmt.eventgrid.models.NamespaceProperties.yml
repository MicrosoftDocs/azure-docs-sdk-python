  name: provisioning_state
  summary: '"Creating", "Updating",

    "Deleting", "Succeeded", "Canceled", "Failed", "Deleted", "DeleteFailed",

    "CreateFailed", and "UpdatedFailed".'
  signature: 'provisioning_state: str | _models.NamespaceProvisioningState | None'
- uid: azure.mgmt.eventgrid.models.NamespaceProperties.public_network_access
  name: public_network_access
  summary: 'This determines if traffic is allowed over public network. By default
    it is enabled. You can

    further restrict to specific IPs by configuring <seealso

    cref="P:Microsoft.Azure.Events.ResourceProvider.Common.Contracts.PubSub.NamespaceProperties.InboundIpRules"

