uid: azure.mgmt.search.models.EncryptionWithCmk
name: EncryptionWithCmk
fullName: azure.mgmt.search.models.EncryptionWithCmk
module: azure.mgmt.search.models
summary: 'Describes a policy that determines how resources within the search service
  are to be encrypted

  with customer managed keys.'
constructor:
  syntax: 'EncryptionWithCmk(*args: Any, **kwargs: Any)'
variables:
- description: 'Describes how a search service should enforce compliance if it finds
    objects

    that aren''t encrypted with the customer-managed key. Known values are: "Disabled",
    "Enabled",

    and "Unspecified".'
  name: enforcement
  types:
  - <xref:str>
  - <xref:azure.mgmt.search.models.SearchEncryptionWithCmk>
- description: 'Returns the status of search service compliance with

    respect to non-CMK-encrypted objects. If a service has more than one unencrypted
    object, and

    enforcement is enabled, the service is marked as noncompliant. Known values are:
    "Compliant"

    and "NonCompliant".'
  name: encryption_compliance_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.search.models.SearchEncryptionComplianceStatus>
- description: 'Describes the customer-managed key configuration for

    encrypting the search service.'
  name: service_level_encryption_key
  types:
  - <xref:azure.mgmt.search.models.SearchResourceEncryptionKey>
