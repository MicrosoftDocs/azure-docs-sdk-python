- uid: azure.mgmt.search.aio.operations.QueryKeysOperations.delete
  name: delete
  summary: 'Deletes the specified query key. Unlike admin keys, query keys are not
    regenerated. The process

    for regenerating a query key is to delete and then recreate it. Returns 200 (OK)
    on successful

    deletion, 204 (No Content) if the service exists but the query keys not found,
    or 404 (Not

    Found) if the service is not found. NOTE: The behavior of returning 404 is inconsistent
    with

    ARM guidelines. Clients should expect a 204 response in future versions and avoid
    new

    dependencies on the 404 response.'
  signature: 'async delete(resource_group_name: str, search_service_name: str, key:
    str, **kwargs: Any) -> None'
  parameters:
  - name: resource_group_name
    description: 'The name of the resource group. The name is case insensitive.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: search_service_name
    description: 'The name of the Azure AI Search service associated with the

      specified resource group. Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: key
    description: 'The query key to be deleted. Query keys are identified by value,
      not by name.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  return:
    description: None
    types:
    - <xref:None>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
