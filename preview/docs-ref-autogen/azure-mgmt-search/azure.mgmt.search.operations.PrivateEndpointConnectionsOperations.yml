- uid: azure.mgmt.search.operations.PrivateEndpointConnectionsOperations.delete
  name: delete
  summary: 'Disconnects the private endpoint connection and deletes it from the search
    service. Returns 200

    (OK) with the deleted connection details on successful deletion, or 404 (Not Found)
    if the

    connection does not exist. NOTE: The behavior of returning 404 is inconsistent
    with ARM

    guidelines. Clients should expect a 204 response in future versions and avoid
    new dependencies

    on the 404 response.'
  signature: 'delete(resource_group_name: str, search_service_name: str, private_endpoint_connection_name:
    str, **kwargs: Any) -> PrivateEndpointConnection | None'
  parameters:
  - name: resource_group_name
    description: 'The name of the resource group. The name is case insensitive.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: search_service_name
    description: 'The name of the Azure AI Search service associated with the

      specified resource group. Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: private_endpoint_connection_name
    description: 'The name of the private endpoint connection to the

      Azure AI Search service with the specified resource group. Required.'
    isRequired: true
    types:
    - <xref:str>
  return:
    description: 'PrivateEndpointConnection or None. The PrivateEndpointConnection
      is compatible with

      MutableMapping'
    types:
    - <xref:azure.mgmt.search.models.PrivateEndpointConnection>
    - <xref:None>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
