### YamlMime:PythonClass
uid: azure.mgmt.search.models.NetworkRuleSet
name: NetworkRuleSet
fullName: azure.mgmt.search.models.NetworkRuleSet
module: azure.mgmt.search.models
summary: Network specific rules that determine how the Azure AI Search service may
  be reached.
constructor:
  syntax: 'NetworkRuleSet(*args: Any, **kwargs: Any)'
variables:
- description: 'A list of IP restriction rules that defines the inbound network(s)
    with

    allowing access to the search service endpoint. At the meantime, all other public
    IP networks

    are blocked by the firewall. These restriction rules are applied only when the

    ''publicNetworkAccess'' of the search service is ''enabled''; otherwise, traffic
    over public

    interface is not allowed even with any public IP rules, and private endpoint connections
    would

    be the exclusive access method.'
  name: ip_rules
  types:
  - <xref:list>[<xref:azure.mgmt.search.models.IpRule>]
- description: 'Possible origins of inbound traffic that can bypass the rules defined
    in the

    ''ipRules'' section. Known values are: "None", "AzurePortal", and "AzureServices".'
  name: bypass
  types:
  - <xref:str>
  - <xref:azure.mgmt.search.models.SearchBypass>
attributes:
- uid: azure.mgmt.search.models.NetworkRuleSet.bypass
  name: bypass
  summary: 'Possible origins of inbound traffic that can bypass the rules defined
    in the ''ipRules'' section.

    Known values are: "None", "AzurePortal", and "AzureServices".'
  signature: 'bypass: str | _models.SearchBypass | None'
- uid: azure.mgmt.search.models.NetworkRuleSet.ip_rules
  name: ip_rules
  summary: 'A list of IP restriction rules that defines the inbound network(s) with
    allowing access to the

    search service endpoint. At the meantime, all other public IP networks are blocked
    by the

    firewall. These restriction rules are applied only when the ''publicNetworkAccess''
    of the search

    service is ''enabled''; otherwise, traffic over public interface is not allowed
    even with any

    public IP rules, and private endpoint connections would be the exclusive access
    method.'
  signature: 'ip_rules: list[''_models.IpRule''] | None'
