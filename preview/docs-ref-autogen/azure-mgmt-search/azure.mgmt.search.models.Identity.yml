### YamlMime:PythonClass
uid: azure.mgmt.search.models.Identity
name: Identity
fullName: azure.mgmt.search.models.Identity
module: azure.mgmt.search.models
summary: 'Details about the search service identity. A null value indicates that the
  search service has

  no identity assigned.'
constructor:
  syntax: 'Identity(*args: Any, **kwargs: Any)'
variables:
- description: The principal ID of the system-assigned identity of the search service.
  name: principal_id
  types:
  - <xref:str>
- description: The tenant ID of the system-assigned identity of the search service.
  name: tenant_id
  types:
  - <xref:str>
- description: 'The type of identity used for the resource. The type ''SystemAssigned,
    UserAssigned''

    includes both an identity created by the system and a set of user assigned identities.
    The type

    ''None'' will remove all identities from the service. Required. Known values are:
    "None",

    "SystemAssigned", "UserAssigned", and "SystemAssigned, UserAssigned".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.search.models.IdentityType>
- description: 'The list of user identities associated with the resource. The

    user identity dictionary key references will be ARM resource IDs in the form:

    ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}''.'
  name: user_assigned_identities
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.search.models.UserAssignedIdentity>]
attributes:
- uid: azure.mgmt.search.models.Identity.principal_id
  name: principal_id
  summary: The principal ID of the system-assigned identity of the search service.
  signature: 'principal_id: str | None'
- uid: azure.mgmt.search.models.Identity.tenant_id
  name: tenant_id
  summary: The tenant ID of the system-assigned identity of the search service.
  signature: 'tenant_id: str | None'
- uid: azure.mgmt.search.models.Identity.type
  name: type
  summary: 'The type of identity used for the resource. The type ''SystemAssigned,
    UserAssigned'' includes

    both an identity created by the system and a set of user assigned identities.
    The type ''None''

    will remove all identities from the service. Required. Known values are: "None",

    "SystemAssigned", "UserAssigned", and "SystemAssigned, UserAssigned".'
  signature: 'type: str | _models.IdentityType'
- uid: azure.mgmt.search.models.Identity.user_assigned_identities
  name: user_assigned_identities
  summary: 'The list of user identities associated with the resource. The user identity
    dictionary key

    references will be ARM resource IDs in the form:

    ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}''.'
  signature: 'user_assigned_identities: dict[str, ''_models.UserAssignedIdentity'']
    | None'
