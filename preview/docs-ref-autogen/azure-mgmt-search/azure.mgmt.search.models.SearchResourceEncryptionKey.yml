### YamlMime:PythonClass
uid: azure.mgmt.search.models.SearchResourceEncryptionKey
name: SearchResourceEncryptionKey
fullName: azure.mgmt.search.models.SearchResourceEncryptionKey
module: azure.mgmt.search.models
summary: 'A customer-managed encryption key in Azure Key Vault. Keys that you create
  and manage can be

  used to encrypt or decrypt data-at-rest, such as indexes and synonym maps.'
constructor:
  syntax: 'SearchResourceEncryptionKey(*args: Any, **kwargs: Any)'
variables:
- description: The name of your Azure Key Vault key to be used to encrypt your data
    at rest.
  name: key_name
  types:
  - <xref:str>
- description: 'The version of your Azure Key Vault key to be used to encrypt your
    data at

    rest.'
  name: key_version
  types:
  - <xref:str>
- description: 'The URI of your Azure Key Vault, also referred to as DNS name, that
    contains

    the key to be used to encrypt your data at rest. An example URI might be

    `https://my-keyvault-name.vault.azure.net`.'
  name: vault_uri
  types:
  - <xref:str>
- description: 'An explicit managed identity to use for this encryption key. If not
    specified

    and the access credentials property is null, the system-assigned managed identity
    is used. On

    update to the resource, if the explicit identity is unspecified, it remains unchanged.
    If

    "none" is specified, the value of this property is cleared.'
  name: identity
  types:
  - <xref:azure.mgmt.search.models.DataIdentity>
- description: 'Optional Azure Active Directory credentials used for accessing your

    Azure Key Vault. Not required if using managed identity instead.'
  name: access_credentials
  types:
  - <xref:azure.mgmt.search.models.AzureActiveDirectoryApplicationCredentials>
