### YamlMime:PythonClass
uid: azure.mgmt.discovery.models.SupercomputerProperties
name: SupercomputerProperties
fullName: azure.mgmt.discovery.models.SupercomputerProperties
module: azure.mgmt.discovery.models
summary: Supercomputer properties.
constructor:
  syntax: 'SupercomputerProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The status of the last operation. Known values are: "Succeeded",

    "Failed", "Canceled", "Accepted", "Provisioning", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.discovery.models.ProvisioningState>
- description: 'System Subnet ID associated with managed NodePool for system resources.
    It

    should have connectivity to the child NodePool subnets. Required.'
  name: subnet_id
  types:
  - <xref:str>
- description: 'System Subnet ID associated with AKS apiserver. Must be delegated

    to Microsoft.ContainerService/managedClusters. It should have connectivity to
    the system subnet

    and nodepool subnets.'
  name: management_subnet_id
  types:
  - <xref:str>
- description: 'Network egress type provisioned for the supercomputer workloads. Defaults

    to LoadBalancer if not specified. If None is specified, the customer is responsible
    for

    providing outbound connectivity for Supercomputer functionality. Known values
    are:

    "LoadBalancer" and "None".'
  name: outbound_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.discovery.models.NetworkEgressType>
- description: 'The SKU to use for the system node pool. Known values are: "Standard_D4s_v6",

    "Standard_D4s_v5", and "Standard_D4s_v4".'
  name: system_sku
  types:
  - <xref:str>
  - <xref:azure.mgmt.discovery.models.SystemSku>
- description: Dictionary of identity properties. Required.
  name: identities
  types:
  - <xref:azure.mgmt.discovery.models.SupercomputerIdentities>
- description: 'Whether or not to use a customer managed key when encrypting data

    at rest. Known values are: "Enabled" and "Disabled".'
  name: customer_managed_keys
  types:
  - <xref:str>
  - <xref:azure.mgmt.discovery.models.CustomerManagedKeys>
- description: 'Disk Encryption Set ID to use for Customer Managed Keys

    encryption. Required if Customer Managed Keys is enabled.'
  name: disk_encryption_set_id
  types:
  - <xref:str>
- description: 'The Log Analytics Cluster to use for debug logs. This is

    required when Customer Managed Keys are enabled.'
  name: log_analytics_cluster_id
  types:
  - <xref:str>
- description: The resource group for resources managed on behalf of customer.
  name: managed_resource_group
  types:
  - <xref:str>
- description: 'Managed-On-Behalf-Of configuration properties. This

    configuration exists for the resources where a resource provider manages those
    resources on

    behalf of the resource owner.'
  name: managed_on_behalf_of_configuration
  types:
  - <xref:azure.mgmt.discovery.models.WithMoboBrokerResources>
attributes:
- uid: azure.mgmt.discovery.models.SupercomputerProperties.customer_managed_keys
  name: customer_managed_keys
  summary: 'Whether or not to use a customer managed key when encrypting data at rest.
    Known values are:

    "Enabled" and "Disabled".'
  signature: 'customer_managed_keys: str | _models.CustomerManagedKeys | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.disk_encryption_set_id
  name: disk_encryption_set_id
  summary: 'Disk Encryption Set ID to use for Customer Managed Keys encryption. Required
    if Customer

    Managed Keys is enabled.'
  signature: 'disk_encryption_set_id: str | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.identities
  name: identities
  summary: Dictionary of identity properties. Required.
  signature: 'identities: _models.SupercomputerIdentities'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.log_analytics_cluster_id
  name: log_analytics_cluster_id
  summary: 'The Log Analytics Cluster to use for debug logs. This is required when
    Customer Managed Keys

    are enabled.'
  signature: 'log_analytics_cluster_id: str | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.managed_on_behalf_of_configuration
  name: managed_on_behalf_of_configuration
  summary: 'Managed-On-Behalf-Of configuration properties. This configuration exists
    for the resources

    where a resource provider manages those resources on behalf of the resource owner.'
  signature: 'managed_on_behalf_of_configuration: _models.WithMoboBrokerResources
    | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.managed_resource_group
  name: managed_resource_group
  summary: The resource group for resources managed on behalf of customer.
  signature: 'managed_resource_group: str | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.management_subnet_id
  name: management_subnet_id
  summary: 'System Subnet ID associated with AKS apiserver. Must be delegated to

    Microsoft.ContainerService/managedClusters. It should have connectivity to the
    system subnet

    and nodepool subnets.'
  signature: 'management_subnet_id: str | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.outbound_type
  name: outbound_type
  summary: 'Network egress type provisioned for the supercomputer workloads. Defaults
    to LoadBalancer if

    not specified. If None is specified, the customer is responsible for providing
    outbound

    connectivity for Supercomputer functionality. Known values are: "LoadBalancer"
    and "None".'
  signature: 'outbound_type: str | _models.NetworkEgressType | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.provisioning_state
  name: provisioning_state
  summary: '"Succeeded", "Failed", "Canceled",

    "Accepted", "Provisioning", "Updating", and "Deleting".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.subnet_id
  name: subnet_id
  summary: 'System Subnet ID associated with managed NodePool for system resources.
    It should have

    connectivity to the child NodePool subnets. Required.'
  signature: 'subnet_id: str'
- uid: azure.mgmt.discovery.models.SupercomputerProperties.system_sku
  name: system_sku
