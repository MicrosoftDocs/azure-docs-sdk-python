uid: azure.developer.loadtesting.models.MonthlyRecurrenceByWeekDays
name: MonthlyRecurrenceByWeekDays
fullName: azure.developer.loadtesting.models.MonthlyRecurrenceByWeekDays
module: azure.developer.loadtesting.models
summary: Recurrence model when frequency is set as MonthlyByDays .
constructor:
  syntax: 'MonthlyRecurrenceByWeekDays(*args: Any, **kwargs: Any)'
variables:
- description: 'Recurrence end model. You can specify the end either by providing
    a

    numberOfOccurrences (which will end the recurrence after the specified number
    of occurrences)

    or by providing an endDateTime (which will end the recurrence after the specified
    date). If

    neither value is provided, the recurrence will continue until it is manually ended.
    However, if

    both values are provided, an error will be thrown.'
  name: recurrence_end
  types:
  - <xref:azure.developer.loadtesting.models.RecurrenceEnd>
- description: 'Frequency of the month recurrence. Required. Recurrence defined monthly
    on

    specific days, as specified by MonthlyRecurrenceByWeekDays.'
  name: frequency
  types:
  - <xref:str>
  - <xref:azure.developer.loadtesting.models.MONTHLY_BY_DAYS>
- description: Specific days of the week when the recurrence should repeat.
  name: week_days_in_month
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.developer.loadtesting.models.WeekDays>]
- description: 'Index of the week in a month at which the recurrence should repeat.
    For example,

    if the index is ''2'', weekDay is ''Monday'', interval is 3 and frequency is ''Month'',
    the

    recurrence will run every second Monday of the month and repeat every 3 months.
    Value of index

    can be 1 to 5. Required.'
  name: index
  types:
  - <xref:int>
- description: 'The interval at which the recurrence should repeat. It signifies the
    number of

    months between each recurrence. Required.'
  name: interval
  types:
  - <xref:int>
