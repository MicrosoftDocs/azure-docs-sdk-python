name: RecurrenceEnd
fullName: azure.developer.loadtesting.models.RecurrenceEnd
module: azure.developer.loadtesting.models
summary: 'Recurrence end model. Either provide numberOfOccurrences if you want recurrence
  to end after a

  specified number of occurrences or provide endDate if you want recurrence to end
  after a

  specified end date. If both values are provided, a validation error will be thrown
  indicating

  that only one field should be provided. If neither value is provided, the recurrence
  will end

  when manually ended.'
