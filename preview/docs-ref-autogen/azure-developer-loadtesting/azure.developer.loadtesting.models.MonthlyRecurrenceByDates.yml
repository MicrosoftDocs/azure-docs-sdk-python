name: MonthlyRecurrenceByDates
fullName: azure.developer.loadtesting.models.MonthlyRecurrenceByDates
module: azure.developer.loadtesting.models
summary: Recurrence model when frequency is set as MonthlyByDates.
constructor:
  syntax: 'MonthlyRecurrenceByDates(*args: Any, **kwargs: Any)'
variables:
- description: 'Recurrence end model. You can specify the end either by providing
    a

    numberOfOccurrences (which will end the recurrence after the specified number
    of occurrences)

    or by providing an endDateTime (which will end the recurrence after the specified
    date). If

    neither value is provided, the recurrence will continue until it is manually ended.
    However, if

    both values are provided, an error will be thrown.'
  name: recurrence_end
  types:
  - <xref:azure.developer.loadtesting.models.RecurrenceEnd>
- description: 'Frequency of the month recurrence. Required. Recurrence defined monthly
    on

    specific dates, as specified by MonthlyRecurrenceByDates.'
  name: frequency
  types:
  - <xref:str>
  - <xref:azure.developer.loadtesting.models.MONTHLY_BY_DATES>
- description: 'Recurrence set to repeat on the specified dates of the month. Value
    of

    dates can be 1 to 31 and -1. -1 represents the last day of the month.'
  name: dates_in_month
  types:
  - <xref:list>[<xref:int>]
- description: 'The interval at which the recurrence should repeat. It signifies the
    number of

    months between each recurrence.'
  name: interval
  types:
  - <xref:int>
