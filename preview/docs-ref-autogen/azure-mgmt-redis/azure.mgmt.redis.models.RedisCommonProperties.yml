### YamlMime:PythonClass
uid: azure.mgmt.redis.models.RedisCommonProperties
name: RedisCommonProperties
fullName: azure.mgmt.redis.models.RedisCommonProperties
module: azure.mgmt.redis.models
summary: Create/Update/Get common properties of the redis cache.
constructor:
  syntax: 'RedisCommonProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'All Redis Settings. Few possible keys:

    rdb-backup-enabled,rdb-storage-connection-string,rdb-backup-frequency,maxmemory-delta,

    maxmemory-policy,notify-keyspace-events, aof-backup-enabled, aof-storage-connection-string-0,

    aof-storage-connection-string-1 etc.'
  name: redis_configuration
  types:
  - <xref:azure.mgmt.redis.models.RedisCommonPropertiesRedisConfiguration>
- description: 'Redis version. This should be in the form ''major[.minor]'' (only
    ''major'' is

    required) or the value ''latest'' which refers to the latest stable Redis version
    that is

    available. Supported versions: 4.0, 6.0 (latest). Default value is ''latest''.'
  name: redis_version
  types:
  - <xref:str>
- description: Specifies whether the non-ssl Redis server port (6379) is enabled.
  name: enable_non_ssl_port
  types:
  - <xref:bool>
- description: The number of replicas to be created per primary.
  name: replicas_per_master
  types:
  - <xref:int>
- description: The number of replicas to be created per primary.
  name: replicas_per_primary
  types:
  - <xref:int>
- description: A dictionary of tenant settings.
  name: tenant_settings
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: The number of shards to be created on a Premium Cluster Cache.
  name: shard_count
  types:
  - <xref:int>
- description: 'Optional: requires clients to use a specified TLS version (or

    higher) to connect (e,g, ''1.0'', ''1.1'', ''1.2''). Known values are: "1.0",
    "1.1", and "1.2".'
  name: minimum_tls_version
  types:
  - <xref:str>
  - <xref:azure.mgmt.redis.models.TlsVersion>
- description: 'Whether or not public endpoint access is allowed for this cache.

    Value is optional but if passed in, must be ''Enabled'' or ''Disabled''. If ''Disabled'',
    private

    endpoints are the exclusive access method. Known values are: "Enabled" and "Disabled".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.redis.models.PublicNetworkAccess>
- description: 'Optional: Specifies the update channel for the monthly Redis updates
    your

    Redis Cache will receive. Caches using ''Preview'' update channel get latest Redis
    updates at

    least 4 weeks ahead of ''Stable'' channel caches. Default value is ''Stable''.
    Known values are:

    "Stable" and "Preview".'
  name: update_channel
  types:
  - <xref:str>
  - <xref:azure.mgmt.redis.models.UpdateChannel>
- description: 'Authentication to Redis through access keys is

    disabled when set as true. Default value is false.'
  name: disable_access_key_authentication
  types:
  - <xref:bool>
- description: 'Optional: Specifies how availability zones are allocated to the

    Redis cache. ''Automatic'' enables zone redundancy and Azure will automatically
    select zones

    based on regional availability and capacity. ''UserDefined'' will select availability
    zones

    passed in by you using the ''zones'' parameter. ''NoZones'' will produce a non-zonal
    cache. If

    ''zonalAllocationPolicy'' is not passed, it will be set to ''UserDefined'' when
    zones are passed

    in, otherwise, it will be set to ''Automatic'' in regions where zones are supported
    and ''NoZones''

    in regions where zones are not supported. Known values are: "Automatic", "UserDefined",
    and

    "NoZones".'
  name: zonal_allocation_policy
  types:
  - <xref:str>
  - <xref:azure.mgmt.redis.models.ZonalAllocationPolicy>
attributes:
- uid: azure.mgmt.redis.models.RedisCommonProperties.disable_access_key_authentication
  name: disable_access_key_authentication
  summary: 'Authentication to Redis through access keys is disabled when set as true.
    Default value is

    false.'
  signature: 'disable_access_key_authentication: bool | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.enable_non_ssl_port
  name: enable_non_ssl_port
  summary: Specifies whether the non-ssl Redis server port (6379) is enabled.
  signature: 'enable_non_ssl_port: bool | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.minimum_tls_version
  name: minimum_tls_version
  summary: 'requires clients to use a specified TLS version (or higher) to connect
    (e,g, ''1.0'',

    ''1.1'', ''1.2''). Known values are: "1.0", "1.1", and "1.2".'
  signature: 'minimum_tls_version: str | _models.TlsVersion | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.public_network_access
  name: public_network_access
  summary: 'Whether or not public endpoint access is allowed for this cache.  Value
    is optional but if

    passed in, must be ''Enabled'' or ''Disabled''. If ''Disabled'', private endpoints
    are the exclusive

    access method. Known values are: "Enabled" and "Disabled".'
  signature: 'public_network_access: str | _models.PublicNetworkAccess | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.redis_configuration
  name: redis_configuration
  summary: 'All Redis Settings. Few possible keys:

    rdb-backup-enabled,rdb-storage-connection-string,rdb-backup-frequency,maxmemory-delta,

    maxmemory-policy,notify-keyspace-events, aof-backup-enabled, aof-storage-connection-string-0,

    aof-storage-connection-string-1 etc.'
  signature: 'redis_configuration: _models.RedisCommonPropertiesRedisConfiguration
    | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.redis_version
  name: redis_version
  summary: 'Redis version. This should be in the form ''major[.minor]'' (only ''major''
    is required) or the

    value ''latest'' which refers to the latest stable Redis version that is available.
    Supported

    versions: 4.0, 6.0 (latest). Default value is ''latest''.'
  signature: 'redis_version: str | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.replicas_per_master
  name: replicas_per_master
  summary: The number of replicas to be created per primary.
  signature: 'replicas_per_master: int | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.replicas_per_primary
  name: replicas_per_primary
  summary: The number of replicas to be created per primary.
  signature: 'replicas_per_primary: int | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.shard_count
  name: shard_count
  summary: The number of shards to be created on a Premium Cluster Cache.
  signature: 'shard_count: int | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.tenant_settings
  name: tenant_settings
  summary: A dictionary of tenant settings.
  signature: 'tenant_settings: dict[str, str] | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.update_channel
  name: update_channel
  summary: 'Specifies the update channel for the monthly Redis updates your Redis
    Cache will

    receive. Caches using ''Preview'' update channel get latest Redis updates at least
    4 weeks ahead

    of ''Stable'' channel caches. Default value is ''Stable''. Known values are: "Stable"
    and

    "Preview".'
  signature: 'update_channel: str | _models.UpdateChannel | None'
- uid: azure.mgmt.redis.models.RedisCommonProperties.zonal_allocation_policy
  name: zonal_allocation_policy
  summary: 'Specifies how availability zones are allocated to the Redis cache. ''Automatic''

    enables zone redundancy and Azure will automatically select zones based on regional

    availability and capacity. ''UserDefined'' will select availability zones passed
    in by you using

    the ''zones'' parameter. ''NoZones'' will produce a non-zonal cache. If ''zonalAllocationPolicy''
    is

    not passed, it will be set to ''UserDefined'' when zones are passed in, otherwise,
    it will be set

    to ''Automatic'' in regions where zones are supported and ''NoZones'' in regions
    where zones are

    not supported. Known values are: "Automatic", "UserDefined", and "NoZones".'
  signature: 'zonal_allocation_policy: str | _models.ZonalAllocationPolicy | None'
