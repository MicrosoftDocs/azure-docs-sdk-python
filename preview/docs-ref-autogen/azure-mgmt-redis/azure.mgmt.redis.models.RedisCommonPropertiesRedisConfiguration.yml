  types:
  - <xref:str>
- description: Second storage account connection string.
  name: aof_storage_connection_string1
  types:
  - <xref:str>
- description: Value in megabytes reserved for fragmentation per shard.
  name: maxfragmentationmemory_reserved
  types:
  - <xref:str>
- description: 'The eviction strategy used when your data won''t fit within its memory

    limit.'
  name: maxmemory_policy
