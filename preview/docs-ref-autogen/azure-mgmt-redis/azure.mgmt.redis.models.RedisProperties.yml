- uid: azure.mgmt.redis.models.RedisProperties.target_amr_resource_id
  name: target_amr_resource_id
  summary: 'The resource ID of the target Azure Managed Redis resource that this Azure
    Cache for Redis

    resource is being migrated to.'
  signature: 'target_amr_resource_id: str | None'
