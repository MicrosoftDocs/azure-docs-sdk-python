    "Migrating", "MigrationFailed", "MigrationSucceeded", "MigrationCancelling", and

    "MigrationCancellationFailed".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.redis.models.RedisProperties.ssl_port
