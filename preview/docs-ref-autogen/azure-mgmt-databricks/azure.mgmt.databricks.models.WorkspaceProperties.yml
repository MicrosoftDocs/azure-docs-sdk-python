### YamlMime:PythonClass
uid: azure.mgmt.databricks.models.WorkspaceProperties
name: WorkspaceProperties
fullName: azure.mgmt.databricks.models.WorkspaceProperties
module: azure.mgmt.databricks.models
summary: The workspace properties.
constructor:
  syntax: 'WorkspaceProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The workspace compute mode. Required on create, cannot be changed.
    Possible

    values include: ''Serverless'', ''Hybrid''. Required. Known values are: "Serverless"
    and "Hybrid".'
  name: compute_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.databricks.models.ComputeMode>
- description: 'The managed resource group Id. Required in Hybrid ComputeMode

    workspace. Not allowed in Serverless ComputeMode workspace.'
  name: managed_resource_group_id
  types:
  - <xref:str>
- description: The workspace's custom parameters.
  name: parameters
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomParameters>
- description: 'The workspace provisioning state. Known values are: "Accepted",

    "Running", "Ready", "Creating", "Created", "Deleting", "Deleted", "Canceled",
    "Failed",

    "Succeeded", and "Updating".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.databricks.models.ProvisioningState>
- description: The blob URI where the UI definition file is located.
  name: ui_definition_uri
  types:
  - <xref:str>
- description: The workspace provider authorizations.
  name: authorizations
  types:
  - <xref:list>[<xref:azure.mgmt.databricks.models.WorkspaceProviderAuthorization>]
- description: 'Indicates the Object ID, PUID and Application ID of entity that created
    the

    workspace.'
  name: created_by
  types:
  - <xref:azure.mgmt.databricks.models.CreatedBy>
- description: 'Indicates the Object ID, PUID and Application ID of entity that last
    updated

    the workspace.'
  name: updated_by
  types:
  - <xref:azure.mgmt.databricks.models.CreatedBy>
- description: Specifies the date and time when the workspace is created.
  name: created_date_time
  types:
  - <xref:datetime.datetime>
- description: 'The unique identifier of the databricks workspace in databricks control

    plane.'
  name: workspace_id
  types:
  - <xref:str>
- description: 'The workspace URL which is of the format

    ''adb-{workspaceId}.{random}.azuredatabricks.net''.'
  name: workspace_url
  types:
  - <xref:str>
- description: 'The details of Managed Identity of Storage Account. Only

    returned in Hybrid ComputeMode workspace.'
  name: storage_account_identity
  types:
  - <xref:azure.mgmt.databricks.models.ManagedIdentityConfiguration>
- description: 'The details of Managed Identity of Disk Encryption Set used for

    Managed Disk Encryption. Only returned in Hybrid ComputeMode workspace.'
  name: managed_disk_identity
  types:
  - <xref:azure.mgmt.databricks.models.ManagedIdentityConfiguration>
- description: 'The resource Id of the managed disk encryption set. Not allowed

    in Serverless ComputeMode workspace.'
  name: disk_encryption_set_id
  types:
  - <xref:str>
- description: 'Encryption properties for databricks workspace. Supported in both
    Serverless

    and Hybrid ComputeMode workspace.'
  name: encryption
  types:
  - <xref:azure.mgmt.databricks.models.WorkspacePropertiesEncryption>
- description: 'Contains settings related to the Enhanced Security and

    Compliance Add-On. Supported in both Serverless and Hybrid ComputeMode workspace.'
  name: enhanced_security_compliance
  types:
  - <xref:azure.mgmt.databricks.models.EnhancedSecurityComplianceDefinition>
- description: 'Private endpoint connections created on the workspace.

    Supported in both Serverless and Hybrid ComputeMode workspace.'
  name: private_endpoint_connections
  types:
  - <xref:list>[<xref:azure.mgmt.databricks.models.PrivateEndpointConnection>]
- description: 'The network access type for accessing workspace. Set value to

    disabled to access workspace only via private link. Used to configure front-end
    only private

    link for Serverless ComputeMode workspace. Known values are: "Enabled" and "Disabled".'
  name: public_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.databricks.models.PublicNetworkAccess>
- description: 'Gets or sets a value indicating whether data plane (clusters) to

    control plane communication happen over private endpoint. Supported values are
    ''AllRules'' and

    ''NoAzureDatabricksRules''. ''NoAzureServiceRules'' value is for internal use
    only. Not allowed in

    Serverless ComputeMode workspace. Known values are: "AllRules", "NoAzureDatabricksRules",
    and

    "NoAzureServiceRules".'
  name: required_nsg_rules
  types:
  - <xref:str>
  - <xref:azure.mgmt.databricks.models.RequiredNsgRules>
- description: 'Properties for Default Catalog configuration during workspace creation.

    Not allowed in Serverless ComputeMode workspace.'
  name: default_catalog
  types:
  - <xref:azure.mgmt.databricks.models.DefaultCatalogProperties>
- description: 'Indicates whether unity catalog enabled for the workspace or not.
    Set as

    true in Serverless ComputeMode workspace.'
  name: is_uc_enabled
  types:
  - <xref:bool>
- description: 'Access Connector Resource that is going to be associated with

    Databricks Workspace. Not allowed in Serverless ComputeMode workspace.'
  name: access_connector
  types:
  - <xref:azure.mgmt.databricks.models.WorkspacePropertiesAccessConnector>
- description: 'Gets or Sets Default Storage Firewall configuration

    information. Not allowed in Serverless ComputeMode workspace. Known values are:
    "Disabled" and

    "Enabled".'
  name: default_storage_firewall
  types:
  - <xref:str>
  - <xref:azure.mgmt.databricks.models.DefaultStorageFirewall>
