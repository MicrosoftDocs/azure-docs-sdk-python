### YamlMime:PythonClass
uid: azure.mgmt.databricks.models.WorkspaceCustomParameters
name: WorkspaceCustomParameters
fullName: azure.mgmt.databricks.models.WorkspaceCustomParameters
module: azure.mgmt.databricks.models
summary: Custom Parameters used for Workspace Creation. Not allowed in Serverless
  ComputeMode workspace.
constructor:
  syntax: 'WorkspaceCustomParameters(*args: Any, **kwargs: Any)'
variables:
- description: 'The ID of a Azure Machine Learning workspace to link with Databricks

    workspace. Not allowed in Serverless ComputeMode workspace.'
  name: aml_workspace_id
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'The ID of a Virtual Network where this Databricks Cluster

    should be created. Not allowed in Serverless ComputeMode workspace.'
  name: custom_virtual_network_id
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'The name of a Public Subnet within the Virtual Network. Not

    allowed in Serverless ComputeMode workspace.'
  name: custom_public_subnet_name
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'The name of the Private Subnet within the Virtual Network.

    Not allowed in Serverless ComputeMode workspace.'
  name: custom_private_subnet_name
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Boolean indicating whether the public IP should be disabled. Default

    value is true. Not allowed in Serverless ComputeMode workspace.'
  name: enable_no_public_ip
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceNoPublicIPBooleanParameter>
- description: 'Name of the outbound Load Balancer Backend Pool for

    Secure Cluster Connectivity (No Public IP). Not allowed in Serverless ComputeMode
    workspace.'
  name: load_balancer_backend_pool_name
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Resource URI of Outbound Load balancer for Secure Cluster Connectivity

    (No Public IP) workspace. Not allowed in Serverless ComputeMode workspace.'
  name: load_balancer_id
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Name of the NAT gateway for Secure Cluster Connectivity (No Public
    IP)

    workspace subnets. Not allowed in Serverless ComputeMode workspace.'
  name: nat_gateway_name
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Name of the Public IP for No Public IP workspace with managed vNet.
    Not

    allowed in Serverless ComputeMode workspace.'
  name: public_ip_name
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Prepare the workspace for encryption. Enables the Managed Identity

    for managed storage account. Not allowed in Serverless ComputeMode workspace.'
  name: prepare_encryption
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomBooleanParameter>
- description: 'Contains the encryption details for Customer-Managed Key (CMK) enabled

    workspace.Not allowed in Serverless ComputeMode workspace.'
  name: encryption
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceEncryptionParameter>
- description: 'A boolean indicating whether or not the DBFS root file

    system will be enabled with secondary layer of encryption with platform managed
    keys for data

    at rest. Not allowed in Serverless ComputeMode workspace.'
  name: require_infrastructure_encryption
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomBooleanParameter>
- description: 'Default DBFS storage account name. Not allowed in Serverless

    ComputeMode workspace.'
  name: storage_account_name
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Storage account SKU name, ex: Standard_GRS, Standard_LRS. Refer

    [https://aka.ms/storageskus](https://aka.ms/storageskus) for valid inputs. Not
    allowed in

    Serverless ComputeMode workspace.'
  name: storage_account_sku_name
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Address prefix for Managed virtual network. Default value for this

    input is 10.139. Not allowed in Serverless ComputeMode workspace.'
  name: vnet_address_prefix
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomStringParameter>
- description: 'Tags applied to resources under Managed resource group. These can
    be

    updated by updating tags at workspace level. Not allowed in Serverless ComputeMode
    workspace.'
  name: resource_tags
  types:
  - <xref:azure.mgmt.databricks.models.WorkspaceCustomObjectParameter>
