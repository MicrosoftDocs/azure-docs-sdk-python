  signature: 'resource_tags: _models.WorkspaceCustomObjectParameter | None'
- uid: azure.mgmt.databricks.models.WorkspaceCustomParameters.storage_account_name
  name: storage_account_name
  summary: Default DBFS storage account name. Not allowed in Serverless ComputeMode
