uid: azure.mgmt.azurestackhci.models.ProvisionOsJobProperties
name: ProvisionOsJobProperties
fullName: azure.mgmt.azurestackhci.models.ProvisionOsJobProperties
module: azure.mgmt.azurestackhci.models
summary: Represents the properties of an Azure Linux restricted operating environment
  Provision Os job.
constructor:
  syntax: 'ProvisionOsJobProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Deployment mode to trigger job. Known values are: "Validate" and

    "Deploy".'
  name: deployment_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.DeploymentMode>
- description: 'Job provisioning state. Known values are: "NotSpecified", "Error",

    "Succeeded", "Failed", "Canceled", "Connected", "Disconnected", "Deleted", "Creating",

    "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected",
    "InProgress",

    "Accepted", "Provisioning", and "DisableInProgress".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ProvisioningState>
- description: Unique, immutable job id.
  name: job_id
  types:
  - <xref:str>
- description: The UTC date and time at which the job started.
  name: start_time_utc
  types:
  - <xref:datetime.datetime>
- description: The UTC date and time at which the job completed.
  name: end_time_utc
  types:
  - <xref:datetime.datetime>
- description: 'Status of Edge device job. Known values are: "NotSpecified",

    "ValidationInProgress", "ValidationSuccess", "ValidationFailed", "DeploymentInProgress",

    "DeploymentFailed", "DeploymentSuccess", "Succeeded", "Failed", "Canceled", "Paused",
    and

    "Scheduled".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.JobStatus>
- description: error details.
  name: error
  types:
  - <xref:azure.mgmt.azurestackhci.models.ErrorDetail>
- description: 'Job Type to support polymorphic resource. Required. Job to provision
