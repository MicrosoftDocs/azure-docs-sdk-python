    system in the device.'
  name: job_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.PROVISION_OS>
- description: Os Provisioning request. Required.
  name: provisioning_request
  types:
  - <xref:azure.mgmt.azurestackhci.models.ProvisioningRequest>
- description: Reported Properties for Provision Os job.
  name: reported_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.ProvisionOsReportedProperties>
