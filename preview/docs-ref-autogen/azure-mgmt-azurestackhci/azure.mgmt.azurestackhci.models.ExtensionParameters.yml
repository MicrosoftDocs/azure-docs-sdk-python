### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.ExtensionParameters
name: ExtensionParameters
fullName: azure.mgmt.azurestackhci.models.ExtensionParameters
module: azure.mgmt.azurestackhci.models
summary: 'Describes the properties of a Machine Extension. This object mirrors the
  definition in

  HybridCompute.'
constructor:
  syntax: 'ExtensionParameters(*args: Any, **kwargs: Any)'
variables:
- description: 'How the extension handler should be forced to update even if the

    extension configuration has not changed.'
  name: force_update_tag
  types:
  - <xref:str>
- description: The name of the extension handler publisher.
  name: publisher
  types:
  - <xref:str>
- description: Specifies the type of the extension; an example is "CustomScriptExtension".
  name: type
  types:
  - <xref:str>
- description: 'Specifies the version of the script handler. Latest version would

    be used if not specified.'
  name: type_handler_version
  types:
  - <xref:str>
- description: 'Indicates whether the extension should use a newer minor

    version if one is available at deployment time. Once deployed, however, the extension
    will not

    upgrade minor versions unless redeployed, even with this property set to true.'
  name: auto_upgrade_minor_version
  types:
  - <xref:bool>
- description: Json formatted public settings for the extension.
  name: settings
  types:
  - <xref:any>
- description: Protected settings (may contain secrets).
  name: protected_settings
  types:
  - <xref:any>
- description: 'Indicates whether the extension should be automatically

    upgraded by the platform if there is a newer version available.'
  name: enable_automatic_upgrade
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.auto_upgrade_minor_version
  name: auto_upgrade_minor_version
  summary: 'Indicates whether the extension should use a newer minor version if one
    is available at

    deployment time. Once deployed, however, the extension will not upgrade minor
    versions unless

    redeployed, even with this property set to true.'
  signature: 'auto_upgrade_minor_version: bool | None'
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.enable_automatic_upgrade
  name: enable_automatic_upgrade
  summary: 'Indicates whether the extension should be automatically upgraded by the
    platform if there is a

    newer version available.'
  signature: 'enable_automatic_upgrade: bool | None'
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.force_update_tag
  name: force_update_tag
  summary: 'How the extension handler should be forced to update even if the extension
    configuration has

    not changed.'
  signature: 'force_update_tag: str | None'
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.protected_settings
  name: protected_settings
  summary: Protected settings (may contain secrets).
  signature: 'protected_settings: Any | None'
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.publisher
  name: publisher
  summary: The name of the extension handler publisher.
  signature: 'publisher: str | None'
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.settings
  name: settings
  summary: Json formatted public settings for the extension.
  signature: 'settings: Any | None'
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.type
  name: type
  summary: Specifies the type of the extension; an example is "CustomScriptExtension".
  signature: 'type: str | None'
- uid: azure.mgmt.azurestackhci.models.ExtensionParameters.type_handler_version
  name: type_handler_version
  summary: Specifies the version of the script handler. Latest version would be used
    if not specified.
  signature: 'type_handler_version: str | None'
