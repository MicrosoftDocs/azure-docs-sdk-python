### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.ConfidentialVmProfile
name: ConfidentialVmProfile
fullName: azure.mgmt.azurestackhci.models.ConfidentialVmProfile
module: azure.mgmt.azurestackhci.models
summary: 'Represents the Confidential Virtual Machine (CVM) configuration status for
  an edge device. It

  includes the current IGVM support state and detailed component-level status information.'
constructor:
  syntax: 'ConfidentialVmProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates whether Independent Guest Virtual Machine (IGVM) support
    is

    available on the device. This will be ''Enabled'' if the device supports CVMs,
    ''Disabled'' if not,

    and ''Unknown'' if the status cannot be determined. Known values are: "Unknown",
    "Enabled", and

    "Disabled".'
  name: igvm_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.IgvmStatus>
- description: 'Provides detailed status entries for IGVM-related components, including

    deployment status, compatibility checks, and error diagnostics.'
  name: status_details
  types:
  - <xref:list>[<xref:azure.mgmt.azurestackhci.models.IgvmStatusDetail>]
attributes:
- uid: azure.mgmt.azurestackhci.models.ConfidentialVmProfile.igvm_status
  name: igvm_status
  summary: 'Indicates whether Independent Guest Virtual Machine (IGVM) support is
    available on the device.

    This will be ''Enabled'' if the device supports CVMs, ''Disabled'' if not, and
    ''Unknown'' if the

    status cannot be determined. Known values are: "Unknown", "Enabled", and "Disabled".'
  signature: 'igvm_status: str | _models.IgvmStatus | None'
- uid: azure.mgmt.azurestackhci.models.ConfidentialVmProfile.status_details
  name: status_details
  summary: 'Provides detailed status entries for IGVM-related components, including
    deployment status,

    compatibility checks, and error diagnostics.'
  signature: 'status_details: list[''_models.IgvmStatusDetail''] | None'
