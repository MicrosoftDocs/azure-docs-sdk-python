### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.SdnProperties
name: SdnProperties
fullName: azure.mgmt.azurestackhci.models.SdnProperties
module: azure.mgmt.azurestackhci.models
summary: Represents the Software Defined Networking (SDN) configuration state.
constructor:
  syntax: 'SdnProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates the current Software Defined Networking (SDN) status of
    the

    resource, which may be an individual device or a cluster. Known values are: "Unknown",

    "Disabled", and "Enabled".'
  name: sdn_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.SdnStatus>
- description: 'The fully qualified domain name (FQDN) associated with the SDN

    deployment. This value is propagated from the Device Management Extension to the
    cluster

    resource. It is typically in the format `<sdnPrefix>-nc.<domain>` when SDN is
    enabled. May be

    null or absent in unsupported or disabled states.'
  name: sdn_domain_name
  types:
  - <xref:str>
- description: Represents the API address for the SDN deployment.
  name: sdn_api_address
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.azurestackhci.models.SdnProperties.sdn_api_address
  name: sdn_api_address
  summary: Represents the API address for the SDN deployment.
  signature: 'sdn_api_address: str | None'
- uid: azure.mgmt.azurestackhci.models.SdnProperties.sdn_domain_name
  name: sdn_domain_name
  summary: 'The fully qualified domain name (FQDN) associated with the SDN deployment.
    This value is

    propagated from the Device Management Extension to the cluster resource. It is
    typically in the

    format `<sdnPrefix>-nc.<domain>` when SDN is enabled. May be null or absent in
    unsupported or

    disabled states.'
  signature: 'sdn_domain_name: str | None'
