### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.UpdateProperties
name: UpdateProperties
fullName: azure.mgmt.azurestackhci.models.UpdateProperties
module: azure.mgmt.azurestackhci.models
summary: Details of a singular Update in HCI Cluster.
constructor:
  syntax: 'UpdateProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Provisioning state of the Updates proxy resource. Indicates the

    current lifecycle status of the update operation, such as whether it has been
    accepted, is in

    progress, or has completed. Known values are: "NotSpecified", "Error", "Succeeded",
    "Failed",

    "Canceled", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting",

    "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted",
    "Provisioning",

    and "DisableInProgress".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ProvisioningState>
- description: Date that the update was installed.
  name: installed_date
  types:
  - <xref:datetime.datetime>
- description: Description of the update.
  name: description
  types:
  - <xref:str>
- description: Minimum Sbe Version of the update.
  name: min_sbe_version_required
  types:
  - <xref:str>
- description: 'Represents the current state of the update as it relates to this stamp.
    This

    includes phases such as preparation, installation, scanning, and error handling,
    providing

    insight into the update''s progress and any issues encountered. Known values are:

    "HasPrerequisite", "Obsolete", "Ready", "NotApplicableBecauseAnotherUpdateIsInProgress",

    "Preparing", "Installing", "Installed", "PreparationFailed", "InstallationFailed",
    "Invalid",

    "Recalled", "Downloading", "DownloadFailed", "HealthChecking", "HealthCheckFailed",

    "ReadyToInstall", "ScanInProgress", "ScanFailed", "AdditionalContentRequired",

    "HealthCheckExpired", and "PendingOEMValidation".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.State>
- description: 'If update State is HasPrerequisite, this property contains an array
    of

    objects describing prerequisite updates before installing this update. Otherwise,
    it is empty.'
  name: prerequisites
  types:
  - <xref:list>[<xref:azure.mgmt.azurestackhci.models.UpdatePrerequisite>]
- description: 'An array of component versions for a Solution Bundle update, and an

    empty array otherwise.'
  name: component_versions
  types:
  - <xref:list>[<xref:azure.mgmt.azurestackhci.models.PackageVersionInfo>]
- description: 'Indicates whether a reboot is required after the update or operation.

    Helps determine if a system restart is necessary to complete the process. Known
    values are:

    "Unknown", "True", and "False".'
  name: reboot_required
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.RebootRequirement>
- description: 'Overall health state for update-specific health checks. Known values
    are:

    "Unknown", "Success", "Failure", "Warning", "Error", and "InProgress".'
  name: health_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.HealthState>
- description: An array of PrecheckResult objects.
  name: health_check_result
  types:
  - <xref:list>[<xref:azure.mgmt.azurestackhci.models.PrecheckResult>]
- description: Last time the package-specific checks were run.
  name: health_check_date
  types:
  - <xref:datetime.datetime>
- description: Path where the update package is available.
  name: package_path
  types:
  - <xref:str>
- description: 'Size of the package. This value is a combination of the size from

    update metadata and size of the payload that results from the live scan operation
    for OS update

    content.'
  name: package_size_in_mb
  types:
  - <xref:float>
- description: Display name of the Update.
  name: display_name
  types:
  - <xref:str>
- description: Version of the update.
  name: version
  types:
  - <xref:str>
- description: Publisher of the update package.
  name: publisher
  types:
  - <xref:str>
- description: Link to release notes for the update.
  name: release_link
  types:
  - <xref:str>
- description: 'Indicates how the update content is made available for download. This

    determines whether the update is sourced locally, from an online repository, or
    requires user

    notification. Known values are: "Local", "Online", and "Notify".'
  name: availability_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.AvailabilityType>
- description: Customer-visible type of the update.
  name: package_type
  types:
  - <xref:str>
- description: 'Extensible KV pairs serialized as a string. This is currently used

    to report the stamp OEM family and hardware model information when an update is
    flagged as

    Invalid for the stamp based on OEM type.'
  name: additional_properties
  types:
  - <xref:str>
- description: 'Additional information regarding the state of the update. See

    definition of UpdateStateProperties type below for more details on this property.'
  name: update_state_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.UpdateStateProperties>
