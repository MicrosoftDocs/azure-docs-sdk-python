### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.ClusterProperties
name: ClusterProperties
fullName: azure.mgmt.azurestackhci.models.ClusterProperties
module: azure.mgmt.azurestackhci.models
summary: Cluster properties.
constructor:
  syntax: 'ClusterProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Provisioning state. Indicates the current lifecycle status of the

    resource, including creation, update, deletion, connectivity, and error states.
    Known values

    are: "NotSpecified", "Error", "Succeeded", "Failed", "Canceled", "Connected",
    "Disconnected",

    "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded",

    "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and "DisableInProgress".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ProvisioningState>
- description: 'Status of the cluster agent. Indicates the current connectivity, validation,
    and

    deployment state of the agent within the cluster. Known values are: "NotYetRegistered",

    "ConnectedRecently", "NotConnectedRecently", "Disconnected", "Error", "NotSpecified",

    "ValidationInProgress", "ValidationSuccess", "ValidationFailed", "DeploymentInProgress",

    "DeploymentFailed", and "DeploymentSuccess".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.Status>
- description: 'Overall connectivity status for the cluster resource. Indicates

    whether the cluster is connected to Azure, partially connected, or has not recently

    communicated. Known values are: "NotYetRegistered", "Connected", "NotConnectedRecently",

    "PartiallyConnected", "Disconnected", and "NotSpecified".'
  name: connectivity_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ConnectivityStatus>
- description: Unique, immutable resource id.
  name: cloud_id
  types:
  - <xref:str>
- description: The ring to which this cluster belongs to.
  name: ring
  types:
  - <xref:str>
- description: Endpoint configured for management from the Azure portal.
  name: cloud_management_endpoint
  types:
  - <xref:str>
- description: App id of cluster AAD identity.
  name: aad_client_id
  types:
  - <xref:str>
- description: Tenant id of cluster AAD identity.
  name: aad_tenant_id
  types:
  - <xref:str>
- description: Object id of cluster AAD identity.
  name: aad_application_object_id
  types:
  - <xref:str>
- description: Id of cluster identity service principal.
  name: aad_service_principal_object_id
  types:
  - <xref:str>
- description: Software Assurance properties of the cluster.
  name: software_assurance_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.SoftwareAssuranceProperties>
- description: 'Is Management Cluster, when true indicates that the cluster is

    used for managing other clusters.'
  name: is_management_cluster
  types:
  - <xref:bool>
- description: Log Collection properties of the cluster.
  name: log_collection_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.LogCollectionProperties>
- description: RemoteSupport properties of the cluster.
  name: remote_support_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.RemoteSupportProperties>
- description: Desired properties of the cluster.
  name: desired_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.ClusterDesiredProperties>
- description: Properties reported by cluster agent.
  name: reported_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.ClusterReportedProperties>
- description: 'Attestation configurations for isolated VM (e.g.

    TVM, CVM) of the cluster.'
  name: isolated_vm_attestation_configuration
  types:
  - <xref:azure.mgmt.azurestackhci.models.IsolatedVmAttestationConfiguration>
- description: Number of days remaining in the trial period.
  name: trial_days_remaining
  types:
  - <xref:float>
- description: Type of billing applied to the resource.
  name: billing_model
  types:
  - <xref:str>
- description: 'Billing properties of the cluster, including upcoming billing model

    details.'
  name: billing_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.ClusterBillingProperties>
- description: First cluster sync timestamp.
  name: registration_timestamp
  types:
  - <xref:datetime.datetime>
- description: Most recent cluster sync timestamp.
  name: last_sync_timestamp
  types:
  - <xref:datetime.datetime>
- description: Most recent billing meter timestamp.
  name: last_billing_timestamp
  types:
  - <xref:datetime.datetime>
- description: Region specific DataPath Endpoint of the cluster.
  name: service_endpoint
  types:
  - <xref:str>
- description: Object id of RP Service Principal.
  name: resource_provider_object_id
  types:
  - <xref:str>
- description: List of secret locations.
  name: secrets_locations
  types:
  - <xref:list>[<xref:azure.mgmt.azurestackhci.models.SecretsLocationDetails>]
- description: 'Supported Storage Type for HCI Cluster. Known values are: "Standard"
    and

    "RackAware".'
  name: cluster_pattern
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ClusterPattern>
- description: 'Represents the Confidential Virtual Machine (CVM) support

    intent and current status for the cluster resource.'
  name: confidential_vm_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.ConfidentialVmProperties>
- description: Software Defined Networking Properties of the cluster.
  name: sdn_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.ClusterSdnProperties>
- description: Local Availability Zone information for HCI cluster.
  name: local_availability_zones
  types:
  - <xref:list>[<xref:azure.mgmt.azurestackhci.models.LocalAvailabilityZones>]
- description: 'Identity Provider for the cluster. Known values are: "ActiveDirectory"

    and "LocalIdentity".'
  name: identity_provider
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.IdentityProvider>
- description: 'Storage type of the cluster. Indicates whether the cluster uses S2D,
    SAN,

    or a combination. Known values are: "S2D", "SAN", and "SANS2D".'
  name: storage_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.StorageType>
