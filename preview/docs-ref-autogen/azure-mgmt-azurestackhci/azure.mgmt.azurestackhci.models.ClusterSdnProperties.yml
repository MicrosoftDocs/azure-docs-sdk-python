### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.ClusterSdnProperties
name: ClusterSdnProperties
fullName: azure.mgmt.azurestackhci.models.ClusterSdnProperties
module: azure.mgmt.azurestackhci.models
summary: 'Represents the Software Defined Networking (SDN) configuration state of
  the Azure Stack HCI

  cluster.'
constructor:
  syntax: 'ClusterSdnProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates the current Software Defined Networking (SDN) status of
    the

    resource, which may be an individual device or a cluster. Known values are: "Unknown",

    "Disabled", and "Enabled".'
  name: sdn_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.SdnStatus>
- description: 'The fully qualified domain name (FQDN) associated with the SDN

    deployment. This value is propagated from the Device Management Extension to the
    cluster

    resource. It is typically in the format `<sdnPrefix>-nc.<domain>` when SDN is
    enabled. May be

    null or absent in unsupported or disabled states.'
  name: sdn_domain_name
  types:
  - <xref:str>
- description: Represents the API address for the SDN deployment.
  name: sdn_api_address
  types:
  - <xref:str>
- description: 'Indicates whether Software Defined Networking (SDN) integration

    should be enabled or disabled for this deployment. Known values are: "Enable"
    and "Disable".'
  name: sdn_integration_intent
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.SdnIntegrationIntent>
attributes:
- uid: azure.mgmt.azurestackhci.models.ClusterSdnProperties.sdn_integration_intent
  name: sdn_integration_intent
  summary: 'Indicates whether Software Defined Networking (SDN) integration should
    be enabled or disabled

    for this deployment. Known values are: "Enable" and "Disable".'
  signature: 'sdn_integration_intent: str | _models.SdnIntegrationIntent | None'
