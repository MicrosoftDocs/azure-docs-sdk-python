### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.ExtensionProperties
name: ExtensionProperties
fullName: azure.mgmt.azurestackhci.models.ExtensionProperties
module: azure.mgmt.azurestackhci.models
summary: Status of Arc Extension for a particular node in HCI Cluster.
constructor:
  syntax: 'ExtensionProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Provisioning state of the Extension proxy resource. Indicates the

    current lifecycle status of the resource, such as whether it''s being created,
    updated, deleted,

    or has encountered an error. Known values are: "NotSpecified", "Error", "Succeeded",
    "Failed",

    "Canceled", "Connected", "Disconnected", "Deleted", "Creating", "Updating", "Deleting",

    "Moving", "PartiallySucceeded", "PartiallyConnected", "InProgress", "Accepted",
    "Provisioning",

    and "DisableInProgress".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ProvisioningState>
- description: Parameters specific to this extension type.
  name: extension_parameters
  types:
  - <xref:azure.mgmt.azurestackhci.models.ExtensionParameters>
- description: 'Aggregate state of Arc Extensions across the nodes in this HCI cluster.

    This reflects the overall status of the extension deployment and operation across
    all nodes.

    Known values are: "NotSpecified", "Error", "Succeeded", "Canceled", "Failed",
    "Connected",

    "Disconnected", "Deleted", "Creating", "Updating", "Deleting", "Moving", "PartiallySucceeded",

    "PartiallyConnected", "InProgress", "Accepted", "Provisioning", and

    "UpgradeFailedRollbackSucceeded".'
  name: aggregate_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ExtensionAggregateState>
- description: State of Arc Extension in each of the nodes.
  name: per_node_extension_details
  types:
  - <xref:list>[<xref:azure.mgmt.azurestackhci.models.PerNodeExtensionState>]
- description: 'Indicates if the extension is managed by Azure or the user. This determines

    who controls the deployment and lifecycle of the extension. Known values are:
    "User" and

    "Azure".'
  name: managed_by
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ExtensionManagedBy>
attributes:
