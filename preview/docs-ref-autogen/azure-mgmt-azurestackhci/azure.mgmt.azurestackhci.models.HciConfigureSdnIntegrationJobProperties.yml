### YamlMime:PythonClass
uid: azure.mgmt.azurestackhci.models.HciConfigureSdnIntegrationJobProperties
name: HciConfigureSdnIntegrationJobProperties
fullName: azure.mgmt.azurestackhci.models.HciConfigureSdnIntegrationJobProperties
module: azure.mgmt.azurestackhci.models
summary: Properties for configuring SDN integration intent for the cluster.
constructor:
  syntax: 'HciConfigureSdnIntegrationJobProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Deployment mode to trigger job. Known values are: "Validate" and

    "Deploy".'
  name: deployment_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.DeploymentMode>
- description: 'Job provisioning state. Known values are: "NotSpecified", "Error",

    "Succeeded", "Failed", "Canceled", "Connected", "Disconnected", "Deleted", "Creating",

    "Updating", "Deleting", "Moving", "PartiallySucceeded", "PartiallyConnected",
    "InProgress",

    "Accepted", "Provisioning", and "DisableInProgress".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.ProvisioningState>
- description: Unique, immutable job id.
  name: job_id
  types:
  - <xref:str>
- description: The UTC date and time at which the job started.
  name: start_time_utc
  types:
  - <xref:datetime.datetime>
- description: The UTC date and time at which the job completed.
  name: end_time_utc
  types:
  - <xref:datetime.datetime>
- description: 'Status of Cluster job. Known values are: "NotSpecified", "ValidationInProgress",

    "ValidationSuccess", "ValidationFailed", "DeploymentInProgress", "DeploymentFailed",

    "DeploymentSuccess", "Succeeded", "Failed", "Canceled", "Paused", and "Scheduled".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.JobStatus>
- description: Reported properties for job.
  name: reported_properties
  types:
  - <xref:azure.mgmt.azurestackhci.models.JobReportedProperties>
- description: 'ClusterJob Type to support polymorphic resource. Required. Job to
    configure SDN

    (Software Defined Networking) integration for the cluster.'
  name: job_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.CONFIGURE_SDN_INTEGRATION>
- description: 'Defines the customer''s intent for configuring SDN integration.

    Required. Known values are: "Enable" and "Disable".'
  name: sdn_integration_intent
  types:
  - <xref:str>
  - <xref:azure.mgmt.azurestackhci.models.SdnIntegrationIntent>
- description: 'A string identifier used to construct the Network Controller (NC)
    REST

    resource name. This prefix helps group and distinguish SDN-managed network components
    and must

    follow specific formatting rules.'
  name: sdn_prefix
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.azurestackhci.models.HciConfigureSdnIntegrationJobProperties.job_type
  name: job_type
  summary: 'ClusterJob Type to support polymorphic resource. Required. Job to configure
    SDN (Software

    Defined Networking) integration for the cluster.'
  signature: 'job_type: CONFIGURE_SDN_INTEGRATION: ''ConfigureSdnIntegration''>]'
- uid: azure.mgmt.azurestackhci.models.HciConfigureSdnIntegrationJobProperties.sdn_integration_intent
  name: sdn_integration_intent
  summary: 'Defines the customer''s intent for configuring SDN integration. Required.
    Known values are:

    "Enable" and "Disable".'
  signature: 'sdn_integration_intent: str | _models.SdnIntegrationIntent'
- uid: azure.mgmt.azurestackhci.models.HciConfigureSdnIntegrationJobProperties.sdn_prefix
  name: sdn_prefix
  summary: 'A string identifier used to construct the Network Controller (NC) REST
    resource name. This

    prefix helps group and distinguish SDN-managed network components and must follow
    specific

    formatting rules.'
  signature: 'sdn_prefix: str | None'
