### YamlMime:PythonClass
uid: azure.keyvault.administration.KeyVaultEkmClient
name: KeyVaultEkmClient
fullName: azure.keyvault.administration.KeyVaultEkmClient
module: azure.keyvault.administration
summary: Provides methods to manage Managed HSM External Key Manager (EKM) connections.
constructor:
  syntax: 'KeyVaultEkmClient(vault_url: str, credential: TokenCredential, **kwargs:
    Any)'
  parameters:
  - name: vault_url
    description: 'URL of the vault on which the client will operate. This is also
      called the vault''s "DNS Name".

      You should validate that this URL references a valid Key Vault or Managed HSM
      resource.

      See [https://aka.ms/azsdk/blog/vault-uri](https://aka.ms/azsdk/blog/vault-uri)
      for details.'
    isRequired: true
    types:
    - <xref:str>
  - name: credential
    description: 'An object which can provide an access token for the vault, such
      as a credential from

      <xref:azure.identity>'
    isRequired: true
    types:
    - <xref:azure.core.credentials.TokenCredential>
  keywordOnlyParameters:
  - name: api_version
    description: 'Version of the service API to use. EKM operations require service
      API version

      `2026-01-01-preview` or later.'
    types:
    - <xref:azure.keyvault.administration.ApiVersion>
    - <xref:str>
  - name: verify_challenge_resource
    description: 'Whether to verify the authentication challenge resource matches
      the Key

      Vault or Managed HSM domain. Defaults to True.'
    types:
    - <xref:bool>
methods:
- uid: azure.keyvault.administration.KeyVaultEkmClient.check_ekm_connection
  name: check_ekm_connection
  summary: Checks the EKM connection by pinging the EKM proxy.
  signature: 'check_ekm_connection(**kwargs: Any) -> KeyVaultEkmProxyInfo'
  return:
    description: Information about the EKM proxy returned by the connectivity check.
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmProxyInfo>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.keyvault.administration.KeyVaultEkmClient.close
  name: close
  summary: 'Close sockets opened by the client.


    Calling this method is unnecessary when using the client as a context manager.'
  signature: close() -> None
- uid: azure.keyvault.administration.KeyVaultEkmClient.create_ekm_connection
  name: create_ekm_connection
  summary: 'Creates the EKM connection.


    If an EKM connection already exists, this operation fails.'
  signature: 'create_ekm_connection(connection: KeyVaultEkmConnection, **kwargs: Any)
    -> KeyVaultEkmConnection'
  parameters:
  - name: connection
    description: The EKM connection to create.
    isRequired: true
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmConnection>
  return:
    description: The created EKM connection.
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmConnection>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.keyvault.administration.KeyVaultEkmClient.delete_ekm_connection
  name: delete_ekm_connection
  summary: 'Deletes the existing EKM connection.


    If no EKM connection exists, this operation fails.'
  signature: 'delete_ekm_connection(**kwargs: Any) -> KeyVaultEkmConnection'
  return:
    description: The deleted EKM connection.
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmConnection>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.keyvault.administration.KeyVaultEkmClient.get_ekm_certificate
  name: get_ekm_certificate
  summary: Gets the EKM proxy client certificate information used to authenticate
    to the EKM proxy.
  signature: 'get_ekm_certificate(**kwargs: Any) -> KeyVaultEkmProxyClientCertificateInfo'
  return:
    description: The EKM proxy client certificate information.
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmProxyClientCertificateInfo>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.keyvault.administration.KeyVaultEkmClient.get_ekm_connection
  name: get_ekm_connection
  summary: Gets the configured EKM connection.
  signature: 'get_ekm_connection(**kwargs: Any) -> KeyVaultEkmConnection'
  return:
    description: The configured EKM connection.
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmConnection>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.keyvault.administration.KeyVaultEkmClient.send_request
  name: send_request
  summary: 'Runs a network request using the client''s existing pipeline.


    The request URL can be relative to the vault URL. The service API version used
    for the request is the same as

    the client''s unless otherwise specified. This method does not raise if the response
    is an error; to raise an

    exception, call *raise_for_status()* on the returned response object. For more
    information about how to send

    custom requests with this method, see [https://aka.ms/azsdk/dpcodegen/python/send_request](https://aka.ms/azsdk/dpcodegen/python/send_request).'
  signature: 'send_request(request: HttpRequest, *, stream: bool = False, **kwargs:
    Any) -> HttpResponse'
  parameters:
  - name: request
    description: The network request you want to make.
    isRequired: true
    types:
    - <xref:azure.core.rest.HttpRequest>
  keywordOnlyParameters:
  - name: stream
    description: Whether the response payload will be streamed. Defaults to False.
    defaultValue: 'False'
    types:
    - <xref:bool>
  return:
    description: The response of your network call. Does not do error handling on
      your response.
    types:
    - <xref:azure.core.rest.HttpResponse>
- uid: azure.keyvault.administration.KeyVaultEkmClient.update_ekm_connection
  name: update_ekm_connection
  summary: 'Updates the existing EKM connection.


    If no EKM connection exists, this operation fails.'
  signature: 'update_ekm_connection(connection: KeyVaultEkmConnection, **kwargs: Any)
    -> KeyVaultEkmConnection'
  parameters:
  - name: connection
    description: The EKM connection to update.
    isRequired: true
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmConnection>
  return:
    description: The updated EKM connection.
    types:
    - <xref:azure.keyvault.administration.KeyVaultEkmConnection>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
attributes:
- uid: azure.keyvault.administration.KeyVaultEkmClient.vault_url
  name: vault_url
