### YamlMime:PythonClass
uid: azure.keyvault.administration.KeyVaultEkmConnection
name: KeyVaultEkmConnection
fullName: azure.keyvault.administration.KeyVaultEkmConnection
module: azure.keyvault.administration
summary: An External Key Manager (EKM) connection.
constructor:
  syntax: 'KeyVaultEkmConnection(host: str, server_ca_certificates: List[bytes], *,
    path_prefix: str | None = None, server_subject_common_name: str | None = None)'
  parameters:
  - name: host
    description: 'EKM proxy FQDN (Fully Qualified Domain Name). Only allowed characters
      are

      `a-z`, `A-Z`, `0-9`, hyphen (`-`), dot (`.`), and colon (`:`).'
    isRequired: true
    types:
    - <xref:str>
  - name: server_ca_certificates
    description: 'The root CA certificate chain that issued the proxy server''s

      certificate. An array of certificates in the certificate chain, each in DER
      format and

      base64 encoded.'
    isRequired: true
    types:
    - <xref:list>[<xref:bytes>]
  keywordOnlyParameters:
  - name: path_prefix
    description: Optional path prefix for the EKM proxy (if any).
    defaultValue: None
    types:
    - <xref:str>
  - name: server_subject_common_name
    description: 'The subject common name of the server certificate of

      the EKM proxy.'
    defaultValue: None
    types:
    - <xref:str>
variables:
- description: EKM proxy FQDN.
  name: host
  types:
  - <xref:str>
- description: 'The root CA certificate chain that issued the proxy

    server''s certificate.'
  name: server_ca_certificates
  types:
  - <xref:list>[<xref:bytes>]
- description: Optional path prefix for the EKM proxy (if any).
  name: path_prefix
  types:
  - <xref:str>
  - <xref:None>
- description: 'The subject common name of the server certificate of the EKM

    proxy.'
  name: server_subject_common_name
  types:
  - <xref:str>
  - <xref:None>
