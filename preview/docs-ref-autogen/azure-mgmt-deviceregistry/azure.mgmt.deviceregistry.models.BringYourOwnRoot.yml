### YamlMime:PythonClass
uid: azure.mgmt.deviceregistry.models.BringYourOwnRoot
name: BringYourOwnRoot
fullName: azure.mgmt.deviceregistry.models.BringYourOwnRoot
module: azure.mgmt.deviceregistry.models
summary: 'Configuration for Bring Your Own Root. When enabled, customers provide their
  own CA-signed

  certificates instead of using the service-managed CA.'
constructor:
  syntax: 'BringYourOwnRoot(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates whether Bring Your Own Root is enabled. This can only be
    set at

    creation time and cannot be changed afterward. Required.'
  name: enabled
  types:
  - <xref:bool>
- description: 'Certificate Signing Request (CSR) in PEM format, generated

    by the service. Sign this CSR with your Certificate Authority and activate via
    the

    activateBringYourOwnRoot action. A new CSR is generated at policy creation and
    when

    certificates near expiration.'
  name: certificate_signing_request
  types:
  - <xref:str>
- description: Thumbprint of the issuing certificate.
  name: issuing_certificate_thumbprint
  types:
  - <xref:str>
- description: 'The status of the Bring Your Own Root configuration, indicating the
    current state

    of the certificate lifecycle. Known values are: "PendingActivation", "Active",
    and

    "ActiveButPendingRenewal".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.deviceregistry.models.BringYourOwnRootStatus>
attributes:
- uid: azure.mgmt.deviceregistry.models.BringYourOwnRoot.certificate_signing_request
  name: certificate_signing_request
  summary: 'Certificate Signing Request (CSR) in PEM format, generated by the service.
    Sign this CSR with

    your Certificate Authority and activate via the activateBringYourOwnRoot action.
    A new CSR is

    generated at policy creation and when certificates near expiration.'
  signature: 'certificate_signing_request: str | None'
- uid: azure.mgmt.deviceregistry.models.BringYourOwnRoot.enabled
  name: enabled
  summary: 'Indicates whether Bring Your Own Root is enabled. This can only be set
    at creation time and

    cannot be changed afterward. Required.'
  signature: 'enabled: bool'
- uid: azure.mgmt.deviceregistry.models.BringYourOwnRoot.issuing_certificate_thumbprint
  name: issuing_certificate_thumbprint
  summary: Thumbprint of the issuing certificate.
  signature: 'issuing_certificate_thumbprint: str | None'
- uid: azure.mgmt.deviceregistry.models.BringYourOwnRoot.status
  name: status
  summary: 'The status of the Bring Your Own Root configuration, indicating the current
    state of the

    certificate lifecycle. Known values are: "PendingActivation", "Active", and

    "ActiveButPendingRenewal".'
  signature: 'status: str | _models.BringYourOwnRootStatus | None'
