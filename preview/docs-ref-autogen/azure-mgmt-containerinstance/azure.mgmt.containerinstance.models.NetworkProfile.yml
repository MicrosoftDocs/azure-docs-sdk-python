uid: azure.mgmt.containerinstance.models.NetworkProfile
name: NetworkProfile
fullName: azure.mgmt.containerinstance.models.NetworkProfile
module: azure.mgmt.containerinstance.models
summary: 'A network profile for network settings of a ContainerGroupProfile. Used
  to manage load balancer

  and application gateway backend pools, specifically updating the IP addresses of
  CGs within the

  backend pool.'
constructor:
