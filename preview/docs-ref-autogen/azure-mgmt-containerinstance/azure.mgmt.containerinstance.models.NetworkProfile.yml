    pool.
  signature: 'application_gateway: _models.ApplicationGateway | None'
- uid: azure.mgmt.containerinstance.models.NetworkProfile.load_balancer
  name: load_balancer
  summary: LoadBalancer the CG profile will use to interact with CGs in a backend
    pool.
  signature: 'load_balancer: _models.LoadBalancer | None'
