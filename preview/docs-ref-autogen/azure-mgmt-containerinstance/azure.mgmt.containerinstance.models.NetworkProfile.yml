- description: 'Application Gateway the CG profile will use to interact with CGs in

    a backend pool.'
  name: application_gateway
  types:
  - <xref:azure.mgmt.containerinstance.models.ApplicationGateway>
attributes:
- uid: azure.mgmt.containerinstance.models.NetworkProfile.application_gateway
  name: application_gateway
