  summary: 'Default is false. If set to true, the CGs will be updated in-place instead
    of creating new CG

    and deleting old ones.'
  signature: 'in_place_update: bool | None'
- uid: azure.mgmt.containerinstance.models.UpdateProfileRollingUpdateProfile.max_batch_percent
