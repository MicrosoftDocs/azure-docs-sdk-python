uid: azure.mgmt.containerinstance.models.UpdateProfileRollingUpdateProfile
name: UpdateProfileRollingUpdateProfile
fullName: azure.mgmt.containerinstance.models.UpdateProfileRollingUpdateProfile
module: azure.mgmt.containerinstance.models
summary: This profile allows the customers to customize the rolling update.
constructor:
  syntax: 'UpdateProfileRollingUpdateProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Maximum percentage of total Container Groups which can be updated

    simultaneously by rolling update in one batch.'
  name: max_batch_percent
  types:
  - <xref:int>
- description: 'Maximum percentage of the updated Container Groups which can be in

    unhealthy state after each batch is updated.'
  name: max_unhealthy_percent
  types:
  - <xref:int>
- description: 'The wait time between batches after completing the one batch

    of the rolling update and starting the next batch. The time duration should be
    specified in ISO

    8601 format for duration.'
  name: pause_time_between_batches
  types:
  - <xref:str>
- description: 'Default is false. If set to true, the CGs will be updated in-place

    instead of creating new CG and deleting old ones.'
  name: in_place_update
  types:
  - <xref:bool>
attributes:
