uid: azure.mgmt.containerinstance.models.FileShareProperties
name: FileShareProperties
fullName: azure.mgmt.containerinstance.models.FileShareProperties
module: azure.mgmt.containerinstance.models
summary: FileShareProperties.
constructor:
  syntax: 'FileShareProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies how Container Groups can access the Azure file share i.e.

    all CG will share same Azure file share or going to have exclusive file share.
    Known values

    are: "Shared" and "Exclusive".'
  name: share_access_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerinstance.models.AzureFileShareAccessType>
- description: 'Access tier for specific share. GpV2 account can choose between

    TransactionOptimized (default), Hot, and Cool. FileStorage account can choose
    Premium. Learn

    more at:

    [https://learn.microsoft.com/en-us/rest/api/storagerp/file-shares/create?tabs=HTTP#shareaccesstier](https://learn.microsoft.com/en-us/rest/api/storagerp/file-shares/create?tabs=HTTP#shareaccesstier).

    Known values are: "Cool", "Hot", "Premium", and "TransactionOptimized".'
  name: share_access_tier
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerinstance.models.AzureFileShareAccessTier>
attributes:
- uid: azure.mgmt.containerinstance.models.FileShareProperties.share_access_tier
  name: share_access_tier
  summary: 'Access tier for specific share. GpV2 account can choose between TransactionOptimized
    (default),

    Hot, and Cool. FileStorage account can choose Premium. Learn more at:

    [https://learn.microsoft.com/en-us/rest/api/storagerp/file-shares/create?tabs=HTTP#shareaccesstier](https://learn.microsoft.com/en-us/rest/api/storagerp/file-shares/create?tabs=HTTP#shareaccesstier).

    Known values are: "Cool", "Hot", "Premium", and "TransactionOptimized".'
  signature: 'share_access_tier: str | _models.AzureFileShareAccessTier | None'
