### YamlMime:PythonClass
uid: azure.mgmt.containerinstance.models.IpAddress
name: IpAddress
fullName: azure.mgmt.containerinstance.models.IpAddress
module: azure.mgmt.containerinstance.models
summary: IP address for the container group.
constructor:
  syntax: 'IpAddress(*args: Any, **kwargs: Any)'
variables:
- description: The list of ports exposed on the container group. Required.
  name: ports
  types:
  - <xref:list>[<xref:azure.mgmt.containerinstance.models.Port>]
- description: 'Specifies if the IP is exposed to the public internet or private VNET.
    Required.

    Known values are: "Public" and "Private".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerinstance.models.ContainerGroupIpAddressType>
- description: The IP exposed to the public internet.
  name: ip
  types:
  - <xref:str>
- description: The Dns name label for the IP.
  name: dns_name_label
  types:
  - <xref:str>
- description: 'The value representing the security enum. The

    ''Unsecure'' value is the default value if not selected and means the object''s
    domain name label

    is not secured against subdomain takeover. The ''TenantReuse'' value is the default
    value if

    selected and means the object''s domain name label can be reused within the same
    tenant. The

    ''SubscriptionReuse'' value means the object''s domain name label can be reused
    within the same

    subscription. The ''ResourceGroupReuse'' value means the object''s domain name
    label can be reused

    within the same resource group. The ''NoReuse'' value means the object''s domain
    name label cannot

    be reused within the same resource group, subscription, or tenant. Known values
    are:

    "Unsecure", "TenantReuse", "SubscriptionReuse", "ResourceGroupReuse", and "Noreuse".'
  name: auto_generated_domain_name_label_scope
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerinstance.models.DnsNameLabelReusePolicy>
- description: The FQDN for the IP.
  name: fqdn
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.containerinstance.models.IpAddress.auto_generated_domain_name_label_scope
  name: auto_generated_domain_name_label_scope
  summary: 'The value representing the security enum. The ''Unsecure'' value is the
    default value if not

    selected and means the object''s domain name label is not secured against subdomain
    takeover.

    The ''TenantReuse'' value is the default value if selected and means the object''s
    domain name

    label can be reused within the same tenant. The ''SubscriptionReuse'' value means
    the object''s

    domain name label can be reused within the same subscription. The ''ResourceGroupReuse''
    value

    means the object''s domain name label can be reused within the same resource group.
    The

    ''NoReuse'' value means the object''s domain name label cannot be reused within
    the same resource

    group, subscription, or tenant. Known values are: "Unsecure", "TenantReuse",

    "SubscriptionReuse", "ResourceGroupReuse", and "Noreuse".'
  signature: 'auto_generated_domain_name_label_scope: str | _models.DnsNameLabelReusePolicy
    | None'
- uid: azure.mgmt.containerinstance.models.IpAddress.dns_name_label
  name: dns_name_label
  summary: The Dns name label for the IP.
  signature: 'dns_name_label: str | None'
- uid: azure.mgmt.containerinstance.models.IpAddress.fqdn
  name: fqdn
  summary: The FQDN for the IP.
  signature: 'fqdn: str | None'
- uid: azure.mgmt.containerinstance.models.IpAddress.ip
