### YamlMime:PythonClass
uid: azure.mgmt.dataprotection.models.BackupSchedule
name: BackupSchedule
fullName: azure.mgmt.dataprotection.models.BackupSchedule
module: azure.mgmt.dataprotection.models
summary: Schedule for backup.
constructor:
  syntax: 'BackupSchedule(*args: Any, **kwargs: Any)'
variables:
- description: "Repeating time intervals that define the backup schedule. Each\nvalue\
    \ must follow the format: `R/YYYY-MM-DDThh:mm:ss[.fff][Z|(+/-)hh:mm]/Duration`\
    \ Only the\nexact formats listed below are supported. Other ISO 8601 variations\
    \ are not accepted. Supported\ntime formats:\n\n* *Thh:mm:ss.fff* (with milliseconds)\
    \ \n\n* *Thh:mm:ss* (with seconds) \n\n* *Thh:mm* (hours and minutes only) \n\n\
    A timezone indicator (`Z`, `+hh:mm`, or `-hh:mm`) may be appended to any of the\n\
    above.\n\nUnsupported formats include compact notation such as `T1430`, `T143045`,\
    \ or `T14.5`.\n\nExamples:\n\n* *R/2023-10-15T14:30:00Z/P1W* \n\n* *R/2023-10-15T14:30:45.123+05:30/P1D*\
    \ \n\n* *R/2023-10-15T14:30Z/P1D*. Required."
  name: repeating_time_intervals
  types:
  - <xref:list>[<xref:str>]
- description: "Time Zone for a schedule. Supported timezone indicators include:\n\
    \n* 'Z' for UTC \n\n* '+00:00' \n\n* '+05:30' \n\n* '-08:00' \n\nExamples:\n\n\
    * 2023-10-15T14:30:45Z \n\n* 2023-10-15T14:30:45.123+05:30 \n\n* 2023-10-15T14:30-08:00."
  name: time_zone
  types:
  - <xref:str>
