- uid: azure.mgmt.policyinsights.models.SummaryResults.policy_group_details
  name: policy_group_details
  summary: The policy definition group summary at this level.
  signature: 'policy_group_details: list[''_models.ComplianceDetail''] | None'
- uid: azure.mgmt.policyinsights.models.SummaryResults.query_results_uri
  name: query_results_uri
  summary: 'HTTP POST URI for queryResults action on Microsoft.PolicyInsights to retrieve
