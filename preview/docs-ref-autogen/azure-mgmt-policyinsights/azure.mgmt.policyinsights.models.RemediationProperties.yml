- uid: azure.mgmt.policyinsights.models.RemediationProperties.failure_threshold
  name: failure_threshold
  summary: The remediation failure threshold settings.
  signature: 'failure_threshold: _models.RemediationPropertiesFailureThreshold | None'
- uid: azure.mgmt.policyinsights.models.RemediationProperties.filters
  name: filters
  summary: The filters that will be applied to determine which resources to remediate.
  signature: 'filters: _models.RemediationFilters | None'
- uid: azure.mgmt.policyinsights.models.RemediationProperties.last_updated_on
  name: last_updated_on
  summary: The time at which the remediation was last updated.
  signature: 'last_updated_on: datetime | None'
- uid: azure.mgmt.policyinsights.models.RemediationProperties.parallel_deployments
  name: parallel_deployments
  summary: 'Determines how many resources to remediate at any given time. Can be used
    to increase or reduce

    the pace of the remediation. If not provided, the default parallel deployments
    value is used.'
  signature: 'parallel_deployments: int | None'
- uid: azure.mgmt.policyinsights.models.RemediationProperties.policy_assignment_id
  name: policy_assignment_id
  summary: The resource ID of the policy assignment that should be remediated.
  signature: 'policy_assignment_id: str | None'
- uid: azure.mgmt.policyinsights.models.RemediationProperties.policy_definition_reference_id
  name: policy_definition_reference_id
  summary: 'The policy definition reference ID of the individual definition that should
    be remediated.

    Required when the policy assignment being remediated assigns a policy set definition.'
  signature: 'policy_definition_reference_id: str | None'
- uid: azure.mgmt.policyinsights.models.RemediationProperties.provisioning_state
  name: provisioning_state
  summary: 'The status of the remediation. This refers to the entire remediation task,
    not individual

    deployments. Allowed values are Evaluating, Canceled, Cancelling, Failed, Complete,
    or

    Succeeded.'
  signature: 'provisioning_state: str | None'
- uid: azure.mgmt.policyinsights.models.RemediationProperties.resource_count
  name: resource_count
  summary: 'Determines the max number of resources that can be remediated by the remediation
