uid: azure.mgmt.containerregistrytasks.models.SourceRegistryCredentials
name: SourceRegistryCredentials
fullName: azure.mgmt.containerregistrytasks.models.SourceRegistryCredentials
module: azure.mgmt.containerregistrytasks.models
summary: Describes the credential parameters for accessing the source registry.
constructor:
  syntax: 'SourceRegistryCredentials(*args: Any, **kwargs: Any)'
variables:
- description: 'The Entra identity used for source registry login.

    The value is `[system]` for system-assigned managed identity, `[caller]` for caller

    identity,

    and client ID for user-assigned managed identity.'
  name: identity
  types:
  - <xref:str>
- description: 'The authentication mode which determines the source registry login
    scope. The

    credentials for the source registry

    will be generated using the given scope. These credentials will be used to login
    to

    the source registry during the run. Known values are: "None" and "Default".'
  name: login_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerregistrytasks.models.SourceRegistryLoginMode>
attributes:
- uid: azure.mgmt.containerregistrytasks.models.SourceRegistryCredentials.identity
  name: identity
  summary: 'The Entra identity used for source registry login.

    The value is `[system]` for system-assigned managed identity, `[caller]` for caller

    identity,

    and client ID for user-assigned managed identity.'
  signature: 'identity: str | None'
- uid: azure.mgmt.containerregistrytasks.models.SourceRegistryCredentials.login_mode
  name: login_mode
  summary: 'The authentication mode which determines the source registry login scope.
    The credentials for

    the source registry

