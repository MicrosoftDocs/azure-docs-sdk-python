  name: policies
  types:
  - <xref:azure.mgmt.containerregistry.models.Policies>
- description: The encryption settings of container registry.
  name: encryption
  types:
  - <xref:azure.mgmt.containerregistry.models.EncryptionProperty>
- description: Enable a single data endpoint per region for serving data.
  name: data_endpoint_enabled
  types:
  - <xref:bool>
- description: 'List of host names that will serve data when

    dataEndpointEnabled is true.'
  name: data_endpoint_host_names
  types:
  - <xref:list>[<xref:str>]
- description: 'Enable per-region endpoints for accessing registry. Known values are:

    "Enabled" and "Disabled".'
  name: regional_endpoints
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerregistry.models.RegionalEndpoints>
- description: 'List of host names that will serve registry when

    RegionalEndpoints is enabled.'
  name: regional_endpoint_host_names
  types:
  - <xref:list>[<xref:str>]
- description: 'The connectivity protocol for the registry, such as IPv4 or dual stack

    (IPv4 and IPv6). Known values are: "IPv4" and "IPv4AndIPv6".'
  name: endpoint_protocol
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerregistry.models.EndpointProtocol>
