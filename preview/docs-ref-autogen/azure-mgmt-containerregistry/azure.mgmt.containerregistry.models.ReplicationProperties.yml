variables:
- description: 'The provisioning state of the replication at the time the operation

    was called. Known values are: "Creating", "Updating", "Deleting", "Succeeded",
    "Failed", and

    "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerregistry.models.ProvisioningState>
