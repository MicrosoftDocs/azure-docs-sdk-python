### YamlMime:PythonClass
uid: azure.mgmt.reservations.models.PatchProperties
name: PatchProperties
fullName: azure.mgmt.reservations.models.PatchProperties
module: azure.mgmt.reservations.models
summary: Properties for reservation patch.
constructor:
  syntax: 'PatchProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of the Applied Scope. Known values are: "Single", "Shared", and

    "ManagementGroup".'
  name: applied_scope_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.reservations.models.AppliedScopeType>
- description: 'List of the subscriptions that the benefit will be applied. Do not

    specify if AppliedScopeType is Shared. This property will be deprecated and replaced
    by

    appliedScopeProperties instead for Single AppliedScopeType.'
  name: applied_scopes
  types:
  - <xref:list>[<xref:str>]
- description: 'Properties specific to applied scope type. Not required if not

    applicable. Required and need to provide tenantId and managementGroupId if AppliedScopeType
    is

    ManagementGroup.'
  name: applied_scope_properties
  types:
  - <xref:azure.mgmt.reservations.models.AppliedScopeProperties>
- description: 'Turning this on will apply the reservation discount to other VMs in

    the same VM size group. Only specify for VirtualMachines reserved resource type.
    Known values

    are: "On" and "Off".'
  name: instance_flexibility
  types:
  - <xref:str>
  - <xref:azure.mgmt.reservations.models.InstanceFlexibility>
- description: Display name of the reservation.
  name: name
  types:
  - <xref:str>
- description: 'Setting this to true will automatically purchase a new reservation
    on the

    expiration date time.'
  name: renew
  types:
  - <xref:bool>
- name: renew_properties
  types:
  - <xref:azure.mgmt.reservations.models.PatchPropertiesRenewProperties>
- description: 'This is the date-time when the Azure hybrid benefit needs to be

    reviewed.'
  name: review_date_time
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.reservations.models.PatchProperties.applied_scope_properties
  name: applied_scope_properties
  summary: 'Properties specific to applied scope type. Not required if not applicable.
    Required and need to

    provide tenantId and managementGroupId if AppliedScopeType is ManagementGroup.'
  signature: 'applied_scope_properties: _models.AppliedScopeProperties | None'
- uid: azure.mgmt.reservations.models.PatchProperties.applied_scope_type
  name: applied_scope_type
  summary: '"Single", "Shared", and "ManagementGroup".'
  signature: 'applied_scope_type: str | _models.AppliedScopeType | None'
- uid: azure.mgmt.reservations.models.PatchProperties.applied_scopes
  name: applied_scopes
  summary: 'List of the subscriptions that the benefit will be applied. Do not specify
    if AppliedScopeType

    is Shared. This property will be deprecated and replaced by appliedScopeProperties
    instead for

    Single AppliedScopeType.'
  signature: 'applied_scopes: list[str] | None'
- uid: azure.mgmt.reservations.models.PatchProperties.instance_flexibility
  name: instance_flexibility
  summary: 'Turning this on will apply the reservation discount to other VMs in the
    same VM size group.

    Only specify for VirtualMachines reserved resource type. Known values are: "On"
    and "Off".'
  signature: 'instance_flexibility: str | _models.InstanceFlexibility | None'
- uid: azure.mgmt.reservations.models.PatchProperties.name
  name: name
  summary: Display name of the reservation.
  signature: 'name: str | None'
- uid: azure.mgmt.reservations.models.PatchProperties.renew
  name: renew
  summary: Setting this to true will automatically purchase a new reservation on the
    expiration date time.
  signature: 'renew: bool | None'
- uid: azure.mgmt.reservations.models.PatchProperties.renew_properties
  name: renew_properties
  signature: 'renew_properties: _models.PatchPropertiesRenewProperties | None'
- uid: azure.mgmt.reservations.models.PatchProperties.review_date_time
  name: review_date_time
  summary: This is the date-time when the Azure hybrid benefit needs to be reviewed.
  signature: 'review_date_time: datetime | None'
