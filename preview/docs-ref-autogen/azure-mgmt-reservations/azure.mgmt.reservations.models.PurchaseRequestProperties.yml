### YamlMime:PythonClass
uid: azure.mgmt.reservations.models.PurchaseRequestProperties
name: PurchaseRequestProperties
fullName: azure.mgmt.reservations.models.PurchaseRequestProperties
module: azure.mgmt.reservations.models
summary: Properties of reservation purchase request.
constructor:
  syntax: 'PurchaseRequestProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The type of the resource that is being reserved. In addition to

    below types we have also added the following: OpenAIPTU, MDC, Sentinel. Known
    values are:

    "VirtualMachines", "SqlDatabases", "SuseLinux", "CosmosDb", "RedHat", "SqlDataWarehouse",

    "VMwareCloudSimple", "RedHatOsa", "Databricks", "AppService", "ManagedDisk", "BlockBlob",

    "RedisCache", "AzureDataExplorer", "MySql", "MariaDb", "PostgreSql", "DedicatedHost",

    "SapHana", "SqlAzureHybridBenefit", "AVS", "DataFactory", "NetAppStorage", "AzureFiles",

    "SqlEdge", and "VirtualMachineSoftware".'
  name: reserved_resource_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.reservations.models.ReservedResourceType>
- description: 'Subscription that will be charged for purchasing reservation or savings

    plan.'
  name: billing_scope_id
  types:
  - <xref:str>
- description: 'Represent the term of reservation. Known values are: "P1Y", "P3Y",
    and "P5Y".'
  name: term
  types:
  - <xref:str>
  - <xref:azure.mgmt.reservations.models.ReservationTerm>
- description: 'Represent the billing plans. Known values are: "Upfront" and "Monthly".'
  name: billing_plan
  types:
  - <xref:str>
  - <xref:azure.mgmt.reservations.models.ReservationBillingPlan>
- description: Quantity of the skus that are part of the reservation.
  name: quantity
  types:
  - <xref:int>
- description: Friendly name of the reservation.
  name: display_name
  types:
  - <xref:str>
- description: 'Type of the Applied Scope. Known values are: "Single", "Shared", and

    "ManagementGroup".'
  name: applied_scope_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.reservations.models.AppliedScopeType>
- description: 'List of the subscriptions that the benefit will be applied. Do not

    specify if AppliedScopeType is Shared. This property will be deprecated and replaced
    by

    appliedScopeProperties instead for Single AppliedScopeType.'
  name: applied_scopes
  types:
  - <xref:list>[<xref:str>]
- description: 'Properties specific to applied scope type. Not required if not

    applicable. Required and need to provide tenantId and managementGroupId if AppliedScopeType
    is

    ManagementGroup.'
  name: applied_scope_properties
  types:
  - <xref:azure.mgmt.reservations.models.AppliedScopeProperties>
- description: 'Setting this to true will automatically purchase a new reservation
    on the

    expiration date time.'
  name: renew
  types:
  - <xref:bool>
- description: 'Properties specific to each reserved resource type. Not

    required if not applicable.'
  name: reserved_resource_properties
  types:
  - <xref:azure.mgmt.reservations.models.PurchaseRequestPropertiesReservedResourceProperties>
- description: 'This is the date-time when the Azure hybrid benefit needs to be

    reviewed.'
  name: review_date_time
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.applied_scope_properties
  name: applied_scope_properties
  summary: 'Properties specific to applied scope type. Not required if not applicable.
    Required and need to

    provide tenantId and managementGroupId if AppliedScopeType is ManagementGroup.'
  signature: 'applied_scope_properties: _models.AppliedScopeProperties | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.applied_scope_type
  name: applied_scope_type
  summary: '"Single", "Shared", and "ManagementGroup".'
  signature: 'applied_scope_type: str | _models.AppliedScopeType | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.applied_scopes
  name: applied_scopes
  summary: 'List of the subscriptions that the benefit will be applied. Do not specify
    if AppliedScopeType

    is Shared. This property will be deprecated and replaced by appliedScopeProperties
    instead for

    Single AppliedScopeType.'
  signature: 'applied_scopes: list[str] | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.billing_plan
  name: billing_plan
  summary: '"Upfront" and "Monthly".'
  signature: 'billing_plan: str | _models.ReservationBillingPlan | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.billing_scope_id
  name: billing_scope_id
  summary: Subscription that will be charged for purchasing reservation or savings
    plan.
  signature: 'billing_scope_id: str | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.display_name
  name: display_name
  summary: Friendly name of the reservation.
  signature: 'display_name: str | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.quantity
  name: quantity
  summary: Quantity of the skus that are part of the reservation.
  signature: 'quantity: int | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.renew
  name: renew
  summary: Setting this to true will automatically purchase a new reservation on the
    expiration date time.
  signature: 'renew: bool | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.reserved_resource_properties
  name: reserved_resource_properties
  summary: Properties specific to each reserved resource type. Not required if not
    applicable.
  signature: 'reserved_resource_properties: _models.PurchaseRequestPropertiesReservedResourceProperties
    | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.reserved_resource_type
  name: reserved_resource_type
  summary: 'The type of the resource that is being reserved. In addition to below
    types we have also added

    the following: OpenAIPTU, MDC, Sentinel. Known values are: "VirtualMachines",

    "SqlDatabases", "SuseLinux", "CosmosDb", "RedHat", "SqlDataWarehouse",

    "VMwareCloudSimple", "RedHatOsa", "Databricks", "AppService", "ManagedDisk",

    "BlockBlob", "RedisCache", "AzureDataExplorer", "MySql", "MariaDb", "PostgreSql",

    "DedicatedHost", "SapHana", "SqlAzureHybridBenefit", "AVS", "DataFactory",

    "NetAppStorage", "AzureFiles", "SqlEdge", and "VirtualMachineSoftware".'
  signature: 'reserved_resource_type: str | _models.ReservedResourceType | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.review_date_time
  name: review_date_time
  summary: This is the date-time when the Azure hybrid benefit needs to be reviewed.
  signature: 'review_date_time: datetime | None'
- uid: azure.mgmt.reservations.models.PurchaseRequestProperties.term
  name: term
  summary: '"P1Y", "P3Y", and "P5Y".'
  signature: 'term: str | _models.ReservationTerm | None'
