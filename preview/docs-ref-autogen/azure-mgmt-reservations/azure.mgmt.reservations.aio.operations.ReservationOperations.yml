- uid: azure.mgmt.reservations.aio.operations.ReservationOperations.list_all
  name: list_all
  summary: 'List the reservations and the roll up counts of reservations group by
    provisioning states that

    the user has access to in the current tenant.'
  signature: 'list_all(*, filter: str | None = None, orderby: str | None = None, refresh_summary:
    str | None = None, skiptoken: float | None = None, selected_state: str | None
    = None, take: float | None = None, **kwargs: Any) -> AsyncItemPaged[ReservationResponse]'
  keywordOnlyParameters:
  - name: filter
    description: 'May be used to filter by reservation properties. The filter supports
      ''eq'',

      ''or'', and ''and''. It does not currently support ''ne'', ''gt'', ''le'', ''ge'',
      or ''not''. Reservation

      properties include sku/name, properties/{appliedScopeType, archived, displayName,

      displayProvisioningState, effectiveDateTime, expiryDate, expiryDateTime, provisioningState,

      quantity, renew, reservedResourceType, term, userFriendlyAppliedScopeType,

      userFriendlyRenewState}. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: orderby
    description: May be used to sort order by reservation properties. Default value
      is None.
    defaultValue: None
    types:
    - <xref:str>
  - name: refresh_summary
    description: 'To indicate whether to refresh the roll up counts of the reservations

      group by provisioning states. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: skiptoken
    description: 'The number of reservations to skip from the list before returning
      results.

      Default value is None.'
    defaultValue: None
    types:
