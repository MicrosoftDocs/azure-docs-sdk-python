  - name: selected_state
    description: The selected provisioning state. Default value is None.
    defaultValue: None
    types:
    - <xref:str>
  - name: take
    description: To number of reservations to return. Default value is None.
    defaultValue: None
    types:
    - <xref:float>
  return:
    description: An iterator like instance of ReservationResponse
    types:
    - <xref:azure.core.async_paging.AsyncItemPaged>[<xref:azure.mgmt.reservations.models.ReservationResponse>]
