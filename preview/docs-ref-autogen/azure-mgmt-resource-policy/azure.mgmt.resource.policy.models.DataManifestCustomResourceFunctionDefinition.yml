### YamlMime:PythonClass
uid: azure.mgmt.resource.policy.models.DataManifestCustomResourceFunctionDefinition
name: DataManifestCustomResourceFunctionDefinition
fullName: azure.mgmt.resource.policy.models.DataManifestCustomResourceFunctionDefinition
module: azure.mgmt.resource.policy.models
summary: The custom resource function definition.
constructor:
  syntax: 'DataManifestCustomResourceFunctionDefinition(*args: Any, **kwargs: Any)'
variables:
- description: The function name as it will appear in the policy rule. eg - 'vault'.
  name: name
  types:
  - <xref:str>
- description: 'The fully qualified control plane resource type that this

    function represents. eg - ''Microsoft.KeyVault/vaults''.'
  name: fully_qualified_resource_type
  types:
  - <xref:str>
- description: 'The top-level properties that can be selected on the function''s

    output. eg - [ "name", "location" ] if vault().name and vault().location are supported.'
  name: default_properties
  types:
  - <xref:list>[<xref:str>]
- description: 'A value indicating whether the custom properties within the

    property bag are allowed. Needs api-version to be specified in the policy rule
    eg -

    vault(''2019-06-01'').'
  name: allow_custom_properties
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.resource.policy.models.DataManifestCustomResourceFunctionDefinition.allow_custom_properties
  name: allow_custom_properties
  summary: 'A value indicating whether the custom properties within the property bag
    are allowed. Needs

    api-version to be specified in the policy rule eg - vault(''2019-06-01'').'
  signature: 'allow_custom_properties: bool | None'
- uid: azure.mgmt.resource.policy.models.DataManifestCustomResourceFunctionDefinition.default_properties
  name: default_properties
  summary: 'The top-level properties that can be selected on the function''s output.
    eg - [ "name",

    "location" ] if vault().name and vault().location are supported.'
  signature: 'default_properties: list[str] | None'
- uid: azure.mgmt.resource.policy.models.DataManifestCustomResourceFunctionDefinition.fully_qualified_resource_type
  name: fully_qualified_resource_type
  summary: 'The fully qualified control plane resource type that this function represents.
