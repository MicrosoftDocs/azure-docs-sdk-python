    ''Microsoft.KeyVault/vaults''.'
  signature: 'fully_qualified_resource_type: str | None'
- uid: azure.mgmt.resource.policy.models.DataManifestCustomResourceFunctionDefinition.name
  name: name
  summary: The function name as it will appear in the policy rule. eg - 'vault'.
  signature: 'name: str | None'
