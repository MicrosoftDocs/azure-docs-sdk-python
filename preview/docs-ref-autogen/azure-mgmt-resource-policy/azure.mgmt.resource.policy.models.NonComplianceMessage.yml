### YamlMime:PythonClass
uid: azure.mgmt.resource.policy.models.NonComplianceMessage
name: NonComplianceMessage
fullName: azure.mgmt.resource.policy.models.NonComplianceMessage
module: azure.mgmt.resource.policy.models
summary: 'A message that describes why a resource is non-compliant with the policy.
  This is shown in

  ''deny'' error messages and on resource''s non-compliant compliance results.'
constructor:
  syntax: 'NonComplianceMessage(*args: Any, **kwargs: Any)'
variables:
- description: 'A message that describes why a resource is non-compliant with the
    policy. This

    is shown in ''deny'' error messages and on resource''s non-compliant compliance
    results. Required.'
  name: message
  types:
  - <xref:str>
- description: 'The policy definition reference ID within a policy set

    definition the message is intended for. This is only applicable if the policy
    assignment

    assigns a policy set definition. If this is not provided the message applies to
    all policies

    assigned by this policy assignment.'
  name: policy_definition_reference_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.resource.policy.models.NonComplianceMessage.message
  name: message
  summary: 'A message that describes why a resource is non-compliant with the policy.
    This is shown in

    ''deny'' error messages and on resource''s non-compliant compliance results. Required.'
  signature: 'message: str'
- uid: azure.mgmt.resource.policy.models.NonComplianceMessage.policy_definition_reference_id
  name: policy_definition_reference_id
  summary: 'The policy definition reference ID within a policy set definition the
    message is intended for.

    This is only applicable if the policy assignment assigns a policy set definition.
    If this is

    not provided the message applies to all policies assigned by this policy assignment.'
  signature: 'policy_definition_reference_id: str | None'
