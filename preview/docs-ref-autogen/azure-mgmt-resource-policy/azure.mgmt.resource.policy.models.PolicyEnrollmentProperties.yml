### YamlMime:PythonClass
uid: azure.mgmt.resource.policy.models.PolicyEnrollmentProperties
name: PolicyEnrollmentProperties
fullName: azure.mgmt.resource.policy.models.PolicyEnrollmentProperties
module: azure.mgmt.resource.policy.models
summary: The policy enrollment properties.
constructor:
  syntax: 'PolicyEnrollmentProperties(*args: Any, **kwargs: Any)'
variables:
- description: The ID of the policy assignment that is being enrolled. Required.
  name: policy_assignment_id
  types:
  - <xref:str>
- description: 'The policy assignment instance ID associated with this

    enrollment. The value is set to the instance ID of the policy assignment the policyAssignmentId

    references when the enrollment is created or updated. The format is a GUID string.'
  name: policy_assignment_instance_id
  types:
  - <xref:str>
- description: 'The policy definition reference IDs for policy

    definitions in an assigned policy set definition. These IDs correspond to a subset
    of

    `policyDefinitions[*].policyDefinitionReferenceId` in the policy set definition.
    When

    specified and not empty, only the referenced policy definitions will be enrolled
    to. Otherwise,

    the entire policy set is enrolled to.'
  name: policy_definition_reference_ids
  types:
  - <xref:list>[<xref:str>]
- description: The display name of the policy enrollment.
  name: display_name
  types:
  - <xref:str>
- description: The description of the policy enrollment.
  name: description
  types:
  - <xref:str>
- description: 'The policy enrollment metadata. Metadata is an open ended object and
    is

    typically a collection of key value pairs.'
  name: metadata
  types:
  - <xref:any>
- description: 'The option whether to validate the enrollment is at or under

    the assignment scope. Known values are: "Default" and "DoNotValidate".'
  name: assignment_scope_validation
  types:
  - <xref:str>
  - <xref:azure.mgmt.resource.policy.models.AssignmentScopeValidation>
- description: The resource selector list to filter policies by resource properties.
  name: resource_selectors
  types:
  - <xref:list>[<xref:azure.mgmt.resource.policy.models.ResourceSelector>]
