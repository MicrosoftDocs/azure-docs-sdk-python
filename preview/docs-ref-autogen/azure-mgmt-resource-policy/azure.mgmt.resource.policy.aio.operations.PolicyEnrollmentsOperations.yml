- uid: azure.mgmt.resource.policy.aio.operations.PolicyEnrollmentsOperations.create_or_update
  name: create_or_update
  summary: 'Creates or updates a policy enrollment.


    This operation creates or updates a policy enrollment with the given scope and
    name. Policy

    enrollments apply to all resources contained within their scope. For example,
    when you create a

    policy enrollment at resource group scope for a policy assignment at the same
    or above level,

    the enrollment applies to all applicable resources in the resource group.'
  signature: 'async create_or_update(scope: str, policy_enrollment_name: str, parameters:
    _models.PolicyEnrollment, *, content_type: str = ''application/json'', **kwargs:
    Any) -> _models.PolicyEnrollment'
  parameters:
  - name: scope
    description: The fully qualified Azure Resource manager identifier of the resource.
      Required.
    isRequired: true
    types:
    - <xref:str>
  - name: policy_enrollment_name
    description: The name of the policy enrollment. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: parameters
    description: 'The policy enrollment resource to create or replace. Is one of the
      following

      types: PolicyEnrollment, JSON, IO[bytes] Required.'
    isRequired: true
    types:
    - <xref:azure.mgmt.resource.policy.models.PolicyEnrollment>
    - <xref:JSON>
    - <xref:typing.IO>[<xref:bytes>]
  return:
    description: PolicyEnrollment. The PolicyEnrollment is compatible with MutableMapping
    types:
    - <xref:azure.mgmt.resource.policy.models.PolicyEnrollment>
  exceptions:
