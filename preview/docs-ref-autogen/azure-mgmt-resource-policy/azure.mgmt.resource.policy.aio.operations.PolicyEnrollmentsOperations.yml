- uid: azure.mgmt.resource.policy.aio.operations.PolicyEnrollmentsOperations.list_for_resource
  name: list_for_resource
  summary: 'Retrieves all policy enrollments that apply to a resource.


    This operation retrieves the list of all policy enrollments associated with the
    specified

    resource in the given resource group and subscription that match the optional
    given $filter.

    Valid values for $filter are: ''atScope()'' or ''atExactScope()''. If $filter
    is not provided, the

    unfiltered list includes all policy enrollments associated with the resource,
    including those

    that apply directly or from all containing scopes, as well as any applied to resources

    contained within the resource. Three parameters plus the resource name are used
    to identify a

    specific resource. If the resource is not part of a parent resource (the more
    common case), the

    parent resource path should not be provided (or provided as ''''). For example
    a web app could be

    specified as ({resourceProviderNamespace} == ''Microsoft.Web'', {parentResourcePath}
    == '''',

    {resourceType} == ''sites'', {resourceName} == ''MyWebApp''). If the resource
    is part of a parent

    resource, then all parameters should be provided. For example a virtual machine
    DNS name could

    be specified as ({resourceProviderNamespace} == ''Microsoft.Compute'', {parentResourcePath}
    ==

    ''virtualMachines/MyVirtualMachine'', {resourceType} == ''domainNames'', {resourceName}
    ==

    ''MyComputerName''). A convenient alternative to providing the namespace and type
    name separately

    is to provide both in the {resourceType} parameter, format: ({resourceProviderNamespace}
    == '''',

    {parentResourcePath} == '''', {resourceType} == ''Microsoft.Web/sites'', {resourceName}
    ==

    ''MyWebApp'').'
  signature: 'list_for_resource(resource_group_name: str, resource_provider_namespace:
    str, parent_resource_path: str, resource_type: str, resource_name: str, *, filter:
    str | None = None, **kwargs: Any) -> AsyncItemPaged[PolicyEnrollment]'
  parameters:
  - name: resource_group_name
    description: 'The name of the resource group. The name is case insensitive.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: resource_provider_namespace
    description: 'The namespace of the resource provider. For example, the

      namespace of a virtual machine is Microsoft.Compute (from Microsoft.Compute/virtualMachines).

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: parent_resource_path
    description: 'The parent resource path. Use empty string if there is none.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: resource_type
    description: 'The resource type name. For example the type name of a web app is
      ''sites''

      (from Microsoft.Web/sites). Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: resource_name
    description: The name of the resource. Required.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: filter
    description: 'The filter to apply on the operation. Valid values for $filter are:

      ''atScope()'' or ''atExactScope()''. If $filter is not provided, no filtering
      is performed. If

      $filter is not provided, the unfiltered list includes all policy enrollments
      associated with

      the scope, including those that apply directly or from containing scopes. If
      $filter=atScope()

      is provided, the returned list includes all policy enrollments that apply to
      the scope, which

      is everything in the unfiltered list except those applied to sub-scopes contained
      within the

      given scope. If $filter=atExactScope() is provided, the returned list only includes
      all policy

      enrollments that apply at the given scope. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  return:
    description: An iterator like instance of PolicyEnrollment
    types:
    - <xref:azure.core.async_paging.AsyncItemPaged>[<xref:azure.mgmt.resource.policy.models.PolicyEnrollment>]
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
