### YamlMime:PythonClass
uid: azure.mgmt.resource.policy.models.Identity
name: Identity
fullName: azure.mgmt.resource.policy.models.Identity
module: azure.mgmt.resource.policy.models
summary: 'Identity for the resource.  Policy assignments support a maximum of one
  identity.  That is

  either a system assigned identity or a single user assigned identity.'
constructor:
  syntax: 'Identity(*args: Any, **kwargs: Any)'
variables:
- description: 'The principal ID of the resource identity.  This property will only
    be

    provided for a system assigned identity.'
  name: principal_id
  types:
  - <xref:str>
- description: 'The tenant ID of the resource identity.  This property will only be
    provided

    for a system assigned identity.'
  name: tenant_id
  types:
  - <xref:str>
- description: 'The identity type. This is the only required field when adding a system
    or user

    assigned identity to a resource. Known values are: "SystemAssigned", "UserAssigned",
    and

    "None".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.resource.policy.models.ResourceIdentityType>
- description: 'The user identity associated with the policy. The user identity

    dictionary key references will be ARM resource ids in the form:

    ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}''.'
  name: user_assigned_identities
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.resource.policy.models.UserAssignedIdentitiesValue>]
attributes:
- uid: azure.mgmt.resource.policy.models.Identity.principal_id
  name: principal_id
  summary: 'The principal ID of the resource identity.  This property will only be
    provided for a system

    assigned identity.'
  signature: 'principal_id: str | None'
- uid: azure.mgmt.resource.policy.models.Identity.tenant_id
  name: tenant_id
  summary: 'The tenant ID of the resource identity.  This property will only be provided
    for a system

    assigned identity.'
  signature: 'tenant_id: str | None'
- uid: azure.mgmt.resource.policy.models.Identity.type
  name: type
  summary: 'The identity type. This is the only required field when adding a system
    or user assigned

    identity to a resource. Known values are: "SystemAssigned", "UserAssigned", and
    "None".'
  signature: 'type: str | _models.ResourceIdentityType | None'
- uid: azure.mgmt.resource.policy.models.Identity.user_assigned_identities
  name: user_assigned_identities
  summary: 'The user identity associated with the policy. The user identity dictionary
    key references will

    be ARM resource ids in the form:

    ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}''.'
  signature: 'user_assigned_identities: dict[str, ''_models.UserAssignedIdentitiesValue'']
