### YamlMime:PythonClass
uid: azure.mgmt.resource.policy.models.ExternalEvaluationEnforcementSettings
name: ExternalEvaluationEnforcementSettings
fullName: azure.mgmt.resource.policy.models.ExternalEvaluationEnforcementSettings
module: azure.mgmt.resource.policy.models
summary: 'The details of the source of external evaluation results required by the
  policy during

  enforcement evaluation.'
constructor:
  syntax: 'ExternalEvaluationEnforcementSettings(*, missing_token_action: str | None
    = None, result_lifespan: str | None = None, endpoint_settings: _models.ExternalEvaluationEndpointSettings
    | None = None, role_definition_ids: list[str] | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: missing_token_action
    description: 'What to do when evaluating an enforcement policy that requires

      an external evaluation and the token is missing. Possible values are Audit and
      Deny and

      language expressions are supported.'
    defaultValue: None
    types:
    - <xref:str>
  - name: result_lifespan
    description: 'The lifespan of the endpoint invocation result after which it''s
      no

      longer valid. Value is expected to follow the ISO 8601 duration format and language
      expressions

      are supported.'
    defaultValue: None
    types:
    - <xref:str>
  - name: endpoint_settings
    description: The settings of an external endpoint providing evaluation results.
    defaultValue: None
    types:
    - <xref:azure.mgmt.resource.policy.models.ExternalEvaluationEndpointSettings>
  - name: role_definition_ids
    description: 'An array of the role definition Ids the assignment''s MSI will

      need in order to invoke the endpoint.'
    defaultValue: None
    types:
    - <xref:list>[<xref:str>]
