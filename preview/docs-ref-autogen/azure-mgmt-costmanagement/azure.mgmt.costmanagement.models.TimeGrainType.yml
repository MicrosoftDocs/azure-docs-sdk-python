uid: azure.mgmt.costmanagement.models.TimeGrainType
name: TimeGrainType
fullName: azure.mgmt.costmanagement.models.TimeGrainType
summary: "The time covered by a budget. Tracking of the amount will be reset based\
  \ on the time grain.\n\nSupported for CategoryType(s): Cost, ReservationUtilization.\n\
  \nSupported timeGrainTypes for **CategoryType: Cost**\n\n* Monthly \n\n* Quarterly\
  \ \n\n* Annually \n\n* BillingMonth* \n\n* BillingQuarter* \n\n* BillingAnnual*\
  \ \n\n>>*<<only supported for Web Direct customers.\n\nSupported timeGrainTypes\
  \ for **CategoryType: ReservationUtilization**\n\n* Last7Days \n\n* Last30Days \n\
  \nRequired for CategoryType(s): Cost, ReservationUtilization."
module: azure.mgmt.costmanagement.models
