uid: azure.mgmt.costmanagement.models.Frequency
name: Frequency
fullName: azure.mgmt.costmanagement.models.Frequency
summary: 'Frequency of a notification. Represents how long the notification will be
  silent after

  triggering an alert for a threshold breach. If not specified, the frequency will
  be set by

  default based on the timeGrain (Weekly when timeGrain: Last7Days, Monthly when timeGrain:

  Last30Days).


  Supported for CategoryType(s): ReservationUtilization.'
module: azure.mgmt.costmanagement.models
fields:
- name: DAILY
  uid: azure.mgmt.costmanagement.models.Frequency.DAILY
- name: MONTHLY
  uid: azure.mgmt.costmanagement.models.Frequency.MONTHLY
- name: WEEKLY
  uid: azure.mgmt.costmanagement.models.Frequency.WEEKLY
