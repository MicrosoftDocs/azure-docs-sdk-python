### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.CommonExportProperties
name: CommonExportProperties
fullName: azure.mgmt.costmanagement.models.CommonExportProperties
module: azure.mgmt.costmanagement.models
summary: The common properties of the export.
constructor:
  syntax: 'CommonExportProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The format of the export being delivered. Known values are: "Csv"
    and "Parquet".'
  name: format
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.FormatType>
- description: Has delivery information for the export. Required.
  name: delivery_info
  types:
  - <xref:azure.mgmt.costmanagement.models.ExportDeliveryInfo>
- description: Has the definition for the export. Required.
  name: definition
  types:
  - <xref:azure.mgmt.costmanagement.models.ExportDefinition>
- description: If requested, has the most recent run history for the export.
  name: run_history
  types:
  - <xref:azure.mgmt.costmanagement.models.ExportExecutionListResult>
- description: 'If set to true, exported data will be partitioned by size and placed
    in a

    blob directory together with a manifest file.'
  name: partition_data
  types:
  - <xref:bool>
- description: 'Allow customers to select overwrite

    data(OverwritePreviousReport) for exports. This setting will enable overwrite
    data for the same

    month in customer storage account. By default set to CreateNewReport. Known values
    are:

    "OverwritePreviousReport" and "CreateNewReport".'
  name: data_overwrite_behavior
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.DataOverwriteBehaviorType>
- description: 'Allow customers to select compress data for exports. This setting
    will

    enable destination file compression scheme at runtime. By default set to None.
    Gzip is for csv

    and snappy for parquet. Known values are: "gzip", "snappy", and "none".'
  name: compression_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.CompressionModeType>
- description: 'The export description set by customer at time of export

    creation/update.'
  name: export_description
  types:
  - <xref:str>
- description: 'If the export has an active schedule, provides an estimate of the

    next run time.'
  name: next_run_time_estimate
  types:
  - <xref:datetime.datetime>
- description: 'The export suspension reason if export is in SystemSuspended

    state. This is not populated currently.'
  name: system_suspension_context
  types:
  - <xref:azure.mgmt.costmanagement.models.ExportSuspensionContext>
attributes:
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.compression_mode
  name: compression_mode
  summary: 'Allow customers to select compress data for exports. This setting will
    enable destination file

    compression scheme at runtime. By default set to None. Gzip is for csv and snappy
    for parquet.

    Known values are: "gzip", "snappy", and "none".'
  signature: 'compression_mode: str | _models.CompressionModeType | None'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.data_overwrite_behavior
  name: data_overwrite_behavior
  summary: 'Allow customers to select overwrite data(OverwritePreviousReport) for
    exports. This setting

    will enable overwrite data for the same month in customer storage account. By
    default set to

    CreateNewReport. Known values are: "OverwritePreviousReport" and "CreateNewReport".'
  signature: 'data_overwrite_behavior: str | _models.DataOverwriteBehaviorType | None'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.definition
  name: definition
  summary: Has the definition for the export. Required.
  signature: 'definition: _models.ExportDefinition'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.delivery_info
  name: delivery_info
  summary: Has delivery information for the export. Required.
  signature: 'delivery_info: _models.ExportDeliveryInfo'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.export_description
  name: export_description
  summary: The export description set by customer at time of export creation/update.
  signature: 'export_description: str | None'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.format
  name: format
  summary: '"Csv" and "Parquet".'
  signature: 'format: str | _models.FormatType | None'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.next_run_time_estimate
  name: next_run_time_estimate
  summary: If the export has an active schedule, provides an estimate of the next
    run time.
  signature: 'next_run_time_estimate: datetime | None'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.partition_data
  name: partition_data
  summary: 'If set to true, exported data will be partitioned by size and placed in
    a blob directory

    together with a manifest file.'
  signature: 'partition_data: bool | None'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.run_history
  name: run_history
  summary: If requested, has the most recent run history for the export.
  signature: 'run_history: _models.ExportExecutionListResult | None'
- uid: azure.mgmt.costmanagement.models.CommonExportProperties.system_suspension_context
  name: system_suspension_context
  summary: 'The export suspension reason if export is in SystemSuspended state. This
    is not populated

    currently.'
  signature: 'system_suspension_context: _models.ExportSuspensionContext | None'
