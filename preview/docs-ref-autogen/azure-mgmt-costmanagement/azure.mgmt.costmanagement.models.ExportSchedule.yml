uid: azure.mgmt.costmanagement.models.ExportSchedule
name: ExportSchedule
fullName: azure.mgmt.costmanagement.models.ExportSchedule
module: azure.mgmt.costmanagement.models
summary: The schedule associated with the export.
constructor:
  syntax: 'ExportSchedule(*args: Any, **kwargs: Any)'
variables:
- description: 'The status of the export''s schedule. If ''Inactive'', the export''s
    schedule is

    paused. To enable export set the status to be Active and then make a PUT request.
    Known values

    are: "Active" and "Inactive".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.StatusType>
- description: 'The schedule recurrence. Known values are: "Daily", "Weekly", "Monthly",
    and

    "Annually".'
  name: recurrence
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.RecurrenceType>
- description: 'Has start and end date of the recurrence. The start date must be in

    future. If present, the end date must be greater than start date.'
  name: recurrence_period
  types:
  - <xref:azure.mgmt.costmanagement.models.ExportRecurrencePeriod>
attributes:
- uid: azure.mgmt.costmanagement.models.ExportSchedule.recurrence
  name: recurrence
  summary: '"Daily", "Weekly", "Monthly", and

    "Annually".'
  signature: 'recurrence: str | _models.RecurrenceType | None'
- uid: azure.mgmt.costmanagement.models.ExportSchedule.recurrence_period
  name: recurrence_period
  summary: 'Has start and end date of the recurrence. The start date must be in future.
    If present, the end

    date must be greater than start date.'
  signature: 'recurrence_period: _models.ExportRecurrencePeriod | None'
- uid: azure.mgmt.costmanagement.models.ExportSchedule.status
  name: status
  summary: 'The status of the export''s schedule. If ''Inactive'', the export''s schedule
    is paused. To enable

    export set the status to be Active and then make a PUT request. Known values are:
    "Active"

    and "Inactive".'
  signature: 'status: str | _models.StatusType | None'
