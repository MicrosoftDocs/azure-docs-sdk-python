  name: report_url
  summary: 'The CSV file from the reportUrl blob link consists of reservation usage
    data with the following

    schema at daily granularity. Known values are: "InstanceFlexibilityGroup",

    "InstanceFlexibilityRatio", "InstanceId", "Kind", "ReservationId",

    "ReservationOrderId", "ReservedHours", "SkuName", "TotalReservedQuantity",

    "UsageDate", and "UsedHours".'
  signature: 'report_url: str | _models.ReservationReportSchema | None'
- uid: azure.mgmt.costmanagement.models.ReportURL.valid_until
