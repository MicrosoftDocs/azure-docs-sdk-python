uid: azure.mgmt.costmanagement.models.ReportURL
name: ReportURL
fullName: azure.mgmt.costmanagement.models.ReportURL
module: azure.mgmt.costmanagement.models
summary: The URL to download the generated report.
constructor:
  syntax: 'ReportURL(*args: Any, **kwargs: Any)'
variables:
- description: 'The CSV file from the reportUrl blob link consists of reservation
    usage data

    with the following schema at daily granularity. Known values are: "InstanceFlexibilityGroup",

    "InstanceFlexibilityRatio", "InstanceId", "Kind", "ReservationId", "ReservationOrderId",

    "ReservedHours", "SkuName", "TotalReservedQuantity", "UsageDate", and "UsedHours".'
  name: report_url
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.ReservationReportSchema>
- description: The time at which report URL becomes invalid.
  name: valid_until
  types:
  - <xref:datetime.datetime>
attributes:
