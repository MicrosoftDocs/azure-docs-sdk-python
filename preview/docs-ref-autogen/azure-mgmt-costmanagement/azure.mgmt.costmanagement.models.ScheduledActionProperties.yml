  name: file_destination
  summary: Destination format of the view data. This is optional.
  signature: 'file_destination: _models.FileDestination | None'
- uid: azure.mgmt.costmanagement.models.ScheduledActionProperties.notification
  name: notification
  summary: Notification properties based on scheduled action kind. Required.
  signature: 'notification: _models.NotificationProperties'
- uid: azure.mgmt.costmanagement.models.ScheduledActionProperties.notification_email
  name: notification_email
  summary: 'Email address of the point of contact that should get the unsubscribe
    requests and notification

    emails.'
  signature: 'notification_email: str | None'
- uid: azure.mgmt.costmanagement.models.ScheduledActionProperties.schedule
  name: schedule
  summary: Schedule of the scheduled action. Required.
  signature: 'schedule: _models.ScheduleProperties'
- uid: azure.mgmt.costmanagement.models.ScheduledActionProperties.scope
  name: scope
  summary: 'For private scheduled action(Create or Update), scope will be empty.<br
    /> For shared scheduled

    action(Create or Update By Scope), Cost Management scope can be

    ''subscriptions/{subscriptionId}'' for subscription scope,

    ''subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}'' for resourceGroup
    scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}'' for Billing
    Account scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/departments/{departmentId}''
    for

    Department scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/enrollmentAccounts/{enrollmentAccountId}''

    for EnrollmentAccount scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/billingProfiles/{billingProfileId}''

    for BillingProfile scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/invoiceSections/{invoiceSectionId}''

    for InvoiceSection scope,

    ''/providers/Microsoft.CostManagement/externalBillingAccounts/{externalBillingAccountName}''
    for

    ExternalBillingAccount scope, and

    ''/providers/Microsoft.CostManagement/externalSubscriptions/{externalSubscriptionName}''
    for

    ExternalSubscription scope.'
  signature: 'scope: str | None'
- uid: azure.mgmt.costmanagement.models.ScheduledActionProperties.status
  name: status
  summary: '"Enabled", "Expired", and

    "Disabled".'
  signature: 'status: str | _models.ScheduledActionStatus'
- uid: azure.mgmt.costmanagement.models.ScheduledActionProperties.view_id
  name: view_id
  summary: 'Cost analysis viewId used for scheduled action. For example,

    ''/providers/Microsoft.CostManagement/views/swaggerExample''. Required.'
  signature: 'view_id: str'
