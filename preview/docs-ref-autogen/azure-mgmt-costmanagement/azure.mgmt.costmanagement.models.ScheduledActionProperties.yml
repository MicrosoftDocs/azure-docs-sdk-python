### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.ScheduledActionProperties
name: ScheduledActionProperties
fullName: azure.mgmt.costmanagement.models.ScheduledActionProperties
module: azure.mgmt.costmanagement.models
summary: The properties of the scheduled action.
constructor:
  syntax: 'ScheduledActionProperties(*args: Any, **kwargs: Any)'
variables:
- description: Scheduled action name. Required.
  name: display_name
  types:
  - <xref:str>
- description: Destination format of the view data. This is optional.
  name: file_destination
  types:
  - <xref:azure.mgmt.costmanagement.models.FileDestination>
- description: Notification properties based on scheduled action kind. Required.
  name: notification
  types:
  - <xref:azure.mgmt.costmanagement.models.NotificationProperties>
- description: 'Email address of the point of contact that should get the unsubscribe

    requests and notification emails.'
  name: notification_email
  types:
  - <xref:str>
- description: Schedule of the scheduled action. Required.
  name: schedule
  types:
  - <xref:azure.mgmt.costmanagement.models.ScheduleProperties>
- description: 'For private scheduled action(Create or Update), scope will be empty.<br
    /> For

    shared scheduled action(Create or Update By Scope), Cost Management scope can
    be

    ''subscriptions/{subscriptionId}'' for subscription scope,

    ''subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}'' for resourceGroup
    scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}'' for Billing
    Account scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/departments/{departmentId}''
    for

    Department scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/enrollmentAccounts/{enrollmentAccountId}''

    for EnrollmentAccount scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/billingProfiles/{billingProfileId}''

    for BillingProfile scope,

    ''providers/Microsoft.Billing/billingAccounts/{billingAccountId}/invoiceSections/{invoiceSectionId}''

    for InvoiceSection scope,

    ''/providers/Microsoft.CostManagement/externalBillingAccounts/{externalBillingAccountName}''
    for

    ExternalBillingAccount scope, and

    ''/providers/Microsoft.CostManagement/externalSubscriptions/{externalSubscriptionName}''
    for

    ExternalSubscription scope.'
  name: scope
  types:
  - <xref:str>
- description: 'Status of the scheduled action. Required. Known values are: "Enabled",
    "Expired",

    and "Disabled".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.ScheduledActionStatus>
- description: 'Cost analysis viewId used for scheduled action. For example,

    ''/providers/Microsoft.CostManagement/views/swaggerExample''. Required.'
  name: view_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.costmanagement.models.ScheduledActionProperties.display_name
  name: display_name
  summary: Scheduled action name. Required.
  signature: 'display_name: str'
