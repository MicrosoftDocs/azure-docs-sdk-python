### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.TagInheritanceProperties
name: TagInheritanceProperties
fullName: azure.mgmt.costmanagement.models.TagInheritanceProperties
module: azure.mgmt.costmanagement.models
summary: The properties of the tag inheritance setting.
constructor:
  syntax: 'TagInheritanceProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'This property defines the behavior when an inherited tag being

    applied matches a lower scope tag (Eg. Subscription tag matches the resource tag).
    If set to

    true - when tags match, the highest scope tags will be applied. Billing profile
    is the highest

    scope,  followed by invoice sections, subscriptions and resource groups (allows
    overriding of

    lower scope tag values). If set to false - when tags match, the lowest scope tags
    will be

    applied. So, if a resource has the same tag as a subscription tag, the resource
    tag will be

    applied (does not allow overriding of lower scope tag values). Required.'
  name: prefer_container_tags
  types:
  - <xref:bool>
attributes:
