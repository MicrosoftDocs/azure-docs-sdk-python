    Cost\" and \"ReservationUtilization\". "
  signature: 'category: str | _models.CategoryType'
- uid: azure.mgmt.costmanagement.models.BudgetProperties.current_spend
  name: current_spend
  summary: 'The current amount of cost which is being tracked for a budget.


