  signature: 'current_spend: _models.CurrentSpend | None'
- uid: azure.mgmt.costmanagement.models.BudgetProperties.filter
  name: filter
  summary: 'May be used to filter budgets by user-specified dimensions and/or tags.


    Supported for CategoryType(s): Cost, ReservationUtilization.'
  signature: 'filter: _models.BudgetFilter | None'
- uid: azure.mgmt.costmanagement.models.BudgetProperties.forecast_spend
  name: forecast_spend
  summary: 'The forecasted cost which is being tracked for a budget.


    Supported for CategoryType(s): Cost.'
  signature: 'forecast_spend: _models.ForecastSpend | None'
- uid: azure.mgmt.costmanagement.models.BudgetProperties.notifications
  name: notifications
  summary: "Cost,\nReservationUtilization.\n\n* Constraints for **CategoryType: Cost**\
    \ - Budget can have up to 5 notifications with thresholdType: Actual and 5 notifications\
    \ with thresholdType: Forecasted. \n\n* Constraints for **CategoryType: ReservationUtilization**\
    \ - Only one notification allowed. thresholdType is not applicable. "
  signature: 'notifications: dict[str, ''_models.Notification''] | None'
- uid: azure.mgmt.costmanagement.models.BudgetProperties.time_grain
  name: time_grain
  summary: "The time covered by a budget. Tracking of the amount will be reset based\
    \ on the time grain.\nSupported for CategoryType(s): Cost, ReservationUtilization.\
    \ Supported timeGrainTypes for\n**CategoryType: Cost**\n\n* Monthly \n\n* Quarterly\
    \ \n\n* Annually \n\n* BillingMonth* \n\n* BillingQuarter* \n\n* BillingAnnual*\
    \ \n\n>>*<<only supported for Web Direct customers.\n\nSupported timeGrainTypes\
    \ for **CategoryType: ReservationUtilization**\n\n* Last7Days \n\n* Last30Days\
    \ \n\nRequired for CategoryType(s): Cost, ReservationUtilization. Required. Known\
    \ values are:\n\"Monthly\", \"Quarterly\", \"Annually\", \"BillingMonth\", \"\
    BillingQuarter\",\n\"BillingAnnual\", \"Last7Days\", and \"Last30Days\"."
  signature: 'time_grain: str | _models.TimeGrainType'
- uid: azure.mgmt.costmanagement.models.BudgetProperties.time_period
  name: time_period
  summary: 'The time period that defines the active period of the budget. The budget
    will evaluate data on

    or after the startDate and will expire on the endDate.


    Supported for CategoryType(s): Cost, ReservationUtilization.


    Required for CategoryType(s): Cost, ReservationUtilization. Required.'
  signature: 'time_period: _models.BudgetTimePeriod'
