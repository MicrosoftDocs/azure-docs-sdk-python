### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.BudgetProperties
name: BudgetProperties
fullName: azure.mgmt.costmanagement.models.BudgetProperties
module: azure.mgmt.costmanagement.models
summary: The properties of the budget.
constructor:
  syntax: 'BudgetProperties(*args: Any, **kwargs: Any)'
variables:
- description: "The category of the budget.\n\n* 'Cost' defines a Budget. \n\n* 'ReservationUtilization'\
    \ defines a Reservation Utilization Alert Rule. Required. Known values are: \"\
    Cost\" and \"ReservationUtilization\"."
  name: category
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.CategoryType>
- description: 'The total amount of cost to track with the budget.


    Supported for CategoryType(s): Cost.


    Required for CategoryType(s): Cost.'
  name: amount
  types:
  - <xref:float>
- description: "The time covered by a budget. Tracking of the amount will be reset\
    \ based on\nthe time grain. Supported for CategoryType(s): Cost, ReservationUtilization.\
    \ Supported\ntimeGrainTypes for **CategoryType: Cost**\n\n* Monthly \n\n* Quarterly\
    \ \n\n* Annually \n\n* BillingMonth* \n\n* BillingQuarter* \n\n* BillingAnnual*\
    \ \n\n>>*<<only supported for Web Direct customers.\n\nSupported timeGrainTypes\
    \ for **CategoryType: ReservationUtilization**\n\n* Last7Days \n\n* Last30Days\
    \ \n\nRequired for CategoryType(s): Cost, ReservationUtilization. Required. Known\
    \ values are:\n\"Monthly\", \"Quarterly\", \"Annually\", \"BillingMonth\", \"\
    BillingQuarter\", \"BillingAnnual\",\n\"Last7Days\", and \"Last30Days\"."
  name: time_grain
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.TimeGrainType>
- description: 'The time period that defines the active period of the budget. The
    budget

    will evaluate data on or after the startDate and will expire on the endDate.


    Supported for CategoryType(s): Cost, ReservationUtilization.


    Required for CategoryType(s): Cost, ReservationUtilization. Required.'
  name: time_period
  types:
  - <xref:azure.mgmt.costmanagement.models.BudgetTimePeriod>
- description: 'May be used to filter budgets by user-specified dimensions and/or
    tags.


    Supported for CategoryType(s): Cost, ReservationUtilization.'
  name: filter
  types:
  - <xref:azure.mgmt.costmanagement.models.BudgetFilter>
- description: 'The current amount of cost which is being tracked for a budget.


    Supported for CategoryType(s): Cost.'
  name: current_spend
  types:
  - <xref:azure.mgmt.costmanagement.models.CurrentSpend>
- description: "Dictionary of notifications associated with the budget. Supported\
    \ for\nCategoryType(s): Cost, ReservationUtilization.\n\n* Constraints for **CategoryType:\
    \ Cost** - Budget can have up to 5 notifications with thresholdType: Actual and\
    \ 5 notifications with thresholdType: Forecasted. \n\n* Constraints for **CategoryType:\
    \ ReservationUtilization** - Only one notification allowed. thresholdType is not\
    \ applicable."
  name: notifications
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.costmanagement.models.Notification>]
- description: 'The forecasted cost which is being tracked for a budget.


    Supported for CategoryType(s): Cost.'
  name: forecast_spend
  types:
  - <xref:azure.mgmt.costmanagement.models.ForecastSpend>
attributes:
- uid: azure.mgmt.costmanagement.models.BudgetProperties.amount
  name: amount
  summary: 'The total amount of cost to track with the budget.


    Supported for CategoryType(s): Cost.


    Required for CategoryType(s): Cost.'
  signature: 'amount: float | None'
- uid: azure.mgmt.costmanagement.models.BudgetProperties.category
  name: category
  summary: "The category of the budget.\n\n* 'Cost' defines a Budget. \n\n* 'ReservationUtilization'\
