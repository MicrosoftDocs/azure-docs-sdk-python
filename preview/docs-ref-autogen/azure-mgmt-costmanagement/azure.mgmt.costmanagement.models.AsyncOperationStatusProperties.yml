### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.AsyncOperationStatusProperties
name: AsyncOperationStatusProperties
fullName: azure.mgmt.costmanagement.models.AsyncOperationStatusProperties
module: azure.mgmt.costmanagement.models
summary: Object representing the report url and valid until date of the async report
  generated.
constructor:
  syntax: 'AsyncOperationStatusProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Sas url to the async benefit utilization summaries report. Will be
    empty if

    the report is in Running or Failed state. Known values are: "Kind", "AvgUtilizationPercentage",

    "BenefitOrderId", "BenefitId", "BenefitType", "MaxUtilizationPercentage",

    "MinUtilizationPercentage", "UsageDate", and "UtilizedPercentage".'
  name: report_url
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.BenefitUtilizationSummaryReportSchema>
- description: 'Sas url to async benefit utilization summaries report in secondary

    storage in case of primary outage. Will be empty if the report is in Running or
    Failed state.

    Known values are: "Kind", "AvgUtilizationPercentage", "BenefitOrderId", "BenefitId",

    "BenefitType", "MaxUtilizationPercentage", "MinUtilizationPercentage", "UsageDate",
    and

    "UtilizedPercentage".'
  name: secondary_report_url
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.BenefitUtilizationSummaryReportSchema>
- description: The date that the sas url provided in reportUrl expires.
  name: valid_until
  types:
  - <xref:datetime.datetime>
attributes:
