  signature: 'report_url: str | _models.BenefitUtilizationSummaryReportSchema | None'
- uid: azure.mgmt.costmanagement.models.AsyncOperationStatusProperties.secondary_report_url
  name: secondary_report_url
  summary: 'Sas url to async benefit utilization summaries report in secondary storage
    in case of primary

    outage. Will be empty if the report is in Running or Failed state. Known values
    are: "Kind",

    "AvgUtilizationPercentage", "BenefitOrderId", "BenefitId", "BenefitType",

    "MaxUtilizationPercentage", "MinUtilizationPercentage", "UsageDate", and

    "UtilizedPercentage".'
  signature: 'secondary_report_url: str | _models.BenefitUtilizationSummaryReportSchema
