### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.ExportDefinition
name: ExportDefinition
fullName: azure.mgmt.costmanagement.models.ExportDefinition
module: azure.mgmt.costmanagement.models
summary: The definition of an export.
constructor:
  syntax: 'ExportDefinition(*args: Any, **kwargs: Any)'
variables:
- description: 'The type of the export. Note that ''Usage'' is equivalent to ''ActualCost''
    and is

    applicable to exports that do not yet provide data for charges or amortization
    for service

    reservations. Required. Known values are: "Usage", "ActualCost", "AmortizedCost",
    "FocusCost",

    "PriceSheet", "ReservationTransactions", "ReservationRecommendations", and

    "ReservationDetails".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.ExportType>
- description: 'The time frame for pulling data for the export. If custom, then a
    specific

    time period must be provided. Required. Known values are: "MonthToDate", "BillingMonthToDate",

    "TheLastMonth", "TheLastBillingMonth", "WeekToDate", "Custom", and "TheCurrentMonth".'
  name: timeframe
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.TimeframeType>
- description: Has time period for pulling data for the export.
  name: time_period
  types:
  - <xref:azure.mgmt.costmanagement.models.ExportTimePeriod>
- description: The definition for data in the export.
  name: data_set
  types:
  - <xref:azure.mgmt.costmanagement.models.ExportDataset>
attributes:
- uid: azure.mgmt.costmanagement.models.ExportDefinition.data_set
  name: data_set
  summary: The definition for data in the export.
  signature: 'data_set: _models.ExportDataset | None'
- uid: azure.mgmt.costmanagement.models.ExportDefinition.time_period
  name: time_period
  summary: Has time period for pulling data for the export.
  signature: 'time_period: _models.ExportTimePeriod | None'
- uid: azure.mgmt.costmanagement.models.ExportDefinition.timeframe
  name: timeframe
  summary: 'The time frame for pulling data for the export. If custom, then a specific
    time period must be

    provided. Required. Known values are: "MonthToDate", "BillingMonthToDate",

    "TheLastMonth", "TheLastBillingMonth", "WeekToDate", "Custom", and "TheCurrentMonth".'
  signature: 'timeframe: str | _models.TimeframeType'
- uid: azure.mgmt.costmanagement.models.ExportDefinition.type
  name: type
  summary: 'The type of the export. Note that ''Usage'' is equivalent to ''ActualCost''
    and is applicable to

    exports that do not yet provide data for charges or amortization for service reservations.

    Required. Known values are: "Usage", "ActualCost", "AmortizedCost", "FocusCost",

    "PriceSheet", "ReservationTransactions", "ReservationRecommendations", and

    "ReservationDetails".'
  signature: 'type: str | _models.ExportType'
