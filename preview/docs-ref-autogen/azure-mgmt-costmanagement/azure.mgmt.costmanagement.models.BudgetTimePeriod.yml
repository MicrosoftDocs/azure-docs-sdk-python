### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.BudgetTimePeriod
name: BudgetTimePeriod
fullName: azure.mgmt.costmanagement.models.BudgetTimePeriod
module: azure.mgmt.costmanagement.models
summary: 'The time period that defines the active period of the budget. The budget
  will evaluate data on

  or after the startDate and will expire on the endDate.


  Supported for CategoryType(s): Cost, ReservationUtilization.


  Required for CategoryType(s): Cost, ReservationUtilization.'
constructor:
  syntax: 'BudgetTimePeriod(*args: Any, **kwargs: Any)'
variables:
- description: "The start date for the budget.\n\n* Constraints for **CategoryType:\
    \ Cost** - Must be first of the month and should be less than the end date. Budget\
    \ start date must be on or after June 1, 2017. Future start date should not be\
    \ more than twelve months. Past start date should  be selected within the timegrain\
    \ period. \n\n* Constraints for **CategoryType: ReservationUtilization** - Must\
    \ be on or after the current date and less than the end date. Required."
  name: start_date
  types:
  - <xref:datetime.datetime>
- description: "The end date for the budget.\n\n* Constraints for **CategoryType:\
    \ Cost** - No constraints. If not provided, we default this to 10 years from the\
    \ start date. \n\n* Constraints for **CategoryType: ReservationUtilization** -\
    \ End date cannot be more than 3 years after the start date."
  name: end_date
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.costmanagement.models.BudgetTimePeriod.end_date
  name: end_date
  summary: "The end date for the budget.\n\n* Constraints for **CategoryType: Cost**\
    \ - No constraints. If not provided, we default this to 10 years from the start\
    \ date. \n\n* Constraints for **CategoryType: ReservationUtilization** - End date\
    \ cannot be more than 3 years after the start date. "
  signature: 'end_date: datetime | None'
- uid: azure.mgmt.costmanagement.models.BudgetTimePeriod.start_date
  name: start_date
  summary: "The start date for the budget.\n\n* Constraints for **CategoryType: Cost**\
    \ - Must be first of the month and should be less than the end date. Budget start\
    \ date must be on or after June 1, 2017. Future start date should not be more\
    \ than twelve months. Past start date should  be selected within the timegrain\
    \ period. \n\n* Constraints for **CategoryType: ReservationUtilization** - Must\
    \ be on or after the current date and less than the end date. Required. "
  signature: 'start_date: datetime'
