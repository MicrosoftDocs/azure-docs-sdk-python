    clauses. Required.'
  signature: 'aggregation: dict[str, ''_models.ForecastAggregation'']'
- uid: azure.mgmt.costmanagement.models.ForecastDataset.configuration
  name: configuration
  summary: 'Has configuration information for the data in the export. The configuration
