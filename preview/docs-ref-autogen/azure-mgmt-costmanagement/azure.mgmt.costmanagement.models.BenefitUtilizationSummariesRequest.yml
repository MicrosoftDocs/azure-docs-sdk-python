    are

    Reservation and SavingsPlan. Known values are: "IncludedQuantity", "Reservation",
    and

    "SavingsPlan".'
  name: kind
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.BenefitKind>
