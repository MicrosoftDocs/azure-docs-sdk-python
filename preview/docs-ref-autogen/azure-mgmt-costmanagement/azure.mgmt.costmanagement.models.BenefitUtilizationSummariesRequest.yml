    for

    benefit id scope. Not supported for benefit order or any billing scopes.'
  name: benefit_id
  types:
  - <xref:str>
- description: 'The grain the summaries data is served at in the report. Accepted
    values are

    ''Daily'' or ''Monthly''. Required. Known values are: "Hourly", "Daily", and "Monthly".'
  name: grain
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.Grain>
- description: 'The start date of the summaries data that will be served in the report.

