summary: Properties of an async benefit utilization summaries request.
constructor:
  syntax: 'BenefitUtilizationSummariesRequest(*args: Any, **kwargs: Any)'
variables:
- description: 'Billing account the benefit utilization summaries report is for.

    Required for billing account and billing profile scopes. Not supported for any
    benefit scopes.'
  name: billing_account_id
  types:
  - <xref:str>
- description: 'Billing profile id the benefit utilization summaries report is for.

    Required for billing profile scope. Not supported for billing account or any benefit
    scopes.'
  name: billing_profile_id
  types:
  - <xref:str>
- description: 'Benefit order id the benefit utilization summaries report is for.

    Required for benefit order and benefit id scopes. Not supported for any billing
    scopes.'
