  name: start
  types:
  - <xref:str>
- description: The end date to pull data to. example format 2020-03-15. Required.
  name: end
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.costmanagement.models.CostDetailsTimePeriod.end
  name: end
  summary: The end date to pull data to. example format 2020-03-15. Required.
  signature: 'end: str'
- uid: azure.mgmt.costmanagement.models.CostDetailsTimePeriod.start
  name: start
  summary: The start date to pull data from. example format 2020-03-15. Required.
  signature: 'start: str'
