name: CostDetailsTimePeriod
fullName: azure.mgmt.costmanagement.models.CostDetailsTimePeriod
module: azure.mgmt.costmanagement.models
summary: 'The start and end date for pulling data for the cost detailed report. API
  only allows data to

  be pulled for 1 month or less and no older than 13 months.'
