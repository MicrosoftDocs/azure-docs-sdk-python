uid: azure.mgmt.costmanagement.models.FilterItems
name: FilterItems
fullName: azure.mgmt.costmanagement.models.FilterItems
module: azure.mgmt.costmanagement.models
summary: 'Will contain the filter name and value to operate on. This is currently
  only supported for

  Export Definition type of ReservationRecommendations.'
constructor:
  syntax: 'FilterItems(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the filter. This is currently only supported for Export
    Definition type

    of ReservationRecommendations. Supported names are [''ReservationScope'', ''LookBackPeriod'',

    ''ResourceType'']. Known values are: "ReservationScope", "ResourceType", and "LookBackPeriod".'
  name: name
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.FilterItemNames>
- description: 'Value to filter by. Currently values supported per name are, for

    ''ReservationScope'' supported values are [''Single'', ''Shared''], for ''LookBackPeriod''
    supported

    values are [''Last7Days'', ''Last30Days'', ''Last60Days''] and for ''ResourceType''
    supported values

    are [''VirtualMachines'', ''SQLDatabases'', ''PostgreSQL'', ''ManagedDisk'', ''MySQL'',
    ''RedHat'',

    ''MariaDB'', ''RedisCache'', ''CosmosDB'', ''SqlDataWarehouse'', ''SUSELinux'',
    ''AppService'',

    ''BlockBlob'', ''AzureDataExplorer'', ''VMwareCloudSimple''].'
  name: value
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.costmanagement.models.FilterItems.name
  name: name
  summary: 'The name of the filter. This is currently only supported for Export Definition
    type of

    ReservationRecommendations. Supported names are [''ReservationScope'', ''LookBackPeriod'',

    ''ResourceType'']. Known values are: "ReservationScope", "ResourceType", and

    "LookBackPeriod".'
  signature: 'name: str | _models.FilterItemNames | None'
- uid: azure.mgmt.costmanagement.models.FilterItems.value
  name: value
  summary: 'Value to filter by. Currently values supported per name are, for ''ReservationScope''
    supported

    values are [''Single'', ''Shared''], for ''LookBackPeriod'' supported values are
    [''Last7Days'',

    ''Last30Days'', ''Last60Days''] and for ''ResourceType'' supported values are
    [''VirtualMachines'',

    ''SQLDatabases'', ''PostgreSQL'', ''ManagedDisk'', ''MySQL'', ''RedHat'', ''MariaDB'',
    ''RedisCache'',

    ''CosmosDB'', ''SqlDataWarehouse'', ''SUSELinux'', ''AppService'', ''BlockBlob'',
    ''AzureDataExplorer'',

    ''VMwareCloudSimple''].'
  signature: 'value: str | None'
