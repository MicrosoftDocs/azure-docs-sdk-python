### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.Notification
name: Notification
fullName: azure.mgmt.costmanagement.models.Notification
module: azure.mgmt.costmanagement.models
summary: 'The notification associated with a budget.


  Supported for CategoryType(s): Cost, ReservationUtilization.'
constructor:
  syntax: 'Notification(*args: Any, **kwargs: Any)'
variables:
- description: 'The notification is enabled or not.


    Supported for CategoryType(s): Cost, ReservationUtilization. Required.'
  name: enabled
  types:
  - <xref:bool>
- description: "The comparison operator. Supported for CategoryType(s): Cost,\nReservationUtilization.\
    \ Supported operators for **CategoryType: Cost**\n\n* GreaterThan \n\n* GreaterThanOrEqualTo\
    \ \n\nSupported operators for **CategoryType: ReservationUtilization**\n\n* LessThan.\
    \ Required. Known values are: \"EqualTo\", \"GreaterThan\", \"GreaterThanOrEqualTo\"\
    , and \"LessThan\"."
  name: operator
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.BudgetNotificationOperatorType>
- description: 'Threshold value associated with a notification. It is always percent
    with a

    maximum of 2 decimal places.


    Supported for CategoryType(s): Cost, ReservationUtilization.


    **CategoryType: Cost** - Must be between 0 and 1000. Notification is sent when
    the cost

    exceeded the threshold.


    **CategoryType: ReservationUtilization** - Must be between 0 and 100. Notification
    is sent when

    a reservation has a utilization percentage below the threshold. Required.'
  name: threshold
  types:
  - <xref:float>
- description: 'Frequency of a notification. Represents how long the notification
    will be

    silent after triggering an alert for a threshold breach. If not specified, the
    frequency will

    be set by default based on the timeGrain (Weekly when timeGrain: Last7Days, Monthly
    when

    timeGrain: Last30Days).


    Supported for CategoryType(s): ReservationUtilization. Known values are: "Daily",
    "Weekly", and

    "Monthly".'
  name: frequency
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.Frequency>
- description: 'Email addresses to send the notification to when the threshold is

    breached. Must have at least one contact email or contact group specified at the
    Subscription

    or Resource Group scopes. All other scopes must have at least one contact email
    specified.


    Supported for CategoryType(s): Cost, ReservationUtilization. Required.'
  name: contact_emails
  types:
  - <xref:list>[<xref:str>]
- description: 'Subscription or Resource Group scopes only. Contact roles to send
    the

    notification to when the threshold is breached.


    Supported for CategoryType(s): Cost.'
  name: contact_roles
  types:
  - <xref:list>[<xref:str>]
- description: 'Subscription or Resource Group scopes only. Action groups to send
    the

    notification to when the threshold is exceeded. Must be provided as a fully qualified
    Azure

    resource id.


    Supported for CategoryType(s): Cost.'
  name: contact_groups
  types:
  - <xref:list>[<xref:str>]
- description: 'The type of threshold.


    Supported for CategoryType(s): Cost. Known values are: "Actual" and "Forecasted".'
  name: threshold_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.ThresholdType>
- description: 'Language in which the recipient will receive the notification,


    Supported for CategoryType(s): Cost, ReservationUtilization. Known values are:
    "en-us",

    "ja-jp", "zh-cn", "de-de", "es-es", "fr-fr", "it-it", "ko-kr", "pt-br", "ru-ru",
    "zh-tw",

    "cs-cz", "pl-pl", "tr-tr", "da-dk", "en-gb", "hu-hu", "nb-no", "nl-nl", "pt-pt",
    and "sv-se".'
  name: locale
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.CultureCode>
