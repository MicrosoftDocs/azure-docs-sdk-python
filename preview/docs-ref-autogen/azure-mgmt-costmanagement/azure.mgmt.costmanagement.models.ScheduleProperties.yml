### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.ScheduleProperties
name: ScheduleProperties
fullName: azure.mgmt.costmanagement.models.ScheduleProperties
module: azure.mgmt.costmanagement.models
summary: The properties of the schedule.
constructor:
  syntax: 'ScheduleProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Frequency of the schedule. Required. Known values are: "Daily", "Weekly",
    and

    "Monthly".'
  name: frequency
  types:
  - <xref:str>
  - <xref:azure.mgmt.costmanagement.models.ScheduleFrequency>
- description: UTC time at which cost analysis data will be emailed.
  name: hour_of_day
  types:
  - <xref:int>
- description: 'Day names in english on which cost analysis data will be emailed.
    This

    property is applicable when frequency is Weekly or Monthly.'
  name: days_of_week
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.mgmt.costmanagement.models.DaysOfWeek>]
- description: 'Weeks in which cost analysis data will be emailed. This property is

    applicable when frequency is Monthly and used in combination with daysOfWeek.'
  name: weeks_of_month
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.mgmt.costmanagement.models.WeeksOfMonth>]
- description: 'UTC day on which cost analysis data will be emailed. Must be between
    1 and

    31. This property is applicable when frequency is Monthly and overrides weeksOfMonth
    or

    daysOfWeek.'
  name: day_of_month
  types:
  - <xref:int>
- description: The start date and time of the scheduled action (UTC). Required.
  name: start_date
  types:
  - <xref:datetime.datetime>
- description: The end date and time of the scheduled action (UTC). Required.
  name: end_date
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.costmanagement.models.ScheduleProperties.day_of_month
  name: day_of_month
  summary: 'UTC day on which cost analysis data will be emailed. Must be between 1
    and 31. This property is

    applicable when frequency is Monthly and overrides weeksOfMonth or daysOfWeek.'
  signature: 'day_of_month: int | None'
- uid: azure.mgmt.costmanagement.models.ScheduleProperties.days_of_week
  name: days_of_week
  summary: 'Day names in english on which cost analysis data will be emailed. This
    property is applicable

    when frequency is Weekly or Monthly.'
  signature: 'days_of_week: list[typing.Union[str, ForwardRef(''_models.DaysOfWeek'')]]
    | None'
- uid: azure.mgmt.costmanagement.models.ScheduleProperties.end_date
  name: end_date
  summary: The end date and time of the scheduled action (UTC). Required.
  signature: 'end_date: datetime'
- uid: azure.mgmt.costmanagement.models.ScheduleProperties.frequency
  name: frequency
  summary: '"Daily", "Weekly", and "Monthly".'
  signature: 'frequency: str | _models.ScheduleFrequency'
- uid: azure.mgmt.costmanagement.models.ScheduleProperties.hour_of_day
  name: hour_of_day
  summary: UTC time at which cost analysis data will be emailed.
  signature: 'hour_of_day: int | None'
- uid: azure.mgmt.costmanagement.models.ScheduleProperties.start_date
  name: start_date
  summary: The start date and time of the scheduled action (UTC). Required.
  signature: 'start_date: datetime'
- uid: azure.mgmt.costmanagement.models.ScheduleProperties.weeks_of_month
  name: weeks_of_month
  summary: 'Weeks in which cost analysis data will be emailed. This property is applicable
    when frequency

    is Monthly and used in combination with daysOfWeek.'
  signature: 'weeks_of_month: list[typing.Union[str, ForwardRef(''_models.WeeksOfMonth'')]]
    | None'
