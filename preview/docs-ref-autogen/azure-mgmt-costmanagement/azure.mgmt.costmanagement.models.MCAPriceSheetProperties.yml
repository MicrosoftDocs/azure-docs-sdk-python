### YamlMime:PythonClass
uid: azure.mgmt.costmanagement.models.MCAPriceSheetProperties
name: MCAPriceSheetProperties
fullName: azure.mgmt.costmanagement.models.MCAPriceSheetProperties
module: azure.mgmt.costmanagement.models
summary: The properties of the price sheet.
constructor:
  syntax: 'MCAPriceSheetProperties(*args: Any, **kwargs: Any)'
variables:
- description: Unique identifier for the billing account.
  name: billing_account_id
  types:
  - <xref:str>
- description: 'Name of the billing profile that is set up to receive invoices. The

    prices in the price sheet are associated with this billing profile.'
  name: billing_account_name
  types:
  - <xref:str>
- description: Unique identifier for the billing profile.
  name: billing_profile_id
  types:
  - <xref:str>
- description: 'Name of the billing profile that is set up to receive invoices. The

    prices in the price sheet are associated with this billing profile.'
  name: billing_profile_name
  types:
  - <xref:str>
- description: 'Name of the purchased product plan. Indicates if this pricing is

    standard Azure Plan pricing, Dev/Test pricing etc.


    Currently unavailable for Azure 3rd party and ReservedInstance meters.'
  name: product_order_name
  types:
  - <xref:str>
- description: Type of Azure service. For example, Compute, Analytics, and Security.
  name: service_family
  types:
  - <xref:float>
- description: Name of the product accruing the charges.
  name: product
  types:
  - <xref:str>
- description: Unique identifier for the product whose meter is consumed.
  name: product_id
  types:
  - <xref:str>
- description: Unique identifier of the SKU.
  name: sku_id
  types:
  - <xref:str>
- description: How usage is measured for the service.
  name: unit_of_measure
  types:
  - <xref:str>
- description: Unique identifier of the meter.
  name: meter_id
  types:
  - <xref:str>
- description: 'Name of the meter. The meter represents the deployable resource of
    an Azure

    service.'
  name: meter_name
  types:
  - <xref:str>
- description: Name of the meter type.
  name: meter_type
  types:
  - <xref:str>
- description: 'Name of the classification category for the meter. For example, Cloud

    services, Networking, etc.'
  name: meter_category
  types:
  - <xref:str>
- description: Name of the meter subclassification category.
  name: meter_sub_category
  types:
  - <xref:str>
- description: Name of the Azure region where the meter for the service is available.
  name: meter_region
  types:
  - <xref:str>
- description: 'Defines the lower bound of the tier range for which prices are

    defined. For example, if the range is 0 to 100, tierMinimumUnits would be 0.'
  name: tier_minimum_units
  types:
  - <xref:str>
- description: Effective start date of the Price Sheet billing period.
  name: effective_start_date
  types:
  - <xref:datetime.datetime>
- description: Effective end date of the Price Sheet billing period.
  name: effective_end_date
  types:
  - <xref:datetime.datetime>
- description: 'The per-unit price at the time of billing for a given product or service,

    inclusive of any negotiated discounts on top of the market price.


    For PriceType ReservedInstance, unit price reflects the total cost of the 1 or
    3-year

    commitment including discounts.


    Note: The unit price isn''t the same as the effective price in usage details downloads
    when

    services have differential prices across tiers.


    If services have multi-tiered pricing, the effective price is a blended rate across
    the tiers

    and doesn''t show a tier-specific unit price. The blended price or effective price
    is the net

    price for the consumed quantity spanning across the multiple tiers (where each
    tier has a

    specific unit price).'
  name: unit_price
  types:
  - <xref:str>
- description: 'The unit price at the time the customer signs on or the unit price
    at the

    time of service meter GA launch if it is after sign-on.


    This is applicable for Enterprise Agreement users.'
  name: base_price
  types:
  - <xref:str>
- description: 'The current list price for a given product or service. This price
    is

    without any negotiations and is based on your Microsoft Agreement type.


    For PriceType Consumption, market price is reflected as the pay-as-you-go price.


    For PriceType Savings Plan, market price reflects the Savings plan benefit on
    top of

    pay-as-you-go price for the corresponding commitment term.


    For PriceType ReservedInstance, market price reflects the total price of the 1
    or 3-year

    commitment.'
  name: market_price
  types:
  - <xref:str>
- description: Currency in which all the prices are reflected.
  name: currency
  types:
  - <xref:str>
- description: Currency in which charges are posted.
  name: billing_currency
  types:
  - <xref:str>
- description: "Term length for Azure Savings Plan or Reservation term \u2013 one\
    \ year or three years\n(P1Y or P3Y)."
  name: term
  types:
  - <xref:str>
- description: 'Price type for a product. For example, an Azure resource with a pay-as-you-go

    rate with priceType as Consumption. Other price types include ReservedInstance
    and Savings

    Plan.'
  name: price_type
  types:
  - <xref:str>
