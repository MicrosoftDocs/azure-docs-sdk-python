  name: date_range
  summary: Date range of the current view.
  signature: 'date_range: str | None'
- uid: azure.mgmt.costmanagement.models.ViewProperties.display_name
  name: display_name
  summary: User input name of the view. Required.
  signature: 'display_name: str | None'
