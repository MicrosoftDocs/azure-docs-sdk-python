  name: kpis
  summary: List of KPIs to show in Cost Analysis UI.
  signature: 'kpis: list[''_models.KpiProperties''] | None'
- uid: azure.mgmt.costmanagement.models.ViewProperties.metric
  name: metric
  summary: '"ActualCost", "AmortizedCost", and

    "AHUB".'
  signature: 'metric: str | _models.MetricType | None'
- uid: azure.mgmt.costmanagement.models.ViewProperties.modified_on
  name: modified_on
  summary: Date when the user last modified this view.
  signature: 'modified_on: datetime | None'
- uid: azure.mgmt.costmanagement.models.ViewProperties.pivots
  name: pivots
  summary: Configuration of 3 sub-views in the Cost Analysis UI.
  signature: 'pivots: list[''_models.PivotProperties''] | None'
- uid: azure.mgmt.costmanagement.models.ViewProperties.query
  name: query
  summary: Query body configuration. Required.
  signature: 'query: _models.ReportConfigDefinition | None'
