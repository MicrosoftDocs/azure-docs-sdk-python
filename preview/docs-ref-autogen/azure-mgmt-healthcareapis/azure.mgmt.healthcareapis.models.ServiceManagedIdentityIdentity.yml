### YamlMime:PythonClass
uid: azure.mgmt.healthcareapis.models.ServiceManagedIdentityIdentity
name: ServiceManagedIdentityIdentity
fullName: azure.mgmt.healthcareapis.models.ServiceManagedIdentityIdentity
module: azure.mgmt.healthcareapis.models
summary: Setting indicating whether the service has a managed identity associated
  with it.
constructor:
  syntax: 'ServiceManagedIdentityIdentity(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of identity being specified, currently SystemAssigned and None
    are allowed.

    Required. Known values are: "None", "SystemAssigned", "UserAssigned", and

    "SystemAssigned,UserAssigned".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.healthcareapis.models.ServiceManagedIdentityType>
- description: 'The service principal ID of the system assigned identity. This property

    will only be provided for a system assigned identity.'
  name: principal_id
  types:
  - <xref:str>
- description: 'The tenant ID of the system assigned identity. This property will
    only be

    provided for a system assigned identity.'
  name: tenant_id
  types:
  - <xref:str>
- description: 'The set of user assigned identities associated with the

    resource. The userAssignedIdentities dictionary keys will be ARM resource ids
    in the form:

    ''/subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/{identityName}.

    The dictionary values can be empty objects ({}) in requests.'
  name: user_assigned_identities
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.healthcareapis.models.UserAssignedIdentity>]
attributes:
- uid: azure.mgmt.healthcareapis.models.ServiceManagedIdentityIdentity.principal_id
  name: principal_id
  summary: 'The service principal ID of the system assigned identity. This property
    will only be provided

    for a system assigned identity.'
  signature: 'principal_id: str | None'
- uid: azure.mgmt.healthcareapis.models.ServiceManagedIdentityIdentity.tenant_id
  name: tenant_id
  summary: 'The tenant ID of the system assigned identity. This property will only
    be provided for a system

    assigned identity.'
  signature: 'tenant_id: str | None'
- uid: azure.mgmt.healthcareapis.models.ServiceManagedIdentityIdentity.type
  name: type
  summary: 'Type of identity being specified, currently SystemAssigned and None are
    allowed. Required.

    Known values are: "None", "SystemAssigned", "UserAssigned", and

    "SystemAssigned,UserAssigned".'
  signature: 'type: str | _models.ServiceManagedIdentityType'
- uid: azure.mgmt.healthcareapis.models.ServiceManagedIdentityIdentity.user_assigned_identities
  name: user_assigned_identities
  summary: 'The set of user assigned identities associated with the resource. The
