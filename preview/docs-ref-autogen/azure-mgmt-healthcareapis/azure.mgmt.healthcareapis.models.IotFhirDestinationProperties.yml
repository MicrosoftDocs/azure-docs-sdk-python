    Required.'
  name: fhir_service_resource_id
  types:
  - <xref:str>
- description: FHIR Mappings. Required.
  name: fhir_mapping
  types:
  - <xref:azure.mgmt.healthcareapis.models.IotMappingProperties>
attributes:
- uid: azure.mgmt.healthcareapis.models.IotFhirDestinationProperties.fhir_mapping
  name: fhir_mapping
  summary: FHIR Mappings. Required.
  signature: 'fhir_mapping: _models.IotMappingProperties'
- uid: azure.mgmt.healthcareapis.models.IotFhirDestinationProperties.fhir_service_resource_id
  name: fhir_service_resource_id
  summary: Fully qualified resource id of the FHIR service to connect to. Required.
  signature: 'fhir_service_resource_id: str'
- uid: azure.mgmt.healthcareapis.models.IotFhirDestinationProperties.resource_identity_resolution_type
  name: resource_identity_resolution_type
