uid: azure.mgmt.postgresqlflexibleservers.models.Replica
name: Replica
fullName: azure.mgmt.postgresqlflexibleservers.models.Replica
module: azure.mgmt.postgresqlflexibleservers.models
summary: Replica properties of a server.
constructor:
  syntax: 'Replica(*args: Any, **kwargs: Any)'
variables:
- description: 'Role of the server in a replication set. Known values are: "None",
    "Primary",

    "AsyncReplica", and "GeoAsyncReplica".'
  name: role
  types:
  - <xref:str>
  - <xref:azure.mgmt.postgresqlflexibleservers.models.ReplicationRole>
- description: Maximum number of read replicas allowed for a server.
  name: capacity
  types:
  - <xref:int>
- description: 'Indicates the replication state of a read replica. This property is

    returned only when the target server is a read replica. Possible  values are Active,
    Broken,

    Catchup, Provisioning, Reconfiguring, and Updating. Known values are: "Active",
    "Catchup",

    "Provisioning", "Updating", "Broken", and "Reconfiguring".'
  name: replication_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.postgresqlflexibleservers.models.ReplicationState>
- description: 'Type of operation to apply on the read replica. This property is write

    only. Standalone means that the read replica will be promoted to a standalone
    server, and will

    become a completely independent entity from the replication set. Switchover means
    that the read

    replica will roles with the primary server. Known values are: "Standalone" and
    "Switchover".'
  name: promote_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.postgresqlflexibleservers.models.ReadReplicaPromoteMode>
- description: 'Data synchronization option to use when processing the operation

    specified in the promoteMode property. This property is write only. Known values
    are: "Planned"

    and "Forced".'
  name: promote_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.postgresqlflexibleservers.models.ReadReplicaPromoteOption>
