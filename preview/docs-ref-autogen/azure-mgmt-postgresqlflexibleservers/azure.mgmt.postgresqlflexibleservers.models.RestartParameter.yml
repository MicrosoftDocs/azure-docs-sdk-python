constructor:
  syntax: 'RestartParameter(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates if restart the PostgreSQL database engine should

    failover or switch over from primary to standby. This only works if server has
    high

    availability enabled.'
  name: restart_with_failover
  types:
  - <xref:bool>
- description: 'Failover mode. Known values are: "PlannedFailover", "ForcedFailover",

    "PlannedSwitchover", and "ForcedSwitchover".'
  name: failover_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.postgresqlflexibleservers.models.FailoverMode>
attributes:
- uid: azure.mgmt.postgresqlflexibleservers.models.RestartParameter.failover_mode
  name: failover_mode
  summary: '"PlannedFailover", "ForcedFailover",

    "PlannedSwitchover", and "ForcedSwitchover".'
  signature: 'failover_mode: str | _models.FailoverMode | None'
- uid: azure.mgmt.postgresqlflexibleservers.models.RestartParameter.restart_with_failover
  name: restart_with_failover
  summary: 'Indicates if restart the PostgreSQL database engine should failover or
    switch over from primary

    to standby. This only works if server has high availability enabled.'
  signature: 'restart_with_failover: bool | None'
