  signature: 'source_db_server_resource_id: str | None'
- uid: azure.mgmt.postgresqlflexibleservers.models.MigrationPropertiesForPatch.start_data_migration
  name: start_data_migration
  summary: '"True" and "False".'
  signature: 'start_data_migration: str | _models.StartDataMigration | None'
- uid: azure.mgmt.postgresqlflexibleservers.models.MigrationPropertiesForPatch.target_db_server_fully_qualified_domain_name
  name: target_db_server_fully_qualified_domain_name
  summary: 'Fully qualified domain name (FQDN) or IP address of the target server.
    This property is

