  name: migration_mode
  summary: '"Offline" and

    "Online".'
  signature: 'migration_mode: str | _models.MigrationMode | None'
- uid: azure.mgmt.postgresqlflexibleservers.models.MigrationPropertiesForPatch.migration_window_start_time_in_utc
  name: migration_window_start_time_in_utc
  summary: Start time (UTC) for migration window.
  signature: 'migration_window_start_time_in_utc: datetime | None'
- uid: azure.mgmt.postgresqlflexibleservers.models.MigrationPropertiesForPatch.overwrite_dbs_in_target
  name: overwrite_dbs_in_target
  summary: 'Indicates if databases on the target server can be overwritten when already
    present. If set to

    ''False'', when the migration workflow detects that the database already exists
