- uid: azure.mgmt.postgresqlflexibleservers.models.MigrationPropertiesForPatch.secret_parameters
  name: secret_parameters
  summary: Migration secret parameters.
  signature: 'secret_parameters: _models.MigrationSecretParametersForPatch | None'
- uid: azure.mgmt.postgresqlflexibleservers.models.MigrationPropertiesForPatch.setup_logical_replication_on_source_db_if_needed
  name: setup_logical_replication_on_source_db_if_needed
  summary: 'Indicates whether to setup logical replication on source server, if needed.
    Known values are:

    "True" and "False".'
  signature: 'setup_logical_replication_on_source_db_if_needed: str | _models.LogicalReplicationOnSourceServer
