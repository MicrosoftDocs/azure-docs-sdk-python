### YamlMime:PythonClass
uid: azure.ai.agentserver.optimization.OptimizationConfig
name: OptimizationConfig
fullName: azure.ai.agentserver.optimization.OptimizationConfig
module: azure.ai.agentserver.optimization
summary: 'Resolved optimization config.


  When not running under optimization, fields are `None` unless a

  local config directory (baseline) supplies values.'
constructor:
  syntax: 'OptimizationConfig(*, instructions: str | None = None, model: str | None
    = None, temperature: float | None = None, skills: list[azure.ai.agentserver.optimization._models.Skill]
    | None = None, skills_dir: str | None = None, tool_definitions: list[dict] | None
    = None, source: str = ''defaults'', candidate_id: str | None = None)'
  keywordOnlyParameters:
  - name: instructions
    defaultValue: None
  - name: model
    defaultValue: None
  - name: temperature
    defaultValue: None
  - name: skills
    defaultValue: None
  - name: skills_dir
    defaultValue: None
  - name: tool_definitions
    defaultValue: None
  - name: source
    defaultValue: defaults
  - name: candidate_id
    defaultValue: None
methods:
- uid: azure.ai.agentserver.optimization.OptimizationConfig.apply_tool_descriptions
  name: apply_tool_descriptions
  summary: 'Apply optimized tool definitions to a list of tool functions.


    For each tool function whose name matches a definition in

    <xref:tool_definitions>, patches `__doc__` and `.description`

    with the optimized description, and patches parameter descriptions

    on the `input_model` if present.'
  signature: 'apply_tool_descriptions(tools: list) -> list'
  parameters:
  - name: tools
    description: List of @tool-decorated functions.
    isRequired: true
    types:
    - <xref:list>
  return:
    description: The same list of tools (mutated in place).
    types:
    - <xref:list>
- uid: azure.ai.agentserver.optimization.OptimizationConfig.compose_instructions
  name: compose_instructions
  summary: Return instructions with skill catalog appended (if any).
  signature: compose_instructions() -> str
  return:
    description: Instructions text with skills appended.
    types:
    - <xref:str>
attributes:
- uid: azure.ai.agentserver.optimization.OptimizationConfig.has_skills
  name: has_skills
  summary: Whether this config carries any skill data.
  return:
    types:
    - <xref:bool>
- uid: azure.ai.agentserver.optimization.OptimizationConfig.BASELINE_DIR
  name: BASELINE_DIR
  signature: 'BASELINE_DIR: ClassVar[str] = ''baseline'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.DEFAULT_LOCAL_DIR
  name: DEFAULT_LOCAL_DIR
  signature: 'DEFAULT_LOCAL_DIR: ClassVar[str] = ''.agent_configs'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.ENV_CANDIDATE_ID
  name: ENV_CANDIDATE_ID
  signature: 'ENV_CANDIDATE_ID: ClassVar[str] = ''OPTIMIZATION_CANDIDATE_ID'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.ENV_CONFIG
  name: ENV_CONFIG
  signature: 'ENV_CONFIG: ClassVar[str] = ''OPTIMIZATION_CONFIG'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.ENV_LOCAL_DIR
  name: ENV_LOCAL_DIR
  signature: 'ENV_LOCAL_DIR: ClassVar[str] = ''OPTIMIZATION_LOCAL_DIR'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.ENV_RESOLVE_ENDPOINT
  name: ENV_RESOLVE_ENDPOINT
  signature: 'ENV_RESOLVE_ENDPOINT: ClassVar[str] = ''OPTIMIZATION_RESOLVE_ENDPOINT'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.INSTRUCTIONS_FILE
  name: INSTRUCTIONS_FILE
  signature: 'INSTRUCTIONS_FILE: ClassVar[str] = ''instructions.md'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.METADATA_FILE
  name: METADATA_FILE
  signature: 'METADATA_FILE: ClassVar[str] = ''metadata.yaml'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.SKILLS_DIR
  name: SKILLS_DIR
  signature: 'SKILLS_DIR: ClassVar[str] = ''skills'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.SKILL_FILE
  name: SKILL_FILE
  signature: 'SKILL_FILE: ClassVar[str] = ''SKILL.md'''
- uid: azure.ai.agentserver.optimization.OptimizationConfig.TOOLS_FILE
  name: TOOLS_FILE
  signature: 'TOOLS_FILE: ClassVar[str] = ''tools.json'''
