  name: option
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiffDiskOptions>
- description: 'Specifies the ephemeral disk placement for operating system disk.
    Possible

    values are: CacheDisk, ResourceDisk, NvmeDisk. The defaulting behavior is: CacheDisk
    if one is

    configured for the VM size otherwise ResourceDisk or NvmeDisk is used. Minimum
    api-version for

    NvmeDisk: 2024-03-01. Known values are: "CacheDisk", "ResourceDisk", and "NvmeDisk".'
  name: placement
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiffDiskPlacement>
attributes:
