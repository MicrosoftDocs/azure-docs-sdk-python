name: DiffDiskSettings
fullName: azure.mgmt.computebulkactions.models.DiffDiskSettings
module: azure.mgmt.computebulkactions.models
summary: 'Describes the parameters of ephemeral disk settings that can be specified
  for operating system

  disk. Note: The ephemeral disk settings can only be specified for managed disk.'
constructor:
  syntax: 'DiffDiskSettings(*args: Any, **kwargs: Any)'
variables:
