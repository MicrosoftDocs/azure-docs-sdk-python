### YamlMime:PythonClass
uid: azure.mgmt.computebulkactions.models.OSDisk
name: OSDisk
fullName: azure.mgmt.computebulkactions.models.OSDisk
module: azure.mgmt.computebulkactions.models
summary: 'Specifies information about the operating system disk used by the virtual
  machine. For more

  information about disks, see [About disks and VHDs for Azure virtual machines](https://docs.microsoft.com/azure/virtual-machines/managed-disks-overview).'
constructor:
  syntax: 'OSDisk(*args: Any, **kwargs: Any)'
variables:
- description: 'This property allows you to specify the type of the OS that is included
    in the

    disk if creating a VM from user-image or a specialized VHD. Possible values are:
    Windows,

    Linux. Known values are: "Windows" and "Linux".'
  name: os_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.OperatingSystemTypes>
- description: 'Specifies the encryption settings for the OS Disk. Minimum compute

    api-version: 2015-06-15.'
  name: encryption_settings
  types:
  - <xref:azure.mgmt.computebulkactions.models.DiskEncryptionSettings>
- description: The disk name.
  name: name
  types:
  - <xref:str>
- description: The virtual hard disk.
  name: vhd
  types:
  - <xref:azure.mgmt.computebulkactions.models.VirtualHardDisk>
- description: 'The source user image virtual hard disk. The virtual hard disk will
    be copied

    before being attached to the virtual machine. If SourceImage is provided, the
    destination

    virtual hard drive must not exist.'
  name: image
  types:
  - <xref:azure.mgmt.computebulkactions.models.VirtualHardDisk>
- description: 'Specifies the caching requirements. Possible values are: None, ReadOnly,

    ReadWrite. The defaulting behavior is: None for Standard storage. ReadOnly for
    Premium storage.

    Known values are: "None", "ReadOnly", and "ReadWrite".'
  name: caching
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.CachingTypes>
- description: 'Specifies whether writeAccelerator should be enabled or

    disabled on the disk.'
  name: write_accelerator_enabled
  types:
  - <xref:bool>
- description: 'Specifies the ephemeral Disk Settings for the operating system disk

    used by the virtual machine.'
  name: diff_disk_settings
  types:
  - <xref:azure.mgmt.computebulkactions.models.DiffDiskSettings>
- description: 'Specifies how the virtual machine disk should be created. Possible
    values

    are Attach, FromImage. If you are using a platform image, you should also use
    the

    imageReference element described above. If you are using a marketplace image,
    you should also

    use the plan element previously described. Required. Known values are: "FromImage",
    "Empty",

    "Attach", "Copy", and "Restore".'
  name: create_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiskCreateOptionTypes>
- description: 'Specifies the size of an empty data disk in gigabytes. This element
    can be

    used to overwrite the size of the disk in a virtual machine image. The property
    ''diskSizeGB'' is

    the number of bytes x 1024^3 for the disk and the value cannot be larger than
    1023.'
  name: disk_size_gb
  types:
  - <xref:int>
- description: The managed disk parameters.
  name: managed_disk
  types:
  - <xref:azure.mgmt.computebulkactions.models.ManagedDiskParameters>
- description: 'Specifies whether OS Disk should be deleted or detached upon VM deletion.

    Possible values are: Delete, Detach. The default value is set to Detach. For an
    ephemeral OS

    Disk, the default value is set to Delete. The user cannot change the delete option
    for an

    ephemeral OS Disk. Known values are: "Delete" and "Detach".'
  name: delete_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiskDeleteOptionTypes>
attributes:
- uid: azure.mgmt.computebulkactions.models.OSDisk.caching
  name: caching
  summary: 'None, ReadOnly, ReadWrite. The

    defaulting behavior is: None for Standard storage. ReadOnly for Premium storage.
    Known values

    are: "None", "ReadOnly", and "ReadWrite".'
  signature: 'caching: str | _models.CachingTypes | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.create_option
  name: create_option
  summary: 'Specifies how the virtual machine disk should be created. Possible values
    are Attach,

    FromImage. If you are using a platform image, you should also use the imageReference
    element

    described above. If you are using a marketplace image, you should also use the
    plan element

    previously described. Required. Known values are: "FromImage", "Empty", "Attach",

    "Copy", and "Restore".'
  signature: 'create_option: str | _models.DiskCreateOptionTypes'
- uid: azure.mgmt.computebulkactions.models.OSDisk.delete_option
  name: delete_option
  summary: 'Specifies whether OS Disk should be deleted or detached upon VM deletion.
    Possible values are:

    Delete, Detach. The default value is set to Detach. For an ephemeral OS Disk,
    the default value

    is set to Delete. The user cannot change the delete option for an ephemeral OS
    Disk. Known

    values are: "Delete" and "Detach".'
  signature: 'delete_option: str | _models.DiskDeleteOptionTypes | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.diff_disk_settings
  name: diff_disk_settings
  summary: 'Specifies the ephemeral Disk Settings for the operating system disk used
    by the virtual

    machine.'
  signature: 'diff_disk_settings: _models.DiffDiskSettings | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.disk_size_gb
  name: disk_size_gb
  summary: 'Specifies the size of an empty data disk in gigabytes. This element can
    be used to overwrite

    the size of the disk in a virtual machine image. The property ''diskSizeGB'' is
    the number of

    bytes x 1024^3 for the disk and the value cannot be larger than 1023.'
  signature: 'disk_size_gb: int | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.encryption_settings
  name: encryption_settings
  summary: 2015-06-15.
  signature: 'encryption_settings: _models.DiskEncryptionSettings | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.image
  name: image
  summary: 'The source user image virtual hard disk. The virtual hard disk will be
    copied before being

    attached to the virtual machine. If SourceImage is provided, the destination virtual
    hard drive

    must not exist.'
  signature: 'image: _models.VirtualHardDisk | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.managed_disk
  name: managed_disk
  summary: The managed disk parameters.
  signature: 'managed_disk: _models.ManagedDiskParameters | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.name
  name: name
  summary: The disk name.
  signature: 'name: str | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.os_type
  name: os_type
  summary: 'This property allows you to specify the type of the OS that is included
    in the disk if creating

    a VM from user-image or a specialized VHD. Possible values are: Windows, Linux.
    Known values

    are: "Windows" and "Linux".'
  signature: 'os_type: str | _models.OperatingSystemTypes | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.vhd
  name: vhd
  summary: The virtual hard disk.
  signature: 'vhd: _models.VirtualHardDisk | None'
- uid: azure.mgmt.computebulkactions.models.OSDisk.write_accelerator_enabled
  name: write_accelerator_enabled
  summary: Specifies whether writeAccelerator should be enabled or disabled on the
    disk.
  signature: 'write_accelerator_enabled: bool | None'
