uid: azure.mgmt.computebulkactions.models.VMAttributes
name: VMAttributes
fullName: azure.mgmt.computebulkactions.models.VMAttributes
module: azure.mgmt.computebulkactions.models
summary: VMAttributes that will be used to filter VMSizes which will be used to launch
  instances.
constructor:
  syntax: 'VMAttributes(*args: Any, **kwargs: Any)'
variables:
- description: 'The range of vCpuCount specified from Min to Max. Must be specified
    if

    VMAttributes are specified, either Min or Max is required if specified. Required.'
