uid: azure.mgmt.computebulkactions.models.VirtualMachineProfile
name: VirtualMachineProfile
fullName: azure.mgmt.computebulkactions.models.VirtualMachineProfile
module: azure.mgmt.computebulkactions.models
summary: Describes the properties of a Virtual Machine.
constructor:
  syntax: 'VirtualMachineProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies Redeploy, Reboot and

    ScheduledEventsAdditionalPublishingTargets Scheduled Event related configurations
    for the

    virtual machine.'
  name: scheduled_events_policy
  types:
  - <xref:azure.mgmt.computebulkactions.models.ScheduledEventsPolicy>
- description: Specifies the storage settings for the virtual machine disks.
  name: storage_profile
  types:
  - <xref:azure.mgmt.computebulkactions.models.StorageProfile>
- description: 'Specifies additional capabilities enabled or disabled on the

    virtual machine.'
  name: additional_capabilities
  types:
  - <xref:azure.mgmt.computebulkactions.models.AdditionalCapabilities>
- description: 'Specifies the operating system settings used while creating the virtual

    machine. Some of the settings cannot be changed once VM is provisioned.'
  name: os_profile
  types:
  - <xref:azure.mgmt.computebulkactions.models.OSProfile>
- description: Specifies the network interfaces of the virtual machine.
  name: network_profile
  types:
  - <xref:azure.mgmt.computebulkactions.models.NetworkProfile>
- description: 'Specifies the Security related profile settings for the virtual

    machine.'
  name: security_profile
  types:
  - <xref:azure.mgmt.computebulkactions.models.SecurityProfile>
- description: 'Specifies the boot diagnostic settings state. Minimum compute

    api-version: 2015-06-15.'
  name: diagnostics_profile
  types:
  - <xref:azure.mgmt.computebulkactions.models.DiagnosticsProfile>
- description: 'Specifies that the image or disk that is being used was licensed

    on-premises. <br><br> Possible values for Windows Server operating system are:
    <br><br>

    Windows_Client <br><br> Windows_Server <br><br> Possible values for Linux Server
    operating

    system are: <br><br> RHEL_BYOS (for RHEL) <br><br> SLES_BYOS (for SUSE) <br><br>
    For more

    information, see [Azure Hybrid Use Benefit for Windows Server](https://docs.microsoft.com/azure/virtual-machines/windows/hybrid-use-benefit-licensing)

    <br><br> [Azure Hybrid Use Benefit for Linux Server](https://docs.microsoft.com/azure/virtual-machines/linux/azure-hybrid-benefit-linux)
    <br><br>

    Minimum api-version: 2015-06-15.'
  name: license_type
  types:
  - <xref:str>
- description: 'Specifies the time alloted for all extensions to start. The time

    duration should be between 15 minutes and 120 minutes (inclusive) and should be
    specified in

    ISO 8601 format. The default value is 90 minutes (PT1H30M). Minimum compute api-version:

    2020-06-01.'
  name: extensions_time_budget
  types:
  - <xref:str>
- description: Specifies Scheduled Event related configurations.
  name: scheduled_events_profile
  types:
  - <xref:azure.mgmt.computebulkactions.models.ScheduledEventsProfile>
- description: 'UserData for the VM, which must be base-64 encoded. Customer should
    not pass

    any secrets in here. Minimum compute api-version: 2021-03-01.'
  name: user_data
  types:
  - <xref:str>
- description: 'Specifies information about the capacity reservation that is used

    to allocate virtual machine. Minimum compute api-version: 2021-04-01.'
  name: capacity_reservation
  types:
  - <xref:azure.mgmt.computebulkactions.models.CapacityReservationProfile>
- description: 'Specifies the gallery applications that should be made available to

    the VM.'
  name: application_profile
  types:
  - <xref:azure.mgmt.computebulkactions.models.ApplicationProfile>
