### YamlMime:PythonClass
uid: azure.mgmt.computebulkactions.models.DataDisk
name: DataDisk
fullName: azure.mgmt.computebulkactions.models.DataDisk
module: azure.mgmt.computebulkactions.models
summary: Describes a data disk.
constructor:
  syntax: 'DataDisk(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the logical unit number of the data disk. This value is
    used to identify

    data disks within the VM and therefore must be unique for each data disk attached
    to a VM.

    Required.'
  name: lun
  types:
  - <xref:int>
- description: The disk name.
  name: name
  types:
  - <xref:str>
- description: The virtual hard disk.
  name: vhd
  types:
  - <xref:azure.mgmt.computebulkactions.models.VirtualHardDisk>
- description: 'The source user image virtual hard disk. The virtual hard disk will
    be copied

    before being attached to the virtual machine. If SourceImage is provided, the
    destination

    virtual hard drive must not exist.'
  name: image
  types:
  - <xref:azure.mgmt.computebulkactions.models.VirtualHardDisk>
- description: 'Specifies the caching requirements. Possible values are: None, ReadOnly,

    ReadWrite. The defaulting behavior is: None for Standard storage. ReadOnly for
    Premium storage.

    Known values are: "None", "ReadOnly", and "ReadWrite".'
  name: caching
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.CachingTypes>
- description: 'Specifies whether writeAccelerator should be enabled or

    disabled on the disk.'
  name: write_accelerator_enabled
  types:
  - <xref:bool>
- description: 'Specifies how the virtual machine disk should be created. Possible
    values

    are Attach, FromImage, Empty, Copy, Restore. Required. Known values are: "FromImage",
    "Empty",

    "Attach", "Copy", and "Restore".'
  name: create_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiskCreateOptionTypes>
- description: 'Specifies the size of an empty data disk in gigabytes. This element
    can be

    used to overwrite the size of the disk in a virtual machine image. The property
    ''diskSizeGB'' is

    the number of bytes x 1024^3 for the disk and the value cannot be larger than
    1023.'
  name: disk_size_gb
  types:
  - <xref:int>
- description: The managed disk parameters.
  name: managed_disk
  types:
  - <xref:azure.mgmt.computebulkactions.models.ManagedDiskParameters>
- description: 'The source resource identifier. It can be a snapshot, or disk restore

    point from which to create a disk.'
  name: source_resource
  types:
  - <xref:azure.mgmt.computebulkactions.models.ApiEntityReference>
- description: 'Specifies whether the data disk is in process of detachment from the

    VirtualMachine/VirtualMachineScaleset.'
  name: to_be_detached
  types:
  - <xref:bool>
- description: 'Specifies the detach behavior to be used while detaching a disk or
    which

    is already in the process of detachment from the virtual machine. Supported values:

    ForceDetach. This feature is still in preview. To force-detach a data disk update
    toBeDetached

    to ''true'' along with setting detachOption: ''ForceDetach''. "ForceDetach"'
  name: detach_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiskDetachOptionTypes>
- description: 'Specifies whether data disk should be deleted or detached upon VM

    deletion. Possible values are: Delete, Detach. The default value is set to Detach.
    Known values

    are: "Delete" and "Detach".'
  name: delete_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiskDeleteOptionTypes>
attributes:
- uid: azure.mgmt.computebulkactions.models.DataDisk.caching
  name: caching
  summary: 'None, ReadOnly, ReadWrite. The

