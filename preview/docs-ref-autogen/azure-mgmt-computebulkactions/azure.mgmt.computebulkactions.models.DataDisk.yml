    FromImage, Empty, Copy, Restore. Required. Known values are: "FromImage", "Empty",

    "Attach", "Copy", and "Restore".'
  signature: 'create_option: str | _models.DiskCreateOptionTypes'
- uid: azure.mgmt.computebulkactions.models.DataDisk.delete_option
  name: delete_option
  summary: 'Specifies whether data disk should be deleted or detached upon VM deletion.
    Possible values

    are: Delete, Detach. The default value is set to Detach. Known values are: "Delete"
    and

    "Detach".'
  signature: 'delete_option: str | _models.DiskDeleteOptionTypes | None'
- uid: azure.mgmt.computebulkactions.models.DataDisk.detach_option
  name: detach_option
  summary: 'Specifies the detach behavior to be used while detaching a disk or which
    is already in the

    process of detachment from the virtual machine. Supported values: ForceDetach.
    This feature is

    still in preview. To force-detach a data disk update toBeDetached to ''true''
