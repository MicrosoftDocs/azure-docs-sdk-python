### YamlMime:PythonClass
uid: azure.mgmt.computebulkactions.models.OSProfile
name: OSProfile
fullName: azure.mgmt.computebulkactions.models.OSProfile
module: azure.mgmt.computebulkactions.models
summary: 'Specifies the operating system settings for the virtual machine. Some of
  the settings cannot be

  changed once VM is provisioned.'
constructor:
  syntax: 'OSProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the host OS name of the virtual machine. This name cannot
    be

    updated after the VM is created. **Max-length (Windows):** 15 characters. **Max-length

    (Linux):** 64 characters. For naming conventions and restrictions see [Azure infrastructure

    services implementation guidelines](https://docs.microsoft.com/azure/azure-resource-manager/management/resource-name-rules).'
  name: computer_name
  types:
  - <xref:str>
- description: 'Specifies the name of the administrator account. <br><br> This property

    cannot be updated after the VM is created. <br><br> **Windows-only restriction:**
    Cannot end in

    "." <br><br> **Disallowed values:** "administrator", "admin", "user", "user1",
    "test", "user2",

    "test1", "user3", "admin1", "1", "123", "a", "actuser", "adm", "admin2", "aspnet",
    "backup",

    "console", "david", "guest", "john", "owner", "root", "server", "sql", "support",

    "support_388945a0", "sys", "test2", "test3", "user4", "user5". <br><br> **Minimum-length

    (Linux):** 1  character <br><br> **Max-length (Linux):** 64 characters <br><br>
    **Max-length

    (Windows):** 20 characters.'
  name: admin_username
  types:
  - <xref:str>
- description: 'Specifies the password of the administrator account. <br><br>

    **Minimum-length (Windows):** 8 characters <br><br> **Minimum-length (Linux):**
    6 characters

    <br><br> **Max-length (Windows):** 123 characters <br><br> **Max-length (Linux):**
    72

    characters <br><br> **Complexity requirements:** 3 out of 4 conditions below need
    to be

    fulfilled <br> Has lower characters <br>Has upper characters <br> Has a digit
    <br> Has a

    special character (Regex match [W_]) <br><br> **Disallowed values:** "<xref:mailto:abc@123>",
    "<xref:mailto:P@$$w0rd>",

    "<xref:mailto:P@ssw0rd>", "<xref:mailto:P@ssword123>", "Pa$$word", "<xref:mailto:pass@word1>",
    "Password!", "Password1", "Password22",

    "iloveyou!" <br><br> For resetting the password, see [How to reset the Remote
    Desktop service

    or its login password in a Windows VM](https://docs.microsoft.com/troubleshoot/azure/virtual-machines/reset-rdp)
    <br><br> For

    resetting root password, see [Manage users, SSH, and check or repair disks on
    Azure Linux VMs

    using the VMAccess Extension](https://docs.microsoft.com/troubleshoot/azure/virtual-machines/troubleshoot-ssh-connection).'
  name: admin_password
  types:
  - <xref:str>
- description: 'Specifies a base-64 encoded string of custom data. The base-64 encoded

    string is decoded to a binary array that is saved as a file on the Virtual Machine.
    The maximum

    length of the binary array is 65535 bytes. **Note: Do not pass any secrets or
    passwords in

    customData property.** This property cannot be updated after the VM is created.
    The property

    ''customData'' is passed to the VM to be saved as a file, for more information
    see [Custom Data

    on Azure VMs](https://azure.microsoft.com/blog/custom-data-and-cloud-init-on-windows-azure/).

    For using cloud-init for your Linux VM, see [Using cloud-init to customize a Linux
    VM during

    creation](https://docs.microsoft.com/azure/virtual-machines/linux/using-cloud-init).'
  name: custom_data
  types:
  - <xref:str>
- description: 'Specifies Windows operating system settings on the virtual

    machine.'
  name: windows_configuration
  types:
  - <xref:azure.mgmt.computebulkactions.models.WindowsConfiguration>
- description: 'Specifies the Linux operating system settings on the virtual

    machine. For a list of supported Linux distributions, see [Linux on Azure-Endorsed

    Distributions](https://docs.microsoft.com/azure/virtual-machines/linux/endorsed-distros).'
  name: linux_configuration
  types:
  - <xref:azure.mgmt.computebulkactions.models.LinuxConfiguration>
- description: 'Specifies set of certificates that should be installed onto the virtual
    machine.

    To install certificates on a virtual machine it is recommended to use the [Azure
    Key Vault

    virtual machine extension for Linux](https://docs.microsoft.com/azure/virtual-machines/extensions/key-vault-linux)
    or the [Azure

    Key Vault virtual machine extension for Windows](https://docs.microsoft.com/azure/virtual-machines/extensions/key-vault-windows).'
  name: secrets
  types:
  - <xref:list>[<xref:azure.mgmt.computebulkactions.models.VaultSecretGroup>]
- description: 'Specifies whether extension operations should be allowed on

    the virtual machine. This may only be set to False when no extensions are present
    on the

    virtual machine.'
  name: allow_extension_operations
  types:
  - <xref:bool>
- description: 'Optional property which must either be set to True or

    omitted.'
  name: require_guest_provision_signal
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.computebulkactions.models.OSProfile.admin_password
  name: admin_password
  summary: '** 8

    characters <br><br> **Minimum-length (Linux):** 6 characters <br><br> **Max-length
    (Windows):**

    123 characters <br><br> **Max-length (Linux):** 72 characters <br><br> **Complexity

    requirements:** 3 out of 4 conditions below need to be fulfilled <br> Has lower
    characters

    <br>Has upper characters <br> Has a digit <br> Has a special character (Regex
    match [W_])

    <br><br> **Disallowed values:** "<xref:mailto:abc@123>", "<xref:mailto:P@$$w0rd>",
    "<xref:mailto:P@ssw0rd>", "<xref:mailto:P@ssword123>",

    "Pa$$word", "<xref:mailto:pass@word1>", "Password!", "Password1", "Password22",
    "iloveyou!"

    <br><br> For resetting the password, see [How to reset the Remote Desktop service
    or its login

    password in a Windows VM](https://docs.microsoft.com/troubleshoot/azure/virtual-machines/reset-rdp)
    <br><br> For

    resetting root password, see [Manage users, SSH, and check or repair disks on
    Azure Linux VMs

    using the VMAccess Extension](https://docs.microsoft.com/troubleshoot/azure/virtual-machines/troubleshoot-ssh-connection).'
  signature: 'admin_password: str | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.admin_username
  name: admin_username
  summary: 'Specifies the name of the administrator account. <br><br> This property
    cannot be updated after

    the VM is created. <br><br> **Windows-only restriction:** Cannot end in "." <br><br>

    **Disallowed values:** "administrator", "admin", "user", "user1", "test", "user2",

    "test1", "user3", "admin1", "1", "123", "a", "actuser", "adm", "admin2",

    "aspnet", "backup", "console", "david", "guest", "john", "owner", "root",

    "server", "sql", "support", "support_388945a0", "sys", "test2", "test3",

    "user4", "user5". <br><br> **Minimum-length (Linux):** 1  character <br><br> **Max-length

    (Linux):** 64 characters <br><br> **Max-length (Windows):** 20 characters.'
  signature: 'admin_username: str | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.allow_extension_operations
  name: allow_extension_operations
  summary: 'Specifies whether extension operations should be allowed on the virtual
    machine. This may only

    be set to False when no extensions are present on the virtual machine.'
  signature: 'allow_extension_operations: bool | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.computer_name
  name: computer_name
  summary: 'Specifies the host OS name of the virtual machine. This name cannot be
    updated after the VM is

    created. **Max-length (Windows):** 15 characters. **Max-length (Linux):** 64 characters.
    For

    naming conventions and restrictions see [Azure infrastructure services implementation

    guidelines](https://docs.microsoft.com/azure/azure-resource-manager/management/resource-name-rules).'
  signature: 'computer_name: str | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.custom_data
  name: custom_data
  summary: 'Specifies a base-64 encoded string of custom data. The base-64 encoded
    string is decoded to a

    binary array that is saved as a file on the Virtual Machine. The maximum length
    of the binary

    array is 65535 bytes. **Note: Do not pass any secrets or passwords in customData
    property.**

    This property cannot be updated after the VM is created. The property ''customData''
    is passed to

    the VM to be saved as a file, for more information see [Custom Data on Azure VMs](https://azure.microsoft.com/blog/custom-data-and-cloud-init-on-windows-azure/).
    For using

    cloud-init for your Linux VM, see [Using cloud-init to customize a Linux VM during
    creation](https://docs.microsoft.com/azure/virtual-machines/linux/using-cloud-init).'
  signature: 'custom_data: str | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.linux_configuration
  name: linux_configuration
  summary: 'Specifies the Linux operating system settings on the virtual machine.
    For a list of supported

    Linux distributions, see [Linux on Azure-Endorsed Distributions](https://docs.microsoft.com/azure/virtual-machines/linux/endorsed-distros).'
  signature: 'linux_configuration: _models.LinuxConfiguration | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.require_guest_provision_signal
  name: require_guest_provision_signal
  summary: Optional property which must either be set to True or omitted.
  signature: 'require_guest_provision_signal: bool | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.secrets
  name: secrets
  summary: 'Specifies set of certificates that should be installed onto the virtual
    machine. To install

    certificates on a virtual machine it is recommended to use the [Azure Key Vault
    virtual machine

    extension for Linux](https://docs.microsoft.com/azure/virtual-machines/extensions/key-vault-linux)
    or the [Azure

    Key Vault virtual machine extension for Windows](https://docs.microsoft.com/azure/virtual-machines/extensions/key-vault-windows).'
  signature: 'secrets: list[''_models.VaultSecretGroup''] | None'
- uid: azure.mgmt.computebulkactions.models.OSProfile.windows_configuration
  name: windows_configuration
  summary: Specifies Windows operating system settings on the virtual machine.
  signature: 'windows_configuration: _models.WindowsConfiguration | None'
