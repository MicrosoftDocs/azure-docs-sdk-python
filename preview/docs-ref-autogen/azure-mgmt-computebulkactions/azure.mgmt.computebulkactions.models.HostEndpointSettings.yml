uid: azure.mgmt.computebulkactions.models.HostEndpointSettings
name: HostEndpointSettings
fullName: azure.mgmt.computebulkactions.models.HostEndpointSettings
module: azure.mgmt.computebulkactions.models
summary: Specifies particular host endpoint settings.
constructor:
  syntax: 'HostEndpointSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the execution mode. In Audit mode, the system acts as if
    it is enforcing

    the access control policy, including emitting access denial entries in the logs
    but it does not

    actually deny any requests to host endpoints. In Enforce mode, the system will
    enforce the

    access control and it is the recommended mode of operation. Known values are:
    "Audit",

    "Enforce", and "Disabled".'
  name: mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.Modes>
- description: 'Specifies the InVMAccessControlProfileVersion

    resource id in the format of

    /subscriptions/{SubscriptionId}/resourceGroups/{ResourceGroupName}/providers/Microsoft.Compute/galleries/{galleryName}/inVMAccessControlProfiles/{profile}/versions/{version}.'
  name: in_vm_access_control_profile_reference_id
  types:
  - <xref:str>
