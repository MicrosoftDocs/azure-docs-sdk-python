### YamlMime:PythonClass
uid: azure.mgmt.computebulkactions.models.StorageProfile
name: StorageProfile
fullName: azure.mgmt.computebulkactions.models.StorageProfile
module: azure.mgmt.computebulkactions.models
summary: Specifies the storage settings for the virtual machine disks.
constructor:
  syntax: 'StorageProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies information about the image to use. You can specify

    information about platform images, marketplace images, or virtual machine images.
    This element

    is required when you want to use a platform image, marketplace image, or virtual
    machine image,

    but is not used in other creation operations.'
  name: image_reference
  types:
  - <xref:azure.mgmt.computebulkactions.models.ImageReference>
- description: 'Specifies information about the operating system disk used by the
    virtual

    machine. For more information about disks, see [About disks and VHDs for Azure
    virtual machines](https://docs.microsoft.com/azure/virtual-machines/managed-disks-overview).'
  name: os_disk
  types:
  - <xref:azure.mgmt.computebulkactions.models.OSDisk>
- description: 'Specifies the parameters that are used to add a data disk to a virtual

    machine. For more information about disks, see [About disks and VHDs for Azure
    virtual machines](https://docs.microsoft.com/azure/virtual-machines/managed-disks-overview).'
  name: data_disks
  types:
  - <xref:list>[<xref:azure.mgmt.computebulkactions.models.DataDisk>]
- description: 'Specifies the disk controller type configured for the VM. **Note:**

    This property will be set to the default disk controller type if not specified
    provided virtual

    machine is being created with ''hyperVGeneration'' set to V2 based on the capabilities
    of the

    operating system disk and VM size from the the specified minimum api version.
    You need to

    deallocate the VM before updating its disk controller type unless you are updating
    the VM size

    in the VM configuration which implicitly deallocates and reallocates the VM. Minimum

    api-version: 2022-08-01. Known values are: "SCSI" and "NVMe".'
  name: disk_controller_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.computebulkactions.models.DiskControllerTypes>
attributes:
- uid: azure.mgmt.computebulkactions.models.StorageProfile.data_disks
  name: data_disks
  summary: 'Specifies the parameters that are used to add a data disk to a virtual
    machine. For more

    information about disks, see [About disks and VHDs for Azure virtual machines](https://docs.microsoft.com/azure/virtual-machines/managed-disks-overview).'
  signature: 'data_disks: list[''_models.DataDisk''] | None'
- uid: azure.mgmt.computebulkactions.models.StorageProfile.disk_controller_type
  name: disk_controller_type
  summary: '** This property will be set

    to the default disk controller type if not specified provided virtual machine
    is being created

    with ''hyperVGeneration'' set to V2 based on the capabilities of the operating
    system disk and VM

    size from the the specified minimum api version. You need to deallocate the VM
    before updating

    its disk controller type unless you are updating the VM size in the VM configuration
    which

    implicitly deallocates and reallocates the VM. Minimum api-version: 2022-08-01.
    Known values

    are: "SCSI" and "NVMe".'
  signature: 'disk_controller_type: str | _models.DiskControllerTypes | None'
- uid: azure.mgmt.computebulkactions.models.StorageProfile.image_reference
  name: image_reference
  summary: 'Specifies information about the image to use. You can specify information
    about platform

    images, marketplace images, or virtual machine images. This element is required
    when you want

    to use a platform image, marketplace image, or virtual machine image, but is not
    used in other

    creation operations.'
  signature: 'image_reference: _models.ImageReference | None'
- uid: azure.mgmt.computebulkactions.models.StorageProfile.os_disk
  name: os_disk
  summary: 'Specifies information about the operating system disk used by the virtual
    machine. For more

    information about disks, see [About disks and VHDs for Azure virtual machines](https://docs.microsoft.com/azure/virtual-machines/managed-disks-overview).'
  signature: 'os_disk: _models.OSDisk | None'
