  name: private_link_scope_id
  types:
  - <xref:str>
- description: The collection of associated Private Endpoint Connections.
  name: private_endpoint_connections
  types:
  - <xref:list>[<xref:azure.mgmt.hybridcompute.models.PrivateEndpointConnectionDataModel>]
- description: Enable private link validation for an Azure Arc Extension.
  name: service_extensions
  types:
  - <xref:list>[<xref:azure.mgmt.hybridcompute.models.ServiceExtension>]
