### YamlMime:PythonClass
uid: azure.mgmt.extendedlocation.models.ResourceSyncRuleProperties
name: ResourceSyncRuleProperties
fullName: azure.mgmt.extendedlocation.models.ResourceSyncRuleProperties
module: azure.mgmt.extendedlocation.models
summary: 'Properties for a resource sync rule. For an unmapped custom resource, its
  labels will be used

  to find out matching resource sync rules using the selector property of the resource
  sync rule.

  If this resource sync rule has highest priority among all matching rules, then the
  unmapped

  custom resource will be projected to the target resource group associated with this
  resource

  sync rule.'
constructor:
  syntax: 'ResourceSyncRuleProperties(*args: Any, **kwargs: Any)'
variables:
- description: Priority represents a priority of the Resource Sync Rule.
  name: priority
  types:
  - <xref:int>
- description: Provisioning State for the Resource Sync Rule.
  name: provisioning_state
  types:
  - <xref:str>
- description: 'A label selector is composed of two parts, matchLabels and matchExpressions.

    The first part, matchLabels is a map of {key,value} pairs. A single {key,value}
    in the

    matchLabels map is equivalent to an element of matchExpressions, whose key field
    is ''key'', the

    operator is ''In'', and the values array contains only ''value''. The second part,
    matchExpressions

    is a list of resource selector requirements. Valid operators include In, NotIn,
    Exists, and

    DoesNotExist. The values set must be non-empty in the case of In and NotIn. The
    values set must

    be empty in the case of Exists and DoesNotExist. All of the requirements, from
    both matchLabels

    and matchExpressions must all be satisfied in order to match.'
  name: selector
  types:
  - <xref:azure.mgmt.extendedlocation.models.ResourceSyncRulePropertiesSelector>
- description: 'For an unmapped custom resource, its labels will be used to find

    matching resource sync rules. If this resource sync rule is one of the matching
    rules with

    highest priority, then the unmapped custom resource will be projected to the target
    resource

    group associated with this resource sync rule. The user creating this resource
    sync rule should

    have write permissions on the target resource group and this write permission
    will be validated

    when creating the resource sync rule.'
  name: target_resource_group
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.extendedlocation.models.ResourceSyncRuleProperties.priority
  name: priority
  summary: Priority represents a priority of the Resource Sync Rule.
  signature: 'priority: int | None'
- uid: azure.mgmt.extendedlocation.models.ResourceSyncRuleProperties.provisioning_state
  name: provisioning_state
  summary: Provisioning State for the Resource Sync Rule.
  signature: 'provisioning_state: str | None'
- uid: azure.mgmt.extendedlocation.models.ResourceSyncRuleProperties.selector
  name: selector
  summary: 'A label selector is composed of two parts, matchLabels and matchExpressions.
    The first part,

    matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
    map is

    equivalent to an element of matchExpressions, whose key field is ''key'', the
    operator is ''In'',

    and the values array contains only ''value''. The second part, matchExpressions
    is a list of

    resource selector requirements. Valid operators include In, NotIn, Exists, and
    DoesNotExist.

    The values set must be non-empty in the case of In and NotIn. The values set must
    be empty in

    the case of Exists and DoesNotExist. All of the requirements, from both matchLabels
    and

    matchExpressions must all be satisfied in order to match.'
  signature: 'selector: _models.ResourceSyncRulePropertiesSelector | None'
- uid: azure.mgmt.extendedlocation.models.ResourceSyncRuleProperties.target_resource_group
  name: target_resource_group
  summary: 'For an unmapped custom resource, its labels will be used to find matching
    resource sync rules.

    If this resource sync rule is one of the matching rules with highest priority,
    then the

    unmapped custom resource will be projected to the target resource group associated
    with this

    resource sync rule. The user creating this resource sync rule should have write
    permissions on

    the target resource group and this write permission will be validated when creating
    the

    resource sync rule.'
  signature: 'target_resource_group: str | None'
