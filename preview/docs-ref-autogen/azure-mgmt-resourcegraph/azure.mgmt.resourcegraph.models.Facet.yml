uid: azure.mgmt.resourcegraph.models.Facet
name: Facet
fullName: azure.mgmt.resourcegraph.models.Facet
module: azure.mgmt.resourcegraph.models
summary: 'A facet containing additional statistics on the response of a query. Can
  be either FacetResult

  or FacetError.


  You probably want to use the sub-classes and not this class directly. Known sub-classes
  are:

  FacetError, FacetResult'
constructor:
  syntax: 'Facet(*args: Any, **kwargs: Any)'
