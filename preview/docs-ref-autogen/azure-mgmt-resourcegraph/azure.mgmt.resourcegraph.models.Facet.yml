- description: Facet expression, same as in the corresponding facet request. Required.
  name: expression
  types:
  - <xref:str>
- description: Result type. Required. Default value is None.
  name: result_type
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.resourcegraph.models.Facet.expression
  name: expression
  summary: Facet expression, same as in the corresponding facet request. Required.
  signature: 'expression: str'
- uid: azure.mgmt.resourcegraph.models.Facet.result_type
  name: result_type
  summary: Result type. Required. Default value is None.
  signature: 'result_type: str'
