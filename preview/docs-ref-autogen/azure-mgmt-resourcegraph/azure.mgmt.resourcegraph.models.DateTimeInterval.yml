uid: azure.mgmt.resourcegraph.models.DateTimeInterval
name: DateTimeInterval
fullName: azure.mgmt.resourcegraph.models.DateTimeInterval
module: azure.mgmt.resourcegraph.models
summary: 'An interval in time specifying the date and time for the inclusive start
  and exclusive end,

  i.e. `[start, end)`.'
constructor:
  syntax: 'DateTimeInterval(*args: Any, **kwargs: Any)'
variables:
- description: 'A datetime indicating the inclusive/closed start of the time interval,
    i.e.

    `[``**`start`**`, end)``. Specifying a `start` that occurs chronologically after
    `end`

    will result in an error. Required.'
  name: start
  types:
  - <xref:datetime.datetime>
- description: 'A datetime indicating the exclusive/open end of the time interval,
    i.e. `[start,

    ``**`end`**`)``. Specifying an `end` that occurs chronologically before `start`
    will

    result in an error. Required.'
  name: end
  types:
  - <xref:datetime.datetime>
attributes:
