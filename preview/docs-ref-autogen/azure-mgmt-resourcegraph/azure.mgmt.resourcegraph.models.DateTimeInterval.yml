  name: end
  summary: 'A datetime indicating the exclusive/open end of the time interval, i.e.
    `[start,

    ``**`end`**`)``. Specifying an `end` that occurs chronologically before `start`
    will

    result in an error. Required.'
  signature: 'end: datetime'
- uid: azure.mgmt.resourcegraph.models.DateTimeInterval.start
  name: start
  summary: 'A datetime indicating the inclusive/closed start of the time interval,
