### YamlMime:PythonClass
uid: azure.mgmt.resourcegraph.models.FacetResult
name: FacetResult
fullName: azure.mgmt.resourcegraph.models.FacetResult
module: azure.mgmt.resourcegraph.models
summary: Successfully executed facet containing additional statistics on the response
  of a query.
constructor:
  syntax: 'FacetResult(*args: Any, **kwargs: Any)'
variables:
- description: Facet expression, same as in the corresponding facet request. Required.
  name: expression
  types:
  - <xref:str>
- description: Number of total records in the facet results. Required.
  name: total_records
  types:
  - <xref:int>
- description: Number of records returned in the facet response. Required.
  name: count
  types:
  - <xref:int>
- description: 'A JObject array or Table containing the desired facets. Only present
    if the facet

    is valid. Required.'
  name: data
  types:
  - <xref:any>
- description: Result type. Required. Default value is "FacetResult".
  name: result_type
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.resourcegraph.models.FacetResult.count
  name: count
  summary: Number of records returned in the facet response. Required.
  signature: 'count: int'
- uid: azure.mgmt.resourcegraph.models.FacetResult.data
  name: data
  summary: 'A JObject array or Table containing the desired facets. Only present if
    the facet is valid.

    Required.'
  signature: 'data: Any'
- uid: azure.mgmt.resourcegraph.models.FacetResult.result_type
  name: result_type
  summary: Result type. Required. Default value is "FacetResult".
  signature: 'result_type: Literal[''FacetResult'']'
- uid: azure.mgmt.resourcegraph.models.FacetResult.total_records
  name: total_records
  summary: Number of total records in the facet results. Required.
  signature: 'total_records: int'
