### YamlMime:PythonClass
uid: azure.mgmt.sql.models.JobTarget
name: JobTarget
fullName: azure.mgmt.sql.models.JobTarget
module: azure.mgmt.sql.models
summary: 'A job target, for example a specific database or a container of databases
  that is evaluated

  during job execution.'
constructor:
  syntax: 'JobTarget(*args: Any, **kwargs: Any)'
variables:
- description: 'Whether the target is included or excluded from the group. Known values

    are: "Include" and "Exclude".'
  name: membership_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.JobTargetGroupMembershipType>
- description: 'The target type. Required. Known values are: "TargetGroup", "SqlDatabase",

    "SqlElasticPool", "SqlShardMap", and "SqlServer".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.JobTargetType>
- description: The target server name.
  name: server_name
  types:
  - <xref:str>
- description: The target database name.
  name: database_name
  types:
  - <xref:str>
- description: The target elastic pool name.
  name: elastic_pool_name
  types:
  - <xref:str>
- description: The target shard map.
  name: shard_map_name
  types:
  - <xref:str>
- description: 'The resource ID of the credential that is used during job execution

    to connect to the target and determine the list of databases inside the target.'
  name: refresh_credential
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.sql.models.JobTarget.database_name
  name: database_name
  summary: The target database name.
  signature: 'database_name: str | None'
- uid: azure.mgmt.sql.models.JobTarget.elastic_pool_name
  name: elastic_pool_name
  summary: The target elastic pool name.
  signature: 'elastic_pool_name: str | None'
- uid: azure.mgmt.sql.models.JobTarget.membership_type
  name: membership_type
  summary: '"Include" and

    "Exclude".'
  signature: 'membership_type: str | _models.JobTargetGroupMembershipType | None'
- uid: azure.mgmt.sql.models.JobTarget.refresh_credential
  name: refresh_credential
  summary: 'The resource ID of the credential that is used during job execution to
    connect to the target

    and determine the list of databases inside the target.'
  signature: 'refresh_credential: str | None'
- uid: azure.mgmt.sql.models.JobTarget.server_name
  name: server_name
  summary: The target server name.
  signature: 'server_name: str | None'
- uid: azure.mgmt.sql.models.JobTarget.shard_map_name
  name: shard_map_name
  summary: The target shard map.
  signature: 'shard_map_name: str | None'
- uid: azure.mgmt.sql.models.JobTarget.type
  name: type
  summary: '"TargetGroup", "SqlDatabase",

    "SqlElasticPool", "SqlShardMap", and "SqlServer".'
  signature: 'type: str | _models.JobTargetType'
