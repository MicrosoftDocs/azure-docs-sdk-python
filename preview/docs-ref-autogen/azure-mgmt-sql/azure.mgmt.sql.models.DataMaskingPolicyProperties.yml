name: DataMaskingPolicyProperties
fullName: azure.mgmt.sql.models.DataMaskingPolicyProperties
module: azure.mgmt.sql.models
summary: The properties of a database data masking policy.
constructor:
  syntax: 'DataMaskingPolicyProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The state of the data masking policy. Required. Known values are:

    "Enabled" and "Disabled".'
  name: data_masking_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.DataMaskingState>
- description: 'The list of the exempt principals. Specifies the semicolon-separated

    list of database users for which the data masking policy does not apply. The specified
    users

    receive data results without masking for all of the database queries.'
  name: exempt_principals
  types:
  - <xref:str>
- description: 'The list of the application principals. This is a legacy

    parameter and is no longer used.'
  name: application_principals
  types:
  - <xref:str>
- description: The masking level. This is a legacy parameter and is no longer used.
  name: masking_level
  types:
  - <xref:str>
