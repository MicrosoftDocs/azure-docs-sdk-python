### YamlMime:PythonClass
uid: azure.mgmt.sql.models.ServerKeyProperties
name: ServerKeyProperties
fullName: azure.mgmt.sql.models.ServerKeyProperties
module: azure.mgmt.sql.models
summary: Properties for a server key execution.
constructor:
  syntax: 'ServerKeyProperties(*args: Any, **kwargs: Any)'
variables:
- description: Subregion of the server key.
  name: subregion
  types:
  - <xref:str>
- description: 'The server key type like ''ServiceManaged'', ''AzureKeyVault''. Required.

    Known values are: "ServiceManaged" and "AzureKeyVault".'
  name: server_key_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.ServerKeyType>
- description: 'The URI of the server key. If the ServerKeyType is AzureKeyVault,
    then the URI is

    required. The AKV URI is required to be in this format:

    ''[https://YourVaultName.vault.azure.net/keys/YourKeyName/YourKeyVersion](https://YourVaultName.vault.azure.net/keys/YourKeyName/YourKeyVersion)''
    or can be

    ''[https://YourVaultName.vault.azure.net/keys/YourKeyName](https://YourVaultName.vault.azure.net/keys/YourKeyName)''.'
  name: uri
  types:
  - <xref:str>
- description: Thumbprint of the server key.
  name: thumbprint
  types:
  - <xref:str>
- description: The server key creation date.
  name: creation_date
  types:
  - <xref:datetime.datetime>
- description: Key auto rotation opt-in flag. Either true or false.
  name: auto_rotation_enabled
  types:
  - <xref:bool>
- description: The version of the server key.
  name: key_version
  types:
  - <xref:str>
