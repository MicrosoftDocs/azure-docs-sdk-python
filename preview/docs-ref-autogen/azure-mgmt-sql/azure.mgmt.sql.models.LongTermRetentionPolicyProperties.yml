### YamlMime:PythonClass
uid: azure.mgmt.sql.models.LongTermRetentionPolicyProperties
name: LongTermRetentionPolicyProperties
fullName: azure.mgmt.sql.models.LongTermRetentionPolicyProperties
module: azure.mgmt.sql.models
summary: Properties of a long term retention policy.
constructor:
  syntax: 'LongTermRetentionPolicyProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The setting for whether to enable time-based immutability for

    future backups. When set, future backups will have TimeBasedImmutability enabled.
    Known values

    are: "Enabled" and "Disabled".'
  name: time_based_immutability
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.TimeBasedImmutability>
- description: 'The setting for time-based immutability mode for future

    backup (Value can be either Locked or UnLocked. Only effective if TimeBasedImmutability
    is

    enabled). Caution: Immutability of LTR backup cannot be removed if TimeBasedImmutabilityMode
    is

    Locked. Known values are: "Locked" and "Unlocked".'
  name: time_based_immutability_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.TimeBasedImmutabilityMode>
- description: The weekly retention policy for an LTR backup in an ISO 8601 format.
  name: weekly_retention
  types:
  - <xref:str>
- description: The monthly retention policy for an LTR backup in an ISO 8601 format.
  name: monthly_retention
  types:
  - <xref:str>
- description: The yearly retention policy for an LTR backup in an ISO 8601 format.
  name: yearly_retention
  types:
  - <xref:str>
- description: The week of year to take the yearly backup in an ISO 8601 format.
  name: week_of_year
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.sql.models.LongTermRetentionPolicyProperties.monthly_retention
  name: monthly_retention
  summary: The monthly retention policy for an LTR backup in an ISO 8601 format.
  signature: 'monthly_retention: str | None'
- uid: azure.mgmt.sql.models.LongTermRetentionPolicyProperties.time_based_immutability
  name: time_based_immutability
  summary: 'The setting for whether to enable time-based immutability for future backups.
    When set, future

    backups will have TimeBasedImmutability enabled. Known values are: "Enabled" and

    "Disabled".'
  signature: 'time_based_immutability: str | _models.TimeBasedImmutability | None'
- uid: azure.mgmt.sql.models.LongTermRetentionPolicyProperties.time_based_immutability_mode
  name: time_based_immutability_mode
  summary: 'The setting for time-based immutability mode for future backup (Value
    can be either Locked or

    UnLocked. Only effective if TimeBasedImmutability is enabled). Caution: Immutability
    of LTR

    backup cannot be removed if TimeBasedImmutabilityMode is Locked. Known values
    are: "Locked"

    and "Unlocked".'
  signature: 'time_based_immutability_mode: str | _models.TimeBasedImmutabilityMode
    | None'
- uid: azure.mgmt.sql.models.LongTermRetentionPolicyProperties.week_of_year
  name: week_of_year
  summary: The week of year to take the yearly backup in an ISO 8601 format.
  signature: 'week_of_year: int | None'
