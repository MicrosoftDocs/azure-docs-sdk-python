  summary: The weekly retention policy for an LTR backup in an ISO 8601 format.
  signature: 'weekly_retention: str | None'
- uid: azure.mgmt.sql.models.LongTermRetentionPolicyProperties.yearly_retention
  name: yearly_retention
  summary: The yearly retention policy for an LTR backup in an ISO 8601 format.
  signature: 'yearly_retention: str | None'
