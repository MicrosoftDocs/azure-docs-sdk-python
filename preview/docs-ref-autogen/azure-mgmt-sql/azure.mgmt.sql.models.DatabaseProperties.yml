  signature: 'restore_point_in_time: datetime | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.resumed_date
  name: resumed_date
  summary: 'The date when database was resumed by user action or database login (ISO8601
    format). Null if

    the database is paused.'
  signature: 'resumed_date: datetime | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.sample_name
  name: sample_name
  summary: 'The name of the sample schema to apply when creating this database. Known
    values are:

    "AdventureWorksLT", "WideWorldImportersStd", and "WideWorldImportersFull".'
  signature: 'sample_name: str | _models.SampleName | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.secondary_type
  name: secondary_type
  summary: 'The secondary type of the database if it is a secondary.  Valid values
    are Geo, Named and

    Standby. Known values are: "Geo", "Named", and "Standby".'
  signature: 'secondary_type: str | _models.SecondaryType | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.source_database_deletion_date
  name: source_database_deletion_date
  summary: Specifies the time that the database was deleted.
  signature: 'source_database_deletion_date: datetime | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.source_database_id
  name: source_database_id
  summary: 'The resource identifier of the source database associated with create
    operation of this

    database.'
  signature: 'source_database_id: str | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.source_resource_id
  name: source_resource_id
  summary: 'The resource identifier of the source associated with the create operation
    of this database.


    This property is only supported for DataWarehouse edition and allows to restore
    across

    subscriptions.


    When sourceResourceId is specified, sourceDatabaseId, recoverableDatabaseId,

    restorableDroppedDatabaseId and sourceDatabaseDeletionDate must not be specified
    and CreateMode

    must be PointInTimeRestore, Restore or Recover.


    When createMode is PointInTimeRestore, sourceResourceId must be the resource ID
    of the existing

    database or existing sql pool, and restorePointInTime must be specified.


    When createMode is Restore, sourceResourceId must be the resource ID of restorable
    dropped

    database or restorable dropped sql pool.


    When createMode is Recover, sourceResourceId must be the resource ID of recoverable
    database or

    recoverable sql pool.


    When source subscription belongs to a different tenant than target subscription,

    "x-ms-authorization-auxiliary" header must contain authentication token for the
    source tenant.

    For more details about "x-ms-authorization-auxiliary" header see

    [https://docs.microsoft.com/en-us/azure/azure-resource-manager/management/authenticate-multi-tenant](https://docs.microsoft.com/en-us/azure/azure-resource-manager/management/authenticate-multi-tenant).'
  signature: 'source_resource_id: str | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.status
  name: status
  summary: '"Online", "Restoring", "RecoveryPending",

    "Recovering", "Suspect", "Offline", "Standby", "Shutdown", "EmergencyMode",

    "AutoClosed", "Copying", "Creating", "Inaccessible", "OfflineSecondary", "Pausing",

    "Paused", "Resuming", "Scaling", "OfflineChangingDwPerformanceTiers",

    "OnlineChangingDwPerformanceTiers", "Disabled", "Stopping", "Stopped", and

    "Starting".'
  signature: 'status: str | _models.DatabaseStatus | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.use_free_limit
  name: use_free_limit
  summary: 'Whether or not the database uses free monthly limits. Allowed on one database
    in a

    subscription.'
  signature: 'use_free_limit: bool | None'
- uid: azure.mgmt.sql.models.DatabaseProperties.zone_redundant
  name: zone_redundant
  summary: 'Whether or not this database is zone redundant, which means the replicas
    of this database will

    be spread across multiple availability zones.'
  signature: 'zone_redundant: bool | None'
