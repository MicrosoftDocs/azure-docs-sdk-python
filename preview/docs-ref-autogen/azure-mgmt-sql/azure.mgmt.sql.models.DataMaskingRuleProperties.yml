  name: replacement_string
  summary: 'If maskingFunction is set to Text, the character to use for masking the
    unexposed part of the

    string. Otherwise, this parameter will be ignored.'
  signature: 'replacement_string: str | None'
- uid: azure.mgmt.sql.models.DataMaskingRuleProperties.rule_state
  name: rule_state
  summary: 'The rule state. Used to delete a rule. To delete an existing rule, specify
