### YamlMime:PythonClass
uid: azure.mgmt.sql.models.ServerDevOpsAuditSettingsProperties
name: ServerDevOpsAuditSettingsProperties
fullName: azure.mgmt.sql.models.ServerDevOpsAuditSettingsProperties
module: azure.mgmt.sql.models
summary: Properties of a server DevOps audit settings.
constructor:
  syntax: 'ServerDevOpsAuditSettingsProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies whether DevOps audit events are sent to Azure

    Monitor.

    In order to send the events to Azure Monitor, specify ''State'' as ''Enabled''
    and

    ''IsAzureMonitorTargetEnabled'' as true.


    When using REST API to configure DevOps audit, Diagnostic Settings with ''DevOpsOperationsAudit''

    diagnostic logs category on the master database should be also created.


    Diagnostic Settings URI format:

    PUT

    [https://management.azure.com/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Sql/servers/{serverName}/databases/master/providers/microsoft.insights/diagnosticSettings/{settingsName}?api-version=2017-05-01-preview](https://management.azure.com/subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.Sql/servers/{serverName}/databases/master/providers/microsoft.insights/diagnosticSettings/{settingsName}?api-version=2017-05-01-preview)


    For more information, see [Diagnostic Settings REST API](https://go.microsoft.com/fwlink/?linkid=2033207)

    or [Diagnostic Settings PowerShell](https://go.microsoft.com/fwlink/?linkid=2033043).'
  name: is_azure_monitor_target_enabled
  types:
  - <xref:bool>
- description: 'Specifies whether Managed Identity is used to access blob

    storage.'
  name: is_managed_identity_in_use
  types:
  - <xref:bool>
- description: 'Specifies the state of the audit. If state is Enabled, storageEndpoint
    or

    isAzureMonitorTargetEnabled are required. Required. Known values are: "Enabled"
    and "Disabled".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.BlobAuditingPolicyState>
- description: 'Specifies the blob storage endpoint (e.g.

    [https://MyAccount.blob.core.windows.net](https://MyAccount.blob.core.windows.net)).
    If state

    is Enabled, storageEndpoint or isAzureMonitorTargetEnabled is required.'
  name: storage_endpoint
  types:
  - <xref:str>
- description: "Specifies the identifier key of the auditing storage account.\nIf\
    \ state is Enabled and storageEndpoint is specified, not specifying the\nstorageAccountAccessKey\
    \ will use SQL server system-assigned managed identity to access the\nstorage.\n\
    Prerequisites for using managed identity authentication:\n\n1. Assign SQL Server\
    \ a system-assigned managed identity in Azure Active Directory (AAD). \n\n2. Grant\
    \ SQL Server identity access to the storage account by adding 'Storage Blob Data\n\
    Contributor' RBAC role to the server identity.\nFor more information, see [Auditing\
    \ to storage using Managed Identity\nauthentication](https://go.microsoft.com/fwlink/?linkid=2114355)."
  name: storage_account_access_key
  types:
  - <xref:str>
- description: Specifies the blob storage subscription Id.
  name: storage_account_subscription_id
  types:
  - <xref:str>
