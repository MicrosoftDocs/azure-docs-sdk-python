### YamlMime:PythonClass
uid: azure.mgmt.sql.aio.SqlManagementClient
name: SqlManagementClient
fullName: azure.mgmt.sql.aio.SqlManagementClient
module: azure.mgmt.sql.aio
summary: 'The Azure SQL Database management API provides a RESTful set of web APIs
  that interact with

  Azure SQL Database services to manage your databases. The API enables users to create,

  retrieve, update, and delete databases, servers, and other entities.'
constructor:
  syntax: 'SqlManagementClient(credential: AsyncTokenCredential, subscription_id:
    str, base_url: str | None = None, *, cloud_setting: AzureClouds | None = None,
    **kwargs: Any)'
  parameters:
  - name: credential
    description: Credential used to authenticate requests to the service. Required.
    isRequired: true
    types:
    - <xref:azure.core.credentials_async.AsyncTokenCredential>
  - name: subscription_id
    description: The ID of the target subscription. The value must be an UUID. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: base_url
    description: Service host. Default value is None.
    defaultValue: None
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: cloud_setting
    description: 'The cloud setting for which to get the ARM endpoint. Default value
      is

      None.'
    defaultValue: None
    types:
    - <xref:azure.core.AzureClouds>
  - name: api_version
    description: 'The API version to use for this operation. Known values are "2025-01-01"

      and None. Default value is None. If not set, the operation''s default API version
      will be used.

      Note that overriding this default value may result in unsupported behavior.'
    types:
    - <xref:str>
  - name: polling_interval
    description: 'Default waiting time between two polls for LRO operations if no

      Retry-After header is present.'
    types:
    - <xref:int>
