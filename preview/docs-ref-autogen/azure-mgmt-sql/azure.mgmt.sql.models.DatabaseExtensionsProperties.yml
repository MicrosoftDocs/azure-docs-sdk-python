uid: azure.mgmt.sql.models.DatabaseExtensionsProperties
name: DatabaseExtensionsProperties
fullName: azure.mgmt.sql.models.DatabaseExtensionsProperties
module: azure.mgmt.sql.models
summary: Contains the database information after a successful Import, Export, or PolybaseImport.
constructor:
  syntax: 'DatabaseExtensionsProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Operation mode of the operation: Import, Export, or PolybaseImport.

    Required. Known values are: "PolybaseImport", "Import", and "Export".'
  name: operation_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.OperationMode>
- description: 'Storage key type: StorageAccessKey, SharedAccessKey or ManagedIdentity.

    Required. Known values are: "SharedAccessKey", "StorageAccessKey", and "ManagedIdentity".'
  name: storage_key_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.StorageKeyType>
