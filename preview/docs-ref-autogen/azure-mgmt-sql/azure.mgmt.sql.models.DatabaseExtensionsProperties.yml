    this field should specify the Managed Identity''s resource ID. Required.'
  name: storage_key
  types:
  - <xref:str>
- description: Storage Uri for the storage account. Required.
  name: storage_uri
  types:
  - <xref:str>
- description: 'Administrator login name. If AuthenticationType is ManagedIdentity,

    this field should specify the Managed Identity''s resource ID.'
