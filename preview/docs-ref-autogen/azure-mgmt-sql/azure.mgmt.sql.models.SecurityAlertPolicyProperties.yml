uid: azure.mgmt.sql.models.SecurityAlertPolicyProperties
name: SecurityAlertPolicyProperties
fullName: azure.mgmt.sql.models.SecurityAlertPolicyProperties
module: azure.mgmt.sql.models
summary: Properties of a security alert policy.
constructor:
  syntax: 'SecurityAlertPolicyProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the state of the policy, whether it is enabled or disabled
    or a policy

    has not been applied yet on the specific database. Required. Known values are:
    "New",

    "Enabled", and "Disabled".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.SecurityAlertPolicyState>
- description: 'Specifies an array of alerts that are disabled. Allowed values are:

    Sql_Injection, Sql_Injection_Vulnerability, Access_Anomaly, Data_Exfiltration,
    Unsafe_Action,

    Brute_Force.'
  name: disabled_alerts
  types:
  - <xref:list>[<xref:str>]
- description: Specifies an array of e-mail addresses to which the alert is sent.
  name: email_addresses
  types:
  - <xref:list>[<xref:str>]
- description: Specifies that the alert is sent to the account administrators.
  name: email_account_admins
  types:
  - <xref:bool>
- description: 'Specifies the blob storage endpoint (e.g.

    [https://MyAccount.blob.core.windows.net](https://MyAccount.blob.core.windows.net)).
    This

    blob storage will hold all Threat Detection audit logs.'
  name: storage_endpoint
  types:
  - <xref:str>
- description: 'Specifies the identifier key of the Threat Detection audit

    storage account.'
  name: storage_account_access_key
  types:
  - <xref:str>
- description: Specifies the number of days to keep in the Threat Detection audit
    logs.
  name: retention_days
  types:
  - <xref:int>
- description: Specifies the UTC creation time of the policy.
  name: creation_time
  types:
  - <xref:datetime.datetime>
