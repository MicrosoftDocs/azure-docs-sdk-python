### YamlMime:PythonClass
uid: azure.mgmt.sql.models.AdvisorProperties
name: AdvisorProperties
fullName: azure.mgmt.sql.models.AdvisorProperties
module: azure.mgmt.sql.models
summary: Properties for a Database, Server or Elastic Pool Advisor.
constructor:
  syntax: 'AdvisorProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Gets the status of availability of this advisor to customers. Possible

    values are ''GA'', ''PublicPreview'', ''LimitedPublicPreview'' and ''PrivatePreview''.
    Known values

    are: "GA", "PublicPreview", "LimitedPublicPreview", and "PrivatePreview".'
  name: advisor_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.AdvisorStatus>
- description: 'Gets the auto-execute status (whether to let the system execute the

    recommendations) of this advisor. Possible values are ''Enabled'' and ''Disabled''.
    Required. Known

    values are: "Enabled", "Disabled", and "Default".'
  name: auto_execute_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.AutoExecuteStatus>
- description: 'Gets the resource from which current value of

    auto-execute status is inherited. Auto-execute status can be set on (and inherited
    from)

    different levels in the resource hierarchy. Possible values are ''Subscription'',
    ''Server'',

    ''ElasticPool'', ''Database'' and ''Default'' (when status is not explicitly set
    on any level). Known

    values are: "Default", "Subscription", "Server", "ElasticPool", and "Database".'
  name: auto_execute_status_inherited_from
  types:
  - <xref:str>
  - <xref:azure.mgmt.sql.models.AutoExecuteStatusInheritedFrom>
- description: 'Gets that status of recommendations for this advisor and reason

    for not having any recommendations. Possible values include, but are not limited
    to, ''Ok''

    (Recommendations available),LowActivity (not enough workload to analyze), ''DbSeemsTuned''

    (Database is doing well), etc.'
  name: recommendations_status
  types:
  - <xref:str>
- description: 'Gets the time when the current resource was analyzed for recommendations
    by

    this advisor.'
  name: last_checked
  types:
  - <xref:datetime.datetime>
- description: Gets the recommended actions for this advisor.
  name: recommended_actions
  types:
  - <xref:list>[<xref:azure.mgmt.sql.models.RecommendedAction>]
attributes:
- uid: azure.mgmt.sql.models.AdvisorProperties.advisor_status
  name: advisor_status
  summary: 'Gets the status of availability of this advisor to customers. Possible
    values are ''GA'',

    ''PublicPreview'', ''LimitedPublicPreview'' and ''PrivatePreview''. Known values
    are: "GA",

    "PublicPreview", "LimitedPublicPreview", and "PrivatePreview".'
  signature: 'advisor_status: str | _models.AdvisorStatus | None'
- uid: azure.mgmt.sql.models.AdvisorProperties.auto_execute_status
  name: auto_execute_status
  summary: 'Gets the auto-execute status (whether to let the system execute the recommendations)
    of this

    advisor. Possible values are ''Enabled'' and ''Disabled''. Required. Known values
    are: "Enabled",

    "Disabled", and "Default".'
  signature: 'auto_execute_status: str | _models.AutoExecuteStatus'
- uid: azure.mgmt.sql.models.AdvisorProperties.auto_execute_status_inherited_from
  name: auto_execute_status_inherited_from
  summary: 'Gets the resource from which current value of auto-execute status is inherited.
    Auto-execute

    status can be set on (and inherited from) different levels in the resource hierarchy.
    Possible

    values are ''Subscription'', ''Server'', ''ElasticPool'', ''Database'' and ''Default''
    (when status is

    not explicitly set on any level). Known values are: "Default", "Subscription",
    "Server",

    "ElasticPool", and "Database".'
  signature: 'auto_execute_status_inherited_from: str | _models.AutoExecuteStatusInheritedFrom
    | None'
- uid: azure.mgmt.sql.models.AdvisorProperties.last_checked
  name: last_checked
  summary: Gets the time when the current resource was analyzed for recommendations
    by this advisor.
  signature: 'last_checked: datetime | None'
- uid: azure.mgmt.sql.models.AdvisorProperties.recommendations_status
  name: recommendations_status
  summary: 'Gets that status of recommendations for this advisor and reason for not
    having any

    recommendations. Possible values include, but are not limited to, ''Ok'' (Recommendations

    available),LowActivity (not enough workload to analyze), ''DbSeemsTuned'' (Database
    is doing

    well), etc.'
  signature: 'recommendations_status: str | None'
- uid: azure.mgmt.sql.models.AdvisorProperties.recommended_actions
  name: recommended_actions
  summary: Gets the recommended actions for this advisor.
  signature: 'recommended_actions: list[''_models.RecommendedAction''] | None'
