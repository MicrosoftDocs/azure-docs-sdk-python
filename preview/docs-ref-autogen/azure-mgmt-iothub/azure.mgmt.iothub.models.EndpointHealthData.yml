### YamlMime:PythonClass
uid: azure.mgmt.iothub.models.EndpointHealthData
name: EndpointHealthData
fullName: azure.mgmt.iothub.models.EndpointHealthData
module: azure.mgmt.iothub.models
summary: The health data for an endpoint.
constructor:
  syntax: 'EndpointHealthData(*args: Any, **kwargs: Any)'
variables:
- description: Id of the endpoint.
  name: endpoint_id
  types:
  - <xref:str>
- description: 'Health statuses have following meanings. The ''healthy'' status shows
    that

    the endpoint is accepting messages as expected. The ''unhealthy'' status shows
    that the endpoint

    is not accepting messages as expected and IoT Hub is retrying to send data to
    this endpoint.

    The status of an unhealthy endpoint will be updated to healthy when IoT Hub has
    established an

    eventually consistent state of health. The ''dead'' status shows that the endpoint
    is not

    accepting messages, after IoT Hub retried sending messages for the retrial period.
    See IoT Hub

    metrics to identify errors and monitor issues with endpoints. The ''unknown''
    status shows that

    the IoT Hub has not established a connection with the endpoint. No messages have
    been delivered

    to or rejected from this endpoint. Known values are: "unknown", "healthy", "degraded",

    "unhealthy", and "dead".'
  name: health_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.iothub.models.EndpointHealthStatus>
- description: Last error obtained when a message failed to be delivered to iot hub.
  name: last_known_error
  types:
  - <xref:str>
- description: Time at which the last known error occurred.
  name: last_known_error_time
  types:
  - <xref:datetime.datetime>
- description: 'Last time iot hub successfully sent a message to the

    endpoint.'
  name: last_successful_send_attempt_time
  types:
  - <xref:datetime.datetime>
- description: Last time iot hub tried to send a message to the endpoint.
  name: last_send_attempt_time
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.iothub.models.EndpointHealthData.endpoint_id
  name: endpoint_id
  summary: Id of the endpoint.
  signature: 'endpoint_id: str | None'
- uid: azure.mgmt.iothub.models.EndpointHealthData.health_status
  name: health_status
  summary: 'Health statuses have following meanings. The ''healthy'' status shows
    that the endpoint is

    accepting messages as expected. The ''unhealthy'' status shows that the endpoint
    is not accepting

    messages as expected and IoT Hub is retrying to send data to this endpoint. The
    status of an

    unhealthy endpoint will be updated to healthy when IoT Hub has established an
    eventually

    consistent state of health. The ''dead'' status shows that the endpoint is not
    accepting

    messages, after IoT Hub retried sending messages for the retrial period. See IoT
    Hub metrics to

    identify errors and monitor issues with endpoints. The ''unknown'' status shows
    that the IoT Hub

    has not established a connection with the endpoint. No messages have been delivered
    to or

    rejected from this endpoint. Known values are: "unknown", "healthy", "degraded",

    "unhealthy", and "dead".'
  signature: 'health_status: str | _models.EndpointHealthStatus | None'
- uid: azure.mgmt.iothub.models.EndpointHealthData.last_known_error
  name: last_known_error
  summary: Last error obtained when a message failed to be delivered to iot hub.
  signature: 'last_known_error: str | None'
- uid: azure.mgmt.iothub.models.EndpointHealthData.last_known_error_time
  name: last_known_error_time
  summary: Time at which the last known error occurred.
  signature: 'last_known_error_time: datetime | None'
- uid: azure.mgmt.iothub.models.EndpointHealthData.last_send_attempt_time
  name: last_send_attempt_time
  summary: Last time iot hub tried to send a message to the endpoint.
  signature: 'last_send_attempt_time: datetime | None'
- uid: azure.mgmt.iothub.models.EndpointHealthData.last_successful_send_attempt_time
  name: last_successful_send_attempt_time
  summary: Last time iot hub successfully sent a message to the endpoint.
  signature: 'last_successful_send_attempt_time: datetime | None'
