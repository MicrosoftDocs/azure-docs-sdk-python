### YamlMime:PythonClass
uid: azure.mgmt.iothub.models.RouteProperties
name: RouteProperties
fullName: azure.mgmt.iothub.models.RouteProperties
module: azure.mgmt.iothub.models
summary: The properties of a routing rule that your IoT hub uses to route messages
  to endpoints.
constructor:
  syntax: 'RouteProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the route. The name can only include alphanumeric characters,
    periods,

    underscores, hyphens, has a maximum length of 64 characters, and must be unique.
    Required.'
  name: name
  types:
  - <xref:str>
- description: 'The source that the routing rule is to be applied to, such as DeviceMessages.

    Required. Known values are: "Invalid", "DeviceMessages", "TwinChangeEvents",

    "DeviceLifecycleEvents", "DeviceJobLifecycleEvents", "DigitalTwinChangeEvents",

    "DeviceConnectionStateEvents", and "MqttBrokerMessages".'
  name: source
  types:
  - <xref:str>
  - <xref:azure.mgmt.iothub.models.RoutingSource>
- description: 'The condition that is evaluated to apply the routing rule. If no condition
    is

    provided, it evaluates to true by default. For grammar, see:

    [https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language](https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language).'
  name: condition
  types:
  - <xref:str>
- description: 'The list of endpoints to which messages that satisfy the condition
    are

    routed. Currently only one endpoint is allowed. Required.'
  name: endpoint_names
  types:
  - <xref:list>[<xref:str>]
- description: Used to specify whether a route is enabled. Required.
  name: is_enabled
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.iothub.models.RouteProperties.condition
  name: condition
  summary: 'The condition that is evaluated to apply the routing rule. If no condition
    is provided, it

    evaluates to true by default. For grammar, see:

    [https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language](https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language).'
  signature: 'condition: str | None'
- uid: azure.mgmt.iothub.models.RouteProperties.endpoint_names
  name: endpoint_names
  summary: 'The list of endpoints to which messages that satisfy the condition are
    routed. Currently only

    one endpoint is allowed. Required.'
  signature: 'endpoint_names: list[str]'
- uid: azure.mgmt.iothub.models.RouteProperties.is_enabled
  name: is_enabled
  summary: Used to specify whether a route is enabled. Required.
  signature: 'is_enabled: bool'
- uid: azure.mgmt.iothub.models.RouteProperties.name
  name: name
  summary: 'The name of the route. The name can only include alphanumeric characters,
    periods, underscores,

    hyphens, has a maximum length of 64 characters, and must be unique. Required.'
  signature: 'name: str'
- uid: azure.mgmt.iothub.models.RouteProperties.source
  name: source
  summary: 'The source that the routing rule is to be applied to, such as DeviceMessages.
    Required. Known

    values are: "Invalid", "DeviceMessages", "TwinChangeEvents", "DeviceLifecycleEvents",

    "DeviceJobLifecycleEvents", "DigitalTwinChangeEvents", "DeviceConnectionStateEvents",
    and

    "MqttBrokerMessages".'
  signature: 'source: str | _models.RoutingSource'
