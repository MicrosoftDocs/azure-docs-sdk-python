### YamlMime:PythonClass
uid: azure.mgmt.iothub.models.ExportDevicesRequest
name: ExportDevicesRequest
fullName: azure.mgmt.iothub.models.ExportDevicesRequest
module: azure.mgmt.iothub.models
summary: Use to provide parameters when requesting an export of all devices in the
  IoT hub.
constructor:
  syntax: 'ExportDevicesRequest(*args: Any, **kwargs: Any)'
variables:
- description: The export blob container URI. Required.
  name: export_blob_container_uri
  types:
  - <xref:str>
- description: 'The value indicating whether keys should be excluded during export.

    Required.'
  name: exclude_keys
  types:
  - <xref:bool>
- description: 'The name of the blob that will be created in the provided output blob

    container. This blob will contain the exported device registry information for
    the IoT Hub.'
  name: export_blob_name
  types:
  - <xref:str>
- description: 'Specifies authentication type being used for connecting to the

    storage account. Known values are: "keyBased" and "identityBased".'
  name: authentication_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.iothub.models.AuthenticationType>
- description: Managed identity properties of storage endpoint for export devices.
  name: identity
  types:
  - <xref:azure.mgmt.iothub.models.ManagedIdentity>
- description: The value indicating whether configurations should be exported.
  name: include_configurations
  types:
  - <xref:bool>
- description: 'The name of the blob that will be created in the provided

    output blob container. This blob will contain the exported configurations for
    the Iot Hub.'
  name: configurations_blob_name
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.iothub.models.ExportDevicesRequest.authentication_type
  name: authentication_type
  summary: 'Specifies authentication type being used for connecting to the storage
    account. Known values

    are: "keyBased" and "identityBased".'
  signature: 'authentication_type: str | _models.AuthenticationType | None'
- uid: azure.mgmt.iothub.models.ExportDevicesRequest.configurations_blob_name
  name: configurations_blob_name
  summary: 'The name of the blob that will be created in the provided output blob
    container. This blob will

    contain the exported configurations for the Iot Hub.'
  signature: 'configurations_blob_name: str | None'
- uid: azure.mgmt.iothub.models.ExportDevicesRequest.exclude_keys
  name: exclude_keys
  summary: The value indicating whether keys should be excluded during export. Required.
  signature: 'exclude_keys: bool'
- uid: azure.mgmt.iothub.models.ExportDevicesRequest.export_blob_container_uri
  name: export_blob_container_uri
  summary: The export blob container URI. Required.
  signature: 'export_blob_container_uri: str'
- uid: azure.mgmt.iothub.models.ExportDevicesRequest.export_blob_name
  name: export_blob_name
  summary: 'The name of the blob that will be created in the provided output blob
    container. This blob will

    contain the exported device registry information for the IoT Hub.'
  signature: 'export_blob_name: str | None'
- uid: azure.mgmt.iothub.models.ExportDevicesRequest.identity
  name: identity
  summary: Managed identity properties of storage endpoint for export devices.
  signature: 'identity: _models.ManagedIdentity | None'
- uid: azure.mgmt.iothub.models.ExportDevicesRequest.include_configurations
  name: include_configurations
  summary: The value indicating whether configurations should be exported.
  signature: 'include_configurations: bool | None'
