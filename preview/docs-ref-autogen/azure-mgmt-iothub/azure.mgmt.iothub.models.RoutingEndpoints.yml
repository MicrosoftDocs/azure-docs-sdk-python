### YamlMime:PythonClass
uid: azure.mgmt.iothub.models.RoutingEndpoints
name: RoutingEndpoints
fullName: azure.mgmt.iothub.models.RoutingEndpoints
module: azure.mgmt.iothub.models
summary: 'The properties related to the custom endpoints to which your IoT hub routes
  messages based on

  the routing rules. A maximum of 10 custom endpoints are allowed across all endpoint
  types for

  paid hubs and only 1 custom endpoint is allowed across all endpoint types for free
  hubs.'
constructor:
  syntax: 'RoutingEndpoints(*args: Any, **kwargs: Any)'
variables:
- description: 'The list of Service Bus queue endpoints that IoT hub routes the

    messages to, based on the routing rules.'
  name: service_bus_queues
  types:
  - <xref:list>[<xref:azure.mgmt.iothub.models.RoutingServiceBusQueueEndpointProperties>]
- description: 'The list of Service Bus topic endpoints that the IoT hub routes the

    messages to, based on the routing rules.'
  name: service_bus_topics
  types:
  - <xref:list>[<xref:azure.mgmt.iothub.models.RoutingServiceBusTopicEndpointProperties>]
- description: 'The list of Event Hubs endpoints that IoT hub routes messages to,
    based on

    the routing rules. This list does not include the built-in Event Hubs endpoint.'
  name: event_hubs
  types:
  - <xref:list>[<xref:azure.mgmt.iothub.models.RoutingEventHubProperties>]
- description: 'The list of storage container endpoints that IoT hub routes messages

    to, based on the routing rules.'
  name: storage_containers
  types:
  - <xref:list>[<xref:azure.mgmt.iothub.models.RoutingStorageContainerProperties>]
- description: 'The list of Cosmos DB container endpoints that IoT hub routes

    messages to, based on the routing rules.'
  name: cosmos_db_sql_containers
  types:
  - <xref:list>[<xref:azure.mgmt.iothub.models.RoutingCosmosDBSqlApiProperties>]
attributes:
- uid: azure.mgmt.iothub.models.RoutingEndpoints.cosmos_db_sql_containers
  name: cosmos_db_sql_containers
  summary: 'The list of Cosmos DB container endpoints that IoT hub routes messages
