  signature: 'cosmos_db_sql_containers: list[''_models.RoutingCosmosDBSqlApiProperties'']
    | None'
- uid: azure.mgmt.iothub.models.RoutingEndpoints.event_hubs
  name: event_hubs
  summary: 'The list of Event Hubs endpoints that IoT hub routes messages to, based
    on the routing rules.

    This list does not include the built-in Event Hubs endpoint.'
  signature: 'event_hubs: list[''_models.RoutingEventHubProperties''] | None'
- uid: azure.mgmt.iothub.models.RoutingEndpoints.service_bus_queues
  name: service_bus_queues
  summary: 'The list of Service Bus queue endpoints that IoT hub routes the messages
    to, based on the

    routing rules.'
  signature: 'service_bus_queues: list[''_models.RoutingServiceBusQueueEndpointProperties'']
