### YamlMime:PythonClass
uid: azure.mgmt.iothub.models.FallbackRouteProperties
name: FallbackRouteProperties
fullName: azure.mgmt.iothub.models.FallbackRouteProperties
module: azure.mgmt.iothub.models
summary: 'The properties of the fallback route. IoT Hub uses these properties when
  it routes messages to

  the fallback endpoint.'
constructor:
  syntax: 'FallbackRouteProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The name of the route. The name can only include alphanumeric characters,
    periods,

    underscores, hyphens, has a maximum length of 64 characters, and must be unique.'
  name: name
  types:
  - <xref:str>
- description: 'The source to which the routing rule is to be applied to. For example,

    DeviceMessages. Required. Known values are: "Invalid", "DeviceMessages", "TwinChangeEvents",

    "DeviceLifecycleEvents", "DeviceJobLifecycleEvents", "DigitalTwinChangeEvents",

    "DeviceConnectionStateEvents", and "MqttBrokerMessages".'
  name: source
  types:
  - <xref:str>
  - <xref:azure.mgmt.iothub.models.RoutingSource>
- description: 'The condition which is evaluated in order to apply the fallback route.
    If the

    condition is not provided it will evaluate to true by default. For grammar, See:

    [https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language](https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language).'
  name: condition
  types:
  - <xref:str>
- description: 'The list of endpoints to which the messages that satisfy the condition

    are routed to. Currently only 1 endpoint is allowed. Required.'
  name: endpoint_names
  types:
  - <xref:list>[<xref:str>]
- description: Used to specify whether the fallback route is enabled. Required.
  name: is_enabled
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.iothub.models.FallbackRouteProperties.condition
  name: condition
  summary: 'The condition which is evaluated in order to apply the fallback route.
    If the condition is not

    provided it will evaluate to true by default. For grammar, See:

    [https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language](https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-query-language).'
  signature: 'condition: str | None'
- uid: azure.mgmt.iothub.models.FallbackRouteProperties.endpoint_names
  name: endpoint_names
  summary: 'The list of endpoints to which the messages that satisfy the condition
    are routed to. Currently

    only 1 endpoint is allowed. Required.'
  signature: 'endpoint_names: list[str]'
- uid: azure.mgmt.iothub.models.FallbackRouteProperties.is_enabled
  name: is_enabled
  summary: Used to specify whether the fallback route is enabled. Required.
  signature: 'is_enabled: bool'
- uid: azure.mgmt.iothub.models.FallbackRouteProperties.name
  name: name
  summary: 'The name of the route. The name can only include alphanumeric characters,
    periods, underscores,

    hyphens, has a maximum length of 64 characters, and must be unique.'
  signature: 'name: str | None'
- uid: azure.mgmt.iothub.models.FallbackRouteProperties.source
  name: source
  summary: 'The source to which the routing rule is to be applied to. For example,
    DeviceMessages.

    Required. Known values are: "Invalid", "DeviceMessages", "TwinChangeEvents",

    "DeviceLifecycleEvents", "DeviceJobLifecycleEvents", "DigitalTwinChangeEvents",

    "DeviceConnectionStateEvents", and "MqttBrokerMessages".'
  signature: 'source: str | _models.RoutingSource'
