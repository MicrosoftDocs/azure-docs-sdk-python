### YamlMime:PythonClass
uid: azure.mgmt.iothub.models.RoutingProperties
name: RoutingProperties
fullName: azure.mgmt.iothub.models.RoutingProperties
module: azure.mgmt.iothub.models
summary: 'The routing related properties of the IoT hub. See:

  [https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-messaging](https://docs.microsoft.com/azure/iot-hub/iot-hub-devguide-messaging).'
constructor:
  syntax: 'RoutingProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The properties related to the custom endpoints to which your IoT hub
    routes

    messages based on the routing rules. A maximum of 10 custom endpoints are allowed
    across all

    endpoint types for paid hubs and only 1 custom endpoint is allowed across all
    endpoint types

    for free hubs.'
  name: endpoints
  types:
  - <xref:azure.mgmt.iothub.models.RoutingEndpoints>
- description: 'The list of user-provided routing rules that the IoT hub uses to route
    messages

    to built-in and custom endpoints. A maximum of 100 routing rules are allowed for
    paid hubs and

    a maximum of 5 routing rules are allowed for free hubs.'
  name: routes
  types:
  - <xref:list>[<xref:azure.mgmt.iothub.models.RouteProperties>]
- description: 'The properties of the route that is used as a fall-back route when
    none

    of the conditions specified in the ''routes'' section are met. This is an optional
    parameter.

    When this property is not set, the messages which do not meet any of the conditions
    specified

    in the ''routes'' section get routed to the built-in eventhub endpoint.'
  name: fallback_route
  types:
  - <xref:azure.mgmt.iothub.models.FallbackRouteProperties>
- description: 'The list of user-provided enrichments that the IoT hub applies to
    messages

    to be delivered to built-in and custom endpoints. See: [https://aka.ms/telemetryoneventgrid](https://aka.ms/telemetryoneventgrid).'
  name: enrichments
  types:
  - <xref:list>[<xref:azure.mgmt.iothub.models.EnrichmentProperties>]
attributes:
- uid: azure.mgmt.iothub.models.RoutingProperties.endpoints
  name: endpoints
  summary: 'The properties related to the custom endpoints to which your IoT hub routes
    messages based on

    the routing rules. A maximum of 10 custom endpoints are allowed across all endpoint
    types for

    paid hubs and only 1 custom endpoint is allowed across all endpoint types for
    free hubs.'
  signature: 'endpoints: _models.RoutingEndpoints | None'
- uid: azure.mgmt.iothub.models.RoutingProperties.enrichments
  name: enrichments
  summary: 'The list of user-provided enrichments that the IoT hub applies to messages
    to be delivered to

    built-in and custom endpoints. See: [https://aka.ms/telemetryoneventgrid](https://aka.ms/telemetryoneventgrid).'
  signature: 'enrichments: list[''_models.EnrichmentProperties''] | None'
- uid: azure.mgmt.iothub.models.RoutingProperties.fallback_route
  name: fallback_route
  summary: 'The properties of the route that is used as a fall-back route when none
    of the conditions

    specified in the ''routes'' section are met. This is an optional parameter. When
    this property is

    not set, the messages which do not meet any of the conditions specified in the
    ''routes'' section

    get routed to the built-in eventhub endpoint.'
  signature: 'fallback_route: _models.FallbackRouteProperties | None'
- uid: azure.mgmt.iothub.models.RoutingProperties.routes
  name: routes
  summary: 'The list of user-provided routing rules that the IoT hub uses to route
    messages to built-in and

    custom endpoints. A maximum of 100 routing rules are allowed for paid hubs and
    a maximum of 5

    routing rules are allowed for free hubs.'
  signature: 'routes: list[''_models.RouteProperties''] | None'
