### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder
name: OutputItemReasoningItemBuilder
fullName: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder
module: azure.ai.agentserver.responses.streaming
summary: 'Scoped builder for reasoning output items with summary part support.


  Initialize the reasoning output item builder.'
constructor:
  syntax: 'OutputItemReasoningItemBuilder(stream: ResponseEventStream, output_index:
    int, item_id: str)'
  parameters:
  - name: stream
    description: The parent event stream.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ResponseEventStream>
  - name: output_index
    description: Zero-based index of this output item.
    isRequired: true
    types:
    - <xref:int>
  - name: item_id
    description: Unique identifier for this output item.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.add_summary_part
  name: add_summary_part
  summary: Create and return a reasoning summary part builder.
  signature: add_summary_part() -> ReasoningSummaryPartBuilder
  return:
    description: A new summary part builder scoped to this reasoning item.
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder>
- uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.asummary_part
  name: asummary_part
  summary: 'Async variant of <xref:azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.summary_part>
    with streaming support.


    When *text* is a string, behaves identically to <xref:azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.summary_part>.

    When *text* is an async iterable of string chunks, emits one

    `reasoning_summary_text.delta` per chunk in real time (S-055),

    then `reasoning_summary_text.done` with the accumulated text.'
  signature: 'async asummary_part(text: str | AsyncIterable[str]) -> AsyncIterator[ResponseStreamEvent]'
  parameters:
  - name: text
    description: Complete summary text or async iterable of text chunks.
    isRequired: true
    types:
    - <xref:str> | <xref:typing.AsyncIterable>[<xref:str>]
  return:
    description: An async iterator of events.
    types:
    - <xref:typing.AsyncIterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.emit_added
  name: emit_added
  summary: Emit an `output_item.added` event for this reasoning item.
  signature: emit_added() -> ResponseOutputItemAddedEvent
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemAddedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.emit_done
  name: emit_done
  summary: Emit an `output_item.done` event for this reasoning item.
  signature: emit_done() -> ResponseOutputItemDoneEvent
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.summary_part
  name: summary_part
  summary: 'Yield the full lifecycle for a reasoning summary part.


    Creates the sub-builder, emits `reasoning_summary_part.added`,

    `reasoning_summary_text.delta`, `reasoning_summary_text.done`,

    and `reasoning_summary_part.done`.'
  signature: 'summary_part(text: str) -> Iterator[ResponseStreamEvent]'
  parameters:
  - name: text
    description: The complete summary text.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: An iterator of events.
    types:
    - <xref:typing.Iterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
attributes:
- uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.item_id
  name: item_id
  summary: Return the output item identifier.
  return:
    description: The item ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemReasoningItemBuilder.output_index
  name: output_index
  summary: Return the zero-based output index.
  return:
    description: The output index.
    types:
    - <xref:int>
