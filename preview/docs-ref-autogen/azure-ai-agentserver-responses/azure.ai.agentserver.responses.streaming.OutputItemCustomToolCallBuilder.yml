### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder
name: OutputItemCustomToolCallBuilder
fullName: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder
module: azure.ai.agentserver.responses.streaming
summary: 'Scoped builder for custom tool call events.


  Initialize the custom tool call builder.'
constructor:
  syntax: 'OutputItemCustomToolCallBuilder(stream: ResponseEventStream, output_index:
    int, item_id: str, call_id: str, name: str)'
  parameters:
  - name: stream
    description: The parent event stream.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ResponseEventStream>
  - name: output_index
    description: Zero-based index of this output item.
    isRequired: true
    types:
    - <xref:int>
  - name: item_id
    description: Unique identifier for this output item.
    isRequired: true
    types:
    - <xref:str>
  - name: call_id
    description: Unique identifier for this tool call.
    isRequired: true
    types:
    - <xref:str>
  - name: name
    description: Name of the custom tool being called.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.ainput
  name: ainput
  summary: 'Async variant of <xref:azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.input>
    with streaming support.


    When *input_text* is a string, behaves identically to <xref:azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.input>.

    When *input_text* is an async iterable of string chunks, emits one

    `custom_tool_call_input.delta` per chunk in real time (S-055),

    then `custom_tool_call_input.done` with the accumulated text.'
  signature: 'async ainput(input_text: str | AsyncIterable[str]) -> AsyncIterator[ResponseStreamEvent]'
  parameters:
  - name: input_text
    description: Complete input text or async iterable of chunks.
    isRequired: true
    types:
    - <xref:str> | <xref:typing.AsyncIterable>[<xref:str>]
  return:
    description: An async iterator of event dicts.
    types:
    - <xref:typing.AsyncIterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.emit_added
  name: emit_added
  summary: Emit an `output_item.added` event for a custom tool call.
  signature: emit_added() -> ResponseOutputItemAddedEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemAddedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.emit_done
  name: emit_done
  summary: Emit an `output_item.done` event for this custom tool call.
  signature: emit_done() -> ResponseOutputItemDoneEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.emit_input_delta
  name: emit_input_delta
  summary: Emit a custom tool call input delta event.
  signature: 'emit_input_delta(delta: str) -> ResponseCustomToolCallInputDeltaEvent'
  parameters:
  - name: delta
    description: The incremental input text fragment.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseCustomToolCallInputDeltaEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.emit_input_done
  name: emit_input_done
  summary: Emit a custom tool call input done event.
  signature: 'emit_input_done(input_text: str) -> ResponseCustomToolCallInputDoneEvent'
  parameters:
  - name: input_text
    description: The final, complete input text.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseCustomToolCallInputDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.input
  name: input
  summary: 'Yield the input delta and input done events.


    Emits `custom_tool_call_input.delta` followed by

    `custom_tool_call_input.done`.'
  signature: 'input(input_text: str) -> Iterator[ResponseStreamEvent]'
  parameters:
  - name: input_text
    description: The complete input text.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: An iterator of event dicts.
    types:
    - <xref:typing.Iterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
attributes:
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.call_id
  name: call_id
  summary: Return the tool call identifier.
  return:
    description: The call ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.item_id
  name: item_id
  summary: Return the output item identifier.
  return:
    description: The item ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.name
  name: name
  summary: Return the custom tool name.
  return:
    description: The tool name.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCustomToolCallBuilder.output_index
  name: output_index
  summary: Return the zero-based output index.
  return:
    description: The output index.
    types:
    - <xref:int>
