### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.ResponseStreamProviderProtocol
name: ResponseStreamProviderProtocol
fullName: azure.ai.agentserver.responses.ResponseStreamProviderProtocol
module: azure.ai.agentserver.responses
summary: 'Protocol for providers that can persist and replay SSE stream events.


  Implement this protocol alongside <xref:azure.ai.agentserver.responses.ResponseProviderProtocol>
  to enable

  SSE replay for responses that are no longer resident in the in-process runtime

  state (for example, after a process restart).'
constructor:
  syntax: ResponseStreamProviderProtocol(*args, **kwargs)
methods:
- uid: azure.ai.agentserver.responses.ResponseStreamProviderProtocol.delete_stream_events
  name: delete_stream_events
  summary: 'Delete persisted SSE events for a response.


    Called when a response is deleted via `DELETE /responses/{id}`.

    Implementations should remove any stored event data for the given

    response. No-op if no events exist for the ID.'
  signature: 'async delete_stream_events(response_id: str, *, isolation: IsolationContext
    | None = None) -> None'
  parameters:
  - name: response_id
    description: The unique identifier of the response whose events to remove.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: isolation
    description: Isolation context for multi-tenant partitioning.
    defaultValue: None
    types:
    - <xref:azure.ai.agentserver.responses.IsolationContext> | <xref:None>
  return:
    types:
    - <xref:None>
- uid: azure.ai.agentserver.responses.ResponseStreamProviderProtocol.get_stream_events
  name: get_stream_events
  summary: Retrieve the persisted SSE events for a response.
  signature: 'async get_stream_events(response_id: str, *, isolation: IsolationContext
    | None = None) -> list[ResponseStreamEvent] | None'
  parameters:
  - name: response_id
    description: The unique identifier of the response whose events to retrieve.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: isolation
    description: Isolation context for multi-tenant partitioning.
    defaultValue: None
    types:
    - <xref:azure.ai.agentserver.responses.IsolationContext> | <xref:None>
  return:
    description: The ordered list of event instances, or `None` if not found.
    types:
    - <xref:list>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
      | <xref:None>
- uid: azure.ai.agentserver.responses.ResponseStreamProviderProtocol.save_stream_events
  name: save_stream_events
  summary: 'Persist the complete ordered list of SSE events for a response.


    Called once when the background+stream response reaches terminal state.

    The *events* list contains `ResponseStreamEvent` model instances.'
  signature: 'async save_stream_events(response_id: str, events: list[ResponseStreamEvent],
    *, isolation: IsolationContext | None = None) -> None'
  parameters:
  - name: response_id
    description: The unique identifier of the response.
    isRequired: true
    types:
    - <xref:str>
  - name: events
    description: Ordered list of event instances to persist.
    isRequired: true
    types:
    - <xref:list>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
  keywordOnlyParameters:
  - name: isolation
    description: Isolation context for multi-tenant partitioning.
    defaultValue: None
    types:
    - <xref:azure.ai.agentserver.responses.IsolationContext> | <xref:None>
  return:
    types:
    - <xref:None>
