### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder
name: OutputItemCodeInterpreterCallBuilder
fullName: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder
module: azure.ai.agentserver.responses.streaming
summary: 'Scoped builder for code interpreter tool call events.


  Initialize the code-interpreter call builder.'
constructor:
  syntax: 'OutputItemCodeInterpreterCallBuilder(stream: ResponseEventStream, output_index:
    int, item_id: str)'
  parameters:
  - name: stream
    description: The parent event stream.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ResponseEventStream>
  - name: output_index
    description: Zero-based index of this output item.
    isRequired: true
    types:
    - <xref:int>
  - name: item_id
    description: Unique identifier for this output item.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.acode
  name: acode
  summary: 'Async variant of <xref:azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.code>
    with streaming support.


    When *code_text* is a string, behaves identically to <xref:azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.code>.

    When *code_text* is an async iterable of string chunks, emits one

    `code_interpreter_call.code.delta` per chunk in real time (S-055),

    then `code_interpreter_call.code.done` with the accumulated text.'
  signature: 'async acode(code_text: str | AsyncIterable[str]) -> AsyncIterator[ResponseStreamEvent]'
  parameters:
  - name: code_text
    description: Complete code string or async iterable of chunks.
    isRequired: true
    types:
    - <xref:str> | <xref:typing.AsyncIterable>[<xref:str>]
  return:
    description: An async iterator of event dicts.
    types:
    - <xref:typing.AsyncIterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.code
  name: code
  summary: 'Yield the code delta and code done events.


    Emits `code_interpreter_call.code.delta` followed by

    `code_interpreter_call.code.done`.'
  signature: 'code(code_text: str) -> Iterator[ResponseStreamEvent]'
  parameters:
  - name: code_text
    description: The complete code string.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: An iterator of event dicts.
    types:
    - <xref:typing.Iterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.emit_added
  name: emit_added
  summary: Emit an `output_item.added` event for a code interpreter call.
  signature: emit_added() -> ResponseOutputItemAddedEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemAddedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.emit_code_delta
  name: emit_code_delta
  summary: Emit a code-interpreter code delta event.
  signature: 'emit_code_delta(delta: str) -> ResponseCodeInterpreterCallCodeDeltaEvent'
  parameters:
  - name: delta
    description: The incremental code fragment.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseCodeInterpreterCallCodeDeltaEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.emit_code_done
  name: emit_code_done
  summary: Emit a code-interpreter code done event.
  signature: 'emit_code_done(code: str) -> ResponseCodeInterpreterCallCodeDoneEvent'
  parameters:
  - name: code
    description: The final, complete code string.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseCodeInterpreterCallCodeDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.emit_completed
  name: emit_completed
  summary: Emit a code-interpreter completed state event.
  signature: emit_completed() -> ResponseCodeInterpreterCallCompletedEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseCodeInterpreterCallCompletedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.emit_done
  name: emit_done
  summary: Emit an `output_item.done` event for this code interpreter call.
  signature: emit_done() -> ResponseOutputItemDoneEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.emit_in_progress
  name: emit_in_progress
  summary: Emit a code-interpreter in-progress state event.
  signature: emit_in_progress() -> ResponseCodeInterpreterCallInProgressEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseCodeInterpreterCallInProgressEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.emit_interpreting
  name: emit_interpreting
  summary: Emit a code-interpreter interpreting state event.
  signature: emit_interpreting() -> ResponseCodeInterpreterCallInterpretingEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseCodeInterpreterCallInterpretingEvent>
attributes:
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.item_id
  name: item_id
  summary: Return the output item identifier.
  return:
    description: The item ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemCodeInterpreterCallBuilder.output_index
  name: output_index
  summary: Return the zero-based output index.
  return:
    description: The output index.
    types:
    - <xref:int>
