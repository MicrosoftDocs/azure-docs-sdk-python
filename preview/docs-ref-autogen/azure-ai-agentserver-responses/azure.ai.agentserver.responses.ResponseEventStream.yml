    description: Unique identifier for the response. Inferred from *response* if omitted.
    isRequired: true
    types:
    - <xref:str> | <xref:None>
  - name: agent_reference
    description: Optional agent reference model.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.AgentReference> | <xref:None>
  - name: model
    description: Optional model identifier to stamp on the response.
    isRequired: true
    types:
    - <xref:str> | <xref:None>
  - name: request
    description: Optional create-response request to seed the response envelope from.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models._generated.CreateResponse> | <xref:None>
  - name: response
    description: Optional pre-existing response envelope to build upon.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models._generated.ResponseObject> | <xref:None>
  keywordOnlyParameters:
  - name: response_id
    defaultValue: None
  - name: agent_reference
    defaultValue: None
  - name: model
    defaultValue: None
  - name: request
    defaultValue: None
  - name: response
    defaultValue: None
