- uid: azure.ai.agentserver.responses.ResponseEventStream.aoutput_item_function_call
  name: aoutput_item_function_call
  summary: 'Async variant of <xref:azure.ai.agentserver.responses.ResponseEventStream.output_item_function_call>
    with streaming support.


    When *arguments* is a string, emits the same events as the sync variant.

    When *arguments* is an async iterable of string chunks, emits one

    `function_call_arguments.delta` per chunk in real time.'
  signature: 'async aoutput_item_function_call(name: str, call_id: str, arguments:
    str | AsyncIterable[str]) -> AsyncIterator[ResponseStreamEvent]'
  parameters:
  - name: name
    description: The function name being called.
    isRequired: true
    types:
    - <xref:str>
  - name: call_id
    description: Unique identifier for this function call.
    isRequired: true
    types:
    - <xref:str>
  - name: arguments
    description: Complete arguments string or async iterable of chunks.
    isRequired: true
    types:
    - <xref:str> | <xref:typing.AsyncIterable>[<xref:str>]
  return:
    description: An async iterator of events.
    types:
    - <xref:typing.AsyncIterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
