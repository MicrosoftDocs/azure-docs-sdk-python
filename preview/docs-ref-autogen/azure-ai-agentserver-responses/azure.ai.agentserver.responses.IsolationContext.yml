### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.IsolationContext
name: IsolationContext
fullName: azure.ai.agentserver.responses.IsolationContext
module: azure.ai.agentserver.responses
summary: "Platform-injected isolation keys for multi-tenant state partitioning.\n\n\
  The Foundry hosting platform injects `x-agent-user-isolation-key` and\n`x-agent-chat-isolation-key`\
  \ headers on every protocol request (not on\nhealth probes).  These opaque strings\
  \ serve as partition keys:\n\n* `user_key` \u2014 unique per user across all sessions;\
  \ use for user-private state. \n\n* `chat_key` \u2014 represents where conversation\
  \ state lives; in 1:1 chats the two keys are equal. \n\nWhen the headers are absent\
  \ (e.g. local development), both keys are `None`.\nWhen the platform sends the header\
  \ with an empty value, the key is an empty\nstring.  Use `is None` to detect whether\
  \ the header was present at all."
constructor:
  syntax: 'IsolationContext(*, user_key: str | None = None, chat_key: str | None =
    None)'
  keywordOnlyParameters:
  - name: user_key
    defaultValue: None
  - name: chat_key
    defaultValue: None
attributes:
- uid: azure.ai.agentserver.responses.IsolationContext.chat_key
  name: chat_key
  summary: 'Partition key for conversation/shared state (from `x-agent-chat-isolation-key`).

    `None` when the header was not sent.'
- uid: azure.ai.agentserver.responses.IsolationContext.user_key
  name: user_key
  summary: 'Partition key for user-private state (from `x-agent-user-isolation-key`).

    `None` when the header was not sent.'
