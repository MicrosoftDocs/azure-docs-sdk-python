### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.streaming.OutputItemBuilder
name: OutputItemBuilder
fullName: azure.ai.agentserver.responses.streaming.OutputItemBuilder
module: azure.ai.agentserver.responses.streaming
summary: 'Generic output-item builder for item types without dedicated scoped builders.


  Initialize the base output-item builder.'
constructor:
  syntax: 'OutputItemBuilder(stream: ResponseEventStream, output_index: int, item_id:
    str)'
  parameters:
  - name: stream
    description: The parent event stream to emit events into.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ResponseEventStream>
  - name: output_index
    description: The zero-based index of this output item.
    isRequired: true
    types:
    - <xref:int>
  - name: item_id
    description: Unique identifier for this output item.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.responses.streaming.OutputItemBuilder.emit_added
  name: emit_added
  summary: Emit an `output_item.added` event for a generic item.
  signature: 'emit_added(item: OutputItem) -> ResponseOutputItemAddedEvent'
  parameters:
  - name: item
    description: The output item model instance.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.OutputItem>
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemAddedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemBuilder.emit_done
  name: emit_done
  summary: Emit an `output_item.done` event for a generic item.
  signature: 'emit_done(item: OutputItem) -> ResponseOutputItemDoneEvent'
  parameters:
  - name: item
    description: The completed output item model instance.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.OutputItem>
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemDoneEvent>
attributes:
- uid: azure.ai.agentserver.responses.streaming.OutputItemBuilder.item_id
  name: item_id
  summary: Return the output item identifier.
  return:
    description: The item ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemBuilder.output_index
  name: output_index
  summary: Return the zero-based output index.
  return:
    description: The output index.
    types:
    - <xref:int>
