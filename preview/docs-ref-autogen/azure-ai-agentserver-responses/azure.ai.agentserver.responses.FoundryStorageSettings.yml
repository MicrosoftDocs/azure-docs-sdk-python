### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.FoundryStorageSettings
name: FoundryStorageSettings
fullName: azure.ai.agentserver.responses.FoundryStorageSettings
module: azure.ai.agentserver.responses
summary: Immutable runtime configuration for <xref:azure.ai.agentserver.responses.FoundryStorageProvider>.
constructor:
  syntax: 'FoundryStorageSettings(*, storage_base_url: str)'
  keywordOnlyParameters:
  - name: storage_base_url
    isRequired: true
methods:
- uid: azure.ai.agentserver.responses.FoundryStorageSettings.build_url
  name: build_url
  summary: Build a full storage API URL for *path* with `api-version` appended.
  signature: 'build_url(path: str, **extra_params: str) -> str'
  parameters:
  - name: path
    description: The resource path segment, e.g. `responses/abc123`.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The complete URL string.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.FoundryStorageSettings.from_endpoint
  name: from_endpoint
  summary: Create settings from an explicit project endpoint URL.
  signature: 'from_endpoint(endpoint: str) -> FoundryStorageSettings'
  parameters:
  - name: endpoint
    description: Foundry project endpoint URL (e.g. `https://myproject.foundry.azure.com`).
    isRequired: true
    types:
    - <xref:str>
  return:
    description: A new <xref:azure.ai.agentserver.responses.FoundryStorageSettings>.
    types:
    - <xref:azure.ai.agentserver.responses.FoundryStorageSettings>
  exceptions:
  - type: ValueError
    description: If the endpoint is empty or not a valid absolute URL.
- uid: azure.ai.agentserver.responses.FoundryStorageSettings.from_env
  name: from_env
  summary: Create settings by reading the `FOUNDRY_PROJECT_ENDPOINT` environment variable.
  signature: from_env() -> FoundryStorageSettings
  return:
    description: A new <xref:azure.ai.agentserver.responses.FoundryStorageSettings>
      configured from the environment.
    types:
    - <xref:azure.ai.agentserver.responses.FoundryStorageSettings>
  exceptions:
  - type: EnvironmentError
    description: If the variable is missing or empty.
  - type: ValueError
    description: If the variable does not contain a valid absolute URL.
