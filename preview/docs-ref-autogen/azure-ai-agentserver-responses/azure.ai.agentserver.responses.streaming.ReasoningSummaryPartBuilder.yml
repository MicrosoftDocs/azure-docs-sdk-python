### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder
name: ReasoningSummaryPartBuilder
fullName: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder
module: azure.ai.agentserver.responses.streaming
summary: 'Scoped builder for a single reasoning summary part.


  Initialize the reasoning summary part builder.'
constructor:
  syntax: 'ReasoningSummaryPartBuilder(stream: ResponseEventStream, output_index:
    int, summary_index: int, item_id: str)'
  parameters:
  - name: stream
    description: The parent event stream.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ResponseEventStream>
  - name: output_index
    description: Zero-based index of the parent output item.
    isRequired: true
    types:
    - <xref:int>
  - name: summary_index
    description: Zero-based index of this summary part.
    isRequired: true
    types:
    - <xref:int>
  - name: item_id
    description: Identifier of the parent output item.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder.emit_added
  name: emit_added
  summary: Emit a `reasoning_summary_part.added` event.
  signature: emit_added() -> ResponseReasoningSummaryPartAddedEvent
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseReasoningSummaryPartAddedEvent>
  exceptions:
  - type: ValueError
    description: If the builder is not in `NOT_STARTED` state.
- uid: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder.emit_done
  name: emit_done
  summary: Emit a `reasoning_summary_part.done` event.
  signature: emit_done() -> ResponseReasoningSummaryPartDoneEvent
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseReasoningSummaryPartDoneEvent>
  exceptions:
  - type: ValueError
    description: If the builder is not in `ADDED` state.
- uid: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder.emit_text_delta
  name: emit_text_delta
  summary: Emit a reasoning summary text delta event.
  signature: 'emit_text_delta(text: str) -> ResponseReasoningSummaryTextDeltaEvent'
  parameters:
  - name: text
    description: The incremental summary text fragment.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseReasoningSummaryTextDeltaEvent>
- uid: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder.emit_text_done
  name: emit_text_done
  summary: Emit a reasoning summary text done event.
  signature: 'emit_text_done(final_text: str) -> ResponseReasoningSummaryTextDoneEvent'
  parameters:
  - name: final_text
    description: The final, complete summary text.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseReasoningSummaryTextDoneEvent>
attributes:
- uid: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder.final_text
  name: final_text
  summary: Return the final summary text, or `None` if not yet done.
  return:
    description: The final text string.
    types:
    - <xref:str> | <xref:None>
- uid: azure.ai.agentserver.responses.streaming.ReasoningSummaryPartBuilder.summary_index
  name: summary_index
  summary: Return the zero-based summary part index.
  return:
    description: The summary index.
    types:
    - <xref:int>
