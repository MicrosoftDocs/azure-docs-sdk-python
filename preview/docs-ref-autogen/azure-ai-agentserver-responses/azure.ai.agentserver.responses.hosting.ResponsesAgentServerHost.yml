uid: azure.ai.agentserver.responses.hosting.ResponsesAgentServerHost
name: ResponsesAgentServerHost
fullName: azure.ai.agentserver.responses.hosting.ResponsesAgentServerHost
module: azure.ai.agentserver.responses.hosting
summary: "Responses protocol host for Azure AI Hosted Agents.\n\nA <xref:azure.ai.agentserver.core.AgentServerHost>\
  \ subclass that adds\nthe Responses API endpoints.  Use the <xref:azure.ai.agentserver.responses.hosting.ResponsesAgentServerHost.response_handler>\
  \ decorator\nto wire a handler function to the create endpoint.\n\nFor multi-protocol\
  \ agents, compose via cooperative inheritance:\n\n<!-- literal_block {\"ids\": [],\
  \ \"classes\": [], \"names\": [], \"dupnames\": [], \"backrefs\": [], \"xml:space\"\
  : \"preserve\", \"language\": \"default\", \"force\": false, \"linenos\": false}\
  \ -->\n\n````default\n\n   class MyHost(InvocationAgentServerHost, ResponsesAgentServerHost):\n\
  \       pass\n   ````\n\nUsage:\n\n<!-- literal_block {\"ids\": [], \"classes\"\
  : [], \"names\": [], \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\"\
  , \"language\": \"default\", \"force\": false, \"linenos\": false} -->\n\n````default\n\
  \n   from azure.ai.agentserver.responses import ResponsesAgentServerHost\n\n   app\
  \ = ResponsesAgentServerHost()\n\n   @app.response_handler\n   def my_handler(request,\
  \ context, cancellation_signal):\n       yield event\n\n   app.run()\n   ````"
