  summary: "Register a function as the create-response handler.\n\nThe handler function\
    \ must accept exactly three positional parameters:\n`(request, context, cancellation_signal)`\
    \ and return an\n`AsyncIterable` of response stream events.\n\nUsage:\n\n<!--\
    \ literal_block {\"ids\": [], \"classes\": [], \"names\": [], \"dupnames\": [],\
    \ \"backrefs\": [], \"xml:space\": \"preserve\", \"language\": \"default\", \"\
    force\": false, \"linenos\": false} -->\n\n````default\n\n   @app.response_handler\n\
    \   def my_handler(request, context, cancellation_signal):\n       yield event\n\
    \   ````"
  signature: 'response_handler(fn: Callable[[CreateResponse, ResponseContext, Event],
    AsyncIterable[ResponseStreamEvent | dict[str, Any]] | Generator[ResponseStreamEvent
    | dict[str, Any], Any, None] | Awaitable[AsyncIterable[ResponseStreamEvent | dict[str,
    Any]]]]) -> Callable[[CreateResponse, ResponseContext, Event], AsyncIterable[ResponseStreamEvent
    | dict[str, Any]] | Generator[ResponseStreamEvent | dict[str, Any], Any, None]
    | Awaitable[AsyncIterable[ResponseStreamEvent | dict[str, Any]]]]'
  parameters:
  - name: fn
    description: A callable accepting (request, context, cancellation_signal).
    isRequired: true
    types:
    - <xref:CreateHandlerFn>
  return:
    description: The original function (unmodified).
    types:
    - <xref:CreateHandlerFn>
