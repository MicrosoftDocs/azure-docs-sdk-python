### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder
name: OutputItemMcpCallBuilder
fullName: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder
module: azure.ai.agentserver.responses.streaming
summary: 'Scoped builder for MCP tool call events.


  Initialize the MCP call builder.'
constructor:
  syntax: 'OutputItemMcpCallBuilder(stream: ResponseEventStream, output_index: int,
    item_id: str, server_label: str, name: str)'
  parameters:
  - name: stream
    description: The parent event stream.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ResponseEventStream>
  - name: output_index
    description: Zero-based index of this output item.
    isRequired: true
    types:
    - <xref:int>
  - name: item_id
    description: Unique identifier for this output item.
    isRequired: true
    types:
    - <xref:str>
  - name: server_label
    description: Label identifying the MCP server.
    isRequired: true
    types:
    - <xref:str>
  - name: name
    description: Name of the MCP tool being called.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.aarguments
  name: aarguments
  summary: 'Async variant of <xref:azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.arguments>
    with streaming support.


    When *args* is a string, behaves identically to <xref:azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.arguments>.

    When *args* is an async iterable of string chunks, emits one

    `mcp_call_arguments.delta` per chunk in real time (S-055),

    then `mcp_call_arguments.done` with the accumulated text.'
  signature: 'async aarguments(args: str | AsyncIterable[str]) -> AsyncIterator[ResponseStreamEvent]'
  parameters:
  - name: args
    description: Complete arguments string or async iterable of chunks.
    isRequired: true
    types:
    - <xref:str> | <xref:typing.AsyncIterable>[<xref:str>]
  return:
    description: An async iterator of event dicts.
    types:
    - <xref:typing.AsyncIterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.arguments
  name: arguments
  summary: 'Yield the argument delta and done events.


    Emits `mcp_call_arguments.delta` followed by

    `mcp_call_arguments.done`.'
  signature: 'arguments(args: str) -> Iterator[ResponseStreamEvent]'
  parameters:
  - name: args
    description: The complete arguments string.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: An iterator of event dicts.
    types:
    - <xref:typing.Iterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.emit_added
  name: emit_added
  summary: Emit an `output_item.added` event for an MCP call.
  signature: emit_added() -> ResponseOutputItemAddedEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemAddedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.emit_arguments_delta
  name: emit_arguments_delta
  summary: Emit an MCP call arguments delta event.
  signature: 'emit_arguments_delta(delta: str) -> ResponseMCPCallArgumentsDeltaEvent'
  parameters:
  - name: delta
    description: The incremental arguments text fragment.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseMCPCallArgumentsDeltaEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.emit_arguments_done
  name: emit_arguments_done
  summary: Emit an MCP call arguments done event.
  signature: 'emit_arguments_done(arguments: str) -> ResponseMCPCallArgumentsDoneEvent'
  parameters:
  - name: arguments
    description: The final, complete arguments string.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseMCPCallArgumentsDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.emit_completed
  name: emit_completed
  summary: Emit an MCP call completed state event.
  signature: emit_completed() -> ResponseMCPCallCompletedEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseMCPCallCompletedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.emit_done
  name: emit_done
  summary: 'Emit an `output_item.done` event for this MCP call.


    The `status` field reflects the most recent terminal state event

    (`emit_completed` or `emit_failed`). Defaults to `"completed"`

    if neither was called.'
  signature: emit_done() -> ResponseOutputItemDoneEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.emit_failed
  name: emit_failed
  summary: Emit an MCP call failed state event.
  signature: emit_failed() -> ResponseMCPCallFailedEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseMCPCallFailedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.emit_in_progress
  name: emit_in_progress
  summary: Emit an MCP call in-progress state event.
  signature: emit_in_progress() -> ResponseMCPCallInProgressEvent
  return:
    description: The emitted event dict.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseMCPCallInProgressEvent>
attributes:
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.item_id
  name: item_id
  summary: Return the output item identifier.
  return:
    description: The item ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.name
  name: name
  summary: Return the MCP tool name.
  return:
    description: The tool name.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.output_index
  name: output_index
  summary: Return the zero-based output index.
  return:
    description: The output index.
    types:
    - <xref:int>
- uid: azure.ai.agentserver.responses.streaming.OutputItemMcpCallBuilder.server_label
  name: server_label
  summary: Return the MCP server label.
  return:
    description: The server label.
    types:
    - <xref:str>
