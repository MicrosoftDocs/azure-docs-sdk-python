### YamlMime:PythonClass
uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder
name: OutputItemFunctionCallBuilder
fullName: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder
module: azure.ai.agentserver.responses.streaming
summary: 'Scoped builder for a function-call output item in stream mode.


  Initialize the function-call output item builder.'
constructor:
  syntax: 'OutputItemFunctionCallBuilder(stream: ResponseEventStream, output_index:
    int, item_id: str, name: str, call_id: str)'
  parameters:
  - name: stream
    description: The parent event stream.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.streaming.ResponseEventStream>
  - name: output_index
    description: Zero-based index of this output item.
    isRequired: true
    types:
    - <xref:int>
  - name: item_id
    description: Unique identifier for this output item.
    isRequired: true
    types:
    - <xref:str>
  - name: name
    description: The function name being called.
    isRequired: true
    types:
    - <xref:str>
  - name: call_id
    description: Unique identifier for this function call.
    isRequired: true
    types:
    - <xref:str>
methods:
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.aarguments
  name: aarguments
  summary: 'Async variant of <xref:azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.arguments>
    with streaming support.


    When *args* is a string, behaves identically to <xref:azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.arguments>.

    When *args* is an async iterable of string chunks, emits one

    `function_call_arguments.delta` per chunk in real time (S-055),

    then `function_call_arguments.done` with the accumulated text.'
  signature: 'async aarguments(args: str | AsyncIterable[str]) -> AsyncIterator[ResponseStreamEvent]'
  parameters:
  - name: args
    description: Complete arguments string or async iterable of chunks.
    isRequired: true
    types:
    - <xref:str> | <xref:typing.AsyncIterable>[<xref:str>]
  return:
    description: An async iterator of events.
    types:
    - <xref:typing.AsyncIterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.arguments
  name: arguments
  summary: 'Yield the argument delta and done events.


    Emits `function_call_arguments.delta` followed by

    `function_call_arguments.done`.'
  signature: 'arguments(args: str) -> Iterator[ResponseStreamEvent]'
  parameters:
  - name: args
    description: The complete arguments string.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: An iterator of events.
    types:
    - <xref:typing.Iterator>[<xref:azure.ai.agentserver.responses.models.ResponseStreamEvent>]
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.emit_added
  name: emit_added
  summary: Emit an `output_item.added` event for this function call.
  signature: emit_added() -> ResponseOutputItemAddedEvent
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemAddedEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.emit_arguments_delta
  name: emit_arguments_delta
  summary: Emit a function-call arguments delta event.
  signature: 'emit_arguments_delta(delta: str) -> ResponseFunctionCallArgumentsDeltaEvent'
  parameters:
  - name: delta
    description: The incremental arguments text fragment.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseFunctionCallArgumentsDeltaEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.emit_arguments_done
  name: emit_arguments_done
  summary: Emit a function-call arguments done event.
  signature: 'emit_arguments_done(arguments: str) -> ResponseFunctionCallArgumentsDoneEvent'
  parameters:
  - name: arguments
    description: The final, complete arguments string.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseFunctionCallArgumentsDoneEvent>
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.emit_done
  name: emit_done
  summary: Emit an `output_item.done` event for this function call.
  signature: emit_done() -> ResponseOutputItemDoneEvent
  return:
    description: The emitted event.
    types:
    - <xref:azure.ai.agentserver.responses.models.ResponseOutputItemDoneEvent>
attributes:
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.call_id
  name: call_id
  summary: Return the function call identifier.
  return:
    description: The call ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.item_id
  name: item_id
  summary: Return the output item identifier.
  return:
    description: The item ID.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.name
  name: name
  summary: Return the function name.
  return:
    description: The function name.
    types:
    - <xref:str>
- uid: azure.ai.agentserver.responses.streaming.OutputItemFunctionCallBuilder.output_index
  name: output_index
  summary: Return the zero-based output index.
  return:
    description: The output index.
    types:
    - <xref:int>
