type: import
functions:
- uid: azure.ai.agentserver.responses.models.get_content_expanded
  name: get_content_expanded
  summary: 'Return the typed content list from an <xref:azure.ai.agentserver.responses.models.ItemMessage>.


    If `content` is a plain string (the API allows a string shorthand),

    it is wrapped as a single <xref:azure.ai.agentserver.responses.models.MessageContentInputTextContent>.

    If it is already a list, returns a shallow copy.

    Returns an empty list when content is `None`.'
  signature: 'get_content_expanded(message: ItemMessage) -> list[azure.ai.agentserver.responses.models._generated.sdk.models.models._models.MessageContent]'
  parameters:
  - name: message
    description: The item message.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.ItemMessage>
  return:
    description: The message content parts.
    types:
    - <xref:list>[<xref:azure.ai.agentserver.responses.models.MessageContent>]
- uid: azure.ai.agentserver.responses.models.get_conversation_expanded
  name: get_conversation_expanded
  summary: 'Expand `CreateResponse.conversation` into a typed <xref:azure.ai.agentserver.responses.models.ConversationParam_2>.


    A plain string is treated as the conversation ID.'
  signature: 'get_conversation_expanded(request: CreateResponse) -> ConversationParam_2
    | None'
  parameters:
  - name: request
    description: The create-response request.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.CreateResponse>
  return:
    description: The typed conversation parameter, or `None`.
    types:
    - <xref:azure.ai.agentserver.responses.models.ConversationParam_2> | <xref:None>
- uid: azure.ai.agentserver.responses.models.get_conversation_id
  name: get_conversation_id
  summary: 'Extract conversation ID from a request or response''s `conversation` field.


    If conversation is a plain string, returns it directly.

    If it is a <xref:azure.ai.agentserver.responses.models.ConversationParam_2> object,
    returns its `id` field.'
  signature: 'get_conversation_id(request: CreateResponse | ResponseObject) -> str
    | None'
  parameters:
  - name: request
    description: The create-response request or response object.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.CreateResponse> | <xref:azure.ai.agentserver.responses.models.ResponseObject>
  return:
    description: The conversation ID, or `None` if no conversation is set.
    types:
    - <xref:str> | <xref:None>
- uid: azure.ai.agentserver.responses.models.get_input_expanded
  name: get_input_expanded
  summary: "Normalize `CreateResponse.input` into a list of <xref:azure.ai.agentserver.responses.models.Item>.\n\
    \n* If input is `None`, returns `[]`. \n\n* If input is a string, wraps it as\
    \ a single <xref:azure.ai.agentserver.responses.models.ItemMessage> with `role=user`\
    \ and <xref:azure.ai.agentserver.responses.models.MessageContentInputTextContent>.\
    \ \n\n* If input is already a list, each element is deserialized into the appropriate\
    \ <xref:azure.ai.agentserver.responses.models.Item> subclass (e.g., <xref:azure.ai.agentserver.responses.models.ItemMessage>,\
    \ <xref:azure.ai.agentserver.responses.models.FunctionCallOutputItemParam>)."
  signature: 'get_input_expanded(request: CreateResponse) -> list[azure.ai.agentserver.responses.models._generated.sdk.models.models._models.Item]'
  parameters:
  - name: request
    description: The create-response request.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.CreateResponse>
  return:
    description: A list of typed input items.
    types:
    - <xref:list>[<xref:azure.ai.agentserver.responses.models.Item>]
- uid: azure.ai.agentserver.responses.models.get_tool_choice_expanded
  name: get_tool_choice_expanded
  summary: 'Expand `CreateResponse.tool_choice` into a typed <xref:azure.ai.agentserver.responses.models.ToolChoiceParam>.


    String shorthands (`"auto"`, `"required"`) are expanded to

    <xref:azure.ai.agentserver.responses.models.ToolChoiceAllowed> with the corresponding
    mode.

    `"none"` returns `None`.'
  signature: 'get_tool_choice_expanded(request: CreateResponse) -> ToolChoiceParam
    | None'
  parameters:
  - name: request
    description: The create-response request.
    isRequired: true
    types:
    - <xref:azure.ai.agentserver.responses.models.CreateResponse>
  return:
    description: The typed tool choice, or `None` if unset or `"none"`.
    types:
    - <xref:azure.ai.agentserver.responses.models.ToolChoiceParam> | <xref:None>
  exceptions:
  - type: ValueError
    description: If the tool_choice value is an unrecognized string.
