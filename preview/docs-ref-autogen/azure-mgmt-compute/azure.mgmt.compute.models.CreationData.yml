### YamlMime:PythonClass
uid: azure.mgmt.compute.models.CreationData
name: CreationData
fullName: azure.mgmt.compute.models.CreationData
module: azure.mgmt.compute.models
summary: Data used when creating a disk.
constructor:
  syntax: 'CreationData(*args: Any, **kwargs: Any)'
variables:
- description: 'This enumerates the possible sources of a disk''s creation. Required.
    Known

    values are: "Empty", "Attach", "FromImage", "Import", "Copy", "Restore", "Upload",
    "CopyStart",

    "ImportSecure", "UploadPreparedSecure", and "CopyFromSanSnapshot".'
  name: create_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiskCreateOption>
- description: 'Required if createOption is Import. The Azure Resource Manager

    identifier of the storage account containing the blob to import as a disk.'
  name: storage_account_id
  types:
  - <xref:str>
- description: Disk source information for PIR or user images.
  name: image_reference
  types:
  - <xref:azure.mgmt.compute.models.ImageDiskReference>
- description: 'Required if creating from a Gallery Image. The

    id/sharedGalleryImageId/communityGalleryImageId of the ImageDiskReference will
    be the ARM id of

    the shared galley image version from which to create a disk.'
  name: gallery_image_reference
  types:
  - <xref:azure.mgmt.compute.models.ImageDiskReference>
- description: 'If createOption is Import, this is the URI of a blob to be imported
    into a

    managed disk.'
  name: source_uri
  types:
  - <xref:str>
- description: 'If createOption is Copy, this is the ARM id of the source snapshot
    or

    disk.'
  name: source_resource_id
  types:
  - <xref:str>
- description: 'If this field is set, this is the unique id identifying the source
    of

    this resource.'
  name: source_unique_id
  types:
  - <xref:str>
- description: 'If createOption is Upload, this is the size of the contents of the

    upload including the VHD footer. This value should be between 20972032 (20 MiB
    + 512 bytes for

    the VHD footer) and 35183298347520 bytes (32 TiB + 512 bytes for the VHD footer).'
  name: upload_size_bytes
  types:
  - <xref:int>
- description: 'Logical sector size in bytes for Ultra disks. Supported values are

    512 ad 4096. 4096 is the default.'
  name: logical_sector_size
  types:
  - <xref:int>
- description: 'If createOption is ImportSecure, this is the URI of a blob to be

    imported into VM guest state.'
  name: security_data_uri
  types:
  - <xref:str>
- description: 'If createOption is ImportSecure, this is the URI of a blob to be

    imported into VM metadata for Confidential VM.'
  name: security_metadata_uri
  types:
  - <xref:str>
- description: 'Set this flag to true to get a boost on the performance target of
    the

    disk deployed, see here on the respective performance target. This flag can only
    be set on disk

    creation time and cannot be disabled after enabled.'
  name: performance_plus
  types:
  - <xref:bool>
- description: 'Required if createOption is CopyFromSanSnapshot. This is the ARM

    id of the source elastic san volume snapshot.'
  name: elastic_san_resource_id
  types:
  - <xref:str>
- description: 'If this field is set on a snapshot and createOption is

    CopyStart, the snapshot will be copied at a quicker speed. Known values are: "None"
    and

    "Enhanced".'
  name: provisioned_bandwidth_copy_speed
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ProvisionedBandwidthCopyOption>
- description: 'For snapshots created from Premium SSD v2 or Ultra disk,

    this property determines the time in minutes the snapshot is retained for instant
    access to

    enable faster restore.'
  name: instant_access_duration_minutes
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.compute.models.CreationData.create_option
  name: create_option
  summary: 'This enumerates the possible sources of a disk''s creation. Required.
    Known values are:

    "Empty", "Attach", "FromImage", "Import", "Copy", "Restore", "Upload",

    "CopyStart", "ImportSecure", "UploadPreparedSecure", and "CopyFromSanSnapshot".'
  signature: 'create_option: str | _models.DiskCreateOption'
- uid: azure.mgmt.compute.models.CreationData.elastic_san_resource_id
  name: elastic_san_resource_id
  summary: 'Required if createOption is CopyFromSanSnapshot. This is the ARM id of
    the source elastic san

    volume snapshot.'
  signature: 'elastic_san_resource_id: str | None'
- uid: azure.mgmt.compute.models.CreationData.gallery_image_reference
  name: gallery_image_reference
  summary: 'Required if creating from a Gallery Image. The id/sharedGalleryImageId/communityGalleryImageId

    of the ImageDiskReference will be the ARM id of the shared galley image version
    from which to

    create a disk.'
  signature: 'gallery_image_reference: _models.ImageDiskReference | None'
- uid: azure.mgmt.compute.models.CreationData.image_reference
  name: image_reference
  summary: Disk source information for PIR or user images.
  signature: 'image_reference: _models.ImageDiskReference | None'
- uid: azure.mgmt.compute.models.CreationData.instant_access_duration_minutes
  name: instant_access_duration_minutes
  summary: 'For snapshots created from Premium SSD v2 or Ultra disk, this property
    determines the time in

    minutes the snapshot is retained for instant access to enable faster restore.'
  signature: 'instant_access_duration_minutes: int | None'
- uid: azure.mgmt.compute.models.CreationData.logical_sector_size
  name: logical_sector_size
  summary: 'Logical sector size in bytes for Ultra disks. Supported values are 512
    ad 4096. 4096 is the

    default.'
  signature: 'logical_sector_size: int | None'
- uid: azure.mgmt.compute.models.CreationData.performance_plus
  name: performance_plus
  summary: 'Set this flag to true to get a boost on the performance target of the
    disk deployed, see here

    on the respective performance target. This flag can only be set on disk creation
    time and

    cannot be disabled after enabled.'
  signature: 'performance_plus: bool | None'
- uid: azure.mgmt.compute.models.CreationData.provisioned_bandwidth_copy_speed
  name: provisioned_bandwidth_copy_speed
  summary: 'If this field is set on a snapshot and createOption is CopyStart, the
    snapshot will be copied

    at a quicker speed. Known values are: "None" and "Enhanced".'
  signature: 'provisioned_bandwidth_copy_speed: str | _models.ProvisionedBandwidthCopyOption
    | None'
- uid: azure.mgmt.compute.models.CreationData.security_data_uri
  name: security_data_uri
  summary: If createOption is ImportSecure, this is the URI of a blob to be imported
    into VM guest state.
  signature: 'security_data_uri: str | None'
- uid: azure.mgmt.compute.models.CreationData.security_metadata_uri
  name: security_metadata_uri
  summary: 'If createOption is ImportSecure, this is the URI of a blob to be imported
    into VM metadata for

    Confidential VM.'
  signature: 'security_metadata_uri: str | None'
- uid: azure.mgmt.compute.models.CreationData.source_resource_id
  name: source_resource_id
  summary: If createOption is Copy, this is the ARM id of the source snapshot or disk.
  signature: 'source_resource_id: str | None'
- uid: azure.mgmt.compute.models.CreationData.source_unique_id
  name: source_unique_id
  summary: If this field is set, this is the unique id identifying the source of this
    resource.
  signature: 'source_unique_id: str | None'
- uid: azure.mgmt.compute.models.CreationData.source_uri
  name: source_uri
  summary: If createOption is Import, this is the URI of a blob to be imported into
    a managed disk.
  signature: 'source_uri: str | None'
- uid: azure.mgmt.compute.models.CreationData.storage_account_id
  name: storage_account_id
  summary: 'Required if createOption is Import. The Azure Resource Manager identifier
    of the storage

    account containing the blob to import as a disk.'
  signature: 'storage_account_id: str | None'
- uid: azure.mgmt.compute.models.CreationData.upload_size_bytes
  name: upload_size_bytes
  summary: 'If createOption is Upload, this is the size of the contents of the upload
    including the VHD

    footer. This value should be between 20972032 (20 MiB + 512 bytes for the VHD
    footer) and

    35183298347520 bytes (32 TiB + 512 bytes for the VHD footer).'
  signature: 'upload_size_bytes: int | None'
