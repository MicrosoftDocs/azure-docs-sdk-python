### YamlMime:PythonClass
uid: azure.mgmt.compute.models.CapacityReservationGroupProperties
name: CapacityReservationGroupProperties
fullName: azure.mgmt.compute.models.CapacityReservationGroupProperties
module: azure.mgmt.compute.models
summary: capacity reservation group Properties.
constructor:
  syntax: 'CapacityReservationGroupProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'A list of all capacity reservation resource ids that belong to

    capacity reservation group.'
  name: capacity_reservations
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.SubResourceReadOnly>]
- description: 'A list of references to all virtual machines associated to

    the capacity reservation group.'
  name: virtual_machines_associated
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.SubResourceReadOnly>]
- description: 'The capacity reservation group instance view which has the list of

    instance views for all the capacity reservations that belong to the capacity reservation
    group.'
  name: instance_view
  types:
  - <xref:azure.mgmt.compute.models.CapacityReservationGroupInstanceView>
- description: 'Specifies the settings to enable sharing across subscriptions for
    the

    capacity reservation group resource. The capacity reservation group resource can
    generally be

    shared across subscriptions belonging to a single Azure AAD tenant or across AAD
    tenants if

    there is a trust relationship established between the tenants.  Block capacity
    reservation does

    not support sharing across subscriptions. **Note:** Minimum api-version: 2023-09-01.
    Please

    refer to [https://aka.ms/computereservationsharing](https://aka.ms/computereservationsharing)

    for more details.'
  name: sharing_profile
  types:
  - <xref:azure.mgmt.compute.models.ResourceSharingProfile>
- description: 'Indicates the type of capacity reservation. Allowed values are ''Block''

    for block capacity reservations and ''Targeted'' for reservations that enable
    a VM to consume a

    specific capacity reservation when a capacity reservation group is provided. The
    reservation

    type is immutable and cannot be changed after it is assigned. Known values are:
    "Targeted" and

    "Block".'
  name: reservation_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ReservationType>
