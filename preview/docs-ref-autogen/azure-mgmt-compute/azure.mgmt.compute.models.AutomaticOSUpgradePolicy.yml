### YamlMime:PythonClass
uid: azure.mgmt.compute.models.AutomaticOSUpgradePolicy
name: AutomaticOSUpgradePolicy
fullName: azure.mgmt.compute.models.AutomaticOSUpgradePolicy
module: azure.mgmt.compute.models
summary: The configuration parameters used for performing automatic OS upgrade.
constructor:
  syntax: 'AutomaticOSUpgradePolicy(*args: Any, **kwargs: Any)'
variables:
- description: 'Indicates whether OS upgrades should automatically be

    applied to scale set instances in a rolling fashion when a newer version of the
    OS image

    becomes available. Default value is false. If this is set to true for Windows
    based scale sets,

    [enableAutomaticUpdates](https://docs.microsoft.com/dotnet/api/microsoft.azure.management.compute.models.windowsconfiguration.enableautomaticupdates?view=azure-dotnet)

    is automatically set to false and cannot be set to true.'
  name: enable_automatic_os_upgrade
  types:
  - <xref:bool>
- description: 'Whether OS image rollback feature should be disabled. Default

    value is false.'
  name: disable_automatic_rollback
  types:
  - <xref:bool>
- description: 'Indicates whether rolling upgrade policy should be used

    during Auto OS Upgrade. Default value is false. Auto OS Upgrade will fallback
    to the default

    policy if no policy is defined on the VMSS.'
  name: use_rolling_upgrade_policy
  types:
  - <xref:bool>
- description: 'Indicates whether Auto OS Upgrade should undergo deferral.

    Deferred OS upgrades will send advanced notifications on a per-VM basis that an
    OS upgrade from

    rolling upgrades is incoming, via the IMDS tag ''Platform.PendingOSUpgrade''.
    The upgrade then

    defers until the upgrade is approved via an ApproveRollingUpgrade call.'
  name: os_rolling_upgrade_deferral
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.compute.models.AutomaticOSUpgradePolicy.disable_automatic_rollback
  name: disable_automatic_rollback
  summary: Whether OS image rollback feature should be disabled. Default value is
    false.
  signature: 'disable_automatic_rollback: bool | None'
- uid: azure.mgmt.compute.models.AutomaticOSUpgradePolicy.enable_automatic_os_upgrade
  name: enable_automatic_os_upgrade
  summary: 'Indicates whether OS upgrades should automatically be applied to scale
    set instances in a

    rolling fashion when a newer version of the OS image becomes available. Default
    value is false.

    If this is set to true for Windows based scale sets, [enableAutomaticUpdates](https://docs.microsoft.com/dotnet/api/microsoft.azure.management.compute.models.windowsconfiguration.enableautomaticupdates?view=azure-dotnet)

    is automatically set to false and cannot be set to true.'
  signature: 'enable_automatic_os_upgrade: bool | None'
- uid: azure.mgmt.compute.models.AutomaticOSUpgradePolicy.os_rolling_upgrade_deferral
  name: os_rolling_upgrade_deferral
  summary: 'Indicates whether Auto OS Upgrade should undergo deferral. Deferred OS
    upgrades will send

    advanced notifications on a per-VM basis that an OS upgrade from rolling upgrades
    is incoming,

    via the IMDS tag ''Platform.PendingOSUpgrade''. The upgrade then defers until
    the upgrade is

    approved via an ApproveRollingUpgrade call.'
  signature: 'os_rolling_upgrade_deferral: bool | None'
- uid: azure.mgmt.compute.models.AutomaticOSUpgradePolicy.use_rolling_upgrade_policy
  name: use_rolling_upgrade_policy
  summary: 'Indicates whether rolling upgrade policy should be used during Auto OS
    Upgrade. Default value

    is false. Auto OS Upgrade will fallback to the default policy if no policy is
    defined on the

    VMSS.'
  signature: 'use_rolling_upgrade_policy: bool | None'
