name: VirtualMachineRunCommandProperties
fullName: azure.mgmt.compute.models.VirtualMachineRunCommandProperties
module: azure.mgmt.compute.models
summary: Describes the properties of a Virtual Machine run command.
constructor:
  syntax: 'VirtualMachineRunCommandProperties(*args: Any, **kwargs: Any)'
variables:
- description: The source of the run command script.
  name: source
  types:
  - <xref:azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource>
- description: The parameters used by the script.
  name: parameters
