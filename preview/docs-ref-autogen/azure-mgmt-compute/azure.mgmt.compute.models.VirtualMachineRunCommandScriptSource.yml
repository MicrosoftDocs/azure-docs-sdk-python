### YamlMime:PythonClass
uid: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource
name: VirtualMachineRunCommandScriptSource
fullName: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource
module: azure.mgmt.compute.models
summary: 'Describes the script sources for run command. Use only one of these script
  sources: script,

  scriptUri, commandId, galleryScriptReferenceId.'
constructor:
  syntax: 'VirtualMachineRunCommandScriptSource(*args: Any, **kwargs: Any)'
variables:
- description: Specifies the script content to be executed on the VM.
  name: script
  types:
  - <xref:str>
- description: 'Specifies the script download location. It can be either SAS URI of
    an Azure

    storage blob with read access or public URI.'
  name: script_uri
  types:
  - <xref:str>
- description: 'Specifies a commandId of predefined built-in script. Command IDs available

    for Linux are listed at [https://aka.ms/RunCommandManagedLinux#available-commands](https://aka.ms/RunCommandManagedLinux#available-commands),
    Windows at

    [https://aka.ms/RunCommandManagedWindows#available-commands](https://aka.ms/RunCommandManagedWindows#available-commands).'
  name: command_id
  types:
  - <xref:str>
- description: 'User-assigned managed identity that has access to scriptUri

    in case of Azure storage blob. Use an empty object in case of system-assigned
    identity. Make

    sure the Azure storage blob exists, and managed identity has been given access
    to blob''s

    container with ''Storage Blob Data Reader'' role assignment. In case of user-assigned
    identity,

    make sure you add it under VM''s identity. For more info on managed identity and
    Run Command,

    refer [https://aka.ms/ManagedIdentity](https://aka.ms/ManagedIdentity) and

    [https://aka.ms/RunCommandManaged](https://aka.ms/RunCommandManaged).'
  name: script_uri_managed_identity
  types:
  - <xref:azure.mgmt.compute.models.RunCommandManagedIdentity>
- description: 'Optional. Specify which shell to use for running the script. These
    values

    must match those expected by the extension. Currently supported only for Windows
    VMs, script

    uses Powershell 7 when specified. Powershell 7 must be already installed on the
    machine to use

    Powershell7 parameter value. Known values are: "Default" and "Powershell7".'
  name: script_shell
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ScriptShellTypes>
- description: 'The resource ID of a Gallery Script version that needs to be

    executed. Example ID looks like

    /subscriptions/{subId}/resourceGroups/{rgName}/providers/Microsoft.Compute/galleries/{galleryName}/scripts/{scriptName}/versions/{version}.'
  name: gallery_script_reference_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource.command_id
  name: command_id
  summary: 'Specifies a commandId of predefined built-in script. Command IDs available
    for Linux are listed

    at [https://aka.ms/RunCommandManagedLinux#available-commands](https://aka.ms/RunCommandManagedLinux#available-commands),
    Windows at

    [https://aka.ms/RunCommandManagedWindows#available-commands](https://aka.ms/RunCommandManagedWindows#available-commands).'
  signature: 'command_id: str | None'
- uid: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource.gallery_script_reference_id
  name: gallery_script_reference_id
  summary: 'The resource ID of a Gallery Script version that needs to be executed.
    Example ID looks like

    /subscriptions/{subId}/resourceGroups/{rgName}/providers/Microsoft.Compute/galleries/{galleryName}/scripts/{scriptName}/versions/{version}.'
  signature: 'gallery_script_reference_id: str | None'
- uid: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource.script
  name: script
  summary: Specifies the script content to be executed on the VM.
  signature: 'script: str | None'
- uid: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource.script_shell
  name: script_shell
  summary: 'Optional. Specify which shell to use for running the script. These values
    must match those

    expected by the extension. Currently supported only for Windows VMs, script uses
    Powershell 7

    when specified. Powershell 7 must be already installed on the machine to use Powershell7

    parameter value. Known values are: "Default" and "Powershell7".'
  signature: 'script_shell: str | _models.ScriptShellTypes | None'
- uid: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource.script_uri
  name: script_uri
  summary: 'Specifies the script download location. It can be either SAS URI of an
    Azure storage blob with

    read access or public URI.'
  signature: 'script_uri: str | None'
- uid: azure.mgmt.compute.models.VirtualMachineRunCommandScriptSource.script_uri_managed_identity
  name: script_uri_managed_identity
  summary: 'User-assigned managed identity that has access to scriptUri in case of
    Azure storage blob. Use

    an empty object in case of system-assigned identity. Make sure the Azure storage
    blob exists,

    and managed identity has been given access to blob''s container with ''Storage
    Blob Data Reader''

    role assignment. In case of user-assigned identity, make sure you add it under
    VM''s identity.

    For more info on managed identity and Run Command, refer [https://aka.ms/ManagedIdentity](https://aka.ms/ManagedIdentity)
    and [https://aka.ms/RunCommandManaged](https://aka.ms/RunCommandManaged).'
  signature: 'script_uri_managed_identity: _models.RunCommandManagedIdentity | None'
