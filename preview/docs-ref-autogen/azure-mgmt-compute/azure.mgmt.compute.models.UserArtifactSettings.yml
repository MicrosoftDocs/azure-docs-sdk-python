### YamlMime:PythonClass
uid: azure.mgmt.compute.models.UserArtifactSettings
name: UserArtifactSettings
fullName: azure.mgmt.compute.models.UserArtifactSettings
module: azure.mgmt.compute.models
summary: 'Additional settings for the VM app that contains the target package and
  config file name when

  it is deployed to target VM or VM scale set.'
constructor:
  syntax: 'UserArtifactSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Optional. The name to assign the downloaded package file on the VM.

    This is limited to 4096 characters. If not specified, the package file will be
    named the same

    as the Gallery Application name.'
  name: package_file_name
  types:
  - <xref:str>
- description: 'Optional. The name to assign the downloaded config file on the VM.
    This

    is limited to 4096 characters. If not specified, the config file will be named
    the Gallery

    Application name appended with "_config".'
  name: config_file_name
  types:
  - <xref:str>
- description: 'Optional. The action to be taken with regards to

    install/update/remove of the gallery application in the event of a reboot. Known
    values are:

    "None" and "Rerun".'
  name: script_behavior_after_reboot
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.GalleryApplicationScriptRebootBehavior>
attributes:
- uid: azure.mgmt.compute.models.UserArtifactSettings.config_file_name
  name: config_file_name
  summary: 'Optional. The name to assign the downloaded config file on the VM. This
    is limited to 4096

    characters. If not specified, the config file will be named the Gallery Application
    name

    appended with "_config".'
  signature: 'config_file_name: str | None'
- uid: azure.mgmt.compute.models.UserArtifactSettings.package_file_name
  name: package_file_name
  summary: 'Optional. The name to assign the downloaded package file on the VM. This
    is limited to 4096

    characters. If not specified, the package file will be named the same as the Gallery

    Application name.'
  signature: 'package_file_name: str | None'
- uid: azure.mgmt.compute.models.UserArtifactSettings.script_behavior_after_reboot
  name: script_behavior_after_reboot
  summary: 'Optional. The action to be taken with regards to install/update/remove
    of the gallery

    application in the event of a reboot. Known values are: "None" and "Rerun".'
  signature: 'script_behavior_after_reboot: str | _models.GalleryApplicationScriptRebootBehavior
    | None'
