### YamlMime:PythonClass
uid: azure.mgmt.compute.models.CapacityReservationProperties
name: CapacityReservationProperties
fullName: azure.mgmt.compute.models.CapacityReservationProperties
module: azure.mgmt.compute.models
summary: Properties of the Capacity reservation.
constructor:
  syntax: 'CapacityReservationProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'A unique id generated and assigned to the capacity reservation by
    the

    platform which does not change throughout the lifetime of the resource.'
  name: reservation_id
  types:
  - <xref:str>
- description: 'Specifies the value of fault domain count that Capacity

    Reservation supports for requested VM size. **Note:** The fault domain count specified
    for a

    resource (like virtual machines scale set) must be less than or equal to this
    value if it

    deploys using capacity reservation. Minimum api-version: 2022-08-01.'
  name: platform_fault_domain_count
  types:
  - <xref:int>
- description: 'A list of all virtual machine resource ids that are

    associated with the capacity reservation.'
  name: virtual_machines_associated
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.SubResourceReadOnly>]
- description: The date time when the capacity reservation was last updated.
  name: provisioning_time
  types:
  - <xref:datetime.datetime>
- description: The provisioning state, which only appears in the response.
  name: provisioning_state
  types:
  - <xref:str>
- description: The Capacity reservation instance view.
  name: instance_view
  types:
  - <xref:azure.mgmt.compute.models.CapacityReservationInstanceView>
- description: 'Specifies the time at which the Capacity Reservation resource was
    created.

    Minimum api-version: 2021-11-01.'
  name: time_created
  types:
  - <xref:datetime.datetime>
- description: 'Defines the schedule for Block-type capacity reservations. Specifies

    the schedule during which capacity reservation is active and VM or VMSS resource
    can be

    allocated using reservation. This property is required and only supported when
    the capacity

    reservation group type is ''Block''. The scheduleProfile, start, and end fields
    are immutable

    after creation. Minimum API version: 2025-04-01. Please refer to

    [https://aka.ms/blockcapacityreservation](https://aka.ms/blockcapacityreservation)
    for more

    details.'
  name: schedule_profile
  types:
  - <xref:azure.mgmt.compute.models.ScheduleProfile>
attributes:
- uid: azure.mgmt.compute.models.CapacityReservationProperties.instance_view
  name: instance_view
  summary: The Capacity reservation instance view.
  signature: 'instance_view: _models.CapacityReservationInstanceView | None'
- uid: azure.mgmt.compute.models.CapacityReservationProperties.platform_fault_domain_count
  name: platform_fault_domain_count
  summary: 'Specifies the value of fault domain count that Capacity Reservation supports
    for requested VM

    size. **Note:** The fault domain count specified for a resource (like virtual
    machines scale

    set) must be less than or equal to this value if it deploys using capacity reservation.
    Minimum

    api-version: 2022-08-01.'
  signature: 'platform_fault_domain_count: int | None'
- uid: azure.mgmt.compute.models.CapacityReservationProperties.provisioning_state
  name: provisioning_state
  summary: The provisioning state, which only appears in the response.
  signature: 'provisioning_state: str | None'
- uid: azure.mgmt.compute.models.CapacityReservationProperties.provisioning_time
  name: provisioning_time
  summary: The date time when the capacity reservation was last updated.
  signature: 'provisioning_time: datetime | None'
- uid: azure.mgmt.compute.models.CapacityReservationProperties.reservation_id
  name: reservation_id
  summary: 'A unique id generated and assigned to the capacity reservation by the
    platform which does not

    change throughout the lifetime of the resource.'
  signature: 'reservation_id: str | None'
- uid: azure.mgmt.compute.models.CapacityReservationProperties.schedule_profile
  name: schedule_profile
  summary: 'Defines the schedule for Block-type capacity reservations. Specifies the
    schedule during which

    capacity reservation is active and VM or VMSS resource can be allocated using
    reservation. This

    property is required and only supported when the capacity reservation group type
