### YamlMime:PythonClass
uid: azure.mgmt.compute.models.BillingProfile
name: BillingProfile
fullName: azure.mgmt.compute.models.BillingProfile
module: azure.mgmt.compute.models
summary: 'Specifies the billing related details of a Azure Spot VM or VMSS. Minimum
  api-version:

  2019-03-01.'
constructor:
  syntax: 'BillingProfile(*args: Any, **kwargs: Any)'
variables:
- description: "Specifies the maximum price you are willing to pay for a Azure Spot\
    \ VM/VMSS.\nThis price is in US Dollars. <br><br> This price will be compared\
    \ with the current Azure Spot\nprice for the VM size. Also, the prices are compared\
    \ at the time of create/update of Azure Spot\nVM/VMSS and the operation will only\
    \ succeed if  the maxPrice is greater than the current Azure\nSpot price. <br><br>\
    \ The maxPrice will also be used for evicting a Azure Spot VM/VMSS if the\ncurrent\
    \ Azure Spot price goes beyond the maxPrice after creation of VM/VMSS. <br><br>\
    \ Possible\nvalues are: <br><br> - Any decimal value greater than zero. Example:\
    \ 0.01538 <br><br> -1 \u2013\nindicates default price to be up-to on-demand. <br><br>\
    \ You can set the maxPrice to -1 to\nindicate that the Azure Spot VM/VMSS should\
    \ not be evicted for price reasons. Also, the default\nmax price is -1 if it is\
    \ not provided by you. <br><br>Minimum api-version: 2019-03-01."
  name: max_price
  types:
  - <xref:float>
attributes:
- uid: azure.mgmt.compute.models.BillingProfile.max_price
  name: max_price
  summary: "Specifies the maximum price you are willing to pay for a Azure Spot VM/VMSS.\
    \ This price is in\nUS Dollars. <br><br> This price will be compared with the\
    \ current Azure Spot price for the VM\nsize. Also, the prices are compared at\
    \ the time of create/update of Azure Spot VM/VMSS and the\noperation will only\
    \ succeed if  the maxPrice is greater than the current Azure Spot price.\n<br><br>\
    \ The maxPrice will also be used for evicting a Azure Spot VM/VMSS if the current\
