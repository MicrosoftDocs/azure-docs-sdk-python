  name: provisioning_state
  summary: The disk encryption set provisioning state.
  signature: 'provisioning_state: str | None'
- uid: azure.mgmt.compute.models.EncryptionSetProperties.rotation_to_latest_key_version_enabled
  name: rotation_to_latest_key_version_enabled
  summary: 'Set this flag to true to enable auto-updating of this disk encryption
    set to the latest key

    version.'
  signature: 'rotation_to_latest_key_version_enabled: bool | None'
