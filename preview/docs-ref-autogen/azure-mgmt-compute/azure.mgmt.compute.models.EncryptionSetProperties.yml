  name: active_key
  summary: The key vault key which is currently used by this disk encryption set.
  signature: 'active_key: _models.KeyForDiskEncryptionSet | None'
- uid: azure.mgmt.compute.models.EncryptionSetProperties.auto_key_rotation_error
  name: auto_key_rotation_error
  summary: 'The error that was encountered during auto-key rotation. If an error is
    present, then auto-key

    rotation will not be attempted until the error on this disk encryption set is
    fixed.'
  signature: 'auto_key_rotation_error: _models.ApiError | None'
