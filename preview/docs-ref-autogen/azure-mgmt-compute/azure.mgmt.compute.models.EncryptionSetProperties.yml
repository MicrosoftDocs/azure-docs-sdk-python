  name: encryption_type
  summary: 'The type of key used to encrypt the data of the disk. Known values are:

    "EncryptionAtRestWithCustomerKey", "EncryptionAtRestWithPlatformAndCustomerKeys",
    and

    "ConfidentialVmEncryptedWithCustomerKey".'
  signature: 'encryption_type: str | _models.DiskEncryptionSetType | None'
- uid: azure.mgmt.compute.models.EncryptionSetProperties.federated_client_id
  name: federated_client_id
  summary: 'Multi-tenant application client id to access key vault in a different
    tenant. Setting the value

    to ''None'' will clear the property.'
  signature: 'federated_client_id: str | None'
