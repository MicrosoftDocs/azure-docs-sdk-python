### YamlMime:PythonClass
uid: azure.mgmt.compute.models.VirtualMachineScaleSetVMProperties
name: VirtualMachineScaleSetVMProperties
fullName: azure.mgmt.compute.models.VirtualMachineScaleSetVMProperties
module: azure.mgmt.compute.models
summary: Describes the properties of a virtual machine scale set virtual machine.
constructor:
  syntax: 'VirtualMachineScaleSetVMProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies whether the latest model has been applied to the virtual

    machine.'
  name: latest_model_applied
  types:
  - <xref:bool>
- description: Azure VM unique ID.
  name: vm_id
  types:
  - <xref:str>
- description: The virtual machine instance view.
  name: instance_view
  types:
  - <xref:azure.mgmt.compute.models.VirtualMachineScaleSetVMInstanceView>
- description: Specifies the hardware settings for the virtual machine.
  name: hardware_profile
  types:
  - <xref:azure.mgmt.compute.models.HardwareProfile>
- description: 'Specifies the resilient VM deletion status for the virtual

    machine. Known values are: "Enabled", "Disabled", "InProgress", and "Failed".'
  name: resilient_vm_deletion_status
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ResilientVMDeletionStatus>
- description: Specifies the storage settings for the virtual machine disks.
  name: storage_profile
  types:
  - <xref:azure.mgmt.compute.models.StorageProfile>
- description: 'Specifies additional capabilities enabled or disabled on the

    virtual machine in the scale set. For instance: whether the virtual machine has
    the capability

    to support attaching managed data disks with UltraSSD_LRS storage account type.'
  name: additional_capabilities
  types:
  - <xref:azure.mgmt.compute.models.AdditionalCapabilities>
- description: Specifies the operating system settings for the virtual machine.
  name: os_profile
  types:
  - <xref:azure.mgmt.compute.models.OSProfile>
- description: 'Specifies the Security related profile settings for the virtual

    machine.'
  name: security_profile
  types:
  - <xref:azure.mgmt.compute.models.SecurityProfile>
- description: Specifies the network interfaces of the virtual machine.
  name: network_profile
  types:
  - <xref:azure.mgmt.compute.models.NetworkProfile>
- description: 'Specifies the network profile configuration of the virtual

    machine.'
  name: network_profile_configuration
  types:
  - <xref:azure.mgmt.compute.models.VirtualMachineScaleSetVMNetworkProfileConfiguration>
- description: 'Specifies the boot diagnostic settings state. Minimum api-version:

    2015-06-15.'
  name: diagnostics_profile
  types:
  - <xref:azure.mgmt.compute.models.DiagnosticsProfile>
- description: 'Specifies information about the availability set that the virtual

    machine should be assigned to. Virtual machines specified in the same availability
    set are

    allocated to different nodes to maximize availability. For more information about
    availability

    sets, see [Availability sets overview](https://docs.microsoft.com/azure/virtual-machines/availability-set-overview).
    For more

    information on Azure planned maintenance, see [Maintenance and updates for Virtual
    Machines in

    Azure](https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates).
    Currently,

    a VM can only be added to availability set at creation time. An existing VM cannot
    be added to

    an availability set.'
  name: availability_set
  types:
  - <xref:azure.mgmt.compute.models.SubResource>
- description: The provisioning state, which only appears in the response.
  name: provisioning_state
  types:
  - <xref:str>
- description: 'Specifies that the image or disk that is being used was licensed

    on-premises. <br><br> Possible values for Windows Server operating system are:
    <br><br>

    Windows_Client <br><br> Windows_Server <br><br> Possible values for Linux Server
    operating

    system are: <br><br> RHEL_BYOS (for RHEL) <br><br> SLES_BYOS (for SUSE) <br><br>
    For more

    information, see [Azure Hybrid Use Benefit for Windows Server](https://docs.microsoft.com/azure/virtual-machines/windows/hybrid-use-benefit-licensing)

    <br><br> [Azure Hybrid Use Benefit for Linux Server](https://docs.microsoft.com/azure/virtual-machines/linux/azure-hybrid-benefit-linux)
    <br><br>

    Minimum api-version: 2015-06-15.'
  name: license_type
  types:
  - <xref:str>
- description: 'Specifies whether the model applied to the virtual machine is

    the model of the virtual machine scale set or the customized model for the virtual
    machine.'
  name: model_definition_applied
  types:
  - <xref:str>
- description: Specifies the protection policy of the virtual machine.
  name: protection_policy
  types:
  - <xref:azure.mgmt.compute.models.VirtualMachineScaleSetVMProtectionPolicy>
- description: 'UserData for the VM, which must be base-64 encoded. Customer should
    not pass

    any secrets in here. Minimum api-version: 2021-03-01.'
  name: user_data
  types:
  - <xref:str>
- description: 'Specifies the time at which the Virtual Machine resource was created.

    Minimum api-version: 2021-11-01.'
  name: time_created
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetVMProperties.additional_capabilities
  name: additional_capabilities
  summary: 'Specifies additional capabilities enabled or disabled on the virtual machine
    in the scale set.

    For instance: whether the virtual machine has the capability to support attaching
    managed data

    disks with UltraSSD_LRS storage account type.'
  signature: 'additional_capabilities: _models.AdditionalCapabilities | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetVMProperties.availability_set
  name: availability_set
  summary: 'Specifies information about the availability set that the virtual machine
    should be assigned

    to. Virtual machines specified in the same availability set are allocated to different
    nodes to

    maximize availability. For more information about availability sets, see [Availability
    sets

    overview](https://docs.microsoft.com/azure/virtual-machines/availability-set-overview).
    For

    more information on Azure planned maintenance, see [Maintenance and updates for
    Virtual

    Machines in Azure](https://docs.microsoft.com/azure/virtual-machines/maintenance-and-updates).
    Currently, a VM

    can only be added to availability set at creation time. An existing VM cannot
    be added to an

    availability set.'
  signature: 'availability_set: _models.SubResource | None'
