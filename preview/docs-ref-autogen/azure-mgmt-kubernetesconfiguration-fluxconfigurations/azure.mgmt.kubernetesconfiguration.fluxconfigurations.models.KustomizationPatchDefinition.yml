    on reconciliation.'
  signature: 'retry_interval_in_seconds: int | None'
- uid: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationPatchDefinition.sync_interval_in_seconds
  name: sync_interval_in_seconds
  summary: The interval at which to re-reconcile the Kustomization on the cluster.
  signature: 'sync_interval_in_seconds: int | None'
- uid: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationPatchDefinition.timeout_in_seconds
  name: timeout_in_seconds
  summary: The maximum time to attempt to reconcile the Kustomization on the cluster.
  signature: 'timeout_in_seconds: int | None'
