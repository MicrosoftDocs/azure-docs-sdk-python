### YamlMime:PythonClass
uid: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationPatchDefinition
name: KustomizationPatchDefinition
fullName: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationPatchDefinition
module: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models
summary: 'The Kustomization defining how to reconcile the artifact pulled by the source
  type on the

  cluster.'
constructor:
  syntax: 'KustomizationPatchDefinition(*args: Any, **kwargs: Any)'
variables:
- description: The path in the source reference to reconcile on the cluster.
  name: path
  types:
  - <xref:str>
- description: 'Specifies other Kustomizations that this Kustomization depends on.
    This

    Kustomization will not reconcile until all dependencies have completed their reconciliation.'
  name: depends_on
  types:
  - <xref:list>[<xref:str>]
- description: 'The maximum time to attempt to reconcile the Kustomization on the

    cluster.'
  name: timeout_in_seconds
  types:
  - <xref:int>
- description: 'The interval at which to re-reconcile the Kustomization on the

    cluster.'
  name: sync_interval_in_seconds
  types:
  - <xref:int>
- description: 'The interval at which to re-reconcile the Kustomization on the

    cluster in the event of failure on reconciliation.'
  name: retry_interval_in_seconds
  types:
  - <xref:int>
- description: 'Enable/disable garbage collections of Kubernetes objects created by
    this

    Kustomization.'
  name: prune
  types:
  - <xref:bool>
- description: 'Enable/disable re-creating Kubernetes resources on the cluster when
    patching fails

    due to an immutable field change.'
  name: force
  types:
  - <xref:bool>
- description: 'Enable/disable health check for all Kubernetes objects created by
    this

    Kustomization.'
  name: wait
  types:
  - <xref:bool>
- description: Used for variable substitution for this Kustomization after kustomize
    build.
  name: post_build
  types:
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.PostBuildPatchDefinition>
attributes:
- uid: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationPatchDefinition.depends_on
  name: depends_on
  summary: 'Specifies other Kustomizations that this Kustomization depends on. This
    Kustomization will not

    reconcile until all dependencies have completed their reconciliation.'
  signature: 'depends_on: list[str] | None'
- uid: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationPatchDefinition.force
  name: force
  summary: 'Enable/disable re-creating Kubernetes resources on the cluster when patching
    fails due to an

    immutable field change.'
  signature: 'force: bool | None'
- uid: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationPatchDefinition.path
  name: path
  summary: The path in the source reference to reconcile on the cluster.
  signature: 'path: str | None'
