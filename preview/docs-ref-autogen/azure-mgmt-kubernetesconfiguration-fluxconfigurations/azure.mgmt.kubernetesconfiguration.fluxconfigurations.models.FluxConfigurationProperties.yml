### YamlMime:PythonClass
uid: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.FluxConfigurationProperties
name: FluxConfigurationProperties
fullName: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.FluxConfigurationProperties
module: azure.mgmt.kubernetesconfiguration.fluxconfigurations.models
summary: Properties to create a Flux Configuration resource.
constructor:
  syntax: 'FluxConfigurationProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Scope at which the operator will be installed. Known values are: "cluster"
    and

    "namespace".'
  name: scope
  types:
  - <xref:str>
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.ScopeType>
- description: 'The namespace to which this configuration is installed to. Maximum
    of 253

    lower case alphanumeric characters, hyphen and period only.'
  name: namespace
  types:
  - <xref:str>
- description: 'Source Kind to pull the configuration data from. Known values are:

    "GitRepository", "Bucket", "AzureBlob", and "OCIRepository".'
  name: source_kind
  types:
  - <xref:str>
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.SourceKindType>
- description: 'Whether this configuration should suspend its reconciliation of its

    kustomizations and sources.'
  name: suspend
  types:
  - <xref:bool>
- description: Parameters to reconcile to the GitRepository source kind type.
  name: git_repository
  types:
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.GitRepositoryDefinition>
- description: Parameters to reconcile to the Bucket source kind type.
  name: bucket
  types:
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.BucketDefinition>
- description: Parameters to reconcile to the AzureBlob source kind type.
  name: azure_blob
  types:
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.AzureBlobDefinition>
- description: Parameters to reconcile to the OCIRepository source kind type.
  name: oci_repository
  types:
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.OCIRepositoryDefinition>
- description: 'Array of kustomizations used to reconcile the artifact pulled by the

    source type on the cluster.'
  name: kustomizations
  types:
  - <xref:dict>[<xref:str>, <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.KustomizationDefinition>]
- description: 'Key-value pairs of protected configuration settings for

    the configuration.'
  name: configuration_protected_settings
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'Statuses of the Flux Kubernetes resources created by the fluxConfiguration
    or

    created by the managed objects provisioned by the fluxConfiguration.'
  name: statuses
  types:
  - <xref:list>[<xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.ObjectStatusDefinition>]
- description: 'Public Key associated with this fluxConfiguration (either

    generated within the cluster or provided by the user).'
  name: repository_public_key
  types:
  - <xref:str>
- description: Branch and/or SHA of the source commit synced with the cluster.
  name: source_synced_commit_id
  types:
  - <xref:str>
- description: Datetime the fluxConfiguration synced its source on the cluster.
  name: source_updated_at
  types:
  - <xref:datetime.datetime>
- description: 'Datetime the fluxConfiguration synced its status on the cluster with

    Azure.'
  name: status_updated_at
  types:
  - <xref:datetime.datetime>
- description: 'Whether flux configuration deployment should wait for cluster to

    reconcile the kustomizations.'
  name: wait_for_reconciliation
  types:
  - <xref:bool>
- description: 'Maximum duration to wait for flux configuration

    reconciliation. E.g PT1H, PT5M, P1D.'
  name: reconciliation_wait_duration
  types:
  - <xref:str>
- description: 'Combined status of the Flux Kubernetes resources created by the

    fluxConfiguration or created by the managed objects. Known values are: "Compliant",

    "Non-Compliant", "Pending", "Suspended", and "Unknown".'
  name: compliance_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.FluxComplianceState>
- description: 'Status of the creation of the fluxConfiguration. Known values are:

    "Succeeded", "Failed", "Canceled", "Creating", "Updating", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.kubernetesconfiguration.fluxconfigurations.models.ProvisioningState>
- description: Error message returned to the user in the case of provisioning failure.
  name: error_message
  types:
  - <xref:str>
