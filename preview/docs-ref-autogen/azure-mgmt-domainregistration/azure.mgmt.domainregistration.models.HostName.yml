### YamlMime:PythonClass
uid: azure.mgmt.domainregistration.models.HostName
name: HostName
fullName: azure.mgmt.domainregistration.models.HostName
module: azure.mgmt.domainregistration.models
summary: Details of a hostname derived from a domain.
constructor:
  syntax: 'HostName(*args: Any, **kwargs: Any)'
variables:
- description: Name of the hostname.
  name: name
  types:
  - <xref:str>
- description: 'List of apps the hostname is assigned to. This list will have more
    than one

    app only if the hostname is pointing to a Traffic Manager.'
  name: site_names
  types:
  - <xref:list>[<xref:str>]
- description: 'Name of the Azure resource the hostname is assigned to. If it is

    assigned to a Traffic Manager then it will be the Traffic Manager name otherwise
    it will be the

    app name.'
  name: azure_resource_name
  types:
  - <xref:str>
- description: 'Type of the Azure resource the hostname is assigned to. Known values

    are: "Website" and "TrafficManager".'
  name: azure_resource_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.domainregistration.models.AzureResourceType>
- description: 'Type of the DNS record. Known values are: "CName" and

    "A".'
  name: custom_host_name_dns_record_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.domainregistration.models.CustomHostNameDnsRecordType>
- description: 'Type of the hostname. Known values are: "Verified" and "Managed".'
  name: host_name_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.domainregistration.models.HostNameType>
attributes:
- uid: azure.mgmt.domainregistration.models.HostName.azure_resource_name
  name: azure_resource_name
  summary: 'Name of the Azure resource the hostname is assigned to. If it is assigned
    to a Traffic Manager

    then it will be the Traffic Manager name otherwise it will be the app name.'
  signature: 'azure_resource_name: str | None'
- uid: azure.mgmt.domainregistration.models.HostName.azure_resource_type
  name: azure_resource_type
  summary: '"Website" and

    "TrafficManager".'
  signature: 'azure_resource_type: str | _models.AzureResourceType | None'
- uid: azure.mgmt.domainregistration.models.HostName.custom_host_name_dns_record_type
  name: custom_host_name_dns_record_type
  summary: '"CName" and "A".'
  signature: 'custom_host_name_dns_record_type: str | _models.CustomHostNameDnsRecordType
    | None'
- uid: azure.mgmt.domainregistration.models.HostName.host_name_type
  name: host_name_type
  summary: '"Verified" and "Managed".'
  signature: 'host_name_type: str | _models.HostNameType | None'
- uid: azure.mgmt.domainregistration.models.HostName.name
  name: name
  summary: Name of the hostname.
  signature: 'name: str | None'
- uid: azure.mgmt.domainregistration.models.HostName.site_names
  name: site_names
  summary: 'List of apps the hostname is assigned to. This list will have more than
