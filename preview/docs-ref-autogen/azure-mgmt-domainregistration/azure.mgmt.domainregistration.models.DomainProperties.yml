    "Cancelled", "Confiscated", "Disabled", "Excluded", "Expired", "Failed", "Held",
    "Locked",

    "Parked", "Pending", "Reserved", "Reverted", "Suspended", "Transferred", "Unknown",
    "Unlocked",

    "Unparked", "Updated", and "JsonConverterFailed".'
