  - <xref:str>
  - <xref:azure.mgmt.domainregistration.models.DomainStatus>
- description: 'Domain provisioning state. Known values are: "Succeeded", "Failed",

    "Canceled", "InProgress", and "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.domainregistration.models.ProvisioningState>
