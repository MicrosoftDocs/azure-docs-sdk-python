### YamlMime:PythonClass
uid: azure.mgmt.cosmosdb.models.GarnetClusterResourceProperties
name: GarnetClusterResourceProperties
fullName: azure.mgmt.cosmosdb.models.GarnetClusterResourceProperties
module: azure.mgmt.cosmosdb.models
summary: Properties of a Garnet cache cluster.
constructor:
  syntax: 'GarnetClusterResourceProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The provisioning state of the resource. Known values are: "Creating",

    "Updating", "Deleting", "Succeeded", "Failed", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.GarnetCacheProvisioningState>
- description: 'Resource id of a subnet that this cluster''s management service should
    have its

    network interface attached to. The subnet must be routable to all subnets that
    will be

    delegated to data centers. The resource id must be of the form ''/subscriptions/<subscription

    id>/resourceGroups/<resource group>/providers/Microsoft.Network/virtualNetworks/<virtual

    network>/subnets/<subnet>''.'
  name: subnet_id
  types:
  - <xref:str>
- description: Endpoints for clients to connect to the cluster.
  name: end_points
  types:
  - <xref:list>[<xref:azure.mgmt.cosmosdb.models.GarnetClusterResourcePropertiesEndPointsItem>]
- description: Number of copies of data maintained by the cluster.
  name: replication_factor
  types:
  - <xref:int>
- description: Number of nodes.
  name: node_count
  types:
  - <xref:int>
- description: Virtual Machine SKU used for clusters. Default value is Standard_DS14_v2.
  name: node_sku
  types:
  - <xref:str>
- description: 'If the data center has Availability Zone support, apply it to the

    Virtual Machine ScaleSet that host the garnet cluster virtual machines.'
  name: availability_zone
  types:
  - <xref:bool>
- description: 'Allocation state of the cluster and data center resources. Active

    implies the virtual machines of the cluster are allocated, deallocated implies
    virtual machines

    and resources are deallocated. Known values are: "Active" and "Deallocated".'
  name: allocation_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.AllocationState>
- description: 'Type of the cluster. If set to Production, some operations might not
    be

    permitted on cluster. Known values are: "Production" and "NonProduction".'
  name: cluster_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.ClusterType>
- description: Error related to resource provisioning.
  name: provision_error
  types:
  - <xref:azure.mgmt.cosmosdb.models.ErrorDetail>
- description: Extensions to be added or updated on cluster.
  name: extensions
  types:
  - <xref:list>[<xref:str>]
attributes:
