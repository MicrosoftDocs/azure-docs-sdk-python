  name: node_count
  summary: Number of nodes.
  signature: 'node_count: int | None'
- uid: azure.mgmt.cosmosdb.models.GarnetClusterResourceProperties.node_sku
  name: node_sku
  summary: Virtual Machine SKU used for clusters. Default value is Standard_DS14_v2.
  signature: 'node_sku: str | None'
- uid: azure.mgmt.cosmosdb.models.GarnetClusterResourceProperties.provision_error
  name: provision_error
  summary: Error related to resource provisioning.
  signature: 'provision_error: _models.ErrorDetail | None'
- uid: azure.mgmt.cosmosdb.models.GarnetClusterResourceProperties.provisioning_state
  name: provisioning_state
  summary: '"Creating", "Updating",

    "Deleting", "Succeeded", "Failed", and "Canceled".'
  signature: 'provisioning_state: str | _models.GarnetCacheProvisioningState | None'
- uid: azure.mgmt.cosmosdb.models.GarnetClusterResourceProperties.replication_factor
  name: replication_factor
  summary: Number of copies of data maintained by the cluster.
  signature: 'replication_factor: int | None'
- uid: azure.mgmt.cosmosdb.models.GarnetClusterResourceProperties.subnet_id
  name: subnet_id
  summary: 'Resource id of a subnet that this cluster''s management service should
