  signature: 'databases_to_restore: list[''_models.DatabaseRestoreResource''] | None'
- uid: azure.mgmt.cosmosdb.models.RestoreParameters.gremlin_databases_to_restore
  name: gremlin_databases_to_restore
  summary: List of specific gremlin databases available for restore.
  signature: 'gremlin_databases_to_restore: list[''_models.GremlinDatabaseRestoreResource'']
    | None'
- uid: azure.mgmt.cosmosdb.models.RestoreParameters.restore_mode
  name: restore_mode
  summary: Describes the mode of the restore. "PointInTime"
  signature: 'restore_mode: str | _models.RestoreMode | None'
- uid: azure.mgmt.cosmosdb.models.RestoreParameters.source_backup_location
  name: source_backup_location
  summary: The source backup location for restore.
  signature: 'source_backup_location: str | None'
