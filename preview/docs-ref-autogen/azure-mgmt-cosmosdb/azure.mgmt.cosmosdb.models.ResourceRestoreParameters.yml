### YamlMime:PythonClass
uid: azure.mgmt.cosmosdb.models.ResourceRestoreParameters
name: ResourceRestoreParameters
fullName: azure.mgmt.cosmosdb.models.ResourceRestoreParameters
module: azure.mgmt.cosmosdb.models
summary: Parameters to indicate the information about the restore.
constructor:
  syntax: 'ResourceRestoreParameters(*args: Any, **kwargs: Any)'
variables:
- description: 'The id of the restorable database account from which the restore has
    to

    be initiated. For example:

    /subscriptions/{subscriptionId}/providers/Microsoft.DocumentDB/locations/{location}/restorableDatabaseAccounts/{restorableDatabaseAccountName}.'
  name: restore_source
  types:
  - <xref:str>
- description: Time to which the account has to be restored (ISO-8601 format).
  name: restore_timestamp_in_utc
  types:
  - <xref:datetime.datetime>
- description: 'Specifies whether the restored account will have Time-To-Live

    disabled upon the successful restore.'
  name: restore_with_ttl_disabled
  types:
  - <xref:bool>
