### YamlMime:PythonClass
uid: azure.mgmt.cosmosdb.models.VectorIndex
name: VectorIndex
fullName: azure.mgmt.cosmosdb.models.VectorIndex
module: azure.mgmt.cosmosdb.models
summary: VectorIndex.
constructor:
  syntax: 'VectorIndex(*args: Any, **kwargs: Any)'
variables:
- description: The path to the vector field in the document. Required.
  name: path
  types:
  - <xref:str>
- description: 'The index type of the vector. Currently, flat, diskANN, and quantizedFlat
    are

    supported. Required. Known values are: "flat", "diskANN", and "quantizedFlat".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.VectorIndexType>
- description: 'The number of bytes used in product quantization of the vectors.

    A larger value may result in better recall for vector searches at the expense
    of latency. This

    is only applicable for the quantizedFlat and diskANN vector index types.'
  name: quantization_byte_size
  types:
  - <xref:int>
- description: 'This is the size of the candidate list of approximate

    neighbors stored while building the DiskANN index as part of the optimization
    processes. Large

    values may improve recall at the expense of latency. This is only applicable for
    the diskANN

    vector index type.'
  name: indexing_search_list_size
  types:
  - <xref:int>
- description: 'Array of shard keys for the vector index. This is only applicable

    for the quantizedFlat and diskANN vector index types.'
  name: vector_index_shard_key
  types:
  - <xref:list>[<xref:str>]
attributes:
