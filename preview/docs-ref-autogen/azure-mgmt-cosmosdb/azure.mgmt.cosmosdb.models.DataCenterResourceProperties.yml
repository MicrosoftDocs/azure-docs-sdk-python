### YamlMime:PythonClass
uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties
name: DataCenterResourceProperties
fullName: azure.mgmt.cosmosdb.models.DataCenterResourceProperties
module: azure.mgmt.cosmosdb.models
summary: Properties of a managed Cassandra data center.
constructor:
  syntax: 'DataCenterResourceProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The status of the resource at the time the operation was called.

    Known values are: "Creating", "Updating", "Deleting", "Succeeded", "Failed", and
    "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.ManagedCassandraProvisioningState>
- description: The region this data center should be created in.
  name: data_center_location
  types:
  - <xref:str>
- description: 'Resource id of a subnet the nodes in this data center should have

    their network interfaces connected to. The subnet must be in the same region specified
    in

    ''dataCenterLocation'' and must be able to route to the subnet specified in the
    cluster''s

    ''delegatedManagementSubnetId'' property. This resource id will be of the form

    ''/subscriptions/<subscription id>/resourceGroups/<resource

    group>/providers/Microsoft.Network/virtualNetworks/<virtual network>/subnets/<subnet>''.'
  name: delegated_subnet_id
  types:
  - <xref:str>
- description: 'The number of nodes the data center should have. This is the desired
    number.

    After it is set, it may take some time for the data center to be scaled to match.
    To monitor

    the number of nodes and their status, use the fetchNodeStatus method on the cluster.'
  name: node_count
  types:
  - <xref:int>
- description: 'IP addresses for seed nodes in this data center. This is for reference.

    Generally you will want to use the seedNodes property on the cluster, which aggregates
    the seed

    nodes from all data centers in the cluster.'
  name: seed_nodes
  types:
  - <xref:list>[<xref:azure.mgmt.cosmosdb.models.SeedNode>]
- description: 'A fragment of a cassandra.yaml configuration file

    to be included in the cassandra.yaml for all nodes in this data center. The fragment
    should be

    Base64 encoded, and only a subset of keys are allowed.'
  name: base64_encoded_cassandra_yaml_fragment
  types:
  - <xref:str>
- description: 'Key uri to use for encryption of managed disks. Ensure the

    system assigned identity of the cluster has been assigned appropriate permissions(key

    get/wrap/unwrap permissions) on the key.'
  name: managed_disk_customer_key_uri
  types:
  - <xref:str>
- description: 'Indicates the Key Uri of the customer key to use for

    encryption of the backup storage account.'
  name: backup_storage_customer_key_uri
  types:
  - <xref:str>
- description: Virtual Machine SKU used for data centers. Default value is Standard_DS14_v2.
  name: sku
  types:
  - <xref:str>
- description: Disk SKU used for data centers. Default value is P30.
  name: disk_sku
  types:
  - <xref:str>
- description: Number of disks attached to each node. Default is 4.
  name: disk_capacity
  types:
  - <xref:int>
- description: 'If the data center has Availability Zone support, apply it to the

    Virtual Machine ScaleSet that host the cassandra data center virtual machines.'
  name: availability_zone
  types:
  - <xref:bool>
- description: 'Ldap authentication method properties. This

    feature is in preview.'
  name: authentication_method_ldap_properties
  types:
  - <xref:azure.mgmt.cosmosdb.models.AuthenticationMethodLdapProperties>
- description: Whether the data center has been deallocated.
  name: deallocated
  types:
  - <xref:bool>
- description: Error related to resource provisioning.
  name: provision_error
  types:
  - <xref:azure.mgmt.cosmosdb.models.CassandraError>
- description: Ip of the VPN Endpoint for this data center.
  name: private_endpoint_ip_address
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.authentication_method_ldap_properties
  name: authentication_method_ldap_properties
  summary: Ldap authentication method properties. This feature is in preview.
  signature: 'authentication_method_ldap_properties: _models.AuthenticationMethodLdapProperties
    | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.availability_zone
  name: availability_zone
  summary: 'If the data center has Availability Zone support, apply it to the Virtual
    Machine ScaleSet that

    host the cassandra data center virtual machines.'
  signature: 'availability_zone: bool | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.backup_storage_customer_key_uri
  name: backup_storage_customer_key_uri
  summary: Indicates the Key Uri of the customer key to use for encryption of the
    backup storage account.
  signature: 'backup_storage_customer_key_uri: str | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.base64_encoded_cassandra_yaml_fragment
  name: base64_encoded_cassandra_yaml_fragment
  summary: 'A fragment of a cassandra.yaml configuration file to be included in the
    cassandra.yaml for all

    nodes in this data center. The fragment should be Base64 encoded, and only a subset
    of keys are

    allowed.'
  signature: 'base64_encoded_cassandra_yaml_fragment: str | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.data_center_location
  name: data_center_location
  summary: The region this data center should be created in.
  signature: 'data_center_location: str | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.deallocated
  name: deallocated
  summary: Whether the data center has been deallocated.
  signature: 'deallocated: bool | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.delegated_subnet_id
  name: delegated_subnet_id
  summary: 'Resource id of a subnet the nodes in this data center should have their
    network interfaces

    connected to. The subnet must be in the same region specified in ''dataCenterLocation''
    and must

    be able to route to the subnet specified in the cluster''s ''delegatedManagementSubnetId''

    property. This resource id will be of the form ''/subscriptions/<subscription

    id>/resourceGroups/<resource group>/providers/Microsoft.Network/virtualNetworks/<virtual

    network>/subnets/<subnet>''.'
  signature: 'delegated_subnet_id: str | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.disk_capacity
  name: disk_capacity
  summary: Number of disks attached to each node. Default is 4.
  signature: 'disk_capacity: int | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.disk_sku
  name: disk_sku
  summary: Disk SKU used for data centers. Default value is P30.
  signature: 'disk_sku: str | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.managed_disk_customer_key_uri
  name: managed_disk_customer_key_uri
  summary: 'Key uri to use for encryption of managed disks. Ensure the system assigned
    identity of the

    cluster has been assigned appropriate permissions(key get/wrap/unwrap permissions)
    on the key.'
  signature: 'managed_disk_customer_key_uri: str | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.node_count
  name: node_count
  summary: 'The number of nodes the data center should have. This is the desired number.
    After it is set,

    it may take some time for the data center to be scaled to match. To monitor the
    number of nodes

    and their status, use the fetchNodeStatus method on the cluster.'
  signature: 'node_count: int | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.private_endpoint_ip_address
  name: private_endpoint_ip_address
  summary: Ip of the VPN Endpoint for this data center.
  signature: 'private_endpoint_ip_address: str | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.provision_error
  name: provision_error
  summary: Error related to resource provisioning.
  signature: 'provision_error: _models.CassandraError | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.provisioning_state
  name: provisioning_state
  summary: 'The status of the resource at the time the operation was called. Known
    values are:

    "Creating", "Updating", "Deleting", "Succeeded", "Failed", and "Canceled".'
  signature: 'provisioning_state: str | _models.ManagedCassandraProvisioningState
    | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.seed_nodes
  name: seed_nodes
  summary: 'IP addresses for seed nodes in this data center. This is for reference.
    Generally you will want

    to use the seedNodes property on the cluster, which aggregates the seed nodes
    from all data

    centers in the cluster.'
  signature: 'seed_nodes: list[''_models.SeedNode''] | None'
- uid: azure.mgmt.cosmosdb.models.DataCenterResourceProperties.sku
  name: sku
  summary: Virtual Machine SKU used for data centers. Default value is Standard_DS14_v2.
  signature: 'sku: str | None'
