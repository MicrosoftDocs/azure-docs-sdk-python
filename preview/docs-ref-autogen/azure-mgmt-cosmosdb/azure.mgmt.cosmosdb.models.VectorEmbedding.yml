### YamlMime:PythonClass
uid: azure.mgmt.cosmosdb.models.VectorEmbedding
name: VectorEmbedding
fullName: azure.mgmt.cosmosdb.models.VectorEmbedding
module: azure.mgmt.cosmosdb.models
summary: 'Represents a vector embedding. A vector embedding is used to define a vector
  field in the

  documents.'
constructor:
  syntax: 'VectorEmbedding(*args: Any, **kwargs: Any)'
variables:
- description: The path to the vector field in the document. Required.
  name: path
  types:
  - <xref:str>
- description: 'Indicates the data type of vector. Required. Known values are: "float32",

    "uint8", "int8", and "float16".'
  name: data_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.VectorDataType>
- description: 'The distance function to use for distance calculation in between

    vectors. Required. Known values are: "euclidean", "cosine", and "dotproduct".'
  name: distance_function
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.DistanceFunction>
- description: The number of dimensions in the vector. Required.
  name: dimensions
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.cosmosdb.models.VectorEmbedding.data_type
  name: data_type
  summary: '"float32", "uint8",

    "int8", and "float16".'
  signature: 'data_type: str | _models.VectorDataType'
- uid: azure.mgmt.cosmosdb.models.VectorEmbedding.dimensions
  name: dimensions
  summary: The number of dimensions in the vector. Required.
  signature: 'dimensions: int'
- uid: azure.mgmt.cosmosdb.models.VectorEmbedding.distance_function
  name: distance_function
  summary: 'The distance function to use for distance calculation in between vectors.
    Required. Known

    values are: "euclidean", "cosine", and "dotproduct".'
  signature: 'distance_function: str | _models.DistanceFunction'
- uid: azure.mgmt.cosmosdb.models.VectorEmbedding.path
  name: path
  summary: The path to the vector field in the document. Required.
  signature: 'path: str'
