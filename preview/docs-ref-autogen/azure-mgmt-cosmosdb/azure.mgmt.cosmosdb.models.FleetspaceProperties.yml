### YamlMime:PythonClass
uid: azure.mgmt.cosmosdb.models.FleetspaceProperties
name: FleetspaceProperties
fullName: azure.mgmt.cosmosdb.models.FleetspaceProperties
module: azure.mgmt.cosmosdb.models
summary: Properties to update Azure Cosmos DB Fleetspace.
constructor:
  syntax: 'FleetspaceProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'A provisioning state of the Fleetspace. Known values are:

    "Uninitialized", "Initializing", "InternallyReady", "Online", "Deleting", "Succeeded",

    "Failed", "Canceled", "Updating", and "Creating".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.Status>
- description: 'The kind of API this fleetspace belongs to. Acceptable values:

    ''NoSQL''. "NoSQL"'
  name: fleetspace_api_kind
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.FleetspacePropertiesFleetspaceApiKind>
- description: 'Service Tier for the fleetspace. GeneralPurpose types refers to single

    write region accounts that can be added to this fleetspace, whereas BusinessCritical
    refers to

    multi write region. Known values are: "GeneralPurpose" and "BusinessCritical".'
  name: service_tier
  types:
  - <xref:str>
  - <xref:azure.mgmt.cosmosdb.models.FleetspacePropertiesServiceTier>
- description: List of data regions assigned to the fleetspace. Eg [westus2].
  name: data_regions
  types:
  - <xref:list>[<xref:str>]
- description: Configuration for throughput pool in the fleetspace.
  name: throughput_pool_configuration
  types:
  - <xref:azure.mgmt.cosmosdb.models.FleetspacePropertiesThroughputPoolConfiguration>
attributes:
- uid: azure.mgmt.cosmosdb.models.FleetspaceProperties.data_regions
  name: data_regions
  summary: List of data regions assigned to the fleetspace. Eg [westus2].
  signature: 'data_regions: list[str] | None'
- uid: azure.mgmt.cosmosdb.models.FleetspaceProperties.fleetspace_api_kind
  name: fleetspace_api_kind
  summary: '''NoSQL''. "NoSQL"'
  signature: 'fleetspace_api_kind: str | _models.FleetspacePropertiesFleetspaceApiKind
    | None'
- uid: azure.mgmt.cosmosdb.models.FleetspaceProperties.provisioning_state
  name: provisioning_state
  summary: '"Uninitialized", "Initializing",

    "InternallyReady", "Online", "Deleting", "Succeeded", "Failed", "Canceled",

    "Updating", and "Creating".'
  signature: 'provisioning_state: str | _models.Status | None'
- uid: azure.mgmt.cosmosdb.models.FleetspaceProperties.service_tier
  name: service_tier
  summary: 'Service Tier for the fleetspace. GeneralPurpose types refers to single
    write region accounts

    that can be added to this fleetspace, whereas BusinessCritical refers to multi
