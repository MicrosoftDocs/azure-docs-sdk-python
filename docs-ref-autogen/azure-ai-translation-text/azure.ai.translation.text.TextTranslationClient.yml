### YamlMime:PythonClass
uid: azure.ai.translation.text.TextTranslationClient
name: TextTranslationClient
fullName: azure.ai.translation.text.TextTranslationClient
module: azure.ai.translation.text
summary: "Azure Translator is a cloud-based, multilingual, neural machine translation\
  \ service. The Text\nTranslation API enables robust and scalable translation capabilities\
  \ suitable for diverse\napplications.\n\nCombinations of endpoint and credential\
  \ values:\n\n* (no args) - global endpoint, no auth (get_languages only) \n\n* endpoint\
  \ only - custom endpoint or container, no auth \n\n* AzureKeyCredential + region\
  \ - global endpoint with subscription key \n\n* TokenCredential + audience - global\
  \ endpoint with Cognitive Services token \n\n* TokenCredential + resource_id - global\
  \ endpoint with Entra ID (global resource) \n\n* TokenCredential + region + resource_id\
  \ - global endpoint with Entra ID (regional resource) \n\n* endpoint + AzureKeyCredential\
  \ - custom endpoint with subscription key \n\n* endpoint + TokenCredential - custom\
  \ endpoint with Entra ID"
constructor:
  syntax: 'TextTranslationClient(endpoint: str = ''https://api.cognitive.microsofttranslator.com'',
    credential: AzureKeyCredential | TokenCredential | None = None, *, region: str
    | None = None, resource_id: str | None = None, audience: str | None = None, api_version:
    str = ''2026-06-06'', **kwargs: Any)'
  parameters:
  - name: endpoint
    description: 'Supported Text Translation endpoints (protocol and hostname, for
      example:

      [https://api.cognitive.microsofttranslator.com](https://api.cognitive.microsofttranslator.com)).
      Defaults to the global translator endpoint.'
    defaultValue: https://api.cognitive.microsofttranslator.com
    types:
    - <xref:str>
  - name: credential
    description: 'Credential used to authenticate with the Translator service. Optional
      for

      unauthenticated operations like get_languages.'
    defaultValue: None
    types:
    - <xref:azure.core.credentials.AzureKeyCredential>
    - <xref:azure.core.credentials.TokenCredential>
    - <xref:None>
  - name: region
    description: 'Azure region of the Translator resource. Required for AzureKeyCredential,

      optional for Entra ID regional resources.'
    isRequired: true
    types:
    - <xref:str>
    - <xref:None>
  - name: resource_id
    description: 'Azure resource ID for Entra ID authentication. Required when using

      TokenCredential with global endpoint.'
    isRequired: true
    types:
    - <xref:str>
    - <xref:None>
  - name: audience
    description: Scopes of the credentials.
    isRequired: true
    types:
    - <xref:str>
    - <xref:None>
  - name: api_version
    description: 'Default value is "2026-06-06". Note that overriding this default
      value may

      result in unsupported behavior.'
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: region
    defaultValue: None
  - name: resource_id
    defaultValue: None
  - name: audience
    defaultValue: None
  - name: api_version
    defaultValue: '2026-06-06'
methods:
- uid: azure.ai.translation.text.TextTranslationClient.close
  name: close
  signature: close() -> None
- uid: azure.ai.translation.text.TextTranslationClient.get_supported_languages
  name: get_supported_languages
  summary: 'Gets the set of languages currently supported by other operations of the
    Translator.


    Gets the set of languages currently supported by other operations of the Translator.'
  signature: 'get_supported_languages(*, client_trace_id: str | None = None, scope:
    str | None = None, accept_language: str | None = None, etag: str | None = None,
    match_condition: MatchConditions | None = None, **kwargs: Any) -> GetSupportedLanguagesResult'
  keywordOnlyParameters:
  - name: client_trace_id
    description: 'A client-generated GUID to uniquely identify the request. Default

      value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: scope
    description: 'A comma-separated list of names defining the group of languages
      to return.

      Allowed group names are: `translation`, `transliteration` and `dictionary`.

      If no scope is given, then all groups are returned, which is equivalent to passing

      `scope=translation,transliteration,dictionary`. To decide which set of supported
      languages

      is appropriate for your scenario, see the description of the <xref:response-body>.
      Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: accept_language
    description: 'The language to use for user interface strings. Some of the fields
      in

      the response are names of languages or

      names of regions. Use this parameter to define the language in which these names
      are returned.

      The language is specified by providing a well-formed BCP 47 language tag. For
      instance, use

      the value `fr`

      to request names in French or use the value `zh-Hant` to request names in Chinese

      Traditional.

      Names are provided in the English language when a target language is not specified
      or when

      localization

      is not available. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: etag
    description: 'check if resource is changed. Set None to skip checking etag. Default
      value is

      None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: match_condition
    description: The match condition to use upon the etag. Default value is None.
    defaultValue: None
    types:
    - <xref:azure.core.MatchConditions>
  return:
    description: 'GetSupportedLanguagesResult. The GetSupportedLanguagesResult is
      compatible with

      MutableMapping'
    types:
    - <xref:azure.ai.translation.text.models.GetSupportedLanguagesResult>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
