    VM and

    validation VM. This must not be specified if `containerInstanceSubnetId` is specified
    because

    no proxy virtual machine is deployed in that case. Omit or specify empty string
    to use the

    default (Standard_A1_v2).'
  name: proxy_vm_size
  types:
  - <xref:str>
