### YamlMime:PythonClass
uid: azure.mgmt.imagebuilder.models.ImageTemplateFileCustomizer
name: ImageTemplateFileCustomizer
fullName: azure.mgmt.imagebuilder.models.ImageTemplateFileCustomizer
module: azure.mgmt.imagebuilder.models
summary: Uploads files to VMs (Linux, Windows). Corresponds to Packer file provisioner.
constructor:
  syntax: 'ImageTemplateFileCustomizer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly Name to provide context on what this customization step does.
  name: name
  types:
  - <xref:str>
- description: 'The URI of the file to be uploaded for customizing the VM. It can
    be a github

    link, SAS URI for Azure Storage, etc.'
  name: source_uri
  types:
  - <xref:str>
- description: SHA256 checksum of the file provided in the sourceUri field above.
  name: sha256_checksum
  types:
  - <xref:str>
- description: 'The absolute path to a file (with nested directory structures already

    created) where the file (from sourceUri) will be uploaded to in the VM.'
  name: destination
  types:
  - <xref:str>
- description: 'The type of customization tool you want to use on the Image. For example,
    "Shell"

    can be shell customizer. Required. Default value is "File".'
  name: type
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileCustomizer.destination
  name: destination
  summary: 'The absolute path to a file (with nested directory structures already
    created) where the file

    (from sourceUri) will be uploaded to in the VM.'
  signature: 'destination: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileCustomizer.sha256_checksum
  name: sha256_checksum
  summary: SHA256 checksum of the file provided in the sourceUri field above.
  signature: 'sha256_checksum: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileCustomizer.source_uri
  name: source_uri
  summary: 'The URI of the file to be uploaded for customizing the VM. It can be a
    github link, SAS URI for

    Azure Storage, etc.'
  signature: 'source_uri: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileCustomizer.type
  name: type
  summary: 'The type of customization tool you want to use on the Image. For example,
    "Shell" can be

    shell customizer. Required. Default value is "File".'
  signature: 'type: Literal[''File'']'
