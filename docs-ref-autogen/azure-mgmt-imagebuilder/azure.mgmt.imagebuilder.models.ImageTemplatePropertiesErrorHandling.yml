variables:
- description: 'If there is a customizer error and this field is set to ''cleanup'',

    the build VM and associated network resources will be cleaned up. This is the
    default behavior.

    If there is a customizer error and this field is set to ''abort'', the build VM
    will be

    preserved. Known values are: "cleanup" and "abort".'
  name: on_customizer_error
