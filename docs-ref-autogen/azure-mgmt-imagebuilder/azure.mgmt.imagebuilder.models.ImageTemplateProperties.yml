### YamlMime:PythonClass
uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties
name: ImageTemplateProperties
fullName: azure.mgmt.imagebuilder.models.ImageTemplateProperties
module: azure.mgmt.imagebuilder.models
summary: Describes the properties of an image template.
constructor:
  syntax: 'ImageTemplateProperties(*args: Any, **kwargs: Any)'
variables:
- description: Specifies the properties used to describe the source image. Required.
  name: source
  types:
  - <xref:azure.mgmt.imagebuilder.models.ImageTemplateSource>
- description: 'Specifies the properties used to describe the customization steps
    of the

    image, like Image source etc.'
  name: customize
  types:
  - <xref:list>[<xref:azure.mgmt.imagebuilder.models.ImageTemplateCustomizer>]
- description: Specifies optimization to be performed on image.
  name: optimize
  types:
  - <xref:azure.mgmt.imagebuilder.models.ImageTemplatePropertiesOptimize>
- description: 'Configuration options and list of validations to be performed on the
    resulting

    image.'
  name: validate
  types:
  - <xref:azure.mgmt.imagebuilder.models.ImageTemplatePropertiesValidate>
- description: The distribution targets where the image output needs to go to. Required.
  name: distribute
  types:
  - <xref:list>[<xref:azure.mgmt.imagebuilder.models.ImageTemplateDistributor>]
- description: Error handling options upon a build failure.
  name: error_handling
  types:
  - <xref:azure.mgmt.imagebuilder.models.ImageTemplatePropertiesErrorHandling>
- description: 'Provisioning state of the resource. Known values are: "Creating",

    "Updating", "Succeeded", "Failed", "Deleting", and "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.imagebuilder.models.ProvisioningState>
- description: Provisioning error, if any.
  name: provisioning_error
  types:
  - <xref:azure.mgmt.imagebuilder.models.ProvisioningError>
- description: State of 'run' that is currently executing or was last executed.
  name: last_run_status
  types:
  - <xref:azure.mgmt.imagebuilder.models.ImageTemplateLastRunStatus>
- description: 'Maximum duration to wait while building the image template

    (includes all customizations, optimization, validations, and distributions). Omit
    or specify 0

    to use the default (4 hours).'
  name: build_timeout_in_minutes
  types:
  - <xref:int>
- description: Describes how virtual machine is set up to build images.
  name: vm_profile
  types:
  - <xref:azure.mgmt.imagebuilder.models.ImageTemplateVmProfile>
- description: Optional array of additional data disks to be added to the image.
  name: additional_data_disks
  types:
  - <xref:list>[<xref:azure.mgmt.imagebuilder.models.DataDisk>]
- description: 'The staging resource group id in the same subscription as the

    image template that will be used to build the image. If this field is empty, a
    resource group

    with a random name will be created. If the resource group specified in this field
    doesn''t

    exist, it will be created with the same name. If the resource group specified
    exists, it must

    be empty and in the same region as the image template. The resource group created
    will be

    deleted during template deletion if this field is empty or the resource group
    specified doesn''t

    exist, but if the resource group specified exists the resources created in the
    resource group

    will be deleted during template deletion and the resource group itself will remain.'
  name: staging_resource_group
  types:
  - <xref:str>
- description: 'The staging resource group id in the same subscription as

    the image template that will be used to build the image. This read-only field
    differs from

    ''stagingResourceGroup'' only if the value specified in the ''stagingResourceGroup''
    field is

    empty.'
  name: exact_staging_resource_group
  types:
  - <xref:str>
- description: 'Indicates whether or not to automatically run the image template build
    on

    template creation or update.'
  name: auto_run
  types:
  - <xref:azure.mgmt.imagebuilder.models.ImageTemplateAutoRun>
- description: 'Tags that will be applied to the resource group and/or resources

    created by the service.'
  name: managed_resource_tags
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
attributes:
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.additional_data_disks
  name: additional_data_disks
  summary: Optional array of additional data disks to be added to the image.
  signature: 'additional_data_disks: list[''_models.DataDisk''] | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.auto_run
  name: auto_run
  summary: 'Indicates whether or not to automatically run the image template build
    on template creation or

    update.'
  signature: 'auto_run: _models.ImageTemplateAutoRun | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.build_timeout_in_minutes
  name: build_timeout_in_minutes
  summary: 'Maximum duration to wait while building the image template (includes all
    customizations,

    optimization, validations, and distributions). Omit or specify 0 to use the default
    (4 hours).'
  signature: 'build_timeout_in_minutes: int | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.customize
  name: customize
  summary: 'Specifies the properties used to describe the customization steps of the
    image, like Image

    source etc.'
  signature: 'customize: list[''_models.ImageTemplateCustomizer''] | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.distribute
  name: distribute
  summary: The distribution targets where the image output needs to go to. Required.
  signature: 'distribute: list[''_models.ImageTemplateDistributor'']'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.error_handling
  name: error_handling
  summary: Error handling options upon a build failure.
  signature: 'error_handling: _models.ImageTemplatePropertiesErrorHandling | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.exact_staging_resource_group
  name: exact_staging_resource_group
  summary: 'The staging resource group id in the same subscription as the image template
    that will be used

    to build the image. This read-only field differs from ''stagingResourceGroup''
    only if the value

    specified in the ''stagingResourceGroup'' field is empty.'
  signature: 'exact_staging_resource_group: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.last_run_status
  name: last_run_status
  summary: State of 'run' that is currently executing or was last executed.
  signature: 'last_run_status: _models.ImageTemplateLastRunStatus | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.managed_resource_tags
  name: managed_resource_tags
  summary: Tags that will be applied to the resource group and/or resources created
    by the service.
  signature: 'managed_resource_tags: dict[str, str] | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.optimize
  name: optimize
  summary: Specifies optimization to be performed on image.
  signature: 'optimize: _models.ImageTemplatePropertiesOptimize | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.provisioning_error
  name: provisioning_error
  summary: Provisioning error, if any.
  signature: 'provisioning_error: _models.ProvisioningError | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.provisioning_state
  name: provisioning_state
  summary: '"Creating", "Updating",

    "Succeeded", "Failed", "Deleting", and "Canceled".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.source
  name: source
  summary: Specifies the properties used to describe the source image. Required.
  signature: 'source: _models.ImageTemplateSource'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.staging_resource_group
  name: staging_resource_group
  summary: 'The staging resource group id in the same subscription as the image template
    that will be used

    to build the image. If this field is empty, a resource group with a random name
    will be

    created. If the resource group specified in this field doesn''t exist, it will
    be created with

    the same name. If the resource group specified exists, it must be empty and in
    the same region

    as the image template. The resource group created will be deleted during template
    deletion if

    this field is empty or the resource group specified doesn''t exist, but if the
    resource group

    specified exists the resources created in the resource group will be deleted during
    template

    deletion and the resource group itself will remain.'
  signature: 'staging_resource_group: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.validate
  name: validate
  summary: Configuration options and list of validations to be performed on the resulting
    image.
  signature: 'validate: _models.ImageTemplatePropertiesValidate | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateProperties.vm_profile
  name: vm_profile
  summary: Describes how virtual machine is set up to build images.
  signature: 'vm_profile: _models.ImageTemplateVmProfile | None'
