### YamlMime:PythonClass
uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer
name: ImageTemplatePowerShellCustomizer
fullName: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer
module: azure.mgmt.imagebuilder.models
summary: 'Runs the specified PowerShell on the VM (Windows). Corresponds to Packer
  powershell

  provisioner. Exactly one of ''scriptUri'' or ''inline'' can be specified.'
constructor:
  syntax: 'ImageTemplatePowerShellCustomizer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly Name to provide context on what this customization step does.
  name: name
  types:
  - <xref:str>
- description: 'URI of the PowerShell script to be run for customizing. It can be
    a github

    link, SAS URI for Azure Storage, etc.'
  name: script_uri
  types:
  - <xref:str>
- description: 'SHA256 checksum of the power shell script provided in the scriptUri

    field above.'
  name: sha256_checksum
  types:
  - <xref:str>
- description: Array of PowerShell commands to execute.
  name: inline
  types:
  - <xref:list>[<xref:str>]
- description: If specified, the PowerShell script will be run with elevated privileges.
  name: run_elevated
  types:
  - <xref:bool>
- description: 'If specified, the PowerShell script will be run with elevated privileges

    using the Local System user. Can only be true when the runElevated field above
    is set to true.'
  name: run_as_system
  types:
  - <xref:bool>
- description: 'Valid exit codes for the PowerShell script. [Default: 0].'
  name: valid_exit_codes
  types:
  - <xref:list>[<xref:int>]
- description: 'The type of customization tool you want to use on the Image. For example,
    "Shell"

    can be shell customizer. Required. Default value is "PowerShell".'
  name: type
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer.inline
  name: inline
  summary: Array of PowerShell commands to execute.
  signature: 'inline: list[str] | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer.run_as_system
  name: run_as_system
  summary: 'If specified, the PowerShell script will be run with elevated privileges
    using the Local System

    user. Can only be true when the runElevated field above is set to true.'
  signature: 'run_as_system: bool | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer.run_elevated
  name: run_elevated
  summary: If specified, the PowerShell script will be run with elevated privileges.
  signature: 'run_elevated: bool | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer.script_uri
  name: script_uri
  summary: 'URI of the PowerShell script to be run for customizing. It can be a github
    link, SAS URI for

    Azure Storage, etc.'
  signature: 'script_uri: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer.sha256_checksum
  name: sha256_checksum
  summary: SHA256 checksum of the power shell script provided in the scriptUri field
    above.
  signature: 'sha256_checksum: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer.type
  name: type
  summary: 'The type of customization tool you want to use on the Image. For example,
    "Shell" can be

    shell customizer. Required. Default value is "PowerShell".'
  signature: 'type: Literal[''PowerShell'']'
- uid: azure.mgmt.imagebuilder.models.ImageTemplatePowerShellCustomizer.valid_exit_codes
  name: valid_exit_codes
  summary: 0].
  signature: 'valid_exit_codes: list[int] | None'
