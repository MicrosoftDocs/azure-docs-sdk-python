name: ImageTemplateWindowsUpdateCustomizer
fullName: azure.mgmt.imagebuilder.models.ImageTemplateWindowsUpdateCustomizer
module: azure.mgmt.imagebuilder.models
summary: 'Installs Windows Updates. Corresponds to Packer Windows Update Provisioner

  ([https://github.com/rgl/packer-provisioner-windows-update](https://github.com/rgl/packer-provisioner-windows-update)).'
constructor:
  syntax: 'ImageTemplateWindowsUpdateCustomizer(*args: Any, **kwargs: Any)'
variables:
- description: Friendly Name to provide context on what this customization step does.
  name: name
  types:
  - <xref:str>
- description: 'Criteria to search updates. Omit or specify empty string to use the

    default (search all). Refer to above link for examples and detailed description
    of this field.'
  name: search_criteria
  types:
  - <xref:str>
- description: 'Array of filters to select updates to apply. Omit or specify empty
    array to use

    the default (no filter). Refer to above link for examples and detailed description
    of this

    field.'
  name: filters
  types:
  - <xref:list>[<xref:str>]
- description: 'Maximum number of updates to apply at a time. Omit or specify 0 to
    use the

    default (1000).'
  name: update_limit
  types:
  - <xref:int>
- description: 'The type of customization tool you want to use on the Image. For example,
    "Shell"

    can be shell customizer. Required. Default value is "WindowsUpdate".'
  name: type
  types:
  - <xref:str>
