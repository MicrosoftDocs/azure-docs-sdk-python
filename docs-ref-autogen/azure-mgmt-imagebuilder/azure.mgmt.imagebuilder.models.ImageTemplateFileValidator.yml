### YamlMime:PythonClass
uid: azure.mgmt.imagebuilder.models.ImageTemplateFileValidator
name: ImageTemplateFileValidator
fullName: azure.mgmt.imagebuilder.models.ImageTemplateFileValidator
module: azure.mgmt.imagebuilder.models
summary: 'Uploads files required for validation to VMs (Linux, Windows). Corresponds
  to Packer file

  provisioner.'
constructor:
  syntax: 'ImageTemplateFileValidator(*args: Any, **kwargs: Any)'
variables:
- description: Friendly Name to provide context on what this validation step does.
  name: name
  types:
  - <xref:str>
- description: 'The URI of the file to be uploaded to the VM for validation. It can
    be a

    github link, Azure Storage URI (authorized or SAS), etc.'
  name: source_uri
  types:
  - <xref:str>
- description: SHA256 checksum of the file provided in the sourceUri field above.
  name: sha256_checksum
  types:
  - <xref:str>
- description: 'The absolute path to a file (with nested directory structures already

    created) where the file (from sourceUri) will be uploaded to in the VM.'
  name: destination
  types:
  - <xref:str>
- description: 'The type of validation you want to use on the Image. For example,
    "Shell" can be

    shell validation. Required. Default value is "File".'
  name: type
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileValidator.destination
  name: destination
  summary: 'The absolute path to a file (with nested directory structures already
    created) where the file

    (from sourceUri) will be uploaded to in the VM.'
  signature: 'destination: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileValidator.sha256_checksum
  name: sha256_checksum
  summary: SHA256 checksum of the file provided in the sourceUri field above.
  signature: 'sha256_checksum: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileValidator.source_uri
  name: source_uri
  summary: 'The URI of the file to be uploaded to the VM for validation. It can be
    a github link, Azure

    Storage URI (authorized or SAS), etc.'
  signature: 'source_uri: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateFileValidator.type
  name: type
  summary: 'The type of validation you want to use on the Image. For example, "Shell"
    can be shell

    validation. Required. Default value is "File".'
  signature: 'type: Literal[''File'']'
