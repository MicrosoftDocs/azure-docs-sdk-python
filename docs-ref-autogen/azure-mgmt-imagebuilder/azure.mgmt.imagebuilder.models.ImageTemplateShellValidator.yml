### YamlMime:PythonClass
uid: azure.mgmt.imagebuilder.models.ImageTemplateShellValidator
name: ImageTemplateShellValidator
fullName: azure.mgmt.imagebuilder.models.ImageTemplateShellValidator
module: azure.mgmt.imagebuilder.models
summary: 'Runs the specified shell script during the validation phase (Linux). Corresponds
  to Packer

  shell provisioner. Exactly one of ''scriptUri'' or ''inline'' can be specified.'
constructor:
  syntax: 'ImageTemplateShellValidator(*args: Any, **kwargs: Any)'
variables:
- description: Friendly Name to provide context on what this validation step does.
  name: name
  types:
  - <xref:str>
- description: 'URI of the shell script to be run for validation. It can be a github
    link,

    Azure Storage URI, etc.'
  name: script_uri
  types:
  - <xref:str>
- description: SHA256 checksum of the shell script provided in the scriptUri field.
  name: sha256_checksum
  types:
  - <xref:str>
- description: Array of shell commands to execute.
  name: inline
  types:
  - <xref:list>[<xref:str>]
- description: 'The type of validation you want to use on the Image. For example,
    "Shell" can be

    shell validation. Required. Default value is "Shell".'
  name: type
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.imagebuilder.models.ImageTemplateShellValidator.inline
  name: inline
  summary: Array of shell commands to execute.
  signature: 'inline: list[str] | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateShellValidator.script_uri
  name: script_uri
  summary: 'URI of the shell script to be run for validation. It can be a github link,
    Azure Storage URI,

    etc.'
  signature: 'script_uri: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateShellValidator.sha256_checksum
  name: sha256_checksum
  summary: SHA256 checksum of the shell script provided in the scriptUri field.
  signature: 'sha256_checksum: str | None'
- uid: azure.mgmt.imagebuilder.models.ImageTemplateShellValidator.type
  name: type
  summary: 'The type of validation you want to use on the Image. For example, "Shell"
    can be shell

    validation. Required. Default value is "Shell".'
  signature: 'type: Literal[''Shell'']'
