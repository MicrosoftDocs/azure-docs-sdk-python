### YamlMime:PythonClass
uid: azure.mgmt.alertsmanagement.models.Scope
name: Scope
fullName: azure.mgmt.alertsmanagement.models.Scope
module: azure.mgmt.alertsmanagement.models
summary: 'Target scope for a given action rule. By default scope will be the subscription.
  User can also

  provide list of resource groups or list of resources from the scope subscription
  as well.'
constructor:
  syntax: 'Scope(*, scope_type: str | _models.ScopeType | None = None, values: list[str]
    | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: scope_type
    description: 'type of target scope. Known values are: "ResourceGroup", "Resource",
      and

      "Subscription".'
    defaultValue: None
    types:
    - <xref:str>
    - <xref:azure.mgmt.alertsmanagement.models.ScopeType>
  - name: values
    description: 'list of ARM IDs of the given scope type which will be the target
      of the given

      action rule.'
    defaultValue: None
    types:
    - <xref:list>[<xref:str>]
variables:
- description: 'type of target scope. Known values are: "ResourceGroup", "Resource",
    and

    "Subscription".'
  name: scope_type
  types:
