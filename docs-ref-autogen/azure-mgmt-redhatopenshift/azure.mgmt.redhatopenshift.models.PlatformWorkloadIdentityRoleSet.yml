summary: 'PlatformWorkloadIdentityRoleSet represents a mapping from the names of OCP
  operators to the

  built-in roles that should be assigned to those operator''s corresponding managed
  identities for

  a particular OCP version.


  Variables are only populated by the server, and will be ignored when sending a request.'
