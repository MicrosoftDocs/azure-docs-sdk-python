- uid: azure.planetarycomputer.aio.operations.DataOperations.get_interval_legend
  name: get_interval_legend
  summary: 'Get Interval Legend.


    Generate values and color swatches mapping for a given interval classmap.


    Returns a color map for intervals, where each interval is defined by

    a numeric range [min, max] representing the interval boundaries and

    an RGBA color [red, green, blue, alpha] associated with the interval.


    The response is a 2D array of interval definitions, where each element is a pair:

    the first element is an array of two numbers [min, max] defining the interval,

    and the second element is an array of four numbers [red, green, blue, alpha] defining
    the RGBA

    color.


    Example: [[ [-2, 0], [0, 0, 0, 0] ], [ [1, 32], [255, 255, 178, 255] ]].

    This defines two intervals: [-2, 0] mapped to transparent black and [1, 32] mapped
    to opaque

    yellow.'
  signature: 'async get_interval_legend(classmap_name: str, *, trim_start: int | None
    = None, trim_end: int | None = None, **kwargs: Any) -> list[list[list[int]]]'
  parameters:
  - name: classmap_name
    description: classmap name. Required.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: trim_start
    description: Number of items to trim from the start of the cmap. Default value
      is None.
    defaultValue: None
    types:
    - <xref:int>
  - name: trim_end
    description: Number of items to trim from the end of the cmap. Default value is
      None.
    defaultValue: None
    types:
    - <xref:int>
  return:
    description: list of list of list of int
    types:
    - <xref:list>[<xref:list>[<xref:list>[<xref:int>]]]
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
