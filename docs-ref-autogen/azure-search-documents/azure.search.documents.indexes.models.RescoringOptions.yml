uid: azure.search.documents.indexes.models.RescoringOptions
name: RescoringOptions
fullName: azure.search.documents.indexes.models.RescoringOptions
module: azure.search.documents.indexes.models
summary: Contains the options for rescoring.
constructor:
  syntax: 'RescoringOptions(*args: Any, **kwargs: Any)'
variables:
- description: 'If set to true, after the initial search on the compressed vectors,
    the

    similarity scores are recalculated using the full-precision vectors. This will
    improve recall

    at the expense of latency.'
  name: enable_rescoring
  types:
  - <xref:bool>
- description: 'Default oversampling factor. Oversampling retrieves a greater set

    of potential documents to offset the resolution loss due to quantization. This
    increases the

    set of results that will be rescored on full-precision vectors. Minimum value
    is 1, meaning no

    oversampling (1x). This parameter can only be set when ''enableRescoring'' is
    true. Higher values

    improve recall at the expense of latency.'
  name: default_oversampling
  types:
  - <xref:float>
- description: 'Controls the storage method for original vectors. This setting is

    immutable. Known values are: "preserveOriginals" and "discardOriginals".'
  name: rescore_storage_method
  types:
  - <xref:str>
  - <xref:azure.search.documents.indexes.models.VectorSearchCompressionRescoreStorageMethod>
