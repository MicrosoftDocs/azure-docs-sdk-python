- description: The name of the synonym map. Required.
  name: name
  types:
  - <xref:str>
- description: 'The format of the synonym map. Only the ''solr'' format is currently
    supported.

    Required. Default value is "solr".'
  name: format
  types:
  - <xref:str>
- description: 'A series of synonym rules in the specified synonym map format. The
    rules must

    be separated by newlines. Required.'
  name: synonyms
  types:
  - <xref:list>[<xref:str>]
- description: 'A description of an encryption key that you create in Azure Key Vault.

    This key is used to provide an additional level of encryption-at-rest for your
    data when you

    want full assurance that no one, not even Microsoft, can decrypt your data. Once
    you have

    encrypted your data, it will always remain encrypted. The search service will
    ignore attempts

    to set this property to null. You can change this property as needed if you want
    to rotate your

    encryption key; Your data will be unaffected. Encryption with customer-managed
    keys is not

    available for free search services, and is only available for paid services created
    on or after

    January 1, 2019.'
  name: encryption_key
  types:
  - <xref:azure.search.documents.indexes.models.SearchResourceEncryptionKey>
- description: The ETag of the synonym map.
  name: e_tag
  types:
  - <xref:str>
