uid: azure.search.documents.models.SearchResult
name: SearchResult
fullName: azure.search.documents.models.SearchResult
module: azure.search.documents.models
summary: Contains a document found by a search query, plus associated metadata.
constructor:
  syntax: 'SearchResult(*args: Any, **kwargs: Any)'
variables:
- description: 'The relevance score of the document compared to other documents returned
    by the

    query. Required.'
  name: score
  types:
  - <xref:float>
- description: 'The relevance score computed by the semantic ranker for the top search

    results. Search results are sorted by the RerankerScore first and then by the
    Score.

    RerankerScore is only returned for queries of type ''semantic''.'
  name: reranker_score
  types:
  - <xref:float>
- description: 'The relevance score computed by boosting the Reranker Score.

    Search results are sorted by the RerankerScore/RerankerBoostedScore based on

    useScoringProfileBoostedRanking in the Semantic Config. RerankerBoostedScore is
    only returned

    for queries of type ''semantic''.'
  name: reranker_boosted_score
  types:
  - <xref:float>
- description: 'Text fragments from the document that indicate the matching search
    terms,

    organized by each applicable field; null if hit highlighting was not enabled for
    the query.'
  name: highlights
  types:
  - <xref:dict>[<xref:str>, <xref:list>[<xref:str>]]
- description: 'Captions are the most representative passages from the document relatively
    to

    the search query. They are often used as document summary. Captions are only returned
    for

    queries of type ''semantic''.'
  name: captions
  types:
  - <xref:list>[<xref:azure.search.documents.models.QueryCaptionResult>]
- description: 'Contains debugging information that can be used to further explore

    your search results.'
  name: document_debug_info
  types:
  - <xref:azure.search.documents.models.DocumentDebugInfo>
