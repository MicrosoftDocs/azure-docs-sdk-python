### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.LinuxOSConfig
name: LinuxOSConfig
fullName: azure.mgmt.containerservice.models.LinuxOSConfig
module: azure.mgmt.containerservice.models
summary: OS configurations of Linux agent nodes. See [AKS custom node configuration](https://docs.microsoft.com/azure/aks/custom-node-configuration)
  for more details.
constructor:
  syntax: 'LinuxOSConfig(*args: Any, **kwargs: Any)'
variables:
- description: Sysctl settings for Linux agent nodes.
  name: sysctls
  types:
  - <xref:azure.mgmt.containerservice.models.SysctlConfig>
- description: 'Whether transparent hugepages are enabled. Valid values

    are ''always'', ''madvise'', and ''never''. The default is ''always''. For more
    information see

    [Transparent Hugepages](https://www.kernel.org/doc/html/latest/admin-guide/mm/transhuge.html#admin-guide-transhuge).'
  name: transparent_huge_page_enabled
  types:
  - <xref:str>
- description: 'Whether the kernel should make aggressive use of memory

    compaction to make more hugepages available. Valid values are ''always'', ''defer'',

    ''defer+madvise'', ''madvise'' and ''never''. The default is ''madvise''. For
    more information see

    [Transparent Hugepages](https://www.kernel.org/doc/html/latest/admin-guide/mm/transhuge.html#admin-guide-transhuge).'
  name: transparent_huge_page_defrag
  types:
  - <xref:str>
- description: The size in MB of a swap file that will be created on each node.
  name: swap_file_size_mb
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.containerservice.models.LinuxOSConfig.swap_file_size_mb
  name: swap_file_size_mb
  summary: The size in MB of a swap file that will be created on each node.
  signature: 'swap_file_size_mb: int | None'
- uid: azure.mgmt.containerservice.models.LinuxOSConfig.sysctls
  name: sysctls
  summary: Sysctl settings for Linux agent nodes.
  signature: 'sysctls: _models.SysctlConfig | None'
- uid: azure.mgmt.containerservice.models.LinuxOSConfig.transparent_huge_page_defrag
  name: transparent_huge_page_defrag
  summary: 'Whether the kernel should make aggressive use of memory compaction to
    make more hugepages

    available. Valid values are ''always'', ''defer'', ''defer+madvise'', ''madvise''
    and ''never''. The

    default is ''madvise''. For more information see [Transparent Hugepages](https://www.kernel.org/doc/html/latest/admin-guide/mm/transhuge.html#admin-guide-transhuge).'
  signature: 'transparent_huge_page_defrag: str | None'
- uid: azure.mgmt.containerservice.models.LinuxOSConfig.transparent_huge_page_enabled
  name: transparent_huge_page_enabled
  summary: 'Whether transparent hugepages are enabled. Valid values are ''always'',
    ''madvise'', and ''never''.

    The default is ''always''. For more information see [Transparent Hugepages](https://www.kernel.org/doc/html/latest/admin-guide/mm/transhuge.html#admin-guide-transhuge).'
  signature: 'transparent_huge_page_enabled: str | None'
