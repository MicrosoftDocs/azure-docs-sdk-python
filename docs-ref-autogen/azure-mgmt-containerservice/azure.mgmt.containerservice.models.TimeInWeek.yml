summary: Time in a week.
constructor:
  syntax: 'TimeInWeek(*args: Any, **kwargs: Any)'
variables:
- description: 'The day of the week. Known values are: "Sunday", "Monday", "Tuesday",
    "Wednesday",

    "Thursday", "Friday", and "Saturday".'
  name: day
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.WeekDay>
- description: 'A list of hours in the day used to identify a time range. Each integer
    hour

    represents a time range beginning at 0m after the hour ending at the next hour
    (non-inclusive).

    0 corresponds to 00:00 UTC, 23 corresponds to 23:00 UTC. Specifying [0, 1] means
    the 00:00 -

    02:00 UTC time range.'
  name: hour_slots
  types:
  - <xref:list>[<xref:int>]
