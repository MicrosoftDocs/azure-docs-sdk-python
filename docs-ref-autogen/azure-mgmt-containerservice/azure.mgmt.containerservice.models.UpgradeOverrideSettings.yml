### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.UpgradeOverrideSettings
name: UpgradeOverrideSettings
fullName: azure.mgmt.containerservice.models.UpgradeOverrideSettings
module: azure.mgmt.containerservice.models
summary: Settings for overrides when upgrading a cluster.
constructor:
  syntax: 'UpgradeOverrideSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Whether to force upgrade the cluster. Note that this option instructs

    upgrade operation to bypass upgrade protections such as checking for deprecated
    API usage.

    Enable this option only with caution.'
  name: force_upgrade
  types:
  - <xref:bool>
- description: 'Until when the overrides are effective. Note that this only matches
    the start time

    of an upgrade, and the effectiveness won''t change once an upgrade starts even
    if the `until`

    expires as upgrade proceeds. This field is not set by default. It must be set
    for the overrides

    to take effect.'
  name: until
  types:
  - <xref:datetime.datetime>
