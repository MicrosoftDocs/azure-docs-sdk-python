### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.ManagedClusterAPIServerAccessProfile
name: ManagedClusterAPIServerAccessProfile
fullName: azure.mgmt.containerservice.models.ManagedClusterAPIServerAccessProfile
module: azure.mgmt.containerservice.models
summary: Access profile for managed cluster API server.
constructor:
  syntax: 'ManagedClusterAPIServerAccessProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'The IP ranges authorized to access the Kubernetes API server. IP

    ranges are specified in CIDR format, e.g. 137.117.106.88/29. This feature is not
    compatible

    with clusters that use Public IP Per Node, or clusters that are using a Basic
    Load Balancer.

    For more information see [API server authorized IP ranges](https://docs.microsoft.com/azure/aks/api-server-authorized-ip-ranges).'
  name: authorized_ip_ranges
  types:
  - <xref:list>[<xref:str>]
- description: 'Whether to create the cluster as a private cluster or not. For

    more details, see [Creating a private AKS cluster](https://docs.microsoft.com/azure/aks/private-clusters).'
  name: enable_private_cluster
  types:
  - <xref:bool>
- description: 'The private DNS zone mode for the cluster. The default is System.
    For

    more details see [configure private DNS zone](https://docs.microsoft.com/azure/aks/private-clusters#configure-private-dns-zone).
    Allowed

    values are ''system'' and ''none''.'
  name: private_dns_zone
  types:
  - <xref:str>
- description: 'Whether to create additional public FQDN for private

    cluster or not.'
  name: enable_private_cluster_public_fqdn
  types:
  - <xref:bool>
- description: Whether to disable run command for the cluster or not.
  name: disable_run_command
  types:
  - <xref:bool>
- description: 'Whether to enable apiserver vnet integration for the cluster or

    not. See aka.ms/AksVnetIntegration for more details.'
  name: enable_vnet_integration
  types:
  - <xref:bool>
- description: 'The subnet to be used when apiserver vnet integration is enabled.
    It is

    required when creating a new cluster with BYO Vnet, or when updating an existing
    cluster to

    enable apiserver vnet integration.'
  name: subnet_id
  types:
  - <xref:str>
attributes:
