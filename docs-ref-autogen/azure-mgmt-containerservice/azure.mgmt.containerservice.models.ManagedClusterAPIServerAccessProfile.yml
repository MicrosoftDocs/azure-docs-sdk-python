  signature: 'enable_vnet_integration: bool | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAPIServerAccessProfile.private_dns_zone
  name: private_dns_zone
  summary: 'The private DNS zone mode for the cluster. The default is System. For
    more details see

    [configure private DNS zone](https://docs.microsoft.com/azure/aks/private-clusters#configure-private-dns-zone).
    Allowed

    values are ''system'' and ''none''.'
  signature: 'private_dns_zone: str | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAPIServerAccessProfile.subnet_id
  name: subnet_id
  summary: 'The subnet to be used when apiserver vnet integration is enabled. It is
    required when creating

    a new cluster with BYO Vnet, or when updating an existing cluster to enable apiserver
    vnet

    integration.'
  signature: 'subnet_id: str | None'
