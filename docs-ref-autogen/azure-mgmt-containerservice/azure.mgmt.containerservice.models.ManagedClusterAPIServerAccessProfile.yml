  name: enable_private_cluster
  summary: 'Whether to create the cluster as a private cluster or not. For more details,
    see [Creating a

    private AKS cluster](https://docs.microsoft.com/azure/aks/private-clusters).'
  signature: 'enable_private_cluster: bool | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAPIServerAccessProfile.enable_private_cluster_public_fqdn
  name: enable_private_cluster_public_fqdn
  summary: Whether to create additional public FQDN for private cluster or not.
  signature: 'enable_private_cluster_public_fqdn: bool | None'
