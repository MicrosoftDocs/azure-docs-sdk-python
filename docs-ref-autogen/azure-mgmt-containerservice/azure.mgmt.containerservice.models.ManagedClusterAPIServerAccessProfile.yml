    format, e.g. 137.117.106.88/29. This feature is not compatible with clusters that
    use Public IP

    Per Node, or clusters that are using a Basic Load Balancer. For more information
    see [API

    server authorized IP ranges](https://docs.microsoft.com/azure/aks/api-server-authorized-ip-ranges).'
  signature: 'authorized_ip_ranges: list[str] | None'
- uid: azure.mgmt.containerservice.models.ManagedClusterAPIServerAccessProfile.disable_run_command
  name: disable_run_command
  summary: Whether to disable run command for the cluster or not.
  signature: 'disable_run_command: bool | None'
