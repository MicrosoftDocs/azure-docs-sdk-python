### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.MaintenanceWindow
name: MaintenanceWindow
fullName: azure.mgmt.containerservice.models.MaintenanceWindow
module: azure.mgmt.containerservice.models
summary: Maintenance window used to configure scheduled auto-upgrade for a Managed
  Cluster.
constructor:
  syntax: 'MaintenanceWindow(*args: Any, **kwargs: Any)'
variables:
- description: Recurrence schedule for the maintenance window. Required.
  name: schedule
  types:
  - <xref:azure.mgmt.containerservice.models.Schedule>
- description: Length of maintenance window range from 4 to 24 hours. Required.
  name: duration_hours
  types:
  - <xref:int>
- description: 'The UTC offset in format +/-HH:mm. For example, ''+05:30'' for IST
    and ''-07:00''

    for PST. If not specified, the default is ''+00:00''.'
  name: utc_offset
  types:
  - <xref:str>
- description: 'The date the maintenance window activates. If the current date is
    before this

    date, the maintenance window is inactive and will not be used for upgrades. If
    not specified,

    the maintenance window will be active right away.'
  name: start_date
  types:
  - <xref:datetime.date>
- description: 'The start time of the maintenance window. Accepted values are from
    ''00:00'' to

    ''23:59''. ''utcOffset'' applies to this field. For example: ''02:00'' with ''utcOffset:
    +02:00'' means

    UTC time ''00:00''. Required.'
  name: start_time
  types:
  - <xref:str>
- description: 'Date ranges on which upgrade is not allowed. ''utcOffset'' applies
    to

    this field. For example, with ''utcOffset: +02:00'' and ''dateSpan'' being ''2022-12-23''
    to

    ''2023-01-03'', maintenance will be blocked from ''2022-12-22 22:00'' to ''2023-01-03
    22:00'' in UTC

    time.'
  name: not_allowed_dates
  types:
  - <xref:list>[<xref:azure.mgmt.containerservice.models.DateSpan>]
attributes:
- uid: azure.mgmt.containerservice.models.MaintenanceWindow.duration_hours
  name: duration_hours
  summary: Length of maintenance window range from 4 to 24 hours. Required.
  signature: 'duration_hours: int'
- uid: azure.mgmt.containerservice.models.MaintenanceWindow.not_allowed_dates
  name: not_allowed_dates
  summary: 'Date ranges on which upgrade is not allowed. ''utcOffset'' applies to
    this field. For example,

    with ''utcOffset: +02:00'' and ''dateSpan'' being ''2022-12-23'' to ''2023-01-03'',
    maintenance will be

    blocked from ''2022-12-22 22:00'' to ''2023-01-03 22:00'' in UTC time.'
  signature: 'not_allowed_dates: list[''_models.DateSpan''] | None'
- uid: azure.mgmt.containerservice.models.MaintenanceWindow.schedule
  name: schedule
  summary: Recurrence schedule for the maintenance window. Required.
  signature: 'schedule: _models.Schedule'
- uid: azure.mgmt.containerservice.models.MaintenanceWindow.start_date
  name: start_date
  summary: 'The date the maintenance window activates. If the current date is before
    this date, the

    maintenance window is inactive and will not be used for upgrades. If not specified,
    the

    maintenance window will be active right away.'
  signature: 'start_date: date | None'
- uid: azure.mgmt.containerservice.models.MaintenanceWindow.start_time
  name: start_time
  summary: '59''.

    ''utcOffset'' applies to this field. For example: ''02:00'' with ''utcOffset:
    +02:00'' means UTC time

    ''00:00''. Required.'
  signature: 'start_time: str'
- uid: azure.mgmt.containerservice.models.MaintenanceWindow.utc_offset
  name: utc_offset
  summary: '30'' for IST and ''-07:00'' for PST. If not

    specified, the default is ''+00:00''.'
  signature: 'utc_offset: str | None'
