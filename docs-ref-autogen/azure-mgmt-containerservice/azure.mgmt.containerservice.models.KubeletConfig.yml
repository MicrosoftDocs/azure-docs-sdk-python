### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.KubeletConfig
name: KubeletConfig
fullName: azure.mgmt.containerservice.models.KubeletConfig
module: azure.mgmt.containerservice.models
summary: Kubelet configurations of agent nodes. See [AKS custom node configuration](https://docs.microsoft.com/azure/aks/custom-node-configuration)
  for more details.
constructor:
  syntax: 'KubeletConfig(*args: Any, **kwargs: Any)'
variables:
- description: 'The CPU Manager policy to use. The default is ''none''. See [Kubernetes

    CPU management policies](https://kubernetes.io/docs/tasks/administer-cluster/cpu-management-policies/#cpu-management-policies)

    for more information. Allowed values are ''none'' and ''static''.'
  name: cpu_manager_policy
  types:
  - <xref:str>
- description: 'If CPU CFS quota enforcement is enabled for containers that specify
    CPU

    limits. The default is true.'
  name: cpu_cfs_quota
  types:
  - <xref:bool>
- description: 'The CPU CFS quota period value. The default is ''100ms.'' Valid

    values are a sequence of decimal numbers with an optional fraction and a unit
    suffix. For

    example: ''300ms'', ''2h45m''. Supported units are ''ns'', ''us'', ''ms'', ''s'',
    ''m'', and ''h''.'
  name: cpu_cfs_quota_period
  types:
  - <xref:str>
- description: 'The percent of disk usage after which image garbage collection

    is always run. To disable image garbage collection, set to 100. The default is
    85%.'
  name: image_gc_high_threshold
  types:
  - <xref:int>
- description: 'The percent of disk usage before which image garbage collection

    is never run. This cannot be set higher than imageGcHighThreshold. The default
    is 80%.'
  name: image_gc_low_threshold
  types:
  - <xref:int>
- description: 'The Topology Manager policy to use. For more information see

    [Kubernetes Topology Manager](https://kubernetes.io/docs/tasks/administer-cluster/topology-manager).
    The default is

    ''none''. Allowed values are ''none'', ''best-effort'', ''restricted'', and ''single-numa-node''.'
  name: topology_manager_policy
  types:
  - <xref:str>
- description: 'Allowed list of unsafe sysctls or unsafe sysctl patterns (ending

    in `*`).'
  name: allowed_unsafe_sysctls
  types:
  - <xref:list>[<xref:str>]
- description: 'If set to true it will make the Kubelet fail to start if swap is enabled
    on

    the node.'
  name: fail_swap_on
  types:
  - <xref:bool>
- description: 'The maximum size (e.g. 10Mi) of container log file before it

    is rotated.'
  name: container_log_max_size_mb
  types:
  - <xref:int>
- description: "The maximum number of container log files that can be present\nfor\
    \ a container. The number must be \u2265 2."
  name: container_log_max_files
  types:
  - <xref:int>
- description: The maximum number of processes per pod.
  name: pod_max_pids
  types:
  - <xref:int>
attributes:
- uid: azure.mgmt.containerservice.models.KubeletConfig.allowed_unsafe_sysctls
  name: allowed_unsafe_sysctls
  summary: Allowed list of unsafe sysctls or unsafe sysctl patterns (ending in `*`).
  signature: 'allowed_unsafe_sysctls: list[str] | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.container_log_max_files
  name: container_log_max_files
  summary: "The maximum number of container log files that can be present for a container.\
    \ The number must\nbe \u2265 2."
  signature: 'container_log_max_files: int | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.container_log_max_size_mb
  name: container_log_max_size_mb
  summary: The maximum size (e.g. 10Mi) of container log file before it is rotated.
  signature: 'container_log_max_size_mb: int | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.cpu_cfs_quota
  name: cpu_cfs_quota
  summary: 'If CPU CFS quota enforcement is enabled for containers that specify CPU
    limits. The default is

    true.'
  signature: 'cpu_cfs_quota: bool | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.cpu_cfs_quota_period
  name: cpu_cfs_quota_period
  summary: 'The CPU CFS quota period value. The default is ''100ms.'' Valid values
    are a sequence of decimal

    numbers with an optional fraction and a unit suffix. For example: ''300ms'', ''2h45m''.
    Supported

    units are ''ns'', ''us'', ''ms'', ''s'', ''m'', and ''h''.'
  signature: 'cpu_cfs_quota_period: str | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.cpu_manager_policy
  name: cpu_manager_policy
  summary: 'The CPU Manager policy to use. The default is ''none''. See [Kubernetes
    CPU management policies](https://kubernetes.io/docs/tasks/administer-cluster/cpu-management-policies/#cpu-management-policies)

    for more information. Allowed values are ''none'' and ''static''.'
  signature: 'cpu_manager_policy: str | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.fail_swap_on
  name: fail_swap_on
  summary: If set to true it will make the Kubelet fail to start if swap is enabled
    on the node.
  signature: 'fail_swap_on: bool | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.image_gc_high_threshold
  name: image_gc_high_threshold
  summary: 'The percent of disk usage after which image garbage collection is always
    run. To disable image

    garbage collection, set to 100. The default is 85%.'
  signature: 'image_gc_high_threshold: int | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.image_gc_low_threshold
  name: image_gc_low_threshold
  summary: 'The percent of disk usage before which image garbage collection is never
    run. This cannot be

    set higher than imageGcHighThreshold. The default is 80%.'
  signature: 'image_gc_low_threshold: int | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.pod_max_pids
  name: pod_max_pids
  summary: The maximum number of processes per pod.
  signature: 'pod_max_pids: int | None'
- uid: azure.mgmt.containerservice.models.KubeletConfig.topology_manager_policy
  name: topology_manager_policy
  summary: 'The Topology Manager policy to use. For more information see [Kubernetes
    Topology Manager](https://kubernetes.io/docs/tasks/administer-cluster/topology-manager).
    The default is

    ''none''. Allowed values are ''none'', ''best-effort'', ''restricted'', and ''single-numa-node''.'
  signature: 'topology_manager_policy: str | None'
