### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.ManagedClusterNodeProvisioningProfile
name: ManagedClusterNodeProvisioningProfile
fullName: azure.mgmt.containerservice.models.ManagedClusterNodeProvisioningProfile
module: azure.mgmt.containerservice.models
summary: Node provisioning profile for the managed cluster.
constructor:
  syntax: 'ManagedClusterNodeProvisioningProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'The node provisioning mode. If not specified, the default is Manual.
    Known values

    are: "Manual" and "Auto".'
  name: mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.NodeProvisioningMode>
- description: 'The set of default Karpenter NodePools (CRDs) configured for node

    provisioning. This field has no effect unless mode is ''Auto''. Warning: Changing
    this from Auto

    to None on an existing cluster will cause the default Karpenter NodePools to be
    deleted, which

    will drain and delete the nodes associated with those pools. It is strongly recommended
    to not

    do this unless there are idle nodes ready to take the pods evicted by that action.
    If not

    specified, the default is Auto. For more information see aka.ms/aks/nap#node-pools.
    Known

    values are: "None" and "Auto".'
  name: default_node_pools
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.NodeProvisioningDefaultNodePools>
attributes:
- uid: azure.mgmt.containerservice.models.ManagedClusterNodeProvisioningProfile.default_node_pools
  name: default_node_pools
  summary: 'The set of default Karpenter NodePools (CRDs) configured for node provisioning.
    This field has

    no effect unless mode is ''Auto''. Warning: Changing this from Auto to None on
    an existing

    cluster will cause the default Karpenter NodePools to be deleted, which will drain
    and delete

    the nodes associated with those pools. It is strongly recommended to not do this
    unless there

    are idle nodes ready to take the pods evicted by that action. If not specified,
    the default is

    Auto. For more information see aka.ms/aks/nap#node-pools. Known values are: "None"
    and

    "Auto".'
  signature: 'default_node_pools: str | _models.NodeProvisioningDefaultNodePools |
    None'
- uid: azure.mgmt.containerservice.models.ManagedClusterNodeProvisioningProfile.mode
  name: mode
  summary: 'The node provisioning mode. If not specified, the default is Manual. Known
    values are:

    "Manual" and "Auto".'
  signature: 'mode: str | _models.NodeProvisioningMode | None'
