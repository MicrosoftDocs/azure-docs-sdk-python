### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.Schedule
name: Schedule
fullName: azure.mgmt.containerservice.models.Schedule
module: azure.mgmt.containerservice.models
summary: 'One and only one of the schedule types should be specified. Choose either
  ''daily'', ''weekly'',

  ''absoluteMonthly'' or ''relativeMonthly'' for your maintenance schedule.'
constructor:
  syntax: 'Schedule(*args: Any, **kwargs: Any)'
variables:
- description: 'For schedules like: ''recur every day'' or ''recur every 3 days''.'
  name: daily
  types:
  - <xref:azure.mgmt.containerservice.models.DailySchedule>
- description: 'For schedules like: ''recur every Monday'' or ''recur every 3 weeks
    on Wednesday''.'
  name: weekly
  types:
  - <xref:azure.mgmt.containerservice.models.WeeklySchedule>
- description: 'For schedules like: ''recur every month on the 15th'' or ''recur every
    3

    months on the 20th''.'
  name: absolute_monthly
  types:
  - <xref:azure.mgmt.containerservice.models.AbsoluteMonthlySchedule>
- description: 'For schedules like: ''recur every month on the first Monday'' or ''recur

    every 3 months on last Friday''.'
  name: relative_monthly
  types:
  - <xref:azure.mgmt.containerservice.models.RelativeMonthlySchedule>
attributes:
- uid: azure.mgmt.containerservice.models.Schedule.absolute_monthly
  name: absolute_monthly
  summary: '''recur every month on the 15th'' or ''recur every 3 months on the 20th''.'
  signature: 'absolute_monthly: _models.AbsoluteMonthlySchedule | None'
- uid: azure.mgmt.containerservice.models.Schedule.daily
  name: daily
  summary: '''recur every day'' or ''recur every 3 days''.'
  signature: 'daily: _models.DailySchedule | None'
- uid: azure.mgmt.containerservice.models.Schedule.relative_monthly
  name: relative_monthly
  summary: '''recur every month on the first Monday'' or ''recur every 3 months on
    last

    Friday''.'
  signature: 'relative_monthly: _models.RelativeMonthlySchedule | None'
- uid: azure.mgmt.containerservice.models.Schedule.weekly
  name: weekly
  summary: '''recur every Monday'' or ''recur every 3 weeks on Wednesday''.'
  signature: 'weekly: _models.WeeklySchedule | None'
