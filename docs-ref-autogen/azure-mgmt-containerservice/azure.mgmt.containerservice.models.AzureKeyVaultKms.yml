### YamlMime:PythonClass
uid: azure.mgmt.containerservice.models.AzureKeyVaultKms
name: AzureKeyVaultKms
fullName: azure.mgmt.containerservice.models.AzureKeyVaultKms
module: azure.mgmt.containerservice.models
summary: Azure Key Vault key management service settings for the security profile.
constructor:
  syntax: 'AzureKeyVaultKms(*args: Any, **kwargs: Any)'
variables:
- description: Whether to enable Azure Key Vault key management service. The default
    is false.
  name: enabled
  types:
  - <xref:bool>
- description: 'Identifier of Azure Key Vault key. See [key identifier format](https://docs.microsoft.com/en-us/azure/key-vault/general/about-keys-secrets-certificates#vault-name-and-object-name)

    for more details. When Azure Key Vault key management service is enabled, this
    field is

    required and must be a valid key identifier. When Azure Key Vault key management
    service is

    disabled, leave the field empty.'
  name: key_id
  types:
  - <xref:str>
- description: 'Network access of the key vault. Network access of key vault.

    The possible values are `Public` and `Private`. `Public` means the key vault allows

    public access from all networks. `Private` means the key vault disables public
    access and

    enables private link. The default value is `Public`. Known values are: "Public"
    and

    "Private".'
  name: key_vault_network_access
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerservice.models.KeyVaultNetworkAccessTypes>
- description: 'Resource ID of key vault. When keyVaultNetworkAccess is

    `Private`, this field is required and must be a valid resource ID. When keyVaultNetworkAccess

    is `Public`, leave the field empty.'
  name: key_vault_resource_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.containerservice.models.AzureKeyVaultKms.enabled
  name: enabled
  summary: Whether to enable Azure Key Vault key management service. The default is
    false.
  signature: 'enabled: bool | None'
- uid: azure.mgmt.containerservice.models.AzureKeyVaultKms.key_id
  name: key_id
  summary: 'Identifier of Azure Key Vault key. See [key identifier format](https://docs.microsoft.com/en-us/azure/key-vault/general/about-keys-secrets-certificates#vault-name-and-object-name)

    for more details. When Azure Key Vault key management service is enabled, this
    field is

    required and must be a valid key identifier. When Azure Key Vault key management
    service is

    disabled, leave the field empty.'
  signature: 'key_id: str | None'
- uid: azure.mgmt.containerservice.models.AzureKeyVaultKms.key_vault_network_access
  name: key_vault_network_access
  summary: 'Network access of the key vault. Network access of key vault. The possible
    values are

    `Public` and `Private`. `Public` means the key vault allows public access from
    all

    networks. `Private` means the key vault disables public access and enables private
    link. The

    default value is `Public`. Known values are: "Public" and "Private".'
  signature: 'key_vault_network_access: str | _models.KeyVaultNetworkAccessTypes |
    None'
- uid: azure.mgmt.containerservice.models.AzureKeyVaultKms.key_vault_resource_id
  name: key_vault_resource_id
  summary: 'Resource ID of key vault. When keyVaultNetworkAccess is `Private`, this
    field is required and

    must be a valid resource ID. When keyVaultNetworkAccess is `Public`, leave the
    field empty.'
  signature: 'key_vault_resource_id: str | None'
