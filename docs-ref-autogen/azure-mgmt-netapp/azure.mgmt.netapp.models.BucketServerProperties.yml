name: BucketServerProperties
fullName: azure.mgmt.netapp.models.BucketServerProperties
module: azure.mgmt.netapp.models
summary: Properties of the server managing the lifecycle of volume buckets.
constructor:
  syntax: 'BucketServerProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The host part of the bucket URL, resolving to the bucket IP address
    and allowed by

    the server certificate.'
