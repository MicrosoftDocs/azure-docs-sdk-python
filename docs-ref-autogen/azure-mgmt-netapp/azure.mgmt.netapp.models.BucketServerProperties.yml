    bucket server''s certificate and private key. It is generated by the end user
    and allows the

    user to access volume data in a read-only manner. Note: This is only used when
    Azure Key Vault

    is not configured. This property is mutually exclusive with the Azure Key Vault
    ''akv''

    properties.'
