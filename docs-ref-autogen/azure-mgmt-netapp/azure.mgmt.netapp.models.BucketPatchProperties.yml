### YamlMime:PythonClass
uid: azure.mgmt.netapp.models.BucketPatchProperties
name: BucketPatchProperties
fullName: azure.mgmt.netapp.models.BucketPatchProperties
module: azure.mgmt.netapp.models
summary: Bucket resource properties for a Patch operation.
constructor:
  syntax: 'BucketPatchProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'File System user having access to volume data. For Unix, this is the

    user''s uid and gid. For Windows, this is the user''s username. Note that the
    Unix and Windows

    user details are mutually exclusive, meaning one or other must be supplied, but
    not both.'
  name: file_system_user
  types:
  - <xref:azure.mgmt.netapp.models.FileSystemUser>
- description: 'Provisioning state of the resource. Known values are: "Accepted",

    "Creating", "Patching", "Updating", "Deleting", "Moving", "Failed", and "Succeeded".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.netapp.models.NetAppProvisioningState>
- description: Properties of the server managing the lifecycle of volume buckets.
  name: server
  types:
  - <xref:azure.mgmt.netapp.models.BucketServerPatchProperties>
- description: 'Access permissions for the bucket. Either ReadOnly or ReadWrite. Known

    values are: "ReadOnly" and "ReadWrite".'
  name: permissions
  types:
  - <xref:str>
  - <xref:azure.mgmt.netapp.models.BucketPatchPermissions>
- description: 'Specifies the Azure Key Vault settings. These are used when

    a) retrieving the bucket server certificate, and

    b) storing the bucket credentials


    Notes:


    1. If a bucket certificate was previously provided directly using the certificateObject

    property, it is possible to subsequently use the Azure Key Vault for certificate
    management by

    using these ''akvDetails'' properties. However, once Azure Key Vault is configured,
    it is no

    longer possible to provide the certificate directly via the certificateObject
    property.

    2. These properties are mutually exclusive with the server.certificateObject property.'
  name: akv_details
  types:
  - <xref:azure.mgmt.netapp.models.AzureKeyVaultDetails>
