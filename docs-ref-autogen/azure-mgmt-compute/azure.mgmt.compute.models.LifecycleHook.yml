uid: azure.mgmt.compute.models.LifecycleHook
name: LifecycleHook
fullName: azure.mgmt.compute.models.LifecycleHook
module: azure.mgmt.compute.models
summary: Describes a lifecycle hook.
constructor:
  syntax: 'LifecycleHook(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the type of the lifecycle hook. Known values are:

    "UpgradeAutoOSScheduling" and "UpgradeAutoOSRollingBatchStarting".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.VMScaleSetLifecycleHookEventType>
- description: 'Specifies the time duration a virtual machine scale set lifecycle
    hook

    event sent to the customer waits for a response from the customer. It should be
    in ISO 8601

    format.'
  name: wait_duration
  types:
  - <xref:datetime.timedelta>
- description: 'Specifies the action that will be applied to a target resource in
    the

    virtual machine scale set lifecycle hook event if the platform does not receive
    a response from

    the customer for the target resource before waitUntil. Known values are: "Approve"
    and

    "Reject".'
  name: default_action
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.LifecycleHookAction>
