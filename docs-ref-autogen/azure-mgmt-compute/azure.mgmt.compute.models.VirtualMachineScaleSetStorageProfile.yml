summary: Describes a virtual machine scale set storage profile.
constructor:
  syntax: 'VirtualMachineScaleSetStorageProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies information about the image to use. You can specify

    information about platform images, marketplace images, or virtual machine images.
    This element

    is required when you want to use a platform image, marketplace image, or virtual
    machine image,

    but is not used in other creation operations.'
  name: image_reference
  types:
  - <xref:azure.mgmt.compute.models.ImageReference>
- description: 'Specifies information about the operating system disk used by the
    virtual

    machines in the scale set. For more information about disks, see [About disks
    and VHDs for

    Azure virtual machines](https://docs.microsoft.com/azure/virtual-machines/managed-disks-overview).'
  name: os_disk
  types:
  - <xref:azure.mgmt.compute.models.VirtualMachineScaleSetOSDisk>
- description: 'Specifies the parameters that are used to add data disks to the virtual

    machines in the scale set. For more information about disks, see [About disks
    and VHDs for

    Azure virtual machines](https://docs.microsoft.com/azure/virtual-machines/managed-disks-overview).'
  name: data_disks
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.VirtualMachineScaleSetDataDisk>]
- description: 'Specifies the disk controller type configured for the virtual

    machines in the scale set. Minimum api-version: 2022-08-01. Known values are:
    "SCSI" and

    "NVMe".'
  name: disk_controller_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiskControllerTypes>
