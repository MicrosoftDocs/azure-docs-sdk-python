### YamlMime:PythonClass
uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk
name: VirtualMachineScaleSetUpdateOSDisk
fullName: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk
module: azure.mgmt.compute.models
summary: 'Describes virtual machine scale set operating system disk Update Object.
  This should be used

  for Updating VMSS OS Disk.'
constructor:
  syntax: 'VirtualMachineScaleSetUpdateOSDisk(*args: Any, **kwargs: Any)'
variables:
- description: 'The caching type. Known values are: "None", "ReadOnly", and "ReadWrite".'
  name: caching
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.CachingTypes>
- description: 'Specifies whether writeAccelerator should be enabled or

    disabled on the disk.'
  name: write_accelerator_enabled
  types:
  - <xref:bool>
- description: 'Specifies the ephemeral disk Settings for the operating system disk

    used by the virtual machine scale set.'
  name: diff_disk_settings
  types:
  - <xref:azure.mgmt.compute.models.DiffDiskSettings>
- description: 'Specifies the size of an empty data disk in gigabytes. This element
    can be

    used to overwrite the size of the disk in a virtual machine image. <br><br> diskSizeGB
    is the

    number of bytes x 1024^3 for the disk and the value cannot be larger than 1023.'
  name: disk_size_gb
  types:
  - <xref:int>
- description: 'Specifies the storage fault domain alignment type for the

    disk. Known values are: "Aligned" and "BestEffortAligned".'
  name: storage_fault_domain_alignment
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.StorageFaultDomainAlignmentType>
- description: 'The Source User Image VirtualHardDisk. This VirtualHardDisk will be
    copied before

    using it to attach to the Virtual Machine. If SourceImage is provided, the destination

    VirtualHardDisk should not exist.'
  name: image
  types:
  - <xref:azure.mgmt.compute.models.VirtualHardDisk>
- description: The list of virtual hard disk container uris.
  name: vhd_containers
  types:
  - <xref:list>[<xref:str>]
- description: The managed disk parameters.
  name: managed_disk
  types:
  - <xref:azure.mgmt.compute.models.VirtualMachineScaleSetManagedDiskParameters>
- description: 'Specifies whether OS Disk should be deleted or detached upon VMSS
    Flex

    deletion (This feature is available for VMSS with Flexible OrchestrationMode only).
    <br><br>

    Possible values: <br><br> **Delete** If this value is used, the OS disk is deleted
    when VMSS

    Flex VM is deleted.<br><br> **Detach** If this value is used, the OS disk is retained
    after

    VMSS Flex VM is deleted. <br><br> The default value is set to **Delete**. For
    an Ephemeral OS

    Disk, the default value is set to **Delete**. User cannot change the delete option
    for

    Ephemeral OS Disk. Known values are: "Delete" and "Detach".'
  name: delete_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiskDeleteOptionTypes>
attributes:
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.caching
  name: caching
  summary: '"None", "ReadOnly", and "ReadWrite".'
  signature: 'caching: str | _models.CachingTypes | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.delete_option
  name: delete_option
  summary: 'Specifies whether OS Disk should be deleted or detached upon VMSS Flex
    deletion (This feature

    is available for VMSS with Flexible OrchestrationMode only). <br><br> Possible
    values: <br><br>

    **Delete** If this value is used, the OS disk is deleted when VMSS Flex VM is
    deleted.<br><br>

    **Detach** If this value is used, the OS disk is retained after VMSS Flex VM is
    deleted.

    <br><br> The default value is set to **Delete**. For an Ephemeral OS Disk, the
    default value is

    set to **Delete**. User cannot change the delete option for Ephemeral OS Disk.
    Known values

    are: "Delete" and "Detach".'
  signature: 'delete_option: str | _models.DiskDeleteOptionTypes | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.diff_disk_settings
  name: diff_disk_settings
  summary: 'Specifies the ephemeral disk Settings for the operating system disk used
    by the virtual machine

    scale set.'
  signature: 'diff_disk_settings: _models.DiffDiskSettings | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.disk_size_gb
  name: disk_size_gb
  summary: 'Specifies the size of an empty data disk in gigabytes. This element can
    be used to overwrite

    the size of the disk in a virtual machine image. <br><br> diskSizeGB is the number
    of bytes x

    1024^3 for the disk and the value cannot be larger than 1023.'
  signature: 'disk_size_gb: int | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.image
  name: image
  summary: 'The Source User Image VirtualHardDisk. This VirtualHardDisk will be copied
    before using it to

    attach to the Virtual Machine. If SourceImage is provided, the destination VirtualHardDisk

    should not exist.'
  signature: 'image: _models.VirtualHardDisk | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.managed_disk
  name: managed_disk
  summary: The managed disk parameters.
  signature: 'managed_disk: _models.VirtualMachineScaleSetManagedDiskParameters |
    None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.storage_fault_domain_alignment
  name: storage_fault_domain_alignment
  summary: '"Aligned"

    and "BestEffortAligned".'
  signature: 'storage_fault_domain_alignment: str | _models.StorageFaultDomainAlignmentType
    | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.vhd_containers
  name: vhd_containers
  summary: The list of virtual hard disk container uris.
  signature: 'vhd_containers: list[str] | None'
- uid: azure.mgmt.compute.models.VirtualMachineScaleSetUpdateOSDisk.write_accelerator_enabled
  name: write_accelerator_enabled
  summary: Specifies whether writeAccelerator should be enabled or disabled on the
    disk.
  signature: 'write_accelerator_enabled: bool | None'
