uid: azure.mgmt.compute.models.RestorePointProperties
name: RestorePointProperties
fullName: azure.mgmt.compute.models.RestorePointProperties
module: azure.mgmt.compute.models
summary: The restore point properties.
constructor:
  syntax: 'RestorePointProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'List of disk resource ids that the customer wishes to exclude from
    the

    restore point. If no disks are specified, all disks will be included.'
  name: exclude_disks
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.ApiEntityReference>]
- description: 'Gets the details of the VM captured at the time of the restore point

    creation.'
  name: source_metadata
  types:
  - <xref:azure.mgmt.compute.models.RestorePointSourceMetadata>
- description: Gets the provisioning state of the restore point.
  name: provisioning_state
  types:
  - <xref:str>
- description: 'ConsistencyMode of the RestorePoint. Can be specified in the input

    while creating a restore point. For now, only CrashConsistent is accepted as a
    valid input.

    Please refer to [https://aka.ms/RestorePoints](https://aka.ms/RestorePoints) for
    more

    details. Known values are: "CrashConsistent", "FileSystemConsistent", and

    "ApplicationConsistent".'
  name: consistency_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ConsistencyModeTypes>
- description: Gets the creation time of the restore point.
  name: time_created
  types:
  - <xref:datetime.datetime>
- description: 'Resource Id of the source restore point from which a copy needs to

    be created.'
  name: source_restore_point
  types:
  - <xref:azure.mgmt.compute.models.ApiEntityReference>
- description: The restore point instance view.
  name: instance_view
  types:
  - <xref:azure.mgmt.compute.models.RestorePointInstanceView>
- description: 'This property determines the time in minutes the

    snapshot is retained as instant access for restoring Premium SSD v2 or Ultra disk
    with fast

    restore performance in this restore point.'
  name: instant_access_duration_minutes
  types:
  - <xref:int>
