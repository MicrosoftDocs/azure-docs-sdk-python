### YamlMime:PythonClass
uid: azure.mgmt.compute.models.AdditionalUnattendContent
name: AdditionalUnattendContent
fullName: azure.mgmt.compute.models.AdditionalUnattendContent
module: azure.mgmt.compute.models
summary: 'Specifies additional XML formatted information that can be included in the
  Unattend.xml file,

  which is used by Windows Setup. Contents are defined by setting name, component
  name, and the

  pass in which the content is applied.'
constructor:
  syntax: 'AdditionalUnattendContent(*args: Any, **kwargs: Any)'
variables:
- description: The pass name. Currently, the only allowable value is OobeSystem. "OobeSystem"
  name: pass_name
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.PassNames>
- description: 'The component name. Currently, the only allowable value is

    Microsoft-Windows-Shell-Setup. "Microsoft-Windows-Shell-Setup"'
  name: component_name
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ComponentNames>
- description: 'Specifies the name of the setting to which the content applies. Possible

    values are: FirstLogonCommands and AutoLogon. Known values are: "AutoLogon" and

    "FirstLogonCommands".'
  name: setting_name
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.SettingNames>
- description: 'Specifies the XML formatted content that is added to the unattend.xml
    file for

    the specified path and component. The XML must be less than 4KB and must include
    the root

    element for the setting or feature that is being inserted.'
  name: content
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.compute.models.AdditionalUnattendContent.component_name
  name: component_name
  summary: 'The component name. Currently, the only allowable value is Microsoft-Windows-Shell-Setup.

    "Microsoft-Windows-Shell-Setup"'
  signature: 'component_name: str | _models.ComponentNames | None'
- uid: azure.mgmt.compute.models.AdditionalUnattendContent.content
  name: content
  summary: 'Specifies the XML formatted content that is added to the unattend.xml
    file for the specified

    path and component. The XML must be less than 4KB and must include the root element
    for the

    setting or feature that is being inserted.'
  signature: 'content: str | None'
- uid: azure.mgmt.compute.models.AdditionalUnattendContent.pass_name
  name: pass_name
  summary: The pass name. Currently, the only allowable value is OobeSystem. "OobeSystem"
  signature: 'pass_name: str | _models.PassNames | None'
- uid: azure.mgmt.compute.models.AdditionalUnattendContent.setting_name
  name: setting_name
  summary: 'Specifies the name of the setting to which the content applies. Possible
    values are:

    FirstLogonCommands and AutoLogon. Known values are: "AutoLogon" and "FirstLogonCommands".'
  signature: 'setting_name: str | _models.SettingNames | None'
