  name: enabled
  summary: 'Set this flag to true and provide DiskEncryptionKey and optional KeyEncryptionKey
    to enable

    encryption. Set this flag to false and remove DiskEncryptionKey and KeyEncryptionKey
    to disable

    encryption. If EncryptionSettings is null in the request object, the existing
    settings remain

    unchanged. Required.'
  signature: 'enabled: bool'
- uid: azure.mgmt.compute.models.EncryptionSettingsCollection.encryption_settings
  name: encryption_settings
  summary: A collection of encryption settings, one for each disk volume.
  signature: 'encryption_settings: list[''_models.EncryptionSettingsElement''] | None'
