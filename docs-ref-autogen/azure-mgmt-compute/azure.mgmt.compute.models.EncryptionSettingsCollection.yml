  name: encryption_settings_version
  summary: 'Describes what type of encryption is used for the disks. Once this field
    is set, it cannot be

    overwritten. ''1.0'' corresponds to Azure Disk Encryption with AAD app.''1.1''
    corresponds to Azure

    Disk Encryption.'
  signature: 'encryption_settings_version: str | None'
