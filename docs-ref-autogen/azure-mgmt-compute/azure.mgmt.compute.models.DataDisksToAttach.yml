### YamlMime:PythonClass
uid: azure.mgmt.compute.models.DataDisksToAttach
name: DataDisksToAttach
fullName: azure.mgmt.compute.models.DataDisksToAttach
module: azure.mgmt.compute.models
summary: Describes the data disk to be attached.
constructor:
  syntax: 'DataDisksToAttach(*args: Any, **kwargs: Any)'
variables:
- description: ID of the managed data disk. Required.
  name: disk_id
  types:
  - <xref:str>
- description: 'The logical unit number of the data disk. This value is used to identify
    data disks

    within the VM and therefore must be unique for each data disk attached to a VM.
    If not

    specified, lun would be auto assigned.'
  name: lun
  types:
  - <xref:int>
- description: 'Specifies the caching requirements. Possible values are: **None,**
    **ReadOnly,**

    **ReadWrite.** The defaulting behavior is: **None for Standard storage. ReadOnly
    for Premium

    storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
  name: caching
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.CachingTypes>
- description: 'Specifies whether data disk should be deleted or detached upon VM

    deletion. Possible values are: **Delete.** If this value is used, the data disk
    is deleted when

    VM is deleted. **Detach.** If this value is used, the data disk is retained after
    VM is

    deleted. The default value is set to **Detach**. Known values are: "Delete" and
    "Detach".'
  name: delete_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiskDeleteOptionTypes>
- description: 'Specifies the customer managed disk encryption set resource id for

    the managed disk.'
  name: disk_encryption_set
  types:
  - <xref:azure.mgmt.compute.models.DiskEncryptionSetParameters>
- description: 'Specifies whether writeAccelerator should be enabled or

    disabled on the disk.'
  name: write_accelerator_enabled
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.compute.models.DataDisksToAttach.caching
  name: caching
  summary: '**None,** **ReadOnly,** **ReadWrite.**

    The defaulting behavior is: **None for Standard storage. ReadOnly for Premium
    storage.**. Known

    values are: "None", "ReadOnly", and "ReadWrite".'
  signature: 'caching: str | _models.CachingTypes | None'
- uid: azure.mgmt.compute.models.DataDisksToAttach.delete_option
  name: delete_option
  summary: 'Specifies whether data disk should be deleted or detached upon VM deletion.
    Possible values

    are: **Delete.** If this value is used, the data disk is deleted when VM is deleted.

    **Detach.** If this value is used, the data disk is retained after VM is deleted.
    The default

    value is set to **Detach**. Known values are: "Delete" and "Detach".'
  signature: 'delete_option: str | _models.DiskDeleteOptionTypes | None'
- uid: azure.mgmt.compute.models.DataDisksToAttach.disk_encryption_set
  name: disk_encryption_set
  summary: Specifies the customer managed disk encryption set resource id for the
    managed disk.
  signature: 'disk_encryption_set: _models.DiskEncryptionSetParameters | None'
- uid: azure.mgmt.compute.models.DataDisksToAttach.disk_id
  name: disk_id
  summary: ID of the managed data disk. Required.
  signature: 'disk_id: str'
- uid: azure.mgmt.compute.models.DataDisksToAttach.lun
  name: lun
  summary: 'The logical unit number of the data disk. This value is used to identify
    data disks within the

    VM and therefore must be unique for each data disk attached to a VM. If not specified,
    lun

    would be auto assigned.'
  signature: 'lun: int | None'
- uid: azure.mgmt.compute.models.DataDisksToAttach.write_accelerator_enabled
  name: write_accelerator_enabled
  summary: Specifies whether writeAccelerator should be enabled or disabled on the
    disk.
  signature: 'write_accelerator_enabled: bool | None'
