variables:
- description: 'Specifies whether to reimage temp disk. Default value: false. Note:
    This temp

    disk reimage parameter is only supported for VM/VMSS with Ephemeral OS disk.'
  name: temp_disk
  types:
  - <xref:bool>
- description: 'Specifies in decimal number, the version the OS disk should be reimaged

    to. If exact version is not provided, the OS disk is reimaged to the existing
    version of OS

    Disk.'
  name: exact_version
  types:
  - <xref:str>
- description: Specifies information required for reimaging the non-ephemeral OS disk.
  name: os_profile
  types:
  - <xref:azure.mgmt.compute.models.OSProfileProvisioningData>
- description: 'Parameter to force update ephemeral OS disk for a

    virtual machine scale set VM.'
  name: force_update_os_disk_for_ephemeral
  types:
  - <xref:bool>
- description: 'The virtual machine scale set instance ids. Omitting the virtual machine

    scale set instance ids will result in the operation being performed on all virtual
    machines in

    the virtual machine scale set.'
  name: instance_ids
  types:
  - <xref:list>[<xref:str>]
