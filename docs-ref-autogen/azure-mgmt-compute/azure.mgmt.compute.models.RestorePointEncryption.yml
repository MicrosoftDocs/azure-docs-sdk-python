### YamlMime:PythonClass
uid: azure.mgmt.compute.models.RestorePointEncryption
name: RestorePointEncryption
fullName: azure.mgmt.compute.models.RestorePointEncryption
module: azure.mgmt.compute.models
summary: 'Encryption at rest settings for disk restore point. It is an optional property
  that can be

  specified in the input while creating a restore point.'
constructor:
  syntax: 'RestorePointEncryption(*args: Any, **kwargs: Any)'
variables:
- description: 'Describes the parameter of customer managed disk encryption set

    resource id that can be specified for disk. **Note:** The disk encryption set
    resource id can

    only be specified for managed disk. Please refer [https://aka.ms/mdssewithcmkoverview](https://aka.ms/mdssewithcmkoverview)
    for more details.'
  name: disk_encryption_set
  types:
  - <xref:azure.mgmt.compute.models.DiskEncryptionSetParameters>
- description: 'The type of key used to encrypt the data of the disk restore point.
    Known values

    are: "EncryptionAtRestWithPlatformKey", "EncryptionAtRestWithCustomerKey", and

    "EncryptionAtRestWithPlatformAndCustomerKeys".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.RestorePointEncryptionType>
attributes:
- uid: azure.mgmt.compute.models.RestorePointEncryption.disk_encryption_set
  name: disk_encryption_set
  summary: 'Describes the parameter of customer managed disk encryption set resource
    id that can be

    specified for disk. **Note:** The disk encryption set resource id can only be
    specified for

    managed disk. Please refer [https://aka.ms/mdssewithcmkoverview](https://aka.ms/mdssewithcmkoverview)
    for more details.'
  signature: 'disk_encryption_set: _models.DiskEncryptionSetParameters | None'
- uid: azure.mgmt.compute.models.RestorePointEncryption.type
  name: type
  summary: 'The type of key used to encrypt the data of the disk restore point. Known
    values are:

    "EncryptionAtRestWithPlatformKey", "EncryptionAtRestWithCustomerKey", and

