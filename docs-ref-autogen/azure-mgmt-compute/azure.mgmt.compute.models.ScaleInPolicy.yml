### YamlMime:PythonClass
uid: azure.mgmt.compute.models.ScaleInPolicy
name: ScaleInPolicy
fullName: azure.mgmt.compute.models.ScaleInPolicy
module: azure.mgmt.compute.models
summary: Describes a scale-in policy for a virtual machine scale set.
constructor:
  syntax: 'ScaleInPolicy(*args: Any, **kwargs: Any)'
variables:
- description: 'The rules to be followed when scaling-in a virtual machine scale set.
    <br><br>

    Possible values are: <br><br> **Default** When a virtual machine scale set is
    scaled in, the

    scale set will first be balanced across zones if it is a zonal scale set. Then,
    it will be

    balanced across Fault Domains as far as possible. Within each Fault Domain, the
    virtual

    machines chosen for removal will be the newest ones that are not protected from
    scale-in.

    <br><br> **OldestVM** When a virtual machine scale set is being scaled-in, the
    oldest virtual

    machines that are not protected from scale-in will be chosen for removal. For
    zonal virtual

    machine scale sets, the scale set will first be balanced across zones. Within
    each zone, the

    oldest virtual machines that are not protected will be chosen for removal. <br><br>

    **NewestVM** When a virtual machine scale set is being scaled-in, the newest virtual
    machines

    that are not protected from scale-in will be chosen for removal. For zonal virtual
    machine

    scale sets, the scale set will first be balanced across zones. Within each zone,
    the newest

    virtual machines that are not protected will be chosen for removal. <br><br>.'
  name: rules
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.mgmt.compute.models.VirtualMachineScaleSetScaleInRules>]
- description: 'This property allows you to specify if virtual machines chosen for

    removal have to be force deleted when a virtual machine scale set is being scaled-in.(Feature

    in Preview).'
  name: force_deletion
  types:
  - <xref:bool>
- description: 'This property allows you to prioritize the deletion of

    unhealthy and inactive VMs when a virtual machine scale set is being scaled-in.(Feature
    in

    Preview).'
  name: prioritize_unhealthy_v_ms
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.compute.models.ScaleInPolicy.force_deletion
  name: force_deletion
  summary: 'This property allows you to specify if virtual machines chosen for removal
    have to be force

    deleted when a virtual machine scale set is being scaled-in.(Feature in Preview).'
  signature: 'force_deletion: bool | None'
- uid: azure.mgmt.compute.models.ScaleInPolicy.prioritize_unhealthy_v_ms
  name: prioritize_unhealthy_v_ms
  summary: 'This property allows you to prioritize the deletion of unhealthy and inactive
    VMs when a

    virtual machine scale set is being scaled-in.(Feature in Preview).'
  signature: 'prioritize_unhealthy_v_ms: bool | None'
- uid: azure.mgmt.compute.models.ScaleInPolicy.rules
  name: rules
  summary: 'The rules to be followed when scaling-in a virtual machine scale set.
    <br><br> Possible values

    are: <br><br> **Default** When a virtual machine scale set is scaled in, the scale
    set will

    first be balanced across zones if it is a zonal scale set. Then, it will be balanced
    across

    Fault Domains as far as possible. Within each Fault Domain, the virtual machines
    chosen for

    removal will be the newest ones that are not protected from scale-in. <br><br>
    **OldestVM**

    When a virtual machine scale set is being scaled-in, the oldest virtual machines
