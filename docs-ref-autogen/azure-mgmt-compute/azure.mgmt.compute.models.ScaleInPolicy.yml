    balanced across zones. Within each zone, the newest virtual machines that are
    not protected

    will be chosen for removal. <br><br>.'
  signature: 'rules: list[typing.Union[str, ForwardRef(''_models.VirtualMachineScaleSetScaleInRules'')]]
    | None'
