    and "BestEffortAligned".'
  signature: 'storage_fault_domain_alignment: str | _models.StorageFaultDomainAlignmentType
    | None'
- uid: azure.mgmt.compute.models.DataDisk.to_be_detached
  name: to_be_detached
  summary: 'Specifies whether the data disk is in process of detachment from the

