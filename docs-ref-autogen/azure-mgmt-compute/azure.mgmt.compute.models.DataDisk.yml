### YamlMime:PythonClass
uid: azure.mgmt.compute.models.DataDisk
name: DataDisk
fullName: azure.mgmt.compute.models.DataDisk
module: azure.mgmt.compute.models
summary: Describes a data disk.
constructor:
  syntax: 'DataDisk(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the logical unit number of the data disk. This value is
    used to identify

    data disks within the VM and therefore must be unique for each data disk attached
    to a VM.

    Required.'
  name: lun
  types:
  - <xref:int>
- description: The disk name.
  name: name
  types:
  - <xref:str>
- description: The virtual hard disk.
  name: vhd
  types:
  - <xref:azure.mgmt.compute.models.VirtualHardDisk>
- description: 'The source user image virtual hard disk. The virtual hard disk will
    be copied

    before being attached to the virtual machine. If SourceImage is provided, the
    destination

    virtual hard drive must not exist.'
  name: image
  types:
  - <xref:azure.mgmt.compute.models.VirtualHardDisk>
- description: 'Specifies the caching requirements. Possible values are: **None,**
    **ReadOnly,**

    **ReadWrite.** The defaulting behavior is: **None for Standard storage. ReadOnly
    for Premium

    storage.**. Known values are: "None", "ReadOnly", and "ReadWrite".'
  name: caching
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.CachingTypes>
- description: 'Specifies whether writeAccelerator should be enabled or

    disabled on the disk.'
  name: write_accelerator_enabled
  types:
  - <xref:bool>
- description: 'Specifies how the virtual machine disk should be created. Possible
    values

    are **Attach:** This value is used when you are using a specialized disk to create
    the virtual

    machine. **FromImage:** This value is used when you are using an image to create
    the virtual

    machine data disk. If you are using a platform image, you should also use the
    imageReference

    element described above. If you are using a marketplace image, you should also
    use the plan

    element previously described. **Empty:** This value is used when creating an empty
    data disk.

    **Copy:** This value is used to create a data disk from a snapshot or another
    disk.

    **Restore:** This value is used to create a data disk from a disk restore point.
    Required.

    Known values are: "FromImage", "Empty", "Attach", "Copy", and "Restore".'
  name: create_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiskCreateOptionTypes>
- description: 'Specifies the size of an empty data disk in gigabytes. This element
    can be

    used to overwrite the size of the disk in a virtual machine image. The property
    ''diskSizeGB'' is

    the number of bytes x 1024^3 for the disk and the value cannot be larger than
    1023.'
  name: disk_size_gb
  types:
  - <xref:int>
- description: 'Specifies the storage fault domain alignment type for the

    disk. Known values are: "Aligned" and "BestEffortAligned".'
  name: storage_fault_domain_alignment
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.StorageFaultDomainAlignmentType>
- description: The managed disk parameters.
  name: managed_disk
  types:
  - <xref:azure.mgmt.compute.models.ManagedDiskParameters>
- description: 'The source resource identifier. It can be a snapshot, or disk restore

    point from which to create a disk.'
  name: source_resource
  types:
  - <xref:azure.mgmt.compute.models.ApiEntityReference>
- description: 'Specifies whether the data disk is in process of detachment from the

    VirtualMachine/VirtualMachineScaleset.'
  name: to_be_detached
  types:
  - <xref:bool>
- description: 'Specifies the Read-Write IOPS for the managed disk when

    StorageAccountType is UltraSSD_LRS.'
  name: disk_iops_read_write
  types:
  - <xref:int>
- description: 'Specifies the bandwidth in MB per second for the managed disk when

    StorageAccountType is UltraSSD_LRS.'
  name: disk_m_bps_read_write
  types:
  - <xref:int>
- description: 'Specifies the detach behavior to be used while detaching a disk or
    which

    is already in the process of detachment from the virtual machine. Supported values:

    **ForceDetach.** detachOption: **ForceDetach** is applicable only for managed
    data disks. If a

    previous detachment attempt of the data disk did not complete due to an unexpected
    failure from

    the virtual machine and the disk is still not released then use force-detach as
    a last resort

    option to detach the disk forcibly from the VM. All writes might not have been
    flushed when

    using this detach behavior. **This feature is still in preview**. To force-detach
    a data disk

    update toBeDetached to ''true'' along with setting detachOption: ''ForceDetach''.
    "ForceDetach"'
  name: detach_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiskDetachOptionTypes>
- description: 'Specifies whether data disk should be deleted or detached upon VM

    deletion. Possible values are: **Delete.** If this value is used, the data disk
    is deleted when

    VM is deleted. **Detach.** If this value is used, the data disk is retained after
    VM is

    deleted. The default value is set to **Detach**. Known values are: "Delete" and
    "Detach".'
  name: delete_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiskDeleteOptionTypes>
attributes:
- uid: azure.mgmt.compute.models.DataDisk.caching
  name: caching
  summary: '**None,** **ReadOnly,** **ReadWrite.**

    The defaulting behavior is: **None for Standard storage. ReadOnly for Premium
    storage.**. Known

    values are: "None", "ReadOnly", and "ReadWrite".'
  signature: 'caching: str | _models.CachingTypes | None'
- uid: azure.mgmt.compute.models.DataDisk.create_option
  name: create_option
  summary: '** This

    value is used when you are using a specialized disk to create the virtual machine.

    **FromImage:** This value is used when you are using an image to create the virtual
    machine

    data disk. If you are using a platform image, you should also use the imageReference
    element

    described above. If you are using a marketplace image, you should also use the
    plan element

    previously described. **Empty:** This value is used when creating an empty data
    disk. **Copy:**

    This value is used to create a data disk from a snapshot or another disk. **Restore:**
    This

    value is used to create a data disk from a disk restore point. Required. Known
    values are:

    "FromImage", "Empty", "Attach", "Copy", and "Restore".'
  signature: 'create_option: str | _models.DiskCreateOptionTypes'
- uid: azure.mgmt.compute.models.DataDisk.delete_option
  name: delete_option
  summary: 'Specifies whether data disk should be deleted or detached upon VM deletion.
    Possible values

    are: **Delete.** If this value is used, the data disk is deleted when VM is deleted.

    **Detach.** If this value is used, the data disk is retained after VM is deleted.
    The default

    value is set to **Detach**. Known values are: "Delete" and "Detach".'
  signature: 'delete_option: str | _models.DiskDeleteOptionTypes | None'
- uid: azure.mgmt.compute.models.DataDisk.detach_option
  name: detach_option
  summary: 'Specifies the detach behavior to be used while detaching a disk or which
    is already in the

    process of detachment from the virtual machine. Supported values: **ForceDetach.**

    detachOption: **ForceDetach** is applicable only for managed data disks. If a
    previous

    detachment attempt of the data disk did not complete due to an unexpected failure
    from the

    virtual machine and the disk is still not released then use force-detach as a
    last resort

    option to detach the disk forcibly from the VM. All writes might not have been
    flushed when

    using this detach behavior. **This feature is still in preview**. To force-detach
    a data disk

    update toBeDetached to ''true'' along with setting detachOption: ''ForceDetach''.
    "ForceDetach"'
  signature: 'detach_option: str | _models.DiskDetachOptionTypes | None'
- uid: azure.mgmt.compute.models.DataDisk.disk_iops_read_write
  name: disk_iops_read_write
  summary: Specifies the Read-Write IOPS for the managed disk when StorageAccountType
    is UltraSSD_LRS.
  signature: 'disk_iops_read_write: int | None'
- uid: azure.mgmt.compute.models.DataDisk.disk_m_bps_read_write
  name: disk_m_bps_read_write
  summary: 'Specifies the bandwidth in MB per second for the managed disk when StorageAccountType
    is

    UltraSSD_LRS.'
  signature: 'disk_m_bps_read_write: int | None'
- uid: azure.mgmt.compute.models.DataDisk.disk_size_gb
  name: disk_size_gb
  summary: 'Specifies the size of an empty data disk in gigabytes. This element can
    be used to overwrite

    the size of the disk in a virtual machine image. The property ''diskSizeGB'' is
    the number of

    bytes x 1024^3 for the disk and the value cannot be larger than 1023.'
  signature: 'disk_size_gb: int | None'
- uid: azure.mgmt.compute.models.DataDisk.image
  name: image
  summary: 'The source user image virtual hard disk. The virtual hard disk will be
