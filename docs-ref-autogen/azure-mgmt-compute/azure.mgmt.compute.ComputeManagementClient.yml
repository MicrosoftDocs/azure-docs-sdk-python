summary: Compute Client.
constructor:
  syntax: 'ComputeManagementClient(credential: TokenCredential, subscription_id: str,
    base_url: str | None = None, *, cloud_setting: AzureClouds | None = None, **kwargs:
    Any)'
  parameters:
  - name: credential
    description: Credential used to authenticate requests to the service. Required.
    isRequired: true
    types:
    - <xref:azure.core.credentials.TokenCredential>
  - name: subscription_id
    description: The ID of the target subscription. The value must be an UUID. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: base_url
    description: Service host. Default value is None.
    defaultValue: None
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: cloud_setting
    description: 'The cloud setting for which to get the ARM endpoint. Default value
      is

      None.'
