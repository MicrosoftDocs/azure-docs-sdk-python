### YamlMime:PythonClass
uid: azure.mgmt.compute.models.SupportedCapabilities
name: SupportedCapabilities
fullName: azure.mgmt.compute.models.SupportedCapabilities
module: azure.mgmt.compute.models
summary: List of supported capabilities persisted on the disk resource for VM use.
constructor:
  syntax: 'SupportedCapabilities(*args: Any, **kwargs: Any)'
variables:
- description: 'The disk controllers that an OS disk supports. If set it can be

    SCSI or SCSI, NVME or NVME, SCSI.'
  name: disk_controller_types
  types:
  - <xref:str>
- description: 'True if the image from which the OS disk is created supports

    accelerated networking.'
  name: accelerated_network
  types:
  - <xref:bool>
- description: 'CPU architecture supported by an OS disk. Known values are: "x64"
    and

    "Arm64".'
  name: architecture
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.Architecture>
- description: 'Refers to the security capability of the disk supported to

    create a Trusted launch or Confidential VM. Known values are: "TrustedLaunchSupported"
    and

    "TrustedLaunchAndConfidentialVMSupported".'
  name: supported_security_option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.SupportedSecurityOption>
attributes:
- uid: azure.mgmt.compute.models.SupportedCapabilities.accelerated_network
  name: accelerated_network
  summary: True if the image from which the OS disk is created supports accelerated
    networking.
  signature: 'accelerated_network: bool | None'
- uid: azure.mgmt.compute.models.SupportedCapabilities.architecture
  name: architecture
  summary: '"x64" and "Arm64".'
  signature: 'architecture: str | _models.Architecture | None'
- uid: azure.mgmt.compute.models.SupportedCapabilities.disk_controller_types
  name: disk_controller_types
  summary: 'The disk controllers that an OS disk supports. If set it can be SCSI or
    SCSI, NVME or NVME,

    SCSI.'
  signature: 'disk_controller_types: str | None'
- uid: azure.mgmt.compute.models.SupportedCapabilities.supported_security_option
  name: supported_security_option
  summary: 'Refers to the security capability of the disk supported to create a Trusted
    launch or

    Confidential VM. Known values are: "TrustedLaunchSupported" and

    "TrustedLaunchAndConfidentialVMSupported".'
  signature: 'supported_security_option: str | _models.SupportedSecurityOption | None'
