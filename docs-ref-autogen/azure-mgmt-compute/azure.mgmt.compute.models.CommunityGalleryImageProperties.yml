uid: azure.mgmt.compute.models.CommunityGalleryImageProperties
name: CommunityGalleryImageProperties
fullName: azure.mgmt.compute.models.CommunityGalleryImageProperties
module: azure.mgmt.compute.models
summary: Describes the properties of a gallery image definition.
constructor:
  syntax: 'CommunityGalleryImageProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'This property allows you to specify the type of the OS that is included
    in the

    disk when creating a VM from a managed image. Possible values are: **Windows,**
    **Linux.**.

    Required. Known values are: "Windows" and "Linux".'
  name: os_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.OperatingSystemTypes>
- description: 'This property allows the user to specify whether the virtual machines
    created

    under this image are ''Generalized'' or ''Specialized''. Required. Known values
    are: "Generalized"

    and "Specialized".'
  name: os_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.OperatingSystemStateTypes>
- description: 'The end of life date of the gallery image definition. This property
    can

    be used for decommissioning purposes. This property is updatable.'
  name: end_of_life_date
  types:
  - <xref:datetime.datetime>
- description: This is the community gallery image definition identifier. Required.
  name: identifier
  types:
  - <xref:azure.mgmt.compute.models.CommunityGalleryImageIdentifier>
- description: 'The properties describe the recommended machine configuration for
    this Image

    Definition. These properties are updatable.'
  name: recommended
  types:
  - <xref:azure.mgmt.compute.models.RecommendedMachineConfiguration>
- description: Describes the disallowed disk types.
  name: disallowed
  types:
  - <xref:azure.mgmt.compute.models.Disallowed>
- description: 'The hypervisor generation of the Virtual Machine. Applicable to OS

    disks only. Known values are: "V1" and "V2".'
  name: hyper_v_generation
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.HyperVGeneration>
- description: A list of gallery image features.
  name: features
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.GalleryImageFeature>]
- description: 'Describes the gallery image definition purchase plan. This is used
    by

    marketplace images.'
  name: purchase_plan
  types:
  - <xref:azure.mgmt.compute.models.ImagePurchasePlan>
- description: 'The architecture of the image. Applicable to OS disks only. Known
    values

    are: "x64" and "Arm64".'
  name: architecture
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.Architecture>
- description: Privacy statement URI for the current community gallery image.
  name: privacy_statement_uri
  types:
  - <xref:str>
- description: The end-user license agreement for the current community gallery image.
  name: eula
  types:
  - <xref:str>
- description: The disclaimer for a community gallery resource.
  name: disclaimer
  types:
  - <xref:str>
- description: The artifact tags of a community gallery resource.
  name: artifact_tags
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
