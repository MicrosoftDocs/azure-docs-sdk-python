### YamlMime:PythonClass
uid: azure.mgmt.compute.models.VMScaleSetLifecycleHookEventProperties
name: VMScaleSetLifecycleHookEventProperties
fullName: azure.mgmt.compute.models.VMScaleSetLifecycleHookEventProperties
module: azure.mgmt.compute.models
summary: Defines the virtual machine scale set lifecycle hook event properties.
constructor:
  syntax: 'VMScaleSetLifecycleHookEventProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Defines the type or scenario for sending a virtual machine scale set
    lifecycle hook

    event to the customer. Known values are: "UpgradeAutoOSScheduling" and

    "UpgradeAutoOSRollingBatchStarting".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.VMScaleSetLifecycleHookEventType>
- description: 'Specifies the exact UTC timestamp in ISO 8601 format till which the
    event

    would remain in the current lifecycle state waiting for an action from the customer.
    Beyond

    this timestamp, the platform will apply the defaultAction for the event.'
  name: wait_until
  types:
  - <xref:str>
- description: 'Specifies the exact UTC timestamp in ISO 8601 format till when the

    customer can delay the lifecycle hook event. The customer will not be allowed
    to delay the

    event to a timestamp beyond this.'
  name: max_wait_until
  types:
  - <xref:str>
- description: 'The UTC timestamp in ISO 8601 format at which the platform creates
    the

    virtual machine scale set lifecycle hook event entity.'
  name: time_created
  types:
  - <xref:str>
- description: 'Specify the action that will be applied on the a target resource in
    the

    virtual machine scale set lifecycle hook event if the platform does not get a
    response from the

    customer for the target resource before waitUntil. Known values are: "Approve"
    and "Reject".'
  name: default_action
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.LifecycleHookAction>
- description: 'List of target resources which are getting processed in the virtual

    machine scale set lifecycle hook event.'
  name: target_resources
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.VMScaleSetLifecycleHookEventTargetResource>]
- description: 'Additional key-value pairs set on the lifecycle hook event that gives

    customer some useful context/data. The keys in this dictionary are specific to
    the lifecycle

    hook type. Different lifecycle hook events can have different sets of keys in
    the additional

    context depending on the lifecycle hook type. For example, for a lifecycle hook
    event with

    UpgradeAutoOSScheduling type, the additional context can contain the key "priority"
    that helps

    customer identify the priority of the Auto OS Upgrade operation triggered on the
    virtual

    machine scale set.'
  name: additional_context
  types:
  - <xref:azure.mgmt.compute.models.VMScaleSetLifecycleHookEventAdditionalContext>
- description: 'Specifies the state of the virtual machine scale set lifecycle hook
    event. Known

    values are: "Active" and "Completed".'
  name: state
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.VMScaleSetLifecycleHookEventState>
