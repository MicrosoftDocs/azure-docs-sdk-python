uid: azure.mgmt.compute.models.AlternativeOption
name: AlternativeOption
fullName: azure.mgmt.compute.models.AlternativeOption
module: azure.mgmt.compute.models
summary: 'Describes the alternative option specified by the Publisher for this image
  when this image is

  deprecated.'
constructor:
  syntax: 'AlternativeOption(*args: Any, **kwargs: Any)'
variables:
- description: 'Describes the type of the alternative option. Known values are: "None",
    "Offer",

    and "Plan".'
  name: type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.AlternativeType>
- description: 'Indicates the alternative option value specified by the Publisher.
    This is the

    Offer name when the type is Offer or the Plan name when the type is Plan.'
  name: value
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.compute.models.AlternativeOption.type
  name: type
  summary: '"None", "Offer", and

    "Plan".'
  signature: 'type: str | _models.AlternativeType | None'
- uid: azure.mgmt.compute.models.AlternativeOption.value
  name: value
  summary: 'Indicates the alternative option value specified by the Publisher. This
    is the Offer name when

    the type is Offer or the Plan name when the type is Plan.'
  signature: 'value: str | None'
