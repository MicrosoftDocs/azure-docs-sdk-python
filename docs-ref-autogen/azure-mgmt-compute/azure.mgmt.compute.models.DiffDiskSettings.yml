### YamlMime:PythonClass
uid: azure.mgmt.compute.models.DiffDiskSettings
name: DiffDiskSettings
fullName: azure.mgmt.compute.models.DiffDiskSettings
module: azure.mgmt.compute.models
summary: 'Describes the parameters of ephemeral disk settings that can be specified
  for operating system

  disk. **Note:** The ephemeral disk settings can only be specified for managed disk.'
constructor:
  syntax: 'DiffDiskSettings(*args: Any, **kwargs: Any)'
variables:
- description: Specifies the ephemeral disk settings for operating system disk. "Local"
  name: option
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiffDiskOptions>
- description: 'Specifies the ephemeral disk placement for operating system disk.
    Possible

    values are: **CacheDisk,** **ResourceDisk,** **NvmeDisk.** The defaulting behavior
    is:

    **CacheDisk** if one is configured for the VM size otherwise **ResourceDisk**
    or **NvmeDisk**

    is used. Refer to the VM size documentation for Windows VM at

    [https://docs.microsoft.com/azure/virtual-machines/windows/sizes](https://docs.microsoft.com/azure/virtual-machines/windows/sizes)
    and Linux VM at

    [https://docs.microsoft.com/azure/virtual-machines/linux/sizes](https://docs.microsoft.com/azure/virtual-machines/linux/sizes)
    to check which VM sizes

    exposes a cache disk. Minimum api-version for NvmeDisk: 2024-03-01. Known values
    are:

    "CacheDisk", "ResourceDisk", and "NvmeDisk".'
  name: placement
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.DiffDiskPlacement>
- description: 'Specifies whether or not to enable full caching for this VM which

    will cache the OS disk locally on the host and make this VM more resilient to
    storage outages.'
  name: enable_full_caching
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.compute.models.DiffDiskSettings.enable_full_caching
  name: enable_full_caching
  summary: 'Specifies whether or not to enable full caching for this VM which will
    cache the OS disk

    locally on the host and make this VM more resilient to storage outages.'
  signature: 'enable_full_caching: bool | None'
- uid: azure.mgmt.compute.models.DiffDiskSettings.option
  name: option
  summary: Specifies the ephemeral disk settings for operating system disk. "Local"
  signature: 'option: str | _models.DiffDiskOptions | None'
- uid: azure.mgmt.compute.models.DiffDiskSettings.placement
  name: placement
  summary: 'Specifies the ephemeral disk placement for operating system disk. Possible
    values are:

    **CacheDisk,** **ResourceDisk,** **NvmeDisk.** The defaulting behavior is: **CacheDisk**
    if one

    is configured for the VM size otherwise **ResourceDisk** or **NvmeDisk** is used.
    Refer to the

    VM size documentation for Windows VM at

    [https://docs.microsoft.com/azure/virtual-machines/windows/sizes](https://docs.microsoft.com/azure/virtual-machines/windows/sizes)
    and Linux VM at

    [https://docs.microsoft.com/azure/virtual-machines/linux/sizes](https://docs.microsoft.com/azure/virtual-machines/linux/sizes)
    to check which VM sizes

    exposes a cache disk. Minimum api-version for NvmeDisk: 2024-03-01. Known values
    are:

    "CacheDisk", "ResourceDisk", and "NvmeDisk".'
  signature: 'placement: str | _models.DiffDiskPlacement | None'
