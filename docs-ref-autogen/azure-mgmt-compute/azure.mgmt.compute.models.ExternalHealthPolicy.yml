### YamlMime:PythonClass
uid: azure.mgmt.compute.models.ExternalHealthPolicy
name: ExternalHealthPolicy
fullName: azure.mgmt.compute.models.ExternalHealthPolicy
module: azure.mgmt.compute.models
summary: Specifies the external health policy for the virtual machine scale set.
constructor:
  syntax: 'ExternalHealthPolicy(*args: Any, **kwargs: Any)'
variables:
- description: 'If true, external health is enabled for this scale set. Cannot be
    set to true on

    instances where another health monitoring source is active (ApplicationHealth
    extension or

    SLB). Defaults to false.'
  name: enabled
  types:
  - <xref:bool>
- description: 'Defines how long the health status set by External Health API will
    last

    on the VM. If a signal is not received/updated within this time, the VM Health
    will be marked

    as "unknown". Uses the ISO 8601 format. Minimum: 5 minutes (PT5M), Maximum: 3
    hours (PT3H).'
  name: expiry_duration
  types:
  - <xref:datetime.timedelta>
- description: 'Grace period for newly created VMs or when the External Health policy
    is

    first applied on VMSS. Uses the ISO 8601 format. Minimum: 5 minutes (PT5M), Maximum:
    4 hours

    (PT4H).'
  name: grace_period
  types:
  - <xref:datetime.timedelta>
attributes:
- uid: azure.mgmt.compute.models.ExternalHealthPolicy.enabled
  name: enabled
  summary: 'If true, external health is enabled for this scale set. Cannot be set
    to true on instances

    where another health monitoring source is active (ApplicationHealth extension
    or SLB). Defaults

    to false.'
  signature: 'enabled: bool | None'
- uid: azure.mgmt.compute.models.ExternalHealthPolicy.expiry_duration
  name: expiry_duration
  summary: 'Defines how long the health status set by External Health API will last
    on the VM. If a signal

    is not received/updated within this time, the VM Health will be marked as "unknown".
    Uses the

    ISO 8601 format. Minimum: 5 minutes (PT5M), Maximum: 3 hours (PT3H).'
  signature: 'expiry_duration: timedelta | None'
- uid: azure.mgmt.compute.models.ExternalHealthPolicy.grace_period
  name: grace_period
  summary: 'Grace period for newly created VMs or when the External Health policy
    is first applied on VMSS.

    Uses the ISO 8601 format. Minimum: 5 minutes (PT5M), Maximum: 4 hours (PT4H).'
  signature: 'grace_period: timedelta | None'
