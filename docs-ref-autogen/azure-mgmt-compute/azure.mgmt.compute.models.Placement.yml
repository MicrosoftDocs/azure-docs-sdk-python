### YamlMime:PythonClass
uid: azure.mgmt.compute.models.Placement
name: Placement
fullName: azure.mgmt.compute.models.Placement
module: azure.mgmt.compute.models
summary: Describes the user-defined constraints for resource hardware placement.
constructor:
  syntax: 'Placement(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the policy for resource''s placement in availability

    zone. Possible values are: **Any** (used for Virtual Machines), **Auto** (used
    for Virtual

    Machine Scale Sets) - An availability zone will be automatically picked by system
    as part of

    resource creation. Known values are: "Any" and "Auto".'
  name: zone_placement_policy
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ZonePlacementPolicyType>
- description: 'This property supplements the ''zonePlacementPolicy'' property. If

    ''zonePlacementPolicy'' is set to ''Any''/''Auto'', availability zone selected
    by the system must be

    present in the list of availability zones passed with ''includeZones''. If ''includeZones''
    is not

    provided, all availability zones in region will be considered for selection.'
  name: include_zones
  types:
  - <xref:list>[<xref:str>]
- description: 'This property supplements the ''zonePlacementPolicy'' property. If

    ''zonePlacementPolicy'' is set to ''Any''/''Auto'', availability zone selected
    by the system must not

    be present in the list of availability zones passed with ''excludeZones''. If
    ''excludeZones'' is

    not provided, all availability zones in region will be considered for selection.'
  name: exclude_zones
  types:
  - <xref:list>[<xref:str>]
attributes:
- uid: azure.mgmt.compute.models.Placement.exclude_zones
  name: exclude_zones
  summary: 'This property supplements the ''zonePlacementPolicy'' property. If ''zonePlacementPolicy''
    is set

    to ''Any''/''Auto'', availability zone selected by the system must not be present
    in the list of

    availability zones passed with ''excludeZones''. If ''excludeZones'' is not provided,
    all

    availability zones in region will be considered for selection.'
  signature: 'exclude_zones: list[str] | None'
- uid: azure.mgmt.compute.models.Placement.include_zones
  name: include_zones
  summary: 'This property supplements the ''zonePlacementPolicy'' property. If ''zonePlacementPolicy''
    is set

    to ''Any''/''Auto'', availability zone selected by the system must be present
    in the list of

    availability zones passed with ''includeZones''. If ''includeZones'' is not provided,
    all

    availability zones in region will be considered for selection.'
  signature: 'include_zones: list[str] | None'
- uid: azure.mgmt.compute.models.Placement.zone_placement_policy
  name: zone_placement_policy
  summary: 'Specifies the policy for resource''s placement in availability zone. Possible
    values are:

    **Any** (used for Virtual Machines), **Auto** (used for Virtual Machine Scale
    Sets) - An

    availability zone will be automatically picked by system as part of resource creation.
    Known

    values are: "Any" and "Auto".'
  signature: 'zone_placement_policy: str | _models.ZonePlacementPolicyType | None'
