### YamlMime:PythonClass
uid: azure.mgmt.compute.models.VirtualMachineReimageParameters
name: VirtualMachineReimageParameters
fullName: azure.mgmt.compute.models.VirtualMachineReimageParameters
module: azure.mgmt.compute.models
summary: 'Parameters for Reimaging Virtual Machine. NOTE: Virtual Machine OS disk
  will always be

  reimaged.'
constructor:
  syntax: 'VirtualMachineReimageParameters(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies whether to reimage temp disk. Default value: false. Note:
    This temp

    disk reimage parameter is only supported for VM/VMSS with Ephemeral OS disk.'
  name: temp_disk
  types:
  - <xref:bool>
- description: 'Specifies in decimal number, the version the OS disk should be reimaged

    to. If exact version is not provided, the OS disk is reimaged to the existing
    version of OS

    Disk.'
  name: exact_version
  types:
  - <xref:str>
- description: Specifies information required for reimaging the non-ephemeral OS disk.
  name: os_profile
  types:
  - <xref:azure.mgmt.compute.models.OSProfileProvisioningData>
attributes:
- uid: azure.mgmt.compute.models.VirtualMachineReimageParameters.exact_version
  name: exact_version
  summary: 'Specifies in decimal number, the version the OS disk should be reimaged
    to. If exact version is

    not provided, the OS disk is reimaged to the existing version of OS Disk.'
  signature: 'exact_version: str | None'
- uid: azure.mgmt.compute.models.VirtualMachineReimageParameters.os_profile
  name: os_profile
  summary: Specifies information required for reimaging the non-ephemeral OS disk.
  signature: 'os_profile: _models.OSProfileProvisioningData | None'
- uid: azure.mgmt.compute.models.VirtualMachineReimageParameters.temp_disk
  name: temp_disk
  summary: 'This temp disk reimage

    parameter is only supported for VM/VMSS with Ephemeral OS disk.'
  signature: 'temp_disk: bool | None'
