### YamlMime:PythonClass
uid: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile
name: GalleryApplicationVersionPublishingProfile
fullName: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile
module: azure.mgmt.compute.models
summary: The publishing profile of a gallery image version.
constructor:
  syntax: 'GalleryApplicationVersionPublishingProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'The target regions where the Image Version is going to be replicated
    to.

    This property is updatable.'
  name: target_regions
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.TargetRegion>]
- description: 'The number of replicas of the Image Version to be created per region.
    This

    property would take effect for a region when regionalReplicaCount is not specified.
    This

    property is updatable.'
  name: replica_count
  types:
  - <xref:int>
- description: 'If set to true, Virtual Machines deployed from the latest version
    of

    the Image Definition won''t use this Image Version.'
  name: exclude_from_latest
  types:
  - <xref:bool>
- description: The timestamp for when the gallery image version is published.
  name: published_date
  types:
  - <xref:datetime.datetime>
- description: 'The end of life date of the gallery image version. This property can
    be

    used for decommissioning purposes. This property is updatable.'
  name: end_of_life_date
  types:
  - <xref:datetime.datetime>
- description: 'Specifies the storage account type to be used to store the image.

    Cannot be specified along with storageAccountStrategy. This property is not updatable.
    Known

    values are: "Standard_LRS", "Standard_ZRS", "Premium_LRS", and "PremiumV2_LRS".'
  name: storage_account_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.StorageAccountType>
- description: 'Optional parameter which specifies the mode to be used for replication.

    This property is not updatable. Known values are: "Full" and "Shallow".'
  name: replication_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.ReplicationMode>
- description: 'The target extended locations where the Image Version is going

    to be replicated to. This property is updatable.'
  name: target_extended_locations
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.GalleryTargetExtendedLocation>]
- description: 'Specifies the strategy to be used when selecting the storage

    account type. Cannot be specified along with storageAccountType, but can be overridden
    per

    region by specifying targetRegions[].storageAccountType. This property is not
    updatable. Known

    values are: "PreferStandard_ZRS" and "DefaultStandard_LRS".'
  name: storage_account_strategy
  types:
  - <xref:str>
  - <xref:azure.mgmt.compute.models.StorageAccountStrategy>
- description: The source image from which the Image Version is going to be created.
    Required.
  name: source
  types:
  - <xref:azure.mgmt.compute.models.UserArtifactSource>
- name: manage_actions
  types:
  - <xref:azure.mgmt.compute.models.UserArtifactManage>
- description: 'Additional settings for the VM app that contains the target package
    and config

    file name when it is deployed to target VM or VM scale set.'
  name: settings
  types:
  - <xref:azure.mgmt.compute.models.UserArtifactSettings>
- description: 'Optional. Additional settings to pass to the vm-application-manager

    extension. For advanced use only.'
  name: advanced_settings
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: Optional. Whether or not this application reports health.
  name: enable_health_check
  types:
  - <xref:bool>
- description: 'A list of custom actions that can be performed with this Gallery

    Application Version.'
  name: custom_actions
  types:
  - <xref:list>[<xref:azure.mgmt.compute.models.GalleryApplicationCustomAction>]
attributes:
- uid: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile.advanced_settings
  name: advanced_settings
  summary: 'Optional. Additional settings to pass to the vm-application-manager extension.
    For advanced use

    only.'
  signature: 'advanced_settings: dict[str, str] | None'
- uid: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile.custom_actions
  name: custom_actions
  summary: A list of custom actions that can be performed with this Gallery Application
    Version.
  signature: 'custom_actions: list[''_models.GalleryApplicationCustomAction''] | None'
- uid: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile.enable_health_check
  name: enable_health_check
  summary: Optional. Whether or not this application reports health.
  signature: 'enable_health_check: bool | None'
- uid: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile.manage_actions
  name: manage_actions
  signature: 'manage_actions: _models.UserArtifactManage | None'
- uid: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile.settings
  name: settings
  summary: 'Additional settings for the VM app that contains the target package and
    config file name when

    it is deployed to target VM or VM scale set.'
  signature: 'settings: _models.UserArtifactSettings | None'
- uid: azure.mgmt.compute.models.GalleryApplicationVersionPublishingProfile.source
  name: source
  summary: The source image from which the Image Version is going to be created. Required.
  signature: 'source: _models.UserArtifactSource'
