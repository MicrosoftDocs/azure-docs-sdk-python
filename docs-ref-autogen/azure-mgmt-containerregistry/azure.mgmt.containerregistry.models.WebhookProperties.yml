uid: azure.mgmt.containerregistry.models.WebhookProperties
name: WebhookProperties
fullName: azure.mgmt.containerregistry.models.WebhookProperties
module: azure.mgmt.containerregistry.models
summary: The properties of a webhook.
constructor:
  syntax: 'WebhookProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The status of the webhook at the time the operation was called. Known
    values are:

    "enabled" and "disabled".'
  name: status
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerregistry.models.WebhookStatus>
- description: 'The scope of repositories where the event can be triggered. For example,
    ''foo:>>*<<''

    means events for all tags under repository ''foo''. ''foo:bar'' means events for
    ''foo:bar'' only.

    ''foo'' is equivalent to ''foo:latest''. Empty means all events.'
  name: scope
  types:
  - <xref:str>
- description: The list of actions that trigger the webhook to post notifications.
    Required.
  name: actions
  types:
  - <xref:list>[<xref:str>
  - <xref:azure.mgmt.containerregistry.models.WebhookAction>]
- description: 'The provisioning state of the webhook at the time the operation was

    called. Known values are: "Creating", "Updating", "Deleting", "Succeeded", "Failed",
    and

    "Canceled".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.containerregistry.models.ProvisioningState>
attributes:
- uid: azure.mgmt.containerregistry.models.WebhookProperties.actions
  name: actions
  summary: The list of actions that trigger the webhook to post notifications. Required.
  signature: 'actions: list[typing.Union[str, ForwardRef(''_models.WebhookAction'')]]'
- uid: azure.mgmt.containerregistry.models.WebhookProperties.provisioning_state
  name: provisioning_state
  summary: 'The provisioning state of the webhook at the time the operation was called.
    Known values are:

    "Creating", "Updating", "Deleting", "Succeeded", "Failed", and "Canceled".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.containerregistry.models.WebhookProperties.scope
  name: scope
  summary: '>>*<<'' means events

    for all tags under repository ''foo''. ''foo:bar'' means events for ''foo:bar''
    only. ''foo'' is

    equivalent to ''foo:latest''. Empty means all events.'
  signature: 'scope: str | None'
- uid: azure.mgmt.containerregistry.models.WebhookProperties.status
  name: status
