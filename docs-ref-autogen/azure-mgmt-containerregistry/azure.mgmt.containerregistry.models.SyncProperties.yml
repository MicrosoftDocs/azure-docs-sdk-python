### YamlMime:PythonClass
uid: azure.mgmt.containerregistry.models.SyncProperties
name: SyncProperties
fullName: azure.mgmt.containerregistry.models.SyncProperties
module: azure.mgmt.containerregistry.models
summary: The sync properties of the connected registry with its parent.
constructor:
  syntax: 'SyncProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The resource ID of the ACR token used to authenticate the connected
    registry to

    its parent during sync. Required.'
  name: token_id
  types:
  - <xref:str>
- description: 'The cron expression indicating the schedule that the connected registry
    will

    sync with its parent.'
  name: schedule
  types:
  - <xref:str>
- description: 'The time window during which sync is enabled for each schedule occurrence.

    Specify the duration using the format P[n]Y[n]M[n]DT[n]H[n]M[n]S as per ISO8601.'
  name: sync_window
  types:
  - <xref:datetime.timedelta>
- description: 'The period of time for which a message is available to sync before
    it is

    expired. Specify the duration using the format P[n]Y[n]M[n]DT[n]H[n]M[n]S as per
    ISO8601.

    Required.'
  name: message_ttl
  types:
  - <xref:datetime.timedelta>
- description: 'The last time a sync occurred between the connected registry and its

    parent.'
  name: last_sync_time
  types:
  - <xref:datetime.datetime>
- description: 'The gateway endpoint used by the connected registry to communicate
    with

    its parent.'
  name: gateway_endpoint
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.containerregistry.models.SyncProperties.gateway_endpoint
  name: gateway_endpoint
  summary: The gateway endpoint used by the connected registry to communicate with
    its parent.
  signature: 'gateway_endpoint: str | None'
- uid: azure.mgmt.containerregistry.models.SyncProperties.last_sync_time
  name: last_sync_time
  summary: The last time a sync occurred between the connected registry and its parent.
  signature: 'last_sync_time: datetime | None'
- uid: azure.mgmt.containerregistry.models.SyncProperties.message_ttl
  name: message_ttl
  summary: 'The period of time for which a message is available to sync before it
    is expired. Specify the

    duration using the format P[n]Y[n]M[n]DT[n]H[n]M[n]S as per ISO8601. Required.'
  signature: 'message_ttl: timedelta'
- uid: azure.mgmt.containerregistry.models.SyncProperties.schedule
  name: schedule
  summary: 'The cron expression indicating the schedule that the connected registry
    will sync with its

    parent.'
  signature: 'schedule: str | None'
- uid: azure.mgmt.containerregistry.models.SyncProperties.sync_window
  name: sync_window
  summary: 'The time window during which sync is enabled for each schedule occurrence.
    Specify the duration

    using the format P[n]Y[n]M[n]DT[n]H[n]M[n]S as per ISO8601.'
  signature: 'sync_window: timedelta | None'
- uid: azure.mgmt.containerregistry.models.SyncProperties.token_id
  name: token_id
  summary: 'The resource ID of the ACR token used to authenticate the connected registry
    to its parent

    during sync. Required.'
  signature: 'token_id: str'
