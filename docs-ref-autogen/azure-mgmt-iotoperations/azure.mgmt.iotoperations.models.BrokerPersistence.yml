### YamlMime:PythonClass
uid: azure.mgmt.iotoperations.models.BrokerPersistence
name: BrokerPersistence
fullName: azure.mgmt.iotoperations.models.BrokerPersistence
module: azure.mgmt.iotoperations.models
summary: "Disk persistence configuration.\n\nWhen persistence is enabled, certain\
  \ items (non-performance-critical data) selected for\npersistence will reside only\
  \ on disk. Below are the affected items:\n\n* Retained messages will be stored on\
  \ disk only. \n\n* WILL messages will be stored on disk only. \n\n* DSS key/value\
  \ pairs will be stored on disk only, except for performance-critical items like\
  \ \n\ntimed locks, which remain in both disk and memory for improved performance.\n\
  \nOptional. Everything is in-memory if not set.\nNote: if configured, all MQTT session\
  \ states are written to disk."
constructor:
  syntax: 'BrokerPersistence(*args: Any, **kwargs: Any)'
variables:
- description: 'The max size of the message buffer on disk. If a PVC template is specified

    using persistentVolumeClaimSpec Then this size is used as the request and limit
    sizes of that

    template. If a PVC template isn''t specified Then local-path provisioner is requested
    with this

    size limit. Required. Required.'
  name: max_size
  types:
  - <xref:str>
- description: 'Use the specified persistent volume claim template to mount

    a persistent volume. Same object as in diskBackedMessageBuffer, but with a limitation
    that

    access modes field must be set to `ReadWriteOncePod`.


    If unset, a default PVC with default properties will be used. Among other things
    this PVC will

    use the cluster default storage class, which may or may not be using a local path
    provisioner.

    User is opting in to sub-optimal behavior if they leave this unset or set it without
    the

    storage class field, and their cluster default is not a local path class.'
  name: persistent_volume_claim_spec
  types:
  - <xref:azure.mgmt.iotoperations.models.VolumeClaimSpec>
- description: Controls which topic's retained messages should be persisted to disk.
  name: retain
  types:
  - <xref:azure.mgmt.iotoperations.models.BrokerRetainMessagesPolicy>
- description: Controls which keys should be persisted to disk for the state store.
  name: state_store
  types:
  - <xref:azure.mgmt.iotoperations.models.BrokerStateStorePolicy>
- description: 'Controls which subscriber message queues should be persisted to disk.

    Important: to facilitate reconnection, session state metadata are ALWAYS written
    to disk if any

    persistence setting is specified, even if this section isn''t set.'
  name: subscriber_queue
  types:
  - <xref:azure.mgmt.iotoperations.models.BrokerSubscriberQueuePolicy>
- description: 'Controls settings related to encryption of the persistence database.

    Optional, defaults to enabling encryption.'
  name: encryption
  types:
  - <xref:azure.mgmt.iotoperations.models.BrokerPersistenceEncryption>
