### YamlMime:PythonClass
uid: azure.mgmt.reservations.models.ReservationsProperties
name: ReservationsProperties
fullName: azure.mgmt.reservations.models.ReservationsProperties
module: azure.mgmt.reservations.models
inheritances:
- azure.mgmt.reservations._serialization.Model
summary: 'The properties of the reservations.


  Variables are only populated by the server, and will be ignored when sending a request.'
constructor:
  syntax: 'ReservationsProperties(*, reserved_resource_type: str | _models.ReservedResourceType
    | None = None, instance_flexibility: str | _models.InstanceFlexibility | None
    = None, display_name: str | None = None, applied_scopes: List[str] | None = None,
    applied_scope_type: str | _models.AppliedScopeType | None = None, archived: bool
    | None = None, capabilities: str | None = None, quantity: int | None = None, provisioning_state:
    str | _models.ProvisioningState | None = None, effective_date_time: datetime |
    None = None, benefit_start_time: datetime | None = None, expiry_date: date | None
    = None, expiry_date_time: datetime | None = None, review_date_time: datetime |
    None = None, sku_description: str | None = None, extended_status_info: _models.ExtendedStatusInfo
    | None = None, billing_plan: str | _models.ReservationBillingPlan | None = None,
    purchase_date: date | None = None, purchase_date_time: datetime | None = None,
    split_properties: _models.ReservationSplitProperties | None = None, merge_properties:
    _models.ReservationMergeProperties | None = None, swap_properties: _models.ReservationSwapProperties
    | None = None, applied_scope_properties: _models.AppliedScopeProperties | None
    = None, billing_scope_id: str | None = None, renew: bool = False, renew_source:
    str | None = None, renew_destination: str | None = None, renew_properties: _models.RenewPropertiesResponse
    | None = None, term: str | _models.ReservationTerm | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: reserved_resource_type
    description: 'The type of the resource that is being reserved. Known values

      are: "VirtualMachines", "SqlDatabases", "SuseLinux", "CosmosDb", "RedHat", "SqlDataWarehouse",

      "VMwareCloudSimple", "RedHatOsa", "Databricks", "AppService", "ManagedDisk",
      "BlockBlob",

      "RedisCache", "AzureDataExplorer", "MySql", "MariaDb", "PostgreSql", "DedicatedHost",

      "SapHana", "SqlAzureHybridBenefit", "AVS", "DataFactory", "NetAppStorage", "AzureFiles",

      "SqlEdge", and "VirtualMachineSoftware".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.ReservedResourceType>
  - name: instance_flexibility
    description: 'Allows reservation discount to be applied across skus within the

      same auto fit group. Not all skus support instance size flexibility. Known values
      are: "On" and

      "Off".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.InstanceFlexibility>
  - name: display_name
    description: Friendly name for user to easily identify the reservation.
    types:
    - <xref:str>
  - name: applied_scopes
    description: The list of applied scopes.
    types:
    - <xref:list>[<xref:str>]
  - name: applied_scope_type
    description: 'The applied scope type. Known values are: "Single", "Shared", and

      "ManagementGroup".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.AppliedScopeType>
  - name: archived
    description: Indicates if the reservation is archived.
    types:
    - <xref:bool>
  - name: capabilities
    description: Capabilities of the reservation.
    types:
    - <xref:str>
  - name: quantity
    description: Quantity of the skus that are part of the reservation.
    types:
    - <xref:int>
  - name: provisioning_state
    description: 'Current state of the reservation. Known values are: "Creating",

      "PendingResourceHold", "ConfirmedResourceHold", "PendingBilling", "ConfirmedBilling",

      "Created", "Succeeded", "Cancelled", "Expired", "BillingFailed", "Failed", "Split",
      and

      "Merged".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.ProvisioningState>
  - name: effective_date_time
    description: 'DateTime of the reservation starting when this version is

      effective from.'
    types:
    - <xref:datetime.datetime>
  - name: benefit_start_time
    description: This is the DateTime when the reservation benefit started.
    types:
    - <xref:datetime.datetime>
  - name: expiry_date
    description: This is the date when the reservation will expire.
    types:
    - <xref:datetime.date>
  - name: expiry_date_time
    description: This is the date-time when the reservation will expire.
    types:
    - <xref:datetime.datetime>
  - name: review_date_time
    description: 'This is the date-time when the Azure Hybrid Benefit needs to be

      reviewed.'
    types:
    - <xref:datetime.datetime>
  - name: sku_description
    description: Description of the sku in english.
    types:
    - <xref:str>
  - name: extended_status_info
    description: The message giving detailed information about the status code.
    types:
    - <xref:azure.mgmt.reservations.models.ExtendedStatusInfo>
  - name: billing_plan
    description: 'The billing plan options available for this sku. Known values are:

      "Upfront" and "Monthly".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.ReservationBillingPlan>
  - name: purchase_date
    description: This is the date when the reservation was purchased.
    types:
    - <xref:datetime.date>
  - name: purchase_date_time
    description: This is the date-time when the reservation was purchased.
    types:
    - <xref:datetime.datetime>
  - name: split_properties
    description: Properties of reservation split.
    types:
    - <xref:azure.mgmt.reservations.models.ReservationSplitProperties>
  - name: merge_properties
    description: Properties of reservation merge.
    types:
    - <xref:azure.mgmt.reservations.models.ReservationMergeProperties>
  - name: swap_properties
    description: Properties of reservation swap.
    types:
    - <xref:azure.mgmt.reservations.models.ReservationSwapProperties>
  - name: applied_scope_properties
    description: 'Properties specific to applied scope type. Not required if

      not applicable. Required and need to provide tenantId and managementGroupId
      if AppliedScopeType

      is ManagementGroup.'
    types:
    - <xref:azure.mgmt.reservations.models.AppliedScopeProperties>
  - name: billing_scope_id
    description: 'Subscription that will be charged for purchasing reservation or

      savings plan.'
    types:
    - <xref:str>
  - name: renew
    description: 'Setting this to true will automatically purchase a new reservation
      on the

      expiration date time.'
    types:
    - <xref:bool>
  - name: renew_source
    description: 'Reservation Id of the reservation from which this reservation is

      renewed. Format of the resource Id is

      /providers/Microsoft.Capacity/reservationOrders/{reservationOrderId}/reservations/{reservationId}.'
    types:
    - <xref:str>
  - name: renew_destination
    description: 'Reservation Id of the reservation which is purchased because of

      renew. Format of the resource Id is

      /providers/Microsoft.Capacity/reservationOrders/{reservationOrderId}/reservations/{reservationId}.'
    types:
    - <xref:str>
  - name: renew_properties
    description: The renew properties for a reservation.
    types:
    - <xref:azure.mgmt.reservations.models.RenewPropertiesResponse>
  - name: term
    description: 'Represent the term of reservation. Known values are: "P1Y", "P3Y",
      and "P5Y".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.ReservationTerm>
