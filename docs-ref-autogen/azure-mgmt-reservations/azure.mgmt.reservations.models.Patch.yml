### YamlMime:PythonClass
uid: azure.mgmt.reservations.models.Patch
name: Patch
fullName: azure.mgmt.reservations.models.Patch
module: azure.mgmt.reservations.models
inheritances:
- azure.mgmt.reservations._serialization.Model
summary: The request for reservation patch.
constructor:
  syntax: 'Patch(*, applied_scope_type: str | _models.AppliedScopeType | None = None,
    applied_scopes: List[str] | None = None, applied_scope_properties: _models.AppliedScopeProperties
    | None = None, instance_flexibility: str | _models.InstanceFlexibility | None
    = None, name: str | None = None, renew: bool = False, renew_properties: _models.PatchPropertiesRenewProperties
    | None = None, review_date_time: datetime | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: applied_scope_type
    description: 'Type of the Applied Scope. Known values are: "Single", "Shared",

      and "ManagementGroup".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.AppliedScopeType>
  - name: applied_scopes
    description: 'List of the subscriptions that the benefit will be applied. Do not

      specify if AppliedScopeType is Shared. This property will be deprecated and
      replaced by

      appliedScopeProperties instead for Single AppliedScopeType.'
    types:
    - <xref:list>[<xref:str>]
  - name: applied_scope_properties
    description: 'Properties specific to applied scope type. Not required if

      not applicable. Required and need to provide tenantId and managementGroupId
      if AppliedScopeType

      is ManagementGroup.'
    types:
    - <xref:azure.mgmt.reservations.models.AppliedScopeProperties>
  - name: instance_flexibility
    description: 'Turning this on will apply the reservation discount to other VMs

      in the same VM size group. Only specify for VirtualMachines reserved resource
      type. Known

      values are: "On" and "Off".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.InstanceFlexibility>
  - name: name
    description: Display name of the reservation.
    types:
    - <xref:str>
  - name: renew
    description: 'Setting this to true will automatically purchase a new reservation
      on the

      expiration date time.'
    types:
    - <xref:bool>
  - name: renew_properties
    types:
    - <xref:azure.mgmt.reservations.models.PatchPropertiesRenewProperties>
  - name: review_date_time
    description: 'This is the date-time when the Azure hybrid benefit needs to be

      reviewed.'
    types:
    - <xref:datetime.datetime>
