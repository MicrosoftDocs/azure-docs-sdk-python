- uid: azure.mgmt.reservations.aio.operations.AzureReservationAPIOperationsMixin.get_catalog
  name: get_catalog
  summary: 'Get the regions and skus that are available for RI purchase for the specified
    Azure

    subscription.


    Get the regions and skus that are available for RI purchase for the specified
    Azure

    subscription.'
  signature: 'get_catalog(subscription_id: str, reserved_resource_type: str | None
    = None, location: str | None = None, publisher_id: str | None = None, offer_id:
    str | None = None, plan_id: str | None = None, filter: str | None = None, skip:
