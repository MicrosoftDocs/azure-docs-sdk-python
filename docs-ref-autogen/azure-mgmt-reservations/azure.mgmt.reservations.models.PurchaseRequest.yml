### YamlMime:PythonClass
uid: azure.mgmt.reservations.models.PurchaseRequest
name: PurchaseRequest
fullName: azure.mgmt.reservations.models.PurchaseRequest
module: azure.mgmt.reservations.models
inheritances:
- azure.mgmt.reservations._serialization.Model
summary: The request for reservation purchase.
constructor:
  syntax: 'PurchaseRequest(*, sku: _models.SkuName | None = None, location: str |
    None = None, reserved_resource_type: str | _models.ReservedResourceType | None
    = None, billing_scope_id: str | None = None, term: str | _models.ReservationTerm
    | None = None, billing_plan: str | _models.ReservationBillingPlan | None = None,
    quantity: int | None = None, display_name: str | None = None, applied_scope_type:
    str | _models.AppliedScopeType | None = None, applied_scopes: List[str] | None
    = None, applied_scope_properties: _models.AppliedScopeProperties | None = None,
    renew: bool = False, reserved_resource_properties: _models.PurchaseRequestPropertiesReservedResourceProperties
    | None = None, review_date_time: datetime | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: sku
    description: The name of sku.
    types:
    - <xref:azure.mgmt.reservations.models.SkuName>
  - name: location
    description: The Azure region where the reserved resource lives.
    types:
    - <xref:str>
  - name: reserved_resource_type
    description: 'The type of the resource that is being reserved. Known values

      are: "VirtualMachines", "SqlDatabases", "SuseLinux", "CosmosDb", "RedHat", "SqlDataWarehouse",

      "VMwareCloudSimple", "RedHatOsa", "Databricks", "AppService", "ManagedDisk",
      "BlockBlob",

      "RedisCache", "AzureDataExplorer", "MySql", "MariaDb", "PostgreSql", "DedicatedHost",

      "SapHana", "SqlAzureHybridBenefit", "AVS", "DataFactory", "NetAppStorage", "AzureFiles",

      "SqlEdge", and "VirtualMachineSoftware".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.ReservedResourceType>
  - name: billing_scope_id
    description: 'Subscription that will be charged for purchasing reservation or

      savings plan.'
    types:
    - <xref:str>
  - name: term
    description: 'Represent the term of reservation. Known values are: "P1Y", "P3Y",
      and "P5Y".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.ReservationTerm>
  - name: billing_plan
    description: 'Represent the billing plans. Known values are: "Upfront" and "Monthly".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.ReservationBillingPlan>
  - name: quantity
    description: Quantity of the skus that are part of the reservation.
    types:
    - <xref:int>
  - name: display_name
    description: Friendly name of the reservation.
    types:
    - <xref:str>
  - name: applied_scope_type
    description: 'Type of the Applied Scope. Known values are: "Single", "Shared",

      and "ManagementGroup".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.AppliedScopeType>
  - name: applied_scopes
    description: 'List of the subscriptions that the benefit will be applied. Do not

      specify if AppliedScopeType is Shared. This property will be deprecated and
      replaced by

      appliedScopeProperties instead for Single AppliedScopeType.'
    types:
    - <xref:list>[<xref:str>]
  - name: applied_scope_properties
    description: 'Properties specific to applied scope type. Not required if

      not applicable. Required and need to provide tenantId and managementGroupId
      if AppliedScopeType

      is ManagementGroup.'
    types:
    - <xref:azure.mgmt.reservations.models.AppliedScopeProperties>
  - name: renew
    description: 'Setting this to true will automatically purchase a new reservation
      on the

      expiration date time.'
    types:
    - <xref:bool>
  - name: reserved_resource_properties
    description: 'Properties specific to each reserved resource type. Not

      required if not applicable.'
    types:
    - <xref:azure.mgmt.reservations.models.PurchaseRequestPropertiesReservedResourceProperties>
  - name: review_date_time
    description: 'This is the date-time when the Azure hybrid benefit needs to be

      reviewed.'
    types:
    - <xref:datetime.datetime>
