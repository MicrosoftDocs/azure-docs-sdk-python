### YamlMime:PythonClass
uid: azure.mgmt.reservations.models.SavingsPlanPurchaseRequest
name: SavingsPlanPurchaseRequest
fullName: azure.mgmt.reservations.models.SavingsPlanPurchaseRequest
module: azure.mgmt.reservations.models
inheritances:
- azure.mgmt.reservations._serialization.Model
summary: Request body for savings plan purchase.
constructor:
  syntax: 'SavingsPlanPurchaseRequest(*, sku: _models.SkuName | None = None, display_name:
    str | None = None, billing_scope_id: str | None = None, term: str | _models.SavingsPlanTerm
    | None = None, billing_plan: str | _models.BillingPlan | None = None, applied_scope_type:
    str | _models.AppliedScopeType | None = None, applied_scope_properties: _models.AppliedScopeProperties
    | None = None, commitment: _models.Commitment | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: sku
    description: The name of sku.
    types:
    - <xref:azure.mgmt.reservations.models.SkuName>
  - name: display_name
    description: Friendly name of the savings plan.
    types:
    - <xref:str>
  - name: billing_scope_id
    description: 'Subscription that will be charged for purchasing reservation or

      savings plan.'
    types:
    - <xref:str>
  - name: term
    description: 'Represent savings plan term in ISO 8601 format. Known values are:
      "P1Y" and

      "P3Y".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.SavingsPlanTerm>
  - name: billing_plan
    description: 'Represents the billing plan in ISO 8601 format. Required only for

      monthly billing plans. "P1M"'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.BillingPlan>
  - name: applied_scope_type
    description: 'Type of the Applied Scope. Known values are: "Single", "Shared",

      and "ManagementGroup".'
    types:
    - <xref:str>
    - <xref:azure.mgmt.reservations.models.AppliedScopeType>
  - name: applied_scope_properties
    description: 'Properties specific to applied scope type. Not required if

      not applicable. Required and need to provide tenantId and managementGroupId
      if AppliedScopeType

      is ManagementGroup.'
    types:
    - <xref:azure.mgmt.reservations.models.AppliedScopeProperties>
  - name: commitment
    description: Commitment towards the benefit.
    types:
    - <xref:azure.mgmt.reservations.models.Commitment>
