### YamlMime:PythonModule
uid: azure_postgresql_auth.core
name: core
fullName: azure_postgresql_auth.core
functions:
- uid: azure_postgresql_auth.core.decode_jwt
  name: decode_jwt
  summary: Decodes a JWT token to extract its payload claims.
  signature: 'decode_jwt(token: str) -> dict[str, Any]'
  parameters:
  - name: token
    description: The JWT token string in the standard three-part format.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: A dictionary containing the claims extracted from the token payload.
    types:
    - <xref:dict>[<xref:str>, <xref:typing.Any>]
  exceptions:
  - type: azure_postgresql_auth.TokenDecodeError
    description: If the token format is invalid or cannot be decoded.
- uid: azure_postgresql_auth.core.get_entra_conninfo
  name: get_entra_conninfo
  summary: 'Synchronously obtains connection information from Entra authentication
    for Azure PostgreSQL.


    This function acquires an access token from Microsoft Entra ID and extracts the
    username

    from the token claims. It tries multiple claim sources to determine the username.'
  signature: 'get_entra_conninfo(credential: TokenCredential) -> dict[str, str]'
  parameters:
  - name: credential
    description: The credential used for token acquisition.
    isRequired: true
    types:
    - <xref:azure.core.credentials.TokenCredential>
  return:
    description: A dictionary with 'user' and 'password' keys for database authentication.
    types:
    - <xref:dict>[<xref:str>, <xref:str>]
  exceptions:
  - type: azure_postgresql_auth.TokenDecodeError
    description: If the JWT token cannot be decoded.
  - type: azure_postgresql_auth.UsernameExtractionError
    description: If the username cannot be extracted.
  - type: azure_postgresql_auth.ScopePermissionError
    description: If the management scope token cannot be acquired.
- uid: azure_postgresql_auth.core.get_entra_conninfo_async
  name: get_entra_conninfo_async
  summary: 'Asynchronously obtains connection information from Entra authentication
    for Azure PostgreSQL.


    This function acquires an access token from Microsoft Entra ID and extracts the
    username

    from the token claims. It tries multiple claim sources to determine the username.'
  signature: 'async get_entra_conninfo_async(credential: AsyncTokenCredential) ->
    dict[str, str]'
  parameters:
  - name: credential
    description: The async credential used for token acquisition.
    isRequired: true
    types:
    - <xref:azure.core.credentials_async.AsyncTokenCredential>
  return:
    description: A dictionary with 'user' and 'password' keys for database authentication.
    types:
    - <xref:dict>[<xref:str>, <xref:str>]
  exceptions:
  - type: azure_postgresql_auth.TokenDecodeError
    description: If the JWT token cannot be decoded.
  - type: azure_postgresql_auth.UsernameExtractionError
    description: If the username cannot be extracted.
  - type: azure_postgresql_auth.ScopePermissionError
    description: If the management scope token cannot be acquired.
- uid: azure_postgresql_auth.core.get_entra_token
  name: get_entra_token
  summary: Acquires an Entra authentication token for Azure PostgreSQL synchronously.
  signature: 'get_entra_token(credential: TokenCredential, scope: str) -> str'
  parameters:
  - name: credential
    description: Credential object used to obtain the token.
    isRequired: true
    types:
    - <xref:azure.core.credentials.TokenCredential>
  - name: scope
    description: The scope for the token request.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The acquired authentication token to be used as the database password.
    types:
    - <xref:str>
- uid: azure_postgresql_auth.core.get_entra_token_async
  name: get_entra_token_async
  summary: Asynchronously acquires an Entra authentication token for Azure PostgreSQL.
  signature: 'async get_entra_token_async(credential: AsyncTokenCredential, scope:
    str) -> str'
  parameters:
  - name: credential
    description: Asynchronous credential used to obtain the token.
    isRequired: true
    types:
    - <xref:azure.core.credentials_async.AsyncTokenCredential>
  - name: scope
    description: The scope for the token request.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The acquired authentication token to be used as the database password.
    types:
    - <xref:str>
- uid: azure_postgresql_auth.core.parse_principal_name
  name: parse_principal_name
  summary: Parses the principal name from an Azure resource path.
  signature: 'parse_principal_name(xms_mirid: str) -> str | None'
  parameters:
  - name: xms_mirid
    description: The xms_mirid claim value containing the Azure resource path.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: The extracted principal name, or None if parsing fails.
    types:
    - <xref:str>
    - <xref:None>
