### YamlMime:PythonPackage
uid: azure_postgresql_auth
name: azure_postgresql_auth
fullName: azure_postgresql_auth
summary: "Azure PostgreSQL Auth client library for Python.\n\n\nThis library provides\
  \ Microsoft Entra ID authentication for Python database drivers\nconnecting to Azure\
  \ Database for PostgreSQL. It supports psycopg2, psycopg3,\nand SQLAlchemy with\
  \ automatic token management.\n\n\nAvailable submodules (with optional dependencies):\n\
  \    - psycopg2: Support for psycopg2 driver (pip install azure-postgresql-auth[psycopg2])\n\
  \    - psycopg3: Support for psycopg (v3) driver (pip install azure-postgresql-auth[psycopg3])\n\
  \    - sqlalchemy: Support for SQLAlchemy ORM (pip install azure-postgresql-auth[sqlalchemy])"
type: rootImport
modules:
- azure_postgresql_auth.core
- azure_postgresql_auth.errors
