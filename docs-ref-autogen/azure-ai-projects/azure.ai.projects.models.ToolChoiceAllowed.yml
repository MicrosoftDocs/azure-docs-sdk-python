name: ToolChoiceAllowed
fullName: azure.ai.projects.models.ToolChoiceAllowed
module: azure.ai.projects.models
summary: Allowed tools.
constructor:
  syntax: 'ToolChoiceAllowed(*args: Any, **kwargs: Any)'
variables:
- description: Allowed tool configuration type. Always `allowed_tools`. Required.
    ALLOWED_TOOLS.
  name: type
  types:
  - <xref:str>
  - <xref:azure.ai.projects.models.ALLOWED_TOOLS>
- description: 'Constrains the tools available to the model to a pre-defined set.
    `auto` allows

    the model to pick from among the allowed tools and generate a message. `required`
    requires

    the model to call one or more of the allowed tools. Required. Is either a Literal["auto"]
    type

    or a Literal["required"] type.'
  name: mode
  types:
  - <xref:str>
  - <xref:str>
- description: 'A list of tool definitions that the model should be allowed to call.
    For the

    Responses API, the list of tool definitions might look like:

    .. code-block:: json

    [

    { "type": "function", "name": "get_weather" },

    { "type": "mcp", "server_label": "deepwiki" },

    { "type": "image_generation" }

    ]. Required.'
  name: tools
  types:
  - <xref:list>[<xref:dict>[<xref:str>, <xref:any>]]
