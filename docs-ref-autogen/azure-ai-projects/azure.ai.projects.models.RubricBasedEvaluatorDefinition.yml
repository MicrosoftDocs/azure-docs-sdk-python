    normalized 0.0-1.0 scale as the emitted `score`. When the runtime weighted average\
    \ meets or\nexceeds this value, the result is `pass`. Defaults to 0.5 (equivalent\
    \ to a raw 1-5 weighted\naverage of 3.0). The 'any dimension scored 1 \u2192 fail'\
    \ rule still applies regardless of this\nthreshold."
  name: pass_threshold
  types:
  - <xref:float>
