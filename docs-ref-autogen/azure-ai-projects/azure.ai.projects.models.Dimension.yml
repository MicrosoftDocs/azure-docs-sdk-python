attributes:
- uid: azure.ai.projects.models.Dimension.always_applicable
  name: always_applicable
  summary: 'When true, the LLM judge always scores this dimension regardless of relevance
    (skips

    applicability assessment). The service-generated general quality/policy dimension
    has this set

    to true and is non-editable. Users may set this on their own custom dimensions.
    The service

    defaults to `false` if a value is not specified by the caller.'
  signature: 'always_applicable: bool | None'
- uid: azure.ai.projects.models.Dimension.description
