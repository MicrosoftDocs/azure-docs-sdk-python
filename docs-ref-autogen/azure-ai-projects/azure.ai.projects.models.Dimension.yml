### YamlMime:PythonClass
uid: azure.ai.projects.models.Dimension
name: Dimension
fullName: azure.ai.projects.models.Dimension
module: azure.ai.projects.models
summary: "A single dimension \u2014 one independent, measurable quality dimension\
  \ within a rubric evaluator's\nscoring blueprint."
constructor:
  syntax: 'Dimension(*args: Any, **kwargs: Any)'
variables:
- description: 'Stable identifier for this dimension (snake_case, e.g., `correct_resolution`).

    Required. Provided by the user when manually creating a rubric evaluator or during

    human-in-the-loop review of a generated set; the generation pipeline produces
    an initial value

    the user can edit. Editable when saving new versions. Required.'
  name: id
  types:
  - <xref:str>
- description: 'What this dimension measures (e.g., ''Correctly identifies the user''s

    reservation intent and pursues the appropriate workflow''). Required.'
  name: description
  types:
  - <xref:str>
- description: 'Relative weight of this dimension (1-10). The generation pipeline
    assigns exactly

    one dimension weight 8-10; all others use 1-6. User edits are not constrained
    by this

    heuristic. Required.'
  name: weight
  types:
  - <xref:int>
- description: 'When true, the LLM judge always scores this dimension regardless of

    relevance (skips applicability assessment). The service-generated general quality/policy

    dimension has this set to true and is non-editable. Users may set this on their
    own custom

    dimensions. The service defaults to `false` if a value is not specified by the
    caller.'
  name: always_applicable
  types:
  - <xref:bool>
