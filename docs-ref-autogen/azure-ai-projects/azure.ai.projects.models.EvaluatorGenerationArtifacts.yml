### YamlMime:PythonClass
uid: azure.ai.projects.models.EvaluatorGenerationArtifacts
name: EvaluatorGenerationArtifacts
fullName: azure.ai.projects.models.EvaluatorGenerationArtifacts
module: azure.ai.projects.models
summary: 'Service-managed provenance artifacts produced by an evaluator generation
  job. Present only on

  EvaluatorVersion resources created via the generation pipeline. The combined-JSONL
  Foundry

  Dataset is read-only and resolves to a versioned dataset in a service-reserved namespace.'
constructor:
  syntax: 'EvaluatorGenerationArtifacts(*args: Any, **kwargs: Any)'
variables:
- description: 'Reference to the single Foundry Dataset (one combined JSONL file,

    version-aligned to `EvaluatorVersion.version`) holding all artifacts produced
    by the

    generation pipeline. Each row in the JSONL carries a `kind` field discriminating
    its content

    (e.g. `spec`, `tools`, `context`). Required.'
  name: dataset
  types:
  - <xref:azure.ai.projects.models.DatasetReference>
- description: 'The kinds of rows present in `dataset`. Always contains `"spec"` (the

    generated evaluation specification, a Markdown document describing what the evaluator

    measures). May additionally contain `"tools"` (when the generation pipeline produced
    or

    inferred OpenAI tool schemas) and/or `"context"` (when supplementary materials
    such as file

    uploads or trace samples were used during generation). Required.'
  name: kinds
  types:
  - <xref:list>[<xref:str>]
