uid: azure.ai.projects.models.OptimizationOptions
name: OptimizationOptions
fullName: azure.ai.projects.models.OptimizationOptions
module: azure.ai.projects.models
summary: Tuning knobs and run-mode for an optimization job.
constructor:
  syntax: 'OptimizationOptions(*args: Any, **kwargs: Any)'
variables:
- description: 'Maximum optimization iterations per strategy. Must be >= 1. Default:
    5.'
  name: max_iterations
  types:
  - <xref:int>
- description: 'Per-target-attribute configuration overrides. Contains skills,

    tools, system_prompt for the agent, plus model space for model optimization.'
  name: optimization_config
  types:
  - <xref:dict>[<xref:str>, <xref:any>]
- description: 'Model deployment used for evaluation. Defaults to server config (typically

    ''gpt-4o'').'
  name: eval_model
  types:
  - <xref:str>
- description: 'Model deployment for optimization reasoning (must be gpt-5 family).

    Falls back to the default eval model when not set.'
  name: optimization_model
  types:
  - <xref:str>
- description: 'Evaluation granularity. Null/omitted means per-item single-turn. Set
    to

    ''conversation'' for per-conversation multi-turn simulation scoring. Known values
    are: "turn" and

    "conversation".'
  name: evaluation_level
  types:
  - <xref:str>
  - <xref:azure.ai.projects.models.EvaluationLevel>
