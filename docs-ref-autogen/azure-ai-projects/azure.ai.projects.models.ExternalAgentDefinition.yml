uid: azure.ai.projects.models.ExternalAgentDefinition
name: ExternalAgentDefinition
fullName: azure.ai.projects.models.ExternalAgentDefinition
module: azure.ai.projects.models
summary: 'The external agent definition. Represents a third-party agent hosted outside
  Foundry (for

  example, on GCP or AWS). Registration is metadata-only: Foundry records the agent
  definition to

  light up observability experiences (traces, evaluations) over customer-emitted OpenTelemetry

  data.'
constructor:
  syntax: 'ExternalAgentDefinition(*args: Any, **kwargs: Any)'
variables:
- description: Configuration for Responsible AI (RAI) content filtering and safety
    features.
  name: rai_config
  types:
  - <xref:azure.ai.projects.models.RaiConfig>
- description: Required. EXTERNAL.
  name: kind
  types:
  - <xref:str>
  - <xref:azure.ai.projects.models.EXTERNAL>
- description: 'The OpenTelemetry agent identifier used to attribute customer-emitted

    spans to this Foundry agent. Spans must include the attribute `gen_ai.agent.id
    =

    <otel_agent_id>` to appear under this registration. Defaults to the top-level
    agent name when

    omitted. Provide an explicit value only for migration scenarios where the running
    external

    agent already emits a stable id that differs from the Foundry agent name. The
    resolved value is

    always echoed on read.'
  name: otel_agent_id
  types:
  - <xref:str>
