uid: azure.ai.projects.models.SessionLogEvent
name: SessionLogEvent
fullName: azure.ai.projects.models.SessionLogEvent
module: azure.ai.projects.models
summary: "A single Server-Sent Event frame emitted by the hosted agent session log\
  \ stream.\n\nEach frame contains an `event` field identifying the event type and\
  \ a `data`\nfield carrying the payload as plain text. Although the current `data`\
  \ payload\nis JSON-formatted, its schema is not contractual \u2014 additional keys\
  \ may appear\nand the format may change over time. Clients should treat `data` as\
  \ an\nopaque string and optionally attempt JSON parsing.\n\nNew event types may\
  \ be added in the future. Clients should gracefully\nignore unrecognized event types.\n\
  \nWire format:\n\n<!-- literal_block {\"ids\": [], \"classes\": [], \"names\": [],\
  \ \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\", \"force\": false,\
  \ \"language\": \"default\", \"highlight_args\": {}, \"linenos\": false} -->\n\n\
  ````default\n\n   event: log\n   data: {\"timestamp\":\"2026-03-10T09:33:17.121Z\"\
  ,\"stream\":\"stdout\",\"message\":\"Starting server on port 18080\"}\n\n   event:\
  \ log\n   data: {\"timestamp\":\"2026-03-10T09:34:52.714Z\",\"stream\":\"status\"\
  ,\"message\":\"Successfully connected to container\"}\n   ````"
