### YamlMime:PythonClass
uid: azure.ai.projects.aio.operations.BetaModelsOperations
name: BetaModelsOperations
fullName: azure.ai.projects.aio.operations.BetaModelsOperations
module: azure.ai.projects.aio.operations
summary: "> [!WARNING]\n> DO NOT instantiate this class directly.\n>\n> \n>\n> Instead,\
  \ you should access the following operations through\n>\n> <xref:azure.ai.projects.aio.AIProjectClient>'s\n\
  >\n> <xref:azure.ai.projects.aio.operations.BetaOperations.models> attribute.\n>"
constructor:
  syntax: BetaModelsOperations(*args, **kwargs)
methods:
- uid: azure.ai.projects.aio.operations.BetaModelsOperations.create
  name: create
  summary: "Register a local model by running the full upload-first sequence (async).\n\
    \nThis wraps the three mandatory steps of the model-registration spec\ninto a\
    \ single call:\n\n1. <xref:azure.ai.projects.aio.operations.BetaModelsOperations.pending_upload>\
    \ \u2014 provision a project-managed blob container and obtain a SAS URI. \n\n\
    2. Upload the local weight files to the SAS container using <xref:azure.storage.blob.aio.ContainerClient>.\
    \ \n\n3. <xref:azure.ai.projects.aio.operations.BetaModelsOperations.pending_create_version>\
    \ \u2014 finalize registration with the `ModelVersion` body (`blob_uri`, `weight_type`,\
    \ `base_model`, `description`, `tags`). \n\nRequires the `azure-storage-blob`\
    \ package (with `aiohttp`) for the\nupload step."
  signature: 'async create(*, name: str, version: str, source: str | ''os.PathLike[str]'',
    weight_type: str | None = None, base_model: str | None = None, description: str
    | None = None, tags: ''dict[str, str]'' | None = None, wait_for_commit: Literal[True]
    = True, polling_timeout: float = 300.0, polling_interval: float = 2.0, **kwargs:
    Any) -> ModelVersion'
  keywordOnlyParameters:
  - name: name
    description: Name of the model to register. Required.
    types:
    - <xref:str>
  - name: version
    description: Version identifier for the model. Required.
    types:
    - <xref:str>
  - name: source
    description: 'Local file or directory containing the model weights.

      If a directory, its contents are uploaded recursively to the SAS

      container root. Required.'
    types:
    - <xref:str>
    - <xref:os.PathLike>[<xref:str>]
  - name: weight_type
    description: 'Optional weight type (e.g. `"FullWeight"`,

      `"LoRA"`, `"DraftModel"`).'
    defaultValue: None
    types:
    - <xref:str>
  - name: base_model
    description: Optional base model asset ID.
    defaultValue: None
    types:
    - <xref:str>
  - name: description
    description: Optional asset description.
    defaultValue: None
    types:
    - <xref:str>
  - name: tags
    description: Optional asset tags.
    defaultValue: None
    types:
    - <xref:dict>[<xref:str>, <xref:str>]
  - name: wait_for_commit
    description: 'When True (default) poll <xref:azure.ai.projects.aio.operations.BetaModelsOperations.get>
      until

      the committed `ModelVersion` is observable, and return it.

      When False, return `None` after the async commit is accepted.'
    defaultValue: 'True'
    types:
    - <xref:bool>
  - name: polling_timeout
    description: Total seconds to poll for commit completion.
    defaultValue: '300.0'
    types:
    - <xref:float>
  - name: polling_interval
    description: Seconds between poll attempts.
    defaultValue: '2.0'
    types:
    - <xref:float>
  return:
    description: 'The committed <xref:azure.ai.projects.models.ModelVersion>

      when `wait_for_commit` is True, otherwise `None`.'
    types:
    - <xref:azure.ai.projects.models.ModelVersion>
    - <xref:None>
  exceptions:
  - type: ValueError
    description: 'If `name` `version` are empty, `source` does

      not exist or is empty, polling parameters are non-positive, or the

      pending-upload response is missing the SAS / blob URI.'
  - type: RuntimeError
    description: 'If `azure-storage-blob` is not installed or

      the registration does not commit before `polling_timeout` elapses.'
