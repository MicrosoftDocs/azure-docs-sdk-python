### YamlMime:PythonClass
uid: azure.ai.projects.models.EvaluatorGenerationInputs
name: EvaluatorGenerationInputs
fullName: azure.ai.projects.models.EvaluatorGenerationInputs
module: azure.ai.projects.models
summary: Caller-supplied inputs for an evaluator generation job.
constructor:
  syntax: 'EvaluatorGenerationInputs(*args: Any, **kwargs: Any)'
variables:
- description: "Source materials for generation \u2014 agent descriptions, prompts,\
    \ traces, or\ndatasets. Each entry is an `EvaluatorGenerationJobSource` variant\
    \ discriminated by `type`.\nRequired."
  name: sources
  types:
  - <xref:list>[<xref:azure.ai.projects.models.EvaluatorGenerationJobSource>]
- description: "The LLM model to use for rubric generation (e.g., 'gpt-4o'). Required\
    \ \u2014 users must\nprovide their own model rather than relying on service-owned\
    \ capacity. Required."
  name: model
  types:
  - <xref:str>
- description: 'The evaluator name (immutable identifier). 1-256 characters; allowed

    characters are ASCII letters, digits, underscore (`_`), period (`.`), tilde (`~`),
    and

    hyphen (`-`). The prefix `builtin.` is reserved for system-managed evaluators
    and is

    rejected by the service. If an evaluator with this name already exists in the
    project (and is

    rubric-subtype), the service creates a new version under the same name and uses
    the prior

    version''s `dimensions` as context for incremental improvement (foundation of
    the post-//build

    adaptive loop). Old versions remain queryable via `get_version(name, version)`.
    If the

    existing evaluator is not a rubric-subtype evaluator (built-in, prompt-based,
    code-based), the

    request is rejected with `400 Bad Request`. Required.'
  name: evaluator_name
  types:
  - <xref:str>
- description: 'Optional human-friendly display name for the resulting evaluator.

    Surfaced as `EvaluatorVersion.display_name` on the persisted evaluator. When omitted,
    the

    service uses `evaluator_name` as the display name. The `evaluator_` prefix disambiguates

    this from the immutable `evaluator_name` identifier.'
  name: evaluator_display_name
  types:
  - <xref:str>
- description: 'Optional human-friendly description for the resulting evaluator.

    Surfaced as `EvaluatorVersion.description` on the persisted evaluator. Typically
    collected

    from the UI alongside `evaluator_display_name`. The `evaluator_` prefix disambiguates
    this

    from any other description fields on related models.'
  name: evaluator_description
  types:
  - <xref:str>
