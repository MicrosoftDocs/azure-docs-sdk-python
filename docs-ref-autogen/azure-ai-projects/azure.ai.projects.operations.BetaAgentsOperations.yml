    | None = None, **kwargs: ~typing.Any) -> AgentSessionResource'
  parameters:
  - name: agent_name
    description: The name of the agent to create a session for. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: body
    description: Is either a JSON type or a IO[bytes] type. Required.
    types:
    - <xref:JSON>
    - <xref:typing.IO>[<xref:bytes>]
  keywordOnlyParameters:
  - name: version_indicator
    description: Determines which agent version backs the session. Required.
    defaultValue: <object object at 0x000001BDD378DA50>
    types:
    - <xref:azure.ai.projects.models.VersionIndicator>
  - name: user_isolation_key
    description: 'Opaque per-user isolation key used to scope endpoint-scoped data

      (responses, conversations, sessions) to a specific end user. Default value is
      None.'
    defaultValue: None
    types:
    - <xref:str>
  - name: agent_session_id
    description: 'Optional caller-provided session ID. If specified, it must be unique

      within the agent endpoint. Auto-generated if omitted. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  return:
    description: AgentSessionResource. The AgentSessionResource is compatible with
      MutableMapping
    types:
    - <xref:azure.ai.projects.models.AgentSessionResource>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
