- uid: azure.ai.projects.operations.BetaAgentsOperations.create_session
  name: create_session
  summary: 'Creates a new session for an agent endpoint. The endpoint resolves the
    backing agent version

    from `version_indicator` and enforces session ownership using the provided isolation
    key for

    session-mutating operations.'
  signature: 'create_session(agent_name: str, body: ~collections.abc.MutableMapping[str,
    ~typing.Any] | ~typing.IO[bytes] = <object object>, *, version_indicator: ~azure.ai.projects.models._models.VersionIndicator
