- uid: azure.ai.projects.operations.BetaAgentsOperations.get_session_log_stream
  name: get_session_log_stream
  summary: "Streams console logs (stdout / stderr) for a specific hosted agent session\n\
    as a Server-Sent Events (SSE) stream.\n\nEach SSE frame contains:\n\n* *event*:\
    \ always *\"log\"* \n\n* *data*: a plain-text log line (currently JSON-formatted,\
    \ but the schema is not contractual and may include additional keys or change\
    \ format over time; clients should treat it as an opaque string) \n\nExample SSE\
    \ frames:\n\n<!-- literal_block {\"ids\": [], \"classes\": [], \"names\": [],\
    \ \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\", \"force\":\
    \ false, \"language\": \"default\", \"highlight_args\": {}, \"linenos\": false}\
    \ -->\n\n````default\n\n   event: log\n   data: {\"timestamp\":\"2026-03-10T09:33:17.121Z\"\
    ,\"stream\":\"stdout\",\"message\":\"Starting FoundryCBAgent server on port 8088\"\
    }\n\n   event: log\n   data: {\"timestamp\":\"2026-03-10T09:33:17.130Z\",\"stream\"\
    :\"stderr\",\"message\":\"INFO: Application startup complete.\"}\n\n   event:\
    \ log\n   data: {\"timestamp\":\"2026-03-10T09:34:52.714Z\",\"stream\":\"status\"\
    ,\"message\":\"Successfully connected to container\"}\n\n   event: log\n   data:\
    \ {\"timestamp\":\"2026-03-10T09:35:52.714Z\",\"stream\":\"status\",\"message\"\
    :\"No logs since last 60 seconds\"}\n   ````\n\nThe stream remains open until\
    \ the client disconnects or the server\nterminates the connection. Clients should\
    \ handle reconnection as needed."
  signature: 'get_session_log_stream(agent_name: str, agent_version: str, session_id:
    str, **kwargs: Any) -> SessionLogEvent'
  parameters:
  - name: agent_name
    description: The name of the hosted agent. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: agent_version
    description: The version of the agent. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: session_id
    description: The session ID (maps to an ADC sandbox). Required.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: SessionLogEvent. The SessionLogEvent is compatible with MutableMapping
    types:
    - <xref:azure.ai.projects.models.SessionLogEvent>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
