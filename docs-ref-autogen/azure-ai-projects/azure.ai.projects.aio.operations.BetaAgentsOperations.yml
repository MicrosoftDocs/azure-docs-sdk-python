- uid: azure.ai.projects.aio.operations.BetaAgentsOperations.create_session
  name: create_session
  summary: 'Creates a new session for an agent endpoint. The endpoint resolves the
    backing agent version

    from `version_indicator` and enforces session ownership using the provided isolation
    key for

    session-mutating operations.'
  signature: 'async create_session(agent_name: str, body: ~collections.abc.MutableMapping[str,
    ~typing.Any] | ~typing.IO[bytes] = <object object>, *, isolation_key: str, version_indicator:
    ~azure.ai.projects.models._models.VersionIndicator = <object object>, agent_session_id:
    str | None = None, **kwargs: ~typing.Any) -> AgentSessionResource'
  parameters:
  - name: agent_name
    description: The name of the agent to create a session for. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: body
    description: Is either a JSON type or a IO[bytes] type. Required.
    types:
    - <xref:JSON>
    - <xref:typing.IO>[<xref:bytes>]
  keywordOnlyParameters:
  - name: isolation_key
    description: 'Isolation key used by the agent endpoint to enforce session ownership

      for session-mutating operations. Required.'
    types:
    - <xref:str>
  - name: version_indicator
    description: Determines which agent version backs the session. Required.
    defaultValue: <object object at 0x0000017A68B438A0>
    types:
    - <xref:azure.ai.projects.models.VersionIndicator>
  - name: agent_session_id
    description: 'Optional caller-provided session ID. If specified, it must be unique

      within the agent endpoint. Auto-generated if omitted. Default value is None.'
    defaultValue: None
    types:
    - <xref:str>
  return:
    description: AgentSessionResource. The AgentSessionResource is compatible with
      MutableMapping
    types:
    - <xref:azure.ai.projects.models.AgentSessionResource>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
