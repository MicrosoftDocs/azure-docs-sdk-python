- uid: azure.ai.projects.aio.operations.BetaAgentsOperations.upload_session_file
  name: upload_session_file
  summary: 'Upload a file to the session sandbox.


    Accepts either a `bytes` buffer or a local file path (`str`).

    When a file path is provided the file is read from disk and its contents

    are forwarded to the service. Maximum file size is 50 MB. Uploads

    exceeding this limit return 413 Payload Too Large.'
  signature: 'async upload_session_file(agent_name: str, session_id: str, content_or_file_path:
    bytes | str, *, path: str, **kwargs: Any) -> SessionFileWriteResponse'
  parameters:
  - name: agent_name
    description: The name of the agent. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: session_id
    description: The session ID. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: content_or_file_path
    description: 'The binary content to upload, **or** the full path to a local

      file whose contents should be uploaded. Required.'
    isRequired: true
    types:
    - <xref:bytes>
    - <xref:str>
  keywordOnlyParameters:
  - name: path
    description: 'The destination file path within the sandbox, relative to the session
      home

      directory. Required.'
    types:
    - <xref:str>
  return:
    description: 'SessionFileWriteResponse. The SessionFileWriteResponse is compatible
      with

      MutableMapping'
    types:
    - <xref:azure.ai.projects.models.SessionFileWriteResponse>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
  - type: FileNotFoundError
    description: If *content_or_file_path* is a `str` and the file does not exist.
