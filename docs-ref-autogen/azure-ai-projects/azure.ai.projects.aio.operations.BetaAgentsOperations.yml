    isRequired: true
    types:
    - <xref:str>
  - name: session_id
    description: The session identifier. Required.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: isolation_key
    description: 'Isolation key used by the agent endpoint to enforce session ownership

      for session-mutating operations. Required.'
    types:
    - <xref:str>
  return:
    description: None
    types:
    - <xref:None>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.ai.projects.aio.operations.BetaAgentsOperations.delete_session_file
  name: delete_session_file
  summary: 'Delete a file or directory from the session sandbox. If `recursive` is
    false (default) and

    the target is a non-empty directory, the API returns 409 Conflict.'
  signature: 'async delete_session_file(agent_name: str, agent_session_id: str, *,
    path: str, recursive: bool | None = None, **kwargs: Any) -> None'
  parameters:
  - name: agent_name
    description: The name of the agent. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: agent_session_id
    description: The session ID. Required.
    isRequired: true
    types:
    - <xref:str>
  keywordOnlyParameters:
  - name: path
    description: 'The file or directory path to delete, relative to the session home
      directory.

      Required.'
    types:
    - <xref:str>
  - name: recursive
    description: 'Whether to recursively delete directory contents. Defaults to false.

      Default value is None.'
    defaultValue: None
    types:
    - <xref:bool>
  return:
    description: None
    types:
    - <xref:None>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
