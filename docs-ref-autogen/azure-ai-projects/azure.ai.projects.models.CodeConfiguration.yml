variables:
- description: 'The runtime identifier for code execution (e.g., ''python_3_11'',
    ''python_3_12'',

    ''python_3_13''). Required.'
  name: runtime
  types:
  - <xref:str>
- description: The entry point command and arguments for the code execution. Required.
  name: entry_point
  types:
  - <xref:list>[<xref:str>]
- description: 'How package dependencies are resolved at deployment time. Defaults

    to `bundled`, where the caller bundles all dependencies into the uploaded zip
    and the service

    performs no remote build. `remote_build` instructs the service to build dependencies
    remotely

    from the manifest included in the uploaded zip. Required. Known values are: "bundled"
    and

    "remote_build".'
  name: dependency_resolution
  types:
  - <xref:str>
  - <xref:azure.ai.projects.models.CodeDependencyResolution>
- description: 'The SHA-256 hex digest of the uploaded code zip. Set by the service
    from

    the `x-ms-code-zip-sha256` request header; read-only in responses and never accepted
    in

    request payloads.'
  name: content_hash
  types:
  - <xref:str>
