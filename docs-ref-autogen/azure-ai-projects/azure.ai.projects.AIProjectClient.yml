- uid: azure.ai.projects.AIProjectClient.get_openai_client
  name: get_openai_client
  summary: 'Get an authenticated OpenAI client from the *openai* package.


    Keyword arguments are passed to the OpenAI client constructor.


    The OpenAI client constructor is called with:

    * `base_url` set to the endpoint provided to the AIProjectClient constructor,
    with "/openai/v1" appended.

    Can be overridden by passing `base_url` as a keyword argument.

    * `api_key` set to a get_bearer_token_provider() callable that uses the TokenCredential
    provided to the

    AIProjectClient constructor, with scope "[https://ai.azure.com/.default](https://ai.azure.com/.default)".

    Can be overridden by passing `api_key` as a keyword argument.


    > [!NOTE]

    > The packages openai and azure.identity must be installed prior to calling this
    method.

    >'
  signature: 'get_openai_client(**kwargs: Any) -> OpenAI'
  return:
    description: An authenticated OpenAI client
    types:
    - <xref:openai.OpenAI>
  exceptions:
  - type: azure.core.exceptions.HttpResponseError
- uid: azure.ai.projects.AIProjectClient.send_request
  name: send_request
  summary: 'Runs the network request through the client''s chained policies.


    ```


    >>> from azure.core.rest import HttpRequest

    >>> request = HttpRequest("GET", "https://www.example.org/")

    <HttpRequest [GET], url: ''https://www.example.org/''>

    >>> response = client.send_request(request)

    <HttpResponse: 200 OK>

    ```


    For more information on this code flow, see [https://aka.ms/azsdk/dpcodegen/python/send_request](https://aka.ms/azsdk/dpcodegen/python/send_request)'
  signature: 'send_request(request: HttpRequest, *, stream: bool = False, **kwargs:
    Any) -> HttpResponse'
  parameters:
  - name: request
    description: The network request you want to make. Required.
    isRequired: true
    types:
    - <xref:azure.core.rest.HttpRequest>
  keywordOnlyParameters:
  - name: stream
    description: Whether the response payload will be streamed. Defaults to False.
    defaultValue: 'False'
    types:
    - <xref:bool>
  return:
    description: The response of your network call. Does not do error handling on
      your response.
    types:
    - <xref:azure.core.rest.HttpResponse>
