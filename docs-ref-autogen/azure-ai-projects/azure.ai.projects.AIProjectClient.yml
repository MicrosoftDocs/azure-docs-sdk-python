### YamlMime:PythonClass
uid: azure.ai.projects.AIProjectClient
name: AIProjectClient
fullName: azure.ai.projects.AIProjectClient
module: azure.ai.projects
summary: AIProjectClient.
constructor:
  syntax: 'AIProjectClient(endpoint: str, credential: TokenCredential, *, allow_preview:
    bool = False, **kwargs: Any)'
  parameters:
  - name: endpoint
    description: 'Foundry Project endpoint in the form

      "[https:/](https:/)/{ai-services-account-name}.services.ai.azure.com/api/projects/{project-name}".
      If you

      only have one Project in your Foundry Hub, or to target the default Project
      in your Hub, use

      the form "[https:/](https:/)/{ai-services-account-name}.services.ai.azure.com/api/projects/_project".

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: credential
    description: Credential used to authenticate requests to the service. Required.
    isRequired: true
    types:
    - <xref:azure.core.credentials.TokenCredential>
  - name: allow_preview
    description: 'Whether to enable preview features. Optional, default is False.

      Set this to True to create a Hosted Agent (using <xref:azure.ai.projects.models.HostedAgentDefinition>)

      or a Workflow Agent (using <xref:azure.ai.projects.models.WorkflowAgentDefinition>).

      Set this to True to use human evaluation rule action (class <xref:azure.ai.projects.models.HumanEvaluationPreviewRuleAction>).

      Methods on the *.beta* sub-client (class <xref:azure.ai.projects.operations.BetaOperations>)

      are all in preview, but do not require setting *allow_preview=True* since it''s
      implied by the sub-client name.

      When preview features are enabled, the client libraries sends the HTTP request
      header *Foundry-Features*

      with the appropriate value in all relevant calls to the service.'
    isRequired: true
    types:
    - <xref:bool>
  keywordOnlyParameters:
  - name: api_version
    description: 'The API version to use for this operation. Known values are "v1"
      and

      None. Default value is "v1". Note that overriding this default value may result
      in unsupported

      behavior.'
    types:
    - <xref:str>
  - name: allow_preview
    defaultValue: 'False'
