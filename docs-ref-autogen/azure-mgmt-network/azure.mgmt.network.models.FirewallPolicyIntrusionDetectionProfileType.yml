name: FirewallPolicyIntrusionDetectionProfileType
fullName: azure.mgmt.network.models.FirewallPolicyIntrusionDetectionProfileType
summary: "Specifies the Intrusion Detection signature profile to apply.\n\nValues:\n\
  \n* Off: IDPS profiles disabled; uses the same signature set that existed before\
  \ profiles. \n\n* Emerging: Signatures of the newest, most recent threats. \n\n\
  * Core: Complete, modern, standard set of signatures. \n\n* Extended: Core signatures\
  \ plus older legacy signatures for maximum coverage."
