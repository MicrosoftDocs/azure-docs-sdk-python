- uid: azure.mgmt.network.aio.operations.ServiceGatewaysOperations.begin_update_address_locations
  name: begin_update_address_locations
  summary: 'Creates or updates address locations within the service gateway.


    The request supports both full and partial update modes at two levels: location
    and address.


    Full update replaces all existing data.


    Partial update modifies only the specified entries:


    For location-level partial updates, if no address is provided, the existing address
    will be

    deleted.


    For address-level partial updates, if no services are provided, the existing services
    will be

    considered for deletion.'
  signature: 'async begin_update_address_locations(resource_group_name: str, service_gateway_name:
