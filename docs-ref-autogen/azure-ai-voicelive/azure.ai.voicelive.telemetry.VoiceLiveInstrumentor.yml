### YamlMime:PythonClass
uid: azure.ai.voicelive.telemetry.VoiceLiveInstrumentor
name: VoiceLiveInstrumentor
fullName: azure.ai.voicelive.telemetry.VoiceLiveInstrumentor
module: azure.ai.voicelive.telemetry
summary: "Manages OpenTelemetry trace instrumentation for VoiceLive.\n\nThis class\
  \ enables or disables tracing for the VoiceLive SDK.\nInstrumentation is opt-in\
  \ and controlled via the\n`AZURE_EXPERIMENTAL_ENABLE_GENAI_TRACING` environment\
  \ variable,\nwhich must be set to `\"true\"` for `.instrument()` to take effect.\n\
  \nExample usage:\n\n<!-- literal_block {\"ids\": [], \"classes\": [], \"names\"\
  : [], \"dupnames\": [], \"backrefs\": [], \"xml:space\": \"preserve\", \"language\"\
  : \"default\", \"force\": false, \"linenos\": false} -->\n\n````default\n\n   from\
  \ azure.ai.voicelive.telemetry import VoiceLiveInstrumentor\n\n   VoiceLiveInstrumentor().instrument()\n\
  \   ````"
constructor:
  syntax: VoiceLiveInstrumentor()
methods:
- uid: azure.ai.voicelive.telemetry.VoiceLiveInstrumentor.instrument
  name: instrument
  summary: 'Enable trace instrumentation for VoiceLive.


    Tracing is gated behind the `AZURE_EXPERIMENTAL_ENABLE_GENAI_TRACING`

    environment variable. If it is not set to `"true"`, this method is a no-op.'
  signature: 'instrument(enable_content_recording: bool | None = None) -> None'
  parameters:
  - name: enable_content_recording
    description: 'Whether to record message content in spans.

      If `None`, the value is read from

      `OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT` (preferred) or

      `AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED` (legacy).

      Defaults to `False` if neither is set.'
    defaultValue: None
    types:
    - <xref:bool>
    - <xref:None>
- uid: azure.ai.voicelive.telemetry.VoiceLiveInstrumentor.is_content_recording_enabled
  name: is_content_recording_enabled
  summary: Check whether message content recording is enabled.
  signature: is_content_recording_enabled() -> bool
  return:
    description: '`True` if content recording is enabled.'
    types:
    - <xref:bool>
- uid: azure.ai.voicelive.telemetry.VoiceLiveInstrumentor.is_instrumented
  name: is_instrumented
  summary: Check whether VoiceLive tracing is currently active.
  signature: is_instrumented() -> bool
  return:
    description: '`True` if instrumentation is active.'
    types:
    - <xref:bool>
- uid: azure.ai.voicelive.telemetry.VoiceLiveInstrumentor.uninstrument
  name: uninstrument
  summary: Remove trace instrumentation for VoiceLive.
  signature: uninstrument() -> None
