uid: azure.ai.voicelive.models.Scene
name: Scene
fullName: azure.ai.voicelive.models.Scene
module: azure.ai.voicelive.models
summary: 'Configuration for avatar''s zoom level, position, rotation and movement
  amplitude in the video

  frame.'
constructor:
  syntax: 'Scene(*args: Any, **kwargs: Any)'
variables:
- description: "Zoom level of the avatar. Range is (0, +\u221E). Values less than\
    \ 1 zoom out, values\ngreater than 1 zoom in."
  name: zoom
  types:
  - <xref:float>
- description: 'Horizontal position of the avatar. Range is [-1, 1], as a proportion
    of frame

    width. Negative values move left, positive values move right.'
  name: position_x
  types:
  - <xref:float>
- description: 'Vertical position of the avatar. Range is [-1, 1], as a proportion
    of frame

    height. Negative values move up, positive values move down.'
  name: position_y
  types:
  - <xref:float>
- description: "Rotation around the X-axis (pitch). Range is [-\u03C0, \u03C0] in\
    \ radians. Negative\nvalues rotate up, positive values rotate down."
  name: rotation_x
  types:
  - <xref:float>
- description: "Rotation around the Y-axis (yaw). Range is [-\u03C0, \u03C0] in radians.\
    \ Negative\nvalues rotate left, positive values rotate right."
  name: rotation_y
  types:
  - <xref:float>
- description: "Rotation around the Z-axis (roll). Range is [-\u03C0, \u03C0] in radians.\
    \ Negative\nvalues rotate anticlockwise, positive values rotate clockwise."
  name: rotation_z
  types:
  - <xref:float>
- description: 'Amplitude of the avatar movement. Range is (0, 1]. Values in (0, 1)
    mean

    reduced amplitude, 1 means full amplitude.'
  name: amplitude
  types:
  - <xref:float>
