- azure.ai.voicelive.aio.OutputAudioBufferResource
- azure.ai.voicelive.aio.ResponseResource
- azure.ai.voicelive.aio.SessionResource
- azure.ai.voicelive.aio.TranscriptionSessionResource
- azure.ai.voicelive.aio.VoiceLiveConnection
- azure.ai.voicelive.aio.WebsocketConnectionOptions
