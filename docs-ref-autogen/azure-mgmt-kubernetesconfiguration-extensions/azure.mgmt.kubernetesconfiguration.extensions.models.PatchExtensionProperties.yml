uid: azure.mgmt.kubernetesconfiguration.extensions.models.PatchExtensionProperties
name: PatchExtensionProperties
fullName: azure.mgmt.kubernetesconfiguration.extensions.models.PatchExtensionProperties
module: azure.mgmt.kubernetesconfiguration.extensions.models
summary: Updatable properties of an Extension Patch Request.
constructor:
  syntax: 'PatchExtensionProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Flag to note if this extension participates in auto upgrade

    of minor version, or not.'
  name: auto_upgrade_minor_version
  types:
  - <xref:bool>
- description: 'The upgrade mode for auto upgrade. The default is "compatible". Known

    values are: "none", "patch", and "compatible".'
  name: auto_upgrade_mode
  types:
  - <xref:str>
  - <xref:azure.mgmt.kubernetesconfiguration.extensions.models.AutoUpgradeMode>
- description: 'ReleaseTrain this extension participates in for auto-upgrade (e.g.
    Stable,

    Preview, etc.) - only if autoUpgradeMinorVersion is ''true''.'
  name: release_train
  types:
  - <xref:str>
- description: 'Version of the extension for this extension, if it is ''pinned'' to
    a specific

    version. autoUpgradeMinorVersion must be ''false''.'
  name: version
  types:
  - <xref:str>
- description: 'Configuration settings, as name-value pairs for configuring this

    extension.'
  name: configuration_settings
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'Configuration settings that are sensitive, as

    name-value pairs for configuring this extension.'
  name: configuration_protected_settings
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
