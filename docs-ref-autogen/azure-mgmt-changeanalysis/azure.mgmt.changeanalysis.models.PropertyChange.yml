### YamlMime:PythonClass
uid: azure.mgmt.changeanalysis.models.PropertyChange
name: PropertyChange
fullName: azure.mgmt.changeanalysis.models.PropertyChange
module: azure.mgmt.changeanalysis.models
summary: Data of a property change.
constructor:
  syntax: 'PropertyChange(*, change_type: str | _models.ChangeType | None = None,
    change_category: str | _models.ChangeCategory | None = None, json_path: str |
    None = None, display_name: str | None = None, level: str | _models.Level | None
    = None, description: str | None = None, old_value: str | None = None, new_value:
    str | None = None, is_data_masked: bool | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: change_type
    description: 'The type of the change. Known values are: "Add", "Remove", and "Update".'
    defaultValue: None
    types:
    - <xref:str>
    - <xref:azure.mgmt.changeanalysis.models.ChangeType>
  - name: change_category
    description: 'The change category. Known values are: "User" and "System".'
    defaultValue: None
    types:
    - <xref:str>
    - <xref:azure.mgmt.changeanalysis.models.ChangeCategory>
  - name: json_path
    description: The json path of the changed property.
    defaultValue: None
    types:
    - <xref:str>
  - name: display_name
    description: 'The enhanced display name of the json path. E.g., the json path

      value[0].properties will be translated to something meaningful like

      slots["Staging"].properties.'
    defaultValue: None
    types:
    - <xref:str>
  - name: level
    description: 'Known values are: "Noisy", "Normal", and "Important".'
    defaultValue: None
    types:
    - <xref:str>
    - <xref:azure.mgmt.changeanalysis.models.Level>
  - name: description
    description: The description of the changed property.
    defaultValue: None
    types:
    - <xref:str>
  - name: old_value
    description: The value of the property before the change.
    defaultValue: None
    types:
    - <xref:str>
  - name: new_value
    description: The value of the property after the change.
    defaultValue: None
    types:
    - <xref:str>
  - name: is_data_masked
    description: 'The boolean indicating whether the oldValue and newValue are masked.

      The values are masked if it contains sensitive information that the user doesn''t
      have access

      to.'
    defaultValue: None
    types:
    - <xref:bool>
