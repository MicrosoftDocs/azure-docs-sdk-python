### YamlMime:PythonClass
uid: azure.mgmt.changeanalysis.models.ChangeProperties
name: ChangeProperties
fullName: azure.mgmt.changeanalysis.models.ChangeProperties
module: azure.mgmt.changeanalysis.models
summary: The properties of a change.
constructor:
  syntax: 'ChangeProperties(*, resource_id: str | None = None, time_stamp: datetime
    | None = None, initiated_by_list: list[str] | None = None, change_type: str |
    _models.ChangeType | None = None, property_changes: list[''_models.PropertyChange'']
    | None = None, **kwargs: Any)'
  keywordOnlyParameters:
  - name: resource_id
    description: The resource id that the change is attached to.
    defaultValue: None
    types:
    - <xref:str>
  - name: time_stamp
    description: The time when the change is detected.
    defaultValue: None
    types:
    - <xref:datetime.datetime>
  - name: initiated_by_list
    description: 'The list of identities who might initiated the change. The identity

      could be user name (email address) or the object ID of the Service Principal.'
    defaultValue: None
    types:
    - <xref:list>[<xref:str>]
  - name: change_type
    description: 'The type of the change. Known values are: "Add", "Remove", and "Update".'
    defaultValue: None
    types:
    - <xref:str>
    - <xref:azure.mgmt.changeanalysis.models.ChangeType>
  - name: property_changes
    description: The list of detailed changes at json property level.
    defaultValue: None
    types:
    - <xref:list>[<xref:azure.mgmt.changeanalysis.models.PropertyChange>]
