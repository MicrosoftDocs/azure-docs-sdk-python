### YamlMime:PythonClass
uid: azure.mgmt.web.models.KubeEnvironmentProperties
name: KubeEnvironmentProperties
fullName: azure.mgmt.web.models.KubeEnvironmentProperties
module: azure.mgmt.web.models
summary: KubeEnvironment resource specific properties.
constructor:
  syntax: 'KubeEnvironmentProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Provisioning state of the Kubernetes Environment. Known values are:

    "Succeeded", "Failed", "Canceled", "Waiting", "InitializationInProgress",

    "InfrastructureSetupInProgress", "InfrastructureSetupComplete", "ScheduledForDelete",

    "UpgradeRequested", and "UpgradeFailed".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.KubeEnvironmentProvisioningState>
- description: Any errors that occurred during deployment or deployment validation.
  name: deployment_errors
  types:
  - <xref:str>
- description: Only visible within Vnet/Subnet.
  name: internal_load_balancer_enabled
  types:
  - <xref:bool>
- description: Default Domain Name for the cluster.
  name: default_domain
  types:
  - <xref:str>
- description: Static IP of the KubeEnvironment.
  name: static_ip
  types:
  - <xref:str>
- description: 'Type of Kubernetes Environment. Only supported for Container App

    Environments with value as Managed.'
  name: environment_type
  types:
  - <xref:str>
- description: 'Cluster configuration which determines the ARC cluster components

    types. Eg: Choosing between BuildService kind, FrontEnd Service ArtifactsStorageType
    etc.'
  name: arc_configuration
  types:
  - <xref:azure.mgmt.web.models.ArcConfiguration>
- description: 'Cluster configuration which enables the log daemon to export app

    logs to a destination. Currently only "log-analytics" is supported.'
  name: app_logs_configuration
  types:
  - <xref:azure.mgmt.web.models.AppLogsConfiguration>
- description: 'Cluster configuration for Container Apps Environments to

    configure Dapr Instrumentation Key and VNET Configuration.'
  name: container_apps_configuration
  types:
  - <xref:azure.mgmt.web.models.ContainerAppsConfiguration>
- name: aks_resource_id
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.aks_resource_id
  name: aks_resource_id
  signature: 'aks_resource_id: str | None'
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.app_logs_configuration
  name: app_logs_configuration
  summary: 'Cluster configuration which enables the log daemon to export app logs
    to a destination.

    Currently only "log-analytics" is supported.'
  signature: 'app_logs_configuration: _models.AppLogsConfiguration | None'
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.arc_configuration
  name: arc_configuration
  summary: 'Choosing between

    BuildService kind, FrontEnd Service ArtifactsStorageType etc.'
  signature: 'arc_configuration: _models.ArcConfiguration | None'
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.container_apps_configuration
  name: container_apps_configuration
  summary: 'Cluster configuration for Container Apps Environments to configure Dapr
    Instrumentation Key and

    VNET Configuration.'
  signature: 'container_apps_configuration: _models.ContainerAppsConfiguration | None'
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.default_domain
  name: default_domain
  summary: Default Domain Name for the cluster.
  signature: 'default_domain: str | None'
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.deployment_errors
  name: deployment_errors
  summary: Any errors that occurred during deployment or deployment validation.
  signature: 'deployment_errors: str | None'
