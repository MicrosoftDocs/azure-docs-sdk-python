    "UpgradeFailed".'
  signature: 'provisioning_state: str | _models.KubeEnvironmentProvisioningState |
    None'
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.static_ip
  name: static_ip
  summary: Static IP of the KubeEnvironment.
  signature: 'static_ip: str | None'
