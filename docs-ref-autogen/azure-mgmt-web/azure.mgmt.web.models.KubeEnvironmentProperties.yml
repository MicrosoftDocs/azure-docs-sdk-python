  name: environment_type
  summary: 'Type of Kubernetes Environment. Only supported for Container App Environments
    with value as

    Managed.'
  signature: 'environment_type: str | None'
- uid: azure.mgmt.web.models.KubeEnvironmentProperties.internal_load_balancer_enabled
  name: internal_load_balancer_enabled
  summary: Only visible within Vnet/Subnet.
