uid: azure.mgmt.web.models.RestoreRequestProperties
name: RestoreRequestProperties
fullName: azure.mgmt.web.models.RestoreRequestProperties
module: azure.mgmt.web.models
summary: RestoreRequest resource specific properties.
constructor:
  syntax: 'RestoreRequestProperties(*args: Any, **kwargs: Any)'
variables:
- description: SAS URL to the container. Required.
  name: storage_account_url
  types:
  - <xref:str>
- description: Name of a blob which contains the backup.
  name: blob_name
  types:
  - <xref:str>
- description: '<code>true</code> if the restore operation can overwrite target app;

    otherwise, <code>false</code>. <code>true</code> is needed if trying to restore
    over an

    existing app. Required.'
  name: overwrite
  types:
  - <xref:bool>
- description: Name of an app.
  name: site_name
  types:
  - <xref:str>
- description: 'Collection of databases which should be restored. This list has to
    match the

    list of databases included in the backup.'
  name: databases
  types:
  - <xref:list>[<xref:azure.mgmt.web.models.DatabaseBackupSetting>]
- description: 'Changes a logic when restoring an app with custom domains.

    <code>true</code> to remove custom domains automatically. If <code>false</code>,
    custom domains

    are added to nthe app''s object when it is being restored, but that might fail
    due to

    conflicts during the operation.'
  name: ignore_conflicting_host_names
  types:
  - <xref:bool>
- description: Ignore the databases and only restore the site content.
  name: ignore_databases
  types:
  - <xref:bool>
- description: Specify app service plan that will own restored site.
  name: app_service_plan
  types:
  - <xref:str>
- description: 'Operation type. Known values are: "Default", "Clone", "Relocation",

    "Snapshot", and "CloudFS".'
  name: operation_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.BackupRestoreOperationType>
- description: '<code>true</code> if SiteConfig.ConnectionStrings should be

    set in new app; otherwise, <code>false</code>.'
  name: adjust_connection_strings
  types:
  - <xref:bool>
- description: 'App Service Environment name, if needed (only when restoring an app

    to an App Service Environment).'
  name: hosting_environment
  types:
  - <xref:str>
