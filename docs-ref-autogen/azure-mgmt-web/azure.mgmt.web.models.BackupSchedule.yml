### YamlMime:PythonClass
uid: azure.mgmt.web.models.BackupSchedule
name: BackupSchedule
fullName: azure.mgmt.web.models.BackupSchedule
module: azure.mgmt.web.models
summary: 'Description of a backup schedule. Describes how often should be the backup
  performed and what

  should be the retention policy.'
constructor:
  syntax: 'BackupSchedule(*args: Any, **kwargs: Any)'
variables:
- description: 'How often the backup should be executed (e.g. for weekly backup, this

    should be set to 7 and FrequencyUnit should be set to Day). Required.'
  name: frequency_interval
  types:
  - <xref:int>
- description: 'The unit of time for how often the backup should be executed (e.g.
    for

    weekly backup, this should be set to Day and FrequencyInterval should be set to
    7). Required.

    Known values are: "Day" and "Hour".'
  name: frequency_unit
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.FrequencyUnit>
- description: 'True if the retention policy should always keep at least one

    backup in the storage account, regardless how old it is; false otherwise. Required.'
  name: keep_at_least_one_backup
  types:
  - <xref:bool>
- description: After how many days backups should be deleted. Required.
  name: retention_period_in_days
  types:
  - <xref:int>
- description: When the schedule should start working.
  name: start_time
  types:
  - <xref:datetime.datetime>
- description: Last time when this schedule was triggered.
  name: last_execution_time
  types:
  - <xref:datetime.datetime>
attributes:
- uid: azure.mgmt.web.models.BackupSchedule.frequency_interval
  name: frequency_interval
  summary: 'How often the backup should be executed (e.g. for weekly backup, this
    should be set to 7 and

    FrequencyUnit should be set to Day). Required.'
  signature: 'frequency_interval: int'
- uid: azure.mgmt.web.models.BackupSchedule.frequency_unit
  name: frequency_unit
  summary: 'The unit of time for how often the backup should be executed (e.g. for
    weekly backup, this

    should be set to Day and FrequencyInterval should be set to 7). Required. Known
    values are:

    "Day" and "Hour".'
  signature: 'frequency_unit: str | _models.FrequencyUnit'
- uid: azure.mgmt.web.models.BackupSchedule.keep_at_least_one_backup
  name: keep_at_least_one_backup
  summary: 'True if the retention policy should always keep at least one backup in
    the storage account,

    regardless how old it is; false otherwise. Required.'
  signature: 'keep_at_least_one_backup: bool'
- uid: azure.mgmt.web.models.BackupSchedule.last_execution_time
  name: last_execution_time
  summary: Last time when this schedule was triggered.
  signature: 'last_execution_time: datetime | None'
- uid: azure.mgmt.web.models.BackupSchedule.retention_period_in_days
  name: retention_period_in_days
  summary: After how many days backups should be deleted. Required.
  signature: 'retention_period_in_days: int'
- uid: azure.mgmt.web.models.BackupSchedule.start_time
  name: start_time
  summary: When the schedule should start working.
  signature: 'start_time: datetime | None'
