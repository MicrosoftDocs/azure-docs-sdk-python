### YamlMime:PythonClass
uid: azure.mgmt.web.models.SiteDnsConfig
name: SiteDnsConfig
fullName: azure.mgmt.web.models.SiteDnsConfig
module: azure.mgmt.web.models
summary: SiteDnsConfig.
constructor:
  syntax: 'SiteDnsConfig(*args: Any, **kwargs: Any)'
variables:
- description: 'List of custom DNS servers to be used by an app for lookups. Maximum
    5 dns

    servers can be set.'
  name: dns_servers
  types:
  - <xref:list>[<xref:str>]
- description: 'Alternate DNS server to be used by apps. This property replicates
    the

    WEBSITE_DNS_ALT_SERVER app setting.'
  name: dns_alt_server
  types:
  - <xref:str>
- description: 'Timeout for a single dns lookup in seconds. Allowed range:

    1-30. Default is 3.'
  name: dns_retry_attempt_timeout
  types:
  - <xref:int>
- description: 'Total number of retries for dns lookup. Allowed range: 1-5.

    Default is 3.'
  name: dns_retry_attempt_count
  types:
  - <xref:int>
- description: 'Custom time for DNS to be cached in seconds. Allowed range: 0-60.

    Default is 30 seconds. 0 means caching disabled.'
  name: dns_max_cache_timeout
  types:
  - <xref:int>
- description: 'Indicates that sites using Virtual network custom DNS servers are

    still sorting the list of DNS servers. Read-Only.'
  name: dns_legacy_sort_order
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.web.models.SiteDnsConfig.dns_alt_server
  name: dns_alt_server
  summary: 'Alternate DNS server to be used by apps. This property replicates the
    WEBSITE_DNS_ALT_SERVER

    app setting.'
  signature: 'dns_alt_server: str | None'
- uid: azure.mgmt.web.models.SiteDnsConfig.dns_legacy_sort_order
  name: dns_legacy_sort_order
  summary: 'Indicates that sites using Virtual network custom DNS servers are still
    sorting the list of DNS

    servers. Read-Only.'
  signature: 'dns_legacy_sort_order: bool | None'
- uid: azure.mgmt.web.models.SiteDnsConfig.dns_max_cache_timeout
  name: dns_max_cache_timeout
  summary: '0-60. Default is 30 seconds. 0

    means caching disabled.'
  signature: 'dns_max_cache_timeout: int | None'
- uid: azure.mgmt.web.models.SiteDnsConfig.dns_retry_attempt_count
  name: dns_retry_attempt_count
  summary: 1-5. Default is 3.
  signature: 'dns_retry_attempt_count: int | None'
- uid: azure.mgmt.web.models.SiteDnsConfig.dns_retry_attempt_timeout
  name: dns_retry_attempt_timeout
  summary: 1-30. Default is 3.
  signature: 'dns_retry_attempt_timeout: int | None'
- uid: azure.mgmt.web.models.SiteDnsConfig.dns_servers
  name: dns_servers
  summary: List of custom DNS servers to be used by an app for lookups. Maximum 5
    dns servers can be set.
  signature: 'dns_servers: list[str] | None'
