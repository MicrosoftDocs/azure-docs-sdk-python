### YamlMime:PythonClass
uid: azure.mgmt.web.models.SiteAuthSettingsProperties
name: SiteAuthSettingsProperties
fullName: azure.mgmt.web.models.SiteAuthSettingsProperties
module: azure.mgmt.web.models
summary: SiteAuthSettings resource specific properties.
constructor:
  syntax: 'SiteAuthSettingsProperties(*args: Any, **kwargs: Any)'
variables:
- description: '<code>true</code> if the Authentication / Authorization feature is
    enabled for

    the current app; otherwise, <code>false</code>.'
  name: enabled
  types:
  - <xref:bool>
- description: 'The RuntimeVersion of the Authentication / Authorization feature in
    use

    for the current app. The setting in this value can control the behavior of certain
    features in

    the Authentication / Authorization module.'
  name: runtime_version
  types:
  - <xref:str>
- description: 'The action to take when an unauthenticated client attempts

    to access the app. Known values are: "RedirectToLoginPage" and "AllowAnonymous".'
  name: unauthenticated_client_action
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.UnauthenticatedClientAction>
- description: '<code>true</code> to durably store platform-specific security tokens

    that are obtained during login flows; otherwise, <code>false</code>. The default
    is

    <code>false</code>.'
  name: token_store_enabled
  types:
  - <xref:bool>
- description: 'External URLs that can be redirected to as part of

    logging in or logging out of the app. Note that the query string part of the URL
    is ignored.

    This is an advanced setting typically only needed by Windows Store application
    backends. Note

    that URLs within the current domain are always implicitly allowed.'
  name: allowed_external_redirect_urls
  types:
  - <xref:list>[<xref:str>]
- description: 'The default authentication provider to use when multiple providers
    are

    configured. This setting is only needed if multiple providers are configured and
    the

    unauthenticated client action is set to "RedirectToLoginPage". Known values are:

    "AzureActiveDirectory", "Facebook", "Google", "MicrosoftAccount", "Twitter", and
    "Github".'
  name: default_provider
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.BuiltInAuthenticationProvider>
- description: 'The number of hours after session token expiration that a

    session token can be used to call the token refresh API. The default is 72 hours.'
  name: token_refresh_extension_hours
  types:
  - <xref:float>
- description: 'The Client ID of this relying party application, known as the client_id.
    This

    setting is required for enabling OpenID Connection authentication with Azure Active
    Directory

    or other 3rd party OpenID Connect providers. More information on OpenID Connect:

    [http://openid.net/specs/openid-connect-core-1_0.html](http://openid.net/specs/openid-connect-core-1_0.html).'
  name: client_id
  types:
  - <xref:str>
- description: 'The Client Secret of this relying party application (in Azure Active

    Directory, this is also referred to as the Key). This setting is optional. If
    no client secret

    is configured, the OpenID Connect implicit auth flow is used to authenticate end
    users.

    Otherwise, the OpenID Connect Authorization Code Flow is used to authenticate
    end users. More

    information on OpenID Connect: [http://openid.net/specs/openid-connect-core-1_0.html](http://openid.net/specs/openid-connect-core-1_0.html).'
  name: client_secret
  types:
  - <xref:str>
- description: 'The app setting name that contains the client secret of the

    relying party application.'
  name: client_secret_setting_name
  types:
  - <xref:str>
- description: 'An alternative to the client secret, that is the

    thumbprint of a certificate used for signing purposes. This property acts as a
    replacement for

    the Client Secret. It is also optional.'
  name: client_secret_certificate_thumbprint
  types:
  - <xref:str>
- description: 'The OpenID Connect Issuer URI that represents the entity which issues
    access

    tokens for this application. When using Azure Active Directory, this value is
    the URI of the

    directory tenant, e.g. `https://sts.windows.net/{tenant-guid}/`. This URI is a
    case-sensitive

    identifier for the token issuer. More information on OpenID Connect Discovery:

    [http://openid.net/specs/openid-connect-discovery-1_0.html](http://openid.net/specs/openid-connect-discovery-1_0.html).'
  name: issuer
  types:
  - <xref:str>
- description: 'Gets a value indicating whether the issuer should be a valid HTTPS
    url

    and be validated as such.'
  name: validate_issuer
  types:
  - <xref:bool>
- description: 'Allowed audience values to consider when validating JSON Web Tokens

    issued by Azure Active Directory. Note that the <code>ClientID</code> value is
    always

    considered an allowed audience, regardless of this setting.'
  name: allowed_audiences
  types:
  - <xref:list>[<xref:str>]
- description: 'Login parameters to send to the OpenID Connect authorization

    endpoint when a user logs in. Each parameter must be in the form "key=value".'
  name: additional_login_params
  types:
  - <xref:list>[<xref:str>]
- description: Gets a JSON string containing the Azure AD Acl settings.
  name: aad_claims_authorization
  types:
  - <xref:str>
- description: 'The OpenID Connect Client ID for the Google web application. This

    setting is required for enabling Google Sign-In. Google Sign-In documentation:

    [https://developers.google.com/identity/sign-in/web/](https://developers.google.com/identity/sign-in/web/).'
  name: google_client_id
  types:
  - <xref:str>
- description: 'The client secret associated with the Google web application. This

    setting is required for enabling Google Sign-In. Google Sign-In documentation:

    [https://developers.google.com/identity/sign-in/web/](https://developers.google.com/identity/sign-in/web/).'
  name: google_client_secret
  types:
  - <xref:str>
- description: 'The app setting name that contains the client secret

    associated with the Google web application.'
  name: google_client_secret_setting_name
  types:
  - <xref:str>
- description: 'The OAuth 2.0 scopes that will be requested as part of Google

    Sign-In authentication. This setting is optional. If not specified, "openid",
    "profile", and

    "email" are used as default scopes. Google Sign-In documentation:

    [https://developers.google.com/identity/sign-in/web/](https://developers.google.com/identity/sign-in/web/).'
  name: google_o_auth_scopes
  types:
  - <xref:list>[<xref:str>]
- description: 'The App ID of the Facebook app used for login. This setting is required

    for enabling Facebook Login. Facebook Login documentation:

    [https://developers.facebook.com/docs/facebook-login](https://developers.facebook.com/docs/facebook-login).'
  name: facebook_app_id
  types:
  - <xref:str>
- description: 'The App Secret of the Facebook app used for Facebook Login. This

    setting is required for enabling Facebook Login. Facebook Login documentation:

    [https://developers.facebook.com/docs/facebook-login](https://developers.facebook.com/docs/facebook-login).'
  name: facebook_app_secret
  types:
  - <xref:str>
- description: 'The app setting name that contains the app secret used

    for Facebook Login.'
  name: facebook_app_secret_setting_name
  types:
  - <xref:str>
- description: 'The OAuth 2.0 scopes that will be requested as part of Facebook

    Login authentication. This setting is optional. Facebook Login documentation:

    [https://developers.facebook.com/docs/facebook-login](https://developers.facebook.com/docs/facebook-login).'
  name: facebook_o_auth_scopes
  types:
  - <xref:list>[<xref:str>]
- description: 'The Client Id of the GitHub app used for login. This setting is

    required for enabling Github login.'
  name: git_hub_client_id
  types:
  - <xref:str>
- description: 'The Client Secret of the GitHub app used for Github Login. This

    setting is required for enabling Github login.'
  name: git_hub_client_secret
  types:
  - <xref:str>
- description: 'The app setting name that contains the client secret

    of the Github app used for GitHub Login.'
  name: git_hub_client_secret_setting_name
  types:
  - <xref:str>
- description: 'The OAuth 2.0 scopes that will be requested as part of GitHub

    Login authentication. This setting is optional.'
  name: git_hub_o_auth_scopes
  types:
  - <xref:list>[<xref:str>]
- description: 'The OAuth 1.0a consumer key of the Twitter application used for

    sign-in. This setting is required for enabling Twitter Sign-In. Twitter Sign-In
    documentation:

    [https://dev.twitter.com/web/sign-in](https://dev.twitter.com/web/sign-in).'
  name: twitter_consumer_key
  types:
  - <xref:str>
- description: 'The OAuth 1.0a consumer secret of the Twitter application used

    for sign-in. This setting is required for enabling Twitter Sign-In. Twitter Sign-In

    documentation: [https://dev.twitter.com/web/sign-in](https://dev.twitter.com/web/sign-in).'
  name: twitter_consumer_secret
  types:
  - <xref:str>
- description: 'The app setting name that contains the OAuth 1.0a

    consumer secret of the Twitter application used for sign-in.'
  name: twitter_consumer_secret_setting_name
  types:
  - <xref:str>
- description: 'The OAuth 2.0 client ID that was created for the app used

    for authentication. This setting is required for enabling Microsoft Account authentication.

    Microsoft Account OAuth documentation: [https://dev.onedrive.com/auth/msa_oauth.htm](https://dev.onedrive.com/auth/msa_oauth.htm).'
  name: microsoft_account_client_id
  types:
  - <xref:str>
- description: 'The OAuth 2.0 client secret that was created for the app

    used for authentication. This setting is required for enabling Microsoft Account

    authentication. Microsoft Account OAuth documentation:

    [https://dev.onedrive.com/auth/msa_oauth.htm](https://dev.onedrive.com/auth/msa_oauth.htm).'
  name: microsoft_account_client_secret
  types:
  - <xref:str>
- description: 'The app setting name containing the OAuth

    2.0 client secret that was created for the app used for authentication.'
  name: microsoft_account_client_secret_setting_name
  types:
  - <xref:str>
- description: 'The OAuth 2.0 scopes that will be requested as part of

    Microsoft Account authentication. This setting is optional. If not specified,
    "wl.basic" is

    used as the default scope. Microsoft Account Scopes and permissions documentation:

    [https://msdn.microsoft.com/en-us/library/dn631845.aspx](https://msdn.microsoft.com/en-us/library/dn631845.aspx).'
  name: microsoft_account_o_auth_scopes
  types:
  - <xref:list>[<xref:str>]
- description: '"true" if the auth config settings should be read from a file, "false"

    otherwise.'
  name: is_auth_from_file
  types:
  - <xref:str>
- description: 'The path of the config file containing auth settings. If the path
    is

    relative, base will the site''s root directory.'
  name: auth_file_path
  types:
  - <xref:str>
- description: 'The ConfigVersion of the Authentication / Authorization feature in
    use

    for the current app. The setting in this value can control the behavior of the
    control plane

    for Authentication / Authorization.'
  name: config_version
  types:
  - <xref:str>
