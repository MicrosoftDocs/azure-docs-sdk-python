variables:
- description: 'Point in time in which the app restore should be done, formatted as
    a

    DateTime string.'
  name: snapshot_time
  types:
  - <xref:str>
- description: 'Optional. Specifies the web app that snapshot contents will be retrieved

    from. If empty, the targeted web app will be used as the source.'
  name: recovery_source
  types:
  - <xref:azure.mgmt.web.models.SnapshotRecoverySource>
