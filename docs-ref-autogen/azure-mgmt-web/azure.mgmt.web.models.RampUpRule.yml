### YamlMime:PythonClass
uid: azure.mgmt.web.models.RampUpRule
name: RampUpRule
fullName: azure.mgmt.web.models.RampUpRule
module: azure.mgmt.web.models
summary: 'Routing rules for ramp up testing. This rule allows to redirect static traffic
  % to a slot or

  to gradually change routing % based on performance.'
constructor:
  syntax: 'RampUpRule(*args: Any, **kwargs: Any)'
variables:
- description: 'Hostname of a slot to which the traffic will be redirected if decided

    to. E.g. myapp-stage.azurewebsites.net.'
  name: action_host_name
  types:
  - <xref:str>
- description: 'Percentage of the traffic which will be redirected to

    <code>ActionHostName</code>.'
  name: reroute_percentage
  types:
  - <xref:float>
- description: 'In auto ramp up scenario this is the step to add/remove from

    <code>ReroutePercentage</code> until it reaches n<code>MinReroutePercentage</code>
    or

    <code>MaxReroutePercentage</code>. Site metrics are checked every N minutes specified
    in

    <code>ChangeIntervalInMinutes</code>.nCustom decision algorithm can be provided
    in

    TiPCallback site extension which URL can be specified in

    <code>ChangeDecisionCallbackUrl</code>.'
  name: change_step
  types:
  - <xref:float>
- description: 'Specifies interval in minutes to reevaluate

    ReroutePercentage.'
  name: change_interval_in_minutes
  types:
  - <xref:int>
- description: Specifies lower boundary above which ReroutePercentage will stay.
  name: min_reroute_percentage
  types:
  - <xref:float>
- description: Specifies upper boundary below which ReroutePercentage will stay.
  name: max_reroute_percentage
  types:
  - <xref:float>
- description: 'Custom decision algorithm can be provided in TiPCallback

    site extension which URL can be specified.'
  name: change_decision_callback_url
  types:
  - <xref:str>
- description: 'Name of the routing rule. The recommended name would be to point to
    the slot which

    will receive the traffic in the experiment.'
  name: name
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.web.models.RampUpRule.action_host_name
  name: action_host_name
  summary: 'Hostname of a slot to which the traffic will be redirected if decided
    to. E.g.

    myapp-stage.azurewebsites.net.'
  signature: 'action_host_name: str | None'
- uid: azure.mgmt.web.models.RampUpRule.change_decision_callback_url
  name: change_decision_callback_url
  summary: 'Custom decision algorithm can be provided in TiPCallback site extension
    which URL can be

    specified.'
  signature: 'change_decision_callback_url: str | None'
- uid: azure.mgmt.web.models.RampUpRule.change_interval_in_minutes
  name: change_interval_in_minutes
  summary: Specifies interval in minutes to reevaluate ReroutePercentage.
  signature: 'change_interval_in_minutes: int | None'
- uid: azure.mgmt.web.models.RampUpRule.change_step
  name: change_step
  summary: "In auto ramp up scenario this is the step to add/remove from <code>ReroutePercentage</code>\n\
    \   until it reaches\n\n<code>MinReroutePercentage</code> or <code>MaxReroutePercentage</code>.\
    \ Site\n   metrics are checked every N minutes specified in <code>ChangeIntervalInMinutes</code>.\n\
    \nCustom\n   decision algorithm can be provided in TiPCallback site extension\
    \ which URL can be specified in\n   <code>ChangeDecisionCallbackUrl</code>."
  signature: 'change_step: float | None'
- uid: azure.mgmt.web.models.RampUpRule.max_reroute_percentage
  name: max_reroute_percentage
  summary: Specifies upper boundary below which ReroutePercentage will stay.
  signature: 'max_reroute_percentage: float | None'
- uid: azure.mgmt.web.models.RampUpRule.min_reroute_percentage
  name: min_reroute_percentage
  summary: Specifies lower boundary above which ReroutePercentage will stay.
  signature: 'min_reroute_percentage: float | None'
- uid: azure.mgmt.web.models.RampUpRule.name
  name: name
  summary: 'Name of the routing rule. The recommended name would be to point to the
    slot which will receive

    the traffic in the experiment.'
  signature: 'name: str | None'
- uid: azure.mgmt.web.models.RampUpRule.reroute_percentage
  name: reroute_percentage
  summary: Percentage of the traffic which will be redirected to <code>ActionHostName</code>.
  signature: 'reroute_percentage: float | None'
