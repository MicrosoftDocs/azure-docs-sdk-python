### YamlMime:PythonClass
uid: azure.mgmt.web.models.CorsSettings
name: CorsSettings
fullName: azure.mgmt.web.models.CorsSettings
module: azure.mgmt.web.models
summary: Cross-Origin Resource Sharing (CORS) settings for the app.
constructor:
  syntax: 'CorsSettings(*args: Any, **kwargs: Any)'
variables:
- description: 'Gets or sets the list of origins that should be allowed to make

    cross-origin calls (for example: [http://example.com:12345](http://example.com:12345)).
    Use

    "*" to allow all.'
  name: allowed_origins
  types:
  - <xref:list>[<xref:str>]
- description: 'Gets or sets whether CORS requests with credentials are allowed. See

    [https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS#Requests_with_credentials](https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS#Requests_with_credentials)
    for more

    details.'
  name: support_credentials
  types:
  - <xref:bool>
attributes:
- uid: azure.mgmt.web.models.CorsSettings.allowed_origins
  name: allowed_origins
  summary: 'Gets or sets the list of origins that should be allowed to make cross-origin
    calls (for

    example: [http://example.com:12345](http://example.com:12345)). Use "*" to allow
    all.'
  signature: 'allowed_origins: list[str] | None'
- uid: azure.mgmt.web.models.CorsSettings.support_credentials
  name: support_credentials
  summary: 'Gets or sets whether CORS requests with credentials are allowed. See

    [https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS#Requests_with_credentials](https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS#Requests_with_credentials)
    for more

    details.'
