### YamlMime:PythonClass
uid: azure.mgmt.web.models.DnlResourceNameAvailability
name: DnlResourceNameAvailability
fullName: azure.mgmt.web.models.DnlResourceNameAvailability
module: azure.mgmt.web.models
summary: 'Information regarding availability of a resource name for DNL apps with
  regionalized default

  hostnames.'
constructor:
  syntax: 'DnlResourceNameAvailability(*args: Any, **kwargs: Any)'
variables:
- name: host_name
  types:
  - <xref:str>
- description: '<code>true</code> indicates name is valid and available.

    <code>false</code> indicates the name is invalid, unavailable, or both.'
  name: name_available
  types:
  - <xref:bool>
- description: '<code>Invalid</code> indicates the name provided does not match Azure
    App Service

    naming requirements. <code>AlreadyExists</code> indicates that the name is already
    in use and

    is therefore unavailable. Known values are: "Invalid" and "AlreadyExists".'
  name: reason
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.InAvailabilityReasonType>
- description: 'If reason == invalid, provide the user with the reason why the given
    name is

    invalid, and provide the resource naming requirements so that the user can select
    a valid name.

    If reason == AlreadyExists, explain that resource name is already in use, and
    direct them to

    select a different name.'
  name: message
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.web.models.DnlResourceNameAvailability.host_name
  name: host_name
  signature: 'host_name: str | None'
- uid: azure.mgmt.web.models.DnlResourceNameAvailability.message
  name: message
  summary: 'If reason == invalid, provide the user with the reason why the given name
    is invalid, and

    provide the resource naming requirements so that the user can select a valid name.
    If reason ==

    AlreadyExists, explain that resource name is already in use, and direct them to
    select a

    different name.'
  signature: 'message: str | None'
- uid: azure.mgmt.web.models.DnlResourceNameAvailability.name_available
  name: name_available
  summary: '<code>true</code> indicates name is valid and available. <code>false</code>
    indicates the name

    is invalid, unavailable, or both.'
  signature: 'name_available: bool | None'
- uid: azure.mgmt.web.models.DnlResourceNameAvailability.reason
  name: reason
  summary: '<code>Invalid</code> indicates the name provided does not match Azure
    App Service naming

    requirements. <code>AlreadyExists</code> indicates that the name is already in
    use and is

    therefore unavailable. Known values are: "Invalid" and "AlreadyExists".'
  signature: 'reason: str | _models.InAvailabilityReasonType | None'
