uid: azure.mgmt.web.models.VnetRouteProperties
name: VnetRouteProperties
fullName: azure.mgmt.web.models.VnetRouteProperties
module: azure.mgmt.web.models
summary: VnetRoute resource specific properties.
constructor:
  syntax: 'VnetRouteProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'The starting address for this route. This may also include a CIDR

    notation, in which case the end address must not be specified.'
  name: start_address
  types:
  - <xref:str>
- description: 'The ending address for this route. If the start address is specified
    in CIDR

    notation, this must be omitted.'
  name: end_address
  types:
  - <xref:str>
- description: 'The type of route this is:

    DEFAULT - By default, every app has routes to the local address ranges specified
    by RFC1918

    INHERITED - Routes inherited from the real Virtual Network routes

    STATIC - Static route set on the app only


    These values will be used for syncing an app''s routes with those from a Virtual
    Network. Known

    values are: "DEFAULT", "INHERITED", and "STATIC".'
  name: route_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.RouteType>
attributes:
- uid: azure.mgmt.web.models.VnetRouteProperties.end_address
  name: end_address
  summary: 'The ending address for this route. If the start address is specified in
    CIDR notation, this

    must be omitted.'
  signature: 'end_address: str | None'
- uid: azure.mgmt.web.models.VnetRouteProperties.route_type
  name: route_type
  summary: 'The type of route this is:

    DEFAULT - By default, every app has routes to the local address ranges specified
    by RFC1918

    INHERITED - Routes inherited from the real Virtual Network routes

    STATIC - Static route set on the app only


    These values will be used for syncing an app''s routes with those from a Virtual
    Network. Known

    values are: "DEFAULT", "INHERITED", and "STATIC".'
  signature: 'route_type: str | _models.RouteType | None'
- uid: azure.mgmt.web.models.VnetRouteProperties.start_address
  name: start_address
