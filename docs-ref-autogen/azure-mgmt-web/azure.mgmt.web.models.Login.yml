uid: azure.mgmt.web.models.Login
name: Login
fullName: azure.mgmt.web.models.Login
module: azure.mgmt.web.models
summary: 'The configuration settings of the login flow of users using App Service

  Authentication/Authorization.'
constructor:
  syntax: 'Login(*args: Any, **kwargs: Any)'
variables:
- description: The routes that specify the endpoints used for login and logout requests.
  name: routes
  types:
  - <xref:azure.mgmt.web.models.LoginRoutes>
- description: The configuration settings of the token store.
  name: token_store
  types:
  - <xref:azure.mgmt.web.models.TokenStore>
- description: '<code>true</code> if the fragments from the request

    are preserved after the login request is made; otherwise, <code>false</code>.'
  name: preserve_url_fragments_for_logins
  types:
  - <xref:bool>
- description: 'External URLs that can be redirected to as part of

    logging in or logging out of the app. Note that the query string part of the URL
    is ignored.

    This is an advanced setting typically only needed by Windows Store application
    backends. Note

    that URLs within the current domain are always implicitly allowed.'
  name: allowed_external_redirect_urls
  types:
  - <xref:list>[<xref:str>]
- description: The configuration settings of the session cookie's expiration.
  name: cookie_expiration
  types:
  - <xref:azure.mgmt.web.models.CookieExpiration>
- description: The configuration settings of the nonce used in the login flow.
  name: nonce
  types:
  - <xref:azure.mgmt.web.models.Nonce>
