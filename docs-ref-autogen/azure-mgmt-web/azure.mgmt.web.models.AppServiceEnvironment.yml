  name: custom_dns_suffix_configuration
  summary: Full view of the custom domain suffix configuration for ASEv3.
  signature: 'custom_dns_suffix_configuration: _models.CustomDnsSuffixConfiguration
    | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.dedicated_host_count
  name: dedicated_host_count
  summary: Dedicated Host Count.
  signature: 'dedicated_host_count: int | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.dns_suffix
  name: dns_suffix
  summary: DNS suffix of the App Service Environment.
  signature: 'dns_suffix: str | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.front_end_scale_factor
  name: front_end_scale_factor
  summary: Scale factor for front-ends.
  signature: 'front_end_scale_factor: int | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.has_linux_workers
  name: has_linux_workers
  summary: Flag that displays whether an ASE has linux workers or not.
  signature: 'has_linux_workers: bool | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.internal_load_balancing_mode
  name: internal_load_balancing_mode
  summary: 'Specifies which endpoints to serve internally in the Virtual Network for
    the App Service

    Environment. Known values are: "None", "Web", "Publishing", and "Web, Publishing".'
  signature: 'internal_load_balancing_mode: str | _models.LoadBalancingMode | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.ipssl_address_count
  name: ipssl_address_count
  summary: Number of IP SSL addresses reserved for the App Service Environment.
  signature: 'ipssl_address_count: int | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.maximum_number_of_machines
  name: maximum_number_of_machines
  summary: Maximum number of VMs in the App Service Environment.
  signature: 'maximum_number_of_machines: int | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.multi_role_count
  name: multi_role_count
  summary: Number of front-end instances.
  signature: 'multi_role_count: int | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.multi_size
  name: multi_size
  summary: Front-end VM size, e.g. "Medium", "Large".
  signature: 'multi_size: str | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.networking_configuration
  name: networking_configuration
  summary: Full view of networking configuration for an ASE.
  signature: 'networking_configuration: _models.AseV3NetworkingConfiguration | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.provisioning_state
  name: provisioning_state
  summary: '"Succeeded", "Failed",

    "Canceled", "InProgress", and "Deleting".'
  signature: 'provisioning_state: str | _models.ProvisioningState | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.status
  name: status
  summary: '"Preparing", "Ready",

    "Scaling", and "Deleting".'
  signature: 'status: str | _models.HostingEnvironmentStatus | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.suspended
  name: suspended
  summary: '<code>true</code> if the App Service Environment is suspended; otherwise,
