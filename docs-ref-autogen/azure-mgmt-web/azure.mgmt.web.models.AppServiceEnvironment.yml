    (most likely because NSG blocked the incoming traffic).'
  signature: 'suspended: bool | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.upgrade_availability
  name: upgrade_availability
  summary: '"None"

    and "Ready".'
  signature: 'upgrade_availability: str | _models.UpgradeAvailability | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.upgrade_preference
  name: upgrade_preference
  summary: '"None", "Early", "Late", and "Manual".'
  signature: 'upgrade_preference: str | _models.UpgradePreference | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.user_whitelisted_ip_ranges
  name: user_whitelisted_ip_ranges
  summary: User added ip ranges to whitelist on ASE db.
  signature: 'user_whitelisted_ip_ranges: list[str] | None'
- uid: azure.mgmt.web.models.AppServiceEnvironment.virtual_network
  name: virtual_network
  summary: Description of the Virtual Network. Required.
  signature: 'virtual_network: _models.VirtualNetworkProfile'
- uid: azure.mgmt.web.models.AppServiceEnvironment.zone_redundant
  name: zone_redundant
  summary: Whether or not this App Service Environment is zone-redundant.
  signature: 'zone_redundant: bool | None'
