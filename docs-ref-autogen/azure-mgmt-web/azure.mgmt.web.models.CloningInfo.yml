### YamlMime:PythonClass
uid: azure.mgmt.web.models.CloningInfo
name: CloningInfo
fullName: azure.mgmt.web.models.CloningInfo
module: azure.mgmt.web.models
summary: Information needed for cloning operation.
constructor:
  syntax: 'CloningInfo(*args: Any, **kwargs: Any)'
variables:
- description: 'Correlation ID of cloning operation. This ID ties multiple cloning

    operations together to use the same snapshot.'
  name: correlation_id
  types:
  - <xref:str>
- description: <code>true</code> to overwrite destination app; otherwise, <code>false</code>.
  name: overwrite
  types:
  - <xref:bool>
- description: '<code>true</code> to clone custom hostnames from source app;

    otherwise, <code>false</code>.'
  name: clone_custom_host_names
  types:
  - <xref:bool>
- description: '<code>true</code> to clone source control from source app;

    otherwise, <code>false</code>.'
  name: clone_source_control
  types:
  - <xref:bool>
- description: 'ARM resource ID of the source app. App resource ID is of the form

    /subscriptions/{subId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Web/sites/{siteName}

    for production slots and

    /subscriptions/{subId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Web/sites/{siteName}/slots/{slotName}

    for other slots. Required.'
  name: source_web_app_id
  types:
  - <xref:str>
- description: 'Location of source app ex: West US or North Europe.'
  name: source_web_app_location
  types:
  - <xref:str>
- description: App Service Environment.
  name: hosting_environment
  types:
  - <xref:str>
- description: 'Application setting overrides for cloned app. If specified, these

    settings override the settings cloned from source app. Otherwise, application
    settings from

    source app are retained.'
  name: app_settings_overrides
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: '<code>true</code> to configure load balancing for source and

    destination app.'
  name: configure_load_balancing
  types:
  - <xref:bool>
- description: 'ARM resource ID of the Traffic Manager profile to use, if it

    exists. Traffic Manager resource ID is of the form

    /subscriptions/{subId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/trafficManagerProfiles/{profileName}.'
  name: traffic_manager_profile_id
  types:
  - <xref:str>
- description: 'Name of Traffic Manager profile to create. This is only

    needed if Traffic Manager profile does not already exist.'
  name: traffic_manager_profile_name
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.web.models.CloningInfo.app_settings_overrides
  name: app_settings_overrides
  summary: 'Application setting overrides for cloned app. If specified, these settings
    override the

    settings cloned from source app. Otherwise, application settings from source app
    are retained.'
  signature: 'app_settings_overrides: dict[str, str] | None'
- uid: azure.mgmt.web.models.CloningInfo.clone_custom_host_names
  name: clone_custom_host_names
  summary: <code>true</code> to clone custom hostnames from source app; otherwise,
    <code>false</code>.
  signature: 'clone_custom_host_names: bool | None'
- uid: azure.mgmt.web.models.CloningInfo.clone_source_control
  name: clone_source_control
  summary: <code>true</code> to clone source control from source app; otherwise, <code>false</code>.
  signature: 'clone_source_control: bool | None'
- uid: azure.mgmt.web.models.CloningInfo.configure_load_balancing
  name: configure_load_balancing
  summary: <code>true</code> to configure load balancing for source and destination
    app.
  signature: 'configure_load_balancing: bool | None'
- uid: azure.mgmt.web.models.CloningInfo.correlation_id
  name: correlation_id
  summary: 'Correlation ID of cloning operation. This ID ties multiple cloning operations
    together to use

    the same snapshot.'
  signature: 'correlation_id: str | None'
- uid: azure.mgmt.web.models.CloningInfo.hosting_environment
  name: hosting_environment
  summary: App Service Environment.
  signature: 'hosting_environment: str | None'
- uid: azure.mgmt.web.models.CloningInfo.overwrite
  name: overwrite
  summary: <code>true</code> to overwrite destination app; otherwise, <code>false</code>.
  signature: 'overwrite: bool | None'
- uid: azure.mgmt.web.models.CloningInfo.source_web_app_id
  name: source_web_app_id
  summary: 'ARM resource ID of the source app. App resource ID is of the form

    /subscriptions/{subId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Web/sites/{siteName}

    for production slots and

    /subscriptions/{subId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Web/sites/{siteName}/slots/{slotName}

    for other slots. Required.'
  signature: 'source_web_app_id: str'
- uid: azure.mgmt.web.models.CloningInfo.source_web_app_location
  name: source_web_app_location
  summary: West US or North Europe.
  signature: 'source_web_app_location: str | None'
- uid: azure.mgmt.web.models.CloningInfo.traffic_manager_profile_id
  name: traffic_manager_profile_id
  summary: 'ARM resource ID of the Traffic Manager profile to use, if it exists. Traffic
    Manager resource

    ID is of the form

    /subscriptions/{subId}/resourceGroups/{resourceGroupName}/providers/Microsoft.Network/trafficManagerProfiles/{profileName}.'
  signature: 'traffic_manager_profile_id: str | None'
- uid: azure.mgmt.web.models.CloningInfo.traffic_manager_profile_name
  name: traffic_manager_profile_name
  summary: 'Name of Traffic Manager profile to create. This is only needed if Traffic
    Manager profile does

    not already exist.'
  signature: 'traffic_manager_profile_name: str | None'
