uid: azure.mgmt.web.models.MSDeployProperties
name: MSDeployProperties
fullName: azure.mgmt.web.models.MSDeployProperties
module: azure.mgmt.web.models
summary: MSDeploy ARM PUT information properties.
constructor:
  syntax: 'MSDeployProperties(*args: Any, **kwargs: Any)'
variables:
- description: Package URI.
  name: package_uri
  types:
  - <xref:str>
- description: SQL Connection String.
  name: connection_string
  types:
  - <xref:str>
- description: Database Type.
  name: db_type
  types:
  - <xref:str>
- description: 'URI of MSDeploy Parameters file. Must not be set if

    SetParameters is used.'
  name: set_parameters_xml_file_uri
  types:
  - <xref:str>
- description: MSDeploy Parameters. Must not be set if SetParametersXmlFileUri is
    used.
  name: set_parameters
  types:
  - <xref:dict>[<xref:str>, <xref:str>]
- description: 'Controls whether the MSDeploy operation skips the App_Data directory.
    If

    set to <code>true</code>, the existing App_Data directory on the destination will
    not be

    deleted, and any App_Data directory in the source will be ignored. Setting is

    <code>false</code> by default.'
  name: skip_app_data
  types:
  - <xref:bool>
- description: 'Sets the AppOffline rule while the MSDeploy operation executes. Setting
    is

    <code>false</code> by default.'
  name: app_offline
  types:
  - <xref:bool>
- description: 'List of Add-On packages. Add-On packages implicitly enable the Do
    Not

    Delete MSDeploy rule.'
  name: add_on_packages
  types:
  - <xref:list>[<xref:azure.mgmt.web.models.MSDeployCore>]
attributes:
