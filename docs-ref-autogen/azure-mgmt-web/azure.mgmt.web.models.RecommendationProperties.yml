### YamlMime:PythonClass
uid: azure.mgmt.web.models.RecommendationProperties
name: RecommendationProperties
fullName: azure.mgmt.web.models.RecommendationProperties
module: azure.mgmt.web.models
summary: Recommendation resource specific properties.
constructor:
  syntax: 'RecommendationProperties(*args: Any, **kwargs: Any)'
variables:
- description: Timestamp when this instance was created.
  name: creation_time
  types:
  - <xref:datetime.datetime>
- description: A GUID value that each recommendation object is associated with.
  name: recommendation_id
  types:
  - <xref:str>
- description: 'Full ARM resource ID string that this recommendation object is associated

    with.'
  name: resource_id
  types:
  - <xref:str>
- description: 'Name of a resource type this recommendation applies, e.g. Subscription,

    ServerFarm, Site. Known values are: "ServerFarm", "Subscription", and "WebSite".'
  name: resource_scope
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.ResourceScopeType>
- description: Unique name of the rule.
  name: rule_name
  types:
  - <xref:str>
- description: UI friendly name of the rule (may not be unique).
  name: display_name
  types:
  - <xref:str>
- description: Recommendation text.
  name: message
  types:
  - <xref:str>
- description: 'Level indicating how critical this recommendation can impact. Known
    values are:

    "Critical", "Warning", "Information", and "NonUrgentSuggestion".'
  name: level
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.NotificationLevel>
- description: 'List of channels that this recommendation can apply. Known values
    are:

    "Notification", "Api", "Email", "Webhook", and "All".'
  name: channels
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.Channels>
- description: The list of category tags that this recommendation belongs to.
  name: category_tags
  types:
  - <xref:list>[<xref:str>]
- description: Name of action recommended by this object.
  name: action_name
  types:
  - <xref:str>
- description: 'True if this recommendation is still valid (i.e. "actionable"). False
    if it is

    invalid.'
  name: enabled
  types:
  - <xref:int>
- description: 'The list of states of this recommendation. If it''s null then it should
    be

    considered "Active".'
  name: states
  types:
  - <xref:list>[<xref:str>]
- description: The beginning time in UTC of a range that the recommendation refers
    to.
  name: start_time
  types:
  - <xref:datetime.datetime>
- description: The end time in UTC of a range that the recommendation refers to.
  name: end_time
  types:
  - <xref:datetime.datetime>
- description: 'When to notify this recommendation next in UTC. Null means that

    this will never be notified anymore.'
  name: next_notification_time
  types:
  - <xref:datetime.datetime>
- description: Date and time in UTC when this notification expires.
  name: notification_expiration_time
  types:
  - <xref:datetime.datetime>
- description: 'Last timestamp in UTC this instance was actually notified. Null means
    that

    this recommendation hasn''t been notified yet.'
  name: notified_time
  types:
  - <xref:datetime.datetime>
- description: A metric value measured by the rule.
  name: score
  types:
  - <xref:float>
- description: True if this is associated with a dynamically added rule.
  name: is_dynamic
  types:
  - <xref:bool>
- description: Extension name of the portal if exists.
  name: extension_name
  types:
  - <xref:str>
- description: Deep link to a blade on the portal.
  name: blade_name
  types:
  - <xref:str>
- description: Forward link to an external document associated with the rule.
  name: forward_link
  types:
  - <xref:str>
