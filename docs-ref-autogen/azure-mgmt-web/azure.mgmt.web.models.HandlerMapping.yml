uid: azure.mgmt.web.models.HandlerMapping
name: HandlerMapping
fullName: azure.mgmt.web.models.HandlerMapping
module: azure.mgmt.web.models
summary: 'The IIS handler mappings used to define which handler processes HTTP requests
  with certain

  extension. For example, it is used to configure php-cgi.exe process to handle all
  HTTP requests

  with >>*<<.php extension.'
constructor:
  syntax: 'HandlerMapping(*args: Any, **kwargs: Any)'
variables:
- description: 'Requests with this extension will be handled using the specified FastCGI

    application.'
  name: extension
  types:
  - <xref:str>
- description: The absolute path to the FastCGI application.
  name: script_processor
  types:
  - <xref:str>
- description: Command-line arguments to be passed to the script processor.
  name: arguments
  types:
  - <xref:str>
attributes:
- uid: azure.mgmt.web.models.HandlerMapping.arguments
  name: arguments
  summary: Command-line arguments to be passed to the script processor.
  signature: 'arguments: str | None'
- uid: azure.mgmt.web.models.HandlerMapping.extension
  name: extension
  summary: Requests with this extension will be handled using the specified FastCGI
    application.
  signature: 'extension: str | None'
- uid: azure.mgmt.web.models.HandlerMapping.script_processor
  name: script_processor
  summary: The absolute path to the FastCGI application.
  signature: 'script_processor: str | None'
