### YamlMime:PythonClass
uid: azure.mgmt.web.models.IpSecurityRestriction
name: IpSecurityRestriction
fullName: azure.mgmt.web.models.IpSecurityRestriction
module: azure.mgmt.web.models
summary: IP security restriction on an app.
constructor:
  syntax: 'IpSecurityRestriction(*args: Any, **kwargs: Any)'
variables:
- description: 'IP address the security restriction is valid for. It can be in form
    of pure

    ipv4 address (required SubnetMask property) or CIDR notation such as ipv4/mask
    (leading bit

    match). For CIDR, SubnetMask property must not be specified.'
  name: ip_address
  types:
  - <xref:str>
- description: Subnet mask for the range of IP addresses the restriction is valid
    for.
  name: subnet_mask
  types:
  - <xref:str>
- description: Virtual network resource id.
  name: vnet_subnet_resource_id
  types:
  - <xref:str>
- description: (internal) Vnet traffic tag.
  name: vnet_traffic_tag
  types:
  - <xref:int>
- description: (internal) Subnet traffic tag.
  name: subnet_traffic_tag
  types:
  - <xref:int>
- description: Allow or Deny access for this IP range.
  name: action
  types:
  - <xref:str>
- description: 'Defines what this IP filter will be used for. This is to support IP
    filtering on

    proxies. Known values are: "Default", "XffProxy", and "ServiceTag".'
  name: tag
  types:
  - <xref:str>
  - <xref:azure.mgmt.web.models.IpFilterTag>
- description: Priority of IP restriction rule.
  name: priority
  types:
  - <xref:int>
- description: IP restriction rule name.
  name: name
  types:
  - <xref:str>
- description: IP restriction rule description.
  name: description
  types:
  - <xref:str>
- description: "IP restriction rule headers. X-Forwarded-Host\n([https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-Host#Examples](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-Host#Examples)).\
    \ The\nmatching logic is ..\n\n* If the property is null or empty (default), all\
    \ hosts(or lack of) are allowed. \n\n* A value is compared using ordinal-ignore-case\
    \ (excluding port number). \n\n* Subdomain wildcards are permitted but don't match\
    \ the root domain. For example, >>*<<.contoso.com matches the subdomain foo.contoso.com\
    \ \n\nbut not the root domain contoso.com or multi-level foo.bar.contoso.com\n\
    * Unicode host names are allowed but are converted to Punycode for matching.\n\
    \nX-Forwarded-For\n([https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-For#Examples](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Forwarded-For#Examples)).\n\
    The matching logic is ..\n\n* If the property is null or empty (default), any\
    \ forwarded-for chains (or lack of) are allowed. \n\n* If any address (excluding\
    \ port number) in the chain (comma separated) matches the CIDR defined by the\
    \ property. \n\nX-Azure-FDID and X-FD-HealthProbe.\nThe matching logic is exact\
    \ match."
  name: headers
  types:
  - <xref:dict>[<xref:str>, <xref:list>[<xref:str>]]
