uid: azure.mgmt.batch.models.ResourceFile
name: ResourceFile
fullName: azure.mgmt.batch.models.ResourceFile
module: azure.mgmt.batch.models
summary: A single file or multiple files to be downloaded to a compute node.
constructor:
  syntax: 'ResourceFile(*args: Any, **kwargs: Any)'
variables:
- description: The storage container name in the auto storage account.
  name: auto_storage_container_name
  types:
  - <xref:str>
- description: The URL of the blob container within Azure Blob Storage.
  name: storage_container_url
  types:
  - <xref:str>
- description: The URL of the file to download.
  name: http_url
  types:
  - <xref:str>
