### YamlMime:PythonClass
uid: azure.mgmt.batch.models.ProvisioningIssueProperties
name: ProvisioningIssueProperties
fullName: azure.mgmt.batch.models.ProvisioningIssueProperties
module: azure.mgmt.batch.models
summary: 'Details of a provisioning issue for a network security perimeter (NSP) configuration.
  Resource

  providers should generate separate provisioning issue elements for each separate
  issue

  detected, and include a meaningful and distinctive description, as well as any appropriate

  suggestedResourceIds and suggestedAccessRules.'
constructor:
  syntax: 'ProvisioningIssueProperties(*args: Any, **kwargs: Any)'
variables:
- description: 'Type of issue. Known values are: "Unknown",

    "ConfigurationPropagationFailure", "MissingPerimeterConfiguration", and

    "MissingIdentityConfiguration".'
  name: issue_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.IssueType>
- description: 'Severity of the issue. Known values are: "Warning" and "Error".'
  name: severity
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.Severity>
- description: Description of the issue.
  name: description
  types:
  - <xref:str>
- description: 'Fully qualified resource IDs of suggested resources that can be

    associated to the network security perimeter (NSP) to remediate the issue.'
  name: suggested_resource_ids
  types:
  - <xref:list>[<xref:str>]
- description: 'Access rules that can be added to the network security profile

    (NSP) to remediate the issue.'
  name: suggested_access_rules
  types:
  - <xref:list>[<xref:azure.mgmt.batch.models.AccessRule>]
attributes:
- uid: azure.mgmt.batch.models.ProvisioningIssueProperties.description
  name: description
  summary: Description of the issue.
  signature: 'description: str | None'
- uid: azure.mgmt.batch.models.ProvisioningIssueProperties.issue_type
  name: issue_type
  summary: '"Unknown", "ConfigurationPropagationFailure",

    "MissingPerimeterConfiguration", and "MissingIdentityConfiguration".'
  signature: 'issue_type: str | _models.IssueType | None'
- uid: azure.mgmt.batch.models.ProvisioningIssueProperties.severity
  name: severity
  summary: '"Warning" and "Error".'
  signature: 'severity: str | _models.Severity | None'
- uid: azure.mgmt.batch.models.ProvisioningIssueProperties.suggested_access_rules
  name: suggested_access_rules
  summary: Access rules that can be added to the network security profile (NSP) to
    remediate the issue.
  signature: 'suggested_access_rules: list[''_models.AccessRule''] | None'
- uid: azure.mgmt.batch.models.ProvisioningIssueProperties.suggested_resource_ids
  name: suggested_resource_ids
  summary: 'Fully qualified resource IDs of suggested resources that can be associated
    to the network

    security perimeter (NSP) to remediate the issue.'
  signature: 'suggested_resource_ids: list[str] | None'
