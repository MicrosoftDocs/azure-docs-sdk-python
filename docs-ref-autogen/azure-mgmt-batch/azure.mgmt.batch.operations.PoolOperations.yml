- uid: azure.mgmt.batch.operations.PoolOperations.stop_resize
  name: stop_resize
  summary: 'Stops an ongoing resize operation on the pool.


    This does not restore the pool to its previous state before the resize operation:
    it only stops

    any further changes being made, and the pool maintains its current state. After
    stopping, the

    pool stabilizes at the number of nodes it was at when the stop operation was done.
    During the

    stop operation, the pool allocation state changes first to stopping and then to
    steady. A

    resize operation need not be an explicit resize pool request; this API can also
    be used to halt

    the initial sizing of the pool when it is created.'
  signature: 'stop_resize(resource_group_name: str, account_name: str, pool_name:
    str, **kwargs: Any) -> Pool'
  parameters:
  - name: resource_group_name
    description: 'The name of the resource group. The name is case insensitive.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: account_name
    description: 'A name for the Batch account which must be unique within the region.
      Batch

      account names must be between 3 and 24 characters in length and must use only
      numbers and

      lowercase letters. This name is used as part of the DNS name that is used to
      access the Batch

      service in the region in which the account is created. For example:

      [http://accountname.region.batch.azure.com/](http://accountname.region.batch.azure.com/).

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: pool_name
    description: The pool name. This must be unique within the account. Required.
    isRequired: true
    types:
    - <xref:str>
  return:
    description: Pool. The Pool is compatible with MutableMapping
    types:
