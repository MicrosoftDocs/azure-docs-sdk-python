### YamlMime:PythonClass
uid: azure.mgmt.batch.models.StartTask
name: StartTask
fullName: azure.mgmt.batch.models.StartTask
module: azure.mgmt.batch.models
summary: 'A task which is run when a compute node joins a pool in the Azure Batch
  service, or when the

  compute node is rebooted or reimaged.'
constructor:
  syntax: 'StartTask(*args: Any, **kwargs: Any)'
variables:
- description: The command line of the start task.
  name: command_line
  types:
  - <xref:str>
- description: 'A list of files that the Batch service will download to the compute
    node

    before running the command line.'
  name: resource_files
  types:
  - <xref:list>[<xref:azure.mgmt.batch.models.ResourceFile>]
- description: A list of environment variable settings for the start task.
  name: environment_settings
  types:
  - <xref:list>[<xref:azure.mgmt.batch.models.EnvironmentSetting>]
- description: The user identity under which the start task runs.
  name: user_identity
  types:
  - <xref:azure.mgmt.batch.models.UserIdentity>
- description: The maximum number of times the task may be retried.
  name: max_task_retry_count
  types:
  - <xref:int>
- description: 'Whether the Batch service should wait for the start task to complete

    successfully (that is, to exit with exit code 0) before scheduling any tasks on
    the compute

    node.'
  name: wait_for_success
  types:
  - <xref:bool>
- description: The settings for the container under which the start task runs.
  name: container_settings
  types:
  - <xref:azure.mgmt.batch.models.TaskContainerSettings>
attributes:
- uid: azure.mgmt.batch.models.StartTask.command_line
  name: command_line
  summary: The command line of the start task.
  signature: 'command_line: str | None'
- uid: azure.mgmt.batch.models.StartTask.container_settings
  name: container_settings
  summary: The settings for the container under which the start task runs.
  signature: 'container_settings: _models.TaskContainerSettings | None'
- uid: azure.mgmt.batch.models.StartTask.environment_settings
  name: environment_settings
  summary: A list of environment variable settings for the start task.
  signature: 'environment_settings: list[''_models.EnvironmentSetting''] | None'
- uid: azure.mgmt.batch.models.StartTask.max_task_retry_count
  name: max_task_retry_count
  summary: The maximum number of times the task may be retried.
  signature: 'max_task_retry_count: int | None'
- uid: azure.mgmt.batch.models.StartTask.resource_files
  name: resource_files
  summary: 'A list of files that the Batch service will download to the compute node
    before running the

    command line.'
  signature: 'resource_files: list[''_models.ResourceFile''] | None'
- uid: azure.mgmt.batch.models.StartTask.user_identity
  name: user_identity
  summary: The user identity under which the start task runs.
  signature: 'user_identity: _models.UserIdentity | None'
- uid: azure.mgmt.batch.models.StartTask.wait_for_success
  name: wait_for_success
  summary: 'Whether the Batch service should wait for the start task to complete successfully
    (that is, to

    exit with exit code 0) before scheduling any tasks on the compute node.'
  signature: 'wait_for_success: bool | None'
