variables:
- description: 'Full path to the secret with or without version. Example

    [https://mykeyvault.vault.azure.net/keys/testkey/6e34a81fef704045975661e297a4c053](https://mykeyvault.vault.azure.net/keys/testkey/6e34a81fef704045975661e297a4c053).
    or

    [https://mykeyvault.vault.azure.net/keys/testkey](https://mykeyvault.vault.azure.net/keys/testkey).
    To be usable the following prerequisites

    must be met:


    The Batch Account has a System Assigned identity

    The account identity has been granted Key/Get, Key/Unwrap and Key/Wrap permissions

    The KeyVault has soft-delete and purge protection enabled.'
