- uid: azure.mgmt.batch.models.InboundNatPool.frontend_port_range_start
  name: frontend_port_range_start
  summary: 'The first port number in the range of external ports that will be used
    to provide inbound

    access to the backendPort on individual compute nodes. Required.'
  signature: 'frontend_port_range_start: int'
- uid: azure.mgmt.batch.models.InboundNatPool.name
  name: name
  summary: The name of the endpoint. Required.
