### YamlMime:PythonClass
uid: azure.mgmt.batch.models.SecurityProfile
name: SecurityProfile
fullName: azure.mgmt.batch.models.SecurityProfile
module: azure.mgmt.batch.models
summary: Specifies the security profile settings for the virtual machine or virtual
  machine scale set.
constructor:
  syntax: 'SecurityProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the SecurityType of the virtual machine. It has to be set
    to any

    specified value to enable UefiSettings. Known values are: "trustedLaunch" and
    "confidentialVM".'
  name: security_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.SecurityTypes>
- description: 'This property can be used by user in the request to enable or disable

    the Host Encryption for the virtual machine or virtual machine scale set. This
    will enable the

    encryption for all the disks including Resource/Temp disk at host itself.'
  name: encryption_at_host
  types:
  - <xref:bool>
- description: 'Specifies the security settings like secure boot and vTPM used while

    creating the virtual machine.'
  name: uefi_settings
  types:
  - <xref:azure.mgmt.batch.models.UefiSettings>
- description: Specifies ProxyAgent settings while creating the virtual machine.
  name: proxy_agent_settings
  types:
  - <xref:azure.mgmt.batch.models.ProxyAgentSettings>
attributes:
- uid: azure.mgmt.batch.models.SecurityProfile.encryption_at_host
  name: encryption_at_host
  summary: 'This property can be used by user in the request to enable or disable
    the Host Encryption for

    the virtual machine or virtual machine scale set. This will enable the encryption
    for all the

    disks including Resource/Temp disk at host itself.'
  signature: 'encryption_at_host: bool | None'
- uid: azure.mgmt.batch.models.SecurityProfile.proxy_agent_settings
  name: proxy_agent_settings
  summary: Specifies ProxyAgent settings while creating the virtual machine.
  signature: 'proxy_agent_settings: _models.ProxyAgentSettings | None'
- uid: azure.mgmt.batch.models.SecurityProfile.security_type
  name: security_type
  summary: 'Specifies the SecurityType of the virtual machine. It has to be set to
    any specified value to

    enable UefiSettings. Known values are: "trustedLaunch" and "confidentialVM".'
  signature: 'security_type: str | _models.SecurityTypes | None'
- uid: azure.mgmt.batch.models.SecurityProfile.uefi_settings
  name: uefi_settings
  summary: 'Specifies the security settings like secure boot and vTPM used while creating
    the virtual

    machine.'
  signature: 'uefi_settings: _models.UefiSettings | None'
