uid: azure.mgmt.batch.models.DataDisk
name: DataDisk
fullName: azure.mgmt.batch.models.DataDisk
module: azure.mgmt.batch.models
summary: 'Settings which will be used by the data disks associated to Compute Nodes
  in the Pool. When

  using attached data disks, you need to mount and format the disks from within a
  VM to use them.'
constructor:
  syntax: 'DataDisk(*args: Any, **kwargs: Any)'
variables:
- description: The logical unit number. Required.
  name: lun
  types:
  - <xref:int>
- description: 'The type of caching to enable for the disk. Known values are: "None",

    "ReadOnly", and "ReadWrite".'
  name: caching
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.CachingType>
- description: The initial disk size in GB when creating new data disk. Required.
  name: disk_size_gb
  types:
  - <xref:int>
- description: The managed disk parameters.
  name: managed_disk
  types:
  - <xref:azure.mgmt.batch.models.ManagedDisk>
attributes:
- uid: azure.mgmt.batch.models.DataDisk.caching
  name: caching
  summary: '"None", "ReadOnly", and

    "ReadWrite".'
  signature: 'caching: str | _models.CachingType | None'
- uid: azure.mgmt.batch.models.DataDisk.disk_size_gb
  name: disk_size_gb
  summary: The initial disk size in GB when creating new data disk. Required.
  signature: 'disk_size_gb: int'
- uid: azure.mgmt.batch.models.DataDisk.lun
  name: lun
  summary: The logical unit number. Required.
  signature: 'lun: int'
- uid: azure.mgmt.batch.models.DataDisk.managed_disk
  name: managed_disk
