### YamlMime:PythonClass
uid: azure.mgmt.batch.models.PoolProperties
name: PoolProperties
fullName: azure.mgmt.batch.models.PoolProperties
module: azure.mgmt.batch.models
summary: Pool properties.
constructor:
  syntax: 'PoolProperties(*args: Any, **kwargs: Any)'
variables:
- description: The display name for the pool.
  name: display_name
  types:
  - <xref:str>
- description: The last modified time of the pool.
  name: last_modified
  types:
  - <xref:datetime.datetime>
- description: The creation time of the pool.
  name: creation_time
  types:
  - <xref:datetime.datetime>
- description: 'The current state of the pool. Known values are: "Succeeded" and

    "Deleting".'
  name: provisioning_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.PoolProvisioningState>
- description: The time at which the pool entered its current state.
  name: provisioning_state_transition_time
  types:
  - <xref:datetime.datetime>
- description: 'Whether the pool is resizing. Known values are: "Steady", "Resizing",

    and "Stopping".'
  name: allocation_state
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.AllocationState>
- description: 'The time at which the pool entered its current

    allocation state.'
  name: allocation_state_transition_time
  types:
  - <xref:datetime.datetime>
- description: The size of virtual machines in the pool. All VMs in a pool are the
    same size.
  name: vm_size
  types:
  - <xref:str>
- description: 'This property describes the virtual machines that the pool

    nodes will be deployed on.'
  name: deployment_configuration
  types:
  - <xref:azure.mgmt.batch.models.DeploymentConfiguration>
- description: The number of dedicated compute nodes currently in the pool.
  name: current_dedicated_nodes
  types:
  - <xref:int>
- description: 'The number of Spot/low-priority compute nodes currently in

    the pool.'
  name: current_low_priority_nodes
  types:
  - <xref:int>
- description: Settings which configure the number of nodes in the pool.
  name: scale_settings
  types:
  - <xref:azure.mgmt.batch.models.ScaleSettings>
- description: The results and errors from the last execution of the autoscale formula.
  name: auto_scale_run
  types:
  - <xref:azure.mgmt.batch.models.AutoScaleRun>
- description: 'Whether the pool permits direct communication between nodes.

    Known values are: "Enabled" and "Disabled".'
  name: inter_node_communication
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.InterNodeCommunicationState>
- description: The network configuration for the pool.
  name: network_configuration
  types:
  - <xref:azure.mgmt.batch.models.NetworkConfiguration>
- description: 'The number of task slots that can be used to run concurrent tasks
    on

    a single compute node in the pool.'
  name: task_slots_per_node
  types:
  - <xref:int>
- description: How tasks are distributed across compute nodes in a pool.
  name: task_scheduling_policy
  types:
  - <xref:azure.mgmt.batch.models.TaskSchedulingPolicy>
- description: The list of user accounts to be created on each node in the pool.
  name: user_accounts
  types:
  - <xref:list>[<xref:azure.mgmt.batch.models.UserAccount>]
- description: A list of name-value pairs associated with the pool as metadata.
  name: metadata
  types:
  - <xref:list>[<xref:azure.mgmt.batch.models.MetadataItem>]
- description: A task specified to run on each compute node as it joins the pool.
  name: start_task
  types:
  - <xref:azure.mgmt.batch.models.StartTask>
- description: 'The list of application packages to be installed on each compute

    node in the pool.'
  name: application_packages
  types:
  - <xref:list>[<xref:azure.mgmt.batch.models.ApplicationPackageReference>]
- description: 'Contains details about the current or last completed resize

    operation.'
  name: resize_operation_status
  types:
  - <xref:azure.mgmt.batch.models.ResizeOperationStatus>
- description: A list of file systems to mount on each node in the pool.
  name: mount_configuration
  types:
  - <xref:list>[<xref:azure.mgmt.batch.models.MountConfiguration>]
- description: The upgrade policy for the pool.
  name: upgrade_policy
  types:
  - <xref:azure.mgmt.batch.models.UpgradePolicy>
