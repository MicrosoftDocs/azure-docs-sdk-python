- uid: azure.mgmt.batch.aio.operations.ApplicationPackageOperations.activate
  name: activate
  summary: 'Activates the specified application package. This should be done after
    the

    `ApplicationPackage` was created and uploaded. This needs to be done before an

    `ApplicationPackage` can be used on Pools or Tasks.'
  signature: 'async activate(resource_group_name: str, account_name: str, application_name:
    str, version_name: str, parameters: _models.ActivateApplicationPackageParameters,
    *, content_type: str = ''application/json'', **kwargs: Any) -> _models.ApplicationPackage'
  parameters:
  - name: resource_group_name
    description: 'The name of the resource group. The name is case insensitive.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: account_name
    description: 'A name for the Batch account which must be unique within the region.
      Batch

      account names must be between 3 and 24 characters in length and must use only
      numbers and

      lowercase letters. This name is used as part of the DNS name that is used to
      access the Batch

      service in the region in which the account is created. For example:

      [http://accountname.region.batch.azure.com/](http://accountname.region.batch.azure.com/).

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: application_name
    description: 'The name of the application. This must be unique within the account.

      Required.'
    isRequired: true
    types:
    - <xref:str>
  - name: version_name
    description: The version of the application. Required.
    isRequired: true
    types:
    - <xref:str>
  - name: parameters
    description: 'The parameters for the request. Is one of the following types:

      ActivateApplicationPackageParameters, JSON, IO[bytes] Required.'
    isRequired: true
    types:
    - <xref:azure.mgmt.batch.models.ActivateApplicationPackageParameters>
    - <xref:JSON>
    - <xref:typing.IO>[<xref:bytes>]
