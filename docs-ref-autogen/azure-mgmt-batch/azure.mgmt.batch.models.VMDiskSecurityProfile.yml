### YamlMime:PythonClass
uid: azure.mgmt.batch.models.VMDiskSecurityProfile
name: VMDiskSecurityProfile
fullName: azure.mgmt.batch.models.VMDiskSecurityProfile
module: azure.mgmt.batch.models
summary: 'Specifies the security profile settings for the managed disk. **Note**:
  It can only be set for

  Confidential VMs and is required when using Confidential VMs.'
constructor:
  syntax: 'VMDiskSecurityProfile(*args: Any, **kwargs: Any)'
variables:
- description: 'Specifies the EncryptionType of the managed disk. It is set to

    VMGuestStateOnly for encryption of just the VMGuestState blob, and NonPersistedTPM
    for not

    persisting firmware state in the VMGuestState blob. **Note**: It can be set for
    only

    Confidential VMs and required when using Confidential VMs. Known values are: "NonPersistedTPM",

    "VMGuestStateOnly", and "DiskWithVMGuestState".'
  name: security_encryption_type
  types:
  - <xref:str>
  - <xref:azure.mgmt.batch.models.SecurityEncryptionTypes>
- description: 'Specifies the customer managed disk encryption set resource id for

    the managed disk that is used for Customer Managed Key encrypted ConfidentialVM
    OS Disk and

    VMGuest blob. It can be set only in UserSubscription mode.'
  name: disk_encryption_set
  types:
  - <xref:azure.mgmt.batch.models.DiskEncryptionSetParameters>
attributes:
- uid: azure.mgmt.batch.models.VMDiskSecurityProfile.disk_encryption_set
  name: disk_encryption_set
  summary: 'Specifies the customer managed disk encryption set resource id for the
    managed disk that is

    used for Customer Managed Key encrypted ConfidentialVM OS Disk and VMGuest blob.
    It can be set

    only in UserSubscription mode.'
  signature: 'disk_encryption_set: _models.DiskEncryptionSetParameters | None'
- uid: azure.mgmt.batch.models.VMDiskSecurityProfile.security_encryption_type
  name: security_encryption_type
  summary: 'Specifies the EncryptionType of the managed disk. It is set to VMGuestStateOnly
    for encryption

    of just the VMGuestState blob, and NonPersistedTPM for not persisting firmware
    state in the

    VMGuestState blob. **Note**: It can be set for only Confidential VMs and required
    when using

    Confidential VMs. Known values are: "NonPersistedTPM", "VMGuestStateOnly", and

    "DiskWithVMGuestState".'
  signature: 'security_encryption_type: str | _models.SecurityEncryptionTypes | None'
